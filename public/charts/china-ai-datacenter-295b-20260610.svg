<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 470" font-family="'Segoe UI',Arial,sans-serif">
  <!-- Background -->
  <rect width="800" height="470" fill="#0a0f1e"/>

  <!-- Header y:0-68 -->
  <rect x="0" y="0" width="800" height="68" fill="#0d1528"/>
  <rect x="0" y="0" width="6" height="68" fill="#ef4444"/>
  <text x="24" y="36" font-size="20" font-weight="700" fill="#ef4444">중국 AI 국가 프로젝트 — $2,950억 데이터센터</text>
  <text x="24" y="54" font-size="12" fill="#94a3b8">China AI National Security · 5-Year Plan · 2026–2030</text>

  <!-- 3 Stat Cards y:80-160 -->
  <!-- Card 1 -->
  <rect x="40" y="80" width="218" height="78" rx="10" fill="#2b0d0d" stroke="#ef4444" stroke-width="1.5"/>
  <text x="149" y="110" font-size="11" fill="#94a3b8" text-anchor="middle">총 투자 규모</text>
  <text x="149" y="136" font-size="22" font-weight="800" fill="#ef4444" text-anchor="middle">$2,950억</text>
  <text x="149" y="153" font-size="10" fill="#64748b" text-anchor="middle">USD 295 Billion</text>

  <!-- Card 2 -->
  <rect x="291" y="80" width="218" height="78" rx="10" fill="#2b0d0d" stroke="#fb923c" stroke-width="1.5"/>
  <text x="400" y="110" font-size="11" fill="#94a3b8" text-anchor="middle">계획 기간</text>
  <text x="400" y="136" font-size="22" font-weight="800" fill="#fb923c" text-anchor="middle">5개년 계획</text>
  <text x="400" y="153" font-size="10" fill="#64748b" text-anchor="middle">2026 – 2030</text>

  <!-- Card 3 -->
  <rect x="542" y="80" width="218" height="78" rx="10" fill="#2b0d0d" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="651" y="110" font-size="11" fill="#94a3b8" text-anchor="middle">국산화 목표</text>
  <text x="651" y="136" font-size="22" font-weight="800" fill="#f59e0b" text-anchor="middle">80%</text>
  <text x="651" y="153" font-size="10" fill="#64748b" text-anchor="middle">국내 기술 기반 운영</text>

  <!-- Investment Breakdown y:175-320 -->
  <text x="400" y="190" font-size="12" fill="#64748b" text-anchor="middle">재원 조달 구조</text>

  <!-- Bar chart — label width=180, bar starts x=230, max width=510 -->
  <!-- 정부 채권 40% -->
  <text x="225" y="218" font-size="12" fill="#e2e8f0" text-anchor="end">정부 채권</text>
  <rect x="230" y="205" width="204" height="28" rx="5" fill="#ef4444"/>
  <text x="444" y="224" font-size="11" font-weight="700" fill="#fff" text-anchor="start"> 40%</text>

  <!-- 국영 통신사 30% -->
  <text x="225" y="258" font-size="12" fill="#e2e8f0" text-anchor="end">국영 통신사</text>
  <rect x="230" y="245" width="153" height="28" rx="5" fill="#fb923c"/>
  <text x="393" y="264" font-size="11" font-weight="700" fill="#fff" text-anchor="start"> 30%</text>

  <!-- 화웨이+국산 반도체 20% -->
  <text x="225" y="298" font-size="12" fill="#e2e8f0" text-anchor="end">화웨이+국산 반도체</text>
  <rect x="230" y="285" width="102" height="28" rx="5" fill="#f59e0b"/>
  <text x="342" y="304" font-size="11" font-weight="700" fill="#fff" text-anchor="start"> 20%</text>

  <!-- 민간 10% -->
  <text x="225" y="338" font-size="12" fill="#e2e8f0" text-anchor="end">민간 (알리바바·텐센트 제외)</text>
  <rect x="230" y="325" width="51" height="28" rx="5" fill="#64748b"/>
  <text x="291" y="344" font-size="11" font-weight="700" fill="#fff" text-anchor="start"> 10%</text>

  <!-- Timeline y:355-420 -->
  <text x="400" y="368" font-size="12" fill="#64748b" text-anchor="middle">추진 일정</text>

  <!-- Timeline line -->
  <line x1="80" y1="400" x2="720" y2="400" stroke="#334155" stroke-width="2"/>

  <!-- 2026 -->
  <circle cx="160" cy="400" r="8" fill="#ef4444"/>
  <text x="160" y="388" font-size="11" font-weight="700" fill="#ef4444" text-anchor="middle">2026</text>
  <text x="160" y="418" font-size="11" fill="#e2e8f0" text-anchor="middle">착공·착수</text>
  <text x="160" y="432" font-size="10" fill="#64748b" text-anchor="middle">국가 AI 프로젝트 선포</text>

  <!-- 2027 -->
  <circle cx="400" cy="400" r="8" fill="#fb923c"/>
  <text x="400" y="388" font-size="11" font-weight="700" fill="#fb923c" text-anchor="middle">2027</text>
  <text x="400" y="418" font-size="11" fill="#e2e8f0" text-anchor="middle">1단계 완공</text>
  <text x="400" y="432" font-size="10" fill="#64748b" text-anchor="middle">주요 데이터센터 가동</text>

  <!-- 2028 -->
  <circle cx="640" cy="400" r="8" fill="#f59e0b"/>
  <text x="640" y="388" font-size="11" font-weight="700" fill="#f59e0b" text-anchor="middle">2028</text>
  <text x="640" y="418" font-size="11" fill="#e2e8f0" text-anchor="middle">통합 AI 네트워크 완성</text>
  <text x="640" y="432" font-size="10" fill="#64748b" text-anchor="middle">전국 AI 인프라 연결</text>

  <!-- Source -->
  <text x="400" y="455" font-size="11" fill="#475569" text-anchor="middle">investus.kr</text>
</svg>
