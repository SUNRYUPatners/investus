<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="tenxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="50%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect width="1080" height="1080" fill="none" stroke="#1f2937" stroke-width="2"/>
  <rect x="0" y="0" width="1080" height="4" fill="url(#redGrad)"/>

  <text x="540" y="90" font-family="Arial,sans-serif" font-size="15" font-weight="700" fill="#6b7280" text-anchor="middle" letter-spacing="3">INVESTUS DAILY REPORT</text>
  <text x="540" y="128" font-family="Arial,sans-serif" font-size="32" font-weight="900" fill="#f9fafb" text-anchor="middle" letter-spacing="1">TSLA · Semi Energy Efficiency 10x</text>

  <rect x="416" y="145" width="248" height="34" rx="17" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="540" y="167" font-family="Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" text-anchor="middle" letter-spacing="2">2026.07.01</text>

  <!-- Truck icon -->
  <g transform="translate(390, 210)">
    <rect x="160" y="20" width="100" height="70" rx="8" fill="#1f2937" stroke="#374151" stroke-width="2"/>
    <rect x="170" y="28" width="80" height="40" rx="4" fill="#60a5fa" opacity="0.3"/>
    <rect x="0" y="10" width="165" height="80" rx="6" fill="#1f2937" stroke="#ef4444" stroke-width="2"/>
    <text x="82" y="58" font-family="Arial,sans-serif" font-size="22" font-weight="900" fill="#ef4444" text-anchor="middle">TESLA SEMI</text>
    <circle cx="40" cy="98" r="16" fill="#374151" stroke="#6b7280" stroke-width="2"/>
    <circle cx="40" cy="98" r="8" fill="#1f2937"/>
    <circle cx="120" cy="98" r="16" fill="#374151" stroke="#6b7280" stroke-width="2"/>
    <circle cx="120" cy="98" r="8" fill="#1f2937"/>
    <circle cx="210" cy="98" r="16" fill="#374151" stroke="#6b7280" stroke-width="2"/>
    <circle cx="210" cy="98" r="8" fill="#1f2937"/>
    <circle cx="245" cy="98" r="16" fill="#374151" stroke="#6b7280" stroke-width="2"/>
    <circle cx="245" cy="98" r="8" fill="#1f2937"/>
  </g>

  <text x="540" y="410" font-family="Arial Black,Arial,sans-serif" font-size="180" font-weight="900" fill="url(#tenxGrad)" text-anchor="middle" filter="url(#softGlow)" opacity="0.15">10x</text>
  <text x="540" y="410" font-family="Arial Black,Arial,sans-serif" font-size="180" font-weight="900" fill="url(#tenxGrad)" text-anchor="middle">10x</text>

  <text x="540" y="445" font-family="Arial,sans-serif" font-size="20" fill="#9ca3af" text-anchor="middle" letter-spacing="3">ENERGY EFFICIENCY ADVANTAGE vs DIESEL</text>

  <line x1="80" y1="475" x2="1000" y2="475" stroke="#1f2937" stroke-width="1"/>

  <text x="540" y="510" font-family="Arial,sans-serif" font-size="16" font-weight="700" fill="#6b7280" text-anchor="middle" letter-spacing="2">ENERGY CONSUMPTION PER MILE (kWh equivalent)</text>

  <rect x="180" y="540" width="630" height="58" rx="8" fill="#374151"/>
  <rect x="180" y="540" width="630" height="58" rx="8" fill="#dc2626" opacity="0.7"/>
  <text x="196" y="575" font-family="Arial,sans-serif" font-size="17" font-weight="700" fill="white">DIESEL</text>
  <text x="800" y="575" font-family="Arial,sans-serif" font-size="17" font-weight="700" fill="white" text-anchor="end">10.0 kWh/mi</text>

  <rect x="180" y="620" width="63" height="58" rx="8" fill="#374151"/>
  <rect x="180" y="620" width="63" height="58" rx="8" fill="#60a5fa"/>
  <text x="196" y="655" font-family="Arial,sans-serif" font-size="17" font-weight="700" fill="white">TSLA</text>
  <text x="800" y="655" font-family="Arial,sans-serif" font-size="17" font-weight="700" fill="#60a5fa" text-anchor="end">1.0 kWh/mi</text>

  <text x="860" y="620" font-family="Arial Black,sans-serif" font-size="22" font-weight="900" fill="#f59e0b">10x</text>

  <!-- Key stats row -->
  <rect x="80" y="720" width="270" height="120" rx="12" fill="#0f172a" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="215" y="756" font-family="Arial,sans-serif" font-size="13" fill="#60a5fa" text-anchor="middle" letter-spacing="1">REGENERATIVE</text>
  <text x="215" y="790" font-family="Arial Black,sans-serif" font-size="32" font-weight="900" fill="#60a5fa" text-anchor="middle">REGEN</text>
  <text x="215" y="818" font-family="Arial,sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">Braking Energy Recovery</text>
  <text x="215" y="835" font-family="Arial,sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">EV Advantage</text>

  <rect x="405" y="720" width="270" height="120" rx="12" fill="#0f172a" stroke="#374151" stroke-width="1.5"/>
  <text x="540" y="756" font-family="Arial,sans-serif" font-size="13" fill="#f59e0b" text-anchor="middle" letter-spacing="1">FUEL SAVINGS</text>
  <text x="540" y="796" font-family="Arial Black,sans-serif" font-size="30" font-weight="900" fill="#f59e0b" text-anchor="middle">TCO↓↓</text>
  <text x="540" y="820" font-family="Arial,sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">Total Cost of Ownership</text>
  <text x="540" y="836" font-family="Arial,sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">Dramatically Lower</text>

  <rect x="730" y="720" width="270" height="120" rx="12" fill="#0f172a" stroke="#14532d" stroke-width="1.5"/>
  <text x="865" y="756" font-family="Arial,sans-serif" font-size="13" fill="#4ade80" text-anchor="middle" letter-spacing="1">EMISSIONS</text>
  <text x="865" y="796" font-family="Arial Black,sans-serif" font-size="36" font-weight="900" fill="#4ade80" text-anchor="middle">ZERO</text>
  <text x="865" y="820" font-family="Arial,sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">Zero Tailpipe Emissions</text>
  <text x="865" y="836" font-family="Arial,sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">While in Operation</text>

  <text x="540" y="900" font-family="Arial,sans-serif" font-size="14" fill="#374151" text-anchor="middle">Tesla Semi vs Diesel Truck Energy Efficiency Analysis · 2026.07.01</text>

  <rect x="0" y="1060" width="1080" height="20" fill="url(#redGrad)" opacity="0.4"/>
  <text x="540" y="1073" font-family="Arial,sans-serif" font-size="10" fill="#6b7280" text-anchor="middle" letter-spacing="2">INVESTUS · TSLA RESEARCH · NOT FINANCIAL ADVICE</text>
</svg>
