  <rect x="80" y="710" width="920" height="80" rx="14" fill="#070e1a" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.7"/>
  <text x="540" y="742" font-family="Arial Black, Arial" font-weight="900" font-size="15" fill="#60a5fa" text-anchor="middle">연내 런칭 예정 도시</text>
  <text x="540" y="770" font-family="Arial, sans-serif" font-size="15" fill="#d1d5db" text-anchor="middle">피닉스 · 올랜도 · 오스틴 · 라스베이거스 (2026년 내)</text>

  <!-- key metrics row -->
  <rect x="80" y="812" width="200" height="90" rx="12" fill="#0f1f2e"/>
  <text x="180" y="848" font-family="Arial Black, Arial" font-weight="900" font-size="13" fill="#9ca3af" text-anchor="middle">현재 플릿</text>
  <text x="180" y="878" font-family="Arial Black, Arial" font-weight="900" font-size="22" fill="#60a5fa" text-anchor="middle">마이애미</text>

  <rect x="300" y="812" width="200" height="90" rx="12" fill="#0f1f2e"/>
  <text x="400" y="848" font-family="Arial Black, Arial" font-weight="900" font-size="13" fill="#9ca3af" text-anchor="middle">가격 목표</text>
  <text x="400" y="878" font-family="Arial Black, Arial" font-weight="900" font-size="22" fill="#3b82f6" text-anchor="middle">$415</text>

  <rect x="520" y="812" width="200" height="90" rx="12" fill="#0f1f2e"/>
  <text x="620" y="848" font-family="Arial Black, Arial" font-weight="900" font-size="13" fill="#9ca3af" text-anchor="middle">2027 이후</text>
  <text x="620" y="878" font-family="Arial Black, Arial" font-weight="900" font-size="22" fill="#22c55e" text-anchor="middle">대폭 확장</text>

  <rect x="740" y="812" width="260" height="90" rx="12" fill="#0f1f2e"/>
  <text x="870" y="848" font-family="Arial Black, Arial" font-weight="900" font-size="13" fill="#9ca3af" text-anchor="middle">등급</text>
  <text x="870" y="878" font-family="Arial Black, Arial" font-weight="900" font-size="18" fill="#f59e0b" text-anchor="middle">Equalweight</text>

  <rect x="0" y="1020" width="1080" height="60" fill="#020810"/>
  <text x="540" y="1056" font-family="Arial, sans-serif" font-size="13" fill="#374151" text-anchor="middle">INVESTUS · 2026.07.07 · investus.kr SRP 최고투자책임자 발행</text>
