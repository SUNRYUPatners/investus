  <text x="260" y="684" font-family="Arial, sans-serif" font-size="13" fill="#6b7280" text-anchor="middle">연내 목표</text>

  <!-- arrow -->
  <polygon points="420,500 460,480 460,520" fill="#374151"/>
  <line x1="380" y1="500" x2="420" y2="500" stroke="#374151" stroke-width="3"/>

  <!-- bar: 2030 -->
  <rect x="540" y="360" width="380" height="280" rx="8" fill="#0d1f0d" stroke="#166534" stroke-width="1.5"/>
