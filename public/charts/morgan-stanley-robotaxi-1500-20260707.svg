  <text x="730" y="510" font-family="Arial Black, Arial" font-weight="900" font-size="46" fill="#ffffff" text-anchor="middle">30,000</text>
  <text x="730" y="558" font-family="Arial, sans-serif" font-size="18" fill="#86efac" text-anchor="middle">대</text>
  <text x="730" y="664" font-family="Arial Black, Arial" font-weight="900" font-size="16" fill="#22c55e" text-anchor="middle">2030년</text>
  <text x="730" y="684" font-family="Arial, sans-serif" font-size="13" fill="#4ade80" text-anchor="middle">20배 확장</text>

