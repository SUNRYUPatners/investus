<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#040a14"/>
      <stop offset="100%" style="stop-color:#0a1020"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="barGrad26" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="barGrad30" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect x="60" y="60" width="960" height="4" fill="url(#blueGrad)" rx="2"/>

  <rect x="60" y="86" width="140" height="34" rx="8" fill="#1e3a5f"/>
  <text x="130" y="109" font-family="Arial Black, Arial" font-weight="900" font-size="13" fill="#60a5fa" text-anchor="middle">Morgan Stanley</text>
  <rect x="212" y="86" width="80" height="34" rx="8" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="252" y="109" font-family="Arial, sans-serif" font-weight="700" font-size="12" fill="#3b82f6" text-anchor="middle">TSLA</text>
  <text x="1020" y="109" font-family="Arial, sans-serif" font-size="14" fill="#374151" text-anchor="end">2026.07.07</text>

  <text x="540" y="180" font-family="Arial Black, Arial" font-weight="900" font-size="24" fill="#ffffff" text-anchor="middle">Morgan Stanley — TSLA 로보택시 분석</text>
  <text x="540" y="236" font-family="Arial Black, Arial" font-weight="900" font-size="50" fill="#3b82f6" text-anchor="middle">$415 목표가 유지</text>
  <text x="540" y="282" font-family="Arial, sans-serif" font-size="18" fill="#9ca3af" text-anchor="middle">Equalweight · 마이애미 서비스 개시 후 재확인</text>

  <!-- fleet growth chart -->
  <text x="540" y="330" font-family="Arial Black, Arial" font-weight="900" font-size="18" fill="#d1d5db" text-anchor="middle">로보택시 플릿 확장 전망</text>

  <!-- bar: 2026 -->
  <rect x="160" y="360" width="200" height="280" rx="8" fill="#0f1f2e" stroke="#1f3a5f" stroke-width="1"/>
