  <text x="130" y="306" font-family="Arial,sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">성장주 할인율↓</text>

  <rect x="228" y="268" width="164" height="48" rx="8" fill="#071a07" stroke="rgba(0,229,160,0.35)" stroke-width="1"/>
  <text x="310" y="289" font-family="Arial,sans-serif" font-size="16" fill="#00e5a0" text-anchor="middle" font-weight="700">TSLA</text>
  <text x="310" y="306" font-family="Arial,sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">EV 금융 부담↓</text>

  <rect x="408" y="268" width="164" height="48" rx="8" fill="#1a0a0a" stroke="rgba(255,77,109,0.35)" stroke-width="1"/>
  <text x="490" y="289" font-family="Arial,sans-serif" font-size="16" fill="#ff4d6d" text-anchor="middle" font-weight="700">META</text>
  <text x="490" y="306" font-family="Arial,sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">광고 예산 회복</text>

  <rect x="588" y="268" width="164" height="48" rx="8" fill="#0a0a10" stroke="rgba(200,205,212,0.25)" stroke-width="1"/>
  <text x="670" y="289" font-family="Arial,sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="700">AAPL</text>
  <text x="670" y="306" font-family="Arial,sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">프리미엄 소비 회복</text>

  <!-- Risk strip -->
  <rect x="36" y="332" width="728" height="28" rx="6" fill="rgba(239,68,68,0.07)" stroke="rgba(239,68,68,0.18)" stroke-width="1"/>
  <text x="400" y="350" font-family="Arial,sans-serif" font-size="11" fill="#ef4444" text-anchor="middle">⚠ 리스크: 이란 강경파 반발 → 합의 불발 시 유가 재상승 · 지정학 리스크 재부상</text>

  <line x1="30" y1="378" x2="770" y2="378" stroke="#1e2330" stroke-width="1"/>
  <text x="30" y="396" font-family="Arial,sans-serif" font-size="10" fill="#6b7280">투자 참고용. 투자 판단 및 결과에 대한 책임은 투자자 본인에게 있습니다.</text>
  <text x="770" y="396" font-family="Arial,sans-serif" font-size="10" fill="#00e5a0" text-anchor="end" font-weight="600">INVESTUS · SUNRYU Partners CIO</text>
