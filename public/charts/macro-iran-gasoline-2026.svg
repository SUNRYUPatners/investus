  <rect x="36" y="122" width="118" height="72" rx="10" fill="#0a1422" stroke="rgba(96,165,250,0.5)" stroke-width="1.5"/>
  <text x="95" y="148" font-family="Arial,sans-serif" font-size="22" text-anchor="middle">🛢</text>
