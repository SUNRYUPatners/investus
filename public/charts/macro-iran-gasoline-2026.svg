  <text x="675" y="146" font-family="Arial,sans-serif" font-size="28" text-anchor="middle">📈</text>
  <text x="675" y="172" font-family="Arial,sans-serif" font-size="13" fill="#fb923c" text-anchor="middle" font-weight="700">증시 호재</text>
  <text x="675" y="188" font-family="Arial,sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">하반기 강세장</text>

