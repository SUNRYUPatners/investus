  <text x="48" y="716" font-family="Arial,sans-serif" font-size="12" fill="#4ade80">✅ 2008 모기지 사태 사전 쇼트 → 수천 % 수익</text>
  <text x="48" y="740" font-family="Arial,sans-serif" font-size="12" fill="#4ade80">✅ 역발상 투자로 유명 · 월가 흐름 역행 후 적중</text>
  <text x="48" y="764" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af">◆ 2022 TSLA 쇼트 → 일부 조기 청산으로 손실</text>
  <text x="48" y="788" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af">◆ MSFT 롱: 빅쇼트의 주인공이 빅테크를 산다</text>
  <text x="48" y="820" font-family="Arial,sans-serif" font-size="11" fill="#6b7280">Scion Asset Management 창업자 · 영화 빅쇼트 실제 주인공</text>

