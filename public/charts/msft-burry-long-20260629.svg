  <rect x="538" y="648" width="514" height="190" rx="12" fill="#0a1528" stroke="#60a5fa" stroke-width="1"/>
  <text x="795" y="684" font-family="Arial,sans-serif" font-size="15" fill="#60a5fa" font-weight="700" text-anchor="middle">투자 시사점</text>
  <text x="795" y="720" font-family="Arial,sans-serif" font-size="36" font-weight="bold" fill="#f1f5f9" text-anchor="middle">매수 신호</text>
  <text x="795" y="758" font-family="Arial,sans-serif" font-size="13" fill="#60a5fa" text-anchor="middle">콜옵션 = 주가 상승에 베팅</text>
  <text x="795" y="784" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">Form 4 공시 = 공식 확인된 포지션</text>
  <text x="795" y="810" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">버리의 역발상 매수 타이밍 = 저점 신호로 해석 가능</text>

