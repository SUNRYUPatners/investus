  <rect x="568" y="382" width="464" height="72" rx="8" fill="#0a1528"/>
  <text x="588" y="410" font-family="Arial,sans-serif" font-size="13" fill="#60a5fa" font-weight="700">② 역대 최대 자사주 매입 + 배당</text>
  <text x="588" y="434" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af">$3.3B 분기 배당 · 안정적 FCF + 주주환원 극대화</text>

  <rect x="568" y="464" width="464" height="72" rx="8" fill="#0a1528"/>
  <text x="588" y="492" font-family="Arial,sans-serif" font-size="13" fill="#60a5fa" font-weight="700">③ 저점 매수 타이밍 신호</text>
  <text x="588" y="516" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af">빅쇼트 버리의 콜옵션 = 강력한 반등 기대 포지션</text>

  <rect x="568" y="546" width="464" height="72" rx="8" fill="#0a1528"/>
  <text x="588" y="574" font-family="Arial,sans-serif" font-size="13" fill="#60a5fa" font-weight="700">④ 현재 주가 vs $380 행사가</text>
  <text x="588" y="598" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af">$380 행사가 근처 주가 = 소폭 상승 시 콜옵션 이익 폭발적</text>

