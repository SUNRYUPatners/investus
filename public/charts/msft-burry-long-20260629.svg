  <text x="540" y="893" font-family="Arial,sans-serif" font-size="15" fill="#60a5fa" font-weight="700" text-anchor="middle">빅쇼트 버리, MSFT $380 콜옵션 매수 — 역대 저점에서 반등 베팅</text>
  <text x="540" y="922" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">Azure AI + OpenAI 파트너십 + 역발상 매수 = MSFT 재평가 가능성 · 2026년 12월 만기 주목</text>
  <text x="540" y="1062" font-family="Arial,sans-serif" font-size="10" fill="#4b5563" text-anchor="middle">출처: SEC Form 4 (2026.06.26) · Barchar · 투자 참고용 · Investus 2026.06.29</text>
