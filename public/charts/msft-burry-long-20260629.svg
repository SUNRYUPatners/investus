  <rect x="28" y="108" width="1024" height="120" rx="14" fill="#0a1528" stroke="#60a5fa" stroke-width="2"/>
  <text x="540" y="148" font-family="Arial,sans-serif" font-size="14" fill="#60a5fa" text-anchor="middle">SEC Form 4 제출일: 2026년 6월 26일</text>
  <text x="540" y="196" font-family="Arial,sans-serif" font-size="54" font-weight="bold" fill="#f1f5f9" text-anchor="middle">$380 콜옵션 매수</text>
  <text x="540" y="222" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">만기: 2026년 12월 · MSFT 역대 저점 근처에서 진입</text>

  <!-- Position details left -->
