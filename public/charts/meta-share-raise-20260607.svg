  <text x="50" y="278" fill="white" font-size="14" font-weight="700">CAPEX 확대</text>
  <text x="50" y="296" fill="rgba(255,255,255,0.35)" font-size="11">GPU 클러스터 · 데이터센터</text>

  <rect x="264" y="234" width="220" height="72" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)"/>
  <text x="284" y="256" fill="rgba(255,255,255,0.6)" font-size="11">🥽 AR/VR 하드웨어</text>
  <text x="284" y="278" fill="white" font-size="14" font-weight="700">Orion AR 글래스</text>
  <text x="284" y="296" fill="rgba(255,255,255,0.35)" font-size="11">Ray-Ban 후속 제품 라인</text>

  <rect x="498" y="234" width="272" height="72" rx="8" fill="#4ade80" fill-opacity="0.05" stroke="#4ade80" stroke-opacity="0.12"/>
  <text x="518" y="256" fill="#4ade80" font-size="11">💼 M&amp;A / 전략적 투자</text>
  <text x="518" y="278" fill="white" font-size="14" font-weight="700">AI 스타트업 인수</text>
  <text x="518" y="296" fill="rgba(255,255,255,0.35)" font-size="11">Llama 생태계 강화</text>

  <!-- market impact -->
  <text x="30" y="336" fill="rgba(255,255,255,0.4)" font-size="11" font-weight="700" letter-spacing="1">시장 영향 분석</text>
  <rect x="30" y="348" width="350" height="58" rx="8" fill="rgba(255,77,109,0.06)" stroke="rgba(255,77,109,0.12)"/>
  <text x="50" y="370" fill="#ff4d6d" font-size="11" font-weight="700">단기 부정적</text>
  <text x="50" y="390" fill="rgba(255,255,255,0.5)" font-size="12">신주 발행 = 주당 희석 효과 → 단기 조정 압력</text>

  <rect x="400" y="348" width="370" height="58" rx="8" fill="#4ade80" fill-opacity="0.05" stroke="#4ade80" stroke-opacity="0.12"/>
  <text x="420" y="370" fill="#4ade80" font-size="11" font-weight="700">중장기 긍정적</text>
  <text x="420" y="390" fill="rgba(255,255,255,0.5)" font-size="12">AI 투자 확대 → 매출 성장 가속 → 주가 재평가</text>

  <text x="400" y="430" fill="rgba(255,255,255,0.2)" font-size="10" text-anchor="middle">Investus · investus.kr</text>
