  <text x="524" y="172" fill="rgba(255,255,255,0.4)" font-size="12">Zuckerberg 주도 AI 투자 확대</text>

  <!-- why raise -->
  <text x="30" y="224" fill="rgba(255,255,255,0.4)" font-size="11" font-weight="700" letter-spacing="1">조달 목적 (추정)</text>

  <rect x="30" y="234" width="220" height="72" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)"/>
