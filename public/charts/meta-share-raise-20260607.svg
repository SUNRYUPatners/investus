<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" style="background:#0a0c10;font-family:'Helvetica Neue',Arial,sans-serif">
  <rect width="800" height="440" fill="#0a0c10"/>
  <defs>
    <linearGradient id="grn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ade80"/><stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
  </defs>
  <rect x="30" y="24" width="10" height="36" rx="3" fill="url(#grn)"/>
  <text x="50" y="42" fill="#4ade80" font-size="11" font-weight="700" letter-spacing="2">META PLATFORMS · 자본 조달</text>
