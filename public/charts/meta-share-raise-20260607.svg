  <text x="700" y="44" fill="#4ade80" font-size="11" font-weight="600" text-anchor="end">2026.06.07</text>
  <line x1="30" y1="76" x2="770" y2="76" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>

  <!-- main card -->
  <rect x="30" y="90" width="460" height="100" rx="12" fill="#4ade80" fill-opacity="0.07" stroke="#4ade80" stroke-opacity="0.2"/>
  <text x="50" y="118" fill="#4ade80" font-size="11" font-weight="700">ar_investments 소식</text>
