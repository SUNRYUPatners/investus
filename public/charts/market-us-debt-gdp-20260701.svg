<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#1a0000"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#991b1b"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#374151"/>
      <stop offset="60%" style="stop-color:#6b7280"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <filter id="redglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <circle cx="950" cy="200" r="300" fill="#ef4444" opacity="0.05"/>
  <circle cx="100" cy="800" r="250" fill="#ef4444" opacity="0.04"/>

  <!-- Header -->
  <rect x="0" y="0" width="1080" height="90" fill="#ef4444" opacity="0.1"/>
  <rect x="0" y="88" width="1080" height="2" fill="#ef4444" opacity="0.7"/>
  <text x="54" y="52" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#ef4444" letter-spacing="4">INVESTUS DAILY REPORT</text>
  <rect x="870" y="26" width="160" height="36" rx="18" fill="#ef4444" opacity="0.2"/>
  <rect x="870" y="26" width="160" height="36" rx="18" fill="none" stroke="#ef4444" stroke-width="1.5"/>
  <text x="950" y="49" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#ef4444" text-anchor="middle">2026.07.01</text>

  <!-- BREAKING badge -->
  <rect x="54" y="108" width="140" height="34" rx="6" fill="#ef4444"/>
  <text x="124" y="131" font-family="Arial,sans-serif" font-size="14" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="2">⚠ BREAKING</text>

  <!-- Title -->
  <text x="54" y="190" font-family="Arial,sans-serif" font-size="38" font-weight="900" fill="#ffffff">미국 국가부채</text>
  <text x="54" y="238" font-family="Arial,sans-serif" font-size="38" font-weight="900" fill="#ef4444">GDP 초과 달성</text>
  <text x="54" y="282" font-family="Arial,sans-serif" font-size="20" font-weight="700" fill="#fca5a5">제2차 세계대전 이후 최초</text>

  <!-- WWII badge -->
  <rect x="54" y="304" width="340" height="44" rx="10" fill="#ef4444" opacity="0.15"/>
  <rect x="54" y="304" width="340" height="44" rx="10" fill="none" stroke="#ef4444" stroke-width="1.5"/>
  <text x="224" y="332" font-family="Arial,sans-serif" font-size="15" font-weight="900" fill="#ef4444" text-anchor="middle" letter-spacing="2">FIRST TIME SINCE WWII</text>

  <!-- Gauge visual -->
  <!-- Background arc -->
  <path d="M 300 700 A 250 250 0 0 1 780 700" fill="none" stroke="#1f2937" stroke-width="50"/>
  <!-- Fill arc 100%+ (slightly past center) -->
  <path d="M 300 700 A 250 250 0 0 1 780 700" fill="none" stroke="#374151" stroke-width="50" stroke-dasharray="785 785"/>
  <!-- Red fill to 100%+ -->
  <path d="M 300 700 A 250 250 0 0 1 780 700" fill="none" stroke="url(#redGrad)" stroke-width="50" stroke-dasharray="785 0"/>
  <!-- 100% line marker -->
  <line x1="540" y1="450" x2="540" y2="550" stroke="#ffffff" stroke-width="3" stroke-dasharray="4,4"/>
  <text x="540" y="572" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">100%</text>

  <!-- Center big number -->
  <text x="540" y="660" font-family="Arial,sans-serif" font-size="90" font-weight="900" fill="#ef4444" text-anchor="middle">100%+</text>
  <text x="540" y="700" font-family="Arial,sans-serif" font-size="18" fill="#fca5a5" text-anchor="middle">부채 / GDP 비율</text>

  <!-- Historical line chart simplified -->
  <text x="540" y="760" font-family="Arial,sans-serif" font-size="12" fill="#6b7280" text-anchor="middle" letter-spacing="2">WWII 이후 부채/GDP 추이</text>
  <!-- Chart baseline -->
  <line x1="80" y1="920" x2="1000" y2="920" stroke="#374151" stroke-width="1.5"/>
  <!-- Historical line: low in 50s, gradual rise, spike now -->
  <polyline points="80,880 200,870 350,865 450,860 550,840 650,810 780,780 920,720 1000,690"
    fill="none" stroke="url(#lineGrad)" stroke-width="3"/>
  <!-- Current spike marker -->
  <circle cx="1000" cy="690" r="8" fill="#ef4444"/>
  <!-- Year labels -->
  <text x="80" y="940" font-family="Arial,sans-serif" font-size="11" fill="#6b7280">1945</text>
  <text x="350" y="940" font-family="Arial,sans-serif" font-size="11" fill="#6b7280">1970</text>
  <text x="650" y="940" font-family="Arial,sans-serif" font-size="11" fill="#6b7280">2000</text>
  <text x="940" y="940" font-family="Arial,sans-serif" font-size="11" fill="#ef4444" font-weight="700">2026</text>

  <!-- Warning notes -->
  <rect x="54" y="980" width="972" height="0" rx="0" fill="none"/>

  <!-- Footer -->
  <rect x="0" y="990" width="1080" height="90" fill="#ef4444" opacity="0.1"/>
  <rect x="0" y="990" width="1080" height="2" fill="#ef4444" opacity="0.5"/>
  <text x="540" y="1030" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#ef4444" text-anchor="middle">재정적 지속가능성 우려 고조 · 역사적 임계점 돌파</text>
  <text x="540" y="1058" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">INVESTUS · 2026.07.01 · 투자 참고용</text>
</svg>
