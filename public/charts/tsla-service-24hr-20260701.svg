<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#0f1a2e"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect width="1080" height="1080" fill="none" stroke="#1f2937" stroke-width="2"/>
  <rect x="0" y="0" width="1080" height="4" fill="url(#redGrad)"/>

  <!-- Header -->
  <text x="540" y="62" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#6b7280" text-anchor="middle" letter-spacing="3">INVESTUS DAILY REPORT</text>
  <text x="540" y="102" font-family="Arial,sans-serif" font-size="28" font-weight="900" fill="#f9fafb" text-anchor="middle">TSLA · 서비스 75% 24시간 내 해결</text>

  <rect x="396" y="118" width="288" height="34" rx="17" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="540" y="140" font-family="Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" text-anchor="middle" letter-spacing="2">2026.07.01</text>

  <!-- Donut Chart -->
  <!-- Background circle -->
  <circle cx="540" cy="330" r="160" fill="none" stroke="#1f2937" stroke-width="36"/>
  <!-- 75% arc = 270 degrees. circumference = 2*pi*160 ≈ 1005.3 -->
  <!-- 75% = 754 of 1005 -->
  <circle cx="540" cy="330" r="160" fill="none" stroke="#ef4444" stroke-width="36"
    stroke-dasharray="754 251" stroke-dashoffset="251" stroke-linecap="round"/>
  <!-- 25% remaining -->
  <circle cx="540" cy="330" r="160" fill="none" stroke="#374151" stroke-width="36"
    stroke-dasharray="251 754" stroke-dashoffset="-3" stroke-linecap="round"/>

  <!-- Center text -->
  <text x="540" y="315" font-family="Arial Black,Arial,sans-serif" font-size="80" font-weight="900" fill="#ef4444" text-anchor="middle">75%</text>
  <text x="540" y="358" font-family="Arial,sans-serif" font-size="16" fill="#9ca3af" text-anchor="middle">서비스 해결률</text>

  <text x="540" y="530" font-family="Arial,sans-serif" font-size="20" fill="#f9fafb" text-anchor="middle" font-weight="700">서비스 방문의 75%가 24시간 이내 완료</text>

  <!-- 24H Clock icon -->
  <g transform="translate(210, 570)">
    <circle cx="60" cy="60" r="55" fill="none" stroke="#60a5fa" stroke-width="3"/>
    <circle cx="60" cy="60" r="50" fill="#0f172a"/>
    <!-- Clock hands -->
    <line x1="60" y1="60" x2="60" y2="20" stroke="#60a5fa" stroke-width="3" stroke-linecap="round"/>
    <line x1="60" y1="60" x2="85" y2="72" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="60" cy="60" r="5" fill="#f9fafb"/>
    <!-- Hour marks -->
    <line x1="60" y1="12" x2="60" y2="20" stroke="#374151" stroke-width="2"/>
    <line x1="108" y1="60" x2="100" y2="60" stroke="#374151" stroke-width="2"/>
    <line x1="60" y1="108" x2="60" y2="100" stroke="#374151" stroke-width="2"/>
    <line x1="12" y1="60" x2="20" y2="60" stroke="#374151" stroke-width="2"/>
    <text x="60" y="80" font-family="Arial,sans-serif" font-size="10" fill="#60a5fa" text-anchor="middle" font-weight="700">24H</text>
  </g>

  <!-- Stats cards -->
  <rect x="380" y="570" width="320" height="130" rx="12" fill="#0f172a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="540" y="608" font-family="Arial,sans-serif" font-size="13" fill="#ef4444" text-anchor="middle" letter-spacing="1">24시간 내 해결</text>
  <text x="540" y="655" font-family="Arial Black,sans-serif" font-size="52" font-weight="900" fill="#ef4444" text-anchor="middle">75%</text>
  <text x="540" y="688" font-family="Arial,sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">Service visits resolved within 24hrs</text>

  <!-- OTA card -->
  <rect x="80" y="730" width="280" height="100" rx="12" fill="#0f172a" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="220" y="762" font-family="Arial,sans-serif" font-size="12" fill="#60a5fa" text-anchor="middle" letter-spacing="1">OTA 무선 업데이트</text>
  <text x="220" y="796" font-family="Arial Black,sans-serif" font-size="26" font-weight="900" fill="#60a5fa" text-anchor="middle">WIRELESS</text>
  <text x="220" y="820" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">서비스 방문 빈도 감소</text>

  <!-- No-brainer badge -->
  <rect x="400" y="730" width="280" height="100" rx="12" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="540" y="762" font-family="Arial,sans-serif" font-size="12" fill="#f59e0b" text-anchor="middle" letter-spacing="1">2026 첫 구매자 추천</text>
  <text x="540" y="796" font-family="Arial Black,sans-serif" font-size="22" font-weight="900" fill="#f59e0b" text-anchor="middle">NO-BRAINER</text>
  <text x="540" y="820" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">Recommended for first buyers</text>

  <!-- Quality score -->
  <rect x="720" y="730" width="280" height="100" rx="12" fill="#0f172a" stroke="#14532d" stroke-width="1.5"/>
  <text x="860" y="762" font-family="Arial,sans-serif" font-size="12" fill="#4ade80" text-anchor="middle" letter-spacing="1">고객 만족도</text>
  <text x="860" y="796" font-family="Arial Black,sans-serif" font-size="26" font-weight="900" fill="#4ade80" text-anchor="middle">TOP TIER</text>
  <text x="860" y="820" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">Service quality benchmark</text>

  <!-- Quality metrics bar -->
  <text x="160" y="872" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#6b7280" letter-spacing="2">SERVICE RESOLUTION TIME</text>
  <rect x="160" y="886" width="760" height="12" rx="6" fill="#1f2937"/>
  <rect x="160" y="886" width="570" height="12" rx="6" fill="#ef4444"/>
  <text x="740" y="898" font-family="Arial,sans-serif" font-size="11" fill="#ef4444">75%</text>

  <rect x="160" y="912" width="760" height="12" rx="6" fill="#1f2937"/>
  <rect x="160" y="912" width="190" height="12" rx="6" fill="#374151"/>
  <text x="360" y="924" font-family="Arial,sans-serif" font-size="11" fill="#6b7280">25%</text>
  <text x="370" y="924" font-family="Arial,sans-serif" font-size="11" fill="#6b7280"> &gt;24hr</text>

  <text x="540" y="975" font-family="Arial,sans-serif" font-size="13" fill="#374151" text-anchor="middle">Tesla Service 75% Within 24hr Resolution · 2026.07.01</text>

  <rect x="0" y="1060" width="1080" height="20" fill="url(#redGrad)" opacity="0.4"/>
  <text x="540" y="1073" font-family="Arial,sans-serif" font-size="10" fill="#6b7280" text-anchor="middle" letter-spacing="2">INVESTUS · TSLA RESEARCH · NOT FINANCIAL ADVICE</text>
</svg>
