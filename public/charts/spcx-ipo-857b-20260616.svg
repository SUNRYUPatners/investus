  <text x="40" y="292" font-family="Arial,sans-serif" font-size="12" fill="#64748b">Saudi Aramco 2019</text>
  <rect x="160" y="280" width="233" height="20" rx="4" fill="#475569" opacity="0.6"/>
  <text x="524" y="294" text-anchor="end" font-family="Arial,sans-serif" font-size="12" fill="#64748b">$29.4B</text>

