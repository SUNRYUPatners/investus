  <text x="600" y="36" text-anchor="end" font-family="Arial,sans-serif" font-size="12" fill="#c084fc">$179.02</text>

  <!-- Title -->
  <text x="300" y="76" text-anchor="middle" font-family="Arial,sans-serif" font-size="19" font-weight="700" fill="#f1f5f9">SpaceX IPO 총 조달</text>
  <text x="300" y="100" text-anchor="middle" font-family="Arial,sans-serif" font-size="21" font-weight="900" fill="#c084fc">$85.7 Billion 확정</text>

  <rect x="40" y="114" width="520" height="1" fill="#2a1a40" opacity="0.8"/>

  <!-- Big number -->
  <rect x="150" y="126" width="300" height="90" rx="14" fill="#c084fc" opacity="0.08"/>
  <rect x="150" y="126" width="300" height="90" rx="14" fill="none" stroke="#c084fc" stroke-width="1.5" opacity="0.4"/>
