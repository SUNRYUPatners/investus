  <text x="300" y="205" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#94a3b8">역대 최대 규모 IPO 조달 확정</text>

  <!-- Comparison bars -->
  <text x="40" y="236" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#64748b">역대 IPO 규모 비교 ($B)</text>
  <rect x="40" y="242" width="520" height="1" fill="#1e293b"/>

  <!-- SpaceX -->
  <text x="40" y="264" font-family="Arial,sans-serif" font-size="12" fill="#c084fc" font-weight="700">SpaceX 2026</text>
  <rect x="160" y="252" width="360" height="20" rx="4" fill="#c084fc" opacity="0.75"/>
  <rect x="160" y="252" width="360" height="20" rx="4" fill="none" stroke="#c084fc" stroke-width="1"/>
  <text x="524" y="266" text-anchor="end" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#c084fc">$85.7B</text>

