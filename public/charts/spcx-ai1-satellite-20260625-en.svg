  <text x="884" y="258" font-family="Arial,sans-serif" font-size="16" fill="#c084fc" font-weight="700" text-anchor="middle">Space AI Services</text>
  <text x="884" y="280" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">AI inference without ground infra</text>
  <text x="744" y="308" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">• Defense: real-time satellite intel</text>
  <text x="744" y="328" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">• Maritime: autonomous ship navigation</text>
  <text x="744" y="348" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">• Agriculture: crop yield analysis</text>
  <text x="744" y="368" font-family="Arial,sans-serif" font-size="12" fill="#c084fc">• Equal AI access globally from orbit</text>

  <rect x="24" y="426" width="1032" height="68" rx="10" fill="#1a0a24" stroke="#c084fc" stroke-width="1"/>
  <text x="540" y="454" font-family="Arial,sans-serif" font-size="15" fill="#c084fc" font-weight="700" text-anchor="middle">AI1 = 150kW Space AI Compute · Era of Orbital Data Centers Begins</text>
  <text x="540" y="476" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">70m wingspan · liquid cooling · mass deployed via Starship — space AI infra replacing ground cloud</text>

  <text x="540" y="512" font-family="Arial,sans-serif" font-size="10" fill="#4b5563" text-anchor="middle">Source: SpaceX · 2026.06.25 · Investus</text>
