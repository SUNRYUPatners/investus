  <rect x="0" y="62" width="1080" height="2" fill="#c084fc" opacity="0.7"/>
  <text x="28" y="26" font-family="Arial,sans-serif" font-size="13" fill="#c084fc" font-weight="700">SPCX · AI1 Satellite Specifications Revealed</text>
  <text x="28" y="50" font-family="Arial,sans-serif" font-size="14" fill="#e5e7eb" font-weight="700">150kW Compute · 70m Wingspan · Liquid Cooling — Space AI Data Center</text>

  <rect x="24" y="78" width="1032" height="100" rx="12" fill="#1a0a24" stroke="#c084fc" stroke-width="1.5"/>
  <text x="540" y="110" font-family="Arial,sans-serif" font-size="28" fill="#c084fc" font-weight="700" text-anchor="middle">SpaceX AI1 Satellite — World's First AI-Dedicated Satellite</text>
  <text x="540" y="155" font-family="Arial,sans-serif" font-size="16" fill="#9ca3af" text-anchor="middle">150kW onboard AI compute · 70m wingspan · Liquid cooling radiators · Replacing ground data centers</text>

  <rect x="24" y="194" width="322" height="216" rx="10" fill="#111318"/>
  <text x="185" y="222" font-family="Arial,sans-serif" font-size="14" fill="#e5e7eb" font-weight="700" text-anchor="middle">Computing Specs</text>
  <rect x="40" y="234" width="290" height="164" rx="8" fill="#1a0a24"/>
  <text x="56" y="258" font-family="Arial,sans-serif" font-size="13" fill="#c084fc" font-weight="700">AI Processing Power</text>
  <text x="56" y="280" font-family="Arial,sans-serif" font-size="28" fill="#c084fc" font-weight="700">150kW</text>
  <text x="56" y="306" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">Onboard AI computing power</text>
  <text x="56" y="326" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af">vs Starlink v4: ~1kW compute</text>
  <text x="56" y="346" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af">150x compute density increase</text>
  <text x="56" y="368" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af">GPU cluster in orbit</text>
  <text x="56" y="386" font-family="Arial,sans-serif" font-size="11" fill="#6b7280">Real-time AI inference from orbit</text>

  <rect x="362" y="194" width="334" height="216" rx="10" fill="#111318"/>
  <text x="529" y="222" font-family="Arial,sans-serif" font-size="14" fill="#e5e7eb" font-weight="700" text-anchor="middle">Physical Specs</text>
  <rect x="378" y="234" width="302" height="164" rx="8" fill="#161b22"/>
  <text x="394" y="258" font-family="Arial,sans-serif" font-size="13" fill="#c084fc" font-weight="700">Size and Cooling</text>
  <text x="394" y="280" font-family="Arial,sans-serif" font-size="28" fill="#c084fc" font-weight="700">70m</text>
  <text x="394" y="306" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">Wingspan (solar panel array)</text>
  <text x="394" y="326" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">Comparable to ISS wingspan 73m</text>
  <text x="394" y="346" font-family="Arial,sans-serif" font-size="13" fill="#c084fc" font-weight="700">Liquid cooling radiators equipped</text>
  <text x="394" y="368" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af">Required to handle 150kW heat output</text>
  <text x="394" y="386" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af">First space-application liquid cooling</text>

  <rect x="712" y="194" width="344" height="216" rx="10" fill="#111318"/>
  <text x="884" y="222" font-family="Arial,sans-serif" font-size="14" fill="#e5e7eb" font-weight="700" text-anchor="middle">Use Cases</text>
