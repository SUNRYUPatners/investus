  <text x="540" y="813" font-family="Arial,sans-serif" font-size="15" fill="#a78bfa" font-weight="700" text-anchor="middle">SpaceX first bond = funding secured to accelerate Starlink &amp; Starship</text>
  <text x="540" y="842" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">If $97B 2028 revenue target hits, SPCX indirect investors stand to benefit enormously</text>
  <text x="540" y="1062" font-family="Arial,sans-serif" font-size="10" fill="#4b5563" text-anchor="middle">Source: SpaceX Registration Rights Agreement (2026.06.20) · StockSavvyShay · Fiscal.ai · Investus 2026.06.29</text>
