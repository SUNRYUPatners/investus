  <text x="540" y="710" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">Private SpaceX enters public bond market → max institutional exposure + official financial recognition</text>
  <text x="540" y="734" font-family="Arial,sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">Investment grade from 3 agencies = Wall Street officially recognizes SpaceX as a stable mega-corporation</text>
  <text x="540" y="754" font-family="Arial,sans-serif" font-size="11" fill="#4b5563" text-anchor="middle">3.5x oversubscribed = overwhelming demand → SpaceX secured favorable terms</text>

