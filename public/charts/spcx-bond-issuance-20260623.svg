<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 490" width="800" height="490" style="background:#0d1117;font-family:'Apple SD Gothic Neo',sans-serif">
  <rect width="800" height="490" rx="12" fill="#0d1117"/>
  <text x="400" y="36" text-anchor="middle" fill="#c084fc" font-size="13" font-weight="700">SPCX · SpaceX</text>
  <text x="400" y="62" text-anchor="middle" fill="#e6edf3" font-size="20" font-weight="700">최초 채권 발행 (Inaugural Bond Issuance)</text>
  <text x="400" y="84" text-anchor="middle" fill="#7d8590" font-size="13">상장기업 전환 후 첫 공개 채권 · 브릿지론 상환 + 일반 운영자금</text>
  <line x1="40" y1="96" x2="760" y2="96" stroke="#21262d" stroke-width="1"/>

  <!-- Timeline steps -->
  <!-- Step 1 -->
  <rect x="40" y="114" width="160" height="54" rx="6" fill="#1c1026"/>
  <text x="120" y="136" text-anchor="middle" fill="#7d8590" font-size="11">1단계</text>
  <text x="120" y="156" text-anchor="middle" fill="#c084fc" font-size="12" font-weight="600">SEC 사전 통보</text>

  <line x1="200" y1="141" x2="248" y2="141" stroke="#c084fc" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="248,136 260,141 248,146" fill="#c084fc"/>

  <!-- Step 2 -->
  <rect x="260" y="114" width="160" height="54" rx="6" fill="#1c1026"/>
  <text x="340" y="136" text-anchor="middle" fill="#7d8590" font-size="11">2단계</text>
  <text x="340" y="156" text-anchor="middle" fill="#c084fc" font-size="12" font-weight="600">신용등급 획득</text>

  <line x1="420" y1="141" x2="468" y2="141" stroke="#c084fc" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="468,136 480,141 468,146" fill="#c084fc"/>

  <!-- Step 3 -->
  <rect x="480" y="114" width="160" height="54" rx="6" fill="#4b2d6b"/>
  <rect x="480" y="114" width="160" height="4" rx="2" fill="#c084fc"/>
  <text x="560" y="136" text-anchor="middle" fill="#7d8590" font-size="11">3단계 (현재)</text>
  <text x="560" y="156" text-anchor="middle" fill="#c084fc" font-size="12" font-weight="600">채권 발행 완료</text>

  <line x1="640" y1="141" x2="688" y2="141" stroke="#444c56" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="688,136 700,141 688,146" fill="#444c56"/>

  <!-- Step 4 -->
  <rect x="700" y="114" width="60" height="54" rx="6" fill="#161b22"/>
  <text x="730" y="136" text-anchor="middle" fill="#7d8590" font-size="10">4단계</text>
  <text x="730" y="156" text-anchor="middle" fill="#7d8590" font-size="10">상환</text>

  <!-- Bond details -->
  <rect x="40" y="184" width="348" height="140" rx="8" fill="#161b22"/>
  <rect x="40" y="184" width="348" height="4" rx="2" fill="#c084fc"/>
  <text x="214" y="212" text-anchor="middle" fill="#c084fc" font-size="13" font-weight="600">채권 발행 조건</text>
  <text x="60" y="236" fill="#e6edf3" font-size="12">조달 규모: 공시 미정 (수십억 달러 추정)</text>
  <text x="60" y="258" fill="#e6edf3" font-size="12">용도: 브릿지론 상환 + 일반 운영자금</text>
  <text x="60" y="280" fill="#7d8590" font-size="11">BBB+ 등급 → 기관투자자 수요 충분</text>
  <text x="60" y="300" fill="#7d8590" font-size="11">첫 발행 성공 = 향후 대규모 채권 발행 기반</text>

  <rect x="412" y="184" width="348" height="140" rx="8" fill="#161b22"/>
  <rect x="412" y="184" width="348" height="4" rx="2" fill="#c084fc"/>
  <text x="586" y="212" text-anchor="middle" fill="#c084fc" font-size="13" font-weight="600">SpaceX 자금 조달 의의</text>
  <text x="432" y="236" fill="#e6edf3" font-size="12">우주기업 최초 투자등급 채권 발행</text>
  <text x="432" y="258" fill="#e6edf3" font-size="12">IPO 이후 공개시장 첫 채권 데뷔</text>
  <text x="432" y="280" fill="#7d8590" font-size="11">주식 희석 없이 자금 조달 가능</text>
  <text x="432" y="300" fill="#7d8590" font-size="11">금리↓ + 만기 장기화로 재무 구조 개선</text>

  <!-- Bottom highlight -->
  <rect x="40" y="340" width="720" height="60" rx="8" fill="#1c1026"/>
  <text x="400" y="366" text-anchor="middle" fill="#c084fc" font-size="13" font-weight="600">공개시장 기업으로서 이정표</text>
  <text x="400" y="388" text-anchor="middle" fill="#e6edf3" font-size="12">신용등급 획득 → 채권 발행 → 기관 자금 유입 → SPCX 유동성 확대</text>

  <line x1="40" y1="414" x2="760" y2="414" stroke="#21262d" stroke-width="1"/>
  <text x="400" y="430" text-anchor="middle" fill="#444c56" font-size="10">출처: SpaceX SEC 공시 / X Finance · investus.kr</text>

  <rect x="40" y="442" width="720" height="34" rx="6" fill="#161b22"/>
  <text x="400" y="464" text-anchor="middle" fill="#7d8590" font-size="11">채권 발행 = SpaceX 전통 금융시장 정식 편입 · 기관 투자자 접근성 완성</text>
</svg>
