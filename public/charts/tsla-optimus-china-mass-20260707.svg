  <text x="540" y="542" font-family="Arial, sans-serif" font-size="13" fill="#d1d5db" text-anchor="middle">비용 절감</text>
  <text x="540" y="564" font-family="Arial Black, Arial" font-weight="900" font-size="26" fill="#4ade80" text-anchor="middle">직접 공급</text>
  <text x="540" y="596" font-family="Arial, sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">Asia Direct Supply</text>

