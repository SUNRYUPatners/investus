<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="800" height="440" style="background:#0d1117;font-family:'SF Pro Display',Arial,sans-serif">
  <rect width="800" height="440" rx="12" fill="#0d1117"/>
  <text x="400" y="36" text-anchor="middle" fill="#00e5a0" font-size="13" font-weight="700">TSLA · Tesla FSD + Grok</text>
  <text x="400" y="62" text-anchor="middle" fill="#e6edf3" font-size="20" font-weight="700">Grok + FSD Natural Language Control — Coming in 3 Months</text>
  <text x="400" y="84" text-anchor="middle" fill="#7d8590" font-size="13">"World's most advanced AI driver" · Voice-controlled FSD</text>
  <line x1="40" y1="96" x2="760" y2="96" stroke="#21262d" stroke-width="1"/>

  <rect x="40" y="110" width="330" height="110" rx="8" fill="#161b22"/>
  <text x="205" y="140" text-anchor="middle" fill="#c084fc" font-size="18" font-weight="700">Grok AI</text>
  <text x="205" y="162" text-anchor="middle" fill="#7d8590" font-size="12">xAI conversational AI engine</text>
  <text x="205" y="184" text-anchor="middle" fill="#e6edf3" font-size="13">Natural language understanding</text>
  <text x="205" y="204" text-anchor="middle" fill="#7d8590" font-size="11">Real-time context processing</text>

  <text x="400" y="175" text-anchor="middle" fill="#00e5a0" font-size="32" font-weight="800">+</text>

  <rect x="430" y="110" width="330" height="110" rx="8" fill="#161b22"/>
  <text x="595" y="140" text-anchor="middle" fill="#00e5a0" font-size="18" font-weight="700">FSD v14+</text>
  <text x="595" y="162" text-anchor="middle" fill="#7d8590" font-size="12">Tesla Full Self-Driving</text>
  <text x="595" y="184" text-anchor="middle" fill="#e6edf3" font-size="13">Vision-based driving AI</text>
  <text x="595" y="204" text-anchor="middle" fill="#7d8590" font-size="11">Global road data training</text>

  <polygon points="400,228 390,244 410,244" fill="#00e5a0"/>
  <line x1="400" y1="220" x2="400" y2="244" stroke="#00e5a0" stroke-width="2"/>

  <rect x="180" y="252" width="440" height="60" rx="8" fill="#0d2010" stroke="#00e5a0" stroke-width="1.5"/>
  <text x="400" y="278" text-anchor="middle" fill="#00e5a0" font-size="16" font-weight="700">World's Most Advanced AI Driver</text>
  <text x="400" y="300" text-anchor="middle" fill="#7d8590" font-size="12">Voice commands for destination, route &amp; parking</text>

  <rect x="40" y="328" width="720" height="80" rx="8" fill="#1c1f26"/>
  <text x="400" y="352" text-anchor="middle" fill="#00e5a0" font-size="13" font-weight="600">Natural Language Command Examples</text>
  <text x="130" y="374" text-anchor="middle" fill="#e6edf3" font-size="13">"Turn right up ahead"</text>
  <text x="400" y="374" text-anchor="middle" fill="#e6edf3" font-size="13">"Drop us off at entrance"</text>
  <text x="670" y="374" text-anchor="middle" fill="#e6edf3" font-size="13">"Park further away"</text>
  <text x="400" y="396" text-anchor="middle" fill="#7d8590" font-size="11">Grok parses NL → FSD executes · ~3 months away (Elon Polyz, Mario Nawfal)</text>

  <line x1="40" y1="420" x2="760" y2="420" stroke="#21262d" stroke-width="1"/>
  <text x="400" y="434" text-anchor="middle" fill="#444c56" font-size="10">Source: Elon Polyz / Mario Nawfal · investus.kr</text>
