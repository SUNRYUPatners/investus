<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520">
  <defs>
    <linearGradient id="bgbg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#080d1a"/><stop offset="100%" stop-color="#0a120f"/></linearGradient>
    <linearGradient id="ggold" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#b45309"/><stop offset="100%" stop-color="#fbbf24"/></linearGradient>
  </defs>

  <rect width="800" height="520" fill="url(#bgbg)"/>

  <!-- Header -->
  <rect width="800" height="58" fill="rgba(251,191,36,0.07)"/>
  <rect x="0" y="57" width="800" height="1" fill="rgba(251,191,36,0.25)"/>
  <text x="400" y="22" text-anchor="middle" fill="#fbbf24" font-size="10" font-family="Arial" font-weight="bold" letter-spacing="4">Investus.kr · 장기 투자 철학</text>
  <text x="400" y="44" text-anchor="middle" fill="#e2e8f0" font-size="18" font-family="Arial" font-weight="bold">Warren Buffett + Google 6대 플랫폼 · S&amp;P 500</text>

  <!-- Buffett quote card -->
  <rect x="20" y="75" width="760" height="90" rx="12" fill="rgba(251,191,36,0.06)" stroke="rgba(251,191,36,0.2)" stroke-width="1"/>
  <rect x="20" y="75" width="4" height="90" rx="2" fill="url(#ggold)"/>

  <text x="50" y="105" fill="#fbbf24" font-size="32" font-family="Arial">"</text>
  <text x="80" y="110" fill="#e2e8f0" font-size="16" font-family="Arial" font-weight="bold">나는 시간이 지나면 내가 이길 것이라는 걸 안다</text>
  <text x="80" y="132" fill="#94a3b8" font-size="13" font-family="Arial">— Warren Buffett · 60년 투자 레전드</text>
  <text x="720" y="148" fill="#fbbf24" font-size="32" font-family="Arial">"</text>

  <!-- Google 6 products section -->
  <rect x="20" y="185" width="480" height="290" rx="12" fill="rgba(96,165,250,0.04)" stroke="rgba(96,165,250,0.15)" stroke-width="1"/>
  <text x="40" y="213" fill="#60a5fa" font-size="13" font-family="Arial" font-weight="bold">■ Google — 3B+ 사용자 제품 6개</text>
  <text x="40" y="229" fill="#64748b" font-size="10" font-family="Arial">Sundar Pichai CEO 발표 · 역대 최다 플랫폼</text>
  <rect x="40" y="235" width="440" height="1" fill="rgba(96,165,250,0.15)"/>

  <!-- 6 products -->
  <rect x="40" y="248" width="420" height="30" rx="6" fill="rgba(96,165,250,0.08)"/>
  <text x="60" y="268" fill="#60a5fa" font-size="12" font-family="Arial" font-weight="bold">📧 Gmail</text>
  <text x="160" y="268" fill="#94a3b8" font-size="11" font-family="Arial">3B+ 사용자 · 무료 이메일 세계 1위</text>

  <rect x="40" y="282" width="420" height="30" rx="6" fill="rgba(96,165,250,0.06)"/>
  <text x="60" y="302" fill="#60a5fa" font-size="12" font-family="Arial" font-weight="bold">🔍 Search</text>
  <text x="160" y="302" fill="#94a3b8" font-size="11" font-family="Arial">3B+ 사용자 · 검색 시장 92% 점유</text>

  <rect x="40" y="316" width="420" height="30" rx="6" fill="rgba(96,165,250,0.08)"/>
  <text x="60" y="336" fill="#60a5fa" font-size="12" font-family="Arial" font-weight="bold">🗺️ Maps</text>
  <text x="160" y="336" fill="#94a3b8" font-size="11" font-family="Arial">3B+ 사용자 · 내비게이션 세계 표준</text>

  <rect x="40" y="350" width="420" height="30" rx="6" fill="rgba(96,165,250,0.06)"/>
  <text x="60" y="370" fill="#60a5fa" font-size="12" font-family="Arial" font-weight="bold">📱 Android</text>
  <text x="160" y="370" fill="#94a3b8" font-size="11" font-family="Arial">3B+ 사용자 · 모바일 OS 72% 점유</text>

  <rect x="40" y="384" width="420" height="30" rx="6" fill="rgba(96,165,250,0.08)"/>
  <text x="60" y="404" fill="#60a5fa" font-size="12" font-family="Arial" font-weight="bold">🌐 Chrome</text>
  <text x="160" y="404" fill="#94a3b8" font-size="11" font-family="Arial">3B+ 사용자 · 웹 브라우저 세계 1위</text>

  <rect x="40" y="418" width="420" height="30" rx="6" fill="rgba(96,165,250,0.06)"/>
  <text x="60" y="438" fill="#60a5fa" font-size="12" font-family="Arial" font-weight="bold">▶️ YouTube</text>
  <text x="160" y="438" fill="#94a3b8" font-size="11" font-family="Arial">3B+ 사용자 · 동영상 플랫폼 독보적 1위</text>

  <text x="40" y="468" fill="#fbbf24" font-size="11" font-family="Arial" font-weight="bold">→ 역대 6개 제품 동시 3B+ 달성 기업: 전무 · 광고 → AI → 구독 전환</text>

  <!-- S&P 500 performance section -->
  <rect x="520" y="185" width="260" height="290" rx="12" fill="rgba(0,229,160,0.04)" stroke="rgba(0,229,160,0.15)" stroke-width="1"/>
  <text x="540" y="213" fill="#00e5a0" font-size="12" font-family="Arial" font-weight="bold">S&amp;P 500 연간 수익률</text>
  <rect x="540" y="220" width="220" height="1" fill="rgba(0,229,160,0.15)"/>

  <!-- S&P 500 years -->
  <text x="540" y="242" fill="#64748b" font-size="10" font-family="Arial">2008</text>
  <rect x="570" y="232" width="40" height="14" rx="3" fill="rgba(248,113,113,0.4)"/>
  <text x="618" y="244" fill="#f87171" font-size="10" font-family="Arial">-38.5%</text>

  <text x="540" y="263" fill="#64748b" font-size="10" font-family="Arial">2009</text>
  <rect x="570" y="253" width="80" height="14" rx="3" fill="rgba(0,229,160,0.4)"/>
  <text x="658" y="265" fill="#00e5a0" font-size="10" font-family="Arial">+26.5%</text>

  <text x="540" y="284" fill="#64748b" font-size="10" font-family="Arial">2017</text>
  <rect x="570" y="274" width="60" height="14" rx="3" fill="rgba(0,229,160,0.4)"/>
  <text x="638" y="286" fill="#00e5a0" font-size="10" font-family="Arial">+21.8%</text>

  <text x="540" y="305" fill="#64748b" font-size="10" font-family="Arial">2020</text>
  <rect x="570" y="295" width="52" height="14" rx="3" fill="rgba(0,229,160,0.4)"/>
  <text x="630" y="307" fill="#00e5a0" font-size="10" font-family="Arial">+18.4%</text>

  <text x="540" y="326" fill="#64748b" font-size="10" font-family="Arial">2022</text>
  <rect x="570" y="316" width="55" height="14" rx="3" fill="rgba(248,113,113,0.4)"/>
  <text x="633" y="328" fill="#f87171" font-size="10" font-family="Arial">-18.1%</text>

  <text x="540" y="347" fill="#64748b" font-size="10" font-family="Arial">2023</text>
  <rect x="570" y="337" width="80" height="14" rx="3" fill="rgba(0,229,160,0.5)"/>
  <text x="658" y="349" fill="#00e5a0" font-size="10" font-family="Arial">+26.3%</text>

  <text x="540" y="368" fill="#64748b" font-size="10" font-family="Arial">2024</text>
  <rect x="570" y="358" width="86" height="14" rx="3" fill="rgba(0,229,160,0.5)"/>
  <text x="664" y="370" fill="#00e5a0" font-size="10" font-family="Arial">+23.3%</text>

  <rect x="540" y="385" width="220" height="1" fill="rgba(0,229,160,0.15)"/>
  <text x="540" y="408" fill="#e2e8f0" font-size="11" font-family="Arial" font-weight="bold">10년 연평균(CAGR)</text>
  <text x="700" y="408" fill="#00e5a0" font-size="14" font-family="Arial" font-weight="bold">+10.7%</text>
  <text x="540" y="430" fill="#94a3b8" font-size="10" font-family="Arial">$10K → $27.7K (10년 보유 시)</text>
  <text x="540" y="450" fill="#fbbf24" font-size="11" font-family="Arial" font-weight="bold">버핏: "인내심 = 복리"</text>
  <text x="540" y="468" fill="#64748b" font-size="10" font-family="Arial">하락장에도 보유 → 결국 승리</text>

  <!-- Footer -->
  <rect x="0" y="496" width="800" height="24" fill="rgba(0,0,0,0.3)"/>
  <text x="400" y="512" text-anchor="middle" fill="#475569" font-size="9" font-family="Arial" letter-spacing="2">Investus.kr · 본 자료는 투자 참고용이며 투자 결정의 책임은 본인에게 있습니다</text>
</svg>
