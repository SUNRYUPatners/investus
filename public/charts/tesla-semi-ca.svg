<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0a0f1e"/><stop offset="100%" stop-color="#0f1a2e"/></linearGradient>
    <linearGradient id="red" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#cc0000"/><stop offset="100%" stop-color="#e31f1f"/></linearGradient>
    <linearGradient id="grn" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#00b580"/><stop offset="100%" stop-color="#00e5a0"/></linearGradient>
    <linearGradient id="blu" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#1d4ed8"/><stop offset="100%" stop-color="#60a5fa"/></linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <text x="400" y="35" text-anchor="middle" fill="#e31f1f" font-size="12" font-family="Arial" font-weight="bold" letter-spacing="3">TESLA SEMI · 캘리포니아 $10억 보조금</text>
  <text x="400" y="60" text-anchor="middle" fill="#e2e8f0" font-size="20" font-family="Arial" font-weight="bold">마일당 비용 비교 — 디젤 vs 전기 세미</text>
  <!-- Bar chart: cost per mile -->
  <!-- Diesel -->
  <text x="175" y="92" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Arial">디젤 세미 트럭</text>
  <rect x="90" y="100" width="170" height="220" rx="8" fill="url(#red)"/>
  <text x="175" y="185" text-anchor="middle" fill="white" font-size="32" font-family="Arial" font-weight="bold">$0.256</text>
  <text x="175" y="210" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="13" font-family="Arial">/마일</text>
  <text x="175" y="340" text-anchor="middle" fill="#ef4444" font-size="12" font-family="Arial" font-weight="bold">유지비 고비용</text>
  <!-- Tesla Semi -->
  <text x="400" y="92" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Arial">Tesla Semi (기본)</text>
  <rect x="315" y="160" width="170" height="160" rx="8" fill="url(#grn)"/>
  <text x="400" y="222" text-anchor="middle" fill="white" font-size="32" font-family="Arial" font-weight="bold">$0.059</text>
  <text x="400" y="247" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="13" font-family="Arial">/마일</text>
  <text x="400" y="340" text-anchor="middle" fill="#00e5a0" font-size="12" font-family="Arial" font-weight="bold">77% 절감</text>
  <!-- Tesla Semi + Subsidy -->
  <text x="625" y="92" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Arial">Tesla Semi + CA 보조금</text>
  <rect x="540" y="200" width="170" height="120" rx="8" fill="url(#blu)"/>
  <text x="625" y="252" text-anchor="middle" fill="white" font-size="32" font-family="Arial" font-weight="bold">$0.042</text>
  <text x="625" y="275" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="13" font-family="Arial">/마일</text>
  <text x="625" y="340" text-anchor="middle" fill="#60a5fa" font-size="12" font-family="Arial" font-weight="bold">84% 절감</text>
  <!-- baseline -->
  <line x1="70" y1="320" x2="730" y2="320" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <!-- Info boxes -->
  <rect x="90" y="358" width="620" height="60" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="400" y="378" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Arial" font-weight="bold">캘리포니아 $10억 보조금 프로그램 (2026.06.30 시작)</text>
  <text x="200" y="400" text-anchor="middle" fill="#60a5fa" font-size="11" font-family="Arial">대당 $250~$1,000 지원</text>
  <text x="400" y="400" text-anchor="middle" fill="#60a5fa" font-size="11" font-family="Arial">3대 이상 구매 기업 대상</text>
  <text x="610" y="400" text-anchor="middle" fill="#60a5fa" font-size="11" font-family="Arial">US 보조금 추가 혜택 포함</text>
  <text x="400" y="435" text-anchor="middle" fill="#334155" font-size="10" font-family="Arial">SUNRYU Partners CIO · 2026.05.15</text>
</svg>
