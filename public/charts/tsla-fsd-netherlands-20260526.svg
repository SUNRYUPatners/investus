  <rect x="30" y="240" width="740" height="80" rx="8" fill="#060b18" stroke="#fb923c" stroke-width="1" stroke-opacity="0.5"/>
  <text x="50" y="264" font-family="Arial,sans-serif" font-size="11" fill="#fb923c" font-weight="700">■ 사건 개요</text>
  <text x="50" y="284" font-family="Arial,sans-serif" font-size="11" fill="white">네덜란드 유명 유튜버 Franz Knol이 FSD Supervised를 첫 체험 — 실도로에서 충돌 위기를 FSD가 직접 회피</text>
  <text x="50" y="300" font-family="Arial,sans-serif" font-size="10" fill="#6b7280">미국·중국 외 지역에서 FSD Supervised가 실도로 테스트된 최초 공식 사례 · EU 전역 확산의 시발점</text>
  <text x="50" y="314" font-family="Arial,sans-serif" font-size="10" fill="#6b7280">벨기에 FSD v12.6.4.2 공식 승인(이전 리포트) → 네덜란드 실도로 테스트 → 유럽 순차 확장 예상</text>

