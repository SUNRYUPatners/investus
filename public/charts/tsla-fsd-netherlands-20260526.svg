  <rect x="30" y="334" width="354" height="64" rx="6" fill="#0a0f1e" stroke="#1e2330" stroke-width="1"/>
  <text x="50" y="356" font-family="Arial,sans-serif" font-size="10" fill="#6b7280">다음 단계</text>
  <text x="50" y="374" font-family="Arial,sans-serif" font-size="12" fill="white" font-weight="700">독일 · 프랑스 · 이탈리아 순차 확장</text>
  <text x="50" y="390" font-family="Arial,sans-serif" font-size="10" fill="#6b7280">EU 승인 도미노 → Cybercab 유럽 수익화 기반</text>

  <rect x="398" y="334" width="372" height="64" rx="6" fill="#0a0f1e" stroke="#1e2330" stroke-width="1"/>
  <text x="418" y="356" font-family="Arial,sans-serif" font-size="10" fill="#6b7280">투자 시사점</text>
  <text x="418" y="374" font-family="Arial,sans-serif" font-size="12" fill="#00e5a0" font-weight="700">FSD 유럽 구독 수익화 가시화</text>
  <text x="418" y="390" font-family="Arial,sans-serif" font-size="10" fill="#6b7280">EU 80만+ 테슬라 차량 → FSD 전환 잠재 수익</text>

