  <text x="140" y="176" font-family="Arial,sans-serif" font-size="10" fill="#9ca3af" text-anchor="middle">FSD 상용화 중</text>
  <text x="140" y="192" font-family="Arial,sans-serif" font-size="9" fill="#00e5a0" text-anchor="middle">✓ Active</text>
  <text x="140" y="212" font-family="Arial,sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">1번째 시장</text>

  <!-- China label -->
  <rect x="270" y="90" width="220" height="130" rx="8" fill="#071208" stroke="#00e5a0" stroke-width="1.5"/>
