  <text x="380" y="158" font-family="Arial,sans-serif" font-size="13" fill="#00e5a0" font-weight="700" text-anchor="middle">중국</text>
  <text x="380" y="176" font-family="Arial,sans-serif" font-size="10" fill="#9ca3af" text-anchor="middle">특스拉보조주행 명칭</text>
  <text x="380" y="192" font-family="Arial,sans-serif" font-size="9" fill="#00e5a0" text-anchor="middle">✓ Active</text>
