  <rect x="510" y="90" width="260" height="130" rx="8" fill="#001208" stroke="#fb923c" stroke-width="2"/>
  <rect x="510" y="90" width="260" height="30" rx="8" fill="#fb923c" fill-opacity="0.15"/>
  <text x="640" y="108" font-family="Arial,sans-serif" font-size="10" fill="#fb923c" font-weight="700" text-anchor="middle">🆕 신규</text>
