<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" style="background:#0a0c10;font-family:'Helvetica Neue',Arial,sans-serif">
  <rect width="800" height="440" fill="#0a0c10"/>
  <defs>
    <linearGradient id="mintGr" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#059669"/><stop offset="100%" stop-color="#00e5a0"/>
    </linearGradient>
    <linearGradient id="barMint" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00e5a0"/><stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <rect x="30" y="24" width="10" height="40" rx="3" fill="url(#mintGr)"/>
  <text x="50" y="40" fill="#00e5a0" font-size="11" font-weight="700" letter-spacing="2">TESLA · OPTIMUS</text>
  <text x="50" y="60" fill="white" font-size="18" font-weight="800">Optimus 대규모 채용 — 로봇공학 36개 + 172개 포지션 동시 오픈</text>
  <text x="750" y="44" fill="#00e5a0" font-size="11" text-anchor="end">2026.06.08</text>
  <line x1="30" y1="80" x2="770" y2="80" stroke="#ffffff" stroke-opacity="0.06"/>

  <!-- Total count big number -->
  <rect x="30" y="92" width="740" height="78" rx="12" fill="#00e5a0" fill-opacity="0.07" stroke="#00e5a0" stroke-opacity="0.2"/>
  <text x="400" y="145" fill="white" font-size="52" font-weight="900" text-anchor="middle">208개<tspan fill="#00e5a0" font-size="20" font-weight="700"> 채용 포지션</tspan></text>
  <text x="400" y="164" fill="rgba(255,255,255,0.4)" font-size="11" text-anchor="middle">동시 오픈 — "생산 준비 중인 기업의 채용 패턴"</text>

  <!-- Two bars -->
  <text x="30" y="202" fill="rgba(255,255,255,0.4)" font-size="11" font-weight="700" letter-spacing="1">포지션 구분</text>

  <!-- Robotics bar -->
  <rect x="30" y="212" width="360" height="110" rx="12" fill="#00e5a0" fill-opacity="0.06" stroke="#00e5a0" stroke-opacity="0.2"/>
  <text x="50" y="238" fill="#00e5a0" font-size="12" font-weight="800">🤖 Robotics</text>
  <text x="50" y="290" fill="white" font-size="52" font-weight="900">36</text>
  <text x="50" y="314" fill="rgba(255,255,255,0.4)" font-size="11">로봇공학 포지션</text>

  <!-- Optimus bar -->
  <rect x="410" y="212" width="360" height="110" rx="12" fill="#00e5a0" fill-opacity="0.1" stroke="#00e5a0" stroke-opacity="0.35"/>
  <text x="430" y="238" fill="#00e5a0" font-size="12" font-weight="800">⚙️ Optimus-related</text>
  <text x="430" y="290" fill="white" font-size="52" font-weight="900">172</text>
  <text x="430" y="314" fill="rgba(255,255,255,0.4)" font-size="11">엔지니어링·제조·운영 포지션</text>

  <!-- Hartberg quote -->
  <rect x="30" y="340" width="740" height="54" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.07)"/>
  <text x="50" y="362" fill="rgba(255,255,255,0.5)" font-size="13" font-style="italic">"</text>
  <text x="62" y="362" fill="rgba(255,255,255,0.8)" font-size="12">These aren't the hiring plans of a company losing faith in its operations.</text>
  <text x="62" y="382" fill="rgba(255,255,255,0.8)" font-size="12">They ARE the hiring plans of a company preparing to <tspan fill="#00e5a0" font-weight="800">manufacture.</tspan></text>

  <text x="400" y="430" fill="rgba(255,255,255,0.2)" font-size="10" text-anchor="middle">Hartberg (X) · Investus · investus.kr</text>
</svg>
