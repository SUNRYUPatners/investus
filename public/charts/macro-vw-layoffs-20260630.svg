  <text x="580" y="454" font-family="Arial,sans-serif" font-size="15" fill="#4ade80">✓</text>
  <text x="606" y="454" font-family="Arial,sans-serif" font-size="13" fill="#e5e7eb">TSLA 경쟁 우위 더욱 확대</text>
