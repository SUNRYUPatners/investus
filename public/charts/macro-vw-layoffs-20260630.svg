  <text x="55" y="744" font-family="Arial,sans-serif" font-size="14" fill="#e5e7eb">VW의 선택: 100K 해고 + AV 포기 = 생존을 위한 원가 절감으로 후퇴 — 성장이 아닌 수축</text>
  <text x="55" y="762" font-family="Arial,sans-serif" font-size="12" fill="#ef4444">LEGACY AUTO COLLAPSE ↓</text>

