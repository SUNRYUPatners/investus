  <text x="606" y="484" font-family="Arial,sans-serif" font-size="13" fill="#e5e7eb">유럽 AV 시장 진입 선점 — VW 탈락</text>
  <text x="580" y="514" font-family="Arial,sans-serif" font-size="15" fill="#ef4444">⚠</text>
  <text x="606" y="514" font-family="Arial,sans-serif" font-size="13" fill="#e5e7eb">독일 10만 실직 → 유럽 소비 위축 우려</text>
  <text x="580" y="544" font-family="Arial,sans-serif" font-size="15" fill="#ef4444">⚠</text>
  <text x="606" y="544" font-family="Arial,sans-serif" font-size="13" fill="#e5e7eb">전통 완성차 공급망 붕괴 도미노 가능성</text>
