<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#130a1f"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <!-- Header -->
  <rect width="1080" height="80" fill="#111318"/>
  <text x="540" y="30" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">SPCX · Starship 연료 자급자족 전략</text>
  <text x="540" y="62" font-family="Arial,sans-serif" font-size="26" font-weight="bold" fill="#e5e7eb" text-anchor="middle">SpaceX 천연가스 파이프라인 자체 건설</text>
  <!-- Accent line -->
  <rect y="80" width="1080" height="3" fill="#c084fc"/>
  <!-- Hero: Pipeline flow diagram -->
  <text x="540" y="145" font-family="Arial,sans-serif" font-size="22" fill="#9ca3af" text-anchor="middle">Starship 연료 자급 인프라 구축</text>
  <!-- Gas field icon -->
  <g transform="translate(60, 200)">
    <rect x="0" y="60" width="120" height="80" rx="8" fill="#1a1525" stroke="#c084fc" stroke-width="2"/>
    <!-- Flame/gas -->
    <ellipse cx="30" cy="55" rx="12" ry="20" fill="#f59e0b" opacity="0.7"/>
    <ellipse cx="60" cy="45" rx="14" ry="25" fill="#f97316" opacity="0.8"/>
    <ellipse cx="90" cy="50" rx="12" ry="22" fill="#f59e0b" opacity="0.7"/>
    <text x="60" y="110" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#c084fc" text-anchor="middle">가스전</text>
    <text x="60" y="128" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">천연가스</text>
  </g>
  <!-- Pipeline (horizontal tube) -->
  <rect x="200" y="280" width="200" height="30" rx="12" fill="#4b5563" stroke="#c084fc" stroke-width="2"/>
  <rect x="220" y="287" width="160" height="16" rx="6" fill="#c084fc" opacity="0.3"/>
  <!-- Arrow in pipe -->
  <text x="300" y="300" font-family="Arial,sans-serif" font-size="16" fill="#c084fc" text-anchor="middle">→→→</text>
  <!-- Fuel tank icon -->
  <g transform="translate(410, 220)">
    <rect x="0" y="50" width="100" height="120" rx="8" fill="#1a1525" stroke="#c084fc" stroke-width="2"/>
    <ellipse cx="50" cy="50" rx="50" ry="16" fill="#1a1525" stroke="#c084fc" stroke-width="2"/>
    <ellipse cx="50" cy="170" rx="50" ry="16" fill="#1a1525" stroke="#c084fc" stroke-width="2"/>
    <!-- Fill level -->
    <rect x="4" y="90" width="92" height="76" rx="4" fill="#c084fc" opacity="0.25"/>
    <text x="50" y="130" font-family="Arial,sans-serif" font-size="13" fill="#c084fc" font-weight="bold" text-anchor="middle">연료</text>
    <text x="50" y="148" font-family="Arial,sans-serif" font-size="12" fill="#c084fc" text-anchor="middle">탱크</text>
    <text x="50" y="200" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">CH4 + LOX</text>
  </g>
  <!-- Arrow to rocket -->
  <rect x="532" y="280" width="120" height="30" rx="12" fill="#4b5563" stroke="#c084fc" stroke-width="2"/>
  <text x="592" y="300" font-family="Arial,sans-serif" font-size="16" fill="#c084fc" text-anchor="middle">→→→</text>
  <!-- Starship rocket icon -->
  <g transform="translate(680, 170)">
    <!-- Main rocket body -->
    <ellipse cx="55" cy="130" rx="40" ry="90" fill="#1a1525" stroke="#c084fc" stroke-width="2"/>
    <!-- Nose cone -->
    <path d="M15,90 Q55,20 95,90" fill="#c084fc" opacity="0.6"/>
    <!-- Fins -->
    <polygon points="15,190 -10,230 15,215" fill="#c084fc" opacity="0.5"/>
    <polygon points="95,190 120,230 95,215" fill="#c084fc" opacity="0.5"/>
    <!-- Engine glow -->
    <ellipse cx="55" cy="225" rx="30" ry="12" fill="#f97316" opacity="0.8"/>
    <ellipse cx="55" cy="235" rx="20" ry="20" fill="#fbbf24" opacity="0.5"/>
    <text x="55" y="135" font-family="Arial,sans-serif" font-size="13" fill="#c084fc" text-anchor="middle" font-weight="bold">Starship</text>
  </g>
  <!-- Labels under diagram -->
  <text x="120" y="440" font-family="Arial,sans-serif" font-size="14" fill="#f59e0b" font-weight="bold" text-anchor="middle">① 가스전</text>
  <text x="300" y="440" font-family="Arial,sans-serif" font-size="14" fill="#c084fc" font-weight="bold" text-anchor="middle">② 파이프라인</text>
  <text x="460" y="440" font-family="Arial,sans-serif" font-size="14" fill="#c084fc" font-weight="bold" text-anchor="middle">③ 연료 탱크</text>
  <text x="630" y="440" font-family="Arial,sans-serif" font-size="14" fill="#c084fc" font-weight="bold" text-anchor="middle">→ 공급</text>
  <text x="760" y="440" font-family="Arial,sans-serif" font-size="14" fill="#c084fc" font-weight="bold" text-anchor="middle">④ 🚀 발사!</text>
  <!-- Next month badge -->
  <rect x="300" y="465" width="480" height="55" rx="27" fill="#c084fc" opacity="0.15" stroke="#c084fc" stroke-width="1.5"/>
  <text x="540" y="498" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#c084fc" text-anchor="middle">건설 착공: 다음 달 시작 예정</text>
  <!-- Benefits Cards -->
  <text x="540" y="560" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#e5e7eb" text-anchor="middle">파이프라인 구축 효과</text>
  <rect x="40" y="580" width="305" height="140" rx="12" fill="#1a1525" stroke="#c084fc" stroke-width="1.5"/>
  <circle cx="100" cy="635" r="30" fill="#c084fc" opacity="0.15"/>
  <text x="100" y="643" font-family="Arial,sans-serif" font-size="30" fill="#c084fc" text-anchor="middle">🏭</text>
  <text x="220" y="623" font-family="Arial,sans-serif" font-size="17" font-weight="bold" fill="#c084fc" text-anchor="middle">자급자족</text>
  <text x="220" y="648" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">외부 공급 의존 탈피</text>
  <text x="220" y="668" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">연료 안정적 확보</text>
  <text x="220" y="700" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="#4ade80" text-anchor="middle">독립 ↑</text>
  <rect x="388" y="580" width="305" height="140" rx="12" fill="#1a1525" stroke="#c084fc" stroke-width="1.5"/>
  <circle cx="448" cy="635" r="30" fill="#c084fc" opacity="0.15"/>
  <text x="448" y="643" font-family="Arial,sans-serif" font-size="30" fill="#f59e0b" text-anchor="middle">$</text>
  <text x="570" y="623" font-family="Arial,sans-serif" font-size="17" font-weight="bold" fill="#c084fc" text-anchor="middle">비용 절감</text>
  <text x="570" y="648" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">연료 단가 대폭 인하</text>
  <text x="570" y="668" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">발사 원가 절감</text>
  <text x="570" y="700" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="#4ade80" text-anchor="middle">절감 ↑</text>
  <rect x="736" y="580" width="305" height="140" rx="12" fill="#1a1525" stroke="#c084fc" stroke-width="1.5"/>
  <circle cx="796" cy="635" r="30" fill="#c084fc" opacity="0.15"/>
  <text x="796" y="643" font-family="Arial,sans-serif" font-size="28" fill="#c084fc" text-anchor="middle">🚀</text>
  <text x="920" y="623" font-family="Arial,sans-serif" font-size="17" font-weight="bold" fill="#c084fc" text-anchor="middle">발사 속도</text>
  <text x="920" y="648" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">연료 조달 시간 단축</text>
  <text x="920" y="668" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">발사 빈도 증가</text>
  <text x="920" y="700" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="#4ade80" text-anchor="middle">향상 ↑</text>
  <!-- Stats row -->
  <rect x="40" y="748" width="305" height="100" rx="10" fill="#161b22" stroke="#c084fc" stroke-width="1"/>
  <text x="192" y="783" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">착공 시기</text>
  <text x="192" y="832" font-family="Arial,sans-serif" font-size="32" font-weight="bold" fill="#c084fc" text-anchor="middle">다음 달</text>
  <rect x="388" y="748" width="305" height="100" rx="10" fill="#161b22" stroke="#c084fc" stroke-width="1"/>
  <text x="540" y="783" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">연료 종류</text>
  <text x="540" y="825" font-family="Arial,sans-serif" font-size="28" font-weight="bold" fill="#f59e0b" text-anchor="middle">천연가스</text>
  <text x="540" y="845" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">CH4 (메탄) — Starship 연료</text>
  <rect x="736" y="748" width="305" height="100" rx="10" fill="#161b22" stroke="#c084fc" stroke-width="1"/>
  <text x="888" y="783" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">전략적 의미</text>
  <text x="888" y="825" font-family="Arial,sans-serif" font-size="28" font-weight="bold" fill="#4ade80" text-anchor="middle">자급 체계</text>
  <text x="888" y="845" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">연료 공급망 독립</text>
  <!-- Footer -->
  <rect y="878" width="1080" height="80" fill="#111318"/>
  <rect y="878" width="1080" height="2" fill="#c084fc"/>
  <text x="540" y="918" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#e5e7eb" text-anchor="middle">천연가스 파이프라인 자체 건설 — Starship 발사 비용 혁신적 절감</text>
  <text x="540" y="944" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">INVESTUS · 2026.06.26 · 투자 참고용</text>
  <rect y="980" width="1080" height="100" fill="#0d1117"/>
  <text x="540" y="1022" font-family="Arial,sans-serif" font-size="14" fill="#9ca3af" text-anchor="middle">SPCX 수직 통합 전략 강화 — 연료부터 발사까지 완전 내재화</text>
  <text x="540" y="1050" font-family="Arial,sans-serif" font-size="13" fill="#c084fc" text-anchor="middle">발사 원가 절감 → 경쟁력 격차 확대 → 시장 지배력 강화</text>
</svg>