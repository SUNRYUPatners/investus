  <path d="M 240,730 Q 400,695 560,720" fill="#0f172a" stroke="#4b5563" stroke-width="2" opacity="0.8"/>
  <path d="M 560,720 Q 720,695 840,730" fill="#0f172a" stroke="#4b5563" stroke-width="2" opacity="0.8"/>
  <!-- Body -->
  <rect x="160" y="730" width="760" height="80" rx="8" fill="#1e293b"/>
  <!-- Wheels -->
  <circle cx="280" cy="810" r="40" fill="#111827" stroke="#374151" stroke-width="3"/>
  <circle cx="280" cy="810" r="22" fill="#1e293b" stroke="#4b5563" stroke-width="2"/>
  <circle cx="800" cy="810" r="40" fill="#111827" stroke="#374151" stroke-width="3"/>
  <circle cx="800" cy="810" r="22" fill="#1e293b" stroke="#4b5563" stroke-width="2"/>
  <!-- Interior highlight: big screen -->
  <rect x="380" y="700" width="200" height="110" rx="6" fill="#0f172a" stroke="#60a5fa" stroke-width="2" filter="url(#glow)"/>
  <text x="480" y="755" font-family="Arial Black, sans-serif" font-size="14" fill="#60a5fa" text-anchor="middle">~27" SCREEN</text>
  <text x="480" y="778" font-family="Arial, sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">인포테인먼트</text>
  <!-- Spec annotations -->
