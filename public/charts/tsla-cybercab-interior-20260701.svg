  <rect x="90" y="195" width="160" height="100" rx="6" fill="#0f172a"/>
  <rect x="95" y="200" width="150" height="8" rx="2" fill="#374151"/>
  <rect x="95" y="214" width="120" height="6" rx="2" fill="#374151"/>
  <rect x="95" y="224" width="100" height="6" rx="2" fill="#374151"/>
  <circle cx="170" cy="260" r="20" fill="#1e3a5f" stroke="#374151" stroke-width="1"/>
  <text x="170" y="266" font-family="Arial, sans-serif" font-size="10" fill="#9ca3af" text-anchor="middle">MAP</text>
  <text x="170" y="325" font-family="Arial Black, sans-serif" font-size="28" fill="#9ca3af" text-anchor="middle" font-weight="900">15.4"</text>
  <text x="170" y="355" font-family="Arial, sans-serif" font-size="14" fill="#6b7280" text-anchor="middle">Model 3</text>
  <text x="170" y="374" font-family="Arial, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">기존 모델</text>

