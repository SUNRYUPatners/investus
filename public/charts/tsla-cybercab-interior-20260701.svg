  <text x="540" y="1068" font-family="Arial, sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">~27" 대형 스크린·핸들페달 없음·300mi 주행거리 — Cybercab 인테리어 혁신 · INVESTUS · 2026.07.01 · 투자 참고용</text>
