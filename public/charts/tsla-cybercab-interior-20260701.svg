  <rect x="286" y="488" width="230" height="120" rx="14" fill="url(#cardGrad)" stroke="#60a5fa" stroke-width="1"/>
  <text x="401" y="520" font-family="Arial Black, sans-serif" font-size="28" fill="#60a5fa" text-anchor="middle" font-weight="900">~27"</text>
