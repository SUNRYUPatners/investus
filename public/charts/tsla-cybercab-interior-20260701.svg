  <text x="60" y="100" font-family="Arial Black, sans-serif" font-size="26" font-weight="900" fill="white">TSLA · Cybercab 인테리어 공개</text>
  <rect x="880" y="38" width="148" height="34" rx="17" fill="#60a5fa" opacity="0.9"/>
