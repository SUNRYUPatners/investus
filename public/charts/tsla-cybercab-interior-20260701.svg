  <text x="909" y="548" font-family="Arial Black, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="700">예상 주행거리</text>
  <text x="909" y="568" font-family="Arial, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">Estimated Range</text>
  <text x="909" y="595" font-family="Arial, sans-serif" font-size="11" fill="#22c55e" text-anchor="middle">~483km</text>

