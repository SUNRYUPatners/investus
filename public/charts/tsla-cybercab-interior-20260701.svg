  <text x="180" y="782" font-family="Arial, sans-serif" font-size="11" fill="#ef4444" text-anchor="middle">No Pedals</text>
  <text x="850" y="745" font-family="Arial, sans-serif" font-size="11" fill="#22c55e">FWD</text>
  <text x="850" y="758" font-family="Arial, sans-serif" font-size="11" fill="#9ca3af">2,150 lbs</text>
  <text x="850" y="771" font-family="Arial, sans-serif" font-size="11" fill="#60a5fa">48V System</text>
  <text x="850" y="784" font-family="Arial, sans-serif" font-size="11" fill="#22c55e">300mi Range</text>

  <!-- Footer -->
