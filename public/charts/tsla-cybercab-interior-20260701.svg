  <text x="647" y="525" font-family="Arial, sans-serif" font-size="28" text-anchor="middle">📺</text>
  <text x="647" y="555" font-family="Arial Black, sans-serif" font-size="13" fill="#a855f7" text-anchor="middle" font-weight="700">스트리밍 지원</text>
  <text x="647" y="575" font-family="Arial, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">영화·유튜브·Maps</text>
  <text x="647" y="595" font-family="Arial, sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">이동 중 엔터테인먼트</text>

