  <text x="401" y="568" font-family="Arial, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">vs 15.4" (Model 3)</text>
  <text x="401" y="595" font-family="Arial, sans-serif" font-size="11" fill="#60a5fa" text-anchor="middle">+75% 더 큼</text>

  <!-- Card: Streaming -->
