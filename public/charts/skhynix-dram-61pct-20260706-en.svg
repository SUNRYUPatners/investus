  <text x="270" y="792" font-family="Arial, sans-serif" font-size="14" fill="#d8b4fe">DRAM oversupply · rising Chinese competition · AI capex slowdown risk</text>
  <text x="100" y="862" font-family="Arial, sans-serif" font-size="11" fill="#3a1a6a">* Sustained AI server capex = direct HBM demand → 61% GM structure likely durable</text>

