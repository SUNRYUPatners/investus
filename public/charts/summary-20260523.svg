  <text x="48" y="448" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">Tesla Robotaxi 인프라 4개 도시 확대 = Cybercab 상용화 임박 신호</text>

  <line x1="30" y1="466" x2="770" y2="466" stroke="#1e2330" stroke-width="1"/>
  <text x="30" y="482" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">투자 참고용. 투자 판단 및 결과에 대한 책임은 투자자 본인에게 있습니다.</text>
