<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480" style="background:#0d1117;font-family:'Arial',sans-serif">
  <rect width="800" height="480" rx="12" fill="#0d1117"/>
  <text x="400" y="36" text-anchor="middle" fill="#00e5a0" font-size="13" font-weight="700">TSLA · Tesla</text>
  <text x="400" y="62" text-anchor="middle" fill="#e6edf3" font-size="20" font-weight="700">Jefferies Raises TSLA Price Target to $375</text>
  <text x="400" y="84" text-anchor="middle" fill="#7d8590" font-size="13">From $350 → $375 · Robotaxi · Optimus · FSD growth thesis</text>
  <line x1="40" y1="96" x2="760" y2="96" stroke="#21262d" stroke-width="1"/>

  <!-- Arrow -->
  <rect x="80" y="116" width="240" height="100" rx="10" fill="#161b22"/>
  <text x="200" y="148" text-anchor="middle" fill="#7d8590" font-size="13">Previous Target</text>
  <text x="200" y="196" text-anchor="middle" fill="#7d8590" font-size="42" font-weight="800">$350</text>

  <line x1="340" y1="166" x2="420" y2="166" stroke="#00e5a0" stroke-width="3"/>
  <polygon points="420,158 440,166 420,174" fill="#00e5a0"/>
  <text x="390" y="156" text-anchor="middle" fill="#00e5a0" font-size="11">+7.1%</text>

  <rect x="460" y="116" width="300" height="100" rx="10" fill="#0d1f14" stroke="#00e5a0" stroke-width="1.5"/>
  <text x="610" y="148" text-anchor="middle" fill="#00e5a0" font-size="13">New Target</text>
  <text x="610" y="196" text-anchor="middle" fill="#00e5a0" font-size="46" font-weight="800">$375</text>

  <!-- Justification -->
  <rect x="40" y="234" width="720" height="130" rx="8" fill="#161b22"/>
  <rect x="40" y="234" width="720" height="4" rx="2" fill="#00e5a0"/>
  <text x="400" y="260" text-anchor="middle" fill="#00e5a0" font-size="13" font-weight="600">Bull Thesis</text>
  <text x="60" y="284" fill="#e6edf3" font-size="12">Robotaxi fleet ramp ahead of expectations — Cybercab EPA CoC completed</text>
  <text x="60" y="306" fill="#e6edf3" font-size="12">Optimus production timeline firm — Fremont start Jul~Aug 2026</text>
  <text x="60" y="328" fill="#7d8590" font-size="11">FSD subscribers 1.42M — software revenue growth accelerating</text>
  <text x="60" y="346" fill="#7d8590" font-size="11">Tesla Energy (MEGAPOD) + AI positioning adds to re-rate case</text>

  <!-- Quote -->
  <rect x="40" y="378" width="720" height="56" rx="8" fill="#1c1026"/>
  <text x="60" y="402" fill="#7d8590" font-size="11" font-style="italic">Jefferies: "Tesla is no longer just an automaker. Robotaxi+Robot+Energy+FSD</text>
  <text x="60" y="420" fill="#7d8590" font-size="11" font-style="italic">combine to create a multi-vertical AI platform — valuation re-rate justified."</text>

  <line x1="40" y1="444" x2="760" y2="444" stroke="#21262d" stroke-width="1"/>
  <text x="400" y="460" text-anchor="middle" fill="#444c56" font-size="10">Source: Jefferies analyst note · investus.kr</text>
</svg>
