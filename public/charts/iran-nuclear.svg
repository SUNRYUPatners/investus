  <line x1="668" y1="208" x2="772" y2="208" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <text x="720" y="228" text-anchor="middle" fill="#f87171" font-size="11" font-family="Arial">방산↓</text>
  <text x="720" y="246" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="Arial">긴장 완화</text>
  <line x1="668" y1="256" x2="772" y2="256" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <text x="720" y="276" text-anchor="middle" fill="#00e5a0" font-size="11" font-family="Arial">달러↓</text>
  <text x="720" y="294" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="Arial">리스크 완화</text>
  <line x1="668" y1="305" x2="772" y2="305" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <text x="720" y="325" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="Arial">호르무즈</text>
  <text x="720" y="340" text-anchor="middle" fill="#00e5a0" font-size="10" font-family="Arial" font-weight="bold">봉쇄 해소</text>
