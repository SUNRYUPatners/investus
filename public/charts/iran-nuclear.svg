  <text x="366" y="325" fill="#94a3b8" font-size="10" font-family="Arial">✓ 핵무기 개발 완전 포기</text>
  <text x="366" y="343" fill="#94a3b8" font-size="10" font-family="Arial">✓ IAEA 사찰 수용</text>
