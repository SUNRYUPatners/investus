    <linearGradient id="gr" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#991b1b"/><stop offset="100%" stop-color="#f87171"/></linearGradient>
    <linearGradient id="gm" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#00b580"/><stop offset="100%" stop-color="#00e5a0"/></linearGradient>
  </defs>
  <rect width="800" height="430" fill="url(#bg)"/>

  <text x="400" y="30" text-anchor="middle" fill="#f87171" font-size="11" font-family="Arial" font-weight="bold" letter-spacing="3">미국-이란 핵협상 · 2026.05.19</text>
  <text x="400" y="56" text-anchor="middle" fill="#e2e8f0" font-size="20" font-family="Arial" font-weight="bold">카타르·UAE 중재 · 핵무기 포기 조건 협상</text>

