<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 520" width="1080" height="520">
  <rect width="1080" height="520" fill="#0d1117"/>
  <rect x="0" y="0" width="1080" height="64" fill="#111318"/>
  <rect x="0" y="62" width="1080" height="2" fill="#60a5fa" opacity="0.7"/>
  <text x="28" y="26" font-family="Arial,sans-serif" font-size="13" fill="#60a5fa" font-weight="700">MU · Micron Technology Q3'26 실적 발표</text>
  <text x="28" y="50" font-family="Arial,sans-serif" font-size="14" fill="#e5e7eb" font-weight="700">Revenue $9.09B · EPS $1.91 · Q4 강한 가이던스 — AI 서버 메모리 수요 폭발</text>

  <rect x="24" y="78" width="1032" height="100" rx="12" fill="#0a1528" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="270" y="120" font-family="Arial,sans-serif" font-size="36" fill="#60a5fa" font-weight="700" text-anchor="middle">$9.09B</text>
  <text x="270" y="155" font-family="Arial,sans-serif" font-size="14" fill="#9ca3af" text-anchor="middle">Q3 매출 · 예상 상회</text>
  <text x="540" y="120" font-family="Arial,sans-serif" font-size="36" fill="#60a5fa" font-weight="700" text-anchor="middle">$1.91</text>
  <text x="540" y="155" font-family="Arial,sans-serif" font-size="14" fill="#9ca3af" text-anchor="middle">EPS · 예상 $1.60 대비 +19%</text>
  <text x="810" y="120" font-family="Arial,sans-serif" font-size="36" fill="#00e5a0" font-weight="700" text-anchor="middle">어닝 서프라이즈</text>
  <text x="810" y="155" font-family="Arial,sans-serif" font-size="14" fill="#9ca3af" text-anchor="middle">Q4 가이던스 더 강함</text>

  <rect x="24" y="194" width="322" height="216" rx="10" fill="#111318"/>
