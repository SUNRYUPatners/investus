  <text x="294" y="136" font-family="sans-serif" font-size="16" fill="#00e5a0" text-anchor="middle" font-weight="900">$25T</text>
  <text x="294" y="152" font-family="sans-serif" font-size="7" fill="#888" text-anchor="middle">Phase 2</text>
