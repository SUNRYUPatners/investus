  <text x="26" y="273" font-family="sans-serif" font-size="9" fill="#888">• 현재 Optimus 생산 목표: 10만 대(2026) → 100만 대(2027) → 무제한</text>
  <text x="26" y="286" font-family="sans-serif" font-size="9" fill="#888">• "역사상 가장 큰 인프라 투자 사이클의 핵심 컴퓨팅" — Patane</text>

