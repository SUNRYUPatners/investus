<svg width="800" height="480" viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" style="font-family:system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#07091a"/>
      <stop offset="100%" stop-color="#0d1022"/>
    </linearGradient>
    <linearGradient id="barGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(0,229,160,0.8)"/>
      <stop offset="100%" stop-color="rgba(0,229,160,0.4)"/>
    </linearGradient>
    <linearGradient id="barRed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,77,109,0.5)"/>
      <stop offset="100%" stop-color="rgba(255,77,109,0.8)"/>
    </linearGradient>
    <linearGradient id="barBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(96,165,250,0.8)"/>
      <stop offset="100%" stop-color="rgba(96,165,250,0.4)"/>
    </linearGradient>
  </defs>
  <rect width="800" height="480" fill="url(#bg)"/>

  <!-- Header -->
  <rect x="0" y="0" width="800" height="60" fill="rgba(168,85,247,0.06)"/>
  <text x="32" y="21" fill="rgba(168,85,247,0.7)" font-size="10" letter-spacing="2" font-weight="700">SPACEX × ANTHROPIC · ARK INVEST 분석</text>
  <text x="32" y="46" fill="white" font-size="19" font-weight="800">SpaceXai 컴퓨트 딜 — 5년 누적 순현금 $53.9B 전망</text>

  <!-- Subtitle -->
  <text x="32" y="78" fill="rgba(255,255,255,0.4)" font-size="11">SpaceXai paying Anthropic $24B/yr for compute · $29B per GW 구축 비용 · ARK Invest Waterfall 분석</text>

  <!-- Chart title -->
  <text x="32" y="106" fill="rgba(255,255,255,0.5)" font-size="11" font-weight="600" letter-spacing="1">5년 세전 순현금 워터폴 차트 (ARK Invest 재구성)</text>

  <!-- Zero line -->
  <line x1="80" y1="290" x2="760" y2="290" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="68" y="294" fill="rgba(255,255,255,0.3)" font-size="9" text-anchor="end">$0</text>

  <!-- Bar 1: Build Capex (-$18.1B) — RED, below zero -->
  <!-- zero at y=290, each $B = ~5px -->
  <!-- -18.1B = 90.5px below zero → bar from y=290 to y=380, height=90 -->
  <rect x="103" y="290" width="70" height="91" rx="4" fill="url(#barRed)"/>
  <text x="138" y="310" fill="white" font-size="9" font-weight="700" text-anchor="middle">초기</text>
  <text x="138" y="322" fill="white" font-size="9" font-weight="700" text-anchor="middle">투자</text>
  <text x="138" y="395" fill="#ff4d6d" font-size="10" font-weight="700" text-anchor="middle">-$18.1B</text>
  <text x="138" y="408" fill="rgba(255,255,255,0.4)" font-size="9" text-anchor="middle">Build Capex</text>

  <!-- Opex line (thin red bar, small) -->
  <!-- $0.6B opex per year = 3px, shown as thin bar for each year -->

  <!-- Bar 2: Year 1 net (+$14.4B - $0.6B opex = $13.8B) -->
  <!-- From zero: up 69px -->
  <rect x="213" y="221" width="70" height="69" rx="4" fill="url(#barGreen)"/>
  <!-- Red opex overlay -->
  <rect x="213" y="284" width="70" height="6" rx="2" fill="rgba(255,77,109,0.7)"/>
  <text x="248" y="214" fill="#00e5a0" font-size="10" font-weight="700" text-anchor="middle">$14.4B</text>
  <text x="248" y="304" fill="rgba(255,77,109,0.8)" font-size="8" text-anchor="middle">-$0.6B</text>
  <text x="248" y="408" fill="rgba(255,255,255,0.4)" font-size="9" text-anchor="middle">Year 1</text>

  <!-- Bar 3: Year 2 -->
  <rect x="323" y="221" width="70" height="69" rx="4" fill="url(#barGreen)"/>
  <rect x="323" y="284" width="70" height="6" rx="2" fill="rgba(255,77,109,0.7)"/>
  <text x="358" y="214" fill="#00e5a0" font-size="10" font-weight="700" text-anchor="middle">$14.4B</text>
  <text x="358" y="408" fill="rgba(255,255,255,0.4)" font-size="9" text-anchor="middle">Year 2</text>

  <!-- Bar 4: Year 3 -->
  <rect x="433" y="221" width="70" height="69" rx="4" fill="url(#barGreen)"/>
  <rect x="433" y="284" width="70" height="6" rx="2" fill="rgba(255,77,109,0.7)"/>
  <text x="468" y="214" fill="#00e5a0" font-size="10" font-weight="700" text-anchor="middle">$14.4B</text>
  <text x="468" y="408" fill="rgba(255,255,255,0.4)" font-size="9" text-anchor="middle">Year 3</text>

  <!-- Bar 5: Year 4 -->
  <rect x="543" y="221" width="70" height="69" rx="4" fill="url(#barGreen)"/>
  <rect x="543" y="284" width="70" height="6" rx="2" fill="rgba(255,77,109,0.7)"/>
  <text x="578" y="214" fill="#00e5a0" font-size="10" font-weight="700" text-anchor="middle">$14.4B</text>
  <text x="578" y="408" fill="rgba(255,255,255,0.4)" font-size="9" text-anchor="middle">Year 4</text>

  <!-- Bar 6: Year 5 -->
  <rect x="653" y="221" width="70" height="69" rx="4" fill="url(#barGreen)"/>
  <rect x="653" y="284" width="70" height="6" rx="2" fill="rgba(255,77,109,0.7)"/>
  <text x="688" y="214" fill="#00e5a0" font-size="10" font-weight="700" text-anchor="middle">$14.4B</text>
  <text x="688" y="408" fill="rgba(255,255,255,0.4)" font-size="9" text-anchor="middle">Year 5</text>

  <!-- 5-year cumulative annotation -->
  <rect x="652" y="120" width="116" height="50" rx="8" fill="rgba(96,165,250,0.15)" stroke="rgba(96,165,250,0.3)" stroke-width="1"/>
  <text x="710" y="140" fill="rgba(255,255,255,0.5)" font-size="9" text-anchor="middle">5년 누적</text>
  <text x="710" y="160" fill="#60a5fa" font-size="20" font-weight="800" text-anchor="middle">$53.9B</text>

  <!-- Arrow from year5 to cumulative box -->
  <line x1="688" y1="208" x2="710" y2="172" stroke="rgba(96,165,250,0.4)" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Key numbers below -->
  <rect x="32" y="426" width="736" height="42" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="52" y="442" fill="rgba(255,255,255,0.4)" font-size="10">컴퓨트 결제</text>
  <text x="52" y="458" fill="white" font-size="12" font-weight="700">$24B/년</text>
  <line x1="160" y1="430" x2="160" y2="464" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="180" y="442" fill="rgba(255,255,255,0.4)" font-size="10">구축 비용</text>
  <text x="180" y="458" fill="white" font-size="12" font-weight="700">$29B/GW</text>
  <line x1="310" y1="430" x2="310" y2="464" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="330" y="442" fill="rgba(255,255,255,0.4)" font-size="10">연 순수익 (추정)</text>
  <text x="330" y="458" fill="#00e5a0" font-size="12" font-weight="700">$14.4B/년</text>
  <line x1="480" y1="430" x2="480" y2="464" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="500" y="442" fill="rgba(255,255,255,0.4)" font-size="10">5년 누적 순현금</text>
  <text x="500" y="458" fill="#60a5fa" font-size="12" font-weight="700">$53.9B</text>
  <line x1="650" y1="430" x2="650" y2="464" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="668" y="448" fill="rgba(255,255,255,0.3)" font-size="9">투자 참고용</text>
  <text x="668" y="460" fill="rgba(255,255,255,0.2)" font-size="8">ARK Invest 분석 기반</text>
</svg>
