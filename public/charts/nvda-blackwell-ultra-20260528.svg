<svg xmlns="http://www.w3.org/2000/svg" width="800" height="430" viewBox="0 0 800 430">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050f0a"/>
      <stop offset="100%" style="stop-color:#0d1f18"/>
    </linearGradient>
  </defs>
  <rect width="800" height="430" fill="url(#bg)"/>
  <rect width="800" height="3" fill="#00e5a0" opacity="0.9"/>

  <!-- Header -->
  <text x="32" y="38" font-family="Arial,sans-serif" font-size="11" fill="#00e5a0" font-weight="600" letter-spacing="2">NVDA · Blackwell Ultra · 2026.05.28</text>
  <text x="32" y="66" font-family="'SF Pro Display',Arial,sans-serif" font-size="20" fill="#ffffff" font-weight="700">Blackwell Ultra 납품 개시 — H1 2027 수주잔고 확보</text>
  <text x="32" y="88" font-family="Arial,sans-serif" font-size="13" fill="#94a3b8">Jensen "시총 매우 저평가" · 하이퍼스케일러 전방위 매입 · $5T 논거 부상</text>
  <line x1="32" y1="102" x2="768" y2="102" stroke="#0d2d1a" stroke-width="1"/>

  <!-- Big stat: supply visibility -->
  <rect x="32" y="114" width="200" height="70" rx="8" fill="rgba(0,229,160,0.10)" stroke="#00e5a0" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="50" y="137" font-family="Arial,sans-serif" font-size="10" fill="#00e5a0" font-weight="600">공급 가시성</text>
  <text x="50" y="164" font-family="'SF Pro Display',Arial,sans-serif" font-size="28" fill="#ffffff" font-weight="800">H1 2027</text>
  <text x="50" y="178" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8">Committed Purchase Orders 확보</text>

  <!-- Stat 2: $5T -->
  <rect x="246" y="114" width="160" height="70" rx="8" fill="rgba(0,229,160,0.07)" stroke="#00e5a0" stroke-width="1" stroke-opacity="0.4"/>
  <text x="264" y="137" font-family="Arial,sans-serif" font-size="10" fill="#00e5a0" font-weight="600">목표 시총 (2027E)</text>
  <text x="264" y="164" font-family="'SF Pro Display',Arial,sans-serif" font-size="28" fill="#ffffff" font-weight="800">$5T</text>
  <text x="264" y="178" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8">~6,900조원 · 현재 대비 +40%+</text>

  <!-- Hyperscaler capex -->
  <text x="432" y="126" font-family="Arial,sans-serif" font-size="11" fill="#00e5a0" font-weight="700">■ 하이퍼스케일러 CAPEX (2026)</text>
  <rect x="432" y="134" width="336" height="50" rx="6" fill="rgba(0,229,160,0.05)"/>
  <text x="448" y="154" font-family="Arial,sans-serif" font-size="12" fill="#e2e8f0">Microsoft   <tspan font-weight="800" fill="#ffffff">$80B</tspan>   Meta   <tspan font-weight="800" fill="#ffffff">$65B</tspan>   Amazon   <tspan font-weight="800" fill="#ffffff">$80B+</tspan></text>
  <text x="448" y="174" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">→ 전액 Nvidia Blackwell 기반 인프라 구축</text>

  <!-- Quote row -->
  <text x="32" y="210" font-family="Arial,sans-serif" font-size="11" fill="#00e5a0" font-weight="700">■ 핵심 발언</text>

  <rect x="32" y="218" width="356" height="54" rx="6" fill="rgba(0,229,160,0.05)" stroke="#00e5a0" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="48" y="237" font-family="Arial,sans-serif" font-size="10" fill="#94a3b8" font-style="italic">"Nvidia's market cap will be 'very much undervalued'</text>
  <text x="48" y="252" font-family="Arial,sans-serif" font-size="10" fill="#94a3b8" font-style="italic">as you realize [it] is the sponsor of the AI revolution."</text>
  <text x="48" y="266" font-family="Arial,sans-serif" font-size="9" fill="#64748b">— Jensen Huang, CEO</text>

  <rect x="404" y="218" width="364" height="54" rx="6" fill="rgba(0,229,160,0.05)" stroke="#00e5a0" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="420" y="237" font-family="Arial,sans-serif" font-size="10" fill="#94a3b8" font-style="italic">"If you are building a big inference business and want</text>
  <text x="420" y="252" font-family="Arial,sans-serif" font-size="10" fill="#94a3b8" font-style="italic">to make money, it's all about custom chips."</text>
  <text x="420" y="266" font-family="Arial,sans-serif" font-size="9" fill="#64748b">— Bruce Flatt, Brookfield CEO</text>

  <!-- Anthropic deal -->
  <rect x="32" y="288" width="356" height="56" rx="8" fill="rgba(168,85,247,0.08)" stroke="#c084fc" stroke-width="1" stroke-opacity="0.4"/>
  <text x="50" y="308" font-family="Arial,sans-serif" font-size="11" fill="#c084fc" font-weight="600">Anthropic × NVDA GPU 공급 계약</text>
  <text x="50" y="325" font-family="'SF Pro Display',Arial,sans-serif" font-size="22" fill="#ffffff" font-weight="800">$64B</text>
  <text x="160" y="325" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">2029년까지 NVDA GPU 공급</text>
  <text x="50" y="338" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8">월 $1~25B 규모 추정 · Claude 모델 훈련·추론 인프라</text>

  <!-- Margin leadership -->
  <rect x="404" y="288" width="364" height="56" rx="8" fill="rgba(0,229,160,0.06)" stroke="#00e5a0" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="420" y="308" font-family="Arial,sans-serif" font-size="11" fill="#00e5a0" font-weight="600">클라우드 마진 우위 (SemiAnalysis)</text>
  <text x="420" y="325" font-family="Arial,sans-serif" font-size="11" fill="#e2e8f0">AWS +2.1bps↑ · GCP +0.4bps → · Azure <tspan fill="#ef4444">-2.5bps↓</tspan></text>
  <text x="420" y="340" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8">NVDA GPU 효율 활용도 = 클라우드 마진 격차</text>

  <!-- Bottom insight -->
  <text x="32" y="368" font-family="Arial,sans-serif" font-size="11" fill="#00e5a0" font-weight="700">■ 투자 시사점</text>
  <text x="32" y="385" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">• H1 2027 수주잔고 = 향후 2개 분기 이상 매출 가시성 확보 — 실적 서프라이즈 구조</text>
  <text x="32" y="401" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">• 하이퍼스케일러 3사($225B+ CAPEX) 전액 NVDA 의존 → 공급자 교섭력 극대화</text>
  <text x="32" y="417" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">• $5T 목표는 현재 수주잔고·마진율 기준 DCF로 설명 가능한 범위</text>

  <text x="768" y="424" font-family="Arial,sans-serif" font-size="9" fill="#334155" text-anchor="end">SUNRYU Partners · 2026.05.28</text>
</svg>
