<svg width="800" height="480" viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" style="font-family:system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#07091a"/>
      <stop offset="100%" stop-color="#0d1022"/>
    </linearGradient>
    <linearGradient id="barSmall" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(0,229,160,0.3)"/>
      <stop offset="100%" stop-color="rgba(0,229,160,0.5)"/>
    </linearGradient>
    <linearGradient id="barBig" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(0,229,160,0.7)"/>
      <stop offset="100%" stop-color="rgba(0,229,160,1.0)"/>
    </linearGradient>
  </defs>
  <rect width="800" height="480" fill="url(#bg)"/>

  <!-- Header -->
  <rect x="0" y="0" width="800" height="60" fill="rgba(0,229,160,0.06)"/>
  <text x="32" y="21" fill="rgba(0,229,160,0.7)" font-size="10" letter-spacing="2" font-weight="700">TESLA · TSLA · 🇫🇷 프랑스</text>
  <text x="32" y="46" fill="white" font-size="20" font-weight="800">프랑스 5월 판매 5,448대 — +655% YoY · 신형 Model Y 수요 폭발</text>

  <!-- Big number -->
  <text x="400" y="105" fill="rgba(255,255,255,0.35)" font-size="13" text-anchor="middle">May 2026 프랑스 Tesla 판매</text>
  <text x="400" y="155" fill="#00e5a0" font-size="68" font-weight="800" text-anchor="middle">+655%</text>
  <text x="400" y="178" fill="rgba(0,229,160,0.5)" font-size="14" text-anchor="middle">YoY 성장 · 721대 → 5,448대</text>

  <!-- Bar chart -->
  <text x="32" y="210" fill="rgba(255,255,255,0.5)" font-size="11" font-weight="600" letter-spacing="1">월별 판매 대수 비교</text>

  <!-- May 2025 bar -->
  <text x="32" y="240" fill="rgba(255,255,255,0.4)" font-size="11">May 2025</text>
  <rect x="160" y="228" width="30" height="20" rx="4" fill="url(#barSmall)"/>
  <text x="196" y="242" fill="rgba(255,255,255,0.5)" font-size="11">721대</text>

  <!-- May 2026 bar -->
  <text x="32" y="274" fill="rgba(255,255,255,0.8)" font-size="11" font-weight="600">May 2026</text>
  <rect x="160" y="260" width="396" height="24" rx="4" fill="url(#barBig)"/>
  <text x="562" y="277" fill="#00e5a0" font-size="12" font-weight="800">5,448대</text>

  <!-- Context: YoY ratio visual -->
  <text x="32" y="318" fill="rgba(255,255,255,0.35)" font-size="10">대수 비율</text>
  <!-- 721 as 1 unit -->
  <rect x="160" y="306" width="14" height="14" rx="2" fill="rgba(255,255,255,0.2)"/>
  <text x="180" y="318" fill="rgba(255,255,255,0.4)" font-size="10">× 1 (2025)</text>
  <!-- 5448 as 7.5x -->
  <rect x="260" y="306" width="14" height="14" rx="2" fill="rgba(0,229,160,0.5)"/>
  <rect x="276" y="306" width="14" height="14" rx="2" fill="rgba(0,229,160,0.5)"/>
  <rect x="292" y="306" width="14" height="14" rx="2" fill="rgba(0,229,160,0.5)"/>
  <rect x="308" y="306" width="14" height="14" rx="2" fill="rgba(0,229,160,0.5)"/>
  <rect x="324" y="306" width="14" height="14" rx="2" fill="rgba(0,229,160,0.5)"/>
  <rect x="340" y="306" width="14" height="14" rx="2" fill="rgba(0,229,160,0.5)"/>
  <rect x="356" y="306" width="14" height="14" rx="2" fill="rgba(0,229,160,0.5)"/>
  <text x="378" y="318" fill="#00e5a0" font-size="10" font-weight="700">× 7.5배 (2026)</text>

  <!-- Driver analysis -->
  <rect x="32" y="336" width="736" height="106" rx="12" fill="rgba(0,229,160,0.05)" stroke="rgba(0,229,160,0.15)" stroke-width="1"/>
  <text x="52" y="358" fill="#00e5a0" font-size="11" font-weight="700">성장 배경 분석</text>

  <rect x="52" y="368" width="2" height="64" fill="rgba(0,229,160,0.4)"/>
  <text x="64" y="383" fill="rgba(255,255,255,0.7)" font-size="10">• 신형 Model Y 론칭 — 유럽 수요 폭발적 반응 · 디자인·주행거리·가격 삼박자</text>
  <text x="64" y="399" fill="rgba(255,255,255,0.7)" font-size="10">• 프랑스 EV 보조금 정책 수혜 — 정부 보조로 실질 구매가 하락</text>
  <text x="64" y="415" fill="rgba(255,255,255,0.7)" font-size="10">• FSD 유럽 출시 기대감 — 자율주행 기능 포함 사전 주문 전환</text>
  <text x="64" y="431" fill="rgba(255,255,255,0.7)" font-size="10">• 기가베를린 공급 안정화 — 유럽 현지 생산·납기 정상화</text>

  <text x="400" y="476" fill="rgba(255,255,255,0.2)" font-size="9" text-anchor="middle">investus.kr · 선류파트너스 · 투자 참고용, 투자 권유 아님</text>
</svg>
