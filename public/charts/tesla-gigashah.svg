<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0a0f1e"/><stop offset="100%" stop-color="#0f1a2e"/></linearGradient>
    <linearGradient id="prod" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#1d4ed8"/><stop offset="100%" stop-color="#60a5fa"/></linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <text x="400" y="35" text-anchor="middle" fill="#60a5fa" font-size="12" font-family="Arial" font-weight="bold" letter-spacing="3">TESLA 기가상하이 · 4월 생산</text>
  <text x="400" y="60" text-anchor="middle" fill="#e2e8f0" font-size="20" font-family="Arial" font-weight="bold">3년 최고 생산량 + 배터리 특허 + CA 세금혜택</text>
  <!-- Monthly production bars -->
  <text x="55" y="92" fill="#94a3b8" font-size="11" font-family="Arial" font-weight="bold">기가상하이 월별 생산 (대)</text>
  <text x="110" y="125" text-anchor="middle" fill="#64748b" font-size="9" font-family="Arial">Jan</text>
  <rect x="80" y="130" width="60" height="95" rx="3" fill="rgba(96,165,250,0.3)"/>
  <text x="110" y="237" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Arial">62K</text>
  <text x="200" y="125" text-anchor="middle" fill="#64748b" font-size="9" font-family="Arial">Feb</text>
  <rect x="170" y="145" width="60" height="80" rx="3" fill="rgba(96,165,250,0.3)"/>
  <text x="200" y="237" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Arial">55K</text>
  <text x="290" y="125" text-anchor="middle" fill="#64748b" font-size="9" font-family="Arial">Mar</text>
  <rect x="260" y="118" width="60" height="107" rx="3" fill="rgba(96,165,250,0.45)"/>
  <text x="290" y="237" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Arial">71K</text>
  <text x="380" y="118" text-anchor="middle" fill="#fbbf24" font-size="9" font-family="Arial" font-weight="bold">Apr (3년 최고)</text>
  <rect x="350" y="100" width="60" height="125" rx="3" fill="rgba(0,229,160,0.6)" stroke="#00e5a0" stroke-width="1.5"/>
  <text x="380" y="237" text-anchor="middle" fill="#00e5a0" font-size="10" font-family="Arial" font-weight="bold">82K ↑</text>
  <!-- ATH arrow -->
  <text x="380" y="95" text-anchor="middle" fill="#00e5a0" font-size="10" font-family="Arial" font-weight="bold">★ 최고</text>
  <!-- Right: 3 catalysts -->
  <rect x="470" y="88" width="305" height="280" rx="12" fill="rgba(96,165,250,0.04)" stroke="rgba(96,165,250,0.15)" stroke-width="1"/>
  <text x="622" y="112" text-anchor="middle" fill="#60a5fa" font-size="12" font-family="Arial" font-weight="bold">3중 호재</text>
  <line x1="490" y1="120" x2="755" y2="120" stroke="rgba(96,165,250,0.1)" stroke-width="1"/>
  <text x="490" y="142" fill="#fbbf24" font-size="11" font-family="Arial" font-weight="bold">① 배터리 원가 특허</text>
  <text x="490" y="158" fill="#e2e8f0" font-size="10" font-family="Arial">4680 셀 대량 생산 원가 혁신</text>
  <text x="490" y="174" fill="#94a3b8" font-size="10" font-family="Arial">경쟁사 대비 30~40% 원가 절감</text>
  <line x1="490" y1="188" x2="755" y2="188" stroke="rgba(96,165,250,0.08)" stroke-width="1"/>
  <text x="490" y="208" fill="#fbbf24" font-size="11" font-family="Arial" font-weight="bold">② 캘리포니아 세금 크레딧</text>
  <text x="490" y="224" fill="#e2e8f0" font-size="10" font-family="Arial">CA 구매자 세금혜택 $7,500+</text>
  <text x="490" y="240" fill="#94a3b8" font-size="10" font-family="Arial">→ 가격 인하 여력 확보</text>
  <line x1="490" y1="254" x2="755" y2="254" stroke="rgba(96,165,250,0.08)" stroke-width="1"/>
  <text x="490" y="274" fill="#fbbf24" font-size="11" font-family="Arial" font-weight="bold">③ 기가상하이 생산 최고</text>
  <text x="490" y="290" fill="#e2e8f0" font-size="10" font-family="Arial">4월 82,000대 — 3년 최고치</text>
  <text x="490" y="306" fill="#94a3b8" font-size="10" font-family="Arial">BYD 경쟁에도 볼륨 회복</text>
  <line x1="490" y1="320" x2="755" y2="320" stroke="rgba(96,165,250,0.08)" stroke-width="1"/>
  <text x="622" y="345" text-anchor="middle" fill="#00e5a0" font-size="11" font-family="Arial" font-weight="bold">원가 절감 + 물량 증가 = 마진 개선</text>
  <!-- Bottom -->
  <rect x="30" y="365" width="420" height="50" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(96,165,250,0.1)" stroke-width="1"/>
  <text x="240" y="383" text-anchor="middle" fill="#60a5fa" font-size="11" font-family="Arial" font-weight="bold">테슬라 전략: 원가 인하 → 가격 인하 → 점유율 확대</text>
  <text x="240" y="400" text-anchor="middle" fill="#64748b" font-size="10" font-family="Arial">CA 세금혜택·배터리 혁신으로 마진 유지하며 가격↓</text>
  <text x="400" y="430" text-anchor="middle" fill="#334155" font-size="10" font-family="Arial">SUNRYU Partners CIO · 2026.05.15</text>
</svg>
