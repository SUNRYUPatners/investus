<svg width="800" height="480" viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="480" fill="#07091a"/>
  <rect x="0" y="0" width="800" height="3" fill="#60a5fa"/>
  <text x="30" y="30" font-family="Arial,sans-serif" font-size="10" fill="#60a5fa" font-weight="700" letter-spacing="2">INVESTUS · 종목분석</text>
  <text x="30" y="54" font-family="Arial,sans-serif" font-size="18" fill="white" font-weight="700">NVIDIA x Microsoft — AI PC 새 시대 · 2,000M TAM · 6/1 Compute 이벤트</text>
  <text x="770" y="54" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="end">2026.05.30</text>
  <line x1="30" y1="66" x2="770" y2="66" stroke="#1e2330" stroke-width="1"/>

  <!-- TAM block -->
  <rect x="30" y="80" width="220" height="140" rx="8" fill="#060b18" stroke="#60a5fa" stroke-width="1.2" stroke-opacity="0.5"/>
  <rect x="30" y="80" width="4" height="140" rx="2" fill="#60a5fa"/>
  <text x="48" y="106" font-family="Arial,sans-serif" font-size="11" fill="#60a5fa" font-weight="700">Windows TAM</text>
  <text x="48" y="150" font-family="Arial,sans-serif" font-size="36" fill="#60a5fa" font-weight="700">2,000M</text>
  <text x="48" y="170" font-family="Arial,sans-serif" font-size="10" fill="white">Windows 노트북 연 출하</text>
  <text x="48" y="186" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">AI PC 전환 시 NVDA 최대 TAM</text>
  <text x="48" y="200" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">Datacenter TAM과 병렬 · 투 트랙 수익</text>
  <text x="48" y="214" font-family="Arial,sans-serif" font-size="9" fill="#60a5fa">2028년 AI PC 비중 50%+ 목표</text>

  <!-- Edge Computing block -->
  <rect x="270" y="80" width="220" height="140" rx="8" fill="#060b18" stroke="#60a5fa" stroke-width="1.2" stroke-opacity="0.5"/>
  <rect x="270" y="80" width="4" height="140" rx="2" fill="#60a5fa"/>
  <text x="288" y="106" font-family="Arial,sans-serif" font-size="11" fill="#60a5fa" font-weight="700">사업부 전환</text>
  <text x="288" y="138" font-family="Arial,sans-serif" font-size="14" fill="#6b7280" font-weight="700">Gaming</text>
  <text x="288" y="158" font-family="Arial,sans-serif" font-size="12" fill="#60a5fa" font-weight="700">↓ Edge Computing</text>
  <text x="288" y="176" font-family="Arial,sans-serif" font-size="10" fill="white">재무 사업부 공식 재편</text>
  <text x="288" y="192" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">소비자 GPU → AI PC 인프라 플랫폼</text>
  <text x="288" y="206" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">업그레이드 주기 3~5년 → 2~3년</text>
  <text x="288" y="214" font-family="Arial,sans-serif" font-size="9" fill="#60a5fa">마진 구조 개선 · SW 번들 확대</text>

  <!-- June 1 Compute -->
  <rect x="510" y="80" width="260" height="140" rx="8" fill="#060b18" stroke="#60a5fa" stroke-width="1.2" stroke-opacity="0.5"/>
  <rect x="510" y="80" width="4" height="140" rx="2" fill="#60a5fa"/>
  <text x="528" y="106" font-family="Arial,sans-serif" font-size="11" fill="#60a5fa" font-weight="700">6/1 Compute 이벤트</text>
  <text x="528" y="138" font-family="Arial,sans-serif" font-size="24" fill="white" font-weight="700">NVRK 발표</text>
  <text x="528" y="160" font-family="Arial,sans-serif" font-size="10" fill="white">에이전트 전용 PC 아키텍처 공개</text>
  <text x="528" y="176" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">"It is safe to upgrade now" — Jensen Huang</text>
  <text x="528" y="192" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">AI 로컬 실행 · 클라우드 의존 탈피</text>
  <text x="528" y="206" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">MS Copilot+ PC 통합 생태계 구축</text>
  <text x="528" y="214" font-family="Arial,sans-serif" font-size="9" fill="#60a5fa">단기 주가 촉매 · 소비자 교체 사이클 시작</text>

  <!-- Core thesis -->
  <rect x="30" y="234" width="740" height="120" rx="8" fill="#060b18" stroke="#60a5fa" stroke-width="1" stroke-opacity="0.25"/>
  <rect x="30" y="234" width="4" height="120" rx="2" fill="#60a5fa"/>
  <text x="48" y="258" font-family="Arial,sans-serif" font-size="11" fill="#60a5fa" font-weight="700">투자 논리</text>
  <text x="48" y="278" font-family="Arial,sans-serif" font-size="10" fill="#e5e7eb">• "컴퓨터가 당신을 기다리는 게 아니라, 당신을 위해 일하는 시대" — AI PC 패러다임 전환 선언</text>
  <text x="48" y="296" font-family="Arial,sans-serif" font-size="10" fill="#e5e7eb">• Gaming → Edge Computing 재편 · 2,000M TAM = Datacenter에 버금가는 두 번째 성장 엔진</text>
  <text x="48" y="314" font-family="Arial,sans-serif" font-size="10" fill="#e5e7eb">• Microsoft Copilot+ PC 생태계 + NVDA GPU = 독점적 AI PC 인프라 결합 · 경쟁사 진입 장벽</text>
  <text x="48" y="332" font-family="Arial,sans-serif" font-size="10" fill="#60a5fa">• H100·B200 Datacenter 투자자들이 Edge Computing 리레이팅 미반영 → 업사이드 남아있음</text>
  <text x="48" y="346" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">NVRK 아키텍처 6/1 공개 → AI PC 사이클 본격화 촉매 · 기관 리레이팅 시작 시점</text>

  <!-- Key stats row -->
  <rect x="30" y="366" width="740" height="62" rx="8" fill="#0a1226" stroke="#60a5fa" stroke-width="1" stroke-opacity="0.2"/>
  <text x="48" y="388" font-family="Arial,sans-serif" font-size="10" fill="#6b7280">Datacenter FCF</text>
  <text x="48" y="410" font-family="Arial,sans-serif" font-size="15" fill="#60a5fa" font-weight="700">$50B+/년</text>
  <text x="230" y="388" font-family="Arial,sans-serif" font-size="10" fill="#6b7280">Windows TAM</text>
  <text x="230" y="410" font-family="Arial,sans-serif" font-size="15" fill="#60a5fa" font-weight="700">2,000M대</text>
  <text x="420" y="388" font-family="Arial,sans-serif" font-size="10" fill="#6b7280">AI PC 비중 (2026 추정)</text>
  <text x="420" y="410" font-family="Arial,sans-serif" font-size="15" fill="#60a5fa" font-weight="700">10% 미만</text>
  <text x="610" y="388" font-family="Arial,sans-serif" font-size="10" fill="#6b7280">Compute 이벤트</text>
  <text x="610" y="410" font-family="Arial,sans-serif" font-size="15" fill="#60a5fa" font-weight="700">6/1 NVRK</text>

  <line x1="30" y1="440" x2="770" y2="440" stroke="#1e2330" stroke-width="1"/>
  <text x="30" y="456" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">투자 참고용. 투자 판단 및 결과에 대한 책임은 투자자 본인에게 있습니다.</text>
  <text x="770" y="456" font-family="Arial,sans-serif" font-size="10" fill="#60a5fa" text-anchor="end" font-weight="600">INVESTUS · SUNRYU Partners CIO</text>
</svg>
