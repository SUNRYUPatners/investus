<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" style="background:#0a0c10;font-family:'Helvetica Neue',Arial,sans-serif">
  <rect width="800" height="440" fill="#0a0c10"/>
  <defs>
    <linearGradient id="blGr" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#1d4ed8"/><stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="barGr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#60a5fa"/><stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
  </defs>

  <rect x="30" y="24" width="10" height="40" rx="3" fill="url(#blGr)"/>
  <text x="50" y="40" fill="#60a5fa" font-size="11" font-weight="700" letter-spacing="2">NVIDIA · AI MEMORY</text>
  <text x="50" y="60" fill="white" font-size="18" font-weight="800">Jensen Huang "메모리 부족, 수년간 지속될 것"</text>
  <text x="750" y="44" fill="#60a5fa" font-size="11" text-anchor="end">2026.06.08</text>
  <line x1="30" y1="80" x2="770" y2="80" stroke="#ffffff" stroke-opacity="0.06"/>

  <!-- Quote -->
  <rect x="30" y="92" width="740" height="68" rx="10" fill="#60a5fa" fill-opacity="0.07" stroke="#60a5fa" stroke-opacity="0.2"/>
  <text x="50" y="116" fill="rgba(255,255,255,0.4)" font-size="20" font-style="italic">"</text>
  <text x="72" y="116" fill="white" font-size="14" font-weight="600">The whole memory supply chain shortage will persist for quite a few years.</text>
  <text x="72" y="142" fill="#60a5fa" font-size="11">— Jensen Huang, NVIDIA CEO</text>

  <!-- Supply vs Demand chart -->
  <text x="30" y="192" fill="rgba(255,255,255,0.4)" font-size="11" font-weight="700" letter-spacing="1">AI 메모리 수요 vs 공급 ($B)</text>

  <!-- Bars: 2024, 2025, 2026, 2027, 2028 -->
  <!-- Supply bars (solid blue) -->
  <text x="100" y="210" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">2024</text>
  <rect x="60" y="220" width="50" height="100" rx="4" fill="#60a5fa" fill-opacity="0.7"/>
  <rect x="115" y="250" width="50" height="70" rx="4" fill="#60a5fa" fill-opacity="0.2" stroke="#60a5fa" stroke-opacity="0.4" stroke-dasharray="4,3"/>
  <text x="85" y="338" fill="rgba(255,255,255,0.4)" font-size="9" text-anchor="middle">$19B 공급</text>
  <text x="140" y="338" fill="rgba(255,255,255,0.3)" font-size="9" text-anchor="middle">$22B 수요</text>

  <text x="270" y="210" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">2025</text>
  <rect x="228" y="200" width="50" height="120" rx="4" fill="#60a5fa" fill-opacity="0.7"/>
  <rect x="283" y="210" width="50" height="110" rx="4" fill="#60a5fa" fill-opacity="0.2" stroke="#60a5fa" stroke-opacity="0.4" stroke-dasharray="4,3"/>
  <text x="253" y="338" fill="rgba(255,255,255,0.4)" font-size="9" text-anchor="middle">$29B 공급</text>
  <text x="308" y="338" fill="rgba(255,255,255,0.3)" font-size="9" text-anchor="middle">$31B 수요</text>

  <text x="438" y="210" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">2026E</text>
  <rect x="396" y="168" width="50" height="152" rx="4" fill="#60a5fa" fill-opacity="0.7"/>
  <rect x="451" y="145" width="50" height="175" rx="4" fill="#ff4d6d" fill-opacity="0.2" stroke="#ff4d6d" stroke-opacity="0.5" stroke-dasharray="4,3"/>
  <text x="421" y="338" fill="rgba(255,255,255,0.4)" font-size="9" text-anchor="middle">$35B 공급</text>
  <text x="476" y="338" fill="#ff4d6d" font-size="9" font-weight="700" text-anchor="middle">$45B+ 수요</text>

  <text x="608" y="210" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">2027E</text>
  <rect x="566" y="140" width="50" height="180" rx="4" fill="#60a5fa" fill-opacity="0.7"/>
  <rect x="621" y="100" width="50" height="220" rx="4" fill="#ff4d6d" fill-opacity="0.2" stroke="#ff4d6d" stroke-opacity="0.5" stroke-dasharray="4,3"/>
  <text x="591" y="338" fill="rgba(255,255,255,0.4)" font-size="9" text-anchor="middle">$55B 공급</text>
  <text x="646" y="338" fill="#ff4d6d" font-size="9" font-weight="700" text-anchor="middle">$75B+ 수요</text>

  <!-- Gap annotations -->
  <line x1="470" y1="155" x2="546" y2="155" stroke="#ff4d6d" stroke-opacity="0.5" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="508" y="150" fill="#ff4d6d" font-size="10" font-weight="700" text-anchor="middle">↑ 공급 부족</text>

  <!-- Legend -->
  <rect x="30" y="358" width="14" height="14" rx="3" fill="#60a5fa" fill-opacity="0.7"/>
  <text x="50" y="370" fill="rgba(255,255,255,0.6)" font-size="11">AI 메모리 공급</text>
  <rect x="160" y="358" width="14" height="14" rx="3" fill="#ff4d6d" fill-opacity="0.3" stroke="#ff4d6d" stroke-opacity="0.5" stroke-dasharray="3,2"/>
  <text x="180" y="370" fill="rgba(255,255,255,0.6)" font-size="11">AI 메모리 수요</text>

  <!-- Key implication -->
  <rect x="30" y="390" width="740" height="36" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.07)"/>
  <text x="400" y="413" fill="rgba(255,255,255,0.6)" font-size="12" font-weight="600" text-anchor="middle">→ SK하이닉스(HBM 50%+ 점유) 최대 수혜 · 가격 상승 지속 · Terafab 자체 생산 필요성 확인</text>
</svg>
