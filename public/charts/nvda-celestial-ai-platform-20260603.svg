  <text x="580" y="220" font-size="10" fill="#9ca3af" text-anchor="middle">FY2028 광학 인터커넥트 시장</text>
  <text x="580" y="248" font-size="38" font-weight="900" fill="#60a5fa" text-anchor="middle">$37B</text>

  <!-- Hyperscaler lock-in -->
  <text x="410" y="276" font-size="10" font-weight="700" fill="#e2e8f0">Hyperscaler 고객 구조</text>
  <rect x="410" y="283" width="75" height="22" rx="4" fill="#1e3a8a"/>
  <text x="447" y="298" font-size="9" fill="#93c5fd" text-anchor="middle">Amazon</text>
  <rect x="495" y="283" width="60" height="22" rx="4" fill="#1e3a8a"/>
  <text x="525" y="298" font-size="9" fill="#93c5fd" text-anchor="middle">Google</text>
  <rect x="565" y="283" width="70" height="22" rx="4" fill="#1e3a8a"/>
  <text x="600" y="298" font-size="9" fill="#93c5fd" text-anchor="middle">Microsoft</text>
  <rect x="645" y="283" width="55" height="22" rx="4" fill="#1e3a8a"/>
  <text x="672" y="298" font-size="9" fill="#93c5fd" text-anchor="middle">Meta</text>
  <text x="410" y="320" font-size="9" fill="#6b7280">→ 4사 합산 FY2026 매출 ~80% · GPU + 인터커넥트 = 대체 불가 솔루션</text>

  <!-- Bottom row: Revenue projection -->
