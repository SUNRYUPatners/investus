  <rect x="170" y="372" width="280" height="14" rx="3" fill="#1e40af"/>
  <text x="458" y="383" font-size="10" font-weight="700" fill="#60a5fa">~$175B</text>

  <text x="50" y="402" font-size="10" fill="#9ca3af">FY2028 인터커넥트 추가</text>
  <rect x="170" y="392" width="80" height="14" rx="3" fill="#00e5a0" opacity="0.7"/>
  <text x="458" y="403" font-size="10" font-weight="700" fill="#00e5a0">+$37B</text>

  <text x="50" y="422" font-size="10" fill="#6b7280">FY2027 매출 추정</text>
  <rect x="170" y="412" width="340" height="14" rx="3" fill="#1d4ed8" opacity="0.5"/>
  <text x="458" y="423" font-size="10" font-weight="700" fill="#e2e8f0">~$308B (컨센서스)</text>
  <text x="710" y="432" font-size="9" fill="#6b7280">investus.kr</text>
</svg>
