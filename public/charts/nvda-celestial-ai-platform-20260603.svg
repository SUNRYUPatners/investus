  <text x="410" y="90" font-size="11" font-weight="700" fill="#60a5fa">Celestial AI 인수 — 무엇이 달라지나</text>

  <!-- Copper vs Optical comparison -->
  <text x="410" y="112" font-size="10" fill="#9ca3af">기존 구리 케이블</text>
  <rect x="410" y="118" width="120" height="16" rx="3" fill="#374151"/>
  <text x="538" y="130" font-size="9" fill="#9ca3af">1x 대역폭</text>

  <text x="410" y="148" font-size="10" font-weight="700" fill="#00e5a0">Celestial AI 광학</text>
