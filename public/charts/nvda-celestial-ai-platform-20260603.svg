<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="'Segoe UI',Arial,sans-serif">
  <rect width="800" height="460" fill="#0a0f1e"/>
  <rect x="0" y="0" width="800" height="52" fill="#111827"/>
  <text x="30" y="32" font-size="15" font-weight="700" fill="#60a5fa">🔵 NVIDIA — Celestial AI 인수 · 광학 인터커넥트 · AI 인프라 수직통합</text>
  <text x="30" y="47" font-size="10" fill="#6b7280">GPU → 인터커넥트 → ASIC → 엣지 4레이어 완전 지배 · FY2028 $37B 인터커넥트 시장</text>

  <!-- Left: AI Stack Pyramid/Layers -->
  <rect x="30" y="68" width="340" height="260" rx="10" fill="#111827"/>
  <text x="200" y="90" font-size="11" font-weight="700" fill="#60a5fa" text-anchor="middle">NVIDIA AI 인프라 스택</text>

  <!-- Layer 1: GPU (widest, bottom-ish, most important) -->
  <rect x="55" y="102" width="290" height="44" rx="6" fill="#1e40af"/>
