  <text x="200" y="136" font-size="9" fill="#bfdbfe" text-anchor="middle">H100·H200·Blackwell·Rubin — AI 연산 핵심</text>

  <!-- Arrow down -->
  <line x1="200" y1="146" x2="200" y2="154" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="3,2"/>
  <polygon points="195,154 205,154 200,160" fill="#60a5fa"/>

  <!-- Layer 2: Interconnect (new!) -->
  <rect x="70" y="162" width="260" height="44" rx="6" fill="#1d4ed8"/>
  <text x="200" y="178" font-size="10" font-weight="700" fill="white" text-anchor="middle">② 광학 인터커넥트</text>
  <text x="200" y="194" font-size="9" fill="#bfdbfe" text-anchor="middle">NVLink + Celestial AI · 10x 대역폭 · 70% 전력↓</text>

  <!-- Arrow down -->
  <line x1="200" y1="206" x2="200" y2="214" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="3,2"/>
  <polygon points="195,214 205,214 200,220" fill="#60a5fa"/>

  <!-- Layer 3: ASIC Custom -->
  <rect x="85" y="222" width="230" height="40" rx="6" fill="#1e3a8a"/>
  <text x="200" y="238" font-size="10" font-weight="700" fill="#93c5fd" text-anchor="middle">③ ASIC 커스텀 칩</text>
  <text x="200" y="253" font-size="9" fill="#6b7280" text-anchor="middle">Trainium · TPU · Maia (Amazon·Google·MS)</text>

  <!-- Arrow down -->
  <line x1="200" y1="262" x2="200" y2="270" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="3,2"/>
  <polygon points="195,270 205,270 200,276" fill="#60a5fa"/>

  <!-- Layer 4: NXM Edge -->
  <rect x="100" y="278" width="200" height="36" rx="6" fill="#1e3a5f"/>
  <text x="200" y="293" font-size="10" font-weight="700" fill="#6b7280" text-anchor="middle">④ NXM 엣지 칩</text>
  <text x="200" y="308" font-size="9" fill="#6b7280" text-anchor="middle">소비자·엣지 AI 전용</text>

  <!-- Right: Celestial AI + Market -->
