  <text x="400" y="518" fill="rgba(255,255,255,0.2)" font-size="11" text-anchor="middle">SPCX: Google $920M/월 S-1 공시 · 구글+앤트로픽 $2.07B/월 · 2040 $3.4T · Ron Baron $301 · TSLA: 호주1위·네바다AV·EU시작 · META: 수십억달러 발행 · MU: 일론경고·Terafab</text>
  <text x="400" y="550" fill="rgba(255,255,255,0.15)" font-size="11" text-anchor="middle">Investus Research · investus.kr · 본 자료는 투자 참고용이며 투자 결정의 책임은 투자자 본인에게 있습니다</text>
