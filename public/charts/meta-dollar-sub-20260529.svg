<svg width="800" height="430" viewBox="0 0 800 430" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="430" fill="#07091a"/>
  <rect x="0" y="0" width="800" height="3" fill="#60a5fa"/>
  <text x="30" y="30" font-family="Arial,sans-serif" font-size="10" fill="#60a5fa" font-weight="700" letter-spacing="2">INVESTUS · META REPORT</text>
  <text x="30" y="58" font-family="Arial,sans-serif" font-size="18" fill="white" font-weight="700">META $14/월 구독 출시 — 광고 外 반복 수익 모델 확립</text>
  <text x="770" y="58" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="end">2026.05.29</text>
  <line x1="30" y1="70" x2="770" y2="70" stroke="#1e2330" stroke-width="1"/>

  <!-- Subscription tiers -->
  <rect x="30" y="84" width="220" height="130" rx="8" fill="#060b18" stroke="#1e2330" stroke-width="1"/>
  <text x="140" y="106" font-family="Arial,sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">무료 플랜</text>
  <text x="140" y="138" font-family="Arial,sans-serif" font-size="24" fill="#9ca3af" font-weight="900" text-anchor="middle">$0</text>
  <text x="140" y="158" font-family="Arial,sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">광고 포함</text>
  <text x="140" y="178" font-family="Arial,sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">기존 모델 유지</text>
  <text x="140" y="206" font-family="Arial,sans-serif" font-size="9" fill="#374151" text-anchor="middle">계속 이용 가능</text>

  <rect x="268" y="84" width="220" height="130" rx="8" fill="#071830" stroke="#60a5fa" stroke-width="2"/>
  <rect x="268" y="84" width="220" height="28" rx="8" fill="#60a5fa" fill-opacity="0.2"/>
  <text x="378" y="102" font-family="Arial,sans-serif" font-size="9" fill="#60a5fa" font-weight="700" text-anchor="middle">신규 출시</text>
  <text x="378" y="124" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">Meta Blue</text>
  <text x="378" y="162" font-family="Arial,sans-serif" font-size="30" fill="#60a5fa" font-weight="900" text-anchor="middle">$14</text>
  <text x="378" y="184" font-family="Arial,sans-serif" font-size="10" fill="white" text-anchor="middle">/월 · 광고 없음</text>
  <text x="378" y="204" font-family="Arial,sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">인스타·페이스북·스레드</text>

  <rect x="506" y="84" width="264" height="130" rx="8" fill="#060b18" stroke="#1e2330" stroke-width="1"/>
  <text x="638" y="106" font-family="Arial,sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">수익 임팩트</text>
  <text x="638" y="144" font-family="Arial,sans-serif" font-size="22" fill="white" font-weight="900" text-anchor="middle">$314</text>
  <text x="638" y="164" font-family="Arial,sans-serif" font-size="10" fill="#9ca3af" text-anchor="middle">애널리스트 목표주가</text>
  <text x="638" y="186" font-family="Arial,sans-serif" font-size="11" fill="#60a5fa" font-weight="700" text-anchor="middle">전환율 5% = +$9B/년</text>
  <text x="638" y="204" font-family="Arial,sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">기존 광고 수익 보완</text>

  <rect x="30" y="228" width="740" height="64" rx="8" fill="#060b18" stroke="#60a5fa" stroke-width="1" stroke-opacity="0.4"/>
  <rect x="30" y="228" width="4" height="64" rx="2" fill="#60a5fa"/>
  <text x="50" y="250" font-family="Arial,sans-serif" font-size="11" fill="#60a5fa" font-weight="700">■ 구독 모델의 전략적 의미</text>
  <text x="50" y="270" font-family="Arial,sans-serif" font-size="11" fill="white">EU 개인정보 규제 압력 + 광고 다각화 동시 대응 — Apple Privacy 충격 완충 구조</text>
  <text x="50" y="286" font-family="Arial,sans-serif" font-size="10" fill="#9ca3af">3.5B 월활성이용자 × $14 × 전환율 = 비광고 매출 새 축 형성</text>

  <rect x="30" y="306" width="354" height="80" rx="6" fill="#0a0f1e" stroke="#1e2330" stroke-width="1"/>
  <rect x="30" y="306" width="4" height="80" rx="2" fill="#60a5fa"/>
  <text x="50" y="328" font-family="Arial,sans-serif" font-size="10" fill="#6b7280">비교 대상</text>
  <text x="50" y="352" font-family="Arial,sans-serif" font-size="12" fill="white" font-weight="700">X(트위터) $8/월 vs META $14/월</text>
  <text x="50" y="372" font-family="Arial,sans-serif" font-size="10" fill="#9ca3af">더 높은 가격 · 더 큰 이용자 기반</text>
  <text x="50" y="382" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">인스타·페이스북 통합 구독 = 가치 우위</text>

  <rect x="402" y="306" width="368" height="80" rx="6" fill="#0a0f1e" stroke="#1e2330" stroke-width="1"/>
  <rect x="402" y="306" width="4" height="80" rx="2" fill="#60a5fa"/>
  <text x="422" y="328" font-family="Arial,sans-serif" font-size="10" fill="#6b7280">투자 시사점</text>
  <text x="422" y="352" font-family="Arial,sans-serif" font-size="12" fill="#60a5fa" font-weight="700">광고 의존도 감소 → 밸류에이션 재평가</text>
  <text x="422" y="372" font-family="Arial,sans-serif" font-size="10" fill="#9ca3af">SaaS 다중 배수 적용 가능 → 목표주가 상향</text>
  <text x="422" y="382" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">AI 개인화 기능 → 구독 전환율 제고 기대</text>

  <line x1="30" y1="400" x2="770" y2="400" stroke="#1e2330" stroke-width="1"/>
  <text x="30" y="416" font-family="Arial,sans-serif" font-size="8" fill="#374151">투자 참고용 · 투자 권유 아님</text>
  <text x="770" y="416" font-family="Arial,sans-serif" font-size="9" fill="#60a5fa" text-anchor="end" font-weight="700">SUNRYU Partners CIO</text>
</svg>
