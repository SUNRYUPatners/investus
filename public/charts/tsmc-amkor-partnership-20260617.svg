<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg10" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#0a1018"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg10)" rx="16"/>

  <!-- Header -->
  <rect x="20" y="18" width="90" height="26" rx="6" fill="#60a5fa" opacity="0.2"/>
  <text x="65" y="36" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#60a5fa">TSM</text>
  <text x="122" y="36" font-family="Arial,sans-serif" font-size="13" fill="#94a3b8">2026.06.17 · 반도체</text>

  <!-- Title -->
  <text x="300" y="76" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="700" fill="#f1f5f9">TSMC + AMKOR</text>
  <text x="300" y="100" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" font-weight="700" fill="#60a5fa">10년 전략 파트너십 체결</text>
  <text x="300" y="120" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#94a3b8">미국 내 첨단 패키징 협력 — 공급망 미국화 가속</text>

  <rect x="40" y="134" width="520" height="1" fill="#1e293b" opacity="0.8"/>

  <!-- Partners -->
  <rect x="40" y="148" width="230" height="80" rx="12" fill="#1e293b" opacity="0.8"/>
  <text x="155" y="175" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#60a5fa">TSMC</text>
  <text x="155" y="195" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">세계 1위 파운드리</text>
  <text x="155" y="213" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#64748b">애리조나 팹 운영 중</text>

  <text x="300" y="198" text-anchor="middle" font-family="Arial,sans-serif" font-size="28" fill="#60a5fa" font-weight="900">×</text>
  <text x="300" y="218" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#64748b">10년 계약</text>

  <rect x="330" y="148" width="230" height="80" rx="12" fill="#1e293b" opacity="0.8"/>
  <text x="445" y="175" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#60a5fa">AMKOR</text>
  <text x="445" y="195" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">세계 2위 OSAT</text>
  <text x="445" y="213" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#64748b">애리조나 패키징 공장</text>

  <!-- Quotes -->
  <rect x="40" y="246" width="520" height="1" fill="#1e293b"/>

  <rect x="40" y="258" width="4" height="16" rx="2" fill="#60a5fa"/>
  <text x="52" y="270" font-family="Arial,sans-serif" font-size="12" fill="#e2e8f0">TSMC Kevin Zhang: "미국 내 협력 성공할 것 — 오랜 파트너십의 다음 단계"</text>

  <rect x="40" y="282" width="4" height="16" rx="2" fill="#60a5fa"/>
  <text x="52" y="294" font-family="Arial,sans-serif" font-size="12" fill="#e2e8f0">AMKOR CEO: "칩 제조~첨단 패키징까지 미국 생산 풀 스택 완성"</text>

  <rect x="40" y="306" width="520" height="1" fill="#1e293b"/>

  <!-- Why it matters -->
  <rect x="40" y="320" width="4" height="16" rx="2" fill="#00e5a0"/>
  <text x="52" y="332" font-family="Arial,sans-serif" font-size="12" fill="#e2e8f0">AI 칩 공급망 미국 내 완결 → 중국 의존도 제로화 전략</text>

  <rect x="40" y="344" width="4" height="16" rx="2" fill="#00e5a0"/>
  <text x="52" y="356" font-family="Arial,sans-serif" font-size="12" fill="#e2e8f0">CoWoS/SoIC 어드밴스드 패키징 → NVIDIA·Apple·AMD 수혜</text>

  <text x="300" y="382" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#475569">Source: TSMC / AMKOR Press Release 2026.06.17</text>
