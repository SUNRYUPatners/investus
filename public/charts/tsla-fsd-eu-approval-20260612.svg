  <text x="126" y="424" font-family="Arial,sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">FSD 구독 전환 대상</text>

  <rect x="244" y="362" width="212" height="64" rx="10" fill="#111318"/>
  <text x="350" y="384" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">구독 10% 전환 시</text>
  <text x="350" y="408" font-family="Arial,sans-serif" font-size="22" fill="#00e5a0" text-anchor="middle" font-weight="bold">연 $1.2B+</text>
