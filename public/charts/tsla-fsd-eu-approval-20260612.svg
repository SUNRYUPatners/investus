  <text x="40" y="319" font-family="Arial,sans-serif" font-size="11" fill="#6b7280">소형 국가 선례 확인 후 순차 검토 예정</text>
  <text x="440" y="305" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="end">⏳ 대기</text>

