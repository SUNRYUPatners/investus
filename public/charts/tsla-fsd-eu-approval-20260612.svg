  <text x="44" y="163" font-family="Arial,sans-serif" font-size="11" fill="#00e5a0">🇩🇰</text>
  <text x="70" y="163" font-family="Arial,sans-serif" font-size="13" fill="#00e5a0" font-weight="bold">덴마크</text>
  <text x="70" y="179" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af">FSD Supervised 공식 운행 허가</text>
  <text x="440" y="171" font-family="Arial,sans-serif" font-size="11" fill="#00e5a0" text-anchor="end" font-weight="bold">✓ 완료</text>

  <!-- Belgium -->
  <rect x="24" y="194" width="432" height="38" rx="8" fill="rgba(0,229,160,0.12)" stroke="#00e5a0" stroke-width="1" stroke-opacity="0.4"/>
  <text x="44" y="209" font-family="Arial,sans-serif" font-size="11" fill="#00e5a0">🇧🇪</text>
  <text x="70" y="209" font-family="Arial,sans-serif" font-size="13" fill="#00e5a0" font-weight="bold">벨기에</text>
  <text x="70" y="225" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af">'기능적으로 100% 자율주행' 공인</text>
