  <text x="48" y="554" font-family="Arial,sans-serif" font-size="10" fill="#e5e7eb">TSLA: FSD 유럽 11개국 동시 출시 = 소프트웨어 수익화 폭발적 확장 · 월 $99 구독 구조</text>
