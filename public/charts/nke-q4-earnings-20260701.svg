<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#1a0f00"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#fb923c"/>
    </linearGradient>
    <linearGradient id="lowBar" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#374151"/>
      <stop offset="100%" style="stop-color:#6b7280"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <circle cx="950" cy="300" r="280" fill="#f97316" opacity="0.04"/>
  <circle cx="100" cy="750" r="220" fill="#f97316" opacity="0.04"/>

  <!-- Header -->
  <rect x="0" y="0" width="1080" height="90" fill="#f97316" opacity="0.1"/>
  <rect x="0" y="88" width="1080" height="2" fill="#f97316" opacity="0.6"/>
  <text x="54" y="52" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#f97316" letter-spacing="4">INVESTUS DAILY REPORT</text>
  <rect x="870" y="26" width="160" height="36" rx="18" fill="#f97316" opacity="0.2"/>
  <rect x="870" y="26" width="160" height="36" rx="18" fill="none" stroke="#f97316" stroke-width="1.5"/>
  <text x="950" y="49" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#f97316" text-anchor="middle">2026.07.01</text>

  <!-- Title -->
  <text x="54" y="150" font-family="Arial,sans-serif" font-size="40" font-weight="900" fill="#ffffff">NIKE Q4 FY28</text>
  <text x="54" y="198" font-family="Arial,sans-serif" font-size="25" font-weight="700" fill="#f97316">어닝 서프라이즈 · 컨센서스 5.3배 초과</text>
  <rect x="54" y="217" width="90" height="30" rx="6" fill="#f97316" opacity="0.25"/>
  <text x="99" y="237" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#f97316" text-anchor="middle">$NKE</text>

  <!-- HERO: Net Income -->
  <rect x="54" y="272" width="460" height="200" rx="16" fill="#1a0f00" stroke="#f97316" stroke-width="2"/>
  <text x="284" y="330" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#f97316" text-anchor="middle" letter-spacing="3">NET INCOME</text>
  <text x="284" y="415" font-family="Arial,sans-serif" font-size="80" font-weight="900" fill="#f97316" text-anchor="middle" filter="url(#glow)">$1.07B</text>
  <text x="284" y="452" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">순이익 (Q4 FY2028)</text>

  <!-- 5.3x badge -->
  <rect x="554" y="272" width="472" height="200" rx="16" fill="#f97316"/>
  <text x="790" y="340" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="3">ABOVE CONSENSUS</text>
  <text x="790" y="430" font-family="Arial,sans-serif" font-size="96" font-weight="900" fill="#ffffff" text-anchor="middle">5.3×</text>
  <text x="790" y="462" font-family="Arial,sans-serif" font-size="13" fill="#ffedd5" text-anchor="middle">컨센서스 $201M → 실적 $1,069M</text>

  <!-- 3 metric cards -->
  <rect x="54" y="506" width="300" height="130" rx="14" fill="#1c1008" stroke="#f97316" stroke-width="1" stroke-opacity="0.5"/>
  <text x="204" y="545" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle" letter-spacing="2">EPS (DILUTED)</text>
  <text x="204" y="595" font-family="Arial,sans-serif" font-size="48" font-weight="900" fill="#f97316" text-anchor="middle">$0.72</text>
  <text x="204" y="624" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">희석 주당순이익</text>

  <rect x="390" y="506" width="300" height="130" rx="14" fill="#1c1008" stroke="#f97316" stroke-width="1" stroke-opacity="0.5"/>
  <text x="540" y="545" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle" letter-spacing="2">REVENUE</text>
  <text x="540" y="595" font-family="Arial,sans-serif" font-size="48" font-weight="900" fill="#f97316" text-anchor="middle">$10.97B</text>
  <text x="540" y="624" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">+$113M vs 추정치</text>

  <rect x="726" y="506" width="300" height="130" rx="14" fill="#1c1008" stroke="#f97316" stroke-width="1" stroke-opacity="0.5"/>
  <text x="876" y="545" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle" letter-spacing="2">GROSS MARGIN</text>
  <text x="876" y="595" font-family="Arial,sans-serif" font-size="48" font-weight="900" fill="#f97316" text-anchor="middle">49.2%</text>
  <text x="876" y="624" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">매출총이익률</text>

  <!-- Bar chart: Consensus vs Actual -->
  <text x="540" y="690" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#9ca3af" text-anchor="middle" letter-spacing="2">순이익 비교 (단위: M)</text>

  <!-- Consensus bar: $201M — small -->
  <rect x="220" y="855" width="120" height="58" rx="6" fill="url(#lowBar)"/>
  <text x="280" y="845" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">$201M</text>
  <text x="280" y="930" font-family="Arial,sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">컨센서스</text>

  <!-- Actual bar: $1069M — large -->
  <rect x="740" y="608" width="120" height="305" rx="6" fill="url(#orangeGrad)"/>
  <text x="800" y="598" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#f97316" text-anchor="middle">$1,069M</text>
  <text x="800" y="930" font-family="Arial,sans-serif" font-size="12" fill="#f97316" text-anchor="middle">실제 순이익</text>

  <!-- Pre-tax profit note -->
  <rect x="280" y="700" width="520" height="34" rx="8" fill="#f97316" opacity="0.12"/>
  <text x="540" y="722" font-family="Arial,sans-serif" font-size="13" fill="#fb923c" text-anchor="middle">프리텍스 이익: $1.33B</text>

  <!-- Footer -->
  <rect x="0" y="990" width="1080" height="90" fill="#f97316" opacity="0.1"/>
  <rect x="0" y="990" width="1080" height="2" fill="#f97316" opacity="0.5"/>
  <text x="540" y="1030" font-family="Arial,sans-serif" font-size="15" font-weight="700" fill="#f97316" text-anchor="middle">컨센서스 5.3배 초과 달성 · NKE 역대급 어닝 서프라이즈</text>
  <text x="540" y="1058" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">INVESTUS · 2026.07.01 · 투자 참고용</text>
</svg>
