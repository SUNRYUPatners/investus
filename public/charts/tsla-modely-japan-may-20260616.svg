<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 440" width="600" height="440">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#0a1018"/>
    </linearGradient>
  </defs>
  <rect width="600" height="440" fill="url(#bg2)" rx="16"/>

  <!-- Header -->
  <rect x="20" y="18" width="90" height="26" rx="6" fill="#00e5a0" opacity="0.2"/>
  <text x="65" y="36" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#00e5a0">TSLA</text>
  <text x="122" y="36" font-family="Arial,sans-serif" font-size="13" fill="#94a3b8">2026.06.16</text>

  <!-- Title -->
  <text x="300" y="76" text-anchor="middle" font-family="Arial,sans-serif" font-size="19" font-weight="700" fill="#f1f5f9">중국산 모델Y, 일본 5월</text>
  <text x="300" y="100" text-anchor="middle" font-family="Arial,sans-serif" font-size="19" font-weight="700" fill="#00e5a0">수입차 판매 1위 달성</text>

  <rect x="40" y="114" width="520" height="1" fill="#1e3a2f" opacity="0.8"/>

  <!-- Rank badge -->
  <rect x="220" y="126" width="160" height="70" rx="12" fill="#00e5a0" opacity="0.12"/>
  <rect x="220" y="126" width="160" height="70" rx="12" fill="none" stroke="#00e5a0" stroke-width="1" opacity="0.4"/>
  <text x="300" y="168" text-anchor="middle" font-family="Arial,sans-serif" font-size="46" font-weight="900" fill="#00e5a0">#1</text>
  <text x="300" y="186" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">수입차 판매 순위 (2026.05 일본)</text>

  <!-- Japan flag colors bar -->
  <rect x="40" y="210" width="520" height="8" rx="4" fill="#1e293b"/>
  <rect x="40" y="210" width="520" height="8" rx="4" fill="#dc2626" opacity="0.6"/>

  <!-- Model comparison -->
  <text x="40" y="242" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#64748b">2026년 5월 일본 수입차 순위</text>

  <!-- Rank rows -->
  <!-- 1st -->
  <rect x="40" y="252" width="520" height="36" rx="6" fill="#00e5a0" opacity="0.1"/>
  <rect x="40" y="252" width="4" height="36" rx="2" fill="#00e5a0"/>
  <text x="55" y="276" font-family="Arial,sans-serif" font-size="15" font-weight="700" fill="#00e5a0">1위</text>
  <text x="95" y="276" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#f1f5f9">Tesla Model Y (중국산)</text>
  <rect x="340" y="260" width="200" height="20" rx="4" fill="#00e5a0" opacity="0.4"/>
  <text x="540" y="276" text-anchor="end" font-family="Arial,sans-serif" font-size="12" fill="#00e5a0">1위</text>

  <!-- 2nd placeholder -->
  <rect x="40" y="296" width="520" height="36" rx="6" fill="#1e293b" opacity="0.5"/>
  <rect x="40" y="296" width="4" height="36" rx="2" fill="#475569"/>
  <text x="55" y="320" font-family="Arial,sans-serif" font-size="15" font-weight="700" fill="#475569">2위</text>
  <text x="95" y="320" font-family="Arial,sans-serif" font-size="14" fill="#94a3b8">기타 수입 EV/ICE</text>
  <rect x="340" y="304" width="130" height="20" rx="4" fill="#334155" opacity="0.6"/>

  <!-- Key facts -->
  <rect x="40" y="348" width="4" height="16" rx="2" fill="#00e5a0"/>
  <text x="52" y="360" font-family="Arial,sans-serif" font-size="12" fill="#e2e8f0">일본 수입차 시장서 중국산 EV 첫 1위 기록</text>

  <rect x="40" y="372" width="4" height="16" rx="2" fill="#00e5a0"/>
  <text x="52" y="384" font-family="Arial,sans-serif" font-size="12" fill="#e2e8f0">기가 상하이 생산 품질·원가 경쟁력 증명</text>

  <rect x="40" y="396" width="4" height="16" rx="2" fill="#00e5a0"/>
  <text x="52" y="408" font-family="Arial,sans-serif" font-size="12" fill="#e2e8f0">아시아 시장 확장 가속 — 한국·호주·동남아 모멘텀</text>

  <rect x="40" y="418" width="4" height="16" rx="2" fill="#00e5a0"/>
  <text x="52" y="430" font-family="Arial,sans-serif" font-size="12" fill="#e2e8f0">BYD 대비 프리미엄 포지션 유지하며 일본 선점</text>
</svg>
