<svg width="800" height="430" viewBox="0 0 800 430" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="430" fill="#07091a"/>
  <rect x="0" y="0" width="800" height="3" fill="#00e5a0"/>

  <text x="30" y="30" font-family="Arial,sans-serif" font-size="10" fill="#00e5a0" font-weight="700" letter-spacing="2">INVESTUS · TSLA REPORT</text>
  <text x="30" y="58" font-family="Arial,sans-serif" font-size="19" fill="white" font-weight="700">Cybercab 165Wh/mile 공식 인증 — 역사상 가장 효율적인 EV</text>
  <text x="770" y="58" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="end">2026.05.26</text>
  <line x1="30" y1="70" x2="770" y2="70" stroke="#1e2330" stroke-width="1"/>

  <!-- Big number -->
  <text x="30" y="150" font-family="Arial,sans-serif" font-size="90" fill="#00e5a0" font-weight="900">165</text>
  <text x="280" y="150" font-family="Arial,sans-serif" font-size="28" fill="#00e5a0" font-weight="700">Wh/mile</text>
  <text x="30" y="175" font-family="Arial,sans-serif" font-size="14" fill="white">= 역사상 가장 효율적인 전기차 (공식 인증)</text>

  <!-- Efficiency comparison bars -->
  <text x="30" y="210" font-family="Arial,sans-serif" font-size="10" fill="#6b7280" font-weight="700">에너지 효율 비교 (낮을수록 우수)</text>

  <!-- Cybercab: 165 -->
  <rect x="30" y="220" width="165" height="22" rx="4" fill="#00e5a0"/>
  <text x="205" y="236" font-family="Arial,sans-serif" font-size="12" fill="#00e5a0" font-weight="700"> Cybercab — 165 Wh/mi ✓ 최고효율</text>

  <!-- Lucid Air: 190 -->
  <rect x="30" y="250" width="190" height="22" rx="4" fill="#60a5fa" fill-opacity="0.6"/>
  <text x="230" y="266" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af"> Lucid Air — 190 Wh/mi</text>

  <!-- Tesla Model 3: 240 -->
  <rect x="30" y="280" width="240" height="22" rx="4" fill="#374151"/>
  <text x="280" y="296" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af"> Model 3 — 240 Wh/mi</text>

  <!-- Chevy Bolt: 280 -->
  <rect x="30" y="310" width="280" height="22" rx="4" fill="#374151"/>
  <text x="320" y="326" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af"> Chevy Bolt — 280 Wh/mi</text>

  <!-- Key insight box -->
  <rect x="430" y="200" width="340" height="160" rx="8" fill="#060b18" stroke="#00e5a0" stroke-width="1" stroke-opacity="0.4"/>
  <text x="450" y="224" font-family="Arial,sans-serif" font-size="11" fill="#00e5a0" font-weight="700">■ Cybercab 초효율의 비결</text>
  <text x="450" y="244" font-family="Arial,sans-serif" font-size="10" fill="white">• 초경량 자율주행 전용 설계</text>
  <text x="450" y="260" font-family="Arial,sans-serif" font-size="10" fill="white">• 스티어링휠·페달 없는 미니멀 구조</text>
  <text x="450" y="276" font-family="Arial,sans-serif" font-size="10" fill="white">• 공력 최적화 차체</text>
  <text x="450" y="292" font-family="Arial,sans-serif" font-size="10" fill="white">• 배터리 열관리 최적화</text>
  <text x="450" y="312" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">에너지 비용: ~$0.02/마일</text>
  <text x="450" y="326" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">연간 10만 마일 운행 시 $2,000 vs $7,200</text>
  <text x="450" y="340" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">가솔린 대비 에너지 비용 72% 절감</text>
  <text x="450" y="354" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">플릿 운영비 혁명 → 로보택시 수익성 극대화</text>

  <!-- Bottom metrics -->
  <rect x="30" y="358" width="175" height="50" rx="6" fill="#0a0f1e" stroke="#1e2330" stroke-width="1"/>
  <text x="50" y="376" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">에너지 비용/마일</text>
  <text x="50" y="398" font-family="Arial,sans-serif" font-size="22" fill="#00e5a0" font-weight="700">~$0.02</text>

  <rect x="218" y="358" width="175" height="50" rx="6" fill="#0a0f1e" stroke="#1e2330" stroke-width="1"/>
  <text x="238" y="376" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">가솔린 차 대비 효율</text>
  <text x="238" y="398" font-family="Arial,sans-serif" font-size="22" fill="#00e5a0" font-weight="700">5~6배</text>

  <!-- Footer -->
  <line x1="30" y1="420" x2="770" y2="420" stroke="#1e2330" stroke-width="1"/>
  <text x="30" y="427" font-family="Arial,sans-serif" font-size="8" fill="#374151">투자 참고용 · 투자 권유 아님</text>
  <text x="770" y="427" font-family="Arial,sans-serif" font-size="9" fill="#00e5a0" text-anchor="end" font-weight="700">SUNRYU Partners CIO</text>
</svg>
