  <text x="540" y="456" font-family="Arial Black, Arial" font-weight="900" font-size="42" fill="#7dd3fc" text-anchor="middle" filter="url(#glow)">TPU</text>
  <text x="540" y="488" font-family="Arial, sans-serif" font-size="16" fill="#7dd3fc" text-anchor="middle">100% 자체 실리콘</text>
  <text x="540" y="510" font-family="Arial, sans-serif" font-size="13" fill="#4a8aaa" text-anchor="middle">NVDA 의존도 탈피</text>
  <text x="540" y="554" font-family="Arial, sans-serif" font-size="12" fill="#2a6a8a" text-anchor="middle">프론티어 모델 완전 구동</text>

  <rect x="720" y="408" width="280" height="160" rx="16" fill="#050f1a" stroke="#0ea5e9" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="860" y="444" font-family="Arial Black, Arial" font-weight="900" font-size="36" fill="#7dd3fc" text-anchor="middle" filter="url(#glow)">최저</text>
  <text x="860" y="476" font-family="Arial, sans-serif" font-size="14" fill="#7dd3fc" text-anchor="middle">토큰당 비용</text>
  <text x="860" y="498" font-family="Arial, sans-serif" font-size="13" fill="#4a8aaa" text-anchor="middle">인프라 자급 구조</text>
  <text x="860" y="554" font-family="Arial, sans-serif" font-size="12" fill="#2a6a8a" text-anchor="middle">AI 경쟁에서 구조적 우위</text>

  <!-- Analysis -->
  <rect x="80" y="592" width="920" height="300" rx="16" fill="#050f1a" stroke="#0ea5e9" stroke-width="1" stroke-opacity="0.4"/>
  <text x="540" y="628" font-family="Arial Black, Arial" font-weight="900" font-size="20" fill="#7dd3fc" text-anchor="middle">구글 AI 수익 모델 투자 포인트</text>

  <text x="100" y="662" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#38bdf8">TPU 자급</text>
  <text x="280" y="662" font-family="Arial, sans-serif" font-size="14" fill="#7dd3fc">자체 TPU로 프론티어 모델 구동 → 외부 칩 구매비 제거</text>
  <text x="100" y="688" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#38bdf8">비용 구조</text>
  <text x="280" y="688" font-family="Arial, sans-serif" font-size="14" fill="#7dd3fc">토큰당 내부 비용 최저 → 마진 구조적 확대</text>
  <text x="100" y="714" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#38bdf8">순이익 전망</text>
  <text x="280" y="714" font-family="Arial, sans-serif" font-size="14" fill="#7dd3fc">2028년까지 현재 대비 거의 2배 증가 예상</text>
  <text x="100" y="740" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#38bdf8">AI 검색</text>
  <text x="280" y="740" font-family="Arial, sans-serif" font-size="14" fill="#7dd3fc">AI Overview 광고 수익화 본격화 → 광고 단가 상승</text>
  <text x="100" y="766" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#38bdf8">클라우드</text>
  <text x="280" y="766" font-family="Arial, sans-serif" font-size="14" fill="#7dd3fc">Google Cloud AI 수요 급증 → AWS·Azure와 3강 구도</text>
  <text x="100" y="792" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#38bdf8">리스크</text>
  <text x="280" y="792" font-family="Arial, sans-serif" font-size="14" fill="#7dd3fc">규제 반독점 · 오픈AI 경쟁 · 광고 경기 민감도</text>
  <text x="100" y="862" font-family="Arial, sans-serif" font-size="11" fill="#1a4a6a">* 토큰 비용 자급 구조가 장기 AI 수익성의 핵심 — NVDA 의존 없는 유일한 빅테크</text>

  <rect x="60" y="912" width="960" height="40" rx="12" fill="#050f1a" stroke="#0ea5e9" stroke-width="1" stroke-opacity="0.25"/>
  <text x="540" y="937" font-family="Arial, sans-serif" font-size="15" fill="#38bdf8" text-anchor="middle">TPU 자체 프론티어 구동 · 2028 순이익 2배 · 토큰당 비용 최저 AI 경쟁 우위</text>

  <rect x="60" y="968" width="960" height="4" fill="url(#bGrad)" rx="2" opacity="0.5"/>
  <text x="540" y="1008" font-family="Arial, sans-serif" font-size="18" fill="#1a4a6a" text-anchor="middle">investus.kr  SRP Chief Investment Officer</text>
