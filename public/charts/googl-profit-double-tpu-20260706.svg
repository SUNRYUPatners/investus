<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#040a14"/>
      <stop offset="100%" style="stop-color:#0a1020"/>
    </linearGradient>
    <linearGradient id="bGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#0369a1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <line x1="0" y1="360" x2="1080" y2="360" stroke="#0ea5e9" stroke-width="0.3" stroke-opacity="0.08"/>
  <line x1="0" y1="720" x2="1080" y2="720" stroke="#0ea5e9" stroke-width="0.3" stroke-opacity="0.08"/>
  <line x1="360" y1="0" x2="360" y2="1080" stroke="#0ea5e9" stroke-width="0.3" stroke-opacity="0.08"/>
  <line x1="720" y1="0" x2="720" y2="1080" stroke="#0ea5e9" stroke-width="0.3" stroke-opacity="0.08"/>

  <rect x="60" y="60" width="960" height="4" fill="url(#bGrad)" rx="2"/>
  <rect x="60" y="90" width="80" height="36" rx="8" fill="#0ea5e9"/>
  <text x="100" y="114" font-family="Arial Black, Arial" font-weight="900" font-size="16" fill="#ffffff" text-anchor="middle">GOOGL</text>
  <rect x="154" y="90" width="100" height="36" rx="8" fill="none" stroke="#0ea5e9" stroke-width="2"/>
  <text x="204" y="114" font-family="Arial, sans-serif" font-weight="700" font-size="13" fill="#0ea5e9" text-anchor="middle">종목분석</text>
  <text x="1020" y="114" font-family="Arial, sans-serif" font-size="16" fill="#1a4a6a" text-anchor="end">2026.07.06</text>

  <text x="540" y="188" font-family="Arial Black, Arial" font-weight="900" font-size="28" fill="#ffffff" text-anchor="middle" filter="url(#glow)">구글 자체 TPU로 프론티어 모델 완전 구동</text>
  <text x="540" y="248" font-family="Arial Black, Arial" font-weight="900" font-size="52" fill="#7dd3fc" text-anchor="middle" filter="url(#glow)">2028 순이익 2배 전망</text>
  <text x="540" y="296" font-family="Arial, sans-serif" font-size="20" fill="#38bdf8" text-anchor="middle">토큰당 내부 비용 최저 기업이 AI 전쟁 승자 · TPU 실리콘 자급 달성</text>

  <!-- Quote box -->
  <rect x="80" y="318" width="920" height="68" rx="12" fill="#050f1a" stroke="#0ea5e9" stroke-width="2" stroke-opacity="0.6"/>
  <text x="540" y="348" font-family="Arial Black, Arial" font-weight="900" font-size="15" fill="#7dd3fc" text-anchor="middle">"The company with the lowest internal cost per token wins.</text>
  <text x="540" y="372" font-family="Arial Black, Arial" font-weight="900" font-size="15" fill="#7dd3fc" text-anchor="middle">Google is running its frontier model entirely on its own silicon/TPUs." — Bull Theory</text>

  <!-- Stat boxes -->
  <rect x="80" y="408" width="280" height="160" rx="16" fill="#050f1a" stroke="#0ea5e9" stroke-width="1.5" stroke-opacity="0.6"/>
