<svg width="800" height="430" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="430" fill="#07091a"/>
  <rect x="0" y="0" width="800" height="3" fill="#facc15"/>

  <text x="30" y="32" font-family="Arial,sans-serif" font-size="10" fill="#facc15" font-weight="700" letter-spacing="3">INVESTUS · Tesla Norway</text>
  <text x="30" y="58" font-family="Arial,sans-serif" font-size="19" fill="white" font-weight="700">Model Y 노르웨이 역사적 기록 — 단일 차종 최초 10만 대</text>
  <text x="770" y="58" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="end">2026.05.23</text>
  <line x1="30" y1="70" x2="770" y2="70" stroke="#1e2330" stroke-width="1"/>

  <!-- Big number -->
  <rect x="30" y="82" width="350" height="160" rx="10" fill="#0d0f08" stroke="rgba(250,204,21,0.4)" stroke-width="1.5"/>
  <text x="215" y="116" font-family="Arial,sans-serif" font-size="11" fill="#facc15" font-weight="700" text-anchor="middle">🇳🇴 Tesla Model Y — Norway</text>
  <text x="215" y="170" font-family="Arial,sans-serif" font-size="52" fill="#facc15" font-weight="700" text-anchor="middle">100,000</text>
  <text x="215" y="192" font-family="Arial,sans-serif" font-size="13" fill="white" text-anchor="middle">신규 등록 달성</text>
  <text x="215" y="212" font-family="Arial,sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">단일 차종 노르웨이 역사 최초</text>
  <text x="215" y="230" font-family="Arial,sans-serif" font-size="10" fill="#facc15" text-anchor="middle">2021.08 첫 출시 → 5년 이내 달성</text>

  <!-- Norway EV stats -->
  <rect x="400" y="82" width="370" height="160" rx="10" fill="#0a0b12" stroke="rgba(0,229,160,0.3)" stroke-width="1.5"/>
  <text x="420" y="108" font-family="Arial,sans-serif" font-size="11" fill="#00e5a0" font-weight="700">📊 노르웨이 EV 현황</text>
  <text x="420" y="130" font-family="Arial,sans-serif" font-size="10" fill="#e5e7eb">• 승용차 29대 중 1대 = Tesla Model Y</text>
  <text x="420" y="148" font-family="Arial,sans-serif" font-size="10" fill="#e5e7eb">• 신차 판매 EV 비율: 90%+ (세계 1위)</text>
  <text x="420" y="166" font-family="Arial,sans-serif" font-size="10" fill="#e5e7eb">• Model Y 글로벌 베스트셀링 3회 달성</text>
  <text x="420" y="186" font-family="Arial,sans-serif" font-size="10" fill="#6b7280">노르웨이 EV 보급률 추이</text>
  <text x="420" y="204" font-family="Arial,sans-serif" font-size="10" fill="#00e5a0">2020: ~50% → 2023: ~80% → 2026: 90%+</text>
  <text x="420" y="222" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">이 경로가 독일·프랑스·한국에서 반복될 것</text>
  <text x="420" y="236" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">"Harvey's EV Youth made it possible, but numbers speak for themselves"</text>

  <!-- April comparison bar chart -->
  <rect x="30" y="258" width="740" height="100" rx="10" fill="#0a0b12" stroke="rgba(250,204,21,0.15)" stroke-width="1"/>
  <text x="50" y="280" font-family="Arial,sans-serif" font-size="11" fill="#facc15" font-weight="700">유럽 4월 2026 YoY 판매 변화율</text>

  <!-- Tesla bar -->
  <text x="100" y="300" font-family="Arial,sans-serif" font-size="10" fill="#e5e7eb" text-anchor="middle">Tesla</text>
  <rect x="50" y="305" width="100" height="16" rx="4" fill="#00e5a0"/>
  <text x="160" y="318" font-family="Arial,sans-serif" font-size="10" fill="#00e5a0" font-weight="700">+30%</text>

  <!-- Mercedes bar -->
  <text x="270" y="300" font-family="Arial,sans-serif" font-size="10" fill="#e5e7eb" text-anchor="middle">Mercedes</text>
  <rect x="220" y="305" width="23" height="16" rx="4" fill="#ef4444"/>
  <text x="252" y="318" font-family="Arial,sans-serif" font-size="10" fill="#ef4444" font-weight="700">-7%</text>

  <!-- VW bar -->
  <text x="420" y="300" font-family="Arial,sans-serif" font-size="10" fill="#e5e7eb" text-anchor="middle">VW</text>
  <rect x="390" y="305" width="23" height="16" rx="4" fill="#ef4444"/>
  <text x="422" y="318" font-family="Arial,sans-serif" font-size="10" fill="#ef4444" font-weight="700">-8%</text>

  <!-- Toyota bar -->
  <text x="570" y="300" font-family="Arial,sans-serif" font-size="10" fill="#e5e7eb" text-anchor="middle">Toyota</text>
  <rect x="540" y="305" width="23" height="16" rx="4" fill="#ef4444"/>
  <text x="572" y="318" font-family="Arial,sans-serif" font-size="10" fill="#ef4444" font-weight="700">-7%</text>

  <text x="50" y="348" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">Deutsche Bank: "경쟁사 압도적 증거" — Tesla 독일 +39% · 스페인 +29%</text>

  <!-- Investment takeaway -->
  <rect x="30" y="370" width="740" height="38" rx="8" fill="#0d0f08" stroke="rgba(250,204,21,0.15)" stroke-width="1"/>
  <text x="50" y="388" font-family="Arial,sans-serif" font-size="10" fill="#facc15" font-weight="700">투자 포인트:</text>
  <text x="130" y="388" font-family="Arial,sans-serif" font-size="10" fill="#e5e7eb">노르웨이 성공 공식 → 독일·프랑스 반복 → FSD 유럽 수익화 + Cybercab 유럽 진출 = 복합 성장</text>
  <text x="50" y="402" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">슈퍼차저 네트워크 + OTA + FSD = 유럽 경쟁사가 단기에 복제 불가능한 해자</text>

  <line x1="30" y1="418" x2="770" y2="418" stroke="#1e2330" stroke-width="1"/>
  <text x="770" y="428" font-family="Arial,sans-serif" font-size="10" fill="#00e5a0" text-anchor="end" font-weight="600">INVESTUS · SUNRYU Partners CIO</text>
</svg>
