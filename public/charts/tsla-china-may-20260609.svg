<svg viewBox="0 0 400 440" xmlns="http://www.w3.org/2000/svg" style="background:#0d0d14;border-radius:12px">
  <defs>
    <linearGradient id="mintG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#00e5a0"/><stop offset="100%" stop-color="#00b57a"/></linearGradient>
    <linearGradient id="blueG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#60a5fa"/><stop offset="100%" stop-color="#3b82f6"/></linearGradient>
    <linearGradient id="purpG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#c084fc"/><stop offset="100%" stop-color="#a855f7"/></linearGradient>
  </defs>

  <!-- Header -->
  <rect x="0" y="0" width="400" height="56" rx="12" fill="#111118"/>
  <text x="20" y="22" font-family="Arial,sans-serif" font-size="11" fill="#00e5a0" font-weight="700">🚗 TSLA</text>
  <text x="20" y="40" font-family="Arial,sans-serif" font-size="14" fill="#ffffff" font-weight="700">Tesla China 2026 5월 출하 실적</text>
  <text x="380" y="40" font-family="Arial,sans-serif" font-size="10" fill="#555577" text-anchor="end">CPCA 기준</text>

  <!-- KPI Cards Row -->
  <!-- Wholesale Card -->
  <rect x="14" y="66" width="114" height="64" rx="8" fill="#161622" stroke="#00e5a0" stroke-width="1" stroke-opacity="0.25"/>
  <text x="71" y="84" font-family="Arial,sans-serif" font-size="9" fill="#00e5a0" text-anchor="middle" font-weight="600">도매 (Wholesale)</text>
  <text x="71" y="104" font-family="Arial,sans-serif" font-size="18" fill="#00e5a0" text-anchor="middle" font-weight="800">85,982</text>
  <text x="71" y="120" font-family="Arial,sans-serif" font-size="10" fill="#aaffdd" text-anchor="middle">+39.5% YoY</text>

  <!-- Retail Card -->
  <rect x="143" y="66" width="114" height="64" rx="8" fill="#161622" stroke="#60a5fa" stroke-width="1" stroke-opacity="0.25"/>
  <text x="200" y="84" font-family="Arial,sans-serif" font-size="9" fill="#60a5fa" text-anchor="middle" font-weight="600">소매 (Retail)</text>
  <text x="200" y="104" font-family="Arial,sans-serif" font-size="18" fill="#60a5fa" text-anchor="middle" font-weight="800">47,281</text>
  <text x="200" y="120" font-family="Arial,sans-serif" font-size="10" fill="#aaccff" text-anchor="middle">+22.5% YoY</text>

  <!-- Export Card -->
  <rect x="272" y="66" width="114" height="64" rx="8" fill="#161622" stroke="#c084fc" stroke-width="1" stroke-opacity="0.25"/>
  <text x="329" y="84" font-family="Arial,sans-serif" font-size="9" fill="#c084fc" text-anchor="middle" font-weight="600">수출 (Export)</text>
  <text x="329" y="104" font-family="Arial,sans-serif" font-size="18" fill="#c084fc" text-anchor="middle" font-weight="800">38,701</text>
  <text x="329" y="120" font-family="Arial,sans-serif" font-size="10" fill="#ddaaff" text-anchor="middle">+67.7% YoY</text>

  <!-- Bar Chart: 월별 도매 비교 2025 vs 2026 -->
  <text x="20" y="155" font-family="Arial,sans-serif" font-size="11" fill="#888899" font-weight="600">월별 도매 출하 — 2025 vs 2026</text>

  <!-- Y axis grid -->
  <line x1="50" y1="170" x2="390" y2="170" stroke="#222233" stroke-width="1"/>
  <text x="44" y="173" font-family="Arial,sans-serif" font-size="8" fill="#444455" text-anchor="end">90K</text>
  <line x1="50" y1="197" x2="390" y2="197" stroke="#222233" stroke-width="0.5"/>
  <text x="44" y="200" font-family="Arial,sans-serif" font-size="8" fill="#444455" text-anchor="end">60K</text>
  <line x1="50" y1="224" x2="390" y2="224" stroke="#222233" stroke-width="0.5"/>
  <text x="44" y="227" font-family="Arial,sans-serif" font-size="8" fill="#444455" text-anchor="end">30K</text>
  <line x1="50" y1="251" x2="390" y2="251" stroke="#222233" stroke-width="1"/>
  <text x="44" y="254" font-family="Arial,sans-serif" font-size="8" fill="#444455" text-anchor="end">0</text>

  <!-- Month bars: Jan Feb Mar Apr May (pairs) -->
  <!-- Scale: 90K = 81px height (251-170=81) -->
  <!-- Jan: 2025=71,447, 2026=69,129 -->
  <rect x="58" y="215" width="16" height="36" rx="2" fill="#3b82f6" fill-opacity="0.45"/>
  <rect x="76" y="212" width="16" height="39" rx="2" fill="#00e5a0" fill-opacity="0.85"/>
  <text x="75" y="262" font-family="Arial,sans-serif" font-size="8" fill="#666677" text-anchor="middle">1월</text>

  <!-- Feb: 2025=60,365, 2026=58,599 -->
  <rect x="108" y="224" width="16" height="27" rx="2" fill="#3b82f6" fill-opacity="0.45"/>
  <rect x="126" y="225" width="16" height="26" rx="2" fill="#00e5a0" fill-opacity="0.85"/>
  <text x="125" y="262" font-family="Arial,sans-serif" font-size="8" fill="#666677" text-anchor="middle">2월</text>

  <!-- Mar: 2025=78,828, 2026=85,670 -->
  <rect x="158" y="180" width="16" height="71" rx="2" fill="#3b82f6" fill-opacity="0.45"/>
  <rect x="176" y="173" width="16" height="78" rx="2" fill="#00e5a0" fill-opacity="0.85"/>
  <text x="175" y="262" font-family="Arial,sans-serif" font-size="8" fill="#666677" text-anchor="middle">3월</text>

  <!-- Apr: 2025=58,459, 2026=79,478 -->
  <rect x="208" y="225" width="16" height="26" rx="2" fill="#3b82f6" fill-opacity="0.45"/>
  <rect x="226" y="179" width="16" height="72" rx="2" fill="#00e5a0" fill-opacity="0.85"/>
  <text x="225" y="262" font-family="Arial,sans-serif" font-size="8" fill="#666677" text-anchor="middle">4월</text>

  <!-- May: 2025=61,662, 2026=85,982 -->
  <rect x="258" y="223" width="16" height="28" rx="2" fill="#3b82f6" fill-opacity="0.45"/>
  <rect x="276" y="172" width="16" height="79" rx="2" fill="#00e5a0"/>
  <text x="275" y="262" font-family="Arial,sans-serif" font-size="8" fill="#666677" text-anchor="middle">5월★</text>
  <!-- Highlight label for May 2026 -->
  <text x="284" y="168" font-family="Arial,sans-serif" font-size="9" fill="#00e5a0" text-anchor="middle" font-weight="700">85,982</text>

  <!-- Legend -->
  <rect x="320" y="210" width="10" height="8" rx="1" fill="#3b82f6" fill-opacity="0.5"/>
  <text x="333" y="218" font-family="Arial,sans-serif" font-size="8" fill="#6688aa">2025</text>
  <rect x="320" y="223" width="10" height="8" rx="1" fill="#00e5a0"/>
  <text x="333" y="231" font-family="Arial,sans-serif" font-size="8" fill="#00e5a0" font-weight="700">2026</text>

  <!-- YTD Stats -->
  <rect x="14" y="275" width="372" height="42" rx="8" fill="#0f1520" stroke="#60a5fa" stroke-width="1" stroke-opacity="0.15"/>
  <text x="200" y="291" font-family="Arial,sans-serif" font-size="10" fill="#888899" text-anchor="middle">2026 YTD (1~5월) 누적 도매</text>
  <text x="200" y="308" font-family="Arial,sans-serif" font-size="20" fill="#60a5fa" text-anchor="middle" font-weight="800">378,858대</text>

  <!-- Insight -->
  <rect x="14" y="326" width="372" height="50" rx="8" fill="#0a1a12" stroke="#00e5a0" stroke-width="1" stroke-opacity="0.2"/>
  <text x="28" y="344" font-family="Arial,sans-serif" font-size="10" fill="#00e5a0" font-weight="700">📌 핵심 포인트</text>
  <text x="28" y="360" font-family="Arial,sans-serif" font-size="9.5" fill="#aabbcc">5월 도매 85,982 = Tesla China 2년 만의 최고 월간 실적</text>
  <text x="28" y="374" font-family="Arial,sans-serif" font-size="9.5" fill="#aabbcc">수출 +67.7% YoY — 미국·유럽으로 Model Y 물량 급증</text>

  <!-- Footer date -->
  <text x="200" y="420" font-family="Arial,sans-serif" font-size="9" fill="#333344" text-anchor="middle">2026.06.09 | investus.kr</text>
</svg>
