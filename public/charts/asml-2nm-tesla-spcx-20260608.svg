<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" style="background:#0a0c10;font-family:'Helvetica Neue',Arial,sans-serif">
  <rect width="800" height="440" fill="#0a0c10"/>
  <defs>
    <linearGradient id="orgGr" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#c2410c"/><stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
  </defs>

  <rect x="30" y="24" width="10" height="40" rx="3" fill="url(#orgGr)"/>
  <text x="50" y="40" fill="#fb923c" font-size="11" font-weight="700" letter-spacing="2">ASML · SEMICONDUCTOR</text>
  <text x="50" y="60" fill="white" font-size="18" font-weight="800">ASML, Tesla+SpaceX에 2나노 AI·로봇·우주용 칩 공급 발표</text>
  <text x="750" y="44" fill="#fb923c" font-size="11" text-anchor="end">2026.06.08</text>
  <line x1="30" y1="80" x2="770" y2="80" stroke="#ffffff" stroke-opacity="0.06"/>

  <!-- News badge -->
  <rect x="30" y="92" width="740" height="46" rx="8" fill="#fb923c" fill-opacity="0.1" stroke="#fb923c" stroke-opacity="0.3"/>
  <text x="400" y="116" fill="white" font-size="13" font-weight="700" text-anchor="middle">ASML, 비공개 행사에서 Elon Musk 초청 — Tesla + SpaceX 대상 차세대 2nm 칩 공급 발표</text>
  <text x="400" y="131" fill="#fb923c" font-size="11" text-anchor="middle">AI 추론 · 로보틱스 · 우주 컴퓨팅 전용 선단 공정</text>

  <!-- Supply chain diagram -->
  <text x="30" y="170" fill="rgba(255,255,255,0.4)" font-size="11" font-weight="700" letter-spacing="1">공급 체인</text>

  <!-- ASML node -->
  <rect x="30" y="180" width="160" height="90" rx="12" fill="#fb923c" fill-opacity="0.1" stroke="#fb923c" stroke-opacity="0.3"/>
  <text x="110" y="214" fill="#fb923c" font-size="13" font-weight="800" text-anchor="middle">ASML</text>
  <text x="110" y="234" fill="rgba(255,255,255,0.7)" font-size="11" text-anchor="middle">EUV 노광 장비</text>
  <text x="110" y="252" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">세계 유일 2nm 공정</text>

  <!-- Arrow 1 -->
  <line x1="190" y1="225" x2="250" y2="225" stroke="#fb923c" stroke-opacity="0.5" stroke-width="2"/>
  <polygon points="246,220 256,225 246,230" fill="#fb923c" fill-opacity="0.5"/>

  <!-- Fab node -->
  <rect x="256" y="180" width="160" height="90" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.12)"/>
  <text x="336" y="214" fill="white" font-size="13" font-weight="800" text-anchor="middle">파운드리</text>
  <text x="336" y="234" fill="rgba(255,255,255,0.7)" font-size="11" text-anchor="middle">TSMC / 삼성</text>
  <text x="336" y="252" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">2nm 칩 생산</text>

  <!-- Arrow 2 -->
  <line x1="416" y1="225" x2="476" y2="225" stroke="#fb923c" stroke-opacity="0.5" stroke-width="2"/>
  <polygon points="472,220 482,225 472,230" fill="#fb923c" fill-opacity="0.5"/>

  <!-- Two destinations -->
  <rect x="482" y="180" width="130" height="90" rx="12" fill="#00e5a0" fill-opacity="0.07" stroke="#00e5a0" stroke-opacity="0.25"/>
  <text x="547" y="210" fill="#00e5a0" font-size="13" font-weight="800" text-anchor="middle">🚗 Tesla</text>
  <text x="547" y="232" fill="rgba(255,255,255,0.6)" font-size="10" text-anchor="middle">FSD AI 추론 칩</text>
  <text x="547" y="252" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">Optimus 제어 칩</text>

  <rect x="630" y="180" width="140" height="90" rx="12" fill="#c084fc" fill-opacity="0.07" stroke="#c084fc" stroke-opacity="0.25"/>
  <text x="700" y="210" fill="#c084fc" font-size="13" font-weight="800" text-anchor="middle">🚀 SpaceX</text>
  <text x="700" y="232" fill="rgba(255,255,255,0.6)" font-size="10" text-anchor="middle">AI 위성 컴퓨팅</text>
  <text x="700" y="252" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">Starlink 처리 칩</text>

  <!-- 2nm significance -->
  <text x="30" y="302" fill="rgba(255,255,255,0.4)" font-size="11" font-weight="700" letter-spacing="1">2nm 공정의 의미</text>

  <rect x="30" y="312" width="220" height="72" rx="8" fill="rgba(255,255,255,0.04)"/>
  <text x="50" y="334" fill="rgba(255,255,255,0.5)" font-size="10">성능</text>
  <text x="50" y="360" fill="white" font-size="16" font-weight="800">3nm 대비 +15%</text>
  <text x="50" y="378" fill="rgba(255,255,255,0.4)" font-size="10">AI 추론 처리 속도</text>

  <rect x="268" y="312" width="220" height="72" rx="8" fill="rgba(255,255,255,0.04)"/>
  <text x="288" y="334" fill="rgba(255,255,255,0.5)" font-size="10">전력 효율</text>
  <text x="288" y="360" fill="white" font-size="16" font-weight="800">3nm 대비 -30%</text>
  <text x="288" y="378" fill="rgba(255,255,255,0.4)" font-size="10">동일 성능 대비 전력 절감</text>

  <rect x="506" y="312" width="264" height="72" rx="8" fill="#fb923c" fill-opacity="0.07" stroke="#fb923c" stroke-opacity="0.2"/>
  <text x="526" y="334" fill="#fb923c" font-size="10" font-weight="700">핵심 의의</text>
  <text x="526" y="358" fill="white" font-size="14" font-weight="700">Terafab 이전 최선단 칩</text>
  <text x="526" y="378" fill="rgba(255,255,255,0.5)" font-size="11">Tesla+SpaceX 경쟁력 강화</text>

  <text x="400" y="430" fill="rgba(255,255,255,0.2)" font-size="10" text-anchor="middle">ShipBobs (X) · Investus · investus.kr</text>
</svg>
