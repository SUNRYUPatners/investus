  <text x="26" y="420" font-family="sans-serif" font-size="9" fill="#f0f0f0">수익(Revenue) 아닌 영업이익(Operating Profit)에서 역전 — AI 붐으로 메모리 수요 폭발</text>
  <text x="26" y="432" font-family="sans-serif" font-size="9" fill="#888">삼성 $1T 시총, SK $585B, MU $560B → 영업이익 대비 PER 극도 저평가</text>

