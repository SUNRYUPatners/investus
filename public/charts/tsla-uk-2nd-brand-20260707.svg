  <text x="540" y="616" font-family="Arial Black, Arial" font-weight="900" font-size="36" fill="#22c55e" text-anchor="middle">12,173대</text>

  <!-- UK chart bar visualization -->
  <text x="540" y="668" font-family="Arial Black, Arial" font-weight="900" font-size="16" fill="#d1d5db" text-anchor="middle">연도별 판매 추이 (2021~2026 Q1+Q2)</text>

  <!-- chart bars (approximated from visual) -->
  <text x="80" y="760" font-family="Arial, sans-serif" font-size="13" fill="#9ca3af">2021</text>
  <rect x="128" y="730" width="280" height="30" rx="4" fill="#374151"/>
  <text x="80" y="800" font-family="Arial, sans-serif" font-size="13" fill="#9ca3af">2022</text>
  <rect x="128" y="770" width="480" height="30" rx="4" fill="#374151"/>
  <text x="80" y="840" font-family="Arial, sans-serif" font-size="13" fill="#9ca3af">2024</text>
  <rect x="128" y="810" width="440" height="30" rx="4" fill="#374151"/>
  <text x="80" y="880" font-family="Arial, sans-serif" font-size="13" fill="#9ca3af">2025</text>
  <rect x="128" y="850" width="360" height="30" rx="4" fill="#374151"/>
  <text x="80" y="920" font-family="Arial Black, Arial" font-weight="900" font-size="13" fill="#ef4444">2026</text>
  <rect x="128" y="890" width="300" height="30" rx="4" fill="url(#barRed)"/>
  <text x="440" y="912" font-family="Arial Black, Arial" font-weight="900" font-size="14" fill="#ef4444">H1 ~28K 추정</text>

  <rect x="0" y="1020" width="1080" height="60" fill="#020810"/>
  <text x="540" y="1056" font-family="Arial, sans-serif" font-size="13" fill="#374151" text-anchor="middle">INVESTUS · 2026.07.07 · investus.kr SRP 최고투자책임자 발행</text>
