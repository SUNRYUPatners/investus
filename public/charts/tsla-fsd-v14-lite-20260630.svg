  <text x="70" y="724" font-family="Arial,sans-serif" font-size="15" fill="#f59e0b">△</text>
  <text x="95" y="724" font-family="Arial,sans-serif" font-size="14" fill="#9ca3af">지도 시각화·주차 시각화 미포함 (V14 정식 대비)</text>

