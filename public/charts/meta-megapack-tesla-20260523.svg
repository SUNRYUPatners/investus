  <text x="50" y="318" font-family="Arial,sans-serif" font-size="10" fill="#e5e7eb">• 수요처 다변화: 유틸리티 → AI 하이퍼스케일러</text>
  <text x="50" y="336" font-family="Arial,sans-serif" font-size="10" fill="#fb923c">• META·AMZN·MSFT 등 빅테크 = Tesla 에너지 고객화</text>

  <!-- META benefit -->
  <rect x="510" y="256" width="260" height="90" rx="10" fill="#0a0b12" stroke="rgba(96,165,250,0.2)" stroke-width="1"/>
  <text x="530" y="280" font-family="Arial,sans-serif" font-size="11" fill="#60a5fa" font-weight="700">META 수혜</text>
  <text x="530" y="298" font-family="Arial,sans-serif" font-size="10" fill="#e5e7eb">AI DC 전력 안정화</text>
  <text x="530" y="314" font-family="Arial,sans-serif" font-size="10" fill="#e5e7eb">청정에너지 ESG 목표 충족</text>
  <text x="530" y="332" font-family="Arial,sans-serif" font-size="10" fill="#60a5fa">운영비 절감 + 탄소중립 가속</text>

  <!-- Bottom bar -->
  <rect x="30" y="358" width="740" height="38" rx="8" fill="#0d1020" stroke="rgba(251,146,60,0.15)" stroke-width="1"/>
  <text x="50" y="376" font-family="Arial,sans-serif" font-size="10" fill="#fb923c" font-weight="700">결론:</text>
  <text x="85" y="376" font-family="Arial,sans-serif" font-size="10" fill="#e5e7eb">Tesla는 EV 제조사에서 'AI 인프라 에너지 공급자'로 포지셔닝 확장 중 — 에너지 사업 밸류에이션 재평가 트리거</text>
  <text x="50" y="390" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">Megapack 단가 하락 + 수요 폭증 = 마진 개선 + 매출 성장 동시 달성 구조</text>

  <line x1="30" y1="406" x2="770" y2="406" stroke="#1e2330" stroke-width="1"/>
  <text x="770" y="422" font-family="Arial,sans-serif" font-size="10" fill="#00e5a0" text-anchor="end" font-weight="600">INVESTUS · SUNRYU Partners CIO</text>
</svg>
