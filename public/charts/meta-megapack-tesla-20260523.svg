  <text x="160" y="196" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">Tesla Megapack 배터리</text>
  <text x="160" y="214" font-family="Arial,sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">META → 와이오밍 AI DC</text>
  <text x="160" y="232" font-family="Arial,sans-serif" font-size="9" fill="#fb923c" text-anchor="middle">Tesla 에너지 사업 최대 계약 중 하나</text>

  <!-- Project specs -->
  <rect x="310" y="82" width="460" height="160" rx="10" fill="#0a0b12" stroke="rgba(0,229,160,0.25)" stroke-width="1"/>
  <text x="330" y="108" font-family="Arial,sans-serif" font-size="11" fill="#00e5a0" font-weight="700">📋 프로젝트 구성 (Enbridge 파트너십)</text>

  <rect x="330" y="118" width="120" height="60" rx="6" fill="#0d1a0d" stroke="rgba(0,229,160,0.3)" stroke-width="1"/>
