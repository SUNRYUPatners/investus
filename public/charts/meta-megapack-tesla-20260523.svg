<svg width="800" height="430" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="430" fill="#07091a"/>
  <rect x="0" y="0" width="800" height="3" fill="#fb923c"/>

  <text x="30" y="32" font-family="Arial,sans-serif" font-size="10" fill="#fb923c" font-weight="700" letter-spacing="3">INVESTUS · META · Tesla Energy</text>
  <text x="30" y="58" font-family="Arial,sans-serif" font-size="19" fill="white" font-weight="700">META $200M Tesla 메가팩 — 와이오밍 AI 데이터센터</text>
  <text x="770" y="58" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="end">2026.05.23</text>
  <line x1="30" y1="70" x2="770" y2="70" stroke="#1e2330" stroke-width="1"/>

  <!-- Deal size big number -->
  <rect x="30" y="82" width="260" height="160" rx="10" fill="#0d0c07" stroke="rgba(251,146,60,0.4)" stroke-width="1.5"/>
  <text x="160" y="118" font-family="Arial,sans-serif" font-size="11" fill="#fb923c" font-weight="700" text-anchor="middle">💰 계약 규모</text>
