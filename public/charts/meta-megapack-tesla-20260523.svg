  <text x="390" y="160" font-family="Arial,sans-serif" font-size="18" fill="#00e5a0" font-weight="700" text-anchor="middle">365MW</text>
  <text x="390" y="174" font-family="Arial,sans-serif" font-size="8" fill="#6b7280" text-anchor="middle">솔라 패널</text>

  <rect x="466" y="118" width="140" height="60" rx="6" fill="#0d1a0d" stroke="rgba(0,229,160,0.3)" stroke-width="1"/>
  <text x="536" y="142" font-family="Arial,sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">배터리 저장</text>
  <text x="536" y="158" font-family="Arial,sans-serif" font-size="15" fill="#00e5a0" font-weight="700" text-anchor="middle">200MW</text>
  <text x="536" y="173" font-family="Arial,sans-serif" font-size="10" fill="#00e5a0" text-anchor="middle">1,600MWh</text>

  <rect x="622" y="118" width="130" height="60" rx="6" fill="#0d0a1a" stroke="rgba(251,146,60,0.3)" stroke-width="1"/>
  <text x="687" y="142" font-family="Arial,sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">총 파트너십</text>
  <text x="687" y="162" font-family="Arial,sans-serif" font-size="18" fill="#fb923c" font-weight="700" text-anchor="middle">1.6GW</text>
  <text x="687" y="176" font-family="Arial,sans-serif" font-size="8" fill="#6b7280" text-anchor="middle">청정에너지</text>

  <text x="330" y="214" font-family="Arial,sans-serif" font-size="10" fill="#e5e7eb">목적: META AI 데이터센터 안정적 전력 공급 (와이오밍)</text>
  <text x="330" y="230" font-family="Arial,sans-serif" font-size="10" fill="#6b7280">Enbridge: META·Enbridge 청정에너지 파트너십 확장</text>

  <!-- Tesla Energy growth story -->
  <rect x="30" y="256" width="460" height="90" rx="10" fill="#0a0b12" stroke="rgba(251,146,60,0.2)" stroke-width="1"/>
  <text x="50" y="280" font-family="Arial,sans-serif" font-size="11" fill="#fb923c" font-weight="700">📈 Tesla 에너지 사업 성장 스토리</text>
