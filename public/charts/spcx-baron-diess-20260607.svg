<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" style="background:#0a0c10;font-family:'Helvetica Neue',Arial,sans-serif">
  <rect width="800" height="440" fill="#0a0c10"/>
  <defs>
    <linearGradient id="pur5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c084fc"/><stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="gld5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>
  <rect x="30" y="24" width="10" height="36" rx="3" fill="url(#pur5)"/>
  <text x="50" y="42" fill="#c084fc" font-size="11" font-weight="700" letter-spacing="2">SPACEX · INVESTOR OUTLOOK</text>
  <text x="50" y="58" fill="white" font-size="19" font-weight="800">Ron Baron $301 목표가 · Herbert Diess "세계 최대 기업"</text>
  <text x="700" y="44" fill="#c084fc" font-size="11" font-weight="600" text-anchor="end">2026.06.07</text>
  <line x1="30" y1="76" x2="770" y2="76" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>

  <!-- price targets bar -->
  <text x="30" y="106" fill="rgba(255,255,255,0.4)" font-size="11" font-weight="700" letter-spacing="1">Ron Baron 주가 시나리오 (현재 공모가 $135 기준)</text>

  <!-- $101 -->
  <rect x="30" y="118" width="220" height="72" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
  <text x="140" y="146" fill="rgba(255,255,255,0.5)" font-size="12" text-anchor="middle">하단 시나리오</text>
  <text x="140" y="174" fill="white" font-size="30" font-weight="900" text-anchor="middle">$101</text>
  <text x="140" y="190" fill="rgba(255,255,255,0.3)" font-size="10" text-anchor="middle">-25% (보수)</text>

  <!-- $201 -->
  <rect x="264" y="118" width="220" height="72" rx="10" fill="#c084fc" fill-opacity="0.08" stroke="#c084fc" stroke-opacity="0.2"/>
  <text x="374" y="146" fill="#c084fc" font-size="12" text-anchor="middle">중간 시나리오</text>
  <text x="374" y="174" fill="white" font-size="30" font-weight="900" text-anchor="middle">$201</text>
  <text x="374" y="190" fill="#c084fc" font-size="10" text-anchor="middle">+49% 업사이드</text>

  <!-- $301 -->
  <rect x="498" y="118" width="272" height="72" rx="10" fill="url(#gld5)" fill-opacity="0.12" stroke="#fbbf24" stroke-opacity="0.3"/>
  <text x="634" y="146" fill="#fbbf24" font-size="12" font-weight="700" text-anchor="middle">상단 시나리오 🎯</text>
  <text x="634" y="174" fill="white" font-size="32" font-weight="900" text-anchor="middle">$301</text>
  <text x="634" y="190" fill="#fbbf24" font-size="11" font-weight="700" text-anchor="middle">+123% 업사이드</text>

  <!-- quotes -->
  <text x="30" y="222" fill="rgba(255,255,255,0.4)" font-size="11" font-weight="700" letter-spacing="1">주요 발언</text>

  <rect x="30" y="232" width="356" height="96" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)"/>
  <text x="50" y="256" fill="#c084fc" font-size="11" font-weight="700">Ron Baron (Baron Capital)</text>
  <text x="50" y="274" fill="rgba(255,255,255,0.75)" font-size="12">"We think it's going to be worth</text>
  <text x="50" y="292" fill="rgba(255,255,255,0.75)" font-size="12">$101, $201, or $301."</text>
  <text x="50" y="314" fill="rgba(255,255,255,0.4)" font-size="11">"People in the company believe in this."</text>

  <rect x="404" y="232" width="366" height="96" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)"/>
  <text x="424" y="256" fill="#60a5fa" font-size="11" font-weight="700">Herbert Diess (前 폭스바겐 CEO)</text>
  <text x="424" y="274" fill="rgba(255,255,255,0.75)" font-size="12">"SpaceX will become the largest,</text>
  <text x="424" y="292" fill="rgba(255,255,255,0.75)" font-size="12">most profitable company on the planet."</text>
  <text x="424" y="314" fill="rgba(255,255,255,0.4)" font-size="11">자동차 업계 CEO의 자발적 SpaceX 지지</text>

  <!-- key fact row -->
  <rect x="30" y="348" width="350" height="52" rx="8" fill="rgba(255,255,255,0.04)"/>
  <text x="50" y="368" fill="rgba(255,255,255,0.5)" font-size="11">Ron Baron 투자 원금 (2017~)</text>
  <text x="50" y="390" fill="white" font-size="18" font-weight="800">$1.78B → 현재 $18B 고객자산 연동</text>

  <rect x="400" y="348" width="370" height="52" rx="8" fill="#c084fc" fill-opacity="0.05" stroke="#c084fc" stroke-opacity="0.12"/>
  <text x="420" y="368" fill="#c084fc" font-size="11">$301 달성 시 기업가치</text>
  <text x="420" y="390" fill="white" font-size="18" font-weight="800">~$3.9T (현재 $1.75T의 2.2배)</text>

  <text x="400" y="430" fill="rgba(255,255,255,0.2)" font-size="10" text-anchor="middle">Investus · investus.kr</text>
</svg>
