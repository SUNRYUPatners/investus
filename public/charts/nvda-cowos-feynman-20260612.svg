  <text x="40" y="224" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb" font-weight="bold">Chip-on-Wafer-on-Substrate (TSMC 개발)</text>
  <text x="40" y="242" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af">• 여러 칩(GPU + HBM)을 하나의 패키지로 초집적</text>
  <text x="40" y="258" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af">• 칩 간 통신 속도 3~5배 향상 · 에너지 효율 극대화</text>

  <!-- Feynman chip -->
  <text x="24" y="288" font-family="Arial,sans-serif" font-size="12" fill="#6b7280" font-weight="bold">■ Feynman 칩 — 다음 세대 AI 가속기</text>

  <rect x="24" y="300" width="204" height="56" rx="10" fill="#0d1520"/>
  <text x="126" y="322" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">예상 출시</text>
  <text x="126" y="344" font-family="Arial,sans-serif" font-size="16" fill="#60a5fa" text-anchor="middle" font-weight="bold">2027~2028</text>

  <rect x="244" y="300" width="212" height="56" rx="10" fill="#0d1520"/>
  <text x="350" y="322" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">포지션</text>
  <text x="350" y="344" font-family="Arial,sans-serif" font-size="16" fill="#60a5fa" text-anchor="middle" font-weight="bold">Rubin 후속</text>

  <!-- Impact -->
  <text x="24" y="378" font-family="Arial,sans-serif" font-size="12" fill="#6b7280" font-weight="bold">■ 초대형 AI 칩 실현</text>

  <rect x="24" y="390" width="432" height="48" rx="10" fill="#111318"/>
  <text x="40" y="410" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb" font-weight="bold">CoWoS + Feynman = 이전 불가능한 크기의 AI 칩</text>
  <text x="40" y="428" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af">단일 칩에 수십억 트랜지스터 + 수 테라바이트 대역폭 → 초거대 AI 모델 실행</text>

  <text x="240" y="456" font-family="Arial,sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">TSMC CoWoS 수혜: SK하이닉스(HBM) · TSMC(패키징) · NVDA(설계)</text>
  <text x="240" y="472" font-family="Arial,sans-serif" font-size="10" fill="#4b5563" text-anchor="middle">2026.06.12 · Investus · 투자 참고용</text>
