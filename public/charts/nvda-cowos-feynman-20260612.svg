<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480">
  <rect width="480" height="480" fill="#0a0c10"/>
  <rect x="0" y="0" width="480" height="64" fill="#111318"/>
  <rect x="0" y="60" width="480" height="2" fill="#60a5fa" opacity="0.3"/>
  <text x="24" y="26" font-family="Arial,sans-serif" font-size="11" fill="#60a5fa" font-weight="bold">NVDA · 종목분석</text>
  <text x="24" y="46" font-family="Arial,sans-serif" font-size="13" fill="#e5e7eb" font-weight="bold">CoWoS 2H26 양산 전환 · Feynman 칩 초기 채택</text>

  <!-- Header boxes -->
  <rect x="24" y="80" width="200" height="88" rx="12" fill="#0d1520" stroke="#60a5fa" stroke-width="1" stroke-opacity="0.5"/>
