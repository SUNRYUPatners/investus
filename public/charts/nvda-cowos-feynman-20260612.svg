  <text x="124" y="138" font-family="Arial,sans-serif" font-size="20" fill="#60a5fa" text-anchor="middle" font-weight="bold">2H 2026</text>
  <text x="124" y="160" font-family="Arial,sans-serif" font-size="10" fill="#9ca3af" text-anchor="middle">대규모 양산 시작</text>

  <rect x="240" y="80" width="216" height="88" rx="12" fill="#111318"/>
  <text x="348" y="108" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">Feynman 칩</text>
  <text x="348" y="138" font-family="Arial,sans-serif" font-size="20" fill="#60a5fa" text-anchor="middle" font-weight="bold">초기 채택</text>
  <text x="348" y="160" font-family="Arial,sans-serif" font-size="10" fill="#9ca3af" text-anchor="middle">차세대 초대형 AI칩</text>

  <!-- What is CoWoS -->
  <text x="24" y="192" font-family="Arial,sans-serif" font-size="12" fill="#6b7280" font-weight="bold">■ CoWoS 패키징이란?</text>

