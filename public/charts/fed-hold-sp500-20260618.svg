<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 460" width="600" height="460">
  <defs>
    <linearGradient id="bgfed18" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#080e18"/>
    </linearGradient>
  </defs>
  <rect width="600" height="460" fill="url(#bgfed18)" rx="16"/>

  <!-- Header -->
  <rect x="0" y="0" width="600" height="56" rx="16" fill="#1e293b" opacity="0.7"/>
  <rect x="0" y="40" width="600" height="16" fill="#1e293b" opacity="0.7"/>
  <text x="300" y="24" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="800" fill="#f1f5f9">연준 12-0 만장일치 금리 동결</text>
  <text x="300" y="45" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#64748b">S&amp;P500 1994년 이후 최악의 Fed Day · Powell 가이던스 철회</text>

  <!-- Decision boxes -->
  <rect x="16" y="68" width="274" height="90" rx="10" fill="#0f2318" stroke="#00e5a0" stroke-width="1.5"/>
  <text x="153" y="96" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#00e5a0">금리 결정</text>
  <text x="153" y="120" text-anchor="middle" font-family="Arial,sans-serif" font-size="32" font-weight="800" fill="#00e5a0">동결</text>
  <text x="153" y="142" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#94a3b8">12-0 만장일치 · 5.25~5.50%</text>

  <rect x="310" y="68" width="274" height="90" rx="10" fill="#1e0a0a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="447" y="96" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#ef4444">시장 반응</text>
  <text x="447" y="120" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" font-weight="800" fill="#ef4444">최악</text>
  <text x="447" y="142" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#94a3b8">1994년 이후 최악의 Fed Day</text>

  <!-- Powell statement -->
  <rect x="16" y="170" width="568" height="44" rx="8" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="32" y="189" font-family="Arial,sans-serif" font-size="11" font-style="italic" fill="#94a3b8">"We're no longer giving the markets guidance — could be a few months ahead."</text>
  <text x="32" y="207" font-family="Arial,sans-serif" font-size="10" fill="#475569">— Fed Chair (포워드 가이던스 사실상 철회)</text>

  <!-- Why market sold off -->
  <text x="24" y="238" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#e2e8f0">시장이 급락한 이유</text>
  <rect x="22" y="246" width="3" height="14" rx="1" fill="#ef4444"/>
  <text x="30" y="257" font-family="Arial,sans-serif" font-size="11" fill="#e2e8f0">가이던스 철회 — "몇 달 후 결정" → 불확실성 급증 · 시장 방향성 소멸</text>
  <rect x="22" y="264" width="3" height="14" rx="1" fill="#ef4444"/>
  <text x="30" y="275" font-family="Arial,sans-serif" font-size="11" fill="#e2e8f0">금리 인하 기대 후퇴 — 조기 인하 없음 신호로 해석</text>
  <rect x="22" y="282" width="3" height="14" rx="1" fill="#ef4444"/>
  <text x="30" y="293" font-family="Arial,sans-serif" font-size="11" fill="#e2e8f0">인플레이션 여전히 우려 — 제롬 파월, 2% 목표 달성까지 동결 유지 시사</text>

  <!-- Historical Fed Day comparison -->
  <text x="24" y="320" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#e2e8f0">역사적 Fed Day S&amp;P500 성과 비교</text>

  <!-- Horizontal bars -->
  <text x="160" y="344" text-anchor="end" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">2026.06.18</text>
  <rect x="166" y="334" width="120" height="18" rx="3" fill="#ef4444" opacity="0.9"/>
  <text x="292" y="347" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#ef4444">-2.8% ★ 최악</text>

  <text x="160" y="370" text-anchor="end" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">2022 평균</text>
  <rect x="166" y="360" width="72" height="18" rx="3" fill="#f97316" opacity="0.7"/>
  <text x="244" y="373" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">-1.7%</text>

  <text x="160" y="396" text-anchor="end" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">2023 평균</text>
  <rect x="166" y="386" width="30" height="18" rx="3" fill="#00e5a0" opacity="0.7"/>
  <text x="202" y="399" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">+0.4%</text>

  <text x="160" y="416" text-anchor="end" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">1994 비교</text>
  <rect x="166" y="406" width="108" height="18" rx="3" fill="#ef4444" opacity="0.6"/>
  <text x="280" y="419" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">-2.5% (이전 최악)</text>

  <!-- Footer -->
  <rect x="0" y="418" width="600" height="42" rx="16" fill="#1e293b" opacity="0.5"/>
  <rect x="0" y="418" width="600" height="16" fill="#1e293b" opacity="0.5"/>
  <text x="300" y="444" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#475569">investus.kr — 연준 금리동결 · 2026.06.18</text>
</svg>
