<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0a0f1e"/><stop offset="100%" stop-color="#0f1a2e"/></linearGradient>
    <linearGradient id="nvg" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#4a7c00"/><stop offset="100%" stop-color="#76b900"/></linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#76b900"/><stop offset="100%" stop-color="#a8e000"/></linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <text x="400" y="35" text-anchor="middle" fill="#76b900" font-size="12" font-family="Arial" font-weight="bold" letter-spacing="3">NVIDIA · 트럼프 개인 매수 공시</text>
  <text x="400" y="60" text-anchor="middle" fill="#e2e8f0" font-size="20" font-family="Arial" font-weight="bold">3,642건 거래 공시 — NVDA $1M+ 개인 매수</text>
  <!-- Left: Trump purchase details -->
  <rect x="30" y="88" width="350" height="300" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="205" y="115" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="Arial" font-weight="bold">트럼프 2026년 공시 내역</text>
  <line x1="50" y1="125" x2="360" y2="125" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <!-- Stock list -->
  <rect x="50" y="138" width="310" height="32" rx="6" fill="rgba(118,185,0,0.12)" stroke="rgba(118,185,0,0.3)" stroke-width="1"/>
  <text x="60" y="157" fill="#76b900" font-size="13" font-family="Arial" font-weight="bold">NVDA</text>
  <text x="160" y="153" fill="#94a3b8" font-size="10" font-family="Arial">Nvidia Corp</text>
  <text x="350" y="157" text-anchor="end" fill="#76b900" font-size="13" font-family="Arial" font-weight="bold">$1M+</text>
  <text x="350" y="170" text-anchor="end" fill="#475569" font-size="10" font-family="Arial">개인 매수</text>
  <rect x="50" y="182" width="310" height="32" rx="6" fill="rgba(96,165,250,0.08)" stroke="rgba(96,165,250,0.2)" stroke-width="1"/>
  <text x="60" y="201" fill="#60a5fa" font-size="13" font-family="Arial" font-weight="bold">NOW</text>
  <text x="160" y="197" fill="#94a3b8" font-size="10" font-family="Arial">ServiceNow</text>
  <text x="350" y="201" text-anchor="end" fill="#60a5fa" font-size="13" font-family="Arial" font-weight="bold">$1M+</text>
  <text x="350" y="214" text-anchor="end" fill="#475569" font-size="10" font-family="Arial">개인 매수</text>
  <text x="60" y="235" fill="#475569" font-size="11" font-family="Arial">+ 3,640개 추가 거래 포함</text>
  <line x1="50" y1="250" x2="360" y2="250" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="205" y="272" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Arial" font-weight="bold">공시 맥락</text>
  <text x="60" y="292" fill="#e2e8f0" font-size="11" font-family="Arial">• 113페이지 공시 문서 (거래 내역)</text>
  <text x="60" y="312" fill="#e2e8f0" font-size="11" font-family="Arial">• 중국 첨단칩 판매 허가 직전 매수</text>
  <text x="60" y="332" fill="#e2e8f0" font-size="11" font-family="Arial">• 행정부 정책과 연동된 타이밍</text>
  <text x="60" y="352" fill="#fbbf24" font-size="11" font-family="Arial" font-weight="bold">• "매우 강세" 시그널 — 시장 해석</text>
  <!-- Right: NVDA price chart -->
  <rect x="400" y="88" width="370" height="300" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(118,185,0,0.2)" stroke-width="1"/>
  <text x="585" y="115" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="Arial" font-weight="bold">NVDA 주가 추이 (2026)</text>
  <!-- Simple price chart -->
  <polyline points="420,268 450,255 480,248 510,260 540,242 570,228 600,215 630,198 660,182 690,175 720,160 750,148" stroke="url(#line)" stroke-width="2.5" fill="none"/>
  <polygon points="420,268 450,255 480,248 510,260 540,242 570,228 600,215 630,198 660,182 690,175 720,160 750,148 750,320 420,320" fill="rgba(118,185,0,0.07)"/>
  <!-- Buy marker -->
  <circle cx="660" cy="182" r="8" fill="rgba(118,185,0,0.3)" stroke="#76b900" stroke-width="2"/>
  <text x="660" y="172" text-anchor="middle" fill="#76b900" font-size="10" font-family="Arial" font-weight="bold">매수</text>
  <line x1="660" y1="182" x2="660" y2="310" stroke="rgba(118,185,0,0.3)" stroke-width="1" stroke-dasharray="3,3"/>
  <!-- Y axis labels -->
  <text x="418" y="162" fill="#475569" font-size="10" font-family="Arial">$200</text>
  <text x="418" y="210" fill="#475569" font-size="10" font-family="Arial">$175</text>
  <text x="418" y="258" fill="#475569" font-size="10" font-family="Arial">$150</text>
  <!-- Bottom note -->
  <text x="585" y="345" text-anchor="middle" fill="#76b900" font-size="14" font-family="Arial" font-weight="bold">트럼프 NVDA 보유 → 정책 수혜 예상</text>
  <!-- Bottom global -->
  <rect x="30" y="405" width="740" height="28" rx="6" fill="rgba(255,255,255,0.02)"/>
  <text x="400" y="424" text-anchor="middle" fill="#475569" font-size="11" font-family="Arial">대통령의 개인 NVDA 매수 = 중국 칩 판매 허가 정책의 선행 지표로 해석</text>
  <text x="400" y="442" text-anchor="middle" fill="#334155" font-size="10" font-family="Arial">SUNRYU Partners CIO · 2026.05.15</text>
</svg>
