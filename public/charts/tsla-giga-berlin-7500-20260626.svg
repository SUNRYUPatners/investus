<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#fca5a5"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <!-- Header -->
  <rect width="1080" height="80" fill="#111318"/>
  <text x="540" y="30" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">TSLA · 기가베를린 생산 확대</text>
  <text x="540" y="62" font-family="Arial,sans-serif" font-size="26" font-weight="bold" fill="#e5e7eb" text-anchor="middle">기가베를린 주간 7,500대 목표 + 신규 채용 1,000명</text>
  <!-- Accent line -->
  <rect y="80" width="1080" height="3" fill="#ef4444"/>
  <!-- HERO: 7,500 -->
  <text x="540" y="200" font-family="Arial,sans-serif" font-size="22" fill="#9ca3af" text-anchor="middle">주간 생산 목표</text>
  <text x="540" y="340" font-family="Arial,sans-serif" font-size="130" font-weight="bold" fill="#ef4444" text-anchor="middle">7,500</text>
  <text x="540" y="395" font-family="Arial,sans-serif" font-size="36" font-weight="bold" fill="#e5e7eb" text-anchor="middle">대 / 주</text>
  <!-- Factory icon -->
  <g transform="translate(80, 115)">
    <!-- Building body -->
    <rect x="0" y="60" width="140" height="100" fill="#1a1117" stroke="#ef4444" stroke-width="2"/>
    <!-- Roof -->
    <polygon points="70,20 0,60 140,60" fill="#ef4444" opacity="0.7"/>
    <!-- Windows -->
    <rect x="15" y="75" width="25" height="20" fill="#ef4444" opacity="0.5"/>
    <rect x="57" y="75" width="25" height="20" fill="#ef4444" opacity="0.5"/>
    <rect x="100" y="75" width="25" height="20" fill="#ef4444" opacity="0.5"/>
    <!-- Door -->
    <rect x="55" y="130" width="30" height="30" fill="#ef4444" opacity="0.3"/>
    <!-- Smokestacks -->
    <rect x="20" y="30" width="12" height="35" fill="#9ca3af" opacity="0.5"/>
    <rect x="40" y="22" width="12" height="43" fill="#9ca3af" opacity="0.5"/>
    <!-- T logo -->
    <text x="70" y="115" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="#ef4444" text-anchor="middle">T</text>
  </g>
  <!-- Germany text -->
  <text x="150" y="260" font-family="Arial,sans-serif" font-size="14" fill="#9ca3af" text-anchor="middle">🇩🇪 Grünheide, Germany</text>
  <!-- Bar chart: Before → Target -->
  <text x="540" y="460" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#e5e7eb" text-anchor="middle">생산 램프업 비교</text>
  <!-- Before bar -->
  <text x="200" y="498" font-family="Arial,sans-serif" font-size="14" fill="#9ca3af" text-anchor="middle">현재</text>
  <rect x="100" y="510" width="200" height="55" rx="6" fill="#374151"/>
  <rect x="100" y="510" width="130" height="55" rx="6" fill="#6b7280"/>
  <text x="200" y="544" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="#e5e7eb" text-anchor="middle">~4,000</text>
  <!-- Arrow -->
  <text x="420" y="548" font-family="Arial,sans-serif" font-size="36" fill="#ef4444" text-anchor="middle">→</text>
  <!-- Target bar -->
  <text x="680" y="498" font-family="Arial,sans-serif" font-size="14" fill="#4ade80" text-anchor="middle">목표</text>
  <rect x="500" y="510" width="360" height="55" rx="6" fill="#374151"/>
  <rect x="500" y="510" width="360" height="55" rx="6" fill="url(#barGrad)"/>
  <text x="680" y="544" font-family="Arial,sans-serif" font-size="26" font-weight="bold" fill="#ffffff" text-anchor="middle">7,500 대/주</text>
  <!-- Growth indicator -->
  <text x="540" y="600" font-family="Arial,sans-serif" font-size="18" fill="#4ade80" text-anchor="middle">약 +87.5% 생산 증가</text>
  <!-- Three stat cards -->
  <rect x="40" y="640" width="305" height="120" rx="12" fill="#1a1117" stroke="#ef4444" stroke-width="2"/>
  <text x="192" y="680" font-family="Arial,sans-serif" font-size="14" fill="#9ca3af" text-anchor="middle">신규 채용</text>
  <text x="192" y="730" font-family="Arial,sans-serif" font-size="52" font-weight="bold" fill="#ef4444" text-anchor="middle">+1,000</text>
  <text x="192" y="754" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">명 추가 고용</text>
  <rect x="388" y="640" width="305" height="120" rx="12" fill="#1a1117" stroke="#ef4444" stroke-width="2"/>
  <text x="540" y="680" font-family="Arial,sans-serif" font-size="14" fill="#9ca3af" text-anchor="middle">연간 생산 목표</text>
  <text x="540" y="730" font-family="Arial,sans-serif" font-size="42" font-weight="bold" fill="#ef4444" text-anchor="middle">390,000+</text>
  <text x="540" y="754" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">대 / 연 (7,500 × 52주)</text>
  <rect x="736" y="640" width="305" height="120" rx="12" fill="#1a1117" stroke="#ef4444" stroke-width="2"/>
  <text x="888" y="680" font-family="Arial,sans-serif" font-size="14" fill="#9ca3af" text-anchor="middle">달성 시기</text>
  <text x="888" y="730" font-family="Arial,sans-serif" font-size="42" font-weight="bold" fill="#4ade80" text-anchor="middle">2026 Q4</text>
  <text x="888" y="754" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">목표 시점</text>
  <!-- Impact section -->
  <rect x="40" y="790" width="1002" height="80" rx="10" fill="#161b22" stroke="#333" stroke-width="1"/>
  <text x="540" y="822" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#e5e7eb" text-anchor="middle">유럽 생산 거점 강화 — 유럽 수요 현지 대응 능력 대폭 향상</text>
  <text x="540" y="850" font-family="Arial,sans-serif" font-size="14" fill="#9ca3af" text-anchor="middle">기가베를린 풀 캐파 도달 시 Tesla 유럽 시장 점유율 확대 기대</text>
  <!-- Footer -->
  <rect y="900" width="1080" height="80" fill="#111318"/>
  <rect y="900" width="1080" height="2" fill="#ef4444"/>
  <text x="540" y="942" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#e5e7eb" text-anchor="middle">기가베를린 7,500대/주 — 유럽 전기차 공급망 주도권 확보</text>
  <text x="540" y="966" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">INVESTUS · 2026.06.26 · 투자 참고용</text>
  <!-- Decorative bottom -->
  <rect y="1000" width="1080" height="60" fill="#0d1117"/>
  <text x="270" y="1037" font-family="Arial,sans-serif" font-size="15" fill="#ef4444" font-weight="bold" text-anchor="middle">TSLA</text>
  <text x="540" y="1037" font-family="Arial,sans-serif" font-size="14" fill="#e5e7eb" text-anchor="middle">기가베를린 · 그뤼나이데 · 독일</text>
  <text x="810" y="1037" font-family="Arial,sans-serif" font-size="14" fill="#4ade80" font-weight="bold" text-anchor="middle">생산 확대 ↑</text>
</svg>