<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0a0f1e"/><stop offset="100%" stop-color="#0f1a2e"/></linearGradient>
    <linearGradient id="rate" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#dc2626"/><stop offset="100%" stop-color="#ef4444"/></linearGradient>
    <linearGradient id="exp" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#1d4ed8"/><stop offset="100%" stop-color="#60a5fa"/></linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <text x="400" y="35" text-anchor="middle" fill="#ef4444" font-size="12" font-family="Arial" font-weight="bold" letter-spacing="3">케빈 워시 연준의장 확정</text>
  <text x="400" y="60" text-anchor="middle" fill="#e2e8f0" font-size="20" font-family="Arial" font-weight="bold">금리 경로 재조정 — 파월 시대의 종료</text>
  <!-- Fed Funds Rate timeline -->
  <text x="55" y="92" fill="#94a3b8" font-size="11" font-family="Arial" font-weight="bold">연방기금금리 경로 시나리오 (%)</text>
  <!-- Grid -->
  <line x1="100" y1="100" x2="700" y2="100" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="100" y1="150" x2="700" y2="150" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="100" y1="200" x2="700" y2="200" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="100" y1="250" x2="700" y2="250" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="100" y1="300" x2="700" y2="300" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- Y axis -->
  <text x="92" y="103" text-anchor="end" fill="#475569" font-size="10" font-family="Arial">6%</text>
  <text x="92" y="153" text-anchor="end" fill="#475569" font-size="10" font-family="Arial">5%</text>
  <text x="92" y="203" text-anchor="end" fill="#475569" font-size="10" font-family="Arial">4%</text>
  <text x="92" y="253" text-anchor="end" fill="#475569" font-size="10" font-family="Arial">3%</text>
  <text x="92" y="303" text-anchor="end" fill="#475569" font-size="10" font-family="Arial">2%</text>
  <!-- Actual rate line (Powell era → Warsh) -->
  <polyline points="110,120 200,120 290,140 380,160 470,170 560,180 650,190 700,185" stroke="#ef4444" stroke-width="2.5" fill="none"/>
  <!-- Market expectation (dovish) - dashed -->
  <polyline points="470,170 560,210 650,245 700,260" stroke="#60a5fa" stroke-width="2" fill="none" stroke-dasharray="6,3"/>
  <!-- Warsh scenario (hawkish) - dotted -->
  <polyline points="470,170 560,175 650,170 700,165" stroke="#fbbf24" stroke-width="2" fill="none" stroke-dasharray="3,3"/>
  <!-- Warsh marker -->
  <circle cx="500" cy="170" r="8" fill="rgba(239,68,68,0.3)" stroke="#ef4444" stroke-width="2"/>
  <text x="500" y="155" text-anchor="middle" fill="#ef4444" font-size="10" font-family="Arial" font-weight="bold">워시 취임</text>
  <!-- X axis labels -->
  <text x="110" y="320" text-anchor="middle" fill="#64748b" font-size="10" font-family="Arial">2023</text>
  <text x="250" y="320" text-anchor="middle" fill="#64748b" font-size="10" font-family="Arial">2024</text>
  <text x="380" y="320" text-anchor="middle" fill="#64748b" font-size="10" font-family="Arial">2025</text>
  <text x="500" y="320" text-anchor="middle" fill="#64748b" font-size="10" font-family="Arial">2026</text>
  <text x="620" y="320" text-anchor="middle" fill="#64748b" font-size="10" font-family="Arial">2027E</text>
  <!-- Legend -->
  <line x1="110" y1="348" x2="140" y2="348" stroke="#ef4444" stroke-width="2"/>
  <text x="148" y="352" fill="#ef4444" font-size="11" font-family="Arial">실제 금리</text>
  <line x1="240" y1="348" x2="270" y2="348" stroke="#60a5fa" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="278" y="352" fill="#60a5fa" font-size="11" font-family="Arial">시장 기대 (인하)</text>
  <line x1="410" y1="348" x2="440" y2="348" stroke="#fbbf24" stroke-width="2" stroke-dasharray="3,3"/>
  <text x="448" y="352" fill="#fbbf24" font-size="11" font-family="Arial">워시 시나리오 (매파)</text>
  <!-- Right info -->
  <rect x="565" y="88" width="210" height="220" rx="10" fill="rgba(239,68,68,0.06)" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
  <text x="670" y="112" text-anchor="middle" fill="#fca5a5" font-size="12" font-family="Arial" font-weight="bold">워시 vs 파월</text>
  <line x1="580" y1="120" x2="760" y2="120" stroke="rgba(239,68,68,0.15)" stroke-width="1"/>
  <text x="580" y="140" fill="#94a3b8" font-size="10" font-family="Arial" font-weight="bold">파월 레거시</text>
  <text x="580" y="157" fill="#e2e8f0" font-size="10" font-family="Arial">• 연착륙 달성</text>
  <text x="580" y="173" fill="#e2e8f0" font-size="10" font-family="Arial">• 인플레 억제 성공</text>
  <text x="580" y="189" fill="#e2e8f0" font-size="10" font-family="Arial">• 3회 금리 인하</text>
  <line x1="580" y1="200" x2="760" y2="200" stroke="rgba(239,68,68,0.1)" stroke-width="1"/>
  <text x="580" y="218" fill="#fbbf24" font-size="10" font-family="Arial" font-weight="bold">워시 예상</text>
  <text x="580" y="235" fill="#e2e8f0" font-size="10" font-family="Arial">• 인하 속도 신중</text>
  <text x="580" y="251" fill="#e2e8f0" font-size="10" font-family="Arial">• 달러 강세 지속</text>
  <text x="580" y="267" fill="#e2e8f0" font-size="10" font-family="Arial">• 금·실물 헤지 유지</text>
  <!-- Bottom -->
  <rect x="55" y="368" width="490" height="52" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="300" y="387" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Arial" font-weight="bold">자산별 대응</text>
  <text x="100" y="407" fill="#ef4444" font-size="10" font-family="Arial">TLT 단기 역풍</text>
  <text x="240" y="407" fill="#f59e0b" font-size="10" font-family="Arial">금 헤지 수요 유지</text>
  <text x="380" y="407" fill="#ef4444" font-size="10" font-family="Arial">달러 강세 압력</text>
  <text x="400" y="435" text-anchor="middle" fill="#334155" font-size="10" font-family="Arial">SUNRYU Partners CIO · 2026.05.14</text>
</svg>
