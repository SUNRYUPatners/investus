  <text x="540" y="922" font-family="Arial, sans-serif" font-size="15" fill="#a08acc" text-anchor="middle">OpenAI는 비영리→영리 전환 과정에서 정부 지원을 확보하기 위한 협상 전략으로 풀이됨</text>
  <text x="540" y="944" font-family="Arial, sans-serif" font-size="13" fill="#6a4a8a" text-anchor="middle">중국 AI 경쟁 대응 차원 · Sam Altman: 미 정부 파트너십 강화 의도</text>

  <rect x="60" y="1016" width="960" height="4" fill="url(#purpleGrad)" rx="2" opacity="0.5"/>
  <text x="540" y="1055" font-family="Arial, sans-serif" font-size="18" fill="#5a4a7a" text-anchor="middle">investus.kr  SRP Chief Investment Officer</text>
