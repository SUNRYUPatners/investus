<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 440" width="600" height="440">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#0a1018"/>
    </linearGradient>
  </defs>
  <rect width="600" height="440" fill="url(#bg3)" rx="16"/>

  <!-- Header -->
  <rect x="20" y="18" width="90" height="26" rx="6" fill="#00e5a0" opacity="0.2"/>
  <text x="65" y="36" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#00e5a0">TSLA</text>
  <text x="122" y="36" font-family="Arial,sans-serif" font-size="13" fill="#94a3b8">2026.06.16</text>
  <text x="600" y="36" text-anchor="end" font-family="Arial,sans-serif" font-size="11" fill="#475569">Giga Shanghai</text>

  <!-- Title -->
  <text x="300" y="76" text-anchor="middle" font-family="Arial,sans-serif" font-size="19" font-weight="700" fill="#f1f5f9">기가 상하이 2026년 5월</text>
  <text x="300" y="100" text-anchor="middle" font-family="Arial,sans-serif" font-size="19" font-weight="700" fill="#00e5a0">전월 모두 전년 동기 초과</text>

  <rect x="40" y="114" width="520" height="1" fill="#1e3a2f" opacity="0.8"/>

  <!-- Status badge -->
  <rect x="180" y="126" width="240" height="40" rx="10" fill="#00e5a0" opacity="0.12"/>
  <text x="300" y="152" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#00e5a0">YoY 모든 월 역대 최고 갱신 중</text>

  <!-- Bar chart: 2025 vs 2026 monthly (conceptual) -->
  <text x="40" y="188" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#64748b">월별 생산량 비교 (2025 vs 2026)</text>

  <!-- Chart area -->
  <rect x="40" y="196" width="520" height="140" rx="6" fill="#0d1a26" opacity="0.6"/>

  <!-- Y axis label -->
  <text x="48" y="216" font-family="Arial,sans-serif" font-size="10" fill="#475569">높음</text>
  <text x="48" y="326" font-family="Arial,sans-serif" font-size="10" fill="#475569">낮음</text>

  <!-- Months -->
  <text x="105" y="348" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#64748b">1월</text>
  <text x="175" y="348" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#64748b">2월</text>
  <text x="245" y="348" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#64748b">3월</text>
  <text x="315" y="348" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#64748b">4월</text>
  <text x="385" y="348" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#64748b">5월</text>

  <!-- 2025 bars (shorter) -->
  <rect x="82" y="266" width="24" height="64" rx="3" fill="#334155" opacity="0.8"/>
  <rect x="152" y="256" width="24" height="74" rx="3" fill="#334155" opacity="0.8"/>
  <rect x="222" y="248" width="24" height="82" rx="3" fill="#334155" opacity="0.8"/>
  <rect x="292" y="258" width="24" height="72" rx="3" fill="#334155" opacity="0.8"/>
  <rect x="362" y="252" width="24" height="78" rx="3" fill="#334155" opacity="0.8"/>

  <!-- 2026 bars (taller — all beating 2025) -->
  <rect x="110" y="236" width="24" height="94" rx="3" fill="#00e5a0" opacity="0.75"/>
  <rect x="180" y="224" width="24" height="106" rx="3" fill="#00e5a0" opacity="0.75"/>
  <rect x="250" y="214" width="24" height="116" rx="3" fill="#00e5a0" opacity="0.75"/>
  <rect x="320" y="226" width="24" height="104" rx="3" fill="#00e5a0" opacity="0.75"/>
  <rect x="390" y="210" width="24" height="120" rx="3" fill="#00e5a0" opacity="0.85"/>
  <!-- 5월 highlight -->
  <rect x="390" y="210" width="24" height="120" rx="3" fill="none" stroke="#00e5a0" stroke-width="1.5"/>

  <!-- Legend -->
  <rect x="420" y="200" width="12" height="10" rx="2" fill="#334155" opacity="0.8"/>
  <text x="436" y="210" font-family="Arial,sans-serif" font-size="10" fill="#64748b">2025</text>
  <rect x="420" y="216" width="12" height="10" rx="2" fill="#00e5a0" opacity="0.75"/>
  <text x="436" y="226" font-family="Arial,sans-serif" font-size="10" fill="#00e5a0">2026</text>

  <!-- Key takeaways -->
  <rect x="40" y="362" width="4" height="16" rx="2" fill="#00e5a0"/>
  <text x="52" y="374" font-family="Arial,sans-serif" font-size="12" fill="#e2e8f0">2026년 1~5월 전 달이 전년 동기 대비 초과 달성</text>

  <rect x="40" y="386" width="4" height="16" rx="2" fill="#00e5a0"/>
  <text x="52" y="398" font-family="Arial,sans-serif" font-size="12" fill="#e2e8f0">5월이 올해 최고치 — 추세 가속화 중</text>

  <rect x="40" y="410" width="4" height="16" rx="2" fill="#00e5a0"/>
  <text x="52" y="422" font-family="Arial,sans-serif" font-size="12" fill="#e2e8f0">Q2 전체 배송 상향 가능성 높아짐</text>
</svg>
