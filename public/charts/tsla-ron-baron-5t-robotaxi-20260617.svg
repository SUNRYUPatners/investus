  <rect x="40" y="354" width="115" height="56" rx="8" fill="#1e293b" opacity="0.8"/>
  <text x="97" y="374" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#00e5a0" font-weight="700">오스틴</text>
  <text x="97" y="392" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="900" fill="#e2e8f0">1st</text>
  <text x="97" y="406" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#64748b">최초 운영 시작</text>

  <rect x="163" y="354" width="115" height="56" rx="8" fill="#1e293b" opacity="0.8"/>
  <text x="220" y="374" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#00e5a0" font-weight="700">댈러스</text>
  <text x="220" y="392" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="900" fill="#e2e8f0">+</text>
  <text x="220" y="406" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#64748b">2차 도시</text>

  <rect x="286" y="354" width="115" height="56" rx="8" fill="#1e293b" opacity="0.8"/>
  <text x="343" y="374" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#00e5a0" font-weight="700">휴스턴</text>
  <text x="343" y="392" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="900" fill="#e2e8f0">+</text>
  <text x="343" y="406" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#64748b">3차 도시</text>

  <rect x="409" y="354" width="150" height="56" rx="8" fill="#1e293b" opacity="0.8"/>
  <text x="484" y="374" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#00e5a0" font-weight="700">샌안토니오</text>
  <text x="484" y="392" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="900" fill="#e2e8f0">+</text>
  <text x="484" y="406" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#64748b">4차 도시</text>

  <!-- Total -->
  <rect x="40" y="420" width="520" height="30" rx="8" fill="#00e5a0" opacity="0.1"/>
  <text x="300" y="440" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#00e5a0">총 725대 FSD Supervised 운영 중 (감독자 동승)</text>

  <text x="300" y="462" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#475569">Source: Whole Mars Catalog / Ron Baron CNBC 2026.06.17</text>
</svg>
