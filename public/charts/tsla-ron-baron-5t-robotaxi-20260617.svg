  <text x="536" y="277" text-anchor="end" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#00e5a0">$4~5T</text>

  <text x="40" y="304" font-family="Arial,sans-serif" font-size="12" fill="#94a3b8">현재 대비 업사이드</text>
  <text x="536" y="305" text-anchor="end" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#00e5a0">+4~5x</text>

  <rect x="40" y="320" width="520" height="1" fill="#1e293b"/>

