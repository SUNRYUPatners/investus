<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c10"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>

  <rect width="1080" height="90" fill="#0d1117"/>
  <text x="540" y="32" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle" letter-spacing="3">INVESTUS DAILY REPORT</text>
  <text x="540" y="70" font-family="Arial,sans-serif" font-size="28" font-weight="bold" fill="#e5e7eb" text-anchor="middle">AAPL · 중국 칩 구매 트럼프 승인 요청</text>
  <rect y="90" width="1080" height="3" fill="#a78bfa"/>

  <rect x="30" y="108" width="160" height="36" rx="18" fill="rgba(167,139,250,0.12)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="110" y="131" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#a78bfa" text-anchor="middle">2026. 06. 30</text>
  <rect x="210" y="108" width="140" height="36" rx="18" fill="rgba(167,139,250,0.08)"/>
  <text x="280" y="131" font-family="Arial,sans-serif" font-size="12" fill="#a78bfa" text-anchor="middle">종목분석 · AAPL</text>

  <!-- Main story -->
  <rect x="30" y="162" width="1020" height="170" rx="20" fill="#1a1025" stroke="#a78bfa" stroke-width="2"/>
  <text x="55" y="202" font-family="Arial,sans-serif" font-size="13" fill="#a78bfa" font-weight="bold">🍎 AAPL · Financial Times 단독 보도</text>
  <text x="55" y="238" font-family="Arial,sans-serif" font-size="16" fill="#e5e7eb">Apple이 트럼프 행정부에 중국 CATI(칩 제조업체)로부터 칩 구매</text>
  <text x="55" y="266" font-family="Arial,sans-serif" font-size="16" fill="#e5e7eb">승인을 공식 요청하고 있다 — 규모 약 $10B</text>
  <text x="55" y="302" font-family="Arial,sans-serif" font-size="13" fill="#ef4444">⚠ 이슈: CATI가 중국 군사 연계 의혹으로 미국 수출 제한 기업</text>
  <text x="55" y="322" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af">Source: Financial Times</text>

  <!-- 3 cards -->
  <rect x="30" y="352" width="310" height="200" rx="16" fill="#1a1025" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="185" y="386" font-family="Arial,sans-serif" font-size="13" fill="#a78bfa" text-anchor="middle" font-weight="bold">📦 규모</text>
  <text x="185" y="448" font-family="Arial,sans-serif" font-size="52" font-weight="bold" fill="#a78bfa" text-anchor="middle">$10B</text>
  <text x="185" y="488" font-family="Arial,sans-serif" font-size="14" fill="#e5e7eb" text-anchor="middle">칩 구매 규모</text>
  <text x="185" y="514" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">CATI 중국 칩 메이커</text>
  <text x="185" y="538" font-family="Arial,sans-serif" font-size="11" fill="#a78bfa" text-anchor="middle">PENDING APPROVAL</text>

  <rect x="360" y="352" width="310" height="200" rx="16" fill="#1a0808" stroke="#ef4444" stroke-width="1.5"/>
  <text x="515" y="386" font-family="Arial,sans-serif" font-size="13" fill="#ef4444" text-anchor="middle" font-weight="bold">⚠ 리스크</text>
  <text x="515" y="428" font-family="Arial,sans-serif" font-size="15" fill="#e5e7eb" text-anchor="middle">CATI</text>
  <text x="515" y="458" font-family="Arial,sans-serif" font-size="15" fill="#ef4444" text-anchor="middle">중국군 연계</text>
  <text x="515" y="490" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">미국 수출 제한 기업</text>
  <text x="515" y="516" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">승인 거부 시 공급망 위기</text>
  <text x="515" y="540" font-family="Arial,sans-serif" font-size="11" fill="#ef4444" text-anchor="middle">HIGH RISK ⚠</text>

  <rect x="690" y="352" width="360" height="200" rx="16" fill="#0f1a0f" stroke="#4ade80" stroke-width="1.5"/>
  <text x="870" y="386" font-family="Arial,sans-serif" font-size="13" fill="#4ade80" text-anchor="middle" font-weight="bold">✓ 배경</text>
  <text x="870" y="428" font-family="Arial,sans-serif" font-size="14" fill="#e5e7eb" text-anchor="middle">AI 칩 수요 폭증</text>
  <text x="870" y="458" font-family="Arial,sans-serif" font-size="14" fill="#e5e7eb" text-anchor="middle">→ 공급망 다변화</text>
  <text x="870" y="488" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">TSMC 의존도 감소</text>
  <text x="870" y="514" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">비용 절감 목적도 포함</text>
  <text x="870" y="538" font-family="Arial,sans-serif" font-size="11" fill="#4ade80" text-anchor="middle">SUPPLY DIVERSIFY</text>

  <!-- Analysis -->
  <rect x="30" y="572" width="1020" height="190" rx="16" fill="#111318" stroke="#1e2028" stroke-width="1"/>
  <text x="55" y="604" font-family="Arial,sans-serif" font-size="12" fill="#6b7280" font-weight="bold" letter-spacing="2">시나리오 분석</text>
  <line x1="55" y1="614" x2="1050" y2="614" stroke="#1e2028" stroke-width="1"/>

  <text x="70" y="648" font-family="Arial,sans-serif" font-size="14" fill="#4ade80" font-weight="bold">✓ 승인 시</text>
  <text x="200" y="648" font-family="Arial,sans-serif" font-size="14" fill="#e5e7eb">AAPL 칩 비용 절감 + AI 디바이스 원가 경쟁력 강화 → 주가 긍정</text>

  <text x="70" y="682" font-family="Arial,sans-serif" font-size="14" fill="#ef4444" font-weight="bold">✗ 거부 시</text>
  <text x="200" y="682" font-family="Arial,sans-serif" font-size="14" fill="#e5e7eb">공급망 제약 → 단기 공급 부족 + AI iPhone 출시 지연 가능</text>

  <text x="70" y="716" font-family="Arial,sans-serif" font-size="14" fill="#a78bfa" font-weight="bold">→ 시사점</text>
  <text x="200" y="716" font-family="Arial,sans-serif" font-size="14" fill="#e5e7eb">미·중 반도체 갈등 속 Apple의 중국 의존 딜레마 재부각</text>

  <text x="70" y="750" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af">※ S&amp;P 500 비중 7.5%→6.19% 하락 + 이번 이슈 → 단기 불확실성 확대</text>

  <rect y="780" width="1080" height="2" fill="#a78bfa"/>
  <rect y="782" width="1080" height="78" fill="#0d1117"/>
  <text x="540" y="824" font-family="Arial,sans-serif" font-size="17" font-weight="bold" fill="#e5e7eb" text-anchor="middle">$10B 중국 칩 승인 요청 — 미·중 반도체 갈등 속 Apple 딜레마</text>
  <text x="540" y="850" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">INVESTUS · 2026.06.30 · 투자 참고용</text>
</svg>
