<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" font-family="'Segoe UI',Arial,sans-serif">
  <!-- Background -->
  <rect width="800" height="430" fill="#0a0f1e"/>

  <!-- Header y:0-68 -->
  <rect x="0" y="0" width="800" height="68" fill="#0d1528"/>
  <rect x="0" y="0" width="6" height="68" fill="#fb923c"/>
  <text x="24" y="36" font-size="20" font-weight="700" fill="#fb923c">OpenAI IPO 확률 급등 — $750억+ 밸류에이션</text>
  <text x="24" y="54" font-size="12" fill="#94a3b8">OpenAI IPO · Valuation · AI Unicorn · 2026</text>

  <!-- Probability gauge y:80-185 -->
  <rect x="40" y="80" width="720" height="105" rx="12" fill="#0d1a2b" stroke="#fb923c" stroke-width="1.5"/>

  <!-- Previous odds pill -->
  <rect x="80" y="103" width="150" height="44" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="155" y="121" font-size="11" fill="#64748b" text-anchor="middle">이전 확률</text>
  <text x="155" y="142" font-size="22" font-weight="800" fill="#94a3b8" text-anchor="middle">~45%</text>

  <!-- Arrow -->
  <text x="290" y="132" font-size="32" fill="#fb923c" text-anchor="middle">→</text>

  <!-- Current odds pill -->
  <rect x="340" y="100" width="180" height="56" rx="10" fill="#1a1000" stroke="#fb923c" stroke-width="2"/>
  <text x="430" y="120" font-size="11" fill="#fb923c" text-anchor="middle">현재 확률 (급등)</text>
  <text x="430" y="148" font-size="30" font-weight="900" fill="#fb923c" text-anchor="middle">↑ 70%+</text>

  <!-- Label -->
  <text x="600" y="130" font-size="13" fill="#e2e8f0" text-anchor="middle">IPO 성사 가능성</text>
  <text x="600" y="150" font-size="11" fill="#64748b" text-anchor="middle">$750억+ 밸류에이션</text>
  <text x="600" y="168" font-size="11" fill="#64748b" text-anchor="middle">기준 시나리오</text>

  <!-- Valuation Comparison y:200-310 -->
  <text x="400" y="215" font-size="12" fill="#64748b" text-anchor="middle">주요 AI 기업 밸류에이션 비교</text>

  <!-- Bar chart: label in [40,200], bar starts x=210, max width=490 -->
  <!-- OpenAI $150B+ -->
  <text x="205" y="244" font-size="12" fill="#e2e8f0" text-anchor="end">OpenAI</text>
  <rect x="210" y="230" width="490" height="30" rx="6" fill="#fb923c"/>
  <text x="708" y="250" font-size="11" font-weight="700" fill="#fff" text-anchor="start"> $1,500억+</text>

  <!-- Anthropic $65B -->
  <text x="205" y="286" font-size="12" fill="#e2e8f0" text-anchor="end">Anthropic</text>
  <rect x="210" y="272" width="212" height="30" rx="6" fill="#c084fc"/>
  <text x="430" y="292" font-size="11" font-weight="700" fill="#fff" text-anchor="start"> $650억</text>

  <!-- xAI $50B -->
  <text x="205" y="326" font-size="12" fill="#e2e8f0" text-anchor="end">xAI</text>
  <rect x="210" y="312" width="163" height="30" rx="6" fill="#60a5fa"/>
  <text x="381" y="332" font-size="11" font-weight="700" fill="#fff" text-anchor="start"> $500억</text>

  <!-- Key Factors y:350-405 -->
  <text x="400" y="358" font-size="12" fill="#64748b" text-anchor="middle">IPO 촉진 요인</text>

  <!-- 3 bullet boxes -->
  <rect x="40" y="363" width="218" height="38" rx="8" fill="#1a1000" stroke="#fb923c" stroke-width="1"/>
  <text x="149" y="386" font-size="11" fill="#fb923c" text-anchor="middle">Claude/GPT 매출 성장 가속</text>

  <rect x="291" y="363" width="218" height="38" rx="8" fill="#1a1000" stroke="#fb923c" stroke-width="1"/>
  <text x="400" y="386" font-size="11" fill="#fb923c" text-anchor="middle">기관 투자자 수요 확인</text>

  <rect x="542" y="363" width="218" height="38" rx="8" fill="#1a1000" stroke="#fb923c" stroke-width="1"/>
  <text x="651" y="386" font-size="11" fill="#fb923c" text-anchor="middle">2026 IPO 시장 환경 우호적</text>

  <!-- Source -->
  <text x="400" y="420" font-size="11" fill="#475569" text-anchor="middle">investus.kr</text>
</svg>
