  <rect x="30" y="278" width="280" height="6" rx="3" fill="#c084fc"/>
  <text x="98" y="300" fill="#c084fc" font-size="10" text-anchor="middle">2026 H2</text>
  <rect x="326" y="278" width="136" height="6" fill="#4ade80"/>
  <text x="394" y="300" fill="#4ade80" font-size="10" text-anchor="middle">2027</text>
  <rect x="622" y="278" width="148" height="6" rx="3" fill="#fb923c"/>
  <text x="696" y="300" fill="#fb923c" font-size="10" text-anchor="middle">2028</text>

  <!-- summary boxes -->
  <rect x="30" y="318" width="350" height="76" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)"/>
  <text x="50" y="342" fill="rgba(255,255,255,0.5)" font-size="11" font-weight="700">핵심 메시지</text>
  <text x="50" y="362" fill="white" font-size="13" font-weight="600">H2 2026: 스타십 V3 + 광대역 V3 동시 출격</text>
  <text x="50" y="382" fill="rgba(255,255,255,0.5)" font-size="12">지상 컴퓨팅(400MW+) + 위성 AI 컴퓨팅(2028)</text>

