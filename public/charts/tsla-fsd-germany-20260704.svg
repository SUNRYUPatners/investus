  <text x="720" y="798" font-family="Arial, sans-serif" font-size="11" fill="#4a6f5a" text-anchor="middle">2026.06</text>
  <circle cx="900" cy="760" r="10" fill="#00d68f" filter="url(#glow)"/>
  <text x="900" y="782" font-family="Arial Black, Arial" font-weight="900" font-size="13" fill="#00d68f" text-anchor="middle">독일 🇩🇪</text>
  <text x="900" y="798" font-family="Arial, sans-serif" font-size="11" fill="#5aaa7a" text-anchor="middle">2026.07 ★</text>

  <text x="540" y="830" font-family="Arial, sans-serif" font-size="14" fill="#4a6f5a" text-anchor="middle">EU 규제 승인 → 유럽 27개국 연쇄 출시 가능 · FSD 구독 수익 글로벌 확대 기대</text>

  <rect x="60" y="860" width="960" height="70" rx="12" fill="#0f2a1e" stroke="#00d68f" stroke-width="1" stroke-opacity="0.25"/>
  <text x="540" y="888" font-family="Arial, sans-serif" font-size="16" fill="#8ab89a" text-anchor="middle">투자 포인트: FSD Supervised → FSD Unsupervised 전환 시 유럽 구독 수익 폭발적 성장 기대</text>
  <text x="540" y="912" font-family="Arial, sans-serif" font-size="14" fill="#6a9a7a" text-anchor="middle">독일 = 유럽 최대 자동차 시장 · BMW·벤츠·폭스바겐 홈 마켓에서 FSD 서비스 개시</text>

  <rect x="60" y="948" width="960" height="4" fill="url(#mintGrad)" rx="2" opacity="0.5"/>
  <text x="540" y="988" font-family="Arial, sans-serif" font-size="18" fill="#3a6a4a" text-anchor="middle">investus.kr  SRP Chief Investment Officer</text>
