<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#0c0f1a"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="hw3Bar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#7f1d1d"/>
    </linearGradient>
    <linearGradient id="hw4Bar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#1e3a8a"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect width="1080" height="1080" fill="none" stroke="#1f2937" stroke-width="2"/>
  <rect x="0" y="0" width="1080" height="4" fill="url(#redGrad)"/>

  <!-- Header -->
  <text x="540" y="62" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#6b7280" text-anchor="middle" letter-spacing="3">INVESTUS DAILY REPORT</text>
  <text x="540" y="102" font-family="Arial,sans-serif" font-size="28" font-weight="900" fill="#f9fafb" text-anchor="middle">TSLA · FSD HW3 메모리 한계 1/18</text>

  <rect x="396" y="118" width="288" height="34" rx="17" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="540" y="140" font-family="Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" text-anchor="middle" letter-spacing="2">2026.07.01</text>

  <!-- Hero stat -->
  <text x="540" y="270" font-family="Arial Black,Arial,sans-serif" font-size="130" font-weight="900" fill="#ef4444" text-anchor="middle" filter="url(#softGlow)" opacity="0.12">1/18</text>
  <text x="540" y="270" font-family="Arial Black,Arial,sans-serif" font-size="130" font-weight="900" fill="#ef4444" text-anchor="middle">1/18</text>

  <text x="540" y="306" font-family="Arial,sans-serif" font-size="17" fill="#9ca3af" text-anchor="middle" letter-spacing="2">HW3 vs HW4 메모리 대역폭 비율</text>

  <!-- Bar comparison -->
  <text x="160" y="358" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#6b7280" letter-spacing="2">MEMORY BANDWIDTH COMPARISON</text>
  <line x1="160" y1="500" x2="920" y2="500" stroke="#374151" stroke-width="1"/>
  <line x1="160" y1="370" x2="160" y2="500" stroke="#374151" stroke-width="1"/>

  <!-- HW3 bar - 1/18 = ~5.6% -->
  <rect x="210" y="458" width="80" height="42" rx="4" fill="url(#hw3Bar)"/>
  <text x="250" y="452" font-family="Arial,sans-serif" font-size="12" fill="#ef4444" text-anchor="middle">HW3</text>
  <text x="250" y="520" font-family="Arial Black,sans-serif" font-size="15" fill="#ef4444" text-anchor="middle">1×</text>

  <!-- HW4 bar - 18x -->
  <rect x="450" y="375" width="80" height="125" rx="4" fill="url(#hw4Bar)"/>
  <text x="490" y="368" font-family="Arial,sans-serif" font-size="12" fill="#60a5fa" text-anchor="middle">HW4</text>
  <text x="490" y="520" font-family="Arial Black,sans-serif" font-size="15" fill="#60a5fa" text-anchor="middle">18×</text>

  <!-- Labels between bars -->
  <text x="690" y="430" font-family="Arial Black,sans-serif" font-size="44" font-weight="900" fill="#f59e0b" text-anchor="middle">18×</text>
  <text x="690" y="460" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">더 빠른 메모리</text>
  <text x="690" y="476" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">더 높은 추론 품질</text>

  <!-- Divider -->
  <line x1="80" y1="538" x2="1000" y2="538" stroke="#1f2937" stroke-width="1"/>

  <!-- Three comparison cards -->
  <rect x="80" y="556" width="280" height="140" rx="12" fill="#0f172a" stroke="#7f1d1d" stroke-width="1.5"/>
  <text x="220" y="584" font-family="Arial,sans-serif" font-size="12" fill="#ef4444" text-anchor="middle" letter-spacing="1">HW3 · 구형</text>
  <rect x="110" y="594" width="180" height="3" rx="2" fill="#ef4444" opacity="0.4"/>
  <text x="220" y="628" font-family="Arial Black,sans-serif" font-size="22" font-weight="900" fill="#ef4444" text-anchor="middle">LIMITED</text>
  <text x="220" y="654" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">메모리 대역폭 1x</text>
  <text x="220" y="670" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">저해상도 카메라</text>
  <text x="220" y="686" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">LLM 제한 동작</text>

  <rect x="400" y="556" width="280" height="140" rx="12" fill="#0f172a" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="540" y="584" font-family="Arial,sans-serif" font-size="12" fill="#60a5fa" text-anchor="middle" letter-spacing="1">HW4 · 최신</text>
  <rect x="430" y="594" width="180" height="3" rx="2" fill="#60a5fa" opacity="0.4"/>
  <text x="540" y="628" font-family="Arial Black,sans-serif" font-size="22" font-weight="900" fill="#60a5fa" text-anchor="middle">OPTIMIZED</text>
  <text x="540" y="654" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">메모리 대역폭 18x</text>
  <text x="540" y="670" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">고해상도 카메라</text>
  <text x="540" y="686" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">FSD V4.1 풀 성능</text>

  <rect x="720" y="556" width="280" height="140" rx="12" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="860" y="584" font-family="Arial,sans-serif" font-size="12" fill="#f59e0b" text-anchor="middle" letter-spacing="1">권고 사항</text>
  <rect x="750" y="594" width="180" height="3" rx="2" fill="#f59e0b" opacity="0.4"/>
  <text x="860" y="628" font-family="Arial Black,sans-serif" font-size="20" font-weight="900" fill="#f59e0b" text-anchor="middle">UPGRADE</text>
  <text x="860" y="654" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">HW3 → HW4</text>
  <text x="860" y="670" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">강력 권고</text>
  <text x="860" y="686" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">Strongly Recommended</text>

  <!-- Upgrade path arrow -->
  <rect x="80" y="720" width="920" height="80" rx="12" fill="#1f1100" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="220" y="758" font-family="Arial Black,sans-serif" font-size="30" font-weight="900" fill="#ef4444" text-anchor="middle">HW3</text>
  <text x="540" y="762" font-family="Arial,sans-serif" font-size="42" fill="#f59e0b" text-anchor="middle">→</text>
  <text x="860" y="758" font-family="Arial Black,sans-serif" font-size="30" font-weight="900" fill="#60a5fa" text-anchor="middle">HW4</text>
  <text x="540" y="790" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">업그레이드 경로 · Upgrade Path</text>

  <!-- FSD version note -->
  <rect x="80" y="820" width="920" height="50" rx="10" fill="#0f172a" stroke="#1f2937" stroke-width="1"/>
  <text x="540" y="850" font-family="Arial,sans-serif" font-size="14" fill="#9ca3af" text-anchor="middle">FSD V4.1 · HW3에서 동작하나 HW4 대비 추론 품질 제한 · Camera Resolution Gap</text>

  <text x="540" y="920" font-family="Arial,sans-serif" font-size="13" fill="#374151" text-anchor="middle">Tesla FSD HW3 vs HW4 Memory Bandwidth 1/18 · 2026.07.01</text>

  <rect x="0" y="1060" width="1080" height="20" fill="url(#redGrad)" opacity="0.4"/>
  <text x="540" y="1073" font-family="Arial,sans-serif" font-size="10" fill="#6b7280" text-anchor="middle" letter-spacing="2">INVESTUS · TSLA RESEARCH · NOT FINANCIAL ADVICE</text>
</svg>
