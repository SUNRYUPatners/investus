<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 440">
  <rect width="480" height="440" fill="#0a0c10"/>
  <rect x="0" y="0" width="480" height="56" fill="#111318"/>
  <rect x="0" y="52" width="480" height="2" fill="#60a5fa" opacity="0.5"/>
  <text x="24" y="24" font-family="Arial,sans-serif" font-size="11" fill="#60a5fa" font-weight="bold">종목분석 · NVDA</text>
  <text x="24" y="44" font-family="Arial,sans-serif" font-size="13" fill="#e5e7eb" font-weight="bold">SaaS 논제 역전 — AI 에이전트 = GPU 수요 확대</text>

  <!-- Main message -->
  <rect x="24" y="68" width="432" height="96" rx="12" fill="#0c1a2e" stroke="#60a5fa" stroke-width="1.5" stroke-opacity="0.8"/>
  <text x="240" y="104" font-family="Arial,sans-serif" font-size="16" fill="#9ca3af" text-anchor="middle">시장 우려 vs. 젠슨 황의 반박</text>
  <text x="240" y="132" font-family="Arial,sans-serif" font-size="20" fill="#f87171" font-weight="bold" text-anchor="middle">SaaS 죽는다 → GPU 덜 필요?</text>
  <text x="240" y="156" font-family="Arial,sans-serif" font-size="20" fill="#4ade80" font-weight="bold" text-anchor="middle">틀렸다 → GPU 더 필요!</text>

  <!-- Logic flow -->
  <rect x="24" y="176" width="432" height="100" rx="10" fill="#111318"/>
  <text x="40" y="200" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af">왜 GPU 수요가 증가하나?</text>
  <text x="40" y="222" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">기업이 자체 AI 모델 → NO. SW 툴 쓰는 AI 에이전트 배포</text>
  <text x="40" y="242" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">AI 에이전트가 SW 도구 사용 → SW 업체 GPU 수요 증가</text>
  <text x="40" y="262" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">NVDA: 이미 이 현상 목격 중 (실제 데이터 확인)</text>

  <!-- Who gets hurt vs who wins -->
  <rect x="24" y="288" width="204" height="80" rx="10" fill="#1a0505"/>
  <text x="40" y="312" font-family="Arial,sans-serif" font-size="11" fill="#f87171">SaaS 손해 업체</text>
  <text x="40" y="334" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af">STRL · ENOVA · IQHV</text>
  <text x="40" y="354" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af">투자자들이 매도 중</text>

  <rect x="244" y="288" width="212" height="80" rx="10" fill="#0a1a0a"/>
  <text x="260" y="312" font-family="Arial,sans-serif" font-size="11" fill="#4ade80">GPU 수혜</text>
  <text x="260" y="334" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">NVDA · AMD · TSMC</text>
  <text x="260" y="354" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af">에이전트 붐 = 인프라 붐</text>

  <text x="240" y="430" font-family="Arial,sans-serif" font-size="10" fill="#4b5563" text-anchor="middle">2026.06.19 · Investus · 참고용</text>
</svg>
