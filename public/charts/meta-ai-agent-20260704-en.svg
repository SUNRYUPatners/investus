  <text x="540" y="392" font-family="Arial Black, Arial" font-weight="900" font-size="18" fill="#7dd3fc" text-anchor="middle">HAS NOT ACCELERATED IN THE WAY WE EXPECTED"</text>
  <text x="900" y="422" font-family="Arial, sans-serif" font-size="13" fill="#4a7a9a" text-anchor="end">— Mark Zuckerberg, Internal Town Hall</text>

  <rect x="60" y="452" width="300" height="240" rx="16" fill="#0a1020" stroke="#0ea5e9" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="210" y="496" font-family="Arial Black, Arial" font-weight="900" font-size="20" fill="#7dd3fc" text-anchor="middle">Context</text>
  <text x="210" y="524" font-family="Arial, sans-serif" font-size="14" fill="#38bdf8" text-anchor="middle">4 months of AI agent work</text>
  <text x="210" y="546" font-family="Arial, sans-serif" font-size="14" fill="#38bdf8" text-anchor="middle">Progress slower than expected</text>
  <text x="210" y="568" font-family="Arial, sans-serif" font-size="13" fill="#4a7a9a" text-anchor="middle">Zuckerberg admitted directly</text>
  <text x="210" y="590" font-family="Arial, sans-serif" font-size="13" fill="#4a7a9a" text-anchor="middle">Internal town hall disclosure</text>
  <text x="210" y="614" font-family="Arial, sans-serif" font-size="12" fill="#3a5a7a" text-anchor="middle">Reflects AI competition pressure</text>
  <text x="210" y="636" font-family="Arial, sans-serif" font-size="12" fill="#3a5a7a" text-anchor="middle">vs OpenAI·Google</text>
  <text x="210" y="658" font-family="Arial, sans-serif" font-size="11" fill="#2a4a6a" text-anchor="middle">Internal tension signal</text>
  <text x="210" y="676" font-family="Arial, sans-serif" font-size="11" fill="#2a4a6a" text-anchor="middle">Resource reallocation likely</text>

