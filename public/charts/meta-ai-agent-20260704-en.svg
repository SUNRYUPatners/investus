  <text x="540" y="524" font-family="Arial, sans-serif" font-size="14" fill="#38bdf8" text-anchor="middle">AI agent credibility hit</text>
  <text x="540" y="546" font-family="Arial, sans-serif" font-size="14" fill="#38bdf8" text-anchor="middle">Short-term downside pressure</text>
  <text x="540" y="568" font-family="Arial, sans-serif" font-size="13" fill="#4a7a9a" text-anchor="middle">META AI strategy re-rated</text>
  <text x="540" y="590" font-family="Arial, sans-serif" font-size="13" fill="#4a7a9a" text-anchor="middle">Relative underperformance</text>
  <text x="540" y="614" font-family="Arial, sans-serif" font-size="12" fill="#3a5a7a" text-anchor="middle">Ads AI impact limited</text>
  <text x="540" y="636" font-family="Arial, sans-serif" font-size="12" fill="#3a5a7a" text-anchor="middle">Agents ≠ ad business</text>
  <text x="540" y="658" font-family="Arial, sans-serif" font-size="11" fill="#2a4a6a" text-anchor="middle">Near-term risk factor</text>
  <text x="540" y="676" font-family="Arial, sans-serif" font-size="11" fill="#2a4a6a" text-anchor="middle">Monitor medium-term direction</text>

