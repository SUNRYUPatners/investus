<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f14"/>
      <stop offset="100%" style="stop-color:#0a0a1a"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#0369a1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <line x1="0" y1="360" x2="1080" y2="360" stroke="#0ea5e9" stroke-width="0.3" stroke-opacity="0.08"/>
  <line x1="0" y1="720" x2="1080" y2="720" stroke="#0ea5e9" stroke-width="0.3" stroke-opacity="0.08"/>
  <line x1="360" y1="0" x2="360" y2="1080" stroke="#0ea5e9" stroke-width="0.3" stroke-opacity="0.08"/>
  <line x1="720" y1="0" x2="720" y2="1080" stroke="#0ea5e9" stroke-width="0.3" stroke-opacity="0.08"/>

  <rect x="60" y="60" width="960" height="4" fill="url(#blueGrad)" rx="2"/>
  <rect x="60" y="90" width="100" height="36" rx="8" fill="#0ea5e9"/>
  <text x="110" y="114" font-family="Arial Black, Arial" font-weight="900" font-size="16" fill="#ffffff" text-anchor="middle">META</text>
  <rect x="174" y="90" width="90" height="36" rx="8" fill="none" stroke="#0ea5e9" stroke-width="2"/>
  <text x="219" y="114" font-family="Arial, sans-serif" font-weight="700" font-size="13" fill="#0ea5e9" text-anchor="middle">AI Agent</text>
  <text x="1020" y="114" font-family="Arial, sans-serif" font-size="16" fill="#3a5a6a" text-anchor="end">2026.07.04</text>

  <text x="540" y="192" font-family="Arial Black, Arial" font-weight="900" font-size="34" fill="#ffffff" text-anchor="middle" filter="url(#glow)">META AI Agent</text>
  <text x="540" y="254" font-family="Arial Black, Arial" font-weight="900" font-size="42" fill="#7dd3fc" text-anchor="middle" filter="url(#glow)">Below Expectations</text>
  <text x="540" y="302" font-family="Arial, sans-serif" font-size="20" fill="#38bdf8" text-anchor="middle">Zuckerberg admits 4-month AI agent development fell short</text>

  <rect x="80" y="325" width="920" height="110" rx="14" fill="#0a1020" stroke="#0ea5e9" stroke-width="2" stroke-opacity="0.6"/>
