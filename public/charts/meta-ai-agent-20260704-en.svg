  <text x="870" y="524" font-family="Arial, sans-serif" font-size="14" fill="#38bdf8" text-anchor="middle">Honest self-assessment = positive</text>
  <text x="870" y="546" font-family="Arial, sans-serif" font-size="14" fill="#38bdf8" text-anchor="middle">No overpromising from mgmt</text>
  <text x="870" y="568" font-family="Arial, sans-serif" font-size="13" fill="#4a7a9a" text-anchor="middle">AI capex $60B+ maintained</text>
  <text x="870" y="590" font-family="Arial, sans-serif" font-size="13" fill="#4a7a9a" text-anchor="middle">Agents: setback, not abandon</text>
  <text x="870" y="614" font-family="Arial, sans-serif" font-size="12" fill="#3a5a7a" text-anchor="middle">Llama open-source on track</text>
  <text x="870" y="636" font-family="Arial, sans-serif" font-size="12" fill="#3a5a7a" text-anchor="middle">WhatsApp·Messenger AI</text>
  <text x="870" y="658" font-family="Arial, sans-serif" font-size="11" fill="#2a4a6a" text-anchor="middle">Ads AI growing separately</text>
  <text x="870" y="676" font-family="Arial, sans-serif" font-size="11" fill="#2a4a6a" text-anchor="middle">Consider buying on dip</text>

  <rect x="60" y="710" width="960" height="166" rx="16" fill="#080e1a" stroke="#0ea5e9" stroke-width="1" stroke-opacity="0.3"/>
  <text x="540" y="746" font-family="Arial Black, Arial" font-weight="900" font-size="20" fill="#ffffff" text-anchor="middle">META AI Status Summary</text>

  <rect x="80" y="760" width="420" height="100" rx="10" fill="#0a1020" stroke="#0ea5e9" stroke-width="1" stroke-opacity="0.3"/>
  <text x="290" y="784" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#7dd3fc" text-anchor="middle">AI Agent: Underperforming</text>
  <text x="290" y="806" font-family="Arial, sans-serif" font-size="13" fill="#38bdf8" text-anchor="middle">4-month progress below target</text>
  <text x="290" y="826" font-family="Arial, sans-serif" font-size="12" fill="#4a7a9a" text-anchor="middle">Relative weakness vs peers</text>
  <text x="290" y="846" font-family="Arial, sans-serif" font-size="11" fill="#3a5a7a" text-anchor="middle">OpenAI·Google·Anthropic pressure</text>

  <rect x="540" y="760" width="460" height="100" rx="10" fill="#0a1020" stroke="#0ea5e9" stroke-width="1" stroke-opacity="0.3"/>
  <text x="770" y="784" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#7dd3fc" text-anchor="middle">Core Business: Separate</text>
  <text x="770" y="806" font-family="Arial, sans-serif" font-size="13" fill="#38bdf8" text-anchor="middle">Advertising AI growing well</text>
  <text x="770" y="826" font-family="Arial, sans-serif" font-size="12" fill="#4a7a9a" text-anchor="middle">Record ad revenue in 2025</text>
  <text x="770" y="846" font-family="Arial, sans-serif" font-size="11" fill="#3a5a7a" text-anchor="middle">Agent underperform ≠ biz underperform</text>

  <rect x="60" y="892" width="960" height="58" rx="12" fill="#080e1a" stroke="#0ea5e9" stroke-width="1" stroke-opacity="0.25"/>
  <text x="540" y="918" font-family="Arial, sans-serif" font-size="15" fill="#38bdf8" text-anchor="middle">Zuckerberg admits AI agent miss → short-term risk but core ad business unaffected</text>
  <text x="540" y="940" font-family="Arial, sans-serif" font-size="13" fill="#3a5a7a" text-anchor="middle">$60B+ capex unchanged · Llama + WhatsApp AI strategy intact · Watch near-term dip</text>

  <rect x="60" y="968" width="960" height="4" fill="url(#blueGrad)" rx="2" opacity="0.5"/>
  <text x="540" y="1008" font-family="Arial, sans-serif" font-size="18" fill="#3a5a6a" text-anchor="middle">investus.kr  SRP Chief Investment Officer</text>
