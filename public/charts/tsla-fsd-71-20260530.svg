  <text x="48" y="158" font-family="Arial,sans-serif" font-size="52" fill="#00e5a0" font-weight="700">71</text>
  <text x="48" y="178" font-family="Arial,sans-serif" font-size="11" fill="white">공식 지원 국가</text>
  <text x="48" y="196" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">미국·중국 외 70개국 확산</text>
  <text x="48" y="210" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">Arizona 최신 공식 승인 완료</text>

  <!-- Safety improvement -->
  <rect x="275" y="80" width="225" height="140" rx="8" fill="#071208" stroke="#00e5a0" stroke-width="1.2" stroke-opacity="0.5"/>
  <rect x="275" y="80" width="4" height="140" rx="2" fill="#00e5a0"/>
  <text x="293" y="106" font-family="Arial,sans-serif" font-size="11" fill="#00e5a0" font-weight="700">안전성 3배 개선</text>
  <text x="293" y="138" font-family="Arial,sans-serif" font-size="12" fill="#6b7280">50,000마일/건</text>
  <text x="293" y="160" font-family="Arial,sans-serif" font-size="13" fill="#00e5a0" font-weight="700">↓ 150,000마일/건</text>
