  <text x="293" y="194" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">인간 운전자 수준(165K마일) 임박</text>
  <text x="293" y="208" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">Menz Analytics 공식 데이터</text>

