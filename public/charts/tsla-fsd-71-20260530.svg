  <text x="538" y="138" font-family="Arial,sans-serif" font-size="20" fill="#00e5a0" font-weight="700">$8,000</text>
  <text x="538" y="156" font-family="Arial,sans-serif" font-size="10" fill="white">FSD One-Time (미국 기준)</text>
  <text x="538" y="176" font-family="Arial,sans-serif" font-size="16" fill="#00e5a0" font-weight="700">$99/월</text>
