<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080c12"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1e12"/>
      <stop offset="100%" style="stop-color:#0a1510"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <!-- Header -->
  <rect width="1080" height="88" fill="#0d1117"/>
  <text x="540" y="30" font-family="Arial,sans-serif" font-size="12" fill="#6b7280" text-anchor="middle" letter-spacing="3">INVESTUS DAILY REPORT</text>
  <text x="540" y="68" font-family="Arial,sans-serif" font-size="26" font-weight="bold" fill="#e5e7eb" text-anchor="middle">TSLA · Terafab Key Hires</text>
  <rect y="88" width="1080" height="3" fill="#60a5fa"/>
  <!-- Date badge -->
  <rect x="30" y="106" width="150" height="34" rx="17" fill="rgba(96,165,250,0.12)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="105" y="128" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#60a5fa" text-anchor="middle">2026. 07. 01</text>
  <rect x="200" y="106" width="130" height="34" rx="17" fill="rgba(96,165,250,0.08)"/>
  <text x="265" y="128" font-family="Arial,sans-serif" font-size="11" fill="#60a5fa" text-anchor="middle">Stock Analysis · TSLA</text>

  <!-- Hero label -->
  <text x="540" y="182" font-family="Arial,sans-serif" font-size="14" fill="#9ca3af" text-anchor="middle" letter-spacing="2">TERA FAB — TESLA'S IN-HOUSE SEMICONDUCTOR FACILITY</text>

  <!-- Flow diagram: Intel → Gary Jiang → Tesla Terafab -->
  <!-- Intel box -->
  <rect x="60" y="210" width="240" height="130" rx="16" fill="#111827" stroke="#6b7280" stroke-width="1.5"/>
  <text x="180" y="248" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">FROM</text>
  <text x="180" y="276" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="#60a5fa" text-anchor="middle">INTEL</text>
  <text x="180" y="300" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">18A Process Node</text>
  <text x="180" y="320" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">Factory Manager</text>

  <!-- Arrow -->
  <rect x="320" y="265" width="100" height="8" rx="4" fill="url(#arrowGrad)"/>
  <polygon points="418,257 438,269 418,281" fill="#60a5fa"/>

  <!-- Tesla Terafab box -->
  <rect x="448" y="210" width="240" height="130" rx="16" fill="#0f1a10" stroke="#4ade80" stroke-width="2"/>
  <text x="568" y="248" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">TO</text>
  <text x="568" y="276" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="#4ade80" text-anchor="middle">TESLA TERAFAB</text>
  <text x="568" y="300" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">Gary Jiang</text>
  <text x="568" y="320" font-family="Arial,sans-serif" font-size="11" fill="#4ade80" text-anchor="middle">Director (Jun 2026–)</text>

