  <rect x="790" y="215" width="230" height="120" rx="14" fill="#111827" stroke="#6b7280" stroke-width="1"/>
  <text x="905" y="255" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">INTEL 18A NODE</text>
  <rect x="840" y="268" width="130" height="40" rx="6" fill="#1e2a3a" stroke="#60a5fa" stroke-width="1"/>
  <text x="905" y="293" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#60a5fa" text-anchor="middle">18Å Process</text>
  <text x="905" y="320" font-family="Arial,sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Intel's most advanced node</text>

  <!-- Lara Park hire -->
  <rect x="60" y="368" width="960" height="100" rx="16" fill="#0f1520" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="80" y="404" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af">NEXT HIRE:</text>
  <text x="200" y="404" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#e5e7eb">Lara Park  —  Semiconductor Manufacturing Director</text>
  <text x="80" y="435" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af">7+ years at Tesla · Chip manufacturing · Supply chain optimization</text>
  <text x="860" y="420" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="#4ade80" text-anchor="middle">+2</text>
  <text x="860" y="445" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">Key Hires</text>

  <!-- What Terafab means -->
  <rect x="60" y="490" width="960" height="220" rx="16" fill="#111318" stroke="#1e2028" stroke-width="1"/>
  <text x="80" y="522" font-family="Arial,sans-serif" font-size="12" fill="#6b7280" font-weight="bold" letter-spacing="2">WHY TERAFAB MATTERS</text>
  <line x1="80" y1="532" x2="1000" y2="532" stroke="#1e2028" stroke-width="1"/>

  <rect x="80" y="548" width="260" height="130" rx="12" fill="#0d1520" stroke="#60a5fa" stroke-width="1"/>
  <text x="210" y="580" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">Capability</text>
  <text x="210" y="610" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#60a5fa" text-anchor="middle">Own Chip Fab</text>
  <text x="210" y="635" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">Tesla designs &amp; manufactures</text>
  <text x="210" y="654" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">its own AI chips</text>
  <text x="210" y="672" font-family="Arial,sans-serif" font-size="10" fill="#4ade80" text-anchor="middle">FSD / Dojo / Optimus chips</text>

  <rect x="380" y="548" width="260" height="130" rx="12" fill="#0d1520" stroke="#4ade80" stroke-width="1"/>
  <text x="510" y="580" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">Strategic Value</text>
  <text x="510" y="610" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#4ade80" text-anchor="middle">Supply Chain</text>
  <text x="510" y="635" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">No TSMC dependency</text>
  <text x="510" y="654" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">for critical AI chips</text>
  <text x="510" y="672" font-family="Arial,sans-serif" font-size="10" fill="#4ade80" text-anchor="middle">Geopolitical hedge</text>

  <rect x="680" y="548" width="260" height="130" rx="12" fill="#0d1520" stroke="#ef4444" stroke-width="1"/>
  <text x="810" y="580" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">Cost Edge</text>
  <text x="810" y="610" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#ef4444" text-anchor="middle">Vertical</text>
  <text x="810" y="635" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#ef4444" text-anchor="middle">Integration</text>
  <text x="810" y="660" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">Lower chip cost → higher</text>
  <text x="810" y="678" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">AI profit margin</text>

  <!-- Footer -->
  <rect y="728" width="1080" height="2" fill="#60a5fa"/>
  <rect y="730" width="1080" height="350" fill="#0d1117"/>
  <text x="540" y="780" font-family="Arial,sans-serif" font-size="17" font-weight="bold" fill="#e5e7eb" text-anchor="middle">Intel's 18A Expert Now Leads Tesla's In-House Chip Factory</text>
  <text x="540" y="810" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">INVESTUS · 2026.07.01 · For investment reference only</text>

  <!-- Ticker strip -->
  <rect y="840" width="1080" height="36" fill="#111318"/>
  <text x="540" y="863" font-family="Arial,sans-serif" font-size="12" fill="#4b5563" text-anchor="middle" letter-spacing="4">TSLA · TERAFAB · AI CHIPS · VERTICAL INTEGRATION</text>
</svg>
