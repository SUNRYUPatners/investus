<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480">
  <rect width="480" height="480" fill="#0a0c10"/>
  <rect x="0" y="0" width="480" height="64" fill="#111318"/>
  <rect x="0" y="60" width="480" height="2" fill="#c084fc" opacity="0.3"/>
  <text x="24" y="26" font-family="Arial,sans-serif" font-size="11" fill="#c084fc" font-weight="bold">SPCX · 종목분석</text>
  <text x="24" y="46" font-family="Arial,sans-serif" font-size="14" fill="#e5e7eb" font-weight="bold">IPO로 직원 4,000+ 명 백만장자 탄생</text>

  <!-- Big number -->
  <rect x="24" y="80" width="204" height="120" rx="12" fill="#1a1020" stroke="#c084fc" stroke-width="1" stroke-opacity="0.5"/>
  <text x="126" y="114" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">백만장자 탄생 (추정)</text>
  <text x="126" y="156" font-family="Arial,sans-serif" font-size="36" fill="#c084fc" text-anchor="middle" font-weight="bold">4,000+</text>
  <text x="126" y="182" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">명의 직원</text>

  <rect x="244" y="80" width="212" height="120" rx="12" fill="#0d1520" stroke="#60a5fa" stroke-width="1" stroke-opacity="0.5"/>
  <text x="350" y="114" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">총 임직원 수</text>
  <text x="350" y="156" font-family="Arial,sans-serif" font-size="36" fill="#60a5fa" text-anchor="middle" font-weight="bold">22,000</text>
  <text x="350" y="182" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">명 (2026년 기준)</text>

  <!-- Ratio -->
  <rect x="24" y="218" width="432" height="44" rx="10" fill="#111318"/>
  <text x="240" y="238" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">직원 중 백만장자 비율</text>
  <text x="240" y="256" font-family="Arial,sans-serif" font-size="16" fill="#00e5a0" text-anchor="middle" font-weight="bold">약 18% (5명 중 1명)</text>

  <!-- Context -->
  <text x="24" y="290" font-family="Arial,sans-serif" font-size="12" fill="#6b7280" font-weight="bold">■ SpaceX 스톡옵션 부의 규모 (추정)</text>

  <rect x="24" y="302" width="432" height="72" rx="10" fill="#111318"/>
  <text x="40" y="322" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af">평균 재직 기간 5년 이상 직원 기준:</text>
  <text x="40" y="342" font-family="Arial,sans-serif" font-size="13" fill="#e5e7eb">• 초기 입사자(2015~): 스톡옵션 현재 가치 수백만 달러+</text>
  <text x="40" y="362" font-family="Arial,sans-serif" font-size="13" fill="#e5e7eb">• 엔지니어 평균 옵션: 수십만 → 수백만 달러 실현</text>

  <!-- Comparison -->
  <text x="24" y="398" font-family="Arial,sans-serif" font-size="12" fill="#6b7280" font-weight="bold">■ 역대 IPO 직원 부 창출 비교</text>

  <rect x="24" y="410" width="136" height="44" rx="8" fill="#111318"/>
  <text x="92" y="428" font-family="Arial,sans-serif" font-size="10" fill="#9ca3af" text-anchor="middle">Google IPO(2004)</text>
  <text x="92" y="446" font-family="Arial,sans-serif" font-size="13" fill="#e5e7eb" text-anchor="middle" font-weight="bold">약 1,000명</text>

  <rect x="172" y="410" width="136" height="44" rx="8" fill="#111318"/>
  <text x="240" y="428" font-family="Arial,sans-serif" font-size="10" fill="#9ca3af" text-anchor="middle">Meta IPO(2012)</text>
  <text x="240" y="446" font-family="Arial,sans-serif" font-size="13" fill="#e5e7eb" text-anchor="middle" font-weight="bold">약 1,500명</text>

  <rect x="320" y="410" width="136" height="44" rx="8" fill="rgba(192,132,252,0.12)" stroke="#c084fc" stroke-width="1" stroke-opacity="0.4"/>
  <text x="388" y="428" font-family="Arial,sans-serif" font-size="10" fill="#c084fc" text-anchor="middle">SpaceX IPO(2026)</text>
  <text x="388" y="446" font-family="Arial,sans-serif" font-size="13" fill="#c084fc" text-anchor="middle" font-weight="bold">4,000+ 명</text>

  <text x="240" y="472" font-family="Arial,sans-serif" font-size="10" fill="#4b5563" text-anchor="middle">2026.06.12 · Investus · 투자 참고용</text>
</svg>
