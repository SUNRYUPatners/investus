<svg width="800" height="430" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="430" fill="#07091a"/>
  <rect x="0" y="0" width="800" height="3" fill="#00e5a0"/>

  <text x="30" y="32" font-family="Arial,sans-serif" font-size="10" fill="#00e5a0" font-weight="700" letter-spacing="3">INVESTUS · Tesla China FSD</text>
  <text x="30" y="58" font-family="Arial,sans-serif" font-size="20" fill="white" font-weight="700">Tesla 중국 FSD → '特斯拉辅助驾驶' 개명</text>
  <text x="770" y="58" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="end">2026.05.23</text>
  <line x1="30" y1="70" x2="770" y2="70" stroke="#1e2330" stroke-width="1"/>

  <!-- Before / After rename -->
  <rect x="30" y="85" width="740" height="160" rx="10" fill="#071208" stroke="rgba(0,229,160,0.3)" stroke-width="1.5"/>

  <!-- Before -->
  <rect x="60" y="105" width="300" height="80" rx="8" fill="#1a0808" stroke="rgba(239,68,68,0.4)" stroke-width="1.5"/>
  <text x="210" y="133" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">변경 전</text>
  <text x="210" y="160" font-family="Arial,sans-serif" font-size="18" fill="#ef4444" font-weight="700" text-anchor="middle">FSD (Full Self-Driving)</text>
  <text x="210" y="178" font-family="Arial,sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">완전자율주행 뉘앙스</text>

  <!-- Arrow -->
  <text x="400" y="152" font-family="Arial,sans-serif" font-size="32" fill="#6b7280" text-anchor="middle">→</text>

  <!-- After -->
  <rect x="440" y="105" width="300" height="80" rx="8" fill="#081a10" stroke="rgba(0,229,160,0.5)" stroke-width="2"/>
  <text x="590" y="133" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">변경 후</text>
  <text x="590" y="155" font-family="Arial,sans-serif" font-size="16" fill="#00e5a0" font-weight="700" text-anchor="middle">特斯拉辅助驾驶</text>
  <text x="590" y="173" font-family="Arial,sans-serif" font-size="11" fill="#00e5a0" text-anchor="middle">(Tesla Assisted Driving)</text>
  <text x="590" y="183" font-family="Arial,sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">보조주행 프레임</text>

  <!-- Details row -->
  <rect x="30" y="258" width="360" height="108" rx="10" fill="#0a0b12" stroke="rgba(0,229,160,0.2)" stroke-width="1"/>
  <text x="50" y="282" font-family="Arial,sans-serif" font-size="11" fill="#00e5a0" font-weight="700">🔑 핵심 사실</text>
  <text x="50" y="302" font-family="Arial,sans-serif" font-size="10" fill="#e5e7eb">• 가격: 64,000 RMB ($9,420) — 변동 없음</text>
  <text x="50" y="320" font-family="Arial,sans-serif" font-size="10" fill="#e5e7eb">• 이유: 중국 규제 — 완전자율주행 명칭 금지</text>
  <text x="50" y="338" font-family="Arial,sans-serif" font-size="10" fill="#e5e7eb">• 완전판: 개발·규제 승인 후 '추후 출시 예정'</text>
  <text x="50" y="356" font-family="Arial,sans-serif" font-size="10" fill="#00e5a0">• 미국·캐나다에 이어 세계 3번째 FSD 시장</text>

  <rect x="410" y="258" width="360" height="108" rx="10" fill="#0a0b12" stroke="rgba(250,204,21,0.2)" stroke-width="1"/>
  <text x="430" y="282" font-family="Arial,sans-serif" font-size="11" fill="#facc15" font-weight="700">📊 투자 시사점</text>
  <text x="430" y="302" font-family="Arial,sans-serif" font-size="10" fill="#e5e7eb">• 중국 규제 순응 → 장기 FSD 판매 유지 가능</text>
  <text x="430" y="320" font-family="Arial,sans-serif" font-size="10" fill="#e5e7eb">• 중국 도로 주행 데이터 확보 → 글로벌 FSD 개선</text>
  <text x="430" y="338" font-family="Arial,sans-serif" font-size="10" fill="#e5e7eb">• Cybercab 중국 진출 시 현지 데이터 자산화</text>
  <text x="430" y="356" font-family="Arial,sans-serif" font-size="10" fill="#facc15">• TSLA 소프트웨어 수익 확대 경로 유지 확인</text>

  <line x1="30" y1="378" x2="770" y2="378" stroke="#1e2330" stroke-width="1"/>
  <text x="30" y="396" font-family="Arial,sans-serif" font-size="10" fill="#6b7280">투자 참고용. 투자 판단 및 결과에 대한 책임은 투자자 본인에게 있습니다.</text>
  <text x="770" y="396" font-family="Arial,sans-serif" font-size="10" fill="#00e5a0" text-anchor="end" font-weight="600">INVESTUS · SUNRYU Partners CIO</text>
</svg>
