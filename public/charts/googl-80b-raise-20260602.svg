  <text x="152" y="440" fill="rgba(255,255,255,0.6)" font-size="11" text-anchor="middle">Class A · $5B</text>
  <text x="152" y="452" fill="#f59e0b" font-size="10" font-weight="700" text-anchor="middle">$351.81/주</text>

  <rect x="270" y="422" width="200" height="26" rx="6" fill="rgba(245,158,11,0.1)"/>
  <text x="370" y="440" fill="rgba(255,255,255,0.6)" font-size="11" text-anchor="middle">Class C · $5B</text>
  <text x="370" y="452" fill="#f59e0b" font-size="10" font-weight="700" text-anchor="middle">$348.20/주</text>

  <text x="548" y="436" fill="rgba(255,255,255,0.45)" font-size="10">Q3 2025부터 포지션 구축 지속</text>
  <text x="548" y="450" fill="rgba(255,255,255,0.3)" font-size="10">Mag 7 ATM 프로그램 개방 신호탄</text>

  <text x="400" y="476" fill="rgba(255,255,255,0.2)" font-size="9" text-anchor="middle">investus.kr · 선류파트너스 · 투자 참고용, 투자 권유 아님</text>
