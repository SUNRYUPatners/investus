  <rect x="32" y="260" width="150" height="48" rx="10" fill="rgba(96,165,250,0.28)"/>
  <text x="152" y="280" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">50%</text>
  <text x="152" y="295" fill="white" font-size="11" font-weight="700" text-anchor="middle">$40B ATM</text>
