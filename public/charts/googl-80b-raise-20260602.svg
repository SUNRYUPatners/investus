  <rect x="32" y="200" width="112" height="48" rx="10" fill="rgba(96,165,250,0.35)"/>
  <text x="152" y="220" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">37.5%</text>
  <text x="152" y="235" fill="white" font-size="11" font-weight="700" text-anchor="middle">$30B 공모</text>
  <text x="290" y="220" fill="rgba(255,255,255,0.6)" font-size="11" font-weight="700">$30B</text>
