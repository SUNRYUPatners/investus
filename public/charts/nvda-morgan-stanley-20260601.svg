  <text x="48" y="356" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">모건스탠리가 틀렸다고 인정하는 기관은 극히 드물다 → 이 번복이 얼마나 강력한 신호인지 이해해야 함</text>

