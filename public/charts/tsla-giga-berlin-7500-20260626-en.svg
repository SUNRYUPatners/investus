<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#fca5a5"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <!-- Header -->
  <rect width="1080" height="80" fill="#111318"/>
  <text x="540" y="30" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">TSLA · Giga Berlin Production Ramp</text>
  <text x="540" y="62" font-family="Arial,sans-serif" font-size="26" font-weight="bold" fill="#e5e7eb" text-anchor="middle">Giga Berlin Targeting 7,500/Week + 1,000 New Jobs</text>
  <!-- Accent line -->
  <rect y="80" width="1080" height="3" fill="#ef4444"/>
  <!-- HERO: 7,500 -->
  <text x="540" y="200" font-family="Arial,sans-serif" font-size="22" fill="#9ca3af" text-anchor="middle">Weekly Production Target</text>
  <text x="540" y="340" font-family="Arial,sans-serif" font-size="130" font-weight="bold" fill="#ef4444" text-anchor="middle">7,500</text>
  <text x="540" y="395" font-family="Arial,sans-serif" font-size="36" font-weight="bold" fill="#e5e7eb" text-anchor="middle">vehicles / week</text>
  <!-- Factory icon -->
  <g transform="translate(80, 115)">
    <rect x="0" y="60" width="140" height="100" fill="#1a1117" stroke="#ef4444" stroke-width="2"/>
    <polygon points="70,20 0,60 140,60" fill="#ef4444" opacity="0.7"/>
    <rect x="15" y="75" width="25" height="20" fill="#ef4444" opacity="0.5"/>
    <rect x="57" y="75" width="25" height="20" fill="#ef4444" opacity="0.5"/>
    <rect x="100" y="75" width="25" height="20" fill="#ef4444" opacity="0.5"/>
    <rect x="55" y="130" width="30" height="30" fill="#ef4444" opacity="0.3"/>
    <rect x="20" y="30" width="12" height="35" fill="#9ca3af" opacity="0.5"/>
    <rect x="40" y="22" width="12" height="43" fill="#9ca3af" opacity="0.5"/>
    <text x="70" y="115" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="#ef4444" text-anchor="middle">T</text>
  </g>
  <text x="150" y="260" font-family="Arial,sans-serif" font-size="14" fill="#9ca3af" text-anchor="middle">🇩🇪 Grünheide, Germany</text>
  <!-- Bar chart: Before → Target -->
  <text x="540" y="460" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#e5e7eb" text-anchor="middle">Production Ramp Comparison</text>
  <text x="200" y="498" font-family="Arial,sans-serif" font-size="14" fill="#9ca3af" text-anchor="middle">Current</text>
  <rect x="100" y="510" width="200" height="55" rx="6" fill="#374151"/>
  <rect x="100" y="510" width="130" height="55" rx="6" fill="#6b7280"/>
  <text x="200" y="544" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="#e5e7eb" text-anchor="middle">~4,000</text>
  <text x="420" y="548" font-family="Arial,sans-serif" font-size="36" fill="#ef4444" text-anchor="middle">→</text>
  <text x="680" y="498" font-family="Arial,sans-serif" font-size="14" fill="#4ade80" text-anchor="middle">Target</text>
  <rect x="500" y="510" width="360" height="55" rx="6" fill="#374151"/>
  <rect x="500" y="510" width="360" height="55" rx="6" fill="url(#barGrad)"/>
  <text x="680" y="544" font-family="Arial,sans-serif" font-size="26" font-weight="bold" fill="#ffffff" text-anchor="middle">7,500 vehicles/week</text>
  <text x="540" y="600" font-family="Arial,sans-serif" font-size="18" fill="#4ade80" text-anchor="middle">~+87.5% Production Increase</text>
  <!-- Three stat cards -->
  <rect x="40" y="640" width="305" height="120" rx="12" fill="#1a1117" stroke="#ef4444" stroke-width="2"/>
  <text x="192" y="680" font-family="Arial,sans-serif" font-size="14" fill="#9ca3af" text-anchor="middle">New Hires</text>
  <text x="192" y="730" font-family="Arial,sans-serif" font-size="52" font-weight="bold" fill="#ef4444" text-anchor="middle">+1,000</text>
  <text x="192" y="754" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">Additional Jobs Created</text>
  <rect x="388" y="640" width="305" height="120" rx="12" fill="#1a1117" stroke="#ef4444" stroke-width="2"/>
  <text x="540" y="680" font-family="Arial,sans-serif" font-size="14" fill="#9ca3af" text-anchor="middle">Annual Target</text>
  <text x="540" y="730" font-family="Arial,sans-serif" font-size="42" font-weight="bold" fill="#ef4444" text-anchor="middle">390,000+</text>
  <text x="540" y="754" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">vehicles/year (7,500 x 52 wks)</text>
  <rect x="736" y="640" width="305" height="120" rx="12" fill="#1a1117" stroke="#ef4444" stroke-width="2"/>
  <text x="888" y="680" font-family="Arial,sans-serif" font-size="14" fill="#9ca3af" text-anchor="middle">Target Timeline</text>
  <text x="888" y="730" font-family="Arial,sans-serif" font-size="42" font-weight="bold" fill="#4ade80" text-anchor="middle">2026 Q4</text>
  <text x="888" y="754" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">Expected Achievement</text>
  <!-- Impact section -->
  <rect x="40" y="790" width="1002" height="80" rx="10" fill="#161b22" stroke="#333" stroke-width="1"/>
  <text x="540" y="822" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#e5e7eb" text-anchor="middle">Strengthening European Production Hub — Meeting Local Demand</text>
  <text x="540" y="850" font-family="Arial,sans-serif" font-size="14" fill="#9ca3af" text-anchor="middle">Full Giga Berlin capacity will significantly expand Tesla's European market share</text>
  <!-- Footer -->
  <rect y="900" width="1080" height="80" fill="#111318"/>
  <rect y="900" width="1080" height="2" fill="#ef4444"/>
  <text x="540" y="942" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#e5e7eb" text-anchor="middle">Giga Berlin 7,500/Week — Securing European EV Supply Chain Leadership</text>
  <text x="540" y="966" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">INVESTUS · 2026.06.26 · For Reference Only</text>
  <rect y="1000" width="1080" height="60" fill="#0d1117"/>
  <text x="270" y="1037" font-family="Arial,sans-serif" font-size="15" fill="#ef4444" font-weight="bold" text-anchor="middle">TSLA</text>
  <text x="540" y="1037" font-family="Arial,sans-serif" font-size="14" fill="#e5e7eb" text-anchor="middle">Giga Berlin · Grünheide · Germany</text>
  <text x="810" y="1037" font-family="Arial,sans-serif" font-size="14" fill="#4ade80" font-weight="bold" text-anchor="middle">Production Ramp ↑</text>
</svg>