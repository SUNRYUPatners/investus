<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480">
  <rect width="480" height="480" fill="#0a0c10"/>
  <rect x="0" y="0" width="480" height="64" fill="#111318"/>
  <rect x="0" y="60" width="480" height="2" fill="#c084fc" opacity="0.3"/>
  <text x="24" y="26" font-family="Arial,sans-serif" font-size="11" fill="#c084fc" font-weight="bold">SPCX · 종목분석</text>
  <text x="24" y="46" font-family="Arial,sans-serif" font-size="14" fill="#e5e7eb" font-weight="bold">일론 머스크 본인 자금으로 IPO 직접 참여</text>

  <!-- Main quote box -->
  <rect x="24" y="80" width="432" height="88" rx="12" fill="#1a1020" stroke="#c084fc" stroke-width="1" stroke-opacity="0.5"/>
  <text x="40" y="108" font-family="Arial,sans-serif" font-size="13" fill="#c084fc" font-style="italic">"나는 SpaceX IPO에 내 개인 자금으로</text>
  <text x="40" y="128" font-family="Arial,sans-serif" font-size="13" fill="#c084fc" font-style="italic">직접 참여할 것이다. 회사의 미래를</text>
  <text x="40" y="148" font-family="Arial,sans-serif" font-size="13" fill="#c084fc" font-style="italic">가장 확신하는 사람은 바로 나다."</text>
  <text x="432" y="160" font-family="Arial,sans-serif" font-size="10" fill="#9ca3af" text-anchor="end">— Elon Musk (@elonmusk)</text>

  <!-- Key points -->
  <text x="24" y="196" font-family="Arial,sans-serif" font-size="12" fill="#6b7280" font-weight="bold">■ 핵심 포인트</text>

  <rect x="24" y="208" width="432" height="48" rx="10" fill="#111318"/>
  <text x="40" y="229" font-family="Arial,sans-serif" font-size="13" fill="#e5e7eb" font-weight="bold">본인 개인 자금 직접 공모 참여</text>
  <text x="40" y="249" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af">회사 지분 42% 보유 창업자가 추가 매수 — 최강의 신뢰 신호</text>

  <rect x="24" y="264" width="432" height="48" rx="10" fill="#111318"/>
  <text x="40" y="285" font-family="Arial,sans-serif" font-size="13" fill="#e5e7eb" font-weight="bold">의결권 82.4% 유지 의향</text>
  <text x="40" y="305" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af">공모 후에도 회사 통제권 완전 유지 — IPO 후 경영 방향성 불변</text>

  <rect x="24" y="320" width="432" height="48" rx="10" fill="#111318"/>
  <text x="40" y="341" font-family="Arial,sans-serif" font-size="13" fill="#e5e7eb" font-weight="bold">IPO 후 최소 180일 보호예수</text>
  <text x="40" y="361" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af">대주주 즉각 매도 방지 조항 — 장기 주주 가치 보호 구조</text>

  <!-- Musk stake -->
  <rect x="24" y="386" width="432" height="62" rx="12" fill="#1a1020" stroke="#c084fc" stroke-width="1" stroke-opacity="0.3"/>
  <text x="240" y="408" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">IPO 전 머스크 보유 현황</text>
  <rect x="40" y="416" width="120" height="22" rx="6" fill="rgba(192,132,252,0.15)"/>
  <text x="100" y="432" font-family="Arial,sans-serif" font-size="12" fill="#c084fc" text-anchor="middle" font-weight="bold">지분 42%</text>
  <rect x="200" y="416" width="120" height="22" rx="6" fill="rgba(192,132,252,0.15)"/>
  <text x="260" y="432" font-family="Arial,sans-serif" font-size="12" fill="#c084fc" text-anchor="middle" font-weight="bold">의결권 82.4%</text>
  <rect x="360" y="416" width="96" height="22" rx="6" fill="rgba(0,229,160,0.12)"/>
  <text x="408" y="432" font-family="Arial,sans-serif" font-size="12" fill="#00e5a0" text-anchor="middle" font-weight="bold">추가 매수</text>

  <text x="240" y="468" font-family="Arial,sans-serif" font-size="10" fill="#4b5563" text-anchor="middle">2026.06.12 · Investus · 투자 참고용</text>
</svg>
