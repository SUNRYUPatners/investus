  <text x="540" y="800" font-family="Arial, sans-serif" font-size="14" fill="#6ee7b7" text-anchor="middle">연환산</text>

  <rect x="724" y="686" width="276" height="120" rx="14" fill="#071a10" stroke="#10b981" stroke-width="1.5"/>
  <text x="862" y="726" font-family="Arial Black, Arial" font-weight="900" font-size="14" fill="#10b981" text-anchor="middle">EBITDA</text>
