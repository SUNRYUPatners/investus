  <text x="540" y="178" font-family="Arial Black, Arial" font-weight="900" font-size="22" fill="#ffffff" text-anchor="middle">Cybercab 3만대 플릿 — 수익 모델 분석</text>
  <text x="540" y="268" font-family="Arial Black, Arial" font-weight="900" font-size="80" fill="#00e5a0" text-anchor="middle">$4.4B</text>
