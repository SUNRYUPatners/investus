  <text x="540" y="866" font-family="Arial Black, Arial" font-weight="900" font-size="15" fill="#00e5a0" text-anchor="middle">투자 시사점</text>
  <text x="540" y="892" font-family="Arial, sans-serif" font-size="14" fill="#d1d5db" text-anchor="middle">3만 대 플릿 = $44억 매출 + $9억 EBITDA → Tesla 신규 사업 부문으로 재평가 근거</text>

  <rect x="0" y="1020" width="1080" height="60" fill="#020810"/>
  <text x="540" y="1056" font-family="Arial, sans-serif" font-size="13" fill="#374151" text-anchor="middle">INVESTUS · 2026.07.08 · investus.kr SRP 최고투자책임자 발행</text>
