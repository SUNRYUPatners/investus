<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 440">
  <rect width="480" height="440" fill="#0a0c10"/>
  <rect x="0" y="0" width="480" height="56" fill="#111318"/>
  <rect x="0" y="52" width="480" height="2" fill="#c084fc" opacity="0.5"/>
  <text x="24" y="24" font-family="Arial,sans-serif" font-size="11" fill="#c084fc" font-weight="bold">종목분석 · SPCX</text>
  <text x="24" y="44" font-family="Arial,sans-serif" font-size="13" fill="#e5e7eb" font-weight="bold">Starlink × Flow 허리케인 파트너십 — 재난 통신 인프라</text>

  <!-- Partnership banner -->
  <rect x="24" y="68" width="432" height="80" rx="12" fill="#150d2e" stroke="#c084fc" stroke-width="1.5" stroke-opacity="0.8"/>
  <text x="150" y="102" font-family="Arial,sans-serif" font-size="20" fill="#60a5fa" font-weight="bold" text-anchor="middle">Starlink</text>
  <text x="240" y="102" font-family="Arial,sans-serif" font-size="20" fill="#9ca3af" text-anchor="middle"> × </text>
  <text x="320" y="102" font-family="Arial,sans-serif" font-size="20" fill="#4ade80" font-weight="bold" text-anchor="middle">Flow</text>
  <text x="240" y="136" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb" text-anchor="middle" font-weight="bold">허리케인 시즌 전 통신 백업 인프라 공식 계약</text>

  <!-- How it works -->
  <rect x="24" y="160" width="432" height="80" rx="10" fill="#111318"/>
  <text x="40" y="184" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af">작동 방식</text>
  <text x="40" y="206" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">기존 지상 인프라 다운 → 자동 Starlink 전환</text>
  <text x="40" y="228" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">허리케인·홍수 상황에서 모바일 통신 유지</text>

  <!-- Stats -->
  <rect x="24" y="252" width="204" height="80" rx="10" fill="#111318"/>
  <text x="40" y="276" font-family="Arial,sans-serif" font-size="11" fill="#c084fc">Starlink 커버리지</text>
  <text x="40" y="300" font-family="Arial,sans-serif" font-size="20" fill="#e5e7eb" font-weight="bold">카리브해 전역</text>
  <text x="40" y="320" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af">허리케인 고위험 지역</text>

  <rect x="244" y="252" width="212" height="80" rx="10" fill="#111318"/>
  <text x="260" y="276" font-family="Arial,sans-serif" font-size="11" fill="#c084fc">파트너 확장</text>
  <text x="260" y="298" font-family="Arial,sans-serif" font-size="13" fill="#e5e7eb" font-weight="bold">추가 통신사 편입 중</text>
  <text x="260" y="320" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af">Starlink 통신 B2B 생태계</text>

  <!-- Implication -->
  <rect x="24" y="344" width="432" height="64" rx="10" fill="#0d1f14" stroke="#c084fc" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="40" y="368" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">Starlink B2B 통신 계약 = 반복 수익 · 재난 인프라 표준</text>
  <text x="40" y="388" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af">허리케인 시즌 직전 → 즉각적 수요 검증</text>

  <text x="240" y="430" font-family="Arial,sans-serif" font-size="10" fill="#4b5563" text-anchor="middle">2026.06.19 · Investus · 참고용</text>
</svg>
