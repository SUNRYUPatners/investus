  <text x="300" y="608" font-family="Arial Black, Arial" font-weight="900" font-size="32" fill="#a7f3d0" text-anchor="middle">직접 회수·분해</text>
  <text x="300" y="638" font-family="Arial, sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">Nevada 배터리 재활용 라인 운영</text>

