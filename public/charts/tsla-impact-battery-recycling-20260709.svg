  <text x="540" y="750" font-family="Arial, sans-serif" font-size="15" fill="#a7f3d0" text-anchor="middle">니켈·리튬·코발트 회수 → 신형 셀 재투입 → 광물 수입 의존 저감</text>

  <rect x="80" y="790" width="920" height="90" rx="14" fill="#071a10" stroke="#00e5a0" stroke-width="1"/>
