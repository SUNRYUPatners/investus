  <text x="780" y="608" font-family="Arial Black, Arial" font-weight="900" font-size="32" fill="#a7f3d0" text-anchor="middle">글로벌 네트워크</text>
  <text x="780" y="638" font-family="Arial, sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">Redwood Materials 등 협력</text>

