  <text x="540" y="854" font-family="Arial, sans-serif" font-size="14" fill="#d1d5db" text-anchor="middle">셀 원가 절감 · 광물 리스크 헤지 · 규제 대응력 (EU 배터리 여권) 확보</text>

  <rect x="80" y="900" width="920" height="60" rx="14" fill="#071a10" stroke="#00e5a0" stroke-width="1"/>
  <text x="540" y="938" font-family="Arial, sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">Source: Tesla 2025 Impact Report · via Sawyer Merritt</text>

  <rect x="0" y="1020" width="1080" height="60" fill="#020810"/>
  <text x="540" y="1056" font-family="Arial, sans-serif" font-size="13" fill="#374151" text-anchor="middle">INVESTUS · 2026.07.09 · investus.kr SRP 최고투자책임자 발행</text>
