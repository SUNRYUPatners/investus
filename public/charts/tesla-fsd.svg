<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0a0f1e"/><stop offset="100%" stop-color="#0f1a2e"/></linearGradient>
    <linearGradient id="fsd" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1d4ed8"/><stop offset="100%" stop-color="#60a5fa"/></linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <text x="400" y="35" text-anchor="middle" fill="#60a5fa" font-size="12" font-family="Arial" font-weight="bold" letter-spacing="3">TESLA FSD · 구독 수익화</text>
  <text x="400" y="60" text-anchor="middle" fill="#e2e8f0" font-size="20" font-family="Arial" font-weight="bold">자율주행이 바꾸는 삶 — $99/월 소프트웨어 전환</text>
  <!-- Left: FSD stats -->
  <rect x="30" y="88" width="330" height="240" rx="12" fill="rgba(96,165,250,0.05)" stroke="rgba(96,165,250,0.15)" stroke-width="1"/>
  <text x="195" y="112" text-anchor="middle" fill="#60a5fa" font-size="12" font-family="Arial" font-weight="bold">FSD 구독 현황</text>
  <line x1="50" y1="120" x2="340" y2="120" stroke="rgba(96,165,250,0.1)" stroke-width="1"/>
  <text x="55" y="145" fill="#94a3b8" font-size="11" font-family="Arial">FSD 구독 단가</text>
  <text x="340" y="145" text-anchor="end" fill="#60a5fa" font-size="14" font-family="Arial" font-weight="bold">$99/월</text>
  <text x="55" y="170" fill="#94a3b8" font-size="11" font-family="Arial">활성 사용자 (2026 Q1)</text>
  <text x="340" y="170" text-anchor="end" fill="#60a5fa" font-size="14" font-family="Arial" font-weight="bold">~60만 명</text>
  <text x="55" y="195" fill="#94a3b8" font-size="11" font-family="Arial">연간 구독 MRR</text>
  <text x="340" y="195" text-anchor="end" fill="#fbbf24" font-size="14" font-family="Arial" font-weight="bold">~$713M/년</text>
  <text x="55" y="220" fill="#94a3b8" font-size="11" font-family="Arial">누적 자율주행 마일</text>
  <text x="340" y="220" text-anchor="end" fill="#00e5a0" font-size="14" font-family="Arial" font-weight="bold">30억+ 마일</text>
  <line x1="50" y1="235" x2="340" y2="235" stroke="rgba(96,165,250,0.1)" stroke-width="1"/>
  <text x="55" y="255" fill="#94a3b8" font-size="11" font-family="Arial">소프트웨어 마진</text>
  <text x="340" y="255" text-anchor="end" fill="#00e5a0" font-size="14" font-family="Arial" font-weight="bold">~80%</text>
  <text x="55" y="278" fill="#94a3b8" font-size="11" font-family="Arial">라이선싱 협의 (현대·GM)</text>
  <text x="340" y="278" text-anchor="end" fill="#fbbf24" font-size="14" font-family="Arial" font-weight="bold">진행 중</text>
  <!-- Right: Revenue layers -->
  <rect x="380" y="88" width="390" height="240" rx="12" fill="rgba(96,165,250,0.03)" stroke="rgba(96,165,250,0.12)" stroke-width="1"/>
  <text x="575" y="112" text-anchor="middle" fill="#60a5fa" font-size="12" font-family="Arial" font-weight="bold">FSD 수익화 4단계</text>
  <line x1="400" y1="120" x2="750" y2="120" stroke="rgba(96,165,250,0.1)" stroke-width="1"/>
  <rect x="400" y="132" width="330" height="26" rx="4" fill="rgba(96,165,250,0.35)"/>
  <text x="565" y="149" text-anchor="middle" fill="#e2e8f0" font-size="11" font-family="Arial" font-weight="bold">① 개인 구독 $99/월</text>
  <rect x="400" y="170" width="280" height="26" rx="4" fill="rgba(96,165,250,0.28)"/>
  <text x="540" y="187" text-anchor="middle" fill="#e2e8f0" font-size="11" font-family="Arial" font-weight="bold">② Cybercab 로봇택시 수수료</text>
  <rect x="400" y="208" width="230" height="26" rx="4" fill="rgba(96,165,250,0.2)"/>
  <text x="515" y="225" text-anchor="middle" fill="#e2e8f0" font-size="11" font-family="Arial" font-weight="bold">③ B2B 라이선싱 (현대·GM)</text>
  <rect x="400" y="246" width="180" height="26" rx="4" fill="rgba(96,165,250,0.14)"/>
  <text x="490" y="263" text-anchor="middle" fill="#e2e8f0" font-size="11" font-family="Arial" font-weight="bold">④ 데이터 판매·API</text>
  <text x="575" y="302" text-anchor="middle" fill="#fbbf24" font-size="11" font-family="Arial">라이선싱 1건 = 연간 수억달러 가능</text>
  <!-- Quote -->
  <rect x="30" y="348" width="740" height="55" rx="8" fill="rgba(96,165,250,0.04)" stroke="rgba(96,165,250,0.12)" stroke-width="1"/>
  <text x="400" y="368" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Arial" font-weight="bold">실사용자 사례</text>
  <text x="400" y="386" text-anchor="middle" fill="#e2e8f0" font-size="10" font-family="Arial">John Z (팔·다리 없이 태어남): "FSD는 내 삶의 확장이다. 처음으로 완전한 이동의 자유를 얻었다"</text>
  <text x="400" y="404" text-anchor="middle" fill="#64748b" font-size="10" font-family="Arial">FSD = 이동약자에게도 혁명 → 접근성 수요 신규 창출</text>
  <text x="400" y="430" text-anchor="middle" fill="#334155" font-size="10" font-family="Arial">SUNRYU Partners CIO · 2026.05.13</text>
</svg>
