  <rect x="85" y="396" width="20" height="9" rx="2" fill="#76c442" opacity="0.8"/>
  <rect x="110" y="389" width="20" height="16" rx="2" fill="#76c442" opacity="0.9"/>
  <rect x="135" y="376" width="20" height="29" rx="2" fill="#76c442"/>
