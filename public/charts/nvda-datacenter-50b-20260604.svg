  <rect x="405" y="354" width="340" height="60" rx="8" fill="#0d1117"/>
  <text x="575" y="372" font-size="9" fill="#9ca3af" text-anchor="middle">연간 실행률 기준 성장</text>
  <text x="575" y="392" font-size="13" font-weight="800" fill="#76c442" text-anchor="middle">$2B/yr → $100B+/yr</text>
  <text x="575" y="408" font-size="8" fill="#9ca3af" text-anchor="middle">AI 붐 이전 대비 50배+ 증가</text>
  <text x="575" y="420" font-size="8" fill="#6b7280" text-anchor="middle">NVDA GPU 수요의 직접 원천</text>

  <text x="770" y="450" font-size="9" fill="#6b7280">investus.kr</text>
