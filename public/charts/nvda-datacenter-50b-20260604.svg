  <text x="570" y="240" font-size="9" fill="#4ade80">META</text>
  <text x="570" y="258" font-size="9" fill="#60a5fa">Microsoft</text>
  <text x="570" y="276" font-size="9" fill="#fb923c">Amazon</text>
  <text x="570" y="294" font-size="9" fill="#a78bfa">Alphabet</text>
