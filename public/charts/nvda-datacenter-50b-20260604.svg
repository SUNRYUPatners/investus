  <polyline points="68,218 83,217 98,215 113,214 128,213 142,211 157,211 172,210 187,209 202,209 216,208 231,207 246,207 261,206 275,205 290,202 305,198 320,193 335,185 350,175 364,165 379,152 394,140 410,130 425,122 440,115 455,113 470,118 485,115 500,112"
