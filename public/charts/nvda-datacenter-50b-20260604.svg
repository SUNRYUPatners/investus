  <text x="216" y="295" font-size="7" fill="#6b7280" text-anchor="middle">Apr-19</text>
  <text x="290" y="295" font-size="7" fill="#6b7280" text-anchor="middle">Apr-21</text>
  <text x="364" y="295" font-size="7" fill="#6b7280" text-anchor="middle">Apr-23</text>
  <text x="445" y="295" font-size="7" fill="#6b7280" text-anchor="middle">Apr-25</text>

