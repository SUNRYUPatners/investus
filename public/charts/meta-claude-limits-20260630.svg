  <text x="540" y="824" font-family="Arial,sans-serif" font-size="17" font-weight="bold" fill="#e5e7eb" text-anchor="middle">AI 모델 증류 전쟁 — META 내부 제한 · IP 분쟁 · 자체 LLM 경쟁 가속</text>
