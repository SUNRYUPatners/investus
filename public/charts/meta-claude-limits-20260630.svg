  <text x="55" y="592" font-family="Arial,sans-serif" font-size="12" fill="#6b7280" font-weight="bold" letter-spacing="2">투자자가 주목할 포인트</text>
  <line x1="55" y1="602" x2="1050" y2="602" stroke="#1e2028" stroke-width="1"/>

  <text x="70" y="636" font-family="Arial,sans-serif" font-size="15" fill="#ef4444">⚠</text>
  <text x="96" y="636" font-family="Arial,sans-serif" font-size="14" fill="#e5e7eb">META가 Claude 제한 = Anthropic 수익 잠재력 제약 · AI 업계 IP 분쟁 본격화 신호</text>

  <text x="70" y="668" font-family="Arial,sans-serif" font-size="15" fill="#ef4444">⚠</text>
  <text x="96" y="668" font-family="Arial,sans-serif" font-size="14" fill="#e5e7eb">모델 증류 우려 = 빅테크들이 외부 AI API 사용 줄이고 자체 LLM 강화로 선회</text>

  <text x="70" y="700" font-family="Arial,sans-serif" font-size="15" fill="#4ade80">✓</text>
  <text x="96" y="700" font-family="Arial,sans-serif" font-size="14" fill="#e5e7eb">META Llama 자체 강화 필요성 확대 → AI R&amp;D 지출 계속 증가</text>

  <text x="70" y="732" font-family="Arial,sans-serif" font-size="15" fill="#4ade80">✓</text>
  <text x="96" y="732" font-family="Arial,sans-serif" font-size="14" fill="#e5e7eb">Amazon-Anthropic 재협상(더 비싸짐) 동시 진행 → AI 비용 구조 전반 재편 중</text>

  <text x="70" y="750" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af">※ 자체 AI 역량 없이는 경쟁 불가 → 독자 LLM 보유 기업(MSFT·GOOGL·META) 중장기 우위</text>

  <rect y="780" width="1080" height="2" fill="#f97316"/>
