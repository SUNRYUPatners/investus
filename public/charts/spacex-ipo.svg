  <text x="575" y="136" fill="#a78bfa" font-size="11" font-family="Arial" font-weight="bold">$5~10B (12%)</text>
  <!-- Bar: 기타 기관 -->
  <rect x="380" y="154" width="370" height="22" rx="4" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <rect x="380" y="154" width="222" height="22" rx="4" fill="rgba(59,130,246,0.4)" stroke="#60a5fa" stroke-width="1"/>
  <text x="392" y="170" fill="#e2e8f0" font-size="11" font-family="Arial" font-weight="bold">기타 기관</text>
  <text x="612" y="170" fill="#60a5fa" font-size="11" font-family="Arial" font-weight="bold">$5.5B (58%)</text>
  <!-- Bar: 소매 -->
  <rect x="380" y="188" width="370" height="22" rx="4" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <rect x="380" y="188" width="111" height="22" rx="4" fill="rgba(0,229,160,0.4)" stroke="#00e5a0" stroke-width="1"/>
  <text x="392" y="204" fill="#e2e8f0" font-size="11" font-family="Arial" font-weight="bold">소매 투자자</text>
  <text x="499" y="204" fill="#00e5a0" font-size="11" font-family="Arial" font-weight="bold">$4.5B (30%)</text>

  <!-- 5 reasons -->
  <rect x="380" y="230" width="370" height="160" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(124,58,237,0.2)" stroke-width="1"/>
  <text x="565" y="252" text-anchor="middle" fill="#a78bfa" font-size="11" font-family="Arial" font-weight="bold">SpaceX가 특별한 이유</text>
  <text x="396" y="274" fill="#94a3b8" font-size="11" font-family="Arial">① Starlink — 전 세계 국가 인터넷 인프라 수준</text>
  <text x="396" y="296" fill="#94a3b8" font-size="11" font-family="Arial">② Falcon 9 재사용 — 경쟁자 없는 발사 기술</text>
  <text x="396" y="318" fill="#94a3b8" font-size="11" font-family="Arial">③ Starship — 화성 식민지·달 임무 초장기 스토리</text>
  <text x="396" y="340" fill="#94a3b8" font-size="11" font-family="Arial">④ 군사·정부 계약 — 미 우주군·NASA 핵심 파트너</text>
  <text x="396" y="362" fill="#94a3b8" font-size="11" font-family="Arial">⑤ AI + 우주 — xAI와 시너지, 머스크 생태계</text>

  <!-- Key stat highlight -->
  <rect x="60" y="340" width="290" height="58" rx="8" fill="rgba(124,58,237,0.1)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
  <text x="205" y="364" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Arial">현재 기업 가치</text>
  <text x="205" y="387" text-anchor="middle" fill="#a78bfa" font-size="22" font-family="Arial" font-weight="bold">$350B+</text>

  <text x="400" y="416" text-anchor="middle" fill="#334155" font-size="10" font-family="Arial">SUNRYU Partners CIO · 2026.05.18</text>
