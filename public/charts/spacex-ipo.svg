<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0a0f1e"/><stop offset="100%" stop-color="#100a28"/></linearGradient>
    <linearGradient id="gp" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#a78bfa"/></linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#7c3aed" stop-opacity="0.5"/></linearGradient>
  </defs>
  <rect width="800" height="430" fill="url(#bg)"/>
  <text x="400" y="32" text-anchor="middle" fill="#a78bfa" font-size="11" font-family="Arial" font-weight="bold" letter-spacing="3">SpaceX IPO · 2026.06.12 Nasdaq $SPCE</text>
  <text x="400" y="57" text-anchor="middle" fill="#e2e8f0" font-size="20" font-family="Arial" font-weight="bold">$15B 조달 — BlackRock $5~10B 단독 매수 시도</text>

  <!-- IPO 물량 파이 차트 (두 개 반원) -->
  <!-- 기관 70% -->
  <path d="M 200 220 L 200 120 A 100 100 0 1 1 120 330 Z" fill="rgba(124,58,237,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="165" y="235" text-anchor="middle" fill="#a78bfa" font-size="22" font-family="Arial" font-weight="bold">70%</text>
  <text x="165" y="256" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Arial">기관 투자자</text>
  <!-- 소매 30% -->
  <path d="M 200 220 L 120 330 A 100 100 0 0 1 200 120 Z" fill="rgba(0,229,160,0.35)" stroke="#00e5a0" stroke-width="1.5"/>
  <text x="233" y="282" text-anchor="middle" fill="#00e5a0" font-size="18" font-family="Arial" font-weight="bold">30%</text>
  <text x="240" y="300" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Arial">소매 투자자</text>

  <!-- BlackRock bar -->
  <text x="380" y="105" fill="#94a3b8" font-size="11" font-family="Arial" font-weight="bold">IPO 물량 배분 ($15B 기준)</text>
  <!-- Bar: BlackRock -->
  <rect x="380" y="120" width="370" height="22" rx="4" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <rect x="380" y="120" width="185" height="22" rx="4" fill="rgba(124,58,237,0.5)" stroke="#a78bfa" stroke-width="1"/>
