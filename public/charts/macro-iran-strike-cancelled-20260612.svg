<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480">
  <rect width="480" height="480" fill="#0a0c10"/>
  <rect x="0" y="0" width="480" height="64" fill="#111318"/>
  <rect x="0" y="60" width="480" height="2" fill="#fb923c" opacity="0.3"/>
  <text x="24" y="26" font-family="Arial,sans-serif" font-size="11" fill="#fb923c" font-weight="bold">매크로 · 지정학</text>
  <text x="24" y="46" font-family="Arial,sans-serif" font-size="13" fill="#e5e7eb" font-weight="bold">트럼프 이란 공습 취소 — 핵합의 타결 진행</text>

  <!-- Status -->
  <rect x="24" y="80" width="432" height="60" rx="12" fill="#0d1f14" stroke="#00e5a0" stroke-width="1" stroke-opacity="0.6"/>
  <text x="40" y="104" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af">현재 상태</text>
  <text x="40" y="128" font-family="Arial,sans-serif" font-size="18" fill="#00e5a0" font-weight="bold">🕊️ 이란 공습 취소 · 핵합의 협상 진행 중</text>

  <!-- Background -->
  <text x="24" y="166" font-family="Arial,sans-serif" font-size="12" fill="#6b7280" font-weight="bold">■ 주요 경과</text>

  <rect x="24" y="178" width="432" height="36" rx="8" fill="#111318"/>
  <text x="40" y="194" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af">6/11 (어제)</text>
  <text x="120" y="194" font-family="Arial,sans-serif" font-size="12" fill="#ef4444" font-weight="bold">트럼프 강경 발언 · 유가 $90 급등 (+2.4%)</text>
  <text x="40" y="208" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af">긴장 고조</text>
  <text x="120" y="208" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af">시장 불안 · S&amp;P 낙폭 후 회복</text>

  <rect x="24" y="222" width="432" height="36" rx="8" fill="rgba(0,229,160,0.07)" stroke="#00e5a0" stroke-width="1" stroke-opacity="0.3"/>
  <text x="40" y="238" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af">6/12 (오늘)</text>
  <text x="120" y="238" font-family="Arial,sans-serif" font-size="12" fill="#00e5a0" font-weight="bold">공습 취소 선언 · 핵합의 틀 협상 타결 진행</text>
  <text x="40" y="252" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af">긴장 완화</text>
  <text x="120" y="252" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af">미·이스라엘·사우디 등 승인 단계</text>

  <!-- Market impact -->
  <text x="24" y="278" font-family="Arial,sans-serif" font-size="12" fill="#6b7280" font-weight="bold">■ 시장 임팩트</text>

  <rect x="24" y="290" width="204" height="64" rx="10" fill="#111318"/>
  <text x="126" y="312" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">유가 방향</text>
  <text x="126" y="338" font-family="Arial,sans-serif" font-size="16" fill="#00e5a0" text-anchor="middle" font-weight="bold">$90 → $82~85</text>
  <text x="126" y="352" font-family="Arial,sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">하락 압력 예상</text>

  <rect x="244" y="290" width="212" height="64" rx="10" fill="#111318"/>
  <text x="350" y="312" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">CPI 전망</text>
  <text x="350" y="338" font-family="Arial,sans-serif" font-size="16" fill="#00e5a0" text-anchor="middle" font-weight="bold">6월 CPI 완화</text>
  <text x="350" y="352" font-family="Arial,sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">에너지 압력 감소</text>

  <!-- Sectoral impact -->
  <text x="24" y="378" font-family="Arial,sans-serif" font-size="12" fill="#6b7280" font-weight="bold">■ 섹터별 임팩트</text>

  <rect x="24" y="390" width="432" height="56" rx="10" fill="#111318"/>
  <text x="40" y="410" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af">수혜</text>
  <text x="100" y="410" font-family="Arial,sans-serif" font-size="12" fill="#00e5a0">항공사(UAL·DAL) · 운송·물류 · 성장주(금리 하락)</text>
  <text x="40" y="432" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af">부담</text>
  <text x="100" y="432" font-family="Arial,sans-serif" font-size="12" fill="#fb923c">에너지(XLE) 단기 압력 · 방산(RTX) 단기 부담</text>

  <text x="240" y="460" font-family="Arial,sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">핵합의 최종 타결까지 수주~수개월 소요 예상 — 불확실성 잔존</text>
  <text x="240" y="472" font-family="Arial,sans-serif" font-size="10" fill="#4b5563" text-anchor="middle">2026.06.12 · Investus · 투자 참고용</text>
</svg>
