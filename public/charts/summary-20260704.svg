      <stop offset="0%" style="stop-color:#0a0f14"/>
      <stop offset="100%" style="stop-color:#0d1a12"/>
    </linearGradient>
    <linearGradient id="mintGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d68f"/>
      <stop offset="100%" style="stop-color:#00b377"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
