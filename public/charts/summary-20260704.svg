  <text x="60" y="158" font-family="Arial, sans-serif" font-size="16" fill="#6a9a7a">TSLA 로보택시 5도시 무감독 · FSD 독일 · NVDA AI 파트너십 · OpenAI 정부 지분</text>

  <!-- Row 1: 2 big cards -->
  <!-- Card 1: TSLA Robotaxi 5 cities -->
  <rect x="60" y="178" width="455" height="175" rx="14" fill="#0f2a1e" stroke="#00d68f" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="82" y="208" font-family="Arial, sans-serif" font-size="13" fill="#00d68f">🚗 TSLA 로보택시</text>
  <text x="82" y="238" font-family="Arial Black, Arial" font-weight="900" font-size="30" fill="#00d68f" filter="url(#glow)">무감독 5개 도시</text>
  <text x="82" y="260" font-family="Arial, sans-serif" font-size="14" fill="#8ab89a">마이애미 · 달라스 · 휴스턴</text>
  <text x="82" y="280" font-family="Arial, sans-serif" font-size="14" fill="#8ab89a">오스틴 · 베이 에어리어</text>
  <text x="82" y="305" font-family="Arial, sans-serif" font-size="13" fill="#4a8a6a">Cybercab 오스틴 생산 시작</text>
  <text x="82" y="325" font-family="Arial, sans-serif" font-size="12" fill="#4a6f5a">Model Y 무감독 유료 서비스 전면 개시</text>
  <rect x="370" y="200" width="130" height="50" rx="8" fill="#003820" stroke="#00d68f" stroke-width="1" stroke-opacity="0.4"/>
