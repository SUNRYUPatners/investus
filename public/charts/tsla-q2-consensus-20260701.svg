  <line x1="330" y1="150" x2="330" y2="215" stroke="#1e293b" stroke-width="1"/>
  <text x="540" y="178" font-family="Arial Black, sans-serif" font-size="42" font-weight="900" fill="#60a5fa" text-anchor="middle" filter="url(#glow)">~416,000</text>
  <text x="540" y="210" font-family="Arial, sans-serif" font-size="16" fill="#9ca3af" text-anchor="middle">Q2 2026 컨센서스 평균</text>
  <line x1="750" y1="150" x2="750" y2="215" stroke="#1e293b" stroke-width="1"/>
  <text x="890" y="178" font-family="Arial Black, sans-serif" font-size="18" fill="#22c55e" text-anchor="middle">2026 Q2</text>
  <text x="890" y="200" font-family="Arial, sans-serif" font-size="13" fill="#6b7280" text-anchor="middle">배송 예상</text>

