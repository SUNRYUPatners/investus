  <text x="540" y="1068" font-family="Arial, sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">8개 기관 컨센서스 ~416,000대 — GLJ 426K 최고, Baird 392K 최저 · INVESTUS · 2026.07.01 · 투자 참고용</text>
