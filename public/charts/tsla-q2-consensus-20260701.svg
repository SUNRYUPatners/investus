  <text x="200" y="835" font-family="Arial Black, sans-serif" font-size="22" fill="#ef4444" text-anchor="middle" font-weight="900">426,017</text>
  <text x="200" y="858" font-family="Arial, sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">최고 전망 (GLJ Research)</text>
  <text x="200" y="878" font-family="Arial, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">Highest Estimate</text>

  <rect x="380" y="800" width="320" height="90" rx="12" fill="url(#cardGrad)" stroke="#60a5fa" stroke-width="1"/>
  <text x="540" y="835" font-family="Arial Black, sans-serif" font-size="22" fill="#60a5fa" text-anchor="middle" font-weight="900">~416,000</text>
  <text x="540" y="858" font-family="Arial, sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">컨센서스 평균 (8개 기관)</text>
  <text x="540" y="878" font-family="Arial, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">Consensus Average</text>

