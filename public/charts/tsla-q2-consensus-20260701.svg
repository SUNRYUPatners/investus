  <text x="60" y="100" font-family="Arial Black, sans-serif" font-size="26" font-weight="900" fill="white">TSLA · Q2 배송 컨센서스</text>
  <rect x="880" y="38" width="148" height="34" rx="17" fill="#60a5fa" opacity="0.9"/>
  <text x="954" y="60" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">2026.07.01</text>

