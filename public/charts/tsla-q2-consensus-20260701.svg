  <text x="880" y="835" font-family="Arial Black, sans-serif" font-size="22" fill="#9ca3af" text-anchor="middle" font-weight="900">392,900</text>
  <text x="880" y="858" font-family="Arial, sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">최저 전망 (Baird)</text>
  <text x="880" y="878" font-family="Arial, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">Lowest Estimate</text>

  <!-- Footer -->
