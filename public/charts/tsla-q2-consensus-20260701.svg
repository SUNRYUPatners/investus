  <text x="240" y="319" font-family="Arial Black, sans-serif" font-size="15" fill="white" text-anchor="end">GLJ Research</text>
  <rect x="265" y="289" width="686" height="44" rx="6" fill="#ef4444" opacity="0.2"/>
