  <text x="240" y="215" font-family="Arial,sans-serif" font-size="10" fill="#e5e7eb" text-anchor="middle">5-year stock price range</text>

  <text x="24" y="248" font-family="Arial,sans-serif" font-size="11" fill="#6b7280">Floor achieved: $116/share</text>
  <text x="240" y="248" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">→ base compensation unlocked</text>
  <text x="24" y="266" font-family="Arial,sans-serif" font-size="11" fill="#c084fc" font-weight="bold">Max achieved: $3,727/share</text>
  <text x="240" y="266" font-family="Arial,sans-serif" font-size="11" fill="#c084fc" text-anchor="middle">→ maximum comp unlocked</text>

  <text x="24" y="296" font-family="Arial,sans-serif" font-size="12" fill="#6b7280" font-weight="bold">■ What $3,727 Would Mean</text>
  <rect x="24" y="308" width="204" height="60" rx="10" fill="#111318"/>
  <text x="126" y="330" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">Market Cap (at $3,727)</text>
  <text x="126" y="354" font-family="Arial,sans-serif" font-size="18" fill="#c084fc" font-weight="bold" text-anchor="middle">~$26T</text>
  <text x="126" y="364" font-family="Arial,sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">11.5x current market cap</text>

  <rect x="244" y="308" width="212" height="60" rx="10" fill="#111318"/>
  <text x="350" y="330" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">Comparable To</text>
  <text x="350" y="354" font-family="Arial,sans-serif" font-size="14" fill="#e5e7eb" font-weight="bold" text-anchor="middle">NVDA level today</text>
  <text x="350" y="364" font-family="Arial,sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">World's #1 company now</text>

  <rect x="24" y="382" width="432" height="70" rx="10" fill="#111318"/>
  <text x="40" y="404" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af" font-weight="bold">■ The Starbucks Analogy</text>
  <text x="40" y="424" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">• SpaceX can operate without Elon</text>
  <text x="40" y="442" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af">• But the strategic direction would differ — acknowledged</text>

  <text x="240" y="466" font-family="Arial,sans-serif" font-size="10" fill="#4b5563" text-anchor="middle">2026.06.13 · Investus · For reference only</text>
