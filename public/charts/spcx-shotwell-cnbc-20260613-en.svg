  <text x="24" y="26" font-family="Arial,sans-serif" font-size="11" fill="#c084fc" font-weight="bold">SPCX Special · Management</text>
  <text x="24" y="46" font-family="Arial,sans-serif" font-size="13" fill="#e5e7eb" font-weight="bold">Gwynne Shotwell CNBC — Exec Comp $116→$3,727</text>

  <rect x="24" y="78" width="432" height="76" rx="12" fill="#1a0d2e" stroke="#c084fc" stroke-width="1" stroke-opacity="0.5"/>
  <text x="40" y="100" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af">Gwynne Shotwell, SpaceX President &amp; COO</text>
  <text x="40" y="120" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">"SpaceX would not collapse without Elon,</text>
  <text x="40" y="138" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb"> but it'd be a different company — like Starbucks."</text>

  <text x="24" y="182" font-family="Arial,sans-serif" font-size="12" fill="#6b7280" font-weight="bold">■ Executive Performance Comp Structure (Stock Price Milestones)</text>

  <rect x="24" y="196" width="432" height="30" rx="6" fill="#111318"/>
  <defs>
    <linearGradient id="compGradEn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="28" y="200" width="424" height="22" rx="4" fill="url(#compGradEn)"/>
  <text x="36" y="215" font-family="Arial,sans-serif" font-size="11" fill="#e5e7eb" font-weight="bold">$116</text>
