  <rect x="274" y="258" width="112" height="54" rx="8" fill="#1a1020" stroke="#60a5fa" stroke-width="1" stroke-opacity="0.25"/>
  <text x="330" y="274" font-family="Arial,sans-serif" font-size="9" fill="#60a5fa" text-anchor="middle">Bull Case</text>
  <text x="330" y="296" font-family="Arial,sans-serif" font-size="20" fill="#60a5fa" text-anchor="middle" font-weight="800">$3,100</text>
  <text x="330" y="308" font-family="Arial,sans-serif" font-size="9" fill="#aaccff" text-anchor="middle">상방 시나리오</text>

  <!-- Timeline -->
  <text x="20" y="336" font-family="Arial,sans-serif" font-size="11" fill="#888899" font-weight="600">Robotaxi 확장 타임라인</text>
  <line x1="30" y1="360" x2="370" y2="360" stroke="#222233" stroke-width="1.5"/>
  <!-- Dots -->
  <circle cx="70" cy="360" r="5" fill="#444466"/>
  <text x="70" y="375" font-family="Arial,sans-serif" font-size="8" fill="#666677" text-anchor="middle">2025 H2</text>
  <text x="70" y="385" font-family="Arial,sans-serif" font-size="8" fill="#888899" text-anchor="middle">Austin 론칭</text>

  <circle cx="160" cy="360" r="6" fill="#00e5a0"/>
  <text x="160" y="375" font-family="Arial,sans-serif" font-size="8" fill="#00e5a0" text-anchor="middle">2026 H1</text>
  <text x="160" y="385" font-family="Arial,sans-serif" font-size="8" fill="#aaffdd" text-anchor="middle">확장 운행 ★</text>

  <circle cx="250" cy="360" r="5" fill="#444466"/>
  <text x="250" y="375" font-family="Arial,sans-serif" font-size="8" fill="#666677" text-anchor="middle">2026 H2</text>
  <text x="250" y="385" font-family="Arial,sans-serif" font-size="8" fill="#888899" text-anchor="middle">타도시 확대</text>

  <circle cx="340" cy="360" r="5" fill="#333355"/>
  <text x="340" y="375" font-family="Arial,sans-serif" font-size="8" fill="#555566" text-anchor="middle">2027+</text>
  <text x="340" y="385" font-family="Arial,sans-serif" font-size="8" fill="#666677" text-anchor="middle">글로벌 확산</text>

  <!-- Insight -->
  <rect x="14" y="394" width="372" height="32" rx="8" fill="#0a1a12" stroke="#00e5a0" stroke-width="1" stroke-opacity="0.2"/>
  <text x="28" y="408" font-family="Arial,sans-serif" font-size="9.5" fill="#aabbcc">"이렇게 천천히, 그리고 서서히, 한꺼번에 움직이고 있습니다" — Cathie Wood</text>
  <text x="28" y="421" font-family="Arial,sans-serif" font-size="9.5" fill="#aabbcc">ARK 보유량 ~2.83M주 · 2030년까지 장기 보유 전략</text>

  <text x="200" y="438" font-family="Arial,sans-serif" font-size="9" fill="#333344" text-anchor="middle">2026.06.09 | investus.kr</text>
