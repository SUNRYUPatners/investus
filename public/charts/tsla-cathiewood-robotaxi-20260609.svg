  <rect x="144" y="258" width="112" height="54" rx="8" fill="#0a1a12" stroke="#00e5a0" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="200" y="274" font-family="Arial,sans-serif" font-size="9" fill="#00e5a0" text-anchor="middle" font-weight="700">Base Case ★</text>
  <text x="200" y="296" font-family="Arial,sans-serif" font-size="20" fill="#00e5a0" text-anchor="middle" font-weight="800">$2,600</text>
  <text x="200" y="308" font-family="Arial,sans-serif" font-size="9" fill="#aaffdd" text-anchor="middle">기본 시나리오</text>
