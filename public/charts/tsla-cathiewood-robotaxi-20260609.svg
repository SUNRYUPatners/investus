<svg viewBox="0 0 400 440" xmlns="http://www.w3.org/2000/svg" style="background:#0d0d14;border-radius:12px">
  <!-- Header -->
  <rect x="0" y="0" width="400" height="56" rx="12" fill="#111118"/>
  <text x="20" y="22" font-family="Arial,sans-serif" font-size="11" fill="#00e5a0" font-weight="700">🚗 TSLA</text>
  <text x="20" y="40" font-family="Arial,sans-serif" font-size="13" fill="#ffffff" font-weight="700">Cathie Wood — Tesla Unsupervised Robotaxi 최초 탑승</text>

  <!-- Quote Card -->
  <rect x="14" y="66" width="372" height="90" rx="10" fill="#0a1a12" stroke="#00e5a0" stroke-width="1.5" stroke-opacity="0.35"/>
  <text x="28" y="86" font-family="Arial,sans-serif" font-size="10" fill="#00e5a0" font-weight="700">" Cathie Wood, ARK Invest CEO "</text>
  <text x="28" y="104" font-family="Arial,sans-serif" font-size="9.5" fill="#ccddee" font-style="italic">"The fact that I was talking to you the whole time and didn't</text>
  <text x="28" y="118" font-family="Arial,sans-serif" font-size="9.5" fill="#ccddee" font-style="italic">pay any attention to the ride means I think it's completely safe.</text>
  <text x="28" y="132" font-family="Arial,sans-serif" font-size="9.5" fill="#00e5a0" font-style="italic">I'm excited for Tesla. I'm excited for Tesla shareholders."</text>
  <text x="28" y="149" font-family="Arial,sans-serif" font-size="9" fill="#666677">— Austin, Texas (via @SawyerMerritt)</text>

  <!-- Info Cards -->
  <rect x="14" y="168" width="177" height="60" rx="8" fill="#161622" stroke="#00e5a0" stroke-width="1" stroke-opacity="0.2"/>
  <text x="103" y="186" font-family="Arial,sans-serif" font-size="9" fill="#888899" text-anchor="middle">탑승 위치</text>
  <text x="103" y="206" font-family="Arial,sans-serif" font-size="16" fill="#00e5a0" text-anchor="middle" font-weight="800">Austin, TX</text>
  <text x="103" y="221" font-family="Arial,sans-serif" font-size="9" fill="#aaffdd" text-anchor="middle">Texas (Unsupervised)</text>

  <rect x="209" y="168" width="177" height="60" rx="8" fill="#161622" stroke="#c084fc" stroke-width="1" stroke-opacity="0.2"/>
  <text x="298" y="186" font-family="Arial,sans-serif" font-size="9" fill="#888899" text-anchor="middle">탑승 모드</text>
  <text x="298" y="206" font-family="Arial,sans-serif" font-size="14" fill="#c084fc" text-anchor="middle" font-weight="800">Unsupervised</text>
  <text x="298" y="221" font-family="Arial,sans-serif" font-size="9" fill="#ddaaff" text-anchor="middle">운전자 개입 없음 (최초)</text>

  <!-- ARK 2030 targets preview -->
  <text x="20" y="252" font-family="Arial,sans-serif" font-size="11" fill="#888899" font-weight="600">ARK Invest Tesla 2030 목표 주가</text>
  <!-- Bear -->
  <rect x="14" y="258" width="112" height="54" rx="8" fill="#1a1020" stroke="#c084fc" stroke-width="1" stroke-opacity="0.25"/>
  <text x="70" y="274" font-family="Arial,sans-serif" font-size="9" fill="#c084fc" text-anchor="middle">Bear Case</text>
  <text x="70" y="296" font-family="Arial,sans-serif" font-size="20" fill="#c084fc" text-anchor="middle" font-weight="800">$2,000</text>
  <text x="70" y="308" font-family="Arial,sans-serif" font-size="9" fill="#ddaaff" text-anchor="middle">하방 시나리오</text>
