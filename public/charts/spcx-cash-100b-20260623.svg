<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" style="background:#0d1117;font-family:'Apple SD Gothic Neo',sans-serif">
  <rect width="800" height="500" rx="12" fill="#0d1117"/>
  <text x="400" y="36" text-anchor="middle" fill="#c084fc" font-size="13" font-weight="700">SPCX · SpaceX</text>
  <text x="400" y="62" text-anchor="middle" fill="#e6edf3" font-size="20" font-weight="700">현금 자산 $34.7B → $100.8B — 3배 급증</text>
  <text x="400" y="84" text-anchor="middle" fill="#7d8590" font-size="13">FY2025 말 대비 현재 현금 포지션 · 채권 발행 추진 배경</text>
  <line x1="40" y1="96" x2="760" y2="96" stroke="#21262d" stroke-width="1"/>

  <!-- Bar chart -->
  <!-- FY25 End: $34.7B bar width = 34.7/100.8 * 560 = 193 -->
  <!-- Current: $100.8B bar width = 560 -->
  <text x="60" y="128" fill="#7d8590" font-size="12">FY25 말</text>
  <rect x="150" y="110" width="193" height="36" rx="4" fill="#4b2d6b"/>
  <text x="353" y="133" fill="#c084fc" font-size="13" font-weight="700">$34.7B</text>

  <text x="60" y="180" fill="#c084fc" font-size="12" font-weight="700">현재</text>
  <rect x="150" y="162" width="560" height="36" rx="4" fill="#c084fc"/>
  <text x="720" y="185" fill="#e6edf3" font-size="14" font-weight="800">$100.8B</text>

  <!-- Growth arrow -->
  <text x="400" y="230" text-anchor="middle" fill="#c084fc" font-size="22" font-weight="800">+$66.1B (+190%)</text>
  <text x="400" y="252" text-anchor="middle" fill="#7d8590" font-size="12">6개월 만에 현금 3배 달성</text>

  <!-- 2 boxes: why / what next -->
  <rect x="40" y="270" width="348" height="140" rx="8" fill="#161b22"/>
  <rect x="40" y="270" width="348" height="4" rx="2" fill="#c084fc"/>
  <text x="214" y="298" text-anchor="middle" fill="#c084fc" font-size="13" font-weight="600">현금 급증 배경</text>
  <text x="60" y="322" fill="#e6edf3" font-size="12">Starlink 구독 매출 급성장</text>
  <text x="60" y="344" fill="#e6edf3" font-size="12">정부 계약 (Space Force 등) 수금</text>
  <text x="60" y="366" fill="#7d8590" font-size="11">IPO 전 대규모 자본 조달 완료</text>
  <text x="60" y="388" fill="#7d8590" font-size="11">채권 발행 proceeds 포함 예정</text>

  <rect x="412" y="270" width="348" height="140" rx="8" fill="#161b22"/>
  <rect x="412" y="270" width="348" height="4" rx="2" fill="#c084fc"/>
  <text x="586" y="298" text-anchor="middle" fill="#c084fc" font-size="13" font-weight="600">활용 계획</text>
  <text x="432" y="322" fill="#e6edf3" font-size="12">브릿지론 상환 (채권으로 대체)</text>
  <text x="432" y="344" fill="#e6edf3" font-size="12">Starlink V3 위성 양산 투자</text>
  <text x="432" y="366" fill="#7d8590" font-size="11">Colossus AI 인프라 확장</text>
  <text x="432" y="388" fill="#7d8590" font-size="11">일반 운영 자금</text>

  <line x1="40" y1="422" x2="760" y2="422" stroke="#21262d" stroke-width="1"/>
  <text x="400" y="438" text-anchor="middle" fill="#444c56" font-size="10">출처: SpaceX 공시 / @InvestingVisuals · investus.kr</text>

  <rect x="40" y="450" width="720" height="34" rx="6" fill="#1c1026"/>
  <text x="400" y="472" text-anchor="middle" fill="#c084fc" font-size="12">$100B+ 현금 = 채권 발행 없이도 Starlink·AI 인프라 자체 조달 가능한 수준</text>
</svg>
