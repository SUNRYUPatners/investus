  <rect x="80" y="886" width="920" height="72" rx="14" fill="#0a1f2e" stroke="#60a5fa" stroke-width="1"/>
  <text x="540" y="922" font-family="Arial Black, Arial" font-weight="900" font-size="15" fill="#60a5fa" text-anchor="middle">핸들·페달 없는 설계 = 장애인 이동권 혁명 · 기존 차량 불가능한 시장 개척</text>

  <rect x="0" y="1020" width="1080" height="60" fill="#020810"/>
  <text x="540" y="1056" font-family="Arial, sans-serif" font-size="13" fill="#374151" text-anchor="middle">INVESTUS · 2026.07.07 · investus.kr SRP 최고투자책임자 발행</text>
