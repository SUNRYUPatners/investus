  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect x="60" y="60" width="960" height="4" fill="url(#tealGrad)" rx="2"/>
  <rect x="60" y="86" width="80" height="34" rx="8" fill="#0ea5e9"/>
  <text x="100" y="109" font-family="Arial Black, Arial" font-weight="900" font-size="13" fill="#ffffff" text-anchor="middle">TSLA</text>
  <rect x="152" y="86" width="130" height="34" rx="8" fill="none" stroke="#0ea5e9" stroke-width="1.5"/>
