  <text x="540" y="706" font-family="Arial, sans-serif" font-size="15" fill="#d1d5db" text-anchor="middle">시각장애인도 보조인 없이 Cybercab에 혼자 탑승·하차 가능 확인</text>
  <text x="540" y="728" font-family="Arial, sans-serif" font-size="14" fill="#9ca3af" text-anchor="middle">안내견 동반 고객도 탑승 가능 (예: 점자 안내 + 충분한 발판 공간)</text>

  <!-- market size -->
  <rect x="80" y="764" width="440" height="100" rx="14" fill="#0f1f2e" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="300" y="804" font-family="Arial Black, Arial" font-weight="900" font-size="14" fill="#0ea5e9" text-anchor="middle">미국 시각장애인</text>
  <text x="300" y="842" font-family="Arial Black, Arial" font-weight="900" font-size="32" fill="#38bdf8" text-anchor="middle">700만명+</text>

  <rect x="560" y="764" width="440" height="100" rx="14" fill="#0f1f2e" stroke="#22c55e" stroke-width="1.5"/>
