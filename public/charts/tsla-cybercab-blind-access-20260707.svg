  <text x="618" y="550" font-family="Arial, sans-serif" font-size="13" fill="#d1d5db" text-anchor="middle">시각 없이</text>
  <text x="618" y="574" font-family="Arial, sans-serif" font-size="13" fill="#d1d5db" text-anchor="middle">조작 가능</text>
  <text x="618" y="598" font-family="Arial, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">Physical controls</text>

  <rect x="734" y="470" width="266" height="150" rx="12" fill="#071520" stroke="#0ea5e9" stroke-width="1"/>
  <text x="867" y="510" font-family="Arial Black, Arial" font-weight="900" font-size="13" fill="#38bdf8" text-anchor="middle">독립 탑승</text>
  <text x="867" y="550" font-family="Arial, sans-serif" font-size="13" fill="#d1d5db" text-anchor="middle">휠체어 높이</text>
  <text x="867" y="574" font-family="Arial, sans-serif" font-size="13" fill="#d1d5db" text-anchor="middle">맞춤 시트</text>
  <text x="867" y="598" font-family="Arial, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">Wheelchair-height seating</text>

