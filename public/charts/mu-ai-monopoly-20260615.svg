<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 440">
  <rect width="480" height="440" fill="#0d0d0d"/>
  <rect x="16" y="12" width="448" height="44" rx="10" fill="#0f110a"/>
  <text x="240" y="29" font-family="sans-serif" font-size="10" fill="#fb923c" text-anchor="middle" font-weight="700" letter-spacing="1">🧠 MU · 미국의 AI 메모리 독점</text>
  <text x="240" y="48" font-family="sans-serif" font-size="13" fill="#f0f0f0" text-anchor="middle" font-weight="800">$200B 빌드아웃 · 목표주가 $300~400</text>

  <!-- Monopoly statement -->
  <rect x="16" y="66" width="448" height="64" rx="10" fill="#1a1a1f" stroke="#fb923c" stroke-width="1"/>
  <text x="26" y="84" font-family="sans-serif" font-size="9" fill="#888">Milk Road AI 분석</text>
  <text x="26" y="101" font-family="sans-serif" font-size="11" fill="#f0f0f0" font-weight="700">"Micron은 더 이상 칩 회사가 아닙니다."</text>
  <text x="26" y="117" font-family="sans-serif" font-size="10" fill="#aaa">"미국의 전략적 첨단 메모리 독점 기업 — 서방 유일 양산 업체"</text>

  <!-- Key facts grid -->
  <rect x="16" y="140" width="214" height="90" rx="10" fill="#1a1a1f"/>
  <text x="26" y="158" font-family="sans-serif" font-size="10" font-weight="700" fill="#fb923c">시장 지위</text>
  <text x="26" y="175" font-family="sans-serif" font-size="9" fill="#f0f0f0">• 서방 유일 첨단 D램 양산</text>
  <text x="26" y="191" font-family="sans-serif" font-size="9" fill="#f0f0f0">• 美 AI 빌드아웃 핵심 공급망</text>
  <text x="26" y="207" font-family="sans-serif" font-size="9" fill="#f0f0f0">• 미국산 최고가 제품 중 하나</text>
  <text x="26" y="221" font-family="sans-serif" font-size="9" fill="#888">• 공급 2028년까지 수요 초과</text>

  <rect x="250" y="140" width="214" height="90" rx="10" fill="#1a1a1f"/>
  <text x="260" y="158" font-family="sans-serif" font-size="10" font-weight="700" fill="#fb923c">정부 지원</text>
  <text x="260" y="175" font-family="sans-serif" font-size="9" fill="#f0f0f0">• CHIPS Act $8.2B 지원</text>
  <text x="260" y="191" font-family="sans-serif" font-size="9" fill="#f0f0f0">  ($2B만 집행 → $6.2B 남음)</text>
  <text x="260" y="207" font-family="sans-serif" font-size="9" fill="#f0f0f0">• 국가 안보 핵심 자산 지정</text>
  <text x="260" y="221" font-family="sans-serif" font-size="9" fill="#888">• 상무장관 친방 + 의회 지원</text>

  <!-- $200B buildout -->
  <rect x="16" y="240" width="448" height="80" rx="10" fill="#0f110a" stroke="#fb923c" stroke-width="1"/>
  <text x="26" y="258" font-family="sans-serif" font-size="10" font-weight="700" fill="#fb923c">$200B 빌드아웃 — AI 시대 핵심 역할</text>
  <text x="26" y="275" font-family="sans-serif" font-size="9" fill="#f0f0f0">• 미국 내 AI 데이터센터 투자 $200B 규모 → Micron HBM 메모리 핵심 수혜</text>
  <text x="26" y="291" font-family="sans-serif" font-size="9" fill="#f0f0f0">• 고대역폭 메모리(HBM) 수요: NVDA H100·H200·B200 GPU당 필수 탑재</text>
  <text x="26" y="307" font-family="sans-serif" font-size="9" fill="#888">• 경쟁사(Samsung·SK): 국내 생산 → 美 정책 리스크. MU: 미국 내 생산 = 정책 수혜</text>

  <!-- Price target -->
  <rect x="16" y="330" width="448" height="68" rx="10" fill="#1a1a1f"/>
  <text x="26" y="348" font-family="sans-serif" font-size="10" font-weight="700" fill="#888">목표주가 분석 (Milk Road AI)</text>
  <!-- Price bar -->
  <rect x="26" y="356" width="400" height="18" rx="4" fill="#1f1f0f"/>
  <rect x="26" y="356" width="133" height="18" rx="4" fill="#fb923c" opacity="0.4"/>
  <text x="159" y="369" font-family="sans-serif" font-size="9" fill="#aaa">현재</text>
  <rect x="26" y="356" width="300" height="18" rx="4" fill="none" stroke="#fb923c" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="330" y="369" font-family="sans-serif" font-size="9" fill="#fb923c">$300~400 목표</text>
  <text x="26" y="392" font-family="sans-serif" font-size="9" fill="#aaa">비즈니스 모델 전환: 메모리 제조 → AI 인프라 필수 부품 공급자 재포지셔닝</text>

  <text x="240" y="432" font-family="sans-serif" font-size="9" fill="#444" text-anchor="middle">investus.kr · 2026.06.15</text>
</svg>
