  <text x="634" y="278" fill="rgba(255,255,255,0.4)" font-size="10" text-anchor="middle">유럽 3개국 도미노 진행 중</text>

  <!-- timeline -->
  <text x="30" y="316" fill="rgba(255,255,255,0.4)" font-size="11" font-weight="700" letter-spacing="1">Tesla 글로벌 판매 확장 타임라인</text>
  <rect x="30" y="326" width="740" height="56" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)"/>
