  <text x="374" y="278" fill="rgba(255,255,255,0.35)" font-size="10" text-anchor="middle">35~52만대 잠재력</text>

  <rect x="498" y="200" width="272" height="80" rx="10" fill="#00e5a0" fill-opacity="0.07" stroke="#00e5a0" stroke-opacity="0.2"/>
