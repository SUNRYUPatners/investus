  <text x="490" y="368" fill="#00e5a0" font-size="13" font-weight="700" text-anchor="middle">✅ +182% YoY</text>
  <line x1="580" y1="356" x2="610" y2="356" stroke="rgba(255,255,255,0.2)" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="690" y="350" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle">EU 유럽</text>
  <text x="690" y="368" fill="#fbbf24" font-size="13" font-weight="700" text-anchor="middle">🆕 판매 시작</text>

  <rect x="30" y="400" width="740" height="28" rx="6" fill="rgba(255,255,255,0.02)"/>
  <text x="50" y="418" fill="rgba(255,255,255,0.35)" font-size="11">FSD 유럽 규제 승인 확대 + EU 판매 동시 개시 → 유럽 시장 모멘텀 본격화</text>
