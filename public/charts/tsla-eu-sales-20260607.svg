  <text x="110" y="368" fill="white" font-size="13" font-weight="700" text-anchor="middle">✅ 기존</text>
  <line x1="200" y1="356" x2="230" y2="356" stroke="rgba(255,255,255,0.2)" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="300" y="350" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="middle">호주</text>
  <text x="300" y="368" fill="#00e5a0" font-size="13" font-weight="700" text-anchor="middle">✅ 1위 달성</text>
  <line x1="390" y1="356" x2="420" y2="356" stroke="rgba(255,255,255,0.2)" stroke-width="1" stroke-dasharray="3,3"/>
