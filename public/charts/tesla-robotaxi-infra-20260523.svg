  <!-- Key insight bar -->
  <rect x="30" y="337" width="740" height="40" rx="8" fill="#0a0f1a" stroke="rgba(251,146,60,0.2)" stroke-width="1"/>
  <text x="50" y="355" font-family="Arial,sans-serif" font-size="10" fill="#fb923c" font-weight="700">핵심:</text>
  <text x="90" y="355" font-family="Arial,sans-serif" font-size="10" fill="#e5e7eb">Tesla는 자율주행 차량이 아닌 전체 Robotaxi 오퍼레이션 스택을 구축 중 — Waymo·Uber와 근본적 차별화</text>
  <text x="50" y="371" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">배차 → 정비 → 청소 → 충전 → 재배차 완결형 인프라 = Cybercab 대규모 상용화 임박 신호</text>

  <line x1="30" y1="390" x2="770" y2="390" stroke="#1e2330" stroke-width="1"/>
  <text x="30" y="408" font-family="Arial,sans-serif" font-size="10" fill="#6b7280">투자 참고용. 투자 판단 및 결과에 대한 책임은 투자자 본인에게 있습니다.</text>
  <text x="770" y="408" font-family="Arial,sans-serif" font-size="10" fill="#00e5a0" text-anchor="end" font-weight="600">INVESTUS · SUNRYU Partners CIO</text>
