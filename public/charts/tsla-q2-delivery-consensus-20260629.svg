<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#0a0f1a"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e31937"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
    <linearGradient id="barGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#16a34a"/>
      <stop offset="100%" style="stop-color:#4ade80"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>

  <!-- Header -->
  <rect width="1080" height="88" fill="#111318"/>
  <rect y="88" width="1080" height="3" fill="#e31937"/>
  <text x="32" y="38" font-family="Arial,sans-serif" font-size="14" fill="#e31937" font-weight="700">TSLA · Tesla Q2 2026</text>
  <text x="32" y="72" font-family="Arial,sans-serif" font-size="28" font-weight="bold" fill="#f1f5f9">배송 컨센서스 공개 — Q2 405,024대 · 연간 165만대</text>

  <!-- Hero number -->
  <rect x="28" y="108" width="1024" height="130" rx="14" fill="#0f1923" stroke="#e31937" stroke-width="1.5"/>
  <text x="540" y="162" font-family="Arial,sans-serif" font-size="17" fill="#9ca3af" text-anchor="middle">Q2 2026 배송 컨센서스 (미디안)</text>
  <text x="540" y="218" font-family="Arial,sans-serif" font-size="62" font-weight="bold" fill="#f1f5f9" text-anchor="middle">405,024대</text>

  <!-- Q1 vs Q2 comparison bars -->
  <rect x="28" y="258" width="500" height="310" rx="12" fill="#111318"/>
  <text x="278" y="290" font-family="Arial,sans-serif" font-size="16" fill="#e5e7eb" font-weight="700" text-anchor="middle">분기별 배송 비교</text>

  <!-- Q1 bar: 358,023 / 405,024 = 88.4% of Q2 → 88.4% of 340px = 300px -->
  <text x="52" y="326" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af">Q1 2026 (실제)</text>
  <rect x="52" y="334" width="300" height="40" rx="6" fill="#374151"/>
  <text x="362" y="360" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" font-weight="700">358,023</text>

  <!-- Q2 bar: full width 340px -->
  <text x="52" y="394" font-family="Arial,sans-serif" font-size="12" fill="#4ade80">Q2 2026 (컨센서스)</text>
  <rect x="52" y="402" width="340" height="40" rx="6" fill="url(#barGrad2)"/>
  <text x="402" y="428" font-family="Arial,sans-serif" font-size="13" fill="#4ade80" font-weight="700">405,024</text>

  <!-- QoQ -->
  <rect x="52" y="458" width="440" height="48" rx="8" fill="#0d1f14"/>
  <text x="272" y="478" font-family="Arial,sans-serif" font-size="13" fill="#4ade80" text-anchor="middle">전분기 대비</text>
  <text x="272" y="498" font-family="Arial,sans-serif" font-size="20" fill="#4ade80" font-weight="bold" text-anchor="middle">+13.1% QoQ</text>

  <!-- Model breakdown -->
  <rect x="548" y="258" width="504" height="310" rx="12" fill="#111318"/>
  <text x="800" y="290" font-family="Arial,sans-serif" font-size="16" fill="#e5e7eb" font-weight="700" text-anchor="middle">Q2 모델별 컨센서스</text>

  <rect x="568" y="308" width="464" height="70" rx="8" fill="#0f1923"/>
  <text x="590" y="336" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af">Model 3 / Model Y</text>
  <text x="1012" y="336" font-family="Arial,sans-serif" font-size="20" fill="#f1f5f9" font-weight="bold" text-anchor="end">392,625</text>
  <text x="590" y="362" font-family="Arial,sans-serif" font-size="11" fill="#6b7280">전체의 약 97%</text>

  <rect x="568" y="388" width="464" height="70" rx="8" fill="#0f1923"/>
  <text x="590" y="416" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af">기타 모델 (CyberTruck 등)</text>
  <text x="1012" y="416" font-family="Arial,sans-serif" font-size="20" fill="#f1f5f9" font-weight="bold" text-anchor="end">12,978</text>
  <text x="590" y="442" font-family="Arial,sans-serif" font-size="11" fill="#6b7280">전체의 약 3%</text>

  <!-- Energy Storage -->
  <rect x="28" y="588" width="490" height="150" rx="12" fill="#111318"/>
  <text x="273" y="622" font-family="Arial,sans-serif" font-size="15" fill="#e5e7eb" font-weight="700" text-anchor="middle">⚡ 에너지 스토리지 (GWh)</text>
  <rect x="48" y="638" width="200" height="80" rx="8" fill="#0d1f14"/>
  <text x="148" y="668" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">Q1 2026 (실제)</text>
  <text x="148" y="700" font-family="Arial,sans-serif" font-size="28" fill="#9ca3af" font-weight="bold" text-anchor="middle">8.8 GWh</text>
  <rect x="268" y="638" width="220" height="80" rx="8" fill="#0a2315"/>
  <text x="378" y="668" font-family="Arial,sans-serif" font-size="12" fill="#4ade80" text-anchor="middle">Q2 2026 (컨센서스)</text>
  <text x="378" y="700" font-family="Arial,sans-serif" font-size="28" fill="#4ade80" font-weight="bold" text-anchor="middle">13.8 GWh</text>

  <!-- Annual 2026 -->
  <rect x="538" y="588" width="514" height="150" rx="12" fill="#111318"/>
  <text x="795" y="622" font-family="Arial,sans-serif" font-size="15" fill="#e5e7eb" font-weight="700" text-anchor="middle">📅 연간 2026 컨센서스</text>
  <text x="795" y="690" font-family="Arial,sans-serif" font-size="44" font-weight="bold" fill="#e31937" text-anchor="middle">1,654,808대</text>
  <text x="795" y="724" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">2026년 전체 배송 미디안 전망</text>

  <!-- Robotaxi note -->
  <rect x="28" y="758" width="1024" height="90" rx="12" fill="#0f1923" stroke="#e31937" stroke-width="1"/>
  <text x="540" y="793" font-family="Arial,sans-serif" font-size="16" fill="#e31937" font-weight="700" text-anchor="middle">🚖 Robotaxi 추가 성장 모멘텀</text>
  <text x="540" y="822" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">텍사스 Robotaxi LLC 공식 인가 · 84대 Model Y 운영 중 · 자율주행 사업 본격화</text>

  <!-- Analyst estimates note -->
  <rect x="28" y="868" width="1024" height="70" rx="10" fill="#111318"/>
  <text x="540" y="900" font-family="Arial,sans-serif" font-size="13" fill="#6b7280" text-anchor="middle">컨센서스 제공: Daiwa · DB · Wedbush · Goldman Sachs · JPMorgan · Barclays · BofA · Wells Fargo · Needham 외 22개사</text>
  <text x="540" y="924" font-family="Arial,sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">Q1-2026은 실제 수치 · Q2-2026 이후는 애널리스트 컨센서스 추정치</text>

  <!-- Bottom insight bar -->
  <rect x="28" y="958" width="1024" height="90" rx="12" fill="#1a0a0e"/>
  <text x="540" y="993" font-family="Arial,sans-serif" font-size="15" fill="#f87171" font-weight="700" text-anchor="middle">Q2 컨센서스 405,024대 = Q1 대비 +13.1% 성장 전망</text>
  <text x="540" y="1020" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">Robotaxi 사업 추가 시 연간 목표치 상향 여지 충분 · Tesla 투자 핵심 카탈리스트</text>
  <text x="540" y="1062" font-family="Arial,sans-serif" font-size="10" fill="#4b5563" text-anchor="middle">출처: Tesla IR · Q2 2026 Delivery Consensus (Jun 26, 2026) · Investus 2026.06.29</text>
</svg>
