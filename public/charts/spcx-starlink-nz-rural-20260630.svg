  <text x="70" y="670" font-family="Arial,sans-serif" font-size="15" fill="#34d399">✓</text>
  <text x="96" y="670" font-family="Arial,sans-serif" font-size="14" fill="#e5e7eb">구독자 수 증가 = Starlink 매출 직접 반영 → SpaceX 수익성 개선 가속</text>
  <text x="70" y="702" font-family="Arial,sans-serif" font-size="15" fill="#60a5fa">●</text>
  <text x="96" y="702" font-family="Arial,sans-serif" font-size="14" fill="#e5e7eb">NZ는 샘플 — 동일 패턴이 아프리카·동남아·남미 농촌에서 반복될 TAM 무한대</text>
  <text x="70" y="734" font-family="Arial,sans-serif" font-size="15" fill="#60a5fa">●</text>
  <text x="96" y="734" font-family="Arial,sans-serif" font-size="14" fill="#e5e7eb">광케이블 인프라 투자 대비 위성 연결 비용 우위 → 개발도상국 채택 가속화</text>

  <rect y="780" width="1080" height="2" fill="#60a5fa"/>
