<svg width="800" height="490" viewBox="0 0 800 490" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="490" fill="#07091a"/>
  <rect x="0" y="0" width="800" height="3" fill="#fb923c"/>
  <text x="30" y="30" font-family="Arial,sans-serif" font-size="10" fill="#fb923c" font-weight="700" letter-spacing="2">INVESTUS · 종목분석</text>
  <text x="30" y="54" font-family="Arial,sans-serif" font-size="17" fill="white" font-weight="700">Palantir — GAAP $1.33B · 고평가 논란 반박 완성 · SaaS 재평가 구간</text>
  <text x="770" y="54" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="end">2026.06.01</text>
  <line x1="30" y1="66" x2="770" y2="66" stroke="#1e2330" stroke-width="1"/>

  <!-- GAAP Comparison bar chart (main visual) -->
  <rect x="30" y="80" width="460" height="200" rx="8" fill="#120a03" stroke="#fb923c" stroke-width="1.2" stroke-opacity="0.5"/>
  <rect x="30" y="80" width="4" height="200" rx="2" fill="#fb923c"/>
  <text x="48" y="104" font-family="Arial,sans-serif" font-size="11" fill="#fb923c" font-weight="700">TTM GAAP 순이익 비교</text>
  <text x="48" y="118" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">같은 소프트웨어 섹터 · 같은 밸류에이션 논란 기업 비교</text>

  <!-- PLTR bar -->
  <rect x="60" y="130" width="300" height="38" rx="5" fill="#fb923c" opacity="0.85"/>
  <text x="68" y="155" font-family="Arial,sans-serif" font-size="13" fill="white" font-weight="700">PLTR</text>
  <text x="368" y="155" font-family="Arial,sans-serif" font-size="15" fill="#fb923c" font-weight="700"> $1.33B</text>

  <!-- SNOW bar -->
  <rect x="60" y="178" width="41" height="30" rx="5" fill="#6b7280" opacity="0.5"/>
  <text x="68" y="198" font-family="Arial,sans-serif" font-size="11" fill="#e5e7eb">SNOW</text>
  <text x="108" y="198" font-family="Arial,sans-serif" font-size="12" fill="#6b7280" font-weight="700"> $183M</text>

  <!-- CRWD bar -->
  <rect x="60" y="218" width="21" height="28" rx="5" fill="#6b7280" opacity="0.3"/>
  <text x="68" y="238" font-family="Arial,sans-serif" font-size="11" fill="#e5e7eb">CRWD</text>
  <text x="88" y="238" font-family="Arial,sans-serif" font-size="12" fill="#6b7280" font-weight="700"> $92M</text>

  <text x="48" y="268" font-family="Arial,sans-serif" font-size="10" fill="#fb923c">PLTR = Snowflake의 7.3배 · CrowdStrike의 14.5배</text>

  <!-- Narrative reversal block -->
  <rect x="510" y="80" width="260" height="200" rx="8" fill="#120a03" stroke="#fb923c" stroke-width="1.2" stroke-opacity="0.5"/>
  <rect x="510" y="80" width="4" height="200" rx="2" fill="#fb923c"/>
  <text x="528" y="104" font-family="Arial,sans-serif" font-size="11" fill="#fb923c" font-weight="700">밸류에이션 내러티브 붕괴</text>
  <text x="528" y="128" font-family="Arial,sans-serif" font-size="10" fill="#6b7280" font-weight="600">2년간 '고평가' 주장</text>
  <text x="528" y="146" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">→ SNOW·CRWD 대비 비싸다는 논리</text>
  <text x="528" y="162" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">→ P/S 멀티플만 보고 이익 무시</text>
  <line x1="528" y1="175" x2="755" y2="175" stroke="#1e2330" stroke-width="1"/>
  <text x="528" y="195" font-family="Arial,sans-serif" font-size="10" fill="#fb923c" font-weight="600">실제 수치로 반박</text>
  <text x="528" y="213" font-family="Arial,sans-serif" font-size="9" fill="#e5e7eb">PLTR: GAAP 흑자 · SNOW/CRWD 적자</text>
  <text x="528" y="229" font-family="Arial,sans-serif" font-size="9" fill="#e5e7eb">성장속도 2배 빠르며 마진 24%+</text>
  <text x="528" y="245" font-family="Arial,sans-serif" font-size="9" fill="#e5e7eb">EBITDA 24배 · 동일 멀티플 부당</text>
  <text x="528" y="265" font-family="Arial,sans-serif" font-size="9" fill="#fb923c">→ PLTR이 SNOW보다 저렴</text>

  <!-- Analysis section -->
  <rect x="30" y="294" width="740" height="120" rx="8" fill="#060b18" stroke="#fb923c" stroke-width="1" stroke-opacity="0.25"/>
  <rect x="30" y="294" width="4" height="120" rx="2" fill="#fb923c"/>
  <text x="48" y="316" font-family="Arial,sans-serif" font-size="11" fill="#fb923c" font-weight="700">투자 논리</text>
  <text x="48" y="336" font-family="Arial,sans-serif" font-size="10" fill="#e5e7eb">• Palantir TTM GAAP $1.33B vs Snowflake $183M vs CrowdStrike $92M — GAAP 기준 압도적 수익성</text>
  <text x="48" y="354" font-family="Arial,sans-serif" font-size="10" fill="#e5e7eb">• 2년간 '고평가' 주장의 핵심 오류: PLTR이 GAAP 흑자이고 성장속도가 경쟁사 2배인데 비교 자체가 잘못됨</text>
  <text x="48" y="372" font-family="Arial,sans-serif" font-size="10" fill="#e5e7eb">• AIP 플랫폼 + 정부 계약 구조 = 수익 안정성·예측성 모두 SaaS 경쟁사 대비 우위</text>
  <text x="48" y="390" font-family="Arial,sans-serif" font-size="10" fill="#fb923c">• 고평가 내러티브 붕괴 = 기관 재평가 트리거 · PLTR 멀티플 확장 여지 확인</text>
  <text x="48" y="402" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">TTM GAAP 비교가 중요한 이유: AI 시대에 '이익을 내는 AI 기업'이 희소가치로 재평가되기 때문</text>

  <!-- Key stats -->
  <rect x="30" y="428" width="740" height="22" rx="4" fill="#0a1226" stroke="#fb923c" stroke-width="1" stroke-opacity="0.2"/>
  <text x="48" y="440" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">PLTR TTM GAAP:  </text>
  <text x="145" y="440" font-family="Arial,sans-serif" font-size="10" fill="#fb923c" font-weight="700">$1.33B  </text>
  <text x="240" y="440" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">|  SNOW:  </text>
  <text x="285" y="440" font-family="Arial,sans-serif" font-size="10" fill="#6b7280" font-weight="700">$183M  </text>
  <text x="350" y="440" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">|  CRWD:  </text>
  <text x="395" y="440" font-family="Arial,sans-serif" font-size="10" fill="#6b7280" font-weight="700">$92M  </text>
  <text x="490" y="440" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">|  마진:  </text>
  <text x="525" y="440" font-family="Arial,sans-serif" font-size="10" fill="#fb923c" font-weight="700">24%+  </text>
  <text x="590" y="440" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">|  성장속도:  </text>
  <text x="645" y="440" font-family="Arial,sans-serif" font-size="10" fill="#fb923c" font-weight="700">경쟁사 2배</text>

  <line x1="30" y1="458" x2="770" y2="458" stroke="#1e2330" stroke-width="1"/>
  <text x="30" y="474" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">투자 참고용. 투자 판단 및 결과에 대한 책임은 투자자 본인에게 있습니다.</text>
  <text x="770" y="474" font-family="Arial,sans-serif" font-size="10" fill="#fb923c" text-anchor="end" font-weight="600">INVESTUS · SUNRYU Partners CIO</text>
</svg>
