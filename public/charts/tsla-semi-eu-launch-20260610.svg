<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" font-family="'Segoe UI',Arial,sans-serif">
  <!-- Background -->
  <rect width="800" height="440" fill="#0a0f1e"/>

  <!-- Header area y:0-68 -->
  <rect x="0" y="0" width="800" height="68" fill="#0d1528"/>
  <rect x="0" y="0" width="6" height="68" fill="#00e5a0"/>
  <text x="24" y="36" font-size="20" font-weight="700" fill="#00e5a0">Tesla Semi EU 대량 출시 준비</text>
  <text x="24" y="54" font-size="12" fill="#94a3b8">Tesla Semi · European Commercial Freight · 2026</text>

  <!-- Status banner y:80-130 -->
  <rect x="40" y="80" width="720" height="50" rx="10" fill="#0d2b1e" stroke="#00e5a0" stroke-width="1.5"/>
  <text x="400" y="111" font-size="15" font-weight="600" fill="#00e5a0" text-anchor="middle">BD 매니저 채용 중 · 유럽 화물 시장 공략</text>

  <!-- Route/Market Diagram label y:145 -->
  <text x="400" y="162" font-size="12" fill="#64748b" text-anchor="middle">출시 로드맵</text>

  <!-- Phase 1 box — centered at x=140 -->
  <rect x="60" y="178" width="160" height="54" rx="10" fill="#0d2b1e" stroke="#00e5a0" stroke-width="1.5"/>
  <text x="140" y="200" font-size="12" font-weight="700" fill="#00e5a0" text-anchor="middle">Phase 1</text>
  <text x="140" y="218" font-size="11" fill="#e2e8f0" text-anchor="middle">BD 채용 완료</text>
  <text x="140" y="233" font-size="10" fill="#64748b" text-anchor="middle">비즈니스 개발팀 구성</text>

  <!-- Arrow 1→2 -->
  <line x1="220" y1="205" x2="290" y2="205" stroke="#00e5a0" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <defs>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00e5a0"/>
    </marker>
  </defs>

  <!-- Phase 2 box — centered at x=380 -->
  <rect x="300" y="178" width="160" height="54" rx="10" fill="#0d1e2b" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="380" y="200" font-size="12" font-weight="700" fill="#60a5fa" text-anchor="middle">Phase 2</text>
  <text x="380" y="218" font-size="11" fill="#e2e8f0" text-anchor="middle">딜러/물류사 계약</text>
  <text x="380" y="233" font-size="10" fill="#64748b" text-anchor="middle">유럽 파트너십 체결</text>

  <!-- Arrow 2→3 -->
  <line x1="460" y1="205" x2="530" y2="205" stroke="#00e5a0" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Phase 3 box — centered at x=620 -->
  <rect x="540" y="178" width="160" height="54" rx="10" fill="#1a0d2b" stroke="#c084fc" stroke-width="2"/>
  <text x="620" y="200" font-size="12" font-weight="700" fill="#c084fc" text-anchor="middle">Phase 3</text>
  <text x="620" y="218" font-size="11" fill="#e2e8f0" text-anchor="middle">EU 대량 출시</text>
  <text x="620" y="233" font-size="10" fill="#94a3b8" text-anchor="middle">대규모 상용 배포</text>

  <!-- Spec Cards section label -->
  <text x="400" y="298" font-size="12" fill="#64748b" text-anchor="middle">Tesla Semi 주요 스펙</text>

  <!-- Spec Card 1 — range -->
  <rect x="40" y="308" width="220" height="78" rx="10" fill="#0d1a2b" stroke="#00e5a0" stroke-width="1"/>
  <text x="150" y="332" font-size="24" font-weight="700" fill="#00e5a0" text-anchor="middle">500+</text>
  <text x="150" y="350" font-size="11" fill="#94a3b8" text-anchor="middle">마일 주행거리</text>
  <text x="150" y="368" font-size="10" fill="#64748b" text-anchor="middle">단일 충전 (완충)</text>
  <text x="150" y="382" font-size="10" fill="#64748b" text-anchor="middle">miles range per charge</text>

  <!-- Spec Card 2 — acceleration -->
  <rect x="290" y="308" width="220" height="78" rx="10" fill="#0d1a2b" stroke="#60a5fa" stroke-width="1"/>
  <text x="400" y="332" font-size="24" font-weight="700" fill="#60a5fa" text-anchor="middle">20초</text>
  <text x="400" y="350" font-size="11" fill="#94a3b8" text-anchor="middle">0→60 mph (만차 상태)</text>
  <text x="400" y="368" font-size="10" fill="#64748b" text-anchor="middle">80,000 lbs 적재 기준</text>
  <text x="400" y="382" font-size="10" fill="#64748b" text-anchor="middle">0-60 mph fully loaded</text>

  <!-- Spec Card 3 — efficiency -->
  <rect x="540" y="308" width="220" height="78" rx="10" fill="#0d1a2b" stroke="#fb923c" stroke-width="1"/>
  <text x="650" y="332" font-size="24" font-weight="700" fill="#fb923c" text-anchor="middle">70%</text>
  <text x="650" y="350" font-size="11" fill="#94a3b8" text-anchor="middle">연비 절감 (디젤 대비)</text>
  <text x="650" y="368" font-size="10" fill="#64748b" text-anchor="middle">Class 8 디젤 트럭 비교</text>
  <text x="650" y="382" font-size="10" fill="#64748b" text-anchor="middle">vs Class 8 diesel</text>

  <!-- Source -->
  <text x="400" y="425" font-size="11" fill="#475569" text-anchor="middle">investus.kr</text>
</svg>
