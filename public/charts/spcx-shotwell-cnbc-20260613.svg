<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480">
  <rect width="480" height="480" fill="#0a0c10"/>
  <rect x="0" y="0" width="480" height="64" fill="#111318"/>
  <rect x="0" y="60" width="480" height="2" fill="#c084fc" opacity="0.4"/>
  <text x="24" y="26" font-family="Arial,sans-serif" font-size="11" fill="#c084fc" font-weight="bold">SPCX 특집 · 경영진</text>
  <text x="24" y="46" font-family="Arial,sans-serif" font-size="13" fill="#e5e7eb" font-weight="bold">Gwynne Shotwell CNBC 인터뷰 — 임원 보상 구조</text>

  <!-- Quote box -->
  <rect x="24" y="78" width="432" height="76" rx="12" fill="#1a0d2e" stroke="#c084fc" stroke-width="1" stroke-opacity="0.5"/>
  <text x="40" y="100" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af">Gwynne Shotwell, SpaceX President &amp; COO</text>
  <text x="40" y="120" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">"Elon 없이도 회사는 무너지지 않는다.</text>
  <text x="40" y="138" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb"> 하지만 다른 회사가 될 것이다 — Starbucks처럼."</text>

  <!-- Exec comp structure -->
  <text x="24" y="182" font-family="Arial,sans-serif" font-size="12" fill="#6b7280" font-weight="bold">■ 임원 성과 연동 보상 구조 (주가 마일스톤)</text>

  <!-- Timeline bar showing $116 to $3727 -->
  <rect x="24" y="196" width="432" height="30" rx="6" fill="#111318"/>
  <!-- gradient bar -->
  <defs>
    <linearGradient id="compGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="28" y="200" width="424" height="22" rx="4" fill="url(#compGrad)"/>
  <text x="36" y="215" font-family="Arial,sans-serif" font-size="11" fill="#e5e7eb" font-weight="bold">$116</text>
  <text x="440" y="215" font-family="Arial,sans-serif" font-size="11" fill="#e5e7eb" font-weight="bold" text-anchor="end">$3,727</text>
  <text x="240" y="215" font-family="Arial,sans-serif" font-size="10" fill="#e5e7eb" text-anchor="middle">5년 성과 주가 구간</text>

  <!-- milestones -->
  <text x="24" y="248" font-family="Arial,sans-serif" font-size="11" fill="#6b7280">하한 달성: $116/주</text>
  <text x="240" y="248" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">→ 기본 보상 지급</text>
  <text x="24" y="266" font-family="Arial,sans-serif" font-size="11" fill="#c084fc" font-weight="bold">최고 달성: $3,727/주</text>
  <text x="240" y="266" font-family="Arial,sans-serif" font-size="11" fill="#c084fc" text-anchor="middle">→ 최대 보상 지급</text>

  <!-- meaning boxes -->
  <text x="24" y="296" font-family="Arial,sans-serif" font-size="12" fill="#6b7280" font-weight="bold">■ $3,727 달성 시 의미</text>

  <rect x="24" y="308" width="204" height="60" rx="10" fill="#111318"/>
  <text x="126" y="330" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">시가총액 (달성 시)</text>
  <text x="126" y="354" font-family="Arial,sans-serif" font-size="18" fill="#c084fc" font-weight="bold" text-anchor="middle">~$26T</text>
  <text x="126" y="364" font-family="Arial,sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">현재 시총의 11.5배</text>

  <rect x="244" y="308" width="212" height="60" rx="10" fill="#111318"/>
  <text x="350" y="330" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">비교 기준</text>
  <text x="350" y="354" font-family="Arial,sans-serif" font-size="14" fill="#e5e7eb" font-weight="bold" text-anchor="middle">NVDA 수준</text>
  <text x="350" y="364" font-family="Arial,sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">현재 세계 1위 수준</text>

  <!-- Starbucks analogy -->
  <rect x="24" y="382" width="432" height="70" rx="10" fill="#111318"/>
  <text x="40" y="404" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af" font-weight="bold">■ Starbucks 비유의 의미</text>
  <text x="40" y="424" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">• Tesla = Elon 없어도 운영 가능</text>
  <text x="40" y="442" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af">• 하지만 성장 방향성은 달라질 수 있음을 인정</text>

  <text x="240" y="466" font-family="Arial,sans-serif" font-size="10" fill="#4b5563" text-anchor="middle">2026.06.13 · Investus · 투자 참고용</text>
</svg>
