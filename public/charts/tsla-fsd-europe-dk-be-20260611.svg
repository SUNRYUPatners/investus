  <text x="36" y="358" fill="#e2e8f0" font-size="11">"기능적으로 이 시스템은 100% 자율주행입니다."</text>
  <text x="36" y="374" fill="#64748b" font-size="10">"단, 운전자가 법적 책임을 지는 구조는 유지됩니다."</text>

  <!-- FSD EU revenue implication -->
  <rect x="20" y="398" width="440" height="30" rx="8" fill="#0a1f14"/>
  <text x="240" y="418" text-anchor="middle" fill="#00e5a0" font-size="10" font-weight="700">→ EU FSD 구독 수익화 가속 — 유럽 4.7억 인구 시장</text>

  <text x="240" y="433" text-anchor="middle" fill="#334155" font-size="9">investus.kr · 2026.06.11</text>
