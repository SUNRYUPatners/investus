  <text x="124" y="132" text-anchor="middle" fill="#00e5a0" font-size="11">FSD Supervised ✅</text>
  <text x="124" y="148" text-anchor="middle" fill="#64748b" font-size="9">CEO Mads Rørvig 확인</text>
  <text x="124" y="162" text-anchor="middle" fill="#64748b" font-size="9">2026.06.11 승인</text>
  <text x="124" y="174" text-anchor="middle" fill="#94a3b8" font-size="9">유럽 FSD 허용 2번째 국가</text>

  <rect x="252" y="68" width="208" height="110" rx="14" fill="#0a1f14"/>
  <rect x="252" y="68" width="208" height="4" rx="2" fill="#00e5a0"/>
  <text x="356" y="96" text-anchor="middle" fill="#ffffff" font-size="20">🇧🇪</text>
  <text x="356" y="116" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700">벨기에 승인</text>
  <text x="356" y="132" text-anchor="middle" fill="#00e5a0" font-size="11">FSD Supervised ✅</text>
  <text x="356" y="148" text-anchor="middle" fill="#64748b" font-size="9">장관 Annick De Wäcker 확인</text>
  <text x="356" y="162" text-anchor="middle" fill="#64748b" font-size="9">2026.06.11 공식 승인</text>
  <text x="356" y="174" text-anchor="middle" fill="#94a3b8" font-size="9">"100% 자율주행 기능" 인정</text>

  <!-- Europe expansion tracker -->
  <rect x="20" y="192" width="440" height="114" rx="12" fill="#0a1f14"/>
  <text x="240" y="212" text-anchor="middle" fill="#94a3b8" font-size="10">유럽 FSD 허용 현황</text>

  <text x="36" y="232" fill="#00e5a0" font-size="11">✅  네덜란드 — FSD 실데이터 공개 (충돌 3.5배↓)</text>
  <text x="36" y="250" fill="#00e5a0" font-size="11">✅  덴마크 — FSD Supervised 승인 (2026.06.11)</text>
  <text x="36" y="268" fill="#00e5a0" font-size="11">✅  벨기에 — FSD Supervised 승인 (2026.06.11)</text>
