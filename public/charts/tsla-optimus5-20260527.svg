<svg xmlns="http://www.w3.org/2000/svg" width="800" height="430" viewBox="0 0 800 430">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1e"/>
      <stop offset="100%" style="stop-color:#0d1528"/>
    </linearGradient>
    <radialGradient id="robotGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#c084fc;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="430" fill="url(#bg)"/>
  <rect width="800" height="3" fill="#c084fc" opacity="0.8"/>

  <!-- Header -->
  <text x="32" y="38" font-family="Arial,sans-serif" font-size="11" fill="#c084fc" font-weight="600" letter-spacing="2">TSLA · 로봇 · 2026.05.27</text>
  <text x="32" y="66" font-family="'SF Pro Display',Arial,sans-serif" font-size="21" fill="#ffffff" font-weight="700">Optimus 5 — 머스크 "세계 최고 로봇, 경쟁자 없음"</text>
  <text x="32" y="88" font-family="Arial,sans-serif" font-size="13" fill="#94a3b8">"Final stages of completing… nothing's even close" — Elon Musk</text>
  <line x1="32" y1="102" x2="768" y2="102" stroke="#1e2d4a" stroke-width="1"/>

  <!-- Robot silhouette (simple geometric) -->
  <ellipse cx="620" cy="230" rx="90" ry="90" fill="url(#robotGlow)"/>
  <!-- Head -->
  <rect x="593" y="145" width="54" height="44" rx="8" fill="rgba(30,45,74,0.9)" stroke="#c084fc" stroke-width="1.5"/>
  <rect x="603" y="157" width="13" height="8" rx="2" fill="#c084fc" opacity="0.7"/>
  <rect x="624" y="157" width="13" height="8" rx="2" fill="#c084fc" opacity="0.7"/>
  <!-- Neck -->
  <rect x="610" y="189" width="20" height="12" rx="2" fill="rgba(30,45,74,0.9)" stroke="#c084fc" stroke-width="1" stroke-opacity="0.5"/>
  <!-- Body -->
  <rect x="580" y="201" width="80" height="80" rx="6" fill="rgba(30,45,74,0.9)" stroke="#c084fc" stroke-width="1.5"/>
  <rect x="590" y="212" width="60" height="2" rx="1" fill="#c084fc" opacity="0.3"/>
  <rect x="590" y="218" width="45" height="2" rx="1" fill="#c084fc" opacity="0.2"/>
  <!-- Arms -->
  <rect x="548" y="205" width="30" height="60" rx="6" fill="rgba(30,45,74,0.9)" stroke="#c084fc" stroke-width="1" stroke-opacity="0.6"/>
  <rect x="662" y="205" width="30" height="60" rx="6" fill="rgba(30,45,74,0.9)" stroke="#c084fc" stroke-width="1" stroke-opacity="0.6"/>
  <!-- Legs -->
  <rect x="590" y="283" width="28" height="55" rx="4" fill="rgba(30,45,74,0.9)" stroke="#c084fc" stroke-width="1" stroke-opacity="0.5"/>
  <rect x="622" y="283" width="28" height="55" rx="4" fill="rgba(30,45,74,0.9)" stroke="#c084fc" stroke-width="1" stroke-opacity="0.5"/>
  <!-- Feet -->
  <rect x="585" y="333" width="36" height="12" rx="4" fill="rgba(192,132,252,0.3)" stroke="#c084fc" stroke-width="1" stroke-opacity="0.4"/>
  <rect x="618" y="333" width="36" height="12" rx="4" fill="rgba(192,132,252,0.3)" stroke="#c084fc" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Version Timeline -->
  <text x="32" y="126" font-family="Arial,sans-serif" font-size="11" fill="#c084fc" font-weight="700">■ Optimus 세대별 진화</text>

  <!-- Timeline bars -->
  <!-- Gen 1 -->
  <rect x="32" y="136" width="3" height="16" rx="1" fill="#4ade80" opacity="0.6"/>
  <text x="42" y="149" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">Gen 1 (2022) — 9mph · 45lb · 초기 보행 시연</text>
  <!-- Gen 2 -->
  <rect x="32" y="158" width="3" height="16" rx="1" fill="#4ade80" opacity="0.7"/>
  <text x="42" y="171" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">Gen 2 (2024) — 20mph · 손가락 정밀 제어 · Tesla 공장 실작업</text>
  <!-- Gen 3 -->
  <rect x="32" y="180" width="3" height="16" rx="1" fill="#60a5fa" opacity="0.8"/>
  <text x="42" y="193" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">Gen 3 (2025) — 외부 주문 시작 · 1,000대 생산 목표</text>
  <!-- Gen 4 -->
  <rect x="32" y="202" width="3" height="16" rx="1" fill="#c084fc" opacity="0.8"/>
  <text x="42" y="215" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">Gen 4 (2025-26) — 개선된 설계 · 양산 준비 · 가격 인하</text>
  <!-- Gen 5 -->
  <rect x="32" y="224" width="3" height="16" rx="1" fill="#c084fc"/>
  <text x="42" y="237" font-family="Arial,sans-serif" font-size="11" fill="#ffffff" font-weight="600">Gen 5 — "세계 최고, 경쟁자 없음" · 완성 임박</text>

  <text x="32" y="268" font-family="Arial,sans-serif" font-size="11" fill="#c084fc" font-weight="700">■ 머스크 발언 (원문)</text>
  <rect x="32" y="278" width="480" height="54" rx="6" fill="rgba(192,132,252,0.06)" stroke="#c084fc" stroke-width="1" stroke-opacity="0.3"/>
  <text x="44" y="296" font-family="Arial,sans-serif" font-size="11" fill="#e2e8f0" font-style="italic">"We're in the final stages of completing Optimus 5,</text>
  <text x="44" y="312" font-family="Arial,sans-serif" font-size="11" fill="#e2e8f0" font-style="italic"> which is going to be by far the most advanced robot in</text>
  <text x="44" y="328" font-family="Arial,sans-serif" font-size="11" fill="#e2e8f0" font-style="italic"> the world. Nothing's even close." — Elon Musk</text>

  <text x="32" y="360" font-family="Arial,sans-serif" font-size="11" fill="#c084fc" font-weight="700">■ 투자 시사점</text>
  <text x="32" y="377" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">• 연 매출 잠재력: $20T+ (인간형 로봇 시장 Morgan Stanley 예측)</text>
  <text x="32" y="393" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">• Tesla 공장 자체 투입 → 인건비 절감 → 마진 회복 최단 경로</text>
  <text x="32" y="409" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">• 외부 판매 시작 시 AI+로봇 복합 밸류에이션 재평가 촉매</text>

  <text x="768" y="424" font-family="Arial,sans-serif" font-size="9" fill="#334155" text-anchor="end">SUNRYU Partners · 2026.05.27</text>
</svg>
