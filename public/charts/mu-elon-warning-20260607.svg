<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" style="background:#0a0c10;font-family:'Helvetica Neue',Arial,sans-serif">
  <rect width="800" height="440" fill="#0a0c10"/>
  <defs>
    <linearGradient id="blu10" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/><stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="red10" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f87171"/><stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
  </defs>
  <rect x="30" y="24" width="10" height="36" rx="3" fill="url(#blu10)"/>
  <text x="50" y="42" fill="#60a5fa" font-size="11" font-weight="700" letter-spacing="2">MICRON TECHNOLOGY · 일론 경고</text>
  <text x="50" y="58" fill="white" font-size="19" font-weight="800">"마이크론, AI 메모리 생산능력 부족" — Elon Musk</text>
  <text x="700" y="44" fill="#60a5fa" font-size="11" font-weight="600" text-anchor="end">2026.06.07</text>
  <line x1="30" y1="76" x2="770" y2="76" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>

  <!-- elon quote -->
  <rect x="30" y="90" width="740" height="72" rx="12" fill="#f87171" fill-opacity="0.07" stroke="#f87171" stroke-opacity="0.2"/>
  <text x="50" y="116" fill="#f87171" font-size="11" font-weight="700">Elon Musk 발언</text>
  <text x="50" y="142" fill="white" font-size="15" font-weight="700">"MICRON NOT BUILDING ENOUGH HIGH VOLUME MEMORY CHIP FABRICATION CAPACITY"</text>
  <text x="50" y="158" fill="rgba(255,255,255,0.4)" font-size="12">고용량 메모리 반도체 제조 설비 확대 속도 부족 지적</text>

  <!-- supply demand -->
  <text x="30" y="194" fill="rgba(255,255,255,0.4)" font-size="11" font-weight="700" letter-spacing="1">AI 메모리 수급 현황</text>

  <rect x="30" y="204" width="340" height="90" rx="10" fill="#60a5fa" fill-opacity="0.07" stroke="#60a5fa" stroke-opacity="0.15"/>
  <text x="50" y="228" fill="#93c5fd" font-size="11" font-weight="700">AI HBM 수요</text>
  <text x="50" y="256" fill="white" font-size="26" font-weight="900">폭발적 증가</text>
  <text x="50" y="278" fill="rgba(255,255,255,0.45)" font-size="12">NVIDIA GB300 · AMD MI350 등 AI GPU 가속 수요</text>

  <rect x="390" y="204" width="380" height="90" rx="10" fill="#f87171" fill-opacity="0.07" stroke="#f87171" stroke-opacity="0.15"/>
  <text x="410" y="228" fill="#f87171" font-size="11" font-weight="700">Micron 공급 속도</text>
  <text x="410" y="256" fill="white" font-size="26" font-weight="900">수요 미달</text>
  <text x="410" y="278" fill="rgba(255,255,255,0.45)" font-size="12">아이다호 fab 확장 계획 — 속도 불충분</text>

  <!-- implication -->
  <text x="30" y="324" fill="rgba(255,255,255,0.4)" font-size="11" font-weight="700" letter-spacing="1">시장 영향</text>

  <rect x="30" y="334" width="220" height="66" rx="8" fill="rgba(255,255,255,0.04)"/>
  <text x="50" y="356" fill="rgba(255,255,255,0.5)" font-size="11">MU 주가 리스크</text>
  <text x="50" y="378" fill="white" font-size="14" font-weight="700">수요 > 공급 구조</text>
  <text x="50" y="394" fill="rgba(255,255,255,0.35)" font-size="11">이론상 ASP 상승 → 긍정적</text>

  <rect x="264" y="334" width="220" height="66" rx="8" fill="rgba(255,255,255,0.04)"/>
  <text x="284" y="356" fill="rgba(255,255,255,0.5)" font-size="11">Terafab 연관성</text>
  <text x="284" y="378" fill="white" font-size="14" font-weight="700">일론 직접 건설</text>
  <text x="284" y="394" fill="rgba(255,255,255,0.35)" font-size="11">Micron 대신 자체 fab 추진</text>

  <rect x="498" y="334" width="272" height="66" rx="8" fill="#60a5fa" fill-opacity="0.05" stroke="#60a5fa" stroke-opacity="0.12"/>
  <text x="518" y="356" fill="#60a5fa" font-size="11" font-weight="700">SK하이닉스 반사이익</text>
  <text x="518" y="378" fill="white" font-size="14" font-weight="700">HBM 독점 유지</text>
  <text x="518" y="394" fill="rgba(255,255,255,0.35)" font-size="11">Micron 확장 지연 시 SKH 수혜</text>

  <text x="400" y="430" fill="rgba(255,255,255,0.2)" font-size="10" text-anchor="middle">Investus · investus.kr</text>
