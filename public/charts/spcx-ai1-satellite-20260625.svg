  <text x="28" y="26" font-family="Arial,sans-serif" font-size="13" fill="#c084fc" font-weight="700">SPCX · AI1 위성 스펙 공개</text>
  <text x="28" y="50" font-family="Arial,sans-serif" font-size="14" fill="#e5e7eb" font-weight="700">150kW 컴퓨트 · 70m 날개폭 · 액체 냉각 — 우주 AI 데이터센터</text>

  <rect x="24" y="78" width="1032" height="100" rx="12" fill="#1a0a24" stroke="#c084fc" stroke-width="1.5"/>
  <text x="540" y="110" font-family="Arial,sans-serif" font-size="28" fill="#c084fc" font-weight="700" text-anchor="middle">SpaceX AI1 위성 — 우주 최초 AI 전용 위성</text>
  <text x="540" y="155" font-family="Arial,sans-serif" font-size="16" fill="#9ca3af" text-anchor="middle">150kW 온보드 AI 컴퓨팅 · 70m 날개폭 · 액체 냉각 방열판 · 지상 데이터센터 대체</text>

  <rect x="24" y="194" width="322" height="216" rx="10" fill="#111318"/>
  <text x="185" y="222" font-family="Arial,sans-serif" font-size="14" fill="#e5e7eb" font-weight="700" text-anchor="middle">컴퓨팅 스펙</text>
  <rect x="40" y="234" width="290" height="164" rx="8" fill="#1a0a24"/>
  <text x="56" y="258" font-family="Arial,sans-serif" font-size="13" fill="#c084fc" font-weight="700">AI 처리 능력</text>
  <text x="56" y="280" font-family="Arial,sans-serif" font-size="28" fill="#c084fc" font-weight="700">150kW</text>
