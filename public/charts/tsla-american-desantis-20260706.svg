<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0505"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#b91c1c"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <line x1="0" y1="360" x2="1080" y2="360" stroke="#ef4444" stroke-width="0.3" stroke-opacity="0.08"/>
  <line x1="0" y1="720" x2="1080" y2="720" stroke="#ef4444" stroke-width="0.3" stroke-opacity="0.08"/>
  <line x1="360" y1="0" x2="360" y2="1080" stroke="#ef4444" stroke-width="0.3" stroke-opacity="0.08"/>
  <line x1="720" y1="0" x2="720" y2="1080" stroke="#ef4444" stroke-width="0.3" stroke-opacity="0.08"/>

  <rect x="60" y="60" width="960" height="4" fill="url(#redGrad)" rx="2"/>
  <rect x="60" y="90" width="80" height="36" rx="8" fill="#ef4444"/>
  <text x="100" y="114" font-family="Arial Black, Arial" font-weight="900" font-size="16" fill="#ffffff" text-anchor="middle">TSLA</text>
  <rect x="154" y="90" width="100" height="36" rx="8" fill="none" stroke="#ef4444" stroke-width="2"/>
  <text x="204" y="114" font-family="Arial, sans-serif" font-weight="700" font-size="13" fill="#ef4444" text-anchor="middle">종목분석</text>
  <text x="1020" y="114" font-family="Arial, sans-serif" font-size="16" fill="#6a2a2a" text-anchor="end">2026.07.06</text>

  <text x="540" y="188" font-family="Arial Black, Arial" font-weight="900" font-size="28" fill="#ffffff" text-anchor="middle" filter="url(#glow)">테슬라 미국산 함량 최고 · 디샌티스 FSD 지지</text>
  <text x="540" y="250" font-family="Arial Black, Arial" font-weight="900" font-size="50" fill="#fca5a5" text-anchor="middle" filter="url(#glow)">정치적 지지 + 미국산</text>
  <text x="540" y="298" font-family="Arial, sans-serif" font-size="19" fill="#f87171" text-anchor="middle">머스크: "테슬라 미국산 함량 모든 차량 중 최고" · FSD = 납세자 혜택</text>

  <!-- Quote boxes -->
  <rect x="80" y="318" width="440" height="100" rx="12" fill="#1a0a0a" stroke="#ef4444" stroke-width="2" stroke-opacity="0.6"/>
  <text x="300" y="346" font-family="Arial Black, Arial" font-weight="900" font-size="13" fill="#fca5a5" text-anchor="middle">"Teslas have the highest percentage</text>
  <text x="300" y="366" font-family="Arial Black, Arial" font-weight="900" font-size="13" fill="#fca5a5" text-anchor="middle">of American content of any vehicle."</text>
  <text x="300" y="398" font-family="Arial, sans-serif" font-size="12" fill="#9a4a4a" text-anchor="middle">— Elon Musk</text>

  <rect x="560" y="318" width="440" height="100" rx="12" fill="#1a0a0a" stroke="#ef4444" stroke-width="2" stroke-opacity="0.6"/>
  <text x="780" y="346" font-family="Arial Black, Arial" font-weight="900" font-size="13" fill="#fca5a5" text-anchor="middle">"Fuel savings + FSD mishap reduction</text>
  <text x="780" y="366" font-family="Arial Black, Arial" font-weight="900" font-size="13" fill="#fca5a5" text-anchor="middle">= real taxpayer benefits."</text>
  <text x="780" y="398" font-family="Arial, sans-serif" font-size="12" fill="#9a4a4a" text-anchor="middle">— Ron DeSantis</text>

  <!-- Stat boxes -->
  <rect x="80" y="436" width="280" height="148" rx="16" fill="#1a0a0a" stroke="#ef4444" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="220" y="478" font-family="Arial Black, Arial" font-weight="900" font-size="40" fill="#ef4444" text-anchor="middle" filter="url(#glow)">#1</text>
  <text x="220" y="508" font-family="Arial, sans-serif" font-size="15" fill="#fca5a5" text-anchor="middle">미국산 함량</text>
  <text x="220" y="528" font-family="Arial, sans-serif" font-size="13" fill="#9a4a4a" text-anchor="middle">전 차종 중 최고</text>
  <text x="220" y="566" font-family="Arial, sans-serif" font-size="12" fill="#6a3a3a" text-anchor="middle">국내 일자리 지지</text>

  <rect x="400" y="436" width="280" height="148" rx="16" fill="#1a0a0a" stroke="#ef4444" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="540" y="468" font-family="Arial Black, Arial" font-weight="900" font-size="34" fill="#fca5a5" text-anchor="middle" filter="url(#glow)">FSD</text>
  <text x="540" y="498" font-family="Arial, sans-serif" font-size="15" fill="#fca5a5" text-anchor="middle">사고 감소 효과</text>
  <text x="540" y="518" font-family="Arial, sans-serif" font-size="13" fill="#9a4a4a" text-anchor="middle">납세자 비용 절감</text>
  <text x="540" y="566" font-family="Arial, sans-serif" font-size="12" fill="#6a3a3a" text-anchor="middle">DeSantis 공개 지지</text>

  <rect x="720" y="436" width="280" height="148" rx="16" fill="#1a0a0a" stroke="#ef4444" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="860" y="468" font-family="Arial Black, Arial" font-weight="900" font-size="30" fill="#fca5a5" text-anchor="middle" filter="url(#glow)">연료비</text>
  <text x="860" y="498" font-family="Arial, sans-serif" font-size="15" fill="#fca5a5" text-anchor="middle">절감 효과</text>
  <text x="860" y="518" font-family="Arial, sans-serif" font-size="13" fill="#9a4a4a" text-anchor="middle">정부 차량 전환 근거</text>
  <text x="860" y="566" font-family="Arial, sans-serif" font-size="12" fill="#6a3a3a" text-anchor="middle">DOGE 효율화 연계</text>

  <!-- Analysis -->
  <rect x="80" y="602" width="920" height="290" rx="16" fill="#100808" stroke="#ef4444" stroke-width="1" stroke-opacity="0.4"/>
  <text x="540" y="636" font-family="Arial Black, Arial" font-weight="900" font-size="20" fill="#fca5a5" text-anchor="middle">정치적 지지와 투자 포인트</text>

  <text x="100" y="668" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#f87171">미국산 함량</text>
  <text x="280" y="668" font-family="Arial, sans-serif" font-size="14" fill="#fca5a5">관세 환경에서 미국산 우선 정책 수혜 → 무역 마찰 최소화</text>
  <text x="100" y="694" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#f87171">DeSantis 지지</text>
  <text x="280" y="694" font-family="Arial, sans-serif" font-size="14" fill="#fca5a5">주지사급 정치인 공개 FSD 옹호 → 규제 승인 정치적 지원</text>
  <text x="100" y="720" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#f87171">정부 조달</text>
  <text x="280" y="720" font-family="Arial, sans-serif" font-size="14" fill="#fca5a5">연방·주정부 차량 전기차 전환 시 TSLA 우선 후보</text>
  <text x="100" y="746" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#f87171">DOGE 연계</text>
  <text x="280" y="746" font-family="Arial, sans-serif" font-size="14" fill="#fca5a5">정부 효율화 → 연비·사고 감소 데이터로 TSLA 도입 논거 강화</text>
  <text x="100" y="772" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#f87171">리스크</text>
  <text x="280" y="772" font-family="Arial, sans-serif" font-size="14" fill="#fca5a5">정치적 변동성 · 머스크 개인 이미지 리스크 · FSD 사고 발생 시</text>
  <text x="100" y="862" font-family="Arial, sans-serif" font-size="11" fill="#5a2a2a">* 정치적 지지 + 미국산 함량 1위 = 규제·관세 환경에서 구조적 방어막</text>

  <rect x="60" y="912" width="960" height="40" rx="12" fill="#100808" stroke="#ef4444" stroke-width="1" stroke-opacity="0.25"/>
  <text x="540" y="937" font-family="Arial, sans-serif" font-size="15" fill="#f87171" text-anchor="middle">미국산 함량 1위 · DeSantis FSD 납세자 혜택 언급 · 정치·규제 환경 TSLA 유리</text>

  <rect x="60" y="968" width="960" height="4" fill="url(#redGrad)" rx="2" opacity="0.5"/>
  <text x="540" y="1008" font-family="Arial, sans-serif" font-size="18" fill="#6a2a2a" text-anchor="middle">investus.kr  SRP Chief Investment Officer</text>
</svg>
