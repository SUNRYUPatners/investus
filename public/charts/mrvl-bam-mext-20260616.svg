<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 440" width="600" height="440">
  <defs>
    <linearGradient id="bg10" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#0a1018"/>
    </linearGradient>
  </defs>
  <rect width="600" height="440" fill="url(#bg10)" rx="16"/>

  <!-- Header -->
  <rect x="20" y="18" width="90" height="26" rx="6" fill="#a78bfa" opacity="0.2"/>
  <text x="65" y="36" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#a78bfa">MRVL</text>
  <text x="122" y="36" font-family="Arial,sans-serif" font-size="13" fill="#94a3b8">2026.06.16</text>

  <!-- Title -->
  <text x="300" y="76" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="700" fill="#f1f5f9">BAM, AI 메모리 최적화 기업</text>
  <text x="300" y="100" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="700" fill="#a78bfa">MEXT 인수 발표</text>

  <rect x="40" y="114" width="520" height="1" fill="#1e2040" opacity="0.8"/>

  <!-- Deal diagram -->
  <!-- BAM -->
  <rect x="40" y="126" width="180" height="80" rx="10" fill="#a78bfa" opacity="0.1"/>
  <rect x="40" y="126" width="180" height="80" rx="10" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.5"/>
  <text x="130" y="162" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="700" fill="#a78bfa">BAM</text>
  <text x="130" y="182" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#64748b">인수 주체</text>
  <text x="130" y="198" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#475569">AI 인프라 투자사</text>

  <!-- Arrow -->
  <line x1="220" y1="166" x2="280" y2="166" stroke="#a78bfa" stroke-width="2.5"/>
  <polygon points="276,161 292,166 276,171" fill="#a78bfa"/>
  <text x="250" y="157" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#a78bfa">인수</text>

  <!-- MEXT -->
  <rect x="292" y="126" width="268" height="80" rx="10" fill="#a78bfa" opacity="0.12"/>
  <rect x="292" y="126" width="268" height="80" rx="10" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.6"/>
  <text x="426" y="157" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="700" fill="#a78bfa">MEXT</text>
  <text x="426" y="177" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">AI 메모리 최적화 스타트업</text>
  <text x="426" y="197" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#475569">데이터센터 인프라 전문</text>

  <!-- Technology explain -->
  <text x="40" y="232" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#64748b">MEXT 핵심 기술</text>
  <rect x="40" y="238" width="520" height="1" fill="#1e293b"/>

  <rect x="40" y="248" width="520" height="56" rx="8" fill="#1a1a2e" opacity="0.8"/>
  <text x="60" y="268" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#a78bfa">플래시 스토리지  →  DRAM급 성능</text>
  <text x="60" y="290" font-family="Arial,sans-serif" font-size="12" fill="#94a3b8">AI 추론 메모리 병목 해소 · 비용 대비 성능 획기적 개선</text>

  <!-- Implications -->
  <rect x="40" y="316" width="4" height="16" rx="2" fill="#a78bfa"/>
  <text x="52" y="328" font-family="Arial,sans-serif" font-size="12" fill="#e2e8f0">GPU 병목 완화 — 메모리 처리 속도 = AI 성능 결정 요소</text>

  <rect x="40" y="340" width="4" height="16" rx="2" fill="#a78bfa"/>
  <text x="52" y="352" font-family="Arial,sans-serif" font-size="12" fill="#e2e8f0">HBM 없이도 DRAM급 확장 — 데이터센터 TCO 절감</text>

  <rect x="40" y="364" width="4" height="16" rx="2" fill="#a78bfa"/>
  <text x="52" y="376" font-family="Arial,sans-serif" font-size="12" fill="#e2e8f0">Marvell ASIC·스토리지 생태계와 통합 시너지</text>

  <rect x="40" y="388" width="4" height="16" rx="2" fill="#fbbf24"/>
  <text x="52" y="400" font-family="Arial,sans-serif" font-size="12" fill="#fbbf24">BAM, 동시에 Missouri AI 데이터센터 수십억 달러 투자 발표</text>

  <text x="300" y="428" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#475569">Source: BAM Acquisition Announcement 2026.06.16</text>
</svg>
