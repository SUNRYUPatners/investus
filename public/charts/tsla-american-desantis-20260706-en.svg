  <text x="860" y="516" font-family="Arial, sans-serif" font-size="13" fill="#9a4a4a" text-anchor="middle">Gov't fleet conversion case</text>
  <text x="860" y="566" font-family="Arial, sans-serif" font-size="12" fill="#6a3a3a" text-anchor="middle">DOGE efficiency link</text>

