  <text x="260" y="746" font-family="Arial, sans-serif" font-size="14" fill="#fca5a5">Gov't efficiency drive → fuel + accident cost data strengthens TSLA case</text>
  <text x="100" y="772" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#f87171">Risks</text>
  <text x="260" y="772" font-family="Arial, sans-serif" font-size="14" fill="#fca5a5">Political volatility · Musk personal brand risk · FSD incident exposure</text>
  <text x="100" y="862" font-family="Arial, sans-serif" font-size="11" fill="#5a2a2a">* Political support + #1 US content = structural protection in tariff/regulatory environment</text>

  <rect x="60" y="912" width="960" height="40" rx="12" fill="#100808" stroke="#ef4444" stroke-width="1" stroke-opacity="0.25"/>
