  <text x="540" y="566" font-family="Arial, sans-serif" font-size="12" fill="#6a3a3a" text-anchor="middle">DeSantis public support</text>

  <rect x="720" y="436" width="280" height="148" rx="16" fill="#1a0a0a" stroke="#ef4444" stroke-width="1.5" stroke-opacity="0.6"/>
