<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0a04"/>
      <stop offset="100%" style="stop-color:#1a1000"/>
    </linearGradient>
    <linearGradient id="oGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#c2410c"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <line x1="0" y1="360" x2="1080" y2="360" stroke="#f97316" stroke-width="0.3" stroke-opacity="0.08"/>
  <line x1="0" y1="720" x2="1080" y2="720" stroke="#f97316" stroke-width="0.3" stroke-opacity="0.08"/>
  <line x1="360" y1="0" x2="360" y2="1080" stroke="#f97316" stroke-width="0.3" stroke-opacity="0.08"/>
  <line x1="720" y1="0" x2="720" y2="1080" stroke="#f97316" stroke-width="0.3" stroke-opacity="0.08"/>

  <rect x="60" y="60" width="960" height="4" fill="url(#oGrad)" rx="2"/>
  <rect x="60" y="90" width="80" height="36" rx="8" fill="#f97316"/>
  <text x="100" y="114" font-family="Arial Black, Arial" font-weight="900" font-size="16" fill="#ffffff" text-anchor="middle">NVDA</text>
  <rect x="154" y="90" width="110" height="36" rx="8" fill="none" stroke="#f97316" stroke-width="2"/>
  <text x="209" y="114" font-family="Arial, sans-serif" font-weight="700" font-size="13" fill="#f97316" text-anchor="middle">경쟁위협</text>
  <text x="1020" y="114" font-family="Arial, sans-serif" font-size="16" fill="#6a3a14" text-anchor="end">2026.07.06</text>

  <text x="540" y="190" font-family="Arial Black, Arial" font-weight="900" font-size="28" fill="#ffffff" text-anchor="middle">중국 칩 NVDA A100 성능 4.7배 달성</text>
  <text x="540" y="246" font-family="Arial Black, Arial" font-weight="900" font-size="56" fill="#fdba74" text-anchor="middle">베이징대 연구팀</text>
  <text x="540" y="296" font-family="Arial, sans-serif" font-size="20" fill="#fb923c" text-anchor="middle">40nm 수출규제 환경 내 개발 · 특정 AI 태스크 4.7배 속도 초과</text>

  <rect x="80" y="320" width="920" height="68" rx="12" fill="#1a1000" stroke="#f97316" stroke-width="2" stroke-opacity="0.6"/>
  <text x="540" y="350" font-family="Arial Black, Arial" font-weight="900" font-size="15" fill="#fdba74" text-anchor="middle">"China performs NVIDIA A100 4.7× on specific tasks —</text>
  <text x="540" y="374" font-family="Arial Black, Arial" font-weight="900" font-size="15" fill="#fdba74" text-anchor="middle">40nm chip built inside China's export-restricted environment." — Bull Theory</text>

  <!-- Comparison bars -->
  <rect x="80" y="412" width="920" height="200" rx="16" fill="#120e04" stroke="#f97316" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="540" y="444" font-family="Arial Black, Arial" font-weight="900" font-size="18" fill="#fdba74" text-anchor="middle">특정 AI 태스크 성능 비교 (Peking Univ. 연구)</text>

  <!-- NVDA A100 bar -->
  <text x="100" y="476" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#fb923c">NVIDIA A100</text>
  <rect x="100" y="482" width="400" height="28" rx="6" fill="#f97316" opacity="0.3"/>
  <rect x="100" y="482" width="400" height="28" rx="6" fill="none" stroke="#f97316" stroke-width="1.5"/>
  <text x="510" y="501" font-family="Arial Black, Arial" font-weight="900" font-size="16" fill="#fb923c">1.0x (기준)</text>

  <!-- China chip bar -->
  <text x="100" y="530" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#fdba74">중국 신칩 (베이징대)</text>
  <rect x="100" y="536" width="920" height="28" rx="6" fill="#f97316" opacity="0.5"/>
  <rect x="100" y="536" width="920" height="28" rx="6" fill="none" stroke="#f97316" stroke-width="1.5"/>
  <text x="690" y="555" font-family="Arial Black, Arial" font-weight="900" font-size="20" fill="#ffffff">4.7x ↑↑↑</text>

  <text x="100" y="596" font-family="Arial, sans-serif" font-size="12" fill="#7a5a2a">* 특정 실시간 신경망 태스크 기준 · 범용 워크로드 비교 아님</text>

  <!-- Analysis -->
  <rect x="80" y="628" width="920" height="260" rx="16" fill="#120e04" stroke="#f97316" stroke-width="1" stroke-opacity="0.4"/>
  <text x="540" y="662" font-family="Arial Black, Arial" font-weight="900" font-size="18" fill="#fdba74" text-anchor="middle">NVDA 경쟁 해자 영향 분석</text>

  <text x="100" y="694" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#fb923c">칩 사양</text>
  <text x="280" y="694" font-family="Arial, sans-serif" font-size="14" fill="#fdba74">40nm 공정 — 수출 통제 내 자체 제조 (TSMC·삼성 없이)</text>
  <text x="100" y="720" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#fb923c">적용 범위</text>
  <text x="280" y="720" font-family="Arial, sans-serif" font-size="14" fill="#fdba74">실시간 신경망 특화 태스크 — 범용 LLM 학습은 해당 없음</text>
  <text x="100" y="746" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#fb923c">리스크</text>
  <text x="280" y="746" font-family="Arial, sans-serif" font-size="14" fill="#fdba74">NVDA 중국 시장 점유율 추가 잠식 · 특화 엣지 AI 수요 대체</text>
  <text x="100" y="772" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#fb923c">한계</text>
  <text x="280" y="772" font-family="Arial, sans-serif" font-size="14" fill="#fdba74">범용 AI 학습·추론에서 H100/B200 대체 불가 수준</text>
  <text x="100" y="798" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#fb923c">시사점</text>
  <text x="280" y="798" font-family="Arial, sans-serif" font-size="14" fill="#fdba74">중국 내 NVDA 모델 독점 흔들림 · 글로벌 AI 칩 경쟁 격화</text>
  <text x="100" y="860" font-family="Arial, sans-serif" font-size="11" fill="#6a4a14">* 범용 대체 아닌 특화 태스크 우위 — NVDA H100·B200 지위는 단기 유지</text>

  <rect x="60" y="912" width="960" height="40" rx="12" fill="#120e04" stroke="#f97316" stroke-width="1" stroke-opacity="0.25"/>
  <text x="540" y="937" font-family="Arial, sans-serif" font-size="15" fill="#fb923c" text-anchor="middle">베이징대 40nm 칩 A100 4.7배 (특화) · 수출통제 환경 내 개발 · NVDA 중국 점유율 위협</text>

  <rect x="60" y="968" width="960" height="4" fill="url(#oGrad)" rx="2" opacity="0.5"/>
  <text x="540" y="1008" font-family="Arial, sans-serif" font-size="18" fill="#6a3a14" text-anchor="middle">investus.kr  SRP Chief Investment Officer</text>
</svg>
