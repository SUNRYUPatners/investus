<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 440" style="font-family:Syne,sans-serif">
  <rect width="480" height="440" fill="#0a0c10"/>
  <rect x="0" y="0" width="480" height="56" fill="#1a0a0a"/>
  <text x="240" y="28" text-anchor="middle" fill="#fb923c" font-size="12" font-weight="700" letter-spacing="2">미국 CPI 인플레이션</text>
  <text x="240" y="46" text-anchor="middle" fill="#94a3b8" font-size="10">5월 CPI 2.9% — 4월 이후 최고치 · 금리 인상 확률 상승</text>

  <!-- Big CPI number -->
  <text x="240" y="110" text-anchor="middle" fill="#fb923c" font-size="64" font-weight="800">2.9%</text>
  <text x="240" y="130" text-anchor="middle" fill="#94a3b8" font-size="11">5월 CPI (전년 동기 대비)</text>

  <!-- CPI trend bar chart -->
  <text x="240" y="158" text-anchor="middle" fill="#94a3b8" font-size="10">월별 CPI 추이 (%)</text>

  <!-- Bars from Jan to May 2026 -->
  <text x="72" y="172" text-anchor="end" fill="#64748b" font-size="8">3.0%</text>
  <text x="72" y="212" text-anchor="end" fill="#64748b" font-size="8">2.5%</text>
  <text x="72" y="252" text-anchor="end" fill="#64748b" font-size="8">2.0%</text>

  <!-- Grid lines -->
  <line x1="76" y1="170" x2="460" y2="170" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="76" y1="210" x2="460" y2="210" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="76" y1="250" x2="460" y2="250" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Jan 2.4% -->
  <rect x="90" y="234" width="44" height="26" rx="3" fill="#475569"/>
  <text x="112" y="271" text-anchor="middle" fill="#64748b" font-size="8">1월</text>
  <text x="112" y="228" text-anchor="middle" fill="#94a3b8" font-size="8">2.4%</text>

  <!-- Feb 2.6% -->
  <rect x="158" y="224" width="44" height="36" rx="3" fill="#475569"/>
  <text x="180" y="271" text-anchor="middle" fill="#64748b" font-size="8">2월</text>
  <text x="180" y="218" text-anchor="middle" fill="#94a3b8" font-size="8">2.6%</text>

  <!-- Mar 2.5% -->
  <rect x="226" y="228" width="44" height="32" rx="3" fill="#475569"/>
  <text x="248" y="271" text-anchor="middle" fill="#64748b" font-size="8">3월</text>
  <text x="248" y="222" text-anchor="middle" fill="#94a3b8" font-size="8">2.5%</text>

  <!-- Apr 2.7% -->
  <rect x="294" y="220" width="44" height="40" rx="3" fill="#fb923c" opacity="0.5"/>
  <text x="316" y="271" text-anchor="middle" fill="#94a3b8" font-size="8">4월</text>
  <text x="316" y="214" text-anchor="middle" fill="#fb923c" font-size="8">2.7%</text>

  <!-- May 2.9% — highlighted -->
  <rect x="362" y="210" width="44" height="50" rx="3" fill="#fb923c"/>
  <text x="384" y="271" text-anchor="middle" fill="#e2e8f0" font-size="8" font-weight="700">5월</text>
  <text x="384" y="204" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="800">2.9% ▲</text>

  <!-- Fed target line -->
  <line x1="76" y1="250" x2="460" y2="250" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="462" y="254" fill="#22c55e" font-size="8">연준 목표 2%</text>

  <!-- Core CPI -->
  <rect x="20" y="284" width="440" height="60" rx="12" fill="#1a0a0a"/>
  <text x="240" y="306" text-anchor="middle" fill="#94a3b8" font-size="10">Core CPI (식품·에너지 제외)</text>
  <text x="240" y="328" text-anchor="middle" fill="#fb923c" font-size="22" font-weight="800">2.9%</text>
  <text x="240" y="340" text-anchor="middle" fill="#64748b" font-size="9">Core CPI도 동일 2.9% — 4월 이후 최고</text>

  <!-- Fed implications -->
  <rect x="20" y="358" width="440" height="60" rx="12" fill="#0f172a"/>
  <text x="240" y="378" text-anchor="middle" fill="#94a3b8" font-size="10">연준 통화정책 함의</text>
  <text x="36" y="398" fill="#fb923c" font-size="11" font-weight="700">⚠️  금리 인상 확률 상승 — 연내 동결 또는 추가 인상</text>
  <text x="36" y="412" fill="#94a3b8" font-size="10">목표 2%와 격차 0.9%p — 인플레이션 재가속 우려</text>

  <text x="240" y="433" text-anchor="middle" fill="#334155" font-size="9">investus.kr · 2026.06.11</text>
</svg>
