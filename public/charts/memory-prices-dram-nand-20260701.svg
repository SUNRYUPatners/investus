  <line x1="80" y1="632" x2="1000" y2="632" stroke="#1e2028" stroke-width="1"/>
  <text x="80" y="662" font-family="Arial,sans-serif" font-size="14" fill="#e5e7eb">HBM3E: AI 서버 수요 폭증 · 2026년 공급부족 지속 예상 · 마진 50%+</text>
  <text x="80" y="690" font-family="Arial,sans-serif" font-size="14" fill="#ef4444">DDR4/DDR5 PC용: 공급과잉 · 가격 하락 추세 · 2Q26 소폭 회복</text>
