  <text x="540" y="278" font-family="Arial,sans-serif" font-size="16" fill="#e5e7eb" text-anchor="middle">SK하이닉스 · 마이크론 · 삼성 수혜 차별화</text>

  <!-- DRAM price chart -->
  <rect x="60" y="308" width="460" height="260" rx="16" fill="#111318" stroke="#60a5fa" stroke-width="1.5"/>
