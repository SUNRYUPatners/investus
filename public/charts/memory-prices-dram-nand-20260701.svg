  <text x="80" y="746" font-family="Arial,sans-serif" font-size="13" fill="#60a5fa">투자 포인트: HBM 노출 높은 SK하이닉스·마이크론이 삼성보다 유리</text>
  <text x="80" y="774" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af">NVIDIA GB200/GB300 출하 → HBM3E 수요 2027까지 타이트</text>
  <text x="80" y="800" font-family="Arial,sans-serif" font-size="12" fill="#4ade80">MU 목표가 상향: $160 (하나증권) · 상반기 HBM 매출 $5B+ 예상</text>

  <rect y="842" width="1080" height="2" fill="#60a5fa"/>
  <rect y="844" width="1080" height="236" fill="#0d1117"/>
  <text x="540" y="890" font-family="Arial,sans-serif" font-size="17" font-weight="bold" fill="#e5e7eb" text-anchor="middle">메모리 양극화 — HBM 품귀 vs NAND 과잉, 수혜주는?</text>
  <text x="540" y="918" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">INVESTUS · 2026.07.01 · 투자 참고용</text>
  <rect y="942" width="1080" height="36" fill="#111318"/>
  <text x="540" y="965" font-family="Arial,sans-serif" font-size="12" fill="#4b5563" text-anchor="middle" letter-spacing="4">DRAM · NAND · HBM · 메모리사이클</text>
