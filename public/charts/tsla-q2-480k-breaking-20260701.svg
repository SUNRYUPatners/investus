<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#0c0f1a"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <filter id="glowRed">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect width="1080" height="1080" fill="none" stroke="#1f2937" stroke-width="2"/>
  <rect x="0" y="0" width="1080" height="4" fill="url(#redGrad)"/>

  <!-- BREAKING badge -->
  <rect x="40" y="14" width="200" height="40" rx="8" fill="rgba(239,68,68,0.2)" stroke="#ef4444" stroke-width="1.5"/>
  <text x="140" y="39" font-family="Arial Black,Arial,sans-serif" font-size="16" font-weight="900" fill="#ef4444" text-anchor="middle" letter-spacing="3">BREAKING</text>

  <!-- Header -->
  <text x="540" y="84" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#6b7280" text-anchor="middle" letter-spacing="3">INVESTUS DAILY REPORT</text>
  <text x="540" y="124" font-family="Arial,sans-serif" font-size="26" font-weight="900" fill="#f9fafb" text-anchor="middle">TSLA · Q2 납품 전망 — 480,000대 예상</text>
  <rect x="396" y="140" width="288" height="34" rx="17" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="540" y="162" font-family="Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" text-anchor="middle" letter-spacing="2">2026.07.01</text>

  <!-- 예상 notice -->
  <rect x="80" y="188" width="920" height="50" rx="10" fill="rgba(239,68,68,0.08)" stroke="#ef4444" stroke-width="1"/>
  <text x="540" y="218" font-family="Arial,sans-serif" font-size="14" fill="#fca5a5" text-anchor="middle">⚠ 공식 실적 발표 전 예상치 — 확정 결과 아님</text>

  <!-- Big hero: 480,000 -->
  <rect x="80" y="258" width="920" height="200" rx="20" fill="#1a0505" stroke="#ef4444" stroke-width="2"/>
  <text x="540" y="370" font-family="Arial Black,Arial,sans-serif" font-size="110" font-weight="900" fill="#ef4444" text-anchor="middle" opacity="0.15">480,000</text>
  <text x="540" y="370" font-family="Arial Black,Arial,sans-serif" font-size="110" font-weight="900" fill="#ef4444" text-anchor="middle">480,000</text>
  <text x="540" y="440" font-family="Arial,sans-serif" font-size="18" fill="#9ca3af" text-anchor="middle" letter-spacing="1">2026 Q2 테슬라 납품 예상 대수</text>

  <!-- Tweet source card -->
  <rect x="80" y="480" width="920" height="160" rx="14" fill="#111318" stroke="#374151" stroke-width="1"/>
  <text x="100" y="514" font-family="Arial,sans-serif" font-size="12" fill="#6b7280" letter-spacing="2">소스 (SOURCE)</text>
  <text x="100" y="544" font-family="Arial,sans-serif" font-size="15" fill="#e5e7eb">@thedWhalley · BREAKING NEWS</text>
  <text x="100" y="574" font-family="Arial Black,Arial,sans-serif" font-size="20" font-weight="900" fill="#f9fafb">"TESLA TO DELIVER 480,000 UNITS IN Q2"</text>
  <text x="100" y="610" font-family="Arial,sans-serif" font-size="16" fill="#ef4444">"It's so promising."</text>

  <!-- Key facts only -->
  <line x1="80" y1="664" x2="1000" y2="664" stroke="#1f2937" stroke-width="1"/>

  <rect x="80" y="680" width="920" height="240" rx="14" fill="#0f172a" stroke="#374151" stroke-width="1"/>
  <text x="100" y="714" font-family="Arial,sans-serif" font-size="12" fill="#6b7280" letter-spacing="2">팩트 체크</text>
  <text x="100" y="748" font-family="Arial,sans-serif" font-size="15" fill="#e5e7eb">● 예상 납품 대수: <tspan fill="#ef4444" font-weight="bold">480,000대</tspan></text>
  <text x="100" y="778" font-family="Arial,sans-serif" font-size="15" fill="#e5e7eb">● 성격: <tspan fill="#f59e0b">전망치 — 공식 발표 전</tspan></text>
  <text x="100" y="808" font-family="Arial,sans-serif" font-size="15" fill="#e5e7eb">● 시장 반응: <tspan fill="#4ade80">"It's so promising."</tspan></text>
  <text x="100" y="848" font-family="Arial,sans-serif" font-size="13" fill="#6b7280">* 모델별 분류·컨센서스 비교·분기 추이는 공식 발표 후 확인 가능</text>
  <text x="100" y="872" font-family="Arial,sans-serif" font-size="12" fill="#4b5563">실제 실적은 테슬라 공식 Q2 Deliveries Report 발표 시 업데이트 예정</text>

  <text x="540" y="954" font-family="Arial,sans-serif" font-size="14" fill="#374151" text-anchor="middle">TSLA Q2 납품 전망 480K · 예상치 · 공식 발표 전 · 2026.07.01</text>

  <rect x="0" y="1060" width="1080" height="20" fill="url(#redGrad)" opacity="0.4"/>
  <text x="540" y="1073" font-family="Arial,sans-serif" font-size="10" fill="#6b7280" text-anchor="middle" letter-spacing="2">INVESTUS · TSLA RESEARCH · NOT FINANCIAL ADVICE</text>
</svg>
