  <text x="30" y="30" font-family="Arial,sans-serif" font-size="10" fill="#00e5a0" font-weight="700" letter-spacing="2">INVESTUS · TSLA REPORT</text>
  <text x="30" y="58" font-family="Arial,sans-serif" font-size="18" fill="white" font-weight="700">Texas Robotaxi AVO 인가 확정 — Austin 상업 운행 개시</text>
  <text x="770" y="58" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="end">2026.05.29</text>
  <line x1="30" y1="70" x2="770" y2="70" stroke="#1e2330" stroke-width="1"/>

  <rect x="30" y="84" width="220" height="100" rx="8" fill="#071208" stroke="#00e5a0" stroke-width="1.5"/>
  <text x="140" y="112" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">규제 상태</text>
  <text x="140" y="148" font-family="Arial,sans-serif" font-size="28" fill="#00e5a0" font-weight="900" text-anchor="middle">AVO</text>
  <text x="140" y="168" font-family="Arial,sans-serif" font-size="10" fill="#9ca3af" text-anchor="middle">Austin Vehicle Ordinance</text>
  <text x="140" y="182" font-family="Arial,sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Texas 당국 공식 승인</text>

  <rect x="268" y="84" width="220" height="100" rx="8" fill="#071208" stroke="#00e5a0" stroke-width="1.2" stroke-opacity="0.6"/>
  <text x="378" y="112" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">출시 도시</text>
  <text x="378" y="148" font-family="Arial,sans-serif" font-size="28" fill="white" font-weight="900" text-anchor="middle">Austin</text>
  <text x="378" y="168" font-family="Arial,sans-serif" font-size="10" fill="#9ca3af" text-anchor="middle">Texas → 전국 확대 예정</text>
  <text x="378" y="182" font-family="Arial,sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">1단계 상업 운행 거점</text>

  <rect x="506" y="84" width="264" height="100" rx="8" fill="#071208" stroke="#00e5a0" stroke-width="1.2" stroke-opacity="0.6"/>
  <text x="638" y="112" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">상업 개시</text>
  <text x="638" y="148" font-family="Arial,sans-serif" font-size="22" fill="#00e5a0" font-weight="900" text-anchor="middle">2026 Q2</text>
  <text x="638" y="168" font-family="Arial,sans-serif" font-size="10" fill="white" text-anchor="middle">Cybercab 유료 서비스</text>
  <text x="638" y="182" font-family="Arial,sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">드라이버 없는 완전 자율주행</text>

  <rect x="30" y="200" width="740" height="64" rx="8" fill="#060b18" stroke="#00e5a0" stroke-width="1" stroke-opacity="0.4"/>
