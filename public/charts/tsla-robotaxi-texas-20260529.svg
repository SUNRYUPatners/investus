  <text x="50" y="222" font-family="Arial,sans-serif" font-size="11" fill="#00e5a0" font-weight="700">■ AVO 인가 의미</text>
  <text x="50" y="242" font-family="Arial,sans-serif" font-size="11" fill="white">Texas 당국으로부터 Austin Vehicle Ordinance 운행 허가 공식 취득</text>
  <text x="50" y="258" font-family="Arial,sans-serif" font-size="10" fill="#9ca3af">Waymo(캘리포니아)에 이어 완전 자율주행 상업 허가 두 번째 주 — FSD 규제 장벽 해소 가속</text>

  <rect x="30" y="280" width="354" height="82" rx="6" fill="#0a0f1e" stroke="#1e2330" stroke-width="1"/>
  <rect x="30" y="280" width="4" height="82" rx="2" fill="#00e5a0"/>
  <text x="50" y="304" font-family="Arial,sans-serif" font-size="10" fill="#6b7280">확장 계획</text>
  <text x="50" y="326" font-family="Arial,sans-serif" font-size="12" fill="white" font-weight="700">Austin → 6개 도시 동시 확장</text>
  <text x="50" y="346" font-family="Arial,sans-serif" font-size="10" fill="#9ca3af">Dallas · Houston · SF · LA · NY 인가 신청 진행 중</text>
  <text x="50" y="358" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">2026 말 전국 커버리지 목표</text>

  <rect x="402" y="280" width="368" height="82" rx="6" fill="#0a0f1e" stroke="#1e2330" stroke-width="1"/>
  <rect x="402" y="280" width="4" height="82" rx="2" fill="#00e5a0"/>
  <text x="422" y="304" font-family="Arial,sans-serif" font-size="10" fill="#6b7280">투자 시사점</text>
  <text x="422" y="326" font-family="Arial,sans-serif" font-size="12" fill="#00e5a0" font-weight="700">Robotaxi 수익화 전환점 도달</text>
  <text x="422" y="346" font-family="Arial,sans-serif" font-size="10" fill="#9ca3af">FSD 라이선스 $0 → 유료 서비스 수익 직접 인식</text>
  <text x="422" y="358" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">Tesla Energy + Robotaxi 이중 수익 구조 완성</text>

  <line x1="30" y1="376" x2="770" y2="376" stroke="#1e2330" stroke-width="1"/>
  <text x="30" y="392" font-family="Arial,sans-serif" font-size="8" fill="#374151">투자 참고용 · 투자 권유 아님</text>
  <text x="770" y="392" font-family="Arial,sans-serif" font-size="9" fill="#00e5a0" text-anchor="end" font-weight="700">SUNRYU Partners CIO</text>
</svg>
