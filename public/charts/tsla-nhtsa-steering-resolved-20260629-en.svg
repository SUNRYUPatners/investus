<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <rect width="1080" height="1080" fill="#0d1117"/>
  <rect width="1080" height="88" fill="#111318"/>
  <rect y="88" width="1080" height="3" fill="#4ade80"/>
  <text x="32" y="38" font-family="Arial,sans-serif" font-size="14" fill="#4ade80" font-weight="700">TSLA · NHTSA · Risk Cleared</text>
  <text x="32" y="72" font-family="Arial,sans-serif" font-size="27" font-weight="bold" fill="#f1f5f9">NHTSA Closes Steering Probe — 376,000 Tesla EV Risk Resolved</text>

  <rect x="28" y="108" width="1024" height="150" rx="14" fill="#0a2315" stroke="#4ade80" stroke-width="2"/>
  <text x="540" y="162" font-family="Arial,sans-serif" font-size="20" fill="#4ade80" font-weight="700" text-anchor="middle">✅ Investigation Officially Closed</text>
  <text x="540" y="202" font-family="Arial,sans-serif" font-size="44" font-weight="bold" fill="#f1f5f9" text-anchor="middle">376,000 EV Steering Risk Eliminated</text>
  <text x="540" y="242" font-family="Arial,sans-serif" font-size="14" fill="#9ca3af" text-anchor="middle">Closed: June 27, 2026 · Reuters</text>

  <rect x="28" y="278" width="490" height="360" rx="12" fill="#111318"/>
  <text x="273" y="314" font-family="Arial,sans-serif" font-size="16" fill="#e5e7eb" font-weight="700" text-anchor="middle">Investigation Overview</text>
  <rect x="48" y="328" width="450" height="58" rx="8" fill="#0f1923"/>
  <text x="68" y="354" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af">Regulator</text>
  <text x="488" y="354" font-family="Arial,sans-serif" font-size="14" fill="#f1f5f9" font-weight="700" text-anchor="end">NHTSA</text>
  <text x="488" y="374" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="end">National Highway Traffic Safety Administration</text>
  <rect x="48" y="396" width="450" height="58" rx="8" fill="#0f1923"/>
  <text x="68" y="422" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af">Vehicles Covered</text>
  <text x="488" y="422" font-family="Arial,sans-serif" font-size="14" fill="#f1f5f9" font-weight="700" text-anchor="end">376,000 units</text>
  <text x="488" y="442" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="end">2023 Model 3 · Model Y</text>
  <rect x="48" y="464" width="450" height="58" rx="8" fill="#0f1923"/>
  <text x="68" y="490" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af">Issue</text>
  <text x="488" y="490" font-family="Arial,sans-serif" font-size="14" fill="#f1f5f9" font-weight="700" text-anchor="end">Power Steering Assist</text>
  <text x="488" y="510" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="end">Reported steering assist failures</text>
  <rect x="48" y="532" width="450" height="58" rx="8" fill="#0a2315"/>
  <text x="68" y="558" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af">Resolution</text>
  <text x="488" y="558" font-family="Arial,sans-serif" font-size="14" fill="#4ade80" font-weight="700" text-anchor="end">Software Update (OTA)</text>
  <text x="488" y="578" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="end">No physical recall required</text>

  <rect x="538" y="278" width="514" height="360" rx="12" fill="#111318"/>
  <text x="795" y="314" font-family="Arial,sans-serif" font-size="16" fill="#e5e7eb" font-weight="700" text-anchor="middle">Investment Implications</text>
  <rect x="558" y="330" width="474" height="88" rx="8" fill="#0a2315"/>
  <text x="795" y="360" font-family="Arial,sans-serif" font-size="14" fill="#4ade80" font-weight="700" text-anchor="middle">✅ Closed Without Recall</text>
  <text x="795" y="390" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">Resolved via software fix alone</text>
  <text x="795" y="410" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">Zero cost burden · No hardware defect</text>
  <rect x="558" y="428" width="474" height="88" rx="8" fill="#0a2315"/>
  <text x="795" y="458" font-family="Arial,sans-serif" font-size="14" fill="#4ade80" font-weight="700" text-anchor="middle">✅ Overhang Risk Removed</text>
  <text x="795" y="488" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">Recall risk for 376K vehicles → zero</text>
  <text x="795" y="508" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">Stock pressure catalyst eliminated</text>
  <rect x="558" y="526" width="474" height="88" rx="8" fill="#0a2315"/>
  <text x="795" y="556" font-family="Arial,sans-serif" font-size="14" fill="#4ade80" font-weight="700" text-anchor="middle">✅ Tesla Software DNA Validated</text>
  <text x="795" y="586" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">Safety issues resolved via OTA update</text>
  <text x="795" y="606" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">Core competitive moat vs. traditional OEMs</text>

  <rect x="28" y="658" width="1024" height="100" rx="12" fill="#111318"/>
  <text x="540" y="692" font-family="Arial,sans-serif" font-size="15" fill="#e5e7eb" font-weight="700" text-anchor="middle">What is OTA (Over-The-Air) Update?</text>
  <text x="540" y="718" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">Remote software update over the internet → safety issues fixed instantly without physical dealership visit</text>
  <text x="540" y="742" font-family="Arial,sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">Traditional OEMs like Toyota/Ford/GM require mandatory recall visits for the same type of problem</text>

  <rect x="28" y="778" width="1024" height="90" rx="12" fill="#0a2315"/>
  <text x="540" y="813" font-family="Arial,sans-serif" font-size="15" fill="#4ade80" font-weight="700" text-anchor="middle">NHTSA closure = Short-term headwind gone + Tesla's software DNA proven again</text>
  <text x="540" y="842" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">376K recall fears resolved → uncertainty cleared ahead of Q2 earnings</text>
  <text x="540" y="1062" font-family="Arial,sans-serif" font-size="10" fill="#4b5563" text-anchor="middle">Source: NHTSA · Reuters (2026.06.27) · Investus 2026.06.29</text>
</svg>
