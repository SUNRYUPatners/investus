<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" style="background:#0a0c10;font-family:'Helvetica Neue',Arial,sans-serif">
  <rect width="800" height="440" fill="#0a0c10"/>
  <defs>
    <linearGradient id="pur2" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#9333ea"/><stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
  </defs>

  <rect x="30" y="24" width="10" height="40" rx="3" fill="url(#pur2)"/>
  <text x="50" y="40" fill="#c084fc" font-size="11" font-weight="700" letter-spacing="2">SPACEX IPO · INVESTOR</text>
  <text x="50" y="60" fill="white" font-size="19" font-weight="800">Ron Baron — $10억 SpaceX IPO 주문 "평생 안 팔아"</text>
  <text x="750" y="44" fill="#c084fc" font-size="11" text-anchor="end">2026.06.08</text>
  <line x1="30" y1="80" x2="770" y2="80" stroke="#ffffff" stroke-opacity="0.06"/>

  <!-- Big quote -->
  <rect x="30" y="92" width="740" height="78" rx="12" fill="#c084fc" fill-opacity="0.08" stroke="#c084fc" stroke-opacity="0.2"/>
  <text x="50" y="120" fill="rgba(255,255,255,0.45)" font-size="13" font-style="italic">"</text>
  <text x="62" y="120" fill="white" font-size="14" font-weight="600">Billionaire investor Ron Baron has placed a $1 billion order for SpaceX IPO shares</text>
  <text x="62" y="140" fill="white" font-size="14" font-weight="600">and says he is not selling in his lifetime.</text>
  <text x="62" y="158" fill="#c084fc" font-size="11">— Muskonomics</text>

  <!-- Two stat cards -->
  <rect x="30" y="186" width="360" height="100" rx="12" fill="#c084fc" fill-opacity="0.08" stroke="#c084fc" stroke-opacity="0.2"/>
  <text x="50" y="212" fill="rgba(255,255,255,0.5)" font-size="12" font-weight="600">Baron 개인 IPO 주문</text>
  <text x="50" y="260" fill="white" font-size="48" font-weight="900">$1B</text>

  <rect x="410" y="186" width="360" height="100" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-opacity="1"/>
  <text x="430" y="212" fill="rgba(255,255,255,0.5)" font-size="12" font-weight="600">Baron Capital Group SpaceX 총 투자 (Jim Cramer)</text>
  <text x="430" y="260" fill="white" font-size="48" font-weight="900">$2B</text>

  <!-- Context -->
  <text x="30" y="322" fill="rgba(255,255,255,0.4)" font-size="11" font-weight="700" letter-spacing="1">투자자 컨텍스트</text>

  <rect x="30" y="334" width="228" height="60" rx="8" fill="rgba(255,255,255,0.04)"/>
  <text x="50" y="356" fill="rgba(255,255,255,0.5)" font-size="11">Baron 운용 AUM</text>
  <text x="50" y="380" fill="white" font-size="20" font-weight="800">~$50B+</text>

  <rect x="276" y="334" width="228" height="60" rx="8" fill="rgba(255,255,255,0.04)"/>
  <text x="296" y="356" fill="rgba(255,255,255,0.5)" font-size="11">TSLA 장기 투자 수익</text>
  <text x="296" y="380" fill="white" font-size="20" font-weight="800">수십 배</text>

  <rect x="522" y="334" width="248" height="60" rx="8" fill="#c084fc" fill-opacity="0.06" stroke="#c084fc" stroke-opacity="0.2"/>
  <text x="542" y="356" fill="#c084fc" font-size="11" font-weight="700">보유 전략</text>
  <text x="542" y="380" fill="white" font-size="18" font-weight="800">평생 보유 · 매도 불가</text>

  <!-- Jim Cramer quote -->
  <rect x="30" y="408" width="740" height="22" rx="4" fill="rgba(255,255,255,0.03)"/>
  <text x="400" y="423" fill="rgba(255,255,255,0.4)" font-size="11" text-anchor="middle">Jim Cramer: Ron Baron이 속한 Baron Capital Group은 SpaceX에 $2B 투자 — "이 회사에 대한 확신이 그 정도"</text>
</svg>
