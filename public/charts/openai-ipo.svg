  <rect x="20" y="348" width="760" height="58" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="400" y="368" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Arial" font-weight="bold">AI 코딩 벤치마크 (SWE-Bench Multilingual)</text>
  <text x="120" y="392" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Arial">xAI Composer 2.5</text>
  <text x="120" y="400" text-anchor="middle" fill="#a78bfa" font-size="13" font-family="Arial" font-weight="bold">76.9%</text>
  <text x="280" y="392" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Arial">GPT-5</text>
  <text x="280" y="400" text-anchor="middle" fill="#60a5fa" font-size="13" font-family="Arial" font-weight="bold">69.3%</text>
