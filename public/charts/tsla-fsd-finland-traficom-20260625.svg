  <text x="56" y="296" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">🇱🇹 리투아니아</text>
  <text x="56" y="314" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">🇪🇪 에스토니아</text>
  <text x="56" y="332" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">🇩🇰 덴마크</text>
  <text x="56" y="350" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">🇧🇪 벨기에</text>
  <text x="56" y="374" font-family="Arial,sans-serif" font-size="13" fill="#fbbf24" font-weight="700">🇫🇮 핀란드 → 심사 중</text>
