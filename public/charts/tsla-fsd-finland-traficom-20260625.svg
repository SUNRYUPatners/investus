  <text x="744" y="314" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">• 4개월 연속 유럽 판매 성장</text>
  <text x="744" y="334" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">• FSD 승인 = 유럽 프리미엄 강화</text>
  <text x="744" y="354" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">• 호주 FSD V14 동시 도입</text>
