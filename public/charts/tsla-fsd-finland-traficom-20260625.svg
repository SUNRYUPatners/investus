  <text x="394" y="258" font-family="Arial,sans-serif" font-size="13" fill="#00e5a0" font-weight="700">상호인증 메커니즘</text>
  <text x="394" y="282" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">• 네덜란드 RDW 승인 문서 참조</text>
