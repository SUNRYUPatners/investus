  <rect x="24" y="426" width="1032" height="68" rx="10" fill="#0d1f14" stroke="#00e5a0" stroke-width="1"/>
  <text x="540" y="454" font-family="Arial,sans-serif" font-size="15" fill="#00e5a0" font-weight="700" text-anchor="middle">핀란드 Traficom 심사 = EU FSD 6번째 국가 확산 임박</text>
  <text x="540" y="476" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">RDW 상호인증 방식으로 유럽 전역 빠른 확산 채널 구축 중 — 유럽 매출 회복 핵심 동력</text>

  <text x="540" y="512" font-family="Arial,sans-serif" font-size="10" fill="#4b5563" text-anchor="middle">출처: Traficom · 2026.06.25 · Investus</text>
