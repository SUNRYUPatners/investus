<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 440">
  <rect width="480" height="440" fill="#0a0c10"/>
  <rect x="0" y="0" width="480" height="56" fill="#111318"/>
  <rect x="0" y="52" width="480" height="2" fill="#fb923c" opacity="0.5"/>
  <text x="24" y="24" font-family="Arial,sans-serif" font-size="11" fill="#fb923c" font-weight="bold">종목분석 · AAPL</text>
  <text x="24" y="44" font-family="Arial,sans-serif" font-size="13" fill="#e5e7eb" font-weight="bold">아이폰 가격 +15% 인상 임박 — 팀 쿡 "40년 만에 처음"</text>

  <!-- Main stat -->
  <rect x="24" y="68" width="432" height="96" rx="12" fill="#1a0d00" stroke="#fb923c" stroke-width="1.5" stroke-opacity="0.8"/>
  <text x="240" y="100" font-family="Arial,sans-serif" font-size="14" fill="#9ca3af" text-anchor="middle">모건스탠리 추정 가격 인상률</text>
  <text x="240" y="132" font-family="Arial,sans-serif" font-size="40" fill="#fb923c" font-weight="bold" text-anchor="middle">+15%</text>
  <text x="240" y="156" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">팀 쿡: "40년 커리어에서 이런 상황은 처음" — 메모리 부족</text>

  <!-- Price impact -->
  <rect x="24" y="176" width="204" height="80" rx="10" fill="#111318"/>
  <text x="40" y="200" font-family="Arial,sans-serif" font-size="11" fill="#fb923c">iPhone 18 Pro 예상가</text>
  <text x="40" y="226" font-family="Arial,sans-serif" font-size="24" fill="#e5e7eb" font-weight="bold">~$1,299</text>
  <text x="40" y="248" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af">현재 $1,099 → 인상 후</text>

  <rect x="244" y="176" width="212" height="80" rx="10" fill="#111318"/>
  <text x="260" y="200" font-family="Arial,sans-serif" font-size="11" fill="#fb923c">발표 예상 시기</text>
  <text x="260" y="224" font-family="Arial,sans-serif" font-size="18" fill="#e5e7eb" font-weight="bold">9월 이전 가능</text>
  <text x="260" y="248" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af">Macs·iPads도 동시 인상</text>

  <!-- Cause -->
  <rect x="24" y="268" width="432" height="100" rx="10" fill="#111318"/>
  <text x="40" y="292" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af">가격 인상 원인</text>
  <text x="40" y="316" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">메모리·스토리지 칩 공급 부족 (AI 기능 탑재 필요)</text>
  <text x="40" y="336" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">메타·MS·구글·아마존 AI 설투로 메모리 선점</text>
  <text x="40" y="356" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">공급망 가격 전가 → 소비자 가격 인상 불가피</text>

  <text x="240" y="430" font-family="Arial,sans-serif" font-size="10" fill="#4b5563" text-anchor="middle">2026.06.19 · Investus · 참고용</text>
