<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#040a14"/>
      <stop offset="100%" style="stop-color:#0a1020"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f87171"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect x="60" y="60" width="960" height="4" fill="url(#redGrad)" rx="2"/>

  <rect x="60" y="86" width="80" height="34" rx="8" fill="#450a0a"/>
  <text x="100" y="109" font-family="Arial Black, Arial" font-weight="900" font-size="13" fill="#ffffff" text-anchor="middle">NVDA</text>
  <rect x="152" y="86" width="180" height="34" rx="8" fill="none" stroke="#f87171" stroke-width="1.5"/>
  <text x="242" y="109" font-family="Arial, sans-serif" font-weight="700" font-size="12" fill="#f87171" text-anchor="middle">Burry Depreciation Analysis</text>
  <text x="1020" y="109" font-family="Arial, sans-serif" font-size="14" fill="#374151" text-anchor="end">2026.07.10</text>

  <text x="540" y="178" font-family="Arial Black, Arial" font-weight="900" font-size="20" fill="#ffffff" text-anchor="middle">Michael Burry — Big Tech AI Chip Depreciation Manipulation</text>
  <text x="540" y="284" font-family="Arial Black, Arial" font-weight="900" font-size="48" fill="#f87171" text-anchor="middle">Depreciation Period</text>
  <text x="540" y="340" font-family="Arial Black, Arial" font-weight="900" font-size="28" fill="#fca5a5" text-anchor="middle">Extend it → Inflate profits</text>
  <text x="540" y="384" font-family="Arial, sans-serif" font-size="17" fill="#9ca3af" text-anchor="middle">Burry: companies extend chip life → lower depreciation → higher reported profits</text>

  <rect x="80" y="414" width="440" height="130" rx="16" fill="#1a0a0a" stroke="#f87171" stroke-width="1.5"/>
  <text x="300" y="454" font-family="Arial Black, Arial" font-weight="900" font-size="15" fill="#f87171" text-anchor="middle">Meta Case</text>
  <text x="300" y="490" font-family="Arial, sans-serif" font-size="14" fill="#fca5a5" text-anchor="middle">2020: 3-year depreciation</text>
  <text x="300" y="514" font-family="Arial, sans-serif" font-size="14" fill="#fca5a5" text-anchor="middle">2025: 5-year depreciation (+67%)</text>
  <text x="300" y="532" font-family="Arial, sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">→ Profits artificially boosted</text>

  <rect x="560" y="414" width="440" height="130" rx="16" fill="#1a0a0a" stroke="#f87171" stroke-width="1.5"/>
  <text x="780" y="454" font-family="Arial Black, Arial" font-weight="900" font-size="15" fill="#f87171" text-anchor="middle">Amazon Case</text>
  <text x="780" y="490" font-family="Arial, sans-serif" font-size="14" fill="#fca5a5" text-anchor="middle">Same hardware, opposite direction</text>
  <text x="780" y="514" font-family="Arial, sans-serif" font-size="14" fill="#fca5a5" text-anchor="middle">Shortened schedule (real usage)</text>
  <text x="780" y="532" font-family="Arial, sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">Arbitrary company-level choice</text>

  <rect x="80" y="560" width="920" height="100" rx="14" fill="#1a0a0a" stroke="#f87171" stroke-width="1.5"/>
  <text x="540" y="600" font-family="Arial Black, Arial" font-weight="900" font-size="16" fill="#f87171" text-anchor="middle">Burry's Core Argument</text>
  <text x="540" y="628" font-family="Arial, sans-serif" font-size="14" fill="#fca5a5" text-anchor="middle">Depreciation doesn't measure how long a chip physically works</text>
  <text x="540" y="652" font-family="Arial, sans-serif" font-size="14" fill="#9ca3af" text-anchor="middle">Divergent accounting policies make AI earnings quality comparisons unreliable</text>

  <rect x="80" y="676" width="920" height="80" rx="14" fill="#1a0a0a" stroke="#fb923c" stroke-width="1.5"/>
  <text x="540" y="712" font-family="Arial Black, Arial" font-weight="900" font-size="15" fill="#fb923c" text-anchor="middle">Counter-View</text>
  <text x="540" y="740" font-family="Arial, sans-serif" font-size="14" fill="#fed7aa" text-anchor="middle">If chips genuinely last longer, extended depreciation is justified · GAAP-compliant policy choice</text>

  <rect x="80" y="772" width="920" height="90" rx="14" fill="#1a0a0a" stroke="#f87171" stroke-width="1"/>
  <text x="540" y="810" font-family="Arial Black, Arial" font-weight="900" font-size="15" fill="#f87171" text-anchor="middle">Investor Watch Points</text>
  <text x="540" y="838" font-family="Arial, sans-serif" font-size="14" fill="#d1d5db" text-anchor="middle">Compare AI CAPEX + depreciation policies across peers · Verify earnings quality before valuation</text>

  <rect x="80" y="878" width="920" height="70" rx="14" fill="#1a0a0a" stroke="#f87171" stroke-width="1"/>
  <text x="540" y="916" font-family="Arial, sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">Source: Michael Burry X Analysis · Bull Burry Big Tech thread (2026.07.10)</text>

  <rect x="0" y="1020" width="1080" height="60" fill="#020810"/>
  <text x="540" y="1056" font-family="Arial, sans-serif" font-size="13" fill="#374151" text-anchor="middle">INVESTUS · 2026.07.10 · investus.kr SRP Chief Investment Officer</text>
</svg>
