  <rect x="225" y="263" width="44" height="97" rx="3" fill="#e31937" opacity="0.5"/>
  <text x="247" y="259" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">118K</text>
  <text x="247" y="373" font-family="Arial,sans-serif" font-size="9" fill="#475569" text-anchor="middle">Q3'25</text>

  <!-- Q4 2025: ~130K -->
  <rect x="290" y="253" width="44" height="107" rx="3" fill="#e31937" opacity="0.6"/>
  <text x="312" y="249" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">130K</text>
  <text x="312" y="373" font-family="Arial,sans-serif" font-size="9" fill="#475569" text-anchor="middle">Q4'25</text>

  <!-- Q1 2026: ~109K (actual) -->
  <rect x="355" y="273" width="44" height="87" rx="3" fill="#60a5fa" opacity="0.7"/>
  <text x="377" y="269" font-family="Arial,sans-serif" font-size="9" fill="#60a5fa" text-anchor="middle">109K</text>
  <text x="377" y="373" font-family="Arial,sans-serif" font-size="9" fill="#60a5fa" text-anchor="middle">Q1'26</text>

  <!-- Q2 2026E: ~140K+ strong -->
  <rect x="420" y="240" width="44" height="120" rx="3" fill="#4ade80" opacity="0.8"/>
  <text x="442" y="236" font-family="Arial,sans-serif" font-size="9" fill="#4ade80" font-weight="700" text-anchor="middle">140K+E</text>
  <text x="442" y="373" font-family="Arial,sans-serif" font-size="9" fill="#4ade80" font-weight="700" text-anchor="middle">Q2'26E</text>

  <!-- Right side analysis -->
  <text x="560" y="130" font-family="Arial,sans-serif" font-size="11" fill="#4ade80" font-weight="700">■ 강세 요인</text>
  <text x="560" y="148" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">• 신형 Model Y 첫 인도 효과</text>
  <text x="560" y="164" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">• 미중 관세 협상 우호 분위기</text>
  <text x="560" y="180" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">• NEV 보조금 연장 확인</text>
  <text x="560" y="196" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">• 84K 가족 구매층 → 반복 구매</text>

  <text x="560" y="228" font-family="Arial,sans-serif" font-size="11" fill="#f87171" font-weight="700">■ 경쟁 리스크</text>
  <text x="560" y="246" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">• BYD Han/Atto — 현지 가격 경쟁</text>
  <text x="560" y="262" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">• Geely·Chery 급성장</text>
  <text x="560" y="278" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">• 중국 토종 AI 차량 마케팅 강화</text>

  <text x="560" y="310" font-family="Arial,sans-serif" font-size="11" fill="#c084fc" font-weight="700">■ 투자 포인트</text>
  <text x="560" y="328" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">• China = 테슬라 전체 매출 20%+</text>
  <text x="560" y="344" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">• Q2 회복 확인 시 주가 촉매</text>
  <text x="560" y="360" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">• FSD 중국 승인 여부도 변수</text>

  <text x="768" y="424" font-family="Arial,sans-serif" font-size="9" fill="#334155" text-anchor="end">SUNRYU Partners · 2026.05.27</text>
</svg>
