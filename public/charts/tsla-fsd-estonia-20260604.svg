<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" font-family="'Segoe UI',Arial,sans-serif">
  <rect width="800" height="440" fill="#0a0f1e"/>
  <rect x="0" y="0" width="800" height="52" fill="#111827"/>
  <text x="30" y="32" font-size="15" font-weight="700" fill="#ef4444">🇪🇺 Tesla FSD — 에스토니아 진입 (유럽 3개국)</text>
  <text x="30" y="47" font-size="10" fill="#6b7280">FSD Supervised · 유럽 확장 · 2026.06.04</text>

  <!-- Europe map (schematic) -->
  <rect x="30" y="65" width="320" height="280" rx="12" fill="#111827"/>
  <text x="190" y="88" font-size="10" font-weight="700" fill="#9ca3af" text-anchor="middle">FSD 유럽 진출 지도</text>
  <!-- Map background -->
  <rect x="45" y="96" width="290" height="235" rx="8" fill="#0d1117"/>

  <!-- Finland (top, highlighted green → done) -->
  <rect x="180" y="106" width="70" height="50" rx="6" fill="#4ade80" opacity="0.3" stroke="#4ade80" stroke-width="1.5"/>
  <text x="215" y="130" font-size="10" font-weight="700" fill="#4ade80" text-anchor="middle">🇫🇮</text>
  <text x="215" y="145" font-size="8" fill="#4ade80" text-anchor="middle">Finland</text>
  <!-- Check mark -->
  <text x="240" y="112" font-size="10" fill="#4ade80">✓</text>

  <!-- Lithuania (middle) -->
  <rect x="155" y="175" width="70" height="45" rx="6" fill="#4ade80" opacity="0.3" stroke="#4ade80" stroke-width="1.5"/>
  <text x="190" y="198" font-size="10" font-weight="700" fill="#4ade80" text-anchor="middle">🇱🇹</text>
  <text x="190" y="212" font-size="8" fill="#4ade80" text-anchor="middle">Lithuania</text>
  <text x="218" y="182" font-size="10" fill="#4ade80">✓</text>

  <!-- Estonia (right, newest - pulsing highlight) -->
  <rect x="185" y="145" width="75" height="42" rx="6" fill="#ef4444" opacity="0.4" stroke="#ef4444" stroke-width="2"/>
  <text x="222" y="163" font-size="10" font-weight="800" fill="#ef4444" text-anchor="middle">🇪🇪</text>
  <text x="222" y="178" font-size="8" fill="#ef4444" text-anchor="middle">Estonia</text>
  <rect x="248" y="146" width="25" height="14" rx="3" fill="#ef4444"/>
  <text x="261" y="157" font-size="7" fill="white" text-anchor="middle" font-weight="800">NEW</text>

  <!-- Arrow domino -->
  <text x="110" y="128" font-size="9" fill="#6b7280" text-anchor="middle">핀란드</text>
  <text x="110" y="140" font-size="8" fill="#4ade80" text-anchor="middle">1st ✓</text>
  <text x="110" y="200" font-size="9" fill="#6b7280" text-anchor="middle">리투아니아</text>
  <text x="110" y="212" font-size="8" fill="#4ade80" text-anchor="middle">2nd ✓</text>
  <text x="110" y="168" font-size="9" fill="#ef4444" text-anchor="middle">에스토니아</text>
  <text x="110" y="180" font-size="8" fill="#ef4444" text-anchor="middle">3rd 🆕</text>

  <!-- Domino arrows -->
  <path d="M 135 128 L 175 128 L 175 148" stroke="#4ade80" stroke-width="1.5" fill="none" stroke-dasharray="3 2" marker-end="url(#a)"/>
  <path d="M 175 168 L 175 175" stroke="#4ade80" stroke-width="1.5" fill="none" stroke-dasharray="3 2"/>
  <path d="M 155 198 L 140 198 L 140 168 L 135 168" stroke="#4ade80" stroke-width="1.5" fill="none" stroke-dasharray="3 2"/>

  <!-- Next targets -->
  <rect x="50" y="250" width="75" height="50" rx="6" fill="#1a1a2e" stroke="#4b5563" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="88" y="272" font-size="9" fill="#6b7280" text-anchor="middle">🇩🇪 Germany</text>
  <text x="88" y="288" font-size="8" fill="#6b7280" text-anchor="middle">다음?</text>
  <rect x="140" y="250" width="75" height="50" rx="6" fill="#1a1a2e" stroke="#4b5563" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="178" y="272" font-size="9" fill="#6b7280" text-anchor="middle">🇫🇷 France</text>
  <text x="178" y="288" font-size="8" fill="#6b7280" text-anchor="middle">다음?</text>
  <rect x="230" y="250" width="75" height="50" rx="6" fill="#1a1a2e" stroke="#4b5563" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="268" y="272" font-size="9" fill="#6b7280" text-anchor="middle">🇳🇴 Norway</text>
  <text x="268" y="288" font-size="8" fill="#6b7280" text-anchor="middle">다음?</text>

  <!-- Stats panel right -->
  <rect x="365" y="65" width="405" height="280" rx="12" fill="#111827"/>
  <text x="568" y="90" font-size="11" font-weight="700" fill="#ef4444" text-anchor="middle">FSD Supervised — 유럽 진출 현황</text>

  <!-- Domino progress -->
  <rect x="385" y="100" width="365" height="100" rx="10" fill="#0d1117"/>
  <text x="568" y="120" font-size="10" font-weight="700" fill="#9ca3af" text-anchor="middle">유럽 도미노 진행 현황</text>
  <!-- Step 1 -->
  <rect x="400" y="130" width="80" height="55" rx="8" fill="#4ade80" opacity="0.2" stroke="#4ade80" stroke-width="1.5"/>
  <text x="440" y="150" font-size="9" font-weight="700" fill="#4ade80" text-anchor="middle">🇫🇮 Finland</text>
  <text x="440" y="165" font-size="8" fill="#9ca3af" text-anchor="middle">완료 ✓</text>
  <text x="440" y="178" font-size="7" fill="#6b7280" text-anchor="middle">2026 Q1</text>
  <!-- Arrow -->
  <text x="493" y="162" font-size="16" fill="#4ade80">→</text>
  <!-- Step 2 -->
  <rect x="508" y="130" width="80" height="55" rx="8" fill="#4ade80" opacity="0.2" stroke="#4ade80" stroke-width="1.5"/>
  <text x="548" y="150" font-size="9" font-weight="700" fill="#4ade80" text-anchor="middle">🇱🇹 Lithuania</text>
  <text x="548" y="165" font-size="8" fill="#9ca3af" text-anchor="middle">완료 ✓</text>
  <text x="548" y="178" font-size="7" fill="#6b7280" text-anchor="middle">2026 Q2</text>
  <!-- Arrow -->
  <text x="601" y="162" font-size="16" fill="#ef4444">→</text>
  <!-- Step 3 NEW -->
  <rect x="618" y="128" width="112" height="59" rx="8" fill="#ef4444" opacity="0.2" stroke="#ef4444" stroke-width="2"/>
  <text x="675" y="148" font-size="9" font-weight="800" fill="#ef4444" text-anchor="middle">🇪🇪 Estonia</text>
  <text x="675" y="163" font-size="8" fill="#ef4444" text-anchor="middle">NOW LIVE 🆕</text>
  <text x="675" y="178" font-size="7" fill="#ef4444" text-anchor="middle">2026.06.04</text>

  <!-- Quote -->
  <rect x="385" y="212" width="365" height="115" rx="10" fill="#0d1117"/>
  <text x="568" y="232" font-size="10" font-weight="700" fill="#c084fc" text-anchor="middle">Mario Nawfal · Elon Musk 반응</text>
  <text x="568" y="252" font-size="9" fill="#9ca3af" text-anchor="middle">"First the Netherlands, then Lithuania.</text>
  <text x="568" y="268" font-size="9" fill="#9ca3af" text-anchor="middle">Every approval creates another reference point,</text>
  <text x="568" y="284" font-size="9" fill="#9ca3af" text-anchor="middle">another test case, and a new group of real drivers"</text>
  <text x="568" y="302" font-size="9" fill="#9ca3af" text-anchor="middle">"The European FSD dominoes keep lining up."</text>
  <text x="568" y="316" font-size="8" fill="#6b7280" text-anchor="middle">— Mario Nawfal (@MarioNawfal)</text>

  <!-- Bottom -->
  <rect x="30" y="360" width="740" height="55" rx="12" fill="#111827"/>
  <text x="400" y="382" font-size="11" font-weight="700" fill="#c084fc" text-anchor="middle">시사점 — FSD 유럽 규제 도미노</text>
  <text x="400" y="400" font-size="9" fill="#9ca3af" text-anchor="middle">각 EU 회원국 승인은 나머지 국가의 규제 장벽을 낮추는 선례가 됨</text>
  <text x="400" y="414" font-size="9" fill="#6b7280" text-anchor="middle">유럽 FSD 승인 국가 수 ↑ → Tesla 유럽 판매·마진 회복의 핵심 드라이버</text>

  <text x="770" y="430" font-size="9" fill="#6b7280">investus.kr</text>
</svg>
