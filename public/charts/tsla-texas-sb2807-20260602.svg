  <text x="220" y="303" fill="rgba(255,255,255,0.6)" font-size="11">기존 AV 법령</text>
  <text x="400" y="303" fill="rgba(255,255,255,0.5)" font-size="11">비감독 자율주행 허용 (Waymo·Tesla)</text>
  <text x="600" y="303" fill="rgba(255,255,255,0.4)" font-size="10">운행 중</text>

