  <text x="80" y="271" fill="white" font-size="11" font-weight="700">🤠 Texas</text>
  <text x="220" y="271" fill="#00e5a0" font-size="11" font-weight="700">SB 2807 (신규)</text>
  <text x="400" y="271" fill="white" font-size="11">상업 운행 완전 허용 · 무인 택시</text>
