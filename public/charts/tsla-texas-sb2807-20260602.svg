  <text x="52" y="408" fill="#00e5a0" font-size="12" font-weight="700">🏆 텍사스 선례 → 50개 주 도미노 예상 경로</text>
  <text x="52" y="426" fill="rgba(255,255,255,0.6)" font-size="10">현재: Texas (완료) → 플로리다·조지아·오하이오 입법 추진 예상 → 연방 AV 법안 논의 가속 → 전국 Robotaxi 시장 개방</text>
  <text x="52" y="442" fill="rgba(255,255,255,0.4)" font-size="10">보험 시장 개방 (법적 근거 확보) → 기업 플릿 계약 → 대규모 상업 Robotaxi 운행 체계 완성</text>

  <text x="400" y="476" fill="rgba(255,255,255,0.2)" font-size="9" text-anchor="middle">investus.kr · 선류파트너스 · 투자 참고용, 투자 권유 아님</text>
</svg>
