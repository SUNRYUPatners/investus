<svg width="800" height="480" viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" style="font-family:system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#07091a"/>
      <stop offset="100%" stop-color="#0d1022"/>
    </linearGradient>
  </defs>
  <rect width="800" height="480" fill="url(#bg)"/>

  <!-- Header -->
  <rect x="0" y="0" width="800" height="60" fill="rgba(0,229,160,0.06)"/>
  <text x="32" y="21" fill="rgba(0,229,160,0.7)" font-size="10" letter-spacing="2" font-weight="700">TESLA · TSLA · 미국 자율주행</text>
  <text x="32" y="46" fill="white" font-size="20" font-weight="800">Texas SB 2807 — 미국 최초 상업용 자율주행 법안 · Tesla 1호 인증</text>

  <!-- Main stat boxes -->
  <rect x="32" y="76" width="354" height="100" rx="12" fill="rgba(0,229,160,0.08)" stroke="rgba(0,229,160,0.3)" stroke-width="1"/>
  <text x="52" y="103" fill="rgba(0,229,160,0.8)" font-size="11" font-weight="700">🏛️ Texas SB 2807</text>
  <text x="52" y="128" fill="white" font-size="15" font-weight="800">미국 최초 상업용 자율주행</text>
  <text x="52" y="148" fill="white" font-size="15" font-weight="800">규제 법안 통과</text>
  <text x="52" y="166" fill="rgba(255,255,255,0.4)" font-size="10">2026.06.01 발효 · 텍사스 주 최초 상업 AV 규정</text>

  <rect x="414" y="76" width="354" height="100" rx="12" fill="rgba(0,229,160,0.08)" stroke="rgba(0,229,160,0.3)" stroke-width="1"/>
  <text x="434" y="103" fill="rgba(0,229,160,0.8)" font-size="11" font-weight="700">🚗 Tesla — 1호 인증 기업</text>
  <text x="434" y="128" fill="white" font-size="15" font-weight="800">미국 최초 상업용 자율주행</text>
  <text x="434" y="148" fill="white" font-size="15" font-weight="800">운행 인증 기업</text>
  <text x="434" y="166" fill="rgba(255,255,255,0.4)" font-size="10">Cybercab + FSD V4 기반 · 텍사스 전 도로 적용</text>

  <!-- Regulation comparison table -->
  <text x="32" y="204" fill="rgba(255,255,255,0.5)" font-size="11" font-weight="600" letter-spacing="1">주별 자율주행 규제 현황</text>

  <!-- Table header -->
  <rect x="32" y="218" width="736" height="30" rx="6" fill="rgba(255,255,255,0.05)"/>
  <text x="80" y="238" fill="rgba(255,255,255,0.4)" font-size="10" font-weight="600">주</text>
  <text x="220" y="238" fill="rgba(255,255,255,0.4)" font-size="10" font-weight="600">규제 수준</text>
  <text x="400" y="238" fill="rgba(255,255,255,0.4)" font-size="10" font-weight="600">허용 범위</text>
  <text x="600" y="238" fill="rgba(255,255,255,0.4)" font-size="10" font-weight="600">상태</text>

