  <text x="80" y="333" fill="rgba(255,255,255,0.7)" font-size="11">🌉 California</text>
  <text x="220" y="333" fill="rgba(255,255,255,0.6)" font-size="11">DMV/CPUC 이중</text>
  <text x="400" y="333" fill="rgba(255,255,255,0.5)" font-size="11">허가 기반 · Waymo 상업 운행 중</text>
  <text x="600" y="333" fill="rgba(255,255,255,0.4)" font-size="10">허가 필요</text>

  <!-- Other states -->
  <rect x="32" y="345" width="736" height="28" rx="4" fill="rgba(255,255,255,0.02)"/>
  <text x="80" y="363" fill="rgba(255,255,255,0.5)" font-size="11">나머지 47개 주</text>
  <text x="220" y="363" fill="rgba(255,255,255,0.4)" font-size="11">연방 가이드라인만</text>
  <text x="400" y="363" fill="rgba(255,255,255,0.3)" font-size="11">주별 개별 허가 미비</text>
  <text x="600" y="363" fill="rgba(255,255,255,0.3)" font-size="10">미비</text>

