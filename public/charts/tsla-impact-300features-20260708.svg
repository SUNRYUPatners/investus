  <text x="540" y="902" font-family="Arial, sans-serif" font-size="15" fill="#d1d5db" text-anchor="middle">OTA = 서비스 비용 절감 + 제품 가치 유지 → 고객 충성도 + 재구매율 업계 최상</text>

