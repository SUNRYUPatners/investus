  <text x="120" y="920" font-family="Arial, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">V4.0</text>

  <circle cx="280" cy="890" r="10" fill="#374151" stroke="#6b7280" stroke-width="2"/>
  <text x="280" y="920" font-family="Arial, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">V4.2</text>

  <circle cx="460" cy="890" r="10" fill="#374151" stroke="#9ca3af" stroke-width="2"/>
  <text x="460" y="920" font-family="Arial, sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">V4.4 AC2</text>

  <circle cx="660" cy="890" r="12" fill="#374151" stroke="#9ca3af" stroke-width="2"/>
  <text x="660" y="920" font-family="Arial, sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">V4.5 AC2</text>
  <text x="660" y="870" font-family="Arial, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">이전</text>

  <circle cx="900" cy="890" r="16" fill="#ef4444" stroke="#ef4444" stroke-width="2"/>
  <text x="900" y="896" font-family="Arial Black, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="900">V4.6</text>
  <text x="900" y="920" font-family="Arial Black, sans-serif" font-size="12" fill="#ef4444" text-anchor="middle" font-weight="900">AC3 NOW</text>
  <text x="900" y="864" font-family="Arial, sans-serif" font-size="11" fill="#60a5fa" text-anchor="middle">현재</text>

