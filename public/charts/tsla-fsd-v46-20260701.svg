  <text x="540" y="1068" font-family="Arial, sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">FSD V4.6은 HW3 차량 성능의 새 기준 — AC3 Early Access 시대 개막 · INVESTUS · 2026.07.01 · 투자 참고용</text>
