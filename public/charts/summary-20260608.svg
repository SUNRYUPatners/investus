<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" style="background:#0a0c10;font-family:'Helvetica Neue',Arial,sans-serif">
  <rect width="800" height="600" fill="#0a0c10"/>
  <defs>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00e5a0" stop-opacity="0.08"/>
