  <text x="30" y="48" fill="white" font-size="20" font-weight="900">📋 2026.06.08 시장 한장 요약</text>
  <text x="770" y="40" fill="rgba(255,255,255,0.3)" font-size="11" text-anchor="end">investus.kr</text>

  <line x1="0" y1="58" x2="800" y2="58" stroke="#ffffff" stroke-opacity="0.06"/>

  <!-- xAI / SPCX Section -->
  <rect x="12" y="68" width="776" height="132" rx="10" fill="#c084fc" fill-opacity="0.05" stroke="#c084fc" stroke-opacity="0.15"/>
  <text x="28" y="90" fill="#c084fc" font-size="12" font-weight="800">🚀 SPACEX / xAI</text>

  <circle cx="40" cy="110" r="4" fill="#c084fc"/>
