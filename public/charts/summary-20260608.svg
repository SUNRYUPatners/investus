  <circle cx="40" cy="134" r="4" fill="#c084fc"/>
  <text x="52" y="138" fill="rgba(255,255,255,0.85)" font-size="13" font-weight="600">Ron Baron, SpaceX IPO <tspan fill="white" font-weight="900">$10억</tspan> 주문 — "평생 팔지 않겠다" · Baron Capital Group $2B 총 투자</text>

  <circle cx="40" cy="158" r="4" fill="#c084fc"/>
  <text x="52" y="162" fill="rgba(255,255,255,0.85)" font-size="13" font-weight="600">Jensen Huang <tspan fill="white" font-weight="900">HUGE 발표</tspan> 예정 — 내부소식통 "NVIDIA+SpaceX 파트너십 IPO 직전 공개"</text>

  <circle cx="40" cy="182" r="4" fill="#c084fc"/>
  <text x="52" y="186" fill="rgba(255,255,255,0.85)" font-size="13" font-weight="600">SPCX IPO 앞두고 <tspan fill="white" font-weight="900">EXTREME VOLATILITY</tspan> 경고 · $200M ATM 프로그램 소문</text>

  <!-- NVDA Section -->
  <rect x="12" y="210" width="776" height="86" rx="10" fill="#60a5fa" fill-opacity="0.04" stroke="#60a5fa" stroke-opacity="0.12"/>
  <text x="28" y="232" fill="#60a5fa" font-size="12" font-weight="800">🟢 NVIDIA (NVDA)</text>

  <circle cx="40" cy="252" r="4" fill="#60a5fa"/>
  <text x="52" y="256" fill="rgba(255,255,255,0.85)" font-size="13" font-weight="600">Jensen Huang "메모리 공급 부족, <tspan fill="white" font-weight="900">수년간 지속</tspan>" 공개 경고 — SK하이닉스 최대 수혜</text>

