  <text x="52" y="352" fill="rgba(255,255,255,0.85)" font-size="13" font-weight="600">Optimus 대규모 채용 오픈 — 로봇공학 <tspan fill="white" font-weight="900">36개</tspan> + Optimus 관련 <tspan fill="white" font-weight="900">172개</tspan> = 총 208개 포지션</text>

  <circle cx="40" cy="372" r="4" fill="#00e5a0"/>
  <text x="52" y="376" fill="rgba(255,255,255,0.85)" font-size="13" font-weight="600">실제 배터리 건강도 — 2024 Model 3: <tspan fill="white" font-weight="900">96.9%</tspan> · 2021 Model Y: <tspan fill="white" font-weight="900">89.5%</tspan> (40,000마일 후)</text>

  <circle cx="40" cy="396" r="4" fill="#00e5a0"/>
  <text x="52" y="400" fill="rgba(255,255,255,0.85)" font-size="13" font-weight="600">JP Morgan Q1 2026 Tesla <tspan fill="white" font-weight="900">+143만주</tspan> 추가 매수 · 총 4,607만주 · 자본 유입 <tspan fill="white" font-weight="900">$5.515억</tspan></text>

  <circle cx="40" cy="420" r="4" fill="#00e5a0"/>
  <text x="52" y="424" fill="rgba(255,255,255,0.85)" font-size="13" font-weight="600">Tesla FSD(Supervised) 리뷰 — "거의 완전 자율주행 · 개입 없음 · 진짜 인상적"</text>

  <!-- footer -->
  <line x1="12" y1="450" x2="788" y2="450" stroke="#ffffff" stroke-opacity="0.05"/>
  <text x="400" y="472" fill="rgba(255,255,255,0.2)" font-size="11" text-anchor="middle">xAI 18개월 회수 · Ron Baron $1B · Jensen HUGE발표 · NVDA 메모리부족 · ASML 2nm · TSLA Optimus 208개 · 배터리96.9% · JPM +143만주</text>
  <text x="400" y="502" fill="rgba(255,255,255,0.15)" font-size="11" text-anchor="middle">Investus Research · investus.kr · 본 자료는 투자 참고용이며 투자 결정의 책임은 투자자 본인에게 있습니다</text>
</svg>
