<svg width="800" height="480" viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" style="font-family:system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#07091a"/>
      <stop offset="100%" stop-color="#0d1022"/>
    </linearGradient>
    <linearGradient id="roadGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(0,229,160,0.6)"/>
      <stop offset="100%" stop-color="rgba(0,229,160,0.1)"/>
    </linearGradient>
  </defs>
  <rect width="800" height="480" fill="url(#bg)"/>

  <!-- Header -->
  <rect x="0" y="0" width="800" height="60" fill="rgba(0,229,160,0.06)"/>
  <text x="32" y="21" fill="rgba(0,229,160,0.7)" font-size="10" letter-spacing="2" font-weight="700">TESLA · TSLA · FSD 실도로 테스트</text>
  <text x="32" y="46" fill="white" font-size="19" font-weight="800">FSD — The Grapevine 정복 · 4,160ft 고도 · 6% 경사 · 북부 캘리포니아</text>

  <!-- Subtitle -->
  <text x="32" y="78" fill="rgba(255,255,255,0.4)" font-size="11">I-5 Tejon Pass · 산타클라리타~산호아킨 밸리 · 숙련 운전자들이 "믿기 어렵다"고 표현한 주행 성능</text>

  <!-- Route profile visual -->
  <text x="32" y="106" fill="rgba(255,255,255,0.5)" font-size="11" font-weight="600" letter-spacing="1">The Grapevine 구간 프로파일</text>

  <!-- Mountain profile path -->
  <polyline points="60,210 160,160 280,130 400,160 520,180 640,210 740,210"
    stroke="url(#roadGrad)" stroke-width="3" fill="none"/>
  <!-- Filled area under curve -->
  <polygon points="60,210 160,160 280,130 400,160 520,180 640,210 740,210 740,240 60,240"
    fill="rgba(0,229,160,0.06)"/>

  <!-- Peak marker -->
  <circle cx="280" cy="130" r="6" fill="#00e5a0"/>
  <line x1="280" y1="136" x2="280" y2="175" stroke="rgba(0,229,160,0.5)" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="220" y="108" width="120" height="20" rx="4" fill="rgba(0,229,160,0.15)"/>
  <text x="280" y="123" fill="#00e5a0" font-size="10" font-weight="700" text-anchor="middle">4,160 ft 최고점</text>

  <!-- Grade label -->
  <rect x="190" y="150" width="100" height="18" rx="4" fill="rgba(168,85,247,0.15)"/>
  <text x="240" y="163" fill="#c084fc" font-size="10" font-weight="700" text-anchor="middle">경사도 최대 6%</text>

  <!-- Start label -->
  <text x="60" y="255" fill="rgba(255,255,255,0.4)" font-size="9" text-anchor="middle">Santa Clarita</text>
  <!-- End label -->
  <text x="740" y="255" fill="rgba(255,255,255,0.4)" font-size="9" text-anchor="middle">San Joaquin</text>
  <!-- Tejon Pass -->
  <text x="280" y="255" fill="rgba(255,255,255,0.35)" font-size="9" text-anchor="middle">Tejon Pass</text>

  <!-- Route length -->
  <rect x="300" y="195" width="200" height="18" rx="4" fill="rgba(255,255,255,0.05)"/>
  <text x="400" y="208" fill="rgba(255,255,255,0.4)" font-size="9" text-anchor="middle">총 4,140ft 고도 상승 · 8.5마일 하강 구간</text>

  <!-- Key stats boxes -->
  <rect x="32" y="272" width="220" height="70" rx="10" fill="rgba(0,229,160,0.08)" stroke="rgba(0,229,160,0.2)" stroke-width="1"/>
  <text x="142" y="295" fill="rgba(255,255,255,0.4)" font-size="10" text-anchor="middle">최고 고도</text>
  <text x="142" y="325" fill="#00e5a0" font-size="28" font-weight="800" text-anchor="middle">4,160 ft</text>

  <rect x="274" y="272" width="220" height="70" rx="10" fill="rgba(168,85,247,0.08)" stroke="rgba(168,85,247,0.2)" stroke-width="1"/>
  <text x="384" y="295" fill="rgba(255,255,255,0.4)" font-size="10" text-anchor="middle">최대 경사도</text>
  <text x="384" y="325" fill="#c084fc" font-size="28" font-weight="800" text-anchor="middle">6%</text>

  <rect x="516" y="272" width="252" height="70" rx="10" fill="rgba(96,165,250,0.08)" stroke="rgba(96,165,250,0.2)" stroke-width="1"/>
  <text x="642" y="295" fill="rgba(255,255,255,0.4)" font-size="10" text-anchor="middle">숙련 운전자 평가</text>
  <text x="642" y="318" fill="#60a5fa" font-size="14" font-weight="800" text-anchor="middle">"믿기 어렵다"</text>
  <text x="642" y="334" fill="rgba(96,165,250,0.6)" font-size="10" text-anchor="middle">자신감 수준이 말로 표현 불가</text>

  <!-- Quote box -->
  <rect x="32" y="356" width="736" height="80" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="52" y="378" fill="rgba(255,255,255,0.5)" font-size="10" font-style="italic">"Most experienced drivers - runs was amazed at the performance of the Tesla since it felt a level</text>
  <text x="52" y="394" fill="rgba(255,255,255,0.5)" font-size="10" font-style="italic"> of confidence that was hard to put into words."</text>
  <text x="52" y="414" fill="rgba(255,255,255,0.3)" font-size="10">— R.H. Flores, 2026.06.02 · The Grapevine: Santa Clarita ~ San Joaquin Valley (I-5 구간)</text>
  <text x="52" y="428" fill="rgba(0,229,160,0.6)" font-size="10">FSD가 미국에서 가장 까다로운 산악 고속도로 구간을 완주 — 규제 승인 근거 강화</text>

  <text x="400" y="476" fill="rgba(255,255,255,0.2)" font-size="9" text-anchor="middle">investus.kr · 선류파트너스 · 투자 참고용, 투자 권유 아님</text>
</svg>
