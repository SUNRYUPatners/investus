<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="'Segoe UI',Arial,sans-serif">
  <rect width="800" height="450" fill="#0a0f1e"/>
  <rect x="0" y="0" width="800" height="52" fill="#111827"/>
  <text x="30" y="32" font-size="15" font-weight="700" fill="#4ade80">🤖 META Business Agent — 전 플랫폼 출시</text>
  <text x="30" y="47" font-size="10" fill="#6b7280">WhatsApp · Instagram · Messenger · 2026.06.04</text>

  <!-- META logo area + 3B users -->
  <rect x="30" y="65" width="280" height="170" rx="12" fill="#1a1a2e" stroke="#3b82f6" stroke-width="1.5"/>
  <!-- Meta logo hint -->
  <text x="170" y="110" font-size="48" text-anchor="middle">∞</text>
  <rect x="60" y="115" width="60" height="6" rx="3" fill="#3b82f6"/>
  <rect x="130" y="115" width="60" height="6" rx="3" fill="#1877f2"/>
  <rect x="200" y="115" width="60" height="6" rx="3" fill="#0668e1"/>
  <text x="170" y="145" font-size="11" font-weight="800" fill="white" text-anchor="middle">META</text>
  <text x="170" y="162" font-size="9" fill="#9ca3af" text-anchor="middle">Business Agent 출시</text>

  <!-- 3B stat -->
  <text x="170" y="205" font-size="52" font-weight="900" fill="#4ade80" text-anchor="middle">3B+</text>
  <text x="170" y="225" font-size="10" fill="#9ca3af" text-anchor="middle">월간 활성 사용자</text>

  <!-- 3 Platform cards -->
  <rect x="325" y="65" width="445" height="170" rx="12" fill="#111827"/>
  <text x="548" y="90" font-size="11" font-weight="700" fill="#4ade80" text-anchor="middle">플랫폼별 배포 현황</text>

  <!-- WhatsApp -->
  <rect x="340" y="100" width="125" height="120" rx="10" fill="#0d1117"/>
  <text x="403" y="124" font-size="28" text-anchor="middle">💬</text>
  <text x="403" y="148" font-size="11" font-weight="800" fill="#4ade80" text-anchor="middle">WhatsApp</text>
  <text x="403" y="165" font-size="8" fill="#9ca3af" text-anchor="middle">글로벌 메신저</text>
  <rect x="355" y="172" width="95" height="18" rx="5" fill="#166534"/>
  <text x="403" y="185" font-size="8" font-weight="700" fill="#4ade80" text-anchor="middle">✅ LIVE</text>
  <text x="403" y="202" font-size="8" fill="#6b7280" text-anchor="middle">2B+ 사용자</text>

  <!-- Instagram -->
  <rect x="478" y="100" width="125" height="120" rx="10" fill="#0d1117"/>
  <text x="541" y="124" font-size="28" text-anchor="middle">📷</text>
  <text x="541" y="148" font-size="11" font-weight="800" fill="#e879f9" text-anchor="middle">Instagram</text>
  <text x="541" y="165" font-size="8" fill="#9ca3af" text-anchor="middle">비즈니스 DM</text>
  <rect x="493" y="172" width="95" height="18" rx="5" fill="#701a75"/>
  <text x="541" y="185" font-size="8" font-weight="700" fill="#e879f9" text-anchor="middle">✅ LIVE</text>
  <text x="541" y="202" font-size="8" fill="#6b7280" text-anchor="middle">2B+ 사용자</text>

  <!-- Messenger -->
  <rect x="617" y="100" width="138" height="120" rx="10" fill="#0d1117"/>
  <text x="687" y="124" font-size="28" text-anchor="middle">💙</text>
  <text x="687" y="148" font-size="11" font-weight="800" fill="#60a5fa" text-anchor="middle">Messenger</text>
  <text x="687" y="165" font-size="8" fill="#9ca3af" text-anchor="middle">기업 CS 봇</text>
  <rect x="632" y="172" width="108" height="18" rx="5" fill="#1e3a5f"/>
  <text x="687" y="185" font-size="8" font-weight="700" fill="#60a5fa" text-anchor="middle">✅ LIVE</text>
  <text x="687" y="202" font-size="8" fill="#6b7280" text-anchor="middle">1B+ 사용자</text>

