  <rect x="30" y="250" width="740" height="90" rx="12" fill="#111827"/>
  <text x="400" y="272" font-size="11" font-weight="700" fill="#4ade80" text-anchor="middle">Business Agent 핵심 기능</text>

  <rect x="50" y="282" width="155" height="46" rx="8" fill="#0d1117"/>
  <text x="128" y="300" font-size="9" fill="#9ca3af" text-anchor="middle">기업 통합</text>
  <text x="128" y="318" font-size="10" font-weight="700" fill="#4ade80" text-anchor="middle">$600B+ 브랜드</text>
  <text x="128" y="330" font-size="8" fill="#6b7280" text-anchor="middle">파트너십</text>

  <rect x="220" y="282" width="155" height="46" rx="8" fill="#0d1117"/>
  <text x="298" y="300" font-size="9" fill="#9ca3af" text-anchor="middle">AI 기능</text>
  <text x="298" y="318" font-size="10" font-weight="700" fill="#e2e8f0" text-anchor="middle">24/7 자동 응대</text>
  <text x="298" y="330" font-size="8" fill="#6b7280" text-anchor="middle">판매·CS 자동화</text>

  <rect x="390" y="282" width="155" height="46" rx="8" fill="#0d1117"/>
  <text x="468" y="300" font-size="9" fill="#9ca3af" text-anchor="middle">진입 장벽</text>
  <text x="468" y="318" font-size="10" font-weight="700" fill="#fbbf24" text-anchor="middle">기존 인프라 활용</text>
  <text x="468" y="330" font-size="8" fill="#6b7280" text-anchor="middle">API 연동 최소화</text>

  <rect x="560" y="282" width="195" height="46" rx="8" fill="#0d1117"/>
  <text x="658" y="300" font-size="9" fill="#9ca3af" text-anchor="middle">수익 모델</text>
  <text x="658" y="318" font-size="10" font-weight="700" fill="#c084fc" text-anchor="middle">메시지당 과금</text>
  <text x="658" y="330" font-size="8" fill="#6b7280" text-anchor="middle">광고 연동 확장</text>

  <!-- Jensen quote about META -->
  <rect x="30" y="355" width="740" height="68" rx="12" fill="#111827"/>
  <text x="400" y="377" font-size="10" font-weight="700" fill="#c084fc" text-anchor="middle">Jensen Huang: "Nobody uses AI better than META"</text>
  <text x="400" y="395" font-size="9" fill="#9ca3af" text-anchor="middle">Shelly Palmer: "Meta launched Business Agent across WhatsApp, Instagram, Messenger</text>
  <text x="400" y="411" font-size="9" fill="#9ca3af" text-anchor="middle">with 3B+ monthly users — enterprise platform with major brand pilot plans expected"</text>

  <text x="770" y="440" font-size="9" fill="#6b7280">investus.kr</text>
</svg>
