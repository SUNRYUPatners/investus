<svg xmlns="http://www.w3.org/2000/svg" width="800" height="430" viewBox="0 0 800 430">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d100a"/>
      <stop offset="100%" style="stop-color:#151a0d"/>
    </linearGradient>
  </defs>
  <rect width="800" height="430" fill="url(#bg)"/>
  <rect width="800" height="3" fill="#fb923c" opacity="0.9"/>

  <!-- Header -->
  <text x="32" y="38" font-family="Arial,sans-serif" font-size="11" fill="#fb923c" font-weight="600" letter-spacing="2">AMZN · AWS · 2026.05.28</text>
  <text x="32" y="66" font-family="'SF Pro Display',Arial,sans-serif" font-size="20" fill="#ffffff" font-weight="700">AWS, Bedrock·Claude가 이끄는 마진 개선 — 하이퍼스케일러 1위</text>
  <text x="32" y="88" font-family="Arial,sans-serif" font-size="13" fill="#94a3b8">Q1 Bedrock 고객 지출 급증 · Azure 역행 · Trinium 비용 절감 구조</text>
  <line x1="32" y1="102" x2="768" y2="102" stroke="#1e2a10" stroke-width="1"/>

  <!-- Q/Q Margin Delta Chart -->
  <text x="32" y="126" font-family="Arial,sans-serif" font-size="11" fill="#fb923c" font-weight="700">■ 하이퍼스케일러 클라우드 마진 Q/Q 변화 (SemiAnalysis)</text>

  <!-- Chart area baseline -->
  <line x1="80" y1="260" x2="720" y2="260" stroke="#1e2a10" stroke-width="1"/>
  <text x="70" y="264" font-family="Arial,sans-serif" font-size="9" fill="#475569" text-anchor="end">0</text>

  <!-- Q3 2025 group -->
  <text x="185" y="148" font-family="Arial,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">3Q 2025</text>
  <!-- AWS Q3: +1.7bps -->
  <rect x="120" y="210" width="40" height="50" rx="2" fill="#60a5fa" opacity="0.8"/>
  <text x="140" y="207" font-family="Arial,sans-serif" font-size="9" fill="#60a5fa" text-anchor="middle">+1.7</text>
  <!-- GCP Q3: -0.3bps -->
  <rect x="170" y="260" width="40" height="12" rx="2" fill="#4ade80" opacity="0.6"/>
  <text x="190" y="282" font-family="Arial,sans-serif" font-size="9" fill="#64748b" text-anchor="middle">-0.3</text>
  <!-- Azure Q3: +2.6bps -->
  <rect x="220" y="183" width="40" height="77" rx="2" fill="#ef4444" opacity="0.5"/>
  <text x="240" y="180" font-family="Arial,sans-serif" font-size="9" fill="#ef4444" text-anchor="middle">+2.6</text>

  <!-- Q4 2025 group -->
  <text x="390" y="148" font-family="Arial,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">4Q 2025</text>
  <!-- AWS Q4: +0.5bps -->
  <rect x="325" y="245" width="40" height="15" rx="2" fill="#60a5fa" opacity="0.8"/>
  <text x="345" y="242" font-family="Arial,sans-serif" font-size="9" fill="#60a5fa" text-anchor="middle">+0.5</text>
  <!-- GCP Q4: +0.4bps -->
  <rect x="375" y="247" width="40" height="13" rx="2" fill="#4ade80" opacity="0.6"/>
  <text x="395" y="244" font-family="Arial,sans-serif" font-size="9" fill="#4ade80" text-anchor="middle">+0.4</text>
  <!-- Azure Q4: -1.0bps -->
  <rect x="425" y="260" width="40" height="30" rx="2" fill="#ef4444" opacity="0.6"/>
  <text x="445" y="302" font-family="Arial,sans-serif" font-size="9" fill="#ef4444" text-anchor="middle">-1.0</text>

  <!-- Q1 2026 group — highlight -->
  <text x="585" y="148" font-family="Arial,sans-serif" font-size="10" fill="#fb923c" text-anchor="middle" font-weight="700">1Q 2026 ★</text>
  <!-- AWS Q1: +2.1bps -->
  <rect x="520" y="197" width="40" height="63" rx="2" fill="#60a5fa" opacity="0.95"/>
  <text x="540" y="194" font-family="Arial,sans-serif" font-size="10" fill="#ffffff" text-anchor="middle" font-weight="700">+2.1</text>
  <!-- GCP Q1: +0.4bps -->
  <rect x="570" y="247" width="40" height="13" rx="2" fill="#4ade80" opacity="0.6"/>
  <text x="590" y="244" font-family="Arial,sans-serif" font-size="9" fill="#4ade80" text-anchor="middle">+0.4</text>
  <!-- Azure Q1: -2.5bps -->
  <rect x="620" y="260" width="40" height="75" rx="2" fill="#ef4444" opacity="0.8"/>
  <text x="640" y="348" font-family="Arial,sans-serif" font-size="10" fill="#ef4444" text-anchor="middle" font-weight="700">-2.5</text>

  <!-- Legend -->
  <rect x="700" y="200" width="12" height="8" rx="1" fill="#60a5fa"/>
  <text x="716" y="208" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8">AWS</text>
  <rect x="700" y="215" width="12" height="8" rx="1" fill="#4ade80"/>
  <text x="716" y="223" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8">GCP</text>
  <rect x="700" y="230" width="12" height="8" rx="1" fill="#ef4444"/>
  <text x="716" y="238" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8">Azure</text>
  <text x="700" y="252" font-family="Arial,sans-serif" font-size="8" fill="#475569">단위: bps</text>

  <!-- Bottom: quotes + insight -->
  <rect x="32" y="355" width="468" height="44" rx="6" fill="rgba(251,146,60,0.06)" stroke="#fb923c" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="48" y="373" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8" font-style="italic">"Amazon's this quarter driven primarily by customer</text>
  <text x="48" y="389" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8" font-style="italic">spending growth on Claude through Bedrock."</text>

  <rect x="516" y="355" width="252" height="44" rx="6" fill="rgba(0,229,160,0.06)" stroke="#00e5a0" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="532" y="373" font-family="Arial,sans-serif" font-size="11" fill="#00e5a0" font-weight="600">Trinium 칩 효과</text>
  <text x="532" y="390" font-family="Arial,sans-serif" font-size="10" fill="#94a3b8">GPU 비용 없이 AI 추론 → 마진 개선</text>

  <text x="768" y="424" font-family="Arial,sans-serif" font-size="9" fill="#334155" text-anchor="end">SUNRYU Partners · 2026.05.28</text>
</svg>
