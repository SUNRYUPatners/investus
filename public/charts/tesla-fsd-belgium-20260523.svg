  <text x="170" y="378" font-family="Arial,sans-serif" font-size="10" fill="#e5e7eb">유럽 Tesla 약 80만 대 × 전환율 10% × €8,000~9,000 = €640M~720M 일시 매출</text>
  <text x="50" y="392" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">+ 월정액 모델 전환 시 장기 반복 수익 구조로 전환 가능</text>

  <line x1="30" y1="410" x2="770" y2="410" stroke="#1e2330" stroke-width="1"/>
  <text x="30" y="424" font-family="Arial,sans-serif" font-size="10" fill="#6b7280">투자 참고용. 투자 판단 및 결과에 대한 책임은 투자자 본인에게 있습니다.</text>
  <text x="770" y="424" font-family="Arial,sans-serif" font-size="10" fill="#00e5a0" text-anchor="end" font-weight="600">INVESTUS · SUNRYU Partners CIO</text>
