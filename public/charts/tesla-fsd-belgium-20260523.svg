  <text x="440" y="148" font-family="Arial,sans-serif" font-size="10" fill="#e5e7eb">• 벨기에 통과 = EU 전역 기준 충족</text>
  <text x="440" y="168" font-family="Arial,sans-serif" font-size="11" fill="#6b7280">다음 순서</text>
