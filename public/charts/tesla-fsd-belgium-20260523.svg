  <text x="220" y="329" font-family="Arial,sans-serif" font-size="9" fill="#e5e7eb" text-anchor="middle">"FSD is not yet available but on its way"</text>
  <text x="220" y="342" font-family="Arial,sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">"depends on development and regulatory approval"</text>

  <text x="415" y="312" font-family="Arial,sans-serif" font-size="16" fill="#6b7280" text-anchor="middle">→</text>

  <rect x="430" y="292" width="320" height="46" rx="8" fill="#0a1a10" stroke="rgba(0,229,160,0.3)" stroke-width="1.5"/>
