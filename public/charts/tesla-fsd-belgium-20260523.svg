  <text x="590" y="329" font-family="Arial,sans-serif" font-size="9" fill="#e5e7eb" text-anchor="middle">벨기에 5,000km 완주 → 당국 승인</text>
  <text x="590" y="342" font-family="Arial,sans-serif" font-size="9" fill="#00e5a0" text-anchor="middle">유럽 80만 대 잠재 수익화 대상</text>

