  <line x1="30" y1="382" x2="770" y2="382" stroke="#1e2330" stroke-width="1"/>
  <text x="30" y="400" font-family="Arial,sans-serif" font-size="10" fill="#6b7280">투자 참고용. 투자 판단 및 결과에 대한 책임은 투자자 본인에게 있습니다.</text>
  <text x="770" y="400" font-family="Arial,sans-serif" font-size="10" fill="#00e5a0" text-anchor="end" font-weight="600">INVESTUS · SUNRYU Partners CIO</text>
