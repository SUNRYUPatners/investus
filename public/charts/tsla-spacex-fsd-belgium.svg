  <text x="490" y="356" font-family="Arial,sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">SpaceX 지분 6% 보유</text>

  <rect x="588" y="316" width="164" height="50" rx="8" fill="#071a0a" stroke="rgba(0,229,160,0.4)" stroke-width="1"/>
  <text x="670" y="338" font-family="Arial,sans-serif" font-size="18" fill="#00e5a0" text-anchor="middle" font-weight="700">AMZN</text>
