<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 490" width="800" height="490" style="background:#0d1117;font-family:'Apple SD Gothic Neo',sans-serif">
  <rect width="800" height="490" rx="12" fill="#0d1117"/>
  <text x="400" y="36" text-anchor="middle" fill="#00e5a0" font-size="13" font-weight="700">TSLA · Tesla 중국</text>
  <text x="400" y="62" text-anchor="middle" fill="#e6edf3" font-size="20" font-weight="700">CAAM Q2 — 中 시장 유일 성장 · 상하이 30,217대 +4%</text>
  <text x="400" y="84" text-anchor="middle" fill="#7d8590" font-size="13">SAIC와 함께 단 2개 브랜드만 YoY 플러스 · 글로벌 OEM 전체 하락</text>
  <line x1="40" y1="96" x2="760" y2="96" stroke="#21262d" stroke-width="1"/>

  <!-- CAAM Q2 headline -->
  <rect x="40" y="112" width="720" height="80" rx="8" fill="#0d1f14" stroke="#00e5a0" stroke-width="1.5"/>
  <text x="400" y="148" text-anchor="middle" fill="#00e5a0" font-size="36" font-weight="800">+4% YoY</text>
  <text x="400" y="174" text-anchor="middle" fill="#7d8590" font-size="12">2026년 5월 · 기가상하이 Model 3 30,217대 · 전년 동기 대비</text>

  <!-- Market comparison bars (relative) -->
  <!-- Tesla/SAIC: +4% (green), Others: -8% to -15% (red) -->
  <text x="400" y="220" text-anchor="middle" fill="#7d8590" font-size="11">Q2 2026 중국 주요 브랜드 YoY 증감</text>

  <!-- y=260 is the zero line -->
  <!-- Tesla: +4% → height 30 above line -->
  <text x="140" y="256" text-anchor="middle" fill="#00e5a0" font-size="11" font-weight="700">Tesla</text>
  <rect x="100" y="228" width="80" height="28" rx="3" fill="#00e5a0" opacity="0.8"/>
  <text x="140" y="244" text-anchor="middle" fill="#0d1117" font-size="11" font-weight="700">+4%</text>

  <text x="260" y="256" text-anchor="middle" fill="#e6edf3" font-size="11">SAIC</text>
  <rect x="220" y="234" width="80" height="22" rx="3" fill="#4ade80" opacity="0.6"/>
  <text x="260" y="250" text-anchor="middle" fill="#0d1117" font-size="10">+2%</text>

  <!-- OEM others: decline -->
  <text x="380" y="256" text-anchor="middle" fill="#7d8590" font-size="11">BYD</text>
  <line x1="340" y1="256" x2="420" y2="256" stroke="#21262d" stroke-width="1"/>
  <rect x="340" y="256" width="80" height="40" rx="3" fill="#f87171" opacity="0.5"/>
  <text x="380" y="283" text-anchor="middle" fill="#f87171" font-size="11">-7%</text>

  <text x="500" y="256" text-anchor="middle" fill="#7d8590" font-size="11">GM</text>
  <rect x="460" y="256" width="80" height="52" rx="3" fill="#f87171" opacity="0.4"/>
  <text x="500" y="296" text-anchor="middle" fill="#f87171" font-size="11">-10%</text>

  <text x="620" y="256" text-anchor="middle" fill="#7d8590" font-size="11">Toyota</text>
  <rect x="580" y="256" width="80" height="60" rx="3" fill="#f87171" opacity="0.3"/>
  <text x="620" y="306" text-anchor="middle" fill="#f87171" font-size="11">-12%</text>

  <!-- Zero line -->
  <line x1="80" y1="256" x2="720" y2="256" stroke="#444c56" stroke-width="1.5"/>

  <!-- Why Tesla won -->
  <rect x="40" y="330" width="720" height="100" rx="8" fill="#161b22"/>
  <rect x="40" y="330" width="720" height="4" rx="2" fill="#00e5a0"/>
  <text x="400" y="356" text-anchor="middle" fill="#00e5a0" font-size="13" font-weight="600">Tesla 성장 배경</text>
  <text x="60" y="380" fill="#e6edf3" font-size="12">CAAM 분류: 세단 카테고리 — Model 3가 상하이 생산 주도</text>
  <text x="60" y="400" fill="#e6edf3" font-size="12">5월 30,217대 Model 3 · YoY +4% · 유럽 수출 포함 볼륨</text>
  <text x="60" y="418" fill="#7d8590" font-size="11">글로벌 EV 선두 브랜드 지위 유지 · BYD 경쟁 속 점유율 방어</text>

  <line x1="40" y1="442" x2="760" y2="442" stroke="#21262d" stroke-width="1"/>
  <text x="400" y="458" text-anchor="middle" fill="#444c56" font-size="10">출처: CAAM Q2 2026 데이터 · investus.kr</text>

  <rect x="40" y="466" width="720" height="0" rx="6" fill="#1c1026"/>
</svg>
