  <text x="300" y="24" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="800" fill="#f1f5f9">Fed Holds 12-0 Unanimous — Worst S&amp;P500 Fed Day Since 1994</text>
