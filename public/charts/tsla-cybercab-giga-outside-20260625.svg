  <text x="540" y="164" font-family="Arial,sans-serif" font-size="16" fill="#9ca3af" text-anchor="middle">기가텍사스 EOL 외부 포착 Cybercab 규모 — 역대 최다 집결</text>

  <!-- Three columns -->
  <rect x="24" y="194" width="322" height="216" rx="10" fill="#111318"/>
