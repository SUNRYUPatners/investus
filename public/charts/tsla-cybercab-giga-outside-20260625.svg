  <text x="884" y="285" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">목표 일정 추진 중</text>
  <text x="744" y="314" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">• 150대+ = 초기 상업 플릿 규모</text>
  <text x="744" y="334" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">• EOL 외부 이동 = 출고 준비 완료</text>
  <text x="744" y="354" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">• FSD V14 + 무인 모드 탑재 예상</text>
  <text x="744" y="374" font-family="Arial,sans-serif" font-size="12" fill="#00e5a0">• 연내 수천 대 추가 생산 계획</text>

  <rect x="24" y="426" width="1032" height="68" rx="10" fill="#0d1f14" stroke="#00e5a0" stroke-width="1"/>
  <text x="540" y="454" font-family="Arial,sans-serif" font-size="15" fill="#00e5a0" font-weight="700" text-anchor="middle">150대+ EOL 외부 첫 목격 = 사이버캡 대량 생산 가속 공식 확인</text>
  <text x="540" y="476" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">루트 60% 확장 + 고속도로 구간 진입 — Austin 상업 서비스 출시 초읽기</text>

  <text x="540" y="512" font-family="Arial,sans-serif" font-size="10" fill="#4b5563" text-anchor="middle">출처: 드론 촬영 목격 · 2026.06.25 · Investus</text>
