  <text x="56" y="284" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">• 위치: 기가텍사스 EOL 외부 구역</text>
  <text x="56" y="304" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">• 대수: 150대 이상 확인</text>
  <text x="56" y="324" font-family="Arial,sans-serif" font-size="12" fill="#00e5a0" font-weight="700">• EOL 외부 첫 공식 포착</text>
  <text x="56" y="350" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af">이전: 공장 내부·주차장만 목격</text>
  <text x="56" y="368" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af">이번: 최종 출고 외부 라인 진출</text>
  <text x="56" y="388" font-family="Arial,sans-serif" font-size="11" fill="#6b7280">양산 물량 축적 · 출고 임박 신호</text>

  <rect x="362" y="194" width="334" height="216" rx="10" fill="#111318"/>
