  <text x="1020" y="109" font-family="Arial, sans-serif" font-size="14" fill="#374151" text-anchor="end">2026.07.08</text>

  <text x="540" y="178" font-family="Arial Black, Arial" font-weight="900" font-size="22" fill="#ffffff" text-anchor="middle">Cybercab 30,000 Fleet Revenue Model</text>
  <text x="540" y="268" font-family="Arial Black, Arial" font-weight="900" font-size="80" fill="#00e5a0" text-anchor="middle">$4.4B</text>
