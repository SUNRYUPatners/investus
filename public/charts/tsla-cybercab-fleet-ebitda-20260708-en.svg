  <text x="862" y="768" font-family="Arial Black, Arial" font-weight="900" font-size="32" fill="#10b981" text-anchor="middle">$914M</text>
  <text x="862" y="800" font-family="Arial, sans-serif" font-size="14" fill="#6ee7b7" text-anchor="middle">~21% margin</text>

