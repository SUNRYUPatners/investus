<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <!-- Header -->
  <rect width="1080" height="80" fill="#111318"/>
  <text x="540" y="30" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">NHTSA · TSLA FSD / Robotaxi</text>
  <text x="540" y="62" font-family="Arial,sans-serif" font-size="26" font-weight="bold" fill="#e5e7eb" text-anchor="middle">NHTSA Removes Brake Pedal Requirement for AVs</text>
  <!-- Accent line -->
  <rect y="80" width="1080" height="3" fill="#ef4444"/>
  <!-- Big headline -->
  <text x="540" y="160" font-family="Arial,sans-serif" font-size="38" font-weight="bold" fill="#4ade80" text-anchor="middle">Brake Pedal Mandate ABOLISHED</text>
  <!-- Before / After visual -->
  <line x1="540" y1="190" x2="540" y2="620" stroke="#333" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="270" y="215" font-family="Arial,sans-serif" font-size="20" fill="#f87171" font-weight="bold" text-anchor="middle">BEFORE (Old Rules)</text>
  <text x="810" y="215" font-family="Arial,sans-serif" font-size="20" fill="#4ade80" font-weight="bold" text-anchor="middle">AFTER (New Rules)</text>
  <!-- BEFORE: Car with brake pedal required -->
  <g transform="translate(100, 240)">
    <rect x="20" y="60" width="250" height="100" rx="12" fill="#374151" stroke="#6b7280" stroke-width="2"/>
    <rect x="60" y="30" width="170" height="70" rx="8" fill="#4b5563" stroke="#6b7280" stroke-width="1.5"/>
    <circle cx="65" cy="165" r="28" fill="#1f2937" stroke="#6b7280" stroke-width="3"/>
    <circle cx="225" cy="165" r="28" fill="#1f2937" stroke="#6b7280" stroke-width="3"/>
    <circle cx="65" cy="165" r="12" fill="#374151"/>
    <circle cx="225" cy="165" r="12" fill="#374151"/>
    <rect x="20" y="75" width="20" height="15" rx="3" fill="#fbbf24" opacity="0.6"/>
    <rect x="250" y="75" width="20" height="15" rx="3" fill="#f87171" opacity="0.6"/>
    <rect x="115" y="80" width="60" height="30" rx="4" fill="#6b7280"/>
    <rect x="130" y="65" width="30" height="25" rx="3" fill="#6b7280"/>
    <text x="145" y="82" font-family="Arial,sans-serif" font-size="11" fill="#e5e7eb" text-anchor="middle">BRAKE</text>
    <text x="145" y="102" font-family="Arial,sans-serif" font-size="10" fill="#e5e7eb" text-anchor="middle">PEDAL</text>
  </g>
  <text x="270" y="450" font-family="Arial,sans-serif" font-size="16" fill="#f87171" text-anchor="middle">Brake Pedal Required</text>
  <text x="270" y="475" font-family="Arial,sans-serif" font-size="14" fill="#9ca3af" text-anchor="middle">Driver Intervention Needed</text>
  <!-- Red X over BEFORE -->
  <line x1="140" y1="250" x2="400" y2="480" stroke="#f87171" stroke-width="6" opacity="0.7"/>
  <line x1="400" y1="250" x2="140" y2="480" stroke="#f87171" stroke-width="6" opacity="0.7"/>
  <!-- AFTER: AV no brake needed -->
  <g transform="translate(580, 240)">
    <rect x="20" y="60" width="250" height="100" rx="12" fill="#14532d" stroke="#4ade80" stroke-width="2"/>
    <rect x="60" y="30" width="170" height="70" rx="8" fill="#166534" stroke="#4ade80" stroke-width="1.5"/>
    <circle cx="65" cy="165" r="28" fill="#1f2937" stroke="#4ade80" stroke-width="3"/>
    <circle cx="225" cy="165" r="28" fill="#1f2937" stroke="#4ade80" stroke-width="3"/>
    <circle cx="65" cy="165" r="12" fill="#374151"/>
    <circle cx="225" cy="165" r="12" fill="#374151"/>
    <rect x="20" y="75" width="20" height="15" rx="3" fill="#4ade80" opacity="0.8"/>
    <rect x="250" y="75" width="20" height="15" rx="3" fill="#4ade80" opacity="0.8"/>
    <rect x="90" y="73" width="110" height="36" rx="6" fill="#4ade80"/>
    <text x="145" y="88" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#0d1117" text-anchor="middle">FULLY</text>
    <text x="145" y="102" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#0d1117" text-anchor="middle">AUTONOMOUS</text>
  </g>
  <text x="810" y="450" font-family="Arial,sans-serif" font-size="16" fill="#4ade80" text-anchor="middle">No Brake Pedal Required</text>
  <text x="810" y="475" font-family="Arial,sans-serif" font-size="14" fill="#9ca3af" text-anchor="middle">AV-Only Mode Approved</text>
  <!-- Green check over AFTER -->
  <circle cx="810" cy="360" r="50" fill="#4ade80" opacity="0.15" stroke="#4ade80" stroke-width="2"/>
  <text x="810" y="375" font-family="Arial,sans-serif" font-size="60" fill="#4ade80" text-anchor="middle">✓</text>
  <!-- Impact section -->
  <rect x="40" y="640" width="1002" height="60" rx="8" fill="#14532d" stroke="#4ade80" stroke-width="1.5"/>
  <text x="540" y="663" font-family="Arial,sans-serif" font-size="17" font-weight="bold" fill="#4ade80" text-anchor="middle">NHTSA Rule Change → Tesla FSD Robotaxi's Biggest Regulatory Barrier REMOVED</text>
  <text x="540" y="686" font-family="Arial,sans-serif" font-size="14" fill="#e5e7eb" text-anchor="middle">AV licensing process dramatically simplified — Robotaxi nationwide expansion accelerates</text>
  <!-- Stats row -->
  <rect x="40" y="725" width="305" height="110" rx="10" fill="#161b22" stroke="#4ade80" stroke-width="1.5"/>
  <text x="192" y="760" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">Regulatory Body</text>
  <text x="192" y="800" font-family="Arial,sans-serif" font-size="30" font-weight="bold" fill="#e5e7eb" text-anchor="middle">NHTSA</text>
  <text x="192" y="825" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">National Highway Traffic Safety</text>
  <rect x="388" y="725" width="305" height="110" rx="10" fill="#161b22" stroke="#ef4444" stroke-width="1.5"/>
  <text x="540" y="760" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">Primary Beneficiary</text>
  <text x="540" y="800" font-family="Arial,sans-serif" font-size="30" font-weight="bold" fill="#ef4444" text-anchor="middle">Tesla</text>
  <text x="540" y="825" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">FSD + Robotaxi</text>
  <rect x="736" y="725" width="305" height="110" rx="10" fill="#161b22" stroke="#4ade80" stroke-width="1.5"/>
  <text x="888" y="760" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">Regulatory Change</text>
  <text x="888" y="800" font-family="Arial,sans-serif" font-size="26" font-weight="bold" fill="#4ade80" text-anchor="middle">Barrier Removed</text>
  <text x="888" y="825" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">Brake Pedal Exemption</text>
  <!-- Impact list -->
  <rect x="40" y="860" width="1002" height="60" rx="8" fill="#161b22" stroke="#333" stroke-width="1"/>
  <text x="540" y="882" font-family="Arial,sans-serif" font-size="14" fill="#e5e7eb" text-anchor="middle">Key Winners: Tesla Cybercab · Nationwide Robotaxi · Full FSD Autonomy · First-Mover Advantage</text>
  <text x="540" y="906" font-family="Arial,sans-serif" font-size="13" fill="#4ade80" font-weight="bold" text-anchor="middle">Regulatory Risk Eliminated → TSLA Robotaxi Business Fully Accelerated</text>
  <!-- Footer -->
  <rect y="940" width="1080" height="80" fill="#111318"/>
  <rect y="940" width="1080" height="2" fill="#ef4444"/>
  <text x="540" y="982" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#e5e7eb" text-anchor="middle">NHTSA Brake Exemption — Tesla AV's Biggest Regulatory Hurdle Cleared</text>
  <text x="540" y="1006" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">INVESTUS · 2026.06.26 · For Reference Only</text>
  <rect y="1030" width="1080" height="50" fill="#0d1117"/>
  <text x="540" y="1062" font-family="Arial,sans-serif" font-size="13" fill="#4ade80" text-anchor="middle">TSLA FSD / Robotaxi Maximum Beneficiary — Regulatory Risk Eliminated</text>
</svg>