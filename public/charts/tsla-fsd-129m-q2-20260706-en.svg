  <text x="100" y="690" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#38bdf8">SPCX Target</text>
  <text x="310" y="690" font-family="Arial, sans-serif" font-size="14" fill="#7dd3fc">Raised $190 → $230 · +54% upside vs. current price</text>
  <text x="100" y="716" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#38bdf8">Risks</text>
  <text x="310" y="716" font-family="Arial, sans-serif" font-size="14" fill="#7dd3fc">Vehicle sales weakness · increased competition · FSD incident risk</text>
  <text x="100" y="742" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#38bdf8">Europe FSD</text>
  <text x="310" y="742" font-family="Arial, sans-serif" font-size="14" fill="#7dd3fc">$120M EU investment confirmed → European sub market opens</text>
  <text x="100" y="768" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#38bdf8">HW3 Rollout</text>
  <text x="310" y="768" font-family="Arial, sans-serif" font-size="14" fill="#7dd3fc">FSD v14 expanding to legacy hardware → larger TAM</text>
  <text x="100" y="852" font-family="Arial, sans-serif" font-size="11" fill="#1a4a6a">* Q2 earnings: vehicle sales + FSD revenue + energy business growth all converging</text>

  <rect x="60" y="912" width="960" height="40" rx="12" fill="#050f1a" stroke="#0ea5e9" stroke-width="1" stroke-opacity="0.25"/>
  <text x="540" y="937" font-family="Arial, sans-serif" font-size="15" fill="#38bdf8" text-anchor="middle">FSD 1.29M subs (+17% QoQ) · July 22 Q2 earnings "best in years" · SPCX target $230</text>

  <rect x="60" y="968" width="960" height="4" fill="url(#bGrad)" rx="2" opacity="0.5"/>
  <text x="540" y="1008" font-family="Arial, sans-serif" font-size="18" fill="#1a4a6a" text-anchor="middle">investus.kr  SRP Chief Investment Officer</text>
