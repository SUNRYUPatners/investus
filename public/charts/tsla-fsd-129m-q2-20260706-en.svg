  <text x="300" y="416" font-family="Arial, sans-serif" font-size="18" fill="#7dd3fc" text-anchor="middle">Active FSD Subscribers (Q1 2026)</text>
  <text x="300" y="442" font-family="Arial, sans-serif" font-size="14" fill="#4a8aaa" text-anchor="middle">Q4 2025: 1.10M → +17% QoQ</text>
  <text x="300" y="466" font-family="Arial, sans-serif" font-size="13" fill="#2a6a8a" text-anchor="middle">Annualized subscription revenue surging</text>
  <text x="300" y="500" font-family="Arial, sans-serif" font-size="12" fill="#1a4a6a" text-anchor="middle">490K+ FSD-enabled vehicles · data flywheel accelerating</text>

  <rect x="560" y="322" width="440" height="200" rx="16" fill="#050f1a" stroke="#0ea5e9" stroke-width="1.5" stroke-opacity="0.6"/>
