  <text x="780" y="404" font-family="Arial, sans-serif" font-size="18" fill="#7dd3fc" text-anchor="middle">Q2 2026 실적 발표일</text>
  <text x="780" y="432" font-family="Arial, sans-serif" font-size="14" fill="#4a8aaa" text-anchor="middle">예상 매출: $39,098M</text>
  <text x="780" y="456" font-family="Arial, sans-serif" font-size="14" fill="#4a8aaa" text-anchor="middle">예상 매출총이익: $8,578M+</text>
  <text x="780" y="500" font-family="Arial, sans-serif" font-size="13" fill="#2a6a8a" text-anchor="middle">"수년 만에 최고 어닝" 전망</text>

  <!-- Analysis table -->
  <rect x="80" y="544" width="920" height="340" rx="16" fill="#050f1a" stroke="#0ea5e9" stroke-width="1" stroke-opacity="0.4"/>
  <text x="540" y="578" font-family="Arial Black, Arial" font-weight="900" font-size="20" fill="#7dd3fc" text-anchor="middle">FSD 구독 성장 + Q2 어닝 투자 포인트</text>

  <text x="100" y="612" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#38bdf8">FSD 구독 성장</text>
  <text x="310" y="612" font-family="Arial, sans-serif" font-size="14" fill="#7dd3fc">1.10M → 1.29M (+17% QoQ) → 향후 Q별 가속 예상</text>
  <text x="100" y="638" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#38bdf8">구독 수익</text>
  <text x="310" y="638" font-family="Arial, sans-serif" font-size="14" fill="#7dd3fc">월 $99~199 × 1.29M = 연환산 $1.5B~3B 수준</text>
  <text x="100" y="664" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#38bdf8">로보택시 시너지</text>
  <text x="310" y="664" font-family="Arial, sans-serif" font-size="14" fill="#7dd3fc">구독자 = 로보택시 운행 데이터 · 인프라 기반</text>
  <text x="100" y="690" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#38bdf8">SPCX 목표가</text>
  <text x="310" y="690" font-family="Arial, sans-serif" font-size="14" fill="#7dd3fc">$190 → $230 상향 · 현재가 대비 +54% 업사이드</text>
  <text x="100" y="716" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#38bdf8">리스크</text>
  <text x="310" y="716" font-family="Arial, sans-serif" font-size="14" fill="#7dd3fc">차량 판매 부진 · 경쟁 심화 · FSD 사고 리스크</text>
  <text x="100" y="742" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#38bdf8">유럽 FSD</text>
  <text x="310" y="742" font-family="Arial, sans-serif" font-size="14" fill="#7dd3fc">1.2억 달러 EU 투자 확정 → 유럽 구독 시장 열림</text>
  <text x="100" y="768" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#38bdf8">HW3 배포</text>
  <text x="310" y="768" font-family="Arial, sans-serif" font-size="14" fill="#7dd3fc">FSD v14 구형 하드웨어 확장 → TAM(총 구독 가능 차량) 확대</text>
  <text x="100" y="852" font-family="Arial, sans-serif" font-size="11" fill="#1a4a6a">* Q2 어닝: 판매량 + FSD 수익 + 에너지 사업 동반 성장 기대</text>

  <rect x="60" y="912" width="960" height="40" rx="12" fill="#050f1a" stroke="#0ea5e9" stroke-width="1" stroke-opacity="0.25"/>
  <text x="540" y="937" font-family="Arial, sans-serif" font-size="15" fill="#38bdf8" text-anchor="middle">FSD 1.29M 구독 (+17% QoQ) · 7/22 Q2 어닝 "수년 최고" 기대 · SPCX 목표 $230</text>

  <rect x="60" y="968" width="960" height="4" fill="url(#bGrad)" rx="2" opacity="0.5"/>
  <text x="540" y="1008" font-family="Arial, sans-serif" font-size="18" fill="#1a4a6a" text-anchor="middle">investus.kr  SRP Chief Investment Officer</text>
