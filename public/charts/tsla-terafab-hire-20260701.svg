  <text x="860" y="908" font-family="Arial Black, sans-serif" font-size="14" fill="#22c55e" text-anchor="middle" font-weight="900">D1 · FSD · Dojo</text>
  <text x="860" y="928" font-family="Arial, sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">완전 자립 칩 생태계</text>
