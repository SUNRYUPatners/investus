  <text x="540" y="1068" font-family="Arial, sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">Intel 18A 전문가 Gary Jiang 영입 — Tesla 반도체 자립(Terafab) 본격화 · INVESTUS · 2026.07.01 · 투자 참고용</text>
