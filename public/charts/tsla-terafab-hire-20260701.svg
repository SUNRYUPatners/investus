  <polygon points="610,920 660,905 660,915 700,915 700,925 660,925 660,935" fill="#22c55e" opacity="0.7"/>

  <rect x="720" y="855" width="280" height="130" rx="10" fill="#1e3a5f" stroke="#22c55e" stroke-width="2" filter="url(#glow)"/>
