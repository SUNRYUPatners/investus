<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" style="background:#0a0c10;font-family:'Helvetica Neue',Arial,sans-serif">
  <rect width="800" height="440" fill="#0a0c10"/>
  <defs>
    <linearGradient id="pur6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c084fc"/><stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
  </defs>
  <rect x="30" y="24" width="10" height="36" rx="3" fill="url(#pur6)"/>
  <text x="50" y="42" fill="#c084fc" font-size="11" font-weight="700" letter-spacing="2">SPACEX = CLOUD COMPANY 시나리오</text>
  <text x="50" y="58" fill="white" font-size="19" font-weight="800">2026년 말 ARR $130B+ 달성 경로 분석</text>
  <text x="700" y="44" fill="#c084fc" font-size="11" font-weight="600" text-anchor="end">2026.06.07</text>
  <line x1="30" y1="76" x2="770" y2="76" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>

  <!-- ARR path chart -->
  <text x="30" y="106" fill="rgba(255,255,255,0.4)" font-size="11" font-weight="700" letter-spacing="1">연도별 수익 성장 경로 (Sawyer Merritt 분석)</text>

  <!-- bars -->
  <!-- 2020 -->
  <text x="80" y="310" fill="rgba(255,255,255,0.4)" font-size="11" text-anchor="middle">2020</text>
  <rect x="46" y="276" width="68" height="30" rx="4" fill="#c084fc" fill-opacity="0.3"/>
  <text x="80" y="270" fill="rgba(255,255,255,0.5)" font-size="10" text-anchor="middle">$0.5B</text>

  <!-- 2023 -->
  <text x="210" y="310" fill="rgba(255,255,255,0.4)" font-size="11" text-anchor="middle">2023</text>
  <rect x="176" y="230" width="68" height="76" rx="4" fill="#c084fc" fill-opacity="0.45"/>
  <text x="210" y="224" fill="rgba(255,255,255,0.6)" font-size="10" text-anchor="middle">$3B</text>

  <!-- 2025 -->
  <text x="340" y="310" fill="rgba(255,255,255,0.4)" font-size="11" text-anchor="middle">2025</text>
  <rect x="306" y="172" width="68" height="134" rx="4" fill="#c084fc" fill-opacity="0.6"/>
  <text x="340" y="166" fill="rgba(255,255,255,0.7)" font-size="11" text-anchor="middle">$8.18B EBITDA</text>

  <!-- 2026E -->
  <text x="480" y="310" fill="rgba(255,255,255,0.4)" font-size="11" text-anchor="middle">2026E</text>
  <rect x="446" y="118" width="68" height="188" rx="4" fill="#c084fc"/>
  <text x="480" y="112" fill="white" font-size="12" font-weight="700" text-anchor="middle">~$130B ARR</text>

  <!-- 2030E -->
  <text x="640" y="310" fill="rgba(255,255,255,0.4)" font-size="11" text-anchor="middle">2030E</text>
  <rect x="590" y="118" width="100" height="188" rx="4" fill="url(#pur6)"/>
  <text x="640" y="108" fill="white" font-size="13" font-weight="900" text-anchor="middle">$332B+</text>
  <text x="640" y="122" fill="rgba(255,255,255,0.7)" font-size="10" text-anchor="middle">Goldman 전망</text>

  <!-- baseline -->
  <line x1="30" y1="308" x2="770" y2="308" stroke="rgba(255,255,255,0.1)" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- key stats -->
  <rect x="30" y="330" width="220" height="62" rx="8" fill="rgba(255,255,255,0.04)"/>
  <text x="50" y="352" fill="rgba(255,255,255,0.5)" font-size="11">S&amp;C EBITDA 성장</text>
  <text x="50" y="378" fill="white" font-size="16" font-weight="800">$500M → $8.18B</text>
  <text x="50" y="394" fill="rgba(255,255,255,0.35)" font-size="10">2020 → 2025 (5년 16배)</text>

  <rect x="264" y="330" width="220" height="62" rx="8" fill="rgba(255,255,255,0.04)"/>
  <text x="284" y="352" fill="rgba(255,255,255,0.5)" font-size="11">Google 계약만으로</text>
  <text x="284" y="378" fill="white" font-size="16" font-weight="800">$11B ARR</text>
  <text x="284" y="394" fill="rgba(255,255,255,0.35)" font-size="10">$920M/월 × 12</text>

  <rect x="498" y="330" width="272" height="62" rx="8" fill="#c084fc" fill-opacity="0.07" stroke="#c084fc" stroke-opacity="0.15"/>
  <text x="518" y="352" fill="#c084fc" font-size="11" font-weight="700">SpaceX ARR 2026E</text>
  <text x="518" y="378" fill="white" font-size="16" font-weight="800">$130B+ 목표</text>
  <text x="518" y="394" fill="rgba(255,255,255,0.35)" font-size="10">구글+소프트뱅크+스타링크+발사 합산</text>

  <text x="400" y="430" fill="rgba(255,255,255,0.2)" font-size="10" text-anchor="middle">Investus · investus.kr</text>
