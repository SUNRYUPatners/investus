<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0a0f1e"/><stop offset="100%" stop-color="#1a0f08"/></linearGradient>
    <linearGradient id="go" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#c2410c"/><stop offset="100%" stop-color="#fb923c"/></linearGradient>
    <linearGradient id="gline" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#fb923c" stop-opacity="0.1"/><stop offset="100%" stop-color="#fb923c" stop-opacity="0.7"/></linearGradient>
  </defs>
  <rect width="800" height="430" fill="url(#bg)"/>
  <text x="400" y="32" text-anchor="middle" fill="#fb923c" font-size="11" font-family="Arial" font-weight="bold" letter-spacing="3">Warren Buffett × Apple $AAPL · 25년 레거시</text>
  <text x="400" y="57" text-anchor="middle" fill="#e2e8f0" font-size="20" font-family="Arial" font-weight="bold">$10,000 → $120,000 · 버핏의 최고 베팅</text>

  <!-- Timeline growth chart -->
  <!-- Grid lines -->
  <line x1="60" y1="340" x2="760" y2="340" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="60" y1="280" x2="760" y2="280" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="60" y1="220" x2="760" y2="220" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="60" y1="160" x2="760" y2="160" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="60" y1="100" x2="760" y2="100" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Y labels -->
  <text x="50" y="344" text-anchor="end" fill="#64748b" font-size="9" font-family="Arial">$0</text>
  <text x="50" y="284" text-anchor="end" fill="#64748b" font-size="9" font-family="Arial">$25K</text>
  <text x="50" y="224" text-anchor="end" fill="#64748b" font-size="9" font-family="Arial">$50K</text>
  <text x="50" y="164" text-anchor="end" fill="#64748b" font-size="9" font-family="Arial">$75K</text>
  <text x="50" y="104" text-anchor="end" fill="#64748b" font-size="9" font-family="Arial">$100K+</text>

  <!-- Area fill -->
  <polygon points="60,340 190,338 320,332 450,300 540,220 660,140 760,100 760,340" fill="url(#gline)"/>
  <!-- Line -->
  <polyline points="60,340 190,338 320,332 450,300 540,220 660,140 760,100" fill="none" stroke="#fb923c" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- X labels (years) -->
  <text x="60" y="358" text-anchor="middle" fill="#64748b" font-size="9" font-family="Arial">1999</text>
  <text x="190" y="358" text-anchor="middle" fill="#64748b" font-size="9" font-family="Arial">2010</text>
  <text x="320" y="358" text-anchor="middle" fill="#64748b" font-size="9" font-family="Arial">2016</text>
  <text x="450" y="358" text-anchor="middle" fill="#64748b" font-size="9" font-family="Arial">2020</text>
  <text x="540" y="358" text-anchor="middle" fill="#64748b" font-size="9" font-family="Arial">2022</text>
  <text x="660" y="358" text-anchor="middle" fill="#64748b" font-size="9" font-family="Arial">2024</text>
  <text x="760" y="358" text-anchor="middle" fill="#64748b" font-size="9" font-family="Arial">2026</text>

  <!-- Key dot: 2016 first buy -->
  <circle cx="320" cy="332" r="6" fill="#fb923c" stroke="#1a0f08" stroke-width="2"/>
  <line x1="320" y1="326" x2="320" y2="270" stroke="rgba(251,146,60,0.5)" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="255" y="252" width="130" height="30" rx="5" fill="rgba(251,146,60,0.12)" stroke="rgba(251,146,60,0.3)" stroke-width="1"/>
  <text x="320" y="265" text-anchor="middle" fill="#fb923c" font-size="10" font-family="Arial" font-weight="bold">버크셔 첫 매입</text>
  <text x="320" y="278" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="Arial">2016.05.16</text>

  <!-- Key dot: now -->
  <circle cx="760" cy="100" r="8" fill="#fb923c" stroke="#1a0f08" stroke-width="2"/>
  <text x="760" y="88" text-anchor="middle" fill="#fb923c" font-size="11" font-family="Arial" font-weight="bold">$120K</text>

  <!-- Right panel: 3 stats -->
  <rect x="540" y="378" width="230" height="38" rx="8" fill="rgba(251,146,60,0.08)" stroke="rgba(251,146,60,0.25)" stroke-width="1"/>
  <text x="655" y="393" text-anchor="middle" fill="#fb923c" font-size="10" font-family="Arial" font-weight="bold">원금 $10K → 현재 $120K</text>
  <text x="655" y="408" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Arial">버크셔 원금 $36B → $180B+ (최고점)</text>

  <!-- Bottom left label -->
  <rect x="60" y="378" width="460" height="38" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="290" y="393" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Arial" font-weight="bold">버핏의 선택 이유: 소비자 생태계 · 브랜드 프리미엄 · 자사주 매입</text>
  <text x="290" y="408" text-anchor="middle" fill="#64748b" font-size="10" font-family="Arial">Apple Intelligence AI 사이클 → 차기 성장 동력 시작 중</text>

  <text x="400" y="420" text-anchor="middle" fill="#334155" font-size="9" font-family="Arial">SUNRYU Partners CIO · 2026.05.18</text>
</svg>
