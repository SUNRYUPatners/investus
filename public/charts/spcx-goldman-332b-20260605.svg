<svg viewBox="0 0 480 440" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c0820"/>
      <stop offset="100%" stop-color="#070514"/>
    </linearGradient>
  </defs>
  <rect width="480" height="440" fill="url(#bg)"/>
  <rect x="0" y="0" width="480" height="50" fill="#11091e"/>
  <rect x="0" y="48" width="480" height="2" fill="#c084fc" opacity="0.7"/>
  <text x="24" y="20" font-size="9" fill="#c084fc" font-weight="700" letter-spacing="2">INVESTUS REPORT</text>
  <text x="24" y="38" font-size="15" fill="#ffffff" font-weight="700">🚀 SPCX — Goldman Sachs AI Revenue 전망</text>

  <!-- Main number -->
  <text x="240" y="135" text-anchor="middle" font-size="72" fill="#c084fc" font-weight="900" letter-spacing="-3">$332B</text>
  <text x="240" y="160" text-anchor="middle" font-size="14" fill="#9966e6" font-weight="600">Goldman Sachs SpaceX AI Revenue 2030E</text>

  <!-- Arrow/growth indicator -->
  <text x="240" y="195" text-anchor="middle" font-size="13" fill="#c084fc" opacity="0.8">$3.1B (2026) → $332B (2030E)  ×100 성장</text>

  <!-- Bar chart: growth visualization -->
  <text x="24" y="228" font-size="10" fill="#8060b0" font-weight="700">연도별 AI Revenue 전망</text>
  <!-- 2026: $3.1B -->
  <rect x="40" y="320" width="50" height="4" rx="2" fill="#c084fc" opacity="0.6"/>
  <text x="65" y="340" text-anchor="middle" font-size="9" fill="#c084fc">$3.1B</text>
  <text x="65" y="353" text-anchor="middle" font-size="8" fill="#7050a0">2026</text>
  <!-- 2027: ~$30B -->
  <rect x="120" y="296" width="50" height="28" rx="2" fill="#c084fc" opacity="0.65"/>
  <text x="145" y="291" text-anchor="middle" font-size="9" fill="#c084fc">~$30B</text>
  <text x="145" y="353" text-anchor="middle" font-size="8" fill="#7050a0">2027</text>
  <!-- 2028: ~$90B -->
  <rect x="200" y="252" width="50" height="72" rx="2" fill="#c084fc" opacity="0.7"/>
  <text x="225" y="247" text-anchor="middle" font-size="9" fill="#c084fc">~$90B</text>
  <text x="225" y="353" text-anchor="middle" font-size="8" fill="#7050a0">2028</text>
  <!-- 2029: ~$200B -->
  <rect x="280" y="208" width="50" height="116" rx="2" fill="#c084fc" opacity="0.8"/>
  <text x="305" y="203" text-anchor="middle" font-size="9" fill="#c084fc">~$200B</text>
  <text x="305" y="353" text-anchor="middle" font-size="8" fill="#7050a0">2029</text>
  <!-- 2030: $332B -->
  <rect x="360" y="240" width="50" height="84" rx="2" fill="#c084fc" opacity="0.9"/>
  <!-- extra growth highlight -->
  <rect x="360" y="164" width="50" height="76" rx="2" fill="#e0a0ff" opacity="0.9"/>
  <text x="385" y="159" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="800">$332B</text>
  <text x="385" y="353" text-anchor="middle" font-size="8" fill="#c084fc" font-weight="700">2030E</text>

  <!-- Baseline -->
  <rect x="24" y="324" width="432" height="1" fill="#c084fc" opacity="0.2"/>

  <!-- Key facts -->
  <rect x="24" y="362" width="432" height="64" rx="10" fill="#1a1030" stroke="#c084fc" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="36" y="380" font-size="9" fill="#c084fc" font-weight="700" letter-spacing="1">GOLDMAN SACHS 핵심 분석</text>
  <text x="36" y="396" font-size="10" fill="#c0a0e8">• SpaceX = 차세대 AI 인프라 플랫폼 — Starlink + SpaceXai 클라우드</text>
  <text x="36" y="410" font-size="10" fill="#c0a0e8">• AWS 성장 대비: 4년간 100배 → 스케일 완전히 다른 레벨</text>
  <text x="36" y="424" font-size="10" fill="#8060a0">• $332B 달성 시 SpaceX 단일 사업부 Apple 연매출(~$390B) 수준</text>
</svg>
