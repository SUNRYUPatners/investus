<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f14"/>
      <stop offset="100%" style="stop-color:#0d1a12"/>
    </linearGradient>
    <linearGradient id="mintGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d68f"/>
      <stop offset="100%" style="stop-color:#00b377"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2a1e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a1f14;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <line x1="0" y1="360" x2="1080" y2="360" stroke="#00d68f" stroke-width="0.3" stroke-opacity="0.08"/>
  <line x1="0" y1="720" x2="1080" y2="720" stroke="#00d68f" stroke-width="0.3" stroke-opacity="0.08"/>
  <line x1="360" y1="0" x2="360" y2="1080" stroke="#00d68f" stroke-width="0.3" stroke-opacity="0.08"/>
  <line x1="720" y1="0" x2="720" y2="1080" stroke="#00d68f" stroke-width="0.3" stroke-opacity="0.08"/>

  <!-- Glow circle behind car -->
  <ellipse cx="540" cy="490" rx="300" ry="180" fill="#00d68f" fill-opacity="0.04" filter="url(#softGlow)"/>

  <!-- Header bar -->
  <rect x="60" y="60" width="960" height="4" fill="url(#mintGrad)" rx="2"/>

  <!-- TSLA badge -->
  <rect x="60" y="90" width="100" height="36" rx="8" fill="#00d68f"/>
  <text x="110" y="114" font-family="Arial Black, Arial" font-weight="900" font-size="18" fill="#0a0f14" text-anchor="middle">TSLA</text>

  <!-- NEW badge -->
  <rect x="174" y="90" width="80" height="36" rx="8" fill="none" stroke="#00d68f" stroke-width="2"/>
  <text x="214" y="114" font-family="Arial, sans-serif" font-weight="700" font-size="16" fill="#00d68f" text-anchor="middle">NEW</text>

  <!-- Date -->
  <text x="1020" y="114" font-family="Arial, sans-serif" font-size="16" fill="#4a6f5a" text-anchor="end">2026.07.03</text>

  <!-- Main title -->
  <text x="540" y="195" font-family="Arial Black, Arial" font-weight="900" font-size="52" fill="#ffffff" text-anchor="middle" filter="url(#glow)">Model Y</text>
  <text x="540" y="258" font-family="Arial Black, Arial" font-weight="900" font-size="58" fill="#00d68f" text-anchor="middle" filter="url(#glow)">8-Seat Launch</text>
  <text x="540" y="308" font-family="Arial, sans-serif" font-size="22" fill="#8ab89a" text-anchor="middle">FSD Supervised + Grok AI Built-In · Expanded Space</text>

  <!-- Car silhouette (stylized SUV side view) -->
  <g transform="translate(180, 340)">
    <!-- Body -->
    <path d="M60,130 L60,80 Q70,40 120,30 L420,30 Q480,28 520,60 L580,80 L600,130 Z" fill="#1a3a2a" stroke="#00d68f" stroke-width="2"/>
    <!-- Windows -->
    <path d="M130,75 L200,40 L380,40 L430,60 L430,75 Z" fill="#0a2a1a" stroke="#00d68f" stroke-width="1.5" stroke-opacity="0.6"/>
    <!-- Windshield -->
    <path d="M200,40 L160,75 L210,75 L250,40 Z" fill="#0d2a1a" stroke="#00d68f" stroke-width="1" stroke-opacity="0.4"/>
    <!-- Windows separation line -->
    <line x1="310" y1="40" x2="320" y2="75" stroke="#00d68f" stroke-width="1.5" stroke-opacity="0.5"/>
    <line x1="370" y1="40" x2="390" y2="75" stroke="#00d68f" stroke-width="1.5" stroke-opacity="0.5"/>
    <!-- Front detail -->
    <rect x="560" y="90" width="35" height="10" rx="3" fill="#00d68f" fill-opacity="0.6"/>
    <rect x="570" y="105" width="25" height="6" rx="2" fill="#00d68f" fill-opacity="0.4"/>
    <!-- Rear light -->
    <rect x="58" y="85" width="5" height="30" rx="2" fill="#00d68f" fill-opacity="0.7"/>
    <!-- Door line -->
    <line x1="200" y1="75" x2="200" y2="130" stroke="#00d68f" stroke-width="1" stroke-opacity="0.3"/>
    <line x1="320" y1="75" x2="340" y2="130" stroke="#00d68f" stroke-width="1" stroke-opacity="0.3"/>
    <line x1="440" y1="75" x2="460" y2="130" stroke="#00d68f" stroke-width="1" stroke-opacity="0.3"/>
    <!-- 3 row dots -->
    <circle cx="150" cy="55" r="3" fill="#00d68f" fill-opacity="0.8"/>
    <circle cx="250" cy="55" r="3" fill="#00d68f" fill-opacity="0.8"/>
    <circle cx="350" cy="55" r="3" fill="#00d68f" fill-opacity="0.8"/>
    <!-- Wheels -->
    <circle cx="160" cy="135" r="35" fill="#0d1a12" stroke="#00d68f" stroke-width="3"/>
    <circle cx="160" cy="135" r="20" fill="#0a1510" stroke="#00d68f" stroke-width="1.5"/>
    <circle cx="160" cy="135" r="6" fill="#00d68f"/>
    <circle cx="490" cy="135" r="35" fill="#0d1a12" stroke="#00d68f" stroke-width="3"/>
    <circle cx="490" cy="135" r="20" fill="#0a1510" stroke="#00d68f" stroke-width="1.5"/>
    <circle cx="490" cy="135" r="6" fill="#00d68f"/>
    <!-- Ground shadow -->
    <ellipse cx="325" cy="172" rx="280" ry="8" fill="#00d68f" fill-opacity="0.06"/>
  </g>

  <!-- 3-row seat indicator -->
  <g transform="translate(530, 410)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="13" fill="#4a6f5a" text-anchor="middle">● Row 1  ● ● Row 2  ● ● ● Row 3</text>
  </g>

  <!-- Stats cards -->
  <!-- Card 1: 8 Seats -->
  <rect x="60" y="590" width="220" height="160" rx="16" fill="url(#cardGrad)" stroke="#00d68f" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="170" y="645" font-family="Arial Black, Arial" font-weight="900" font-size="56" fill="#00d68f" text-anchor="middle" filter="url(#glow)">8</text>
  <text x="170" y="675" font-family="Arial, sans-serif" font-size="14" fill="#8ab89a" text-anchor="middle">Seats</text>
  <text x="170" y="710" font-family="Arial, sans-serif" font-size="12" fill="#4a6f5a" text-anchor="middle">1+2+3 row config</text>
  <text x="170" y="730" font-family="Arial, sans-serif" font-size="12" fill="#4a6f5a" text-anchor="middle">More headroom &amp; legroom</text>

  <!-- Card 2: 0-60 -->
  <rect x="300" y="590" width="220" height="160" rx="16" fill="url(#cardGrad)" stroke="#00d68f" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="410" y="645" font-family="Arial Black, Arial" font-weight="900" font-size="48" fill="#00d68f" text-anchor="middle" filter="url(#glow)">4.4s</text>
  <text x="410" y="675" font-family="Arial, sans-serif" font-size="14" fill="#8ab89a" text-anchor="middle">0 → 60 mph</text>
  <text x="410" y="710" font-family="Arial, sans-serif" font-size="12" fill="#4a6f5a" text-anchor="middle">Adaptive damping</text>
  <text x="410" y="730" font-family="Arial, sans-serif" font-size="12" fill="#4a6f5a" text-anchor="middle">Staggered tires</text>

  <!-- Card 3: Range -->
  <rect x="540" y="590" width="220" height="160" rx="16" fill="url(#cardGrad)" stroke="#00d68f" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="650" y="638" font-family="Arial Black, Arial" font-weight="900" font-size="40" fill="#00d68f" text-anchor="middle" filter="url(#glow)">325 mi</text>
  <text x="650" y="668" font-family="Arial Black, Arial" font-weight="700" font-size="22" fill="#5aaa7a" text-anchor="middle">527 km</text>
  <text x="650" y="698" font-family="Arial, sans-serif" font-size="14" fill="#8ab89a" text-anchor="middle">Range</text>
  <text x="650" y="718" font-family="Arial, sans-serif" font-size="12" fill="#4a6f5a" text-anchor="middle">Improved efficiency</text>
  <text x="650" y="738" font-family="Arial, sans-serif" font-size="12" fill="#4a6f5a" text-anchor="middle">Acoustic glass</text>

  <!-- Card 4: AI/FSD -->
  <rect x="780" y="590" width="240" height="160" rx="16" fill="url(#cardGrad)" stroke="#00d68f" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="900" y="635" font-family="Arial Black, Arial" font-weight="900" font-size="30" fill="#00d68f" text-anchor="middle" filter="url(#glow)">FSD</text>
  <text x="900" y="660" font-family="Arial, sans-serif" font-size="13" fill="#00d68f" text-anchor="middle">Supervised</text>
  <rect x="840" y="672" width="120" height="1" fill="#00d68f" fill-opacity="0.3"/>
  <text x="900" y="695" font-family="Arial Black, Arial" font-weight="900" font-size="22" fill="#5aaa7a" text-anchor="middle">Grok AI</text>
  <text x="900" y="718" font-family="Arial, sans-serif" font-size="12" fill="#4a6f5a" text-anchor="middle">Built-in vehicle</text>
  <text x="900" y="738" font-family="Arial, sans-serif" font-size="12" fill="#4a6f5a" text-anchor="middle">50kW wireless all rows</text>

  <!-- Feature row -->
  <rect x="60" y="775" width="960" height="80" rx="12" fill="#0f1e15" stroke="#00d68f" stroke-width="1" stroke-opacity="0.2"/>

  <!-- Feature items -->
  <text x="175" y="808" font-family="Arial, sans-serif" font-weight="700" font-size="15" fill="#00d68f" text-anchor="middle">🔊 15-Speaker</text>
  <text x="175" y="828" font-family="Arial, sans-serif" font-size="12" fill="#6a9a7a" text-anchor="middle">Tesla Audio</text>
  <text x="175" y="845" font-family="Arial, sans-serif" font-size="11" fill="#4a6f5a" text-anchor="middle">Row 1&amp;2 seatback</text>

  <line x1="290" y1="785" x2="290" y2="847" stroke="#00d68f" stroke-width="0.5" stroke-opacity="0.3"/>

  <text x="420" y="808" font-family="Arial, sans-serif" font-weight="700" font-size="15" fill="#00d68f" text-anchor="middle">🛡️ Safety</text>
  <text x="420" y="828" font-family="Arial, sans-serif" font-size="12" fill="#6a9a7a" text-anchor="middle">Side airbags row 2&amp;3</text>
  <text x="420" y="845" font-family="Arial, sans-serif" font-size="11" fill="#4a6f5a" text-anchor="middle">Optimized seatbelts</text>

  <line x1="535" y1="785" x2="535" y2="847" stroke="#00d68f" stroke-width="0.5" stroke-opacity="0.3"/>

  <text x="660" y="808" font-family="Arial, sans-serif" font-weight="700" font-size="15" fill="#00d68f" text-anchor="middle">🪟 Larger Windows</text>
  <text x="660" y="828" font-family="Arial, sans-serif" font-size="12" fill="#6a9a7a" text-anchor="middle">Better rear visibility</text>
  <text x="660" y="845" font-family="Arial, sans-serif" font-size="11" fill="#4a6f5a" text-anchor="middle">Bigger tailgate</text>

  <line x1="775" y1="785" x2="775" y2="847" stroke="#00d68f" stroke-width="0.5" stroke-opacity="0.3"/>

  <text x="905" y="808" font-family="Arial, sans-serif" font-weight="700" font-size="15" fill="#00d68f" text-anchor="middle">🧳 Trunk</text>
  <text x="905" y="828" font-family="Arial, sans-serif" font-size="12" fill="#6a9a7a" text-anchor="middle">Front &amp; rear storage</text>
  <text x="905" y="845" font-family="Arial, sans-serif" font-size="11" fill="#4a6f5a" text-anchor="middle">Even with 8 aboard</text>

  <!-- Bottom bar -->
  <rect x="60" y="1016" width="960" height="4" fill="url(#mintGrad)" rx="2" opacity="0.5"/>
  <text x="540" y="1055" font-family="Arial, sans-serif" font-size="18" fill="#3a6a4a" text-anchor="middle">investus.kr  SRP Chief Investment Officer</text>
</svg>
