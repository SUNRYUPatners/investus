  <text x="48" y="204" font-family="system-ui,sans-serif" font-size="9.5" fill="rgba(255,255,255,0.7)">연말 소비 촉진 + 기가 상하이 가동률 극대화 이중 효과</text>
  <text x="48" y="220" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.4)">BYD·NIO 가격 경쟁에 대응하는 Tesla 특유의 금융 전략</text>

