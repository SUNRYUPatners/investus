  <text x="32" y="96" font-family="system-ui,sans-serif" font-size="20" font-weight="800" fill="#60a5fa">+ FSD 중국 진출 — NIO 창업자 긍정 발언</text>
  <text x="32" y="118" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.45)">무이자·저금리 2026년 말까지 연장 · Li Bin "업계에 좋은 일"</text>

