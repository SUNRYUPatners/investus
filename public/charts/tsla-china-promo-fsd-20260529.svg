  <text x="428" y="300" font-family="system-ui,sans-serif" font-size="9.5" fill="rgba(255,255,255,0.7)">200만대+ 중국 출고 차량 FSD 업셀링 기반 잠재</text>
  <text x="428" y="316" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.4)">소프트웨어 마진율 ~80% — 하드웨어 판매와 질적으로 다름</text>

  <rect x="32" y="340" width="736" height="54" rx="8" fill="rgba(96,165,250,0.06)" stroke="rgba(96,165,250,0.15)" stroke-width="1"/>
  <text x="400" y="360" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle">KEY CATALYST</text>
  <text x="400" y="382" font-family="system-ui,sans-serif" font-size="13" font-weight="800" fill="#60a5fa" text-anchor="middle">중국 FSD 출시 공식화 시 → 소프트웨어 수익 원년 · 중국 판매량 재가속 복합 촉매</text>

  <line x1="32" y1="408" x2="768" y2="408" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="32" y="426" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.3)">2026.05.29 · 투자 권유 아님 · 참고용</text>
