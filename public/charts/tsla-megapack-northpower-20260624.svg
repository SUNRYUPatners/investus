<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 580" width="1080" height="580">
  <rect width="1080" height="580" fill="#0d1117"/>
  <rect x="0" y="0" width="1080" height="64" fill="#111318"/>
  <rect x="0" y="62" width="1080" height="2" fill="#00e5a0" opacity="0.7"/>
  <text x="28" y="26" font-family="Arial,sans-serif" font-size="13" fill="#00e5a0" font-weight="700">TSLA · Megapack + Tesla Home AI</text>
  <text x="28" y="50" font-family="Arial,sans-serif" font-size="14" fill="#e5e7eb" font-weight="700">NorthPower $3.5B 계약 25GWh — 이탈리아·영국 · 유럽 ESS 최대 단일 계약</text>

  <!-- Big numbers row -->
  <rect x="24" y="78" width="320" height="110" rx="10" fill="#0d1f14"/>
  <text x="184" y="112" font-family="Arial,sans-serif" font-size="13" fill="#00e5a0" text-anchor="middle">계약 규모</text>
  <text x="184" y="152" font-family="Arial,sans-serif" font-size="40" fill="#00e5a0" font-weight="700" text-anchor="middle">$3.5B</text>
  <text x="184" y="180" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">NorthPower와의 공급 계약</text>

  <rect x="360" y="78" width="320" height="110" rx="10" fill="#0d1f14"/>
  <text x="520" y="112" font-family="Arial,sans-serif" font-size="13" fill="#00e5a0" text-anchor="middle">저장 용량</text>
  <text x="520" y="152" font-family="Arial,sans-serif" font-size="40" fill="#00e5a0" font-weight="700" text-anchor="middle">25 GWh</text>
  <text x="520" y="180" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">배터리 에너지 저장 시스템</text>

  <rect x="696" y="78" width="360" height="110" rx="10" fill="#0d1f14"/>
  <text x="876" y="112" font-family="Arial,sans-serif" font-size="13" fill="#00e5a0" text-anchor="middle">배치 국가</text>
  <text x="876" y="145" font-family="Arial,sans-serif" font-size="26" fill="#00e5a0" font-weight="700" text-anchor="middle">🇮🇹 이탈리아</text>
  <text x="876" y="172" font-family="Arial,sans-serif" font-size="26" fill="#00e5a0" font-weight="700" text-anchor="middle">🇬🇧 영국</text>

  <!-- Deal details -->
  <rect x="24" y="204" width="630" height="240" rx="10" fill="#111318"/>
  <text x="339" y="232" font-family="Arial,sans-serif" font-size="15" fill="#e5e7eb" font-weight="700" text-anchor="middle">NorthPower 계약 상세</text>

  <rect x="40" y="246" width="598" height="56" rx="8" fill="#0d1f14"/>
  <text x="339" y="272" font-family="Arial,sans-serif" font-size="14" fill="#00e5a0" font-weight="700" text-anchor="middle">Tesla 공식 입장</text>
  <text x="339" y="292" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">"이탈리아와 유럽의 청정 에너지를 가능하게 하는 파트너십에 흥분됩니다"</text>

  <rect x="40" y="312" width="290" height="116" rx="8" fill="#161b22"/>
  <text x="185" y="336" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">주요 내용</text>
  <text x="56" y="360" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">• Tesla Megapack 제품군 공급</text>
  <text x="56" y="380" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">• 장기 공급 계약 (멀티 이어)</text>
  <text x="56" y="400" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">• 유럽 ESS 최대 단일 계약</text>
  <text x="56" y="420" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">• 재생에너지 그리드 안정화</text>

  <rect x="350" y="312" width="288" height="116" rx="8" fill="#161b22"/>
  <text x="494" y="336" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">NorthPower</text>
  <text x="366" y="360" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">• 유럽 최대 배터리 플릿 예정</text>
  <text x="366" y="380" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">• 이탈리아 + 영국 ESS 인프라</text>
  <text x="366" y="400" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">• Tesla 배포 가속·규모 확인</text>
  <text x="366" y="420" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">• 유럽 전력망 ESG 전환 촉진</text>

  <!-- Tesla Home AI -->
  <rect x="670" y="204" width="386" height="240" rx="10" fill="#111318"/>
  <text x="863" y="232" font-family="Arial,sans-serif" font-size="15" fill="#e5e7eb" font-weight="700" text-anchor="middle">Tesla Home AI</text>

  <rect x="686" y="246" width="354" height="60" rx="8" fill="#0d1f14"/>
  <text x="863" y="270" font-family="Arial,sans-serif" font-size="14" fill="#00e5a0" font-weight="700" text-anchor="middle">모든 Powerwall에 탑재</text>
  <text x="863" y="292" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">AI 기반 홈 에너지 관리 시스템 기본 제공</text>

  <rect x="686" y="316" width="354" height="116" rx="8" fill="#161b22"/>
  <text x="686" y="342" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af" font-weight="600">  주요 기능</text>
  <text x="702" y="364" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">• 실시간 에너지 흐름 모니터링</text>
  <text x="702" y="384" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">• 솔라 패널·배터리 자동 최적화</text>
  <text x="702" y="404" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">• 전기료 절감 AI 스케줄링</text>
  <text x="702" y="424" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">• Wall Connector 스마트 충전 통합</text>

  <!-- Bottom: financial impact -->
  <rect x="24" y="460" width="1032" height="92" rx="10" fill="#0d1f14" stroke="#00e5a0" stroke-width="1"/>
  <text x="540" y="488" font-family="Arial,sans-serif" font-size="15" fill="#00e5a0" font-weight="700" text-anchor="middle">에너지 사업부 재무 임팩트</text>
  <text x="180" y="516" font-family="Arial,sans-serif" font-size="13" fill="#e5e7eb" text-anchor="middle">에너지 세그먼트 Q2 성장</text>
  <text x="180" y="538" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">Megapack 백로그 소화 가속</text>
  <line x1="360" y1="468" x2="360" y2="544" stroke="#374151" stroke-width="1"/>
  <text x="540" y="516" font-family="Arial,sans-serif" font-size="13" fill="#e5e7eb" text-anchor="middle">라스롭 풀 캐파 가동 확인</text>
  <text x="540" y="538" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">Tesla Semi + Megapack 동시 생산</text>
  <line x1="720" y1="468" x2="720" y2="544" stroke="#374151" stroke-width="1"/>
  <text x="900" y="516" font-family="Arial,sans-serif" font-size="13" fill="#e5e7eb" text-anchor="middle">자동차 둔화 상쇄</text>
  <text x="900" y="538" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">에너지 고성장 → 수익 다변화</text>

  <text x="540" y="572" font-family="Arial,sans-serif" font-size="10" fill="#4b5563" text-anchor="middle">출처: Tesla 공식 발표 · Wall St Engine · 2026.06.24 · Investus</text>
</svg>
