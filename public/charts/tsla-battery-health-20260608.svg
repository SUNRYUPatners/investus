<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" style="background:#0a0c10;font-family:'Helvetica Neue',Arial,sans-serif">
  <rect width="800" height="440" fill="#0a0c10"/>
  <defs>
    <linearGradient id="mGr" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#059669"/><stop offset="100%" stop-color="#00e5a0"/>
    </linearGradient>
    <linearGradient id="barA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00e5a0"/><stop offset="100%" stop-color="#059669" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="barB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/><stop offset="100%" stop-color="#1d4ed8" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <rect x="30" y="24" width="10" height="40" rx="3" fill="url(#mGr)"/>
  <text x="50" y="40" fill="#00e5a0" font-size="11" font-weight="700" letter-spacing="2">TESLA · BATTERY HEALTH</text>
  <text x="50" y="60" fill="white" font-size="18" font-weight="800">실제 오너 배터리 건강도 데이터 — 40,000마일 주행 후</text>
  <text x="750" y="44" fill="#00e5a0" font-size="11" text-anchor="end">2026.06.08</text>
  <line x1="30" y1="80" x2="770" y2="80" stroke="#ffffff" stroke-opacity="0.06"/>

  <!-- Two big cards -->
  <rect x="30" y="92" width="360" height="200" rx="16" fill="#00e5a0" fill-opacity="0.07" stroke="#00e5a0" stroke-opacity="0.25"/>
  <text x="210" y="120" fill="#00e5a0" font-size="13" font-weight="800" text-anchor="middle">2024 Model 3 Performance</text>
  <text x="210" y="188" fill="white" font-size="76" font-weight="900" text-anchor="middle">96.9%</text>
  <text x="210" y="222" fill="rgba(255,255,255,0.5)" font-size="12" text-anchor="middle">배터리 건강도 · 측정일 Jun 7</text>
  <text x="210" y="244" fill="rgba(255,255,255,0.4)" font-size="11" text-anchor="middle">주행 거리: 40,000 마일 후</text>
  <text x="210" y="280" fill="#00e5a0" font-size="13" font-weight="800" text-anchor="middle">✓ Normal for a 2024 Model 3</text>

  <rect x="410" y="92" width="360" height="200" rx="16" fill="#60a5fa" fill-opacity="0.07" stroke="#60a5fa" stroke-opacity="0.25"/>
  <text x="590" y="120" fill="#60a5fa" font-size="13" font-weight="800" text-anchor="middle">2021 Model Y Performance</text>
  <text x="590" y="188" fill="white" font-size="76" font-weight="900" text-anchor="middle">89.5%</text>
  <text x="590" y="222" fill="rgba(255,255,255,0.5)" font-size="12" text-anchor="middle">배터리 건강도 · 측정일 May 13</text>
  <text x="590" y="244" fill="rgba(255,255,255,0.4)" font-size="11" text-anchor="middle">주행 거리: 40,000 마일 후</text>
  <text x="590" y="280" fill="#60a5fa" font-size="13" font-weight="800" text-anchor="middle">✓ Normal for a 2021 Model Y</text>

  <!-- Comparison bar chart -->
  <text x="30" y="320" fill="rgba(255,255,255,0.4)" font-size="11" font-weight="700" letter-spacing="1">배터리 용량 잔존율 비교</text>

  <!-- Bar 1 -->
  <rect x="60" y="330" width="300" height="28" rx="6" fill="rgba(255,255,255,0.05)"/>
  <rect x="60" y="330" width="291" height="28" rx="6" fill="url(#barA)"/>
  <text x="55" y="350" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">Model 3 '24</text>
  <text x="362" y="350" fill="white" font-size="12" font-weight="800">96.9%</text>

  <!-- Bar 2 -->
  <rect x="60" y="370" width="300" height="28" rx="6" fill="rgba(255,255,255,0.05)"/>
  <rect x="60" y="370" width="268" height="28" rx="6" fill="url(#barB)"/>
  <text x="55" y="390" fill="rgba(255,255,255,0.5)" font-size="11" text-anchor="end">Model Y '21</text>
  <text x="340" y="390" fill="white" font-size="12" font-weight="800">89.5%</text>

  <!-- Industry context -->
  <rect x="400" y="325" width="370" height="78" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.07)"/>
  <text x="420" y="347" fill="rgba(255,255,255,0.5)" font-size="11">타 EV 브랜드 동일 조건 평균</text>
  <text x="420" y="370" fill="rgba(255,255,255,0.7)" font-size="13" font-weight="700">80~85% (3년 차 기준)</text>
  <text x="420" y="394" fill="#00e5a0" font-size="12" font-weight="700">Tesla 배터리 우위: +5~15%p</text>

  <text x="400" y="430" fill="rgba(255,255,255,0.2)" font-size="10" text-anchor="middle">Nic Drake (X) · 실제 오너 데이터 · Investus · investus.kr</text>
</svg>
