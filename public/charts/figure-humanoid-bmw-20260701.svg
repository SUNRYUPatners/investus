  <text x="540" y="1030" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#f97316" text-anchor="middle">제조업 AI 자동화 이정표 · 인형 로봇이 실제 양산 공장에서 작업 중</text>
  <text x="540" y="1058" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">INVESTUS · 2026.07.01 · 투자 참고용</text>
