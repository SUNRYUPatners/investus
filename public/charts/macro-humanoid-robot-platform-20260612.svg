<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480">
  <rect width="480" height="480" fill="#0a0c10"/>
  <rect x="0" y="0" width="480" height="64" fill="#111318"/>
  <rect x="0" y="60" width="480" height="2" fill="#fb923c" opacity="0.3"/>
  <text x="24" y="26" font-family="Arial,sans-serif" font-size="11" fill="#fb923c" font-weight="bold">매크로 · AI · 로봇</text>
  <text x="24" y="46" font-family="Arial,sans-serif" font-size="13" fill="#e5e7eb" font-weight="bold">머스크 "범용 로봇이 다음 빅 플랫폼"</text>

  <!-- Quote -->
  <rect x="24" y="80" width="432" height="80" rx="12" fill="#1a1000" stroke="#fb923c" stroke-width="1" stroke-opacity="0.5"/>
  <text x="40" y="108" font-family="Arial,sans-serif" font-size="12" fill="#fb923c" font-style="italic">"범용 인간형 로봇은 수년 내 실용화된다.</text>
  <text x="40" y="128" font-family="Arial,sans-serif" font-size="12" fill="#fb923c" font-style="italic">이것이 스마트폰 이후 가장 큰 플랫폼이 될 것이다.</text>
  <text x="40" y="148" font-family="Arial,sans-serif" font-size="12" fill="#fb923c" font-style="italic">Optimus가 그 중심에 있다."</text>
  <text x="432" y="155" font-family="Arial,sans-serif" font-size="10" fill="#9ca3af" text-anchor="end">— Elon Musk</text>

  <!-- Platform comparison -->
  <text x="24" y="186" font-family="Arial,sans-serif" font-size="12" fill="#6b7280" font-weight="bold">■ 빅 플랫폼 역사</text>

  <rect x="24" y="198" width="432" height="28" rx="6" fill="#111318"/>
  <text x="40" y="217" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af">1990년대</text>
  <text x="140" y="217" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">인터넷 → 수억 명 연결</text>

  <rect x="24" y="232" width="432" height="28" rx="6" fill="#111318"/>
  <text x="40" y="251" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af">2007년</text>
  <text x="140" y="251" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">스마트폰 → 수십억 명 컴퓨팅</text>

  <rect x="24" y="266" width="432" height="28" rx="6" fill="#111318"/>
  <text x="40" y="285" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af">2022년+</text>
  <text x="140" y="285" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">AI → 수십억 명 자동화</text>

  <rect x="24" y="300" width="432" height="28" rx="6" fill="rgba(251,146,60,0.1)" stroke="#fb923c" stroke-width="1" stroke-opacity="0.4"/>
  <text x="40" y="319" font-family="Arial,sans-serif" font-size="12" fill="#fb923c" font-weight="bold">수년 내</text>
  <text x="140" y="319" font-family="Arial,sans-serif" font-size="12" fill="#fb923c" font-weight="bold">범용 로봇 → 물리 세계 자동화</text>

  <!-- Tesla Optimus -->
  <text x="24" y="350" font-family="Arial,sans-serif" font-size="12" fill="#6b7280" font-weight="bold">■ Tesla Optimus 현황</text>

  <rect x="24" y="362" width="136" height="60" rx="10" fill="#111318"/>
  <text x="92" y="384" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">내부 생산</text>
  <text x="92" y="406" font-family="Arial,sans-serif" font-size="16" fill="#00e5a0" text-anchor="middle" font-weight="bold">진행 중</text>
  <text x="92" y="420" font-family="Arial,sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Tesla 공장 내 작업</text>

  <rect x="172" y="362" width="136" height="60" rx="10" fill="#111318"/>
  <text x="240" y="384" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">외부 판매</text>
  <text x="240" y="406" font-family="Arial,sans-serif" font-size="16" fill="#00e5a0" text-anchor="middle" font-weight="bold">2026년+</text>
  <text x="240" y="420" font-family="Arial,sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">산업용 시작</text>

  <rect x="320" y="362" width="136" height="60" rx="10" fill="#111318"/>
  <text x="388" y="384" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">목표가</text>
  <text x="388" y="406" font-family="Arial,sans-serif" font-size="16" fill="#fb923c" text-anchor="middle" font-weight="bold">$20,000</text>
  <text x="388" y="420" font-family="Arial,sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">소비자 버전 목표</text>

  <text x="240" y="444" font-family="Arial,sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">범용 로봇 TAM: $10T+ 추정 — 자동차(~$3T) · 스마트폰($500B) 능가</text>
  <text x="240" y="458" font-family="Arial,sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">수혜: TSLA(Optimus) · NVDA(로봇 AI칩) · ISRG(정밀 액추에이터)</text>
  <text x="240" y="472" font-family="Arial,sans-serif" font-size="10" fill="#4b5563" text-anchor="middle">2026.06.12 · Investus · 투자 참고용</text>
</svg>
