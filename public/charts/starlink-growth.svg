<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" width="800" height="430">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0a0f1e"/><stop offset="100%" stop-color="#08121f"/></linearGradient>
    <linearGradient id="gp" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#a78bfa"/></linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#00e5a0"/></linearGradient>
  </defs>
  <rect width="800" height="430" fill="url(#bg)"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#a78bfa" font-size="11" font-family="Arial" font-weight="bold" letter-spacing="3">SpaceX Starlink · 2026.05.19</text>
  <text x="400" y="56" text-anchor="middle" fill="#e2e8f0" font-size="20" font-family="Arial" font-weight="bold">10M+ 구독자 · $11.4B · EBITDA 54%</text>

  <!-- 4 Key Stats -->
  <rect x="20" y="76" width="175" height="80" rx="8" fill="rgba(124,58,237,0.1)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
  <text x="107" y="106" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Arial">구독자 (2026.02)</text>
  <text x="107" y="135" text-anchor="middle" fill="#a78bfa" font-size="26" font-family="Arial" font-weight="bold">10M+</text>

  <rect x="208" y="76" width="175" height="80" rx="8" fill="rgba(0,229,160,0.08)" stroke="rgba(0,229,160,0.25)" stroke-width="1"/>
  <text x="295" y="106" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Arial">Starlink 매출 (2025)</text>
  <text x="295" y="135" text-anchor="middle" fill="#00e5a0" font-size="26" font-family="Arial" font-weight="bold">$11.4B</text>

  <rect x="396" y="76" width="175" height="80" rx="8" fill="rgba(0,229,160,0.08)" stroke="rgba(0,229,160,0.25)" stroke-width="1"/>
  <text x="483" y="106" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Arial">EBITDA 마진</text>
  <text x="483" y="135" text-anchor="middle" fill="#00e5a0" font-size="26" font-family="Arial" font-weight="bold">54%</text>

  <rect x="584" y="76" width="196" height="80" rx="8" fill="rgba(124,58,237,0.1)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
  <text x="682" y="106" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Arial">IPO 목표 밸류</text>
  <text x="682" y="135" text-anchor="middle" fill="#a78bfa" font-size="22" font-family="Arial" font-weight="bold">$1.5~1.75T</text>

  <!-- Growth Chart -->
  <text x="30" y="182" fill="#94a3b8" font-size="11" font-family="Arial" font-weight="bold">Starlink 구독자 성장 (단위: M명)</text>

  <!-- Chart area -->
  <rect x="20" y="192" width="500" height="195" rx="6" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Grid lines -->
  <line x1="20" y1="347" x2="520" y2="347" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="20" y1="314" x2="520" y2="314" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="20" y1="281" x2="520" y2="281" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="20" y1="248" x2="520" y2="248" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="20" y1="215" x2="520" y2="215" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Y labels -->
  <text x="14" y="351" text-anchor="end" fill="#475569" font-size="9" font-family="Arial">0</text>
  <text x="14" y="318" text-anchor="end" fill="#475569" font-size="9" font-family="Arial">10M</text>
  <text x="14" y="285" text-anchor="end" fill="#475569" font-size="9" font-family="Arial">20M</text>
  <text x="14" y="252" text-anchor="end" fill="#475569" font-size="9" font-family="Arial">30M</text>
  <text x="14" y="219" text-anchor="end" fill="#475569" font-size="9" font-family="Arial">40M</text>

  <!-- Data points: x positions for years 2020-2028 -->
  <!-- x: 35,90,145,200,255,310,370,430,490 -->
  <!-- y: 347 = 0, 215 = 40M → scale: 1M = 3.3px -->
  <!-- Values: 0.01, 0.2, 1, 2.2, 4.6, 9.2, 10→(18-25avg=21.5), 30, 40 -->
  <!-- y = 347 - val*3.3 -->
  <!-- 0.01→347, 0.2→346, 1→344, 2.2→340, 4.6→332, 9.2→317, 10→314, 21.5→276, 30→248, 40→215 -->

  <!-- Solid line (historical) -->
  <polyline points="35,347 90,346 145,344 200,340 255,332 310,317 370,314" fill="none" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Dashed line (projected) -->
  <polyline points="370,314 430,276 490,248 520,215" fill="none" stroke="#00e5a0" stroke-width="2" stroke-dasharray="6,4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Area fill -->
  <polygon points="35,347 90,346 145,344 200,340 255,332 310,317 370,314 370,347" fill="rgba(124,58,237,0.1)"/>

  <!-- Data labels -->
  <text x="35" y="360" text-anchor="middle" fill="#475569" font-size="8" font-family="Arial">2020</text>
  <text x="145" y="360" text-anchor="middle" fill="#475569" font-size="8" font-family="Arial">2022</text>
  <text x="255" y="360" text-anchor="middle" fill="#475569" font-size="8" font-family="Arial">2024</text>
  <text x="370" y="360" text-anchor="middle" fill="#a78bfa" font-size="8" font-family="Arial" font-weight="bold">2026</text>
  <text x="490" y="360" text-anchor="middle" fill="#00e5a0" font-size="8" font-family="Arial">2028E</text>

  <!-- Callout: 10M -->
  <circle cx="370" cy="314" r="5" fill="#a78bfa"/>
  <text x="376" y="308" fill="#a78bfa" font-size="9" font-family="Arial" font-weight="bold">10M ✓</text>

  <!-- Callout: 40M -->
  <circle cx="520" cy="215" r="4" fill="#00e5a0" stroke="none"/>
  <text x="508" y="210" fill="#00e5a0" font-size="9" font-family="Arial" font-weight="bold">~40M</text>

  <!-- Legend -->
  <line x1="30" y1="387" x2="55" y2="387" stroke="#a78bfa" stroke-width="2"/>
  <text x="60" y="391" fill="#94a3b8" font-size="10" font-family="Arial">실적</text>
  <line x1="100" y1="387" x2="125" y2="387" stroke="#00e5a0" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="130" y="391" fill="#94a3b8" font-size="10" font-family="Arial">전망</text>

  <!-- Right panel: Key facts -->
  <rect x="535" y="192" width="245" height="195" rx="6" fill="rgba(255,255,255,0.02)" stroke="rgba(124,58,237,0.2)" stroke-width="1"/>
  <text x="657" y="213" text-anchor="middle" fill="#a78bfa" font-size="11" font-family="Arial" font-weight="bold">핵심 팩트</text>
  <line x1="545" y1="220" x2="770" y2="220" stroke="rgba(124,58,237,0.2)" stroke-width="1"/>
  <text x="545" y="240" fill="#94a3b8" font-size="10" font-family="Arial">▸ SpaceX 발사 점유율 <tspan fill="#e2e8f0" font-weight="bold">86%</tspan> 독점</text>
  <text x="545" y="260" fill="#94a3b8" font-size="10" font-family="Arial">▸ SpaceX 전체 매출 <tspan fill="#e2e8f0" font-weight="bold">$15~16B</tspan></text>
  <text x="545" y="280" fill="#94a3b8" font-size="10" font-family="Arial">▸ Starlink = SpaceX 수익의 <tspan fill="#00e5a0" font-weight="bold">2/3</tspan></text>
  <text x="545" y="300" fill="#94a3b8" font-size="10" font-family="Arial">▸ 전 세계 미접속 인구 <tspan fill="#e2e8f0" font-weight="bold">22억 명</tspan></text>
  <text x="545" y="320" fill="#94a3b8" font-size="10" font-family="Arial">▸ 2026E SpaceX 매출 <tspan fill="#00e5a0" font-weight="bold">$22~30B</tspan></text>
  <text x="545" y="340" fill="#94a3b8" font-size="10" font-family="Arial">▸ $SPCE Nasdaq 상장 <tspan fill="#a78bfa" font-weight="bold">6월 12일</tspan></text>
  <text x="545" y="360" fill="#94a3b8" font-size="10" font-family="Arial">▸ BlackRock <tspan fill="#e2e8f0" font-weight="bold">$5~10B</tspan> 단독 매수 시도</text>
  <text x="545" y="375" fill="#00e5a0" font-size="10" font-family="Arial" font-weight="bold">→ 역대 최대 IPO · 2026 최대 이벤트</text>

  <text x="400" y="418" text-anchor="middle" fill="#334155" font-size="10" font-family="Arial">SUNRYU Partners CIO · 2026.05.19</text>
</svg>
