<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="'Segoe UI',Arial,sans-serif">
  <rect width="800" height="420" fill="#0a0f1e"/>
  <rect x="0" y="0" width="800" height="52" fill="#111827"/>
  <text x="30" y="32" font-size="15" font-weight="700" fill="#00e5a0">🚗 Tesla — Norway 베스트셀링 카 1위 · 27% 점유율</text>
  <text x="30" y="47" font-size="10" fill="#6b7280">EV 보급률 세계 최고 노르웨이에서 압도적 1위 · VW·BMW·현대·BYD 모두 제침</text>

  <!-- Left: Trophy + Rank -->
  <rect x="30" y="68" width="260" height="250" rx="10" fill="#111827"/>
  <text x="160" y="145" font-size="72" text-anchor="middle">🏆</text>
  <text x="160" y="185" font-size="40" font-weight="900" fill="#00e5a0" text-anchor="middle">#1</text>
  <text x="160" y="207" font-size="13" font-weight="700" fill="#e2e8f0" text-anchor="middle">BEST SELLING CAR</text>
  <text x="160" y="225" font-size="12" fill="#9ca3af" text-anchor="middle">Norway · June 2026</text>
  <text x="160" y="248" font-size="24" font-weight="800" fill="#00e5a0" text-anchor="middle">27%</text>
  <text x="160" y="267" font-size="10" fill="#9ca3af" text-anchor="middle">전체 자동차 판매 점유율</text>
  <text x="160" y="305" font-size="9" fill="#6b7280" text-anchor="middle">INSANE DEMAND</text>

  <!-- Right: Bar chart - market share -->
  <rect x="310" y="68" width="460" height="250" rx="10" fill="#111827"/>
  <text x="330" y="90" font-size="11" font-weight="700" fill="#00e5a0">노르웨이 자동차 시장 점유율</text>
  <text x="760" y="90" font-size="9" fill="#6b7280" text-anchor="end">2026.06</text>

  <!-- Bar chart - Tesla -->
  <text x="330" y="112" font-size="10" fill="#e2e8f0">Tesla</text>
  <rect x="390" y="100" width="270" height="18" rx="3" fill="#00e5a0"/>
  <text x="668" y="113" font-size="10" font-weight="800" fill="#00e5a0">27%</text>

  <!-- VW Group -->
  <text x="330" y="136" font-size="10" fill="#9ca3af">VW 그룹</text>
  <rect x="390" y="124" width="160" height="18" rx="3" fill="#374151"/>
  <text x="558" y="137" font-size="10" fill="#9ca3af">16%</text>

  <!-- Hyundai/Kia -->
  <text x="330" y="160" font-size="10" fill="#9ca3af">현대·기아</text>
  <rect x="390" y="148" width="130" height="18" rx="3" fill="#374151"/>
  <text x="528" y="161" font-size="10" fill="#9ca3af">13%</text>

  <!-- BMW Group -->
  <text x="330" y="184" font-size="10" fill="#9ca3af">BMW 그룹</text>
  <rect x="390" y="172" width="100" height="18" rx="3" fill="#374151"/>
  <text x="498" y="185" font-size="10" fill="#9ca3af">10%</text>

  <!-- BYD -->
  <text x="330" y="208" font-size="10" fill="#9ca3af">BYD</text>
  <rect x="390" y="196" width="60" height="18" rx="3" fill="#374151"/>
  <text x="458" y="209" font-size="10" fill="#9ca3af">6%</text>

  <!-- Others -->
  <text x="330" y="232" font-size="10" fill="#6b7280">기타</text>
  <rect x="390" y="220" width="280" height="18" rx="3" fill="#1f2937"/>
  <text x="678" y="233" font-size="10" fill="#6b7280">28%</text>

  <!-- EV adoption stat -->
  <rect x="330" y="252" width="420" height="50" rx="8" fill="#0d1f12"/>
  <text x="350" y="270" font-size="10" fill="#9ca3af">노르웨이 EV 보급률</text>
  <text x="530" y="270" font-size="22" font-weight="800" fill="#00e5a0">90%+</text>
  <text x="350" y="290" font-size="9" fill="#6b7280">전 세계 최고 EV 보급 시장 · VW·BMW·현대·BYD 모두 경쟁하는 최고 난이도 시장에서 1위</text>

  <!-- Bottom analysis -->
  <rect x="30" y="334" width="740" height="66" rx="10" fill="#0d1f12"/>
  <text x="50" y="354" font-size="11" font-weight="700" fill="#00e5a0">투자 시사점</text>
  <text x="50" y="372" font-size="10" fill="#9ca3af">노르웨이 = EV 최선진 시장 · 충전 인프라 완비 · 소비자가 EV 성능 차이를 가장 잘 아는 곳. 이 시장에서 27% 점유 1위는 순수 제품력·브랜드 경쟁력 증명.</text>
  <text x="50" y="390" font-size="10" fill="#9ca3af">AI 논란에도 유럽 수요 건재 확인 → Q2 유럽 판매 역대급 가능성. 프랑스 +655%에 노르웨이 1위까지 더해지면 Q2 글로벌 실적 상향 여지.</text>
  <text x="710" y="390" font-size="9" fill="#6b7280">investus.kr</text>
</svg>
