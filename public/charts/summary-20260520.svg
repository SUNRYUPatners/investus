  <rect x="20" y="80" width="370" height="145" rx="10" fill="rgba(59,130,246,0.08)" stroke="rgba(96,165,250,0.3)" stroke-width="1"/>
  <rect x="20" y="80" width="4" height="145" rx="2" fill="url(#gb)"/>
  <circle cx="56" cy="112" r="18" fill="rgba(59,130,246,0.2)" stroke="rgba(96,165,250,0.4)" stroke-width="1"/>
  <text x="56" y="118" text-anchor="middle" fill="#60a5fa" font-size="16" font-family="Arial">🟢</text>
  <text x="84" y="105" fill="#60a5fa" font-size="10" font-family="Arial" font-weight="bold" letter-spacing="1">NVIDIA Q4 2025</text>
  <text x="84" y="122" fill="#e2e8f0" font-size="13" font-family="Arial" font-weight="bold">+74% 연수익 · 마진 70% · FCF 43%</text>
  <rect x="36" y="140" width="340" height="28" rx="6" fill="rgba(59,130,246,0.12)"/>
