  <text x="116" y="158" fill="#e2e8f0" font-size="11" font-family="Arial">$179 (현재가 대비 +20% 고평가 주의)</text>
  <text x="36" y="183" fill="#94a3b8" font-size="10" font-family="Arial">▸ 데이터센터 89% · 게이밍 +47% · 전문시각화 +159%</text>
  <text x="36" y="200" fill="#00e5a0" font-size="10" font-family="Arial" font-weight="bold">→ AI 인프라 독점 지위 유지 · 블랙웰 수요 폭증 지속</text>

  <!-- Card 2: Tesla Revenue + Solar -->
  <rect x="410" y="80" width="370" height="145" rx="10" fill="rgba(0,229,160,0.06)" stroke="rgba(0,229,160,0.25)" stroke-width="1"/>
  <rect x="410" y="80" width="4" height="145" rx="2" fill="url(#gm)"/>
  <circle cx="446" cy="112" r="18" fill="rgba(0,229,160,0.15)" stroke="rgba(0,229,160,0.35)" stroke-width="1"/>
