  <!-- Background -->
  <rect width="800" height="580" fill="url(#bg20)"/>

  <!-- Header band -->
  <rect width="800" height="62" fill="rgba(0,229,160,0.07)" stroke="rgba(0,229,160,0.18)" stroke-width="0"/>
