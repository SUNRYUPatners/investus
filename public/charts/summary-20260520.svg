  <text x="446" y="482" fill="#00e5a0" font-size="11" font-family="Arial" font-weight="bold">교훈</text>
  <text x="490" y="482" fill="#e2e8f0" font-size="11" font-family="Arial">폭락 시 매도 = 손해 · 보유 = 복리 수익</text>
  <text x="426" y="507" fill="#94a3b8" font-size="10" font-family="Arial">▸ KOSPI 8,048 장중 고점 터치 · 개인 신용 최고치</text>
  <text x="426" y="524" fill="#00e5a0" font-size="10" font-family="Arial" font-weight="bold">→ 시장은 항상 회복한다 · 공포에 팔지 마라</text>

  <!-- Footer -->
  <rect x="0" y="556" width="800" height="24" fill="rgba(0,229,160,0.04)"/>
  <rect x="0" y="556" width="800" height="1" fill="rgba(0,229,160,0.15)"/>
  <text x="400" y="572" text-anchor="middle" fill="#475569" font-size="9" font-family="Arial" letter-spacing="2">Investus.kr · 본 자료는 투자 참고용이며 투자 결정의 책임은 본인에게 있습니다</text>
