  <!-- Card 6: Korea KOSPI crash recovery -->
  <rect x="410" y="404" width="370" height="145" rx="10" fill="rgba(0,229,160,0.06)" stroke="rgba(0,229,160,0.2)" stroke-width="1"/>
  <rect x="410" y="404" width="4" height="145" rx="2" fill="url(#gm)"/>
  <circle cx="446" cy="436" r="18" fill="rgba(0,229,160,0.15)" stroke="rgba(0,229,160,0.35)" stroke-width="1"/>
  <text x="446" y="442" text-anchor="middle" fill="#00e5a0" font-size="16" font-family="Arial">📈</text>
  <text x="474" y="429" fill="#00e5a0" font-size="10" font-family="Arial" font-weight="bold" letter-spacing="1">KOSPI 역사 · 폭락 후 회복</text>
  <text x="474" y="446" fill="#e2e8f0" font-size="13" font-family="Arial" font-weight="bold">$1M 보유 → $1.1M vs 매도 시 $600K</text>
