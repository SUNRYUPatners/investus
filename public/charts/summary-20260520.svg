  <rect x="20" y="404" width="370" height="145" rx="10" fill="rgba(249,115,22,0.07)" stroke="rgba(251,146,60,0.25)" stroke-width="1"/>
  <rect x="20" y="404" width="4" height="145" rx="2" fill="url(#go)"/>
