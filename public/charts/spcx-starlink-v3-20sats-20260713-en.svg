  <text x="780" y="632" font-family="Arial, sans-serif" font-size="14" fill="#e9d5ff" text-anchor="middle">Per-subscriber speed boost</text>
  <text x="780" y="648" font-family="Arial, sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">Competition gap widens</text>
