  <text x="300" y="610" font-family="Arial, sans-serif" font-size="14" fill="#e9d5ff" text-anchor="middle">Scan Starlink heat shield</text>
  <text x="300" y="632" font-family="Arial, sans-serif" font-size="14" fill="#e9d5ff" text-anchor="middle">White tiles = simulate missing</text>
  <text x="300" y="648" font-family="Arial, sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">Starship re-entry validation</text>
  <rect x="560" y="544" width="440" height="110" rx="14" fill="#1a0e2e" stroke="#c084fc" stroke-width="1.5"/>
