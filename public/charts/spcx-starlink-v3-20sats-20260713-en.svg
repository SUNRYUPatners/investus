  <text x="540" y="354" font-family="Arial Black, Arial" font-weight="900" font-size="28" fill="#e9d5ff" text-anchor="middle">Network capacity vs V2 · 20 satellites</text>
  <text x="540" y="398" font-family="Arial, sans-serif" font-size="17" fill="#9ca3af" text-anchor="middle">Next-gen Starlink V3 — massive capacity expansion</text>
