  <text x="540" y="494" font-family="Arial, sans-serif" font-size="15" fill="#e9d5ff" text-anchor="middle">Up to 6x V2 capacity · high-speed laser interlinks · South Africa ground station test</text>
  <text x="540" y="518" font-family="Arial, sans-serif" font-size="14" fill="#9ca3af" text-anchor="middle">6 heat-shield camera sats onboard — re-entry imagery analysis</text>
