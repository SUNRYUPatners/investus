<svg width="800" height="430" viewBox="0 0 800 430" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="430" fill="#07091a"/>
  <rect x="0" y="0" width="800" height="3" fill="#fb923c"/>

  <text x="30" y="30" font-family="Arial,sans-serif" font-size="10" fill="#fb923c" font-weight="700" letter-spacing="2">INVESTUS · TSLA REPORT</text>
  <text x="30" y="58" font-family="Arial,sans-serif" font-size="18" fill="white" font-weight="700">Tesla 텍사스 공식 법인 등록 — 나스닥 최초 텍사스 상장 기업</text>
  <text x="770" y="58" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="end">2026.05.26</text>
  <line x1="30" y1="70" x2="770" y2="70" stroke="#1e2330" stroke-width="1"/>

  <!-- Texas Star visual -->
  <text x="90" y="175" font-family="Arial,sans-serif" font-size="80" text-anchor="middle">⭐</text>
  <text x="90" y="205" font-family="Arial,sans-serif" font-size="14" fill="#fb923c" font-weight="700" text-anchor="middle">TEXAS</text>

  <!-- Main content -->
  <rect x="170" y="88" width="600" height="130" rx="8" fill="#0d0b05" stroke="#fb923c" stroke-width="1.2" stroke-opacity="0.5"/>
  <text x="190" y="114" font-family="Arial,sans-serif" font-size="13" fill="#fb923c" font-weight="700">✅ 공식 텍사스 법인 등록 완료</text>
  <text x="190" y="138" font-family="Arial,sans-serif" font-size="22" fill="white" font-weight="700">Tesla, Inc. (Texas)</text>
  <text x="190" y="162" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af">구 본사: 캘리포니아 팰로앨토 → 신 본사: 텍사스 오스틴</text>
  <text x="190" y="180" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af">기가텍사스(사이버트럭·Model Y·Optimus 생산) 인근</text>
  <text x="190" y="198" font-family="Arial,sans-serif" font-size="11" fill="#fb923c" font-weight="700">NASDAQ 최초 텍사스 주식회사 공식 상장</text>
  <text x="190" y="210" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">SpaceX에 이어 머스크 기업 생태계 텍사스 집중 완성</text>

  <!-- Three impact cards -->
  <rect x="30" y="240" width="230" height="110" rx="8" fill="#060b18" stroke="#fb923c" stroke-width="1" stroke-opacity="0.4"/>
  <text x="50" y="264" font-family="Arial,sans-serif" font-size="10" fill="#fb923c" font-weight="700">세금 혜택</text>
  <text x="50" y="288" font-family="Arial,sans-serif" font-size="18" fill="white" font-weight="700">0%</text>
  <text x="50" y="308" font-family="Arial,sans-serif" font-size="10" fill="#9ca3af">텍사스 주소득세</text>
  <text x="50" y="324" font-family="Arial,sans-serif" font-size="10" fill="#9ca3af">캘리포니아 13.3% 대비</text>
  <text x="50" y="340" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">기업·개인 모두 절세 효과</text>

  <rect x="278" y="240" width="230" height="110" rx="8" fill="#060b18" stroke="#fb923c" stroke-width="1" stroke-opacity="0.4"/>
  <text x="298" y="264" font-family="Arial,sans-serif" font-size="10" fill="#fb923c" font-weight="700">인력 집중</text>
  <text x="298" y="288" font-family="Arial,sans-serif" font-size="18" fill="white" font-weight="700">오스틴</text>
  <text x="298" y="308" font-family="Arial,sans-serif" font-size="10" fill="#9ca3af">테슬라 본사 · 기가텍사스</text>
  <text x="298" y="324" font-family="Arial,sans-serif" font-size="10" fill="#9ca3af">SpaceX · xAI 동반 위치</text>
  <text x="298" y="340" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">머스크 생태계 단일 거점화</text>

  <rect x="526" y="240" width="244" height="110" rx="8" fill="#060b18" stroke="#fb923c" stroke-width="1" stroke-opacity="0.4"/>
  <text x="546" y="264" font-family="Arial,sans-serif" font-size="10" fill="#fb923c" font-weight="700">생산 확대</text>
  <text x="546" y="288" font-family="Arial,sans-serif" font-size="18" fill="white" font-weight="700">Model Y ↑</text>
  <text x="546" y="308" font-family="Arial,sans-serif" font-size="10" fill="#9ca3af">기가텍사스 최우선 생산</text>
  <text x="546" y="324" font-family="Arial,sans-serif" font-size="10" fill="#9ca3af">Cybercab 생산 예정 거점</text>
  <text x="546" y="340" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">CEO: '텍사스 생산 확정' 공식 확인</text>

  <!-- Quote -->
  <rect x="30" y="364" width="740" height="44" rx="6" fill="#0d0b05" stroke="#1e2330" stroke-width="1"/>
  <text x="50" y="384" font-family="Arial,sans-serif" font-size="11" fill="white" font-style="italic">"We can say it's going to be built in Texas. We've made firm plans on that."</text>
  <text x="50" y="400" font-family="Arial,sans-serif" font-size="10" fill="#6b7280">— Tesla CEO Ryan (Lars/Franz 인터뷰, 2026.05.26)</text>

  <!-- Footer -->
  <line x1="30" y1="418" x2="770" y2="418" stroke="#1e2330" stroke-width="1"/>
  <text x="30" y="427" font-family="Arial,sans-serif" font-size="8" fill="#374151">투자 참고용 · 투자 권유 아님</text>
  <text x="770" y="427" font-family="Arial,sans-serif" font-size="9" fill="#00e5a0" text-anchor="end" font-weight="700">SUNRYU Partners CIO</text>
</svg>
