<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 460" width="600" height="460">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#0a1018"/>
    </linearGradient>
  </defs>
  <rect width="600" height="460" fill="url(#bg1)" rx="16"/>

  <!-- Header -->
  <rect x="20" y="18" width="90" height="26" rx="6" fill="#c084fc" opacity="0.2"/>
  <text x="65" y="36" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#c084fc">SPCX</text>
  <text x="122" y="36" font-family="Arial,sans-serif" font-size="13" fill="#94a3b8">2026.06.17</text>

  <!-- Title -->
  <text x="300" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="700" fill="#f1f5f9">Ron Baron, Goldman 통해</text>
  <text x="300" y="102" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" font-weight="900" fill="#c084fc">SpaceX $1B 직접 매수</text>

  <rect x="40" y="118" width="520" height="1" fill="#2a1a40" opacity="0.8"/>

  <!-- Quote box -->
  <rect x="40" y="128" width="520" height="80" rx="12" fill="#c084fc" opacity="0.06"/>
  <rect x="40" y="128" width="520" height="80" rx="12" fill="none" stroke="#c084fc" stroke-width="1" opacity="0.3"/>
  <text x="60" y="152" font-family="Arial,sans-serif" font-size="12" fill="#c084fc" font-style="italic">"I think they're going to make hundreds of billions of dollars.</text>
  <text x="60" y="170" font-family="Arial,sans-serif" font-size="12" fill="#c084fc" font-style="italic"> You can't compare SpaceX to any other company in the world.</text>
  <text x="60" y="188" font-family="Arial,sans-serif" font-size="12" fill="#c084fc" font-style="italic"> He's trying to demystify it for anyone else." — Ron Baron</text>

  <!-- Key facts -->
  <rect x="40" y="224" width="4" height="16" rx="2" fill="#c084fc"/>
  <text x="52" y="236" font-family="Arial,sans-serif" font-size="12" fill="#e2e8f0">Goldman Sachs 통해 SpaceX 주식 $1,000,000,000 직접 매수</text>

  <rect x="40" y="248" width="4" height="16" rx="2" fill="#c084fc"/>
  <text x="52" y="260" font-family="Arial,sans-serif" font-size="12" fill="#e2e8f0">Ron Baron CNBC Squawk Box 출연 — SpaceX IPO '탈신비화' 강조</text>

  <rect x="40" y="272" width="4" height="16" rx="2" fill="#c084fc"/>
  <text x="52" y="284" font-family="Arial,sans-serif" font-size="12" fill="#e2e8f0">인증 투자자(accredited investor) 자격으로 일반인 접근 가능성 언급</text>

  <rect x="40" y="296" width="4" height="16" rx="2" fill="#c084fc"/>
  <text x="52" y="308" font-family="Arial,sans-serif" font-size="12" fill="#e2e8f0">$3.9T 규모 지수 자금 → SpaceX IPO 후 패시브 편입 예정</text>

  <!-- Big comparison -->
  <rect x="40" y="326" width="520" height="1" fill="#1e293b"/>
  <text x="40" y="350" font-family="Arial,sans-serif" font-size="12" fill="#64748b">SpaceX vs 세계 주요 지수 (2025 GDP 기준, Goldman Sachs)</text>

  <text x="40" y="376" font-family="Arial,sans-serif" font-size="12" fill="#94a3b8">S&amp;P 500 지수 규모</text>
  <rect x="200" y="364" width="340" height="18" rx="4" fill="#c084fc" opacity="0.65"/>
  <text x="544" y="377" text-anchor="end" font-family="Arial,sans-serif" font-size="12" fill="#c084fc" font-weight="700">$47T</text>

  <text x="40" y="406" font-family="Arial,sans-serif" font-size="12" fill="#94a3b8">SpaceX 기업가치</text>
  <rect x="200" y="394" width="110" height="18" rx="4" fill="#475569" opacity="0.5"/>
  <text x="544" y="407" text-anchor="end" font-family="Arial,sans-serif" font-size="12" fill="#94a3b8">$350B+</text>

  <text x="300" y="440" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#475569">Source: Ron Baron CNBC / Goldman Sachs 2026.06.17</text>
</svg>
