<svg viewBox="0 0 480 430" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#050810"/>
    </linearGradient>
  </defs>
  <rect width="480" height="430" fill="url(#bg)"/>
  <rect x="0" y="0" width="480" height="50" fill="#0d1220"/>
  <rect x="0" y="48" width="480" height="2" fill="#60a5fa" opacity="0.7"/>
  <text x="24" y="20" font-size="9" fill="#60a5fa" font-weight="700" letter-spacing="2">INVESTUS REPORT</text>
  <text x="24" y="38" font-size="15" fill="#ffffff" font-weight="700">🤖 Amazon — 터치 감각 AI 로봇 최초 공개</text>

  <!-- Robot visual center -->
  <rect x="16" y="62" width="448" height="110" rx="14" fill="#0d1830" stroke="#60a5fa" stroke-width="1" stroke-opacity="0.4"/>
  <rect x="16" y="62" width="448" height="4" rx="2" fill="#60a5fa" opacity="0.8"/>

  <!-- Robot icon large -->
  <text x="80" y="132" text-anchor="middle" font-size="60">🤖</text>

  <!-- Key claim -->
  <text x="116" y="90" font-size="14" fill="#ffffff" font-weight="800">"Amazon's First AI Robot That Can Feel"</text>
  <text x="116" y="110" font-size="11" fill="#4080c0">접촉력 없이 물체 감지 — 터치 센서 내장 AI 로봇</text>
  <text x="116" y="130" font-size="11" fill="#90b8e8">협소 공간(2 sq ft 보관함) 탐색 가능</text>
  <text x="116" y="148" font-size="10" fill="#506888">충돌·압력 없이 물체 집어올리기 · 실시간 피드백</text>
  <text x="116" y="163" font-size="9" fill="#304060">유럽·미국 물류센터 동시 배치 시작</text>

  <!-- 3 feature tiles -->
  <rect x="16" y="184" width="138" height="74" rx="10" fill="#0d1628" stroke="#60a5fa" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="85" y="208" text-anchor="middle" font-size="24">👁️</text>
  <text x="85" y="228" text-anchor="middle" font-size="10" fill="#60a5fa" font-weight="700">비접촉 감지</text>
  <text x="85" y="243" text-anchor="middle" font-size="9" fill="#4070a0">접촉 없이 물체 인식</text>

  <rect x="162" y="184" width="156" height="74" rx="10" fill="#0d1628" stroke="#60a5fa" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="240" y="208" text-anchor="middle" font-size="24">📦</text>
  <text x="240" y="228" text-anchor="middle" font-size="10" fill="#60a5fa" font-weight="700">협소 공간 작업</text>
  <text x="240" y="243" text-anchor="middle" font-size="9" fill="#4070a0">2 sq ft 공간 탐색</text>

  <rect x="326" y="184" width="138" height="74" rx="10" fill="#0d1628" stroke="#60a5fa" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="395" y="208" text-anchor="middle" font-size="24">🌍</text>
  <text x="395" y="228" text-anchor="middle" font-size="10" fill="#60a5fa" font-weight="700">글로벌 배치</text>
  <text x="395" y="243" text-anchor="middle" font-size="9" fill="#4070a0">유럽·미국 동시</text>

  <!-- EV van bonus -->
  <rect x="16" y="270" width="448" height="72" rx="12" fill="#0a1020" stroke="#60a5fa" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="28" y="290" font-size="9" fill="#60a5fa" font-weight="700" letter-spacing="1">BONUS: 전기 배송 밴 90,000대 운영 중</text>
  <rect x="28" y="300" width="60" height="28" rx="6" fill="#1a2840"/>
  <text x="58" y="320" text-anchor="middle" font-size="18" font-weight="900" fill="#60a5fa">90K</text>
  <text x="100" y="316" font-size="11" fill="#a0c8f0">Amazon 전기 배송 밴 운영 대수 돌파</text>
  <text x="100" y="330" font-size="10" fill="#507090">Rivian 제조 · 배출 제로 물류 네트워크 구축 중</text>

  <!-- Summary -->
  <rect x="16" y="354" width="448" height="64" rx="10" fill="#080c18" stroke="#60a5fa" stroke-width="0.5" stroke-opacity="0.2"/>
  <text x="28" y="372" font-size="9" fill="#60a5fa" font-weight="700" letter-spacing="1">투자 포인트</text>
  <text x="28" y="388" font-size="10" fill="#90b8e0">• AI 로봇 = Amazon 물류 자동화 다음 단계 · 인건비 절감 + 처리 속도 향상</text>
  <text x="28" y="402" font-size="10" fill="#90b8e0">• 90K 전기 밴 + AI 로봇 = 배송 마지막 1마일 완전 자동화 청사진</text>
  <text x="28" y="416" font-size="10" fill="#608090">• Amazon = AWS AI + 물류 AI 이중 수혜 — 실물 AI 배치 속도 업계 최상위</text>
</svg>
