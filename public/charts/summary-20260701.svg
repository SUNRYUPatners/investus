  <text x="50" y="360" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">● 일본 납품 확대 / 말레이시아 15,000대</text>
  <text x="50" y="380" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">● 메가팩 LFP 전환 / Q2 컨센서스</text>
