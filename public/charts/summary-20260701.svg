  <text x="50" y="240" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">● FSD v46 업데이트 / HW3 제한 / 비감독 모드</text>
  <text x="50" y="260" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">● Cathie Wood 로보택시 전망</text>
