<svg width="800" height="430" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="430" fill="#07091a"/>
  <rect x="0" y="0" width="800" height="3" fill="#00e5a0"/>

  <text x="30" y="32" font-family="Arial,sans-serif" font-size="10" fill="#00e5a0" font-weight="700" letter-spacing="3">INVESTUS · Tesla · META</text>
  <text x="30" y="58" font-family="Arial,sans-serif" font-size="19" fill="white" font-weight="700">Tesla 중국 FSD 개명 · META $200M 메가팩 계약</text>
  <text x="770" y="58" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="end">2026.05.23</text>
  <line x1="30" y1="70" x2="770" y2="70" stroke="#1e2330" stroke-width="1"/>

  <!-- China FSD rename section (left) -->
  <rect x="30" y="82" width="360" height="260" rx="10" fill="#071208" stroke="rgba(0,229,160,0.3)" stroke-width="1.5"/>
  <rect x="30" y="82" width="5" height="260" rx="3" fill="#00e5a0"/>
  <text x="50" y="108" font-family="Arial,sans-serif" font-size="11" fill="#00e5a0" font-weight="700">🚗 Tesla 중국 FSD → 보조주행 개명</text>

  <rect x="50" y="120" width="320" height="50" rx="8" fill="#0a1a10" stroke="rgba(0,229,160,0.2)" stroke-width="1"/>
  <text x="210" y="143" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">변경 전</text>
  <text x="210" y="160" font-family="Arial,sans-serif" font-size="13" fill="#ef4444" font-weight="700" text-anchor="middle">FSD (Full Self-Driving)</text>

  <text x="210" y="185" font-family="Arial,sans-serif" font-size="18" fill="#6b7280" text-anchor="middle">↓</text>

  <rect x="50" y="192" width="320" height="58" rx="8" fill="#0a1a10" stroke="rgba(0,229,160,0.4)" stroke-width="1.5"/>
  <text x="210" y="213" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">변경 후</text>
  <text x="210" y="230" font-family="Arial,sans-serif" font-size="13" fill="#00e5a0" font-weight="700" text-anchor="middle">特斯拉辅助驾驶</text>
  <text x="210" y="244" font-family="Arial,sans-serif" font-size="10" fill="#00e5a0" text-anchor="middle">(Tesla Assisted Driving)</text>

  <text x="50" y="275" font-family="Arial,sans-serif" font-size="10" fill="#e5e7eb">• 가격: 64,000 RMB ($9,420) — 변동 없음</text>
  <text x="50" y="292" font-family="Arial,sans-serif" font-size="10" fill="#e5e7eb">• 이유: 중국 규제 — 완전자율주행 명칭 금지</text>
  <text x="50" y="309" font-family="Arial,sans-serif" font-size="10" fill="#e5e7eb">• 완전판: 추후 출시 예정 (개발·규제 승인 후)</text>
  <text x="50" y="326" font-family="Arial,sans-serif" font-size="10" fill="#00e5a0">• 미국·캐나다에 이어 세계 3번째 FSD 시장</text>

  <!-- META Megapack section (right) -->
  <rect x="410" y="82" width="360" height="260" rx="10" fill="#0a0d08" stroke="rgba(251,146,60,0.3)" stroke-width="1.5"/>
  <rect x="410" y="82" width="5" height="260" rx="3" fill="#fb923c"/>
  <text x="430" y="108" font-family="Arial,sans-serif" font-size="11" fill="#fb923c" font-weight="700">⚡ META $200M Tesla 메가팩 계약</text>

  <!-- Deal size -->
  <text x="590" y="158" font-family="Arial,sans-serif" font-size="48" fill="#fb923c" font-weight="700" text-anchor="middle">$200M</text>
  <text x="590" y="178" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">Tesla 메가팩 배터리 계약 규모</text>

  <line x1="430" y1="192" x2="755" y2="192" stroke="#1e2330" stroke-width="1"/>

  <text x="430" y="212" font-family="Arial,sans-serif" font-size="10" fill="#e5e7eb">📍 용도: 와이오밍 AI 데이터센터 전력 안정화</text>
  <text x="430" y="228" font-family="Arial,sans-serif" font-size="10" fill="#e5e7eb">☀ 태양광: 365MW</text>
  <text x="430" y="244" font-family="Arial,sans-serif" font-size="10" fill="#e5e7eb">🔋 배터리: 200MW / 1,600MWh</text>
  <text x="430" y="260" font-family="Arial,sans-serif" font-size="10" fill="#fb923c">📡 Enbridge 청정에너지 파트너십: 1.6GW</text>

  <rect x="430" y="274" width="320" height="50" rx="8" fill="#0d100a" stroke="rgba(251,146,60,0.2)" stroke-width="1"/>
  <text x="590" y="296" font-family="Arial,sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">수혜 구조</text>
  <text x="590" y="314" font-family="Arial,sans-serif" font-size="10" fill="#e5e7eb" text-anchor="middle">Tesla 에너지 매출↑ · AI DC 붐 = 메가팩 구조적 수요↑</text>

  <!-- Bottom bar -->
  <rect x="30" y="355" width="740" height="38" rx="8" fill="#0d1020" stroke="rgba(0,229,160,0.15)" stroke-width="1"/>
  <text x="50" y="373" font-family="Arial,sans-serif" font-size="10" fill="#00e5a0" font-weight="700">투자 시사점:</text>
  <text x="130" y="373" font-family="Arial,sans-serif" font-size="10" fill="#e5e7eb">TSLA — FSD 중국 소프트웨어 수익 확대 + 에너지 사업 하이퍼스케일러 확장 = 멀티 밸류에이션</text>
  <text x="50" y="387" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">META+Enbridge 계약 → Tesla Megapack이 AI 인프라 필수 인프라로 포지셔닝</text>

  <line x1="30" y1="404" x2="770" y2="404" stroke="#1e2330" stroke-width="1"/>
  <text x="30" y="420" font-family="Arial,sans-serif" font-size="10" fill="#6b7280">투자 참고용. 투자 판단 및 결과에 대한 책임은 투자자 본인에게 있습니다.</text>
  <text x="770" y="420" font-family="Arial,sans-serif" font-size="10" fill="#00e5a0" text-anchor="end" font-weight="600">INVESTUS · SUNRYU Partners CIO</text>
</svg>
