<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="'Segoe UI',Arial,sans-serif">
  <!-- Background -->
  <rect width="800" height="460" fill="#0a0f1e"/>

  <!-- Header accent bar -->
  <rect x="0" y="0" width="800" height="4" fill="#c084fc"/>

  <!-- Header -->
  <rect x="0" y="0" width="800" height="68" fill="#12172e"/>
  <text x="24" y="36" font-size="18" font-weight="700" fill="#c084fc">SpaceX AI 기가팩토리 — Bastrop, Texas</text>
  <text x="24" y="52" font-size="12" fill="#8892b0">2026.06.10 · SPCX</text>

  <!-- 3 Stat Cards (y:80-160) -->
  <!-- Card 1 -->
  <rect x="24" y="80" width="232" height="76" rx="10" fill="#1a1f35" stroke="#c084fc" stroke-width="1.5"/>
  <text x="140" y="112" font-size="28" font-weight="800" fill="#c084fc" text-anchor="middle">1,000+</text>
  <text x="140" y="132" font-size="12" fill="#8892b0" text-anchor="middle">에이커 부지</text>
  <text x="140" y="148" font-size="11" fill="#64748b" text-anchor="middle">acres of land</text>

  <!-- Card 2 -->
  <rect x="284" y="80" width="232" height="76" rx="10" fill="#1a1f35" stroke="#c084fc" stroke-width="1.5"/>
  <text x="400" y="112" font-size="24" font-weight="800" fill="#c084fc" text-anchor="middle">1,000만</text>
  <text x="400" y="132" font-size="12" fill="#8892b0" text-anchor="middle">sqft 제조 공간</text>
  <text x="400" y="148" font-size="11" fill="#64748b" text-anchor="middle">by end of 2027</text>

  <!-- Card 3 -->
  <rect x="544" y="80" width="232" height="76" rx="10" fill="#1a1f35" stroke="#c084fc" stroke-width="1.5"/>
  <text x="660" y="112" font-size="28" font-weight="800" fill="#c084fc" text-anchor="middle">2027</text>
  <text x="660" y="132" font-size="12" fill="#8892b0" text-anchor="middle">완공 목표</text>
  <text x="660" y="148" font-size="11" fill="#64748b" text-anchor="middle">completion target</text>

  <!-- Section label -->
  <text x="24" y="197" font-size="12" font-weight="600" fill="#8892b0">규모 비교 (sqft 기준)</text>

  <!-- Bar Chart (y:175-340) -->
  <!-- Max bar = 10M sqft = 520px wide -->
  <!-- Scale: 1M sqft = 52px -->

  <!-- SpaceX bar: 10M = 520px -->
  <text x="24" y="222" font-size="12" fill="#e2e8f0" text-anchor="start">SpaceX 기가팩토리</text>
  <rect x="220" y="208" width="520" height="24" rx="4" fill="#c084fc"/>
  <text x="748" y="224" font-size="12" font-weight="700" fill="#c084fc" text-anchor="start">10M</text>

  <!-- Pentagon: 5.3M = 275.6px -->
  <text x="24" y="262" font-size="12" fill="#e2e8f0" text-anchor="start">펜타곤</text>
  <rect x="220" y="248" width="276" height="24" rx="4" fill="#7c3aed"/>
  <text x="504" y="264" font-size="12" font-weight="700" fill="#7c3aed" text-anchor="start">5.3M</text>

  <!-- Amazon Robotics: 2M = 104px -->
  <text x="24" y="302" font-size="12" fill="#e2e8f0" text-anchor="start">아마존 로보틱스</text>
  <rect x="220" y="288" width="104" height="24" rx="4" fill="#9f67e4"/>
  <text x="332" y="304" font-size="12" font-weight="700" fill="#9f67e4" text-anchor="start">2M</text>

  <!-- Football fields note -->
  <text x="24" y="338" font-size="13" fill="#c084fc" font-weight="600">≈ 175개 축구장 규모 (10M sqft)</text>

  <!-- Context Banner (y:355-430) -->
  <rect x="24" y="355" width="752" height="68" rx="10" fill="#1a1f35" stroke="#7c3aed" stroke-width="1"/>
  <text x="400" y="380" font-size="13" font-weight="600" fill="#c084fc" text-anchor="middle">175개 축구장 규모  ·  태양광·풍력·수력 전력  ·  AI 컴퓨트 인프라</text>
  <text x="400" y="400" font-size="12" fill="#8892b0" text-anchor="middle">Solar · Wind · Water Infrastructure + AI Compute · Bastrop, Texas</text>
  <text x="400" y="418" font-size="11" fill="#64748b" text-anchor="middle">2027년 말 완공 목표 · 1,000+ 에이커 · 1,000만 sqft</text>

  <!-- Source -->
  <text x="400" y="450" font-size="11" fill="#4a5568" text-anchor="middle">investus.kr</text>
</svg>
