  <text x="96" y="733" font-family="Arial,sans-serif" font-size="14" fill="#e5e7eb">AI 규제 담당 위원 = 직접 입법 → Pelosi 포함 8인 MSFT 보유 → AI 규제 MSFT 친화적일 가능성 높음</text>
  <text x="70" y="757" font-family="Arial,sans-serif" font-size="15" fill="#60a5fa">●</text>
  <text x="96" y="757" font-family="Arial,sans-serif" font-size="14" fill="#e5e7eb">의회 스마트 머니 신호 = AI 탈규제 + MSFT 주가 상승 동시 베팅 — 참고 가치 높음</text>

