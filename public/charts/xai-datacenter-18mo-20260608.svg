<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" style="background:#0a0c10;font-family:'Helvetica Neue',Arial,sans-serif">
  <rect width="800" height="460" fill="#0a0c10"/>
  <defs>
    <linearGradient id="purGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#9333ea"/><stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c084fc"/><stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>

  <!-- Header accent -->
  <rect x="30" y="24" width="10" height="40" rx="3" fill="url(#purGrad)"/>
  <text x="50" y="40" fill="#c084fc" font-size="11" font-weight="700" letter-spacing="2">xAI · SPACEX</text>
  <text x="50" y="60" fill="white" font-size="19" font-weight="800">데이터센터 18개월 내 투자비 전액 회수</text>
  <text x="750" y="44" fill="#c084fc" font-size="11" font-weight="600" text-anchor="end">2026.06.08</text>
  <line x1="30" y1="80" x2="770" y2="80" stroke="#ffffff" stroke-opacity="0.06"/>

  <!-- Key metric cards -->
  <rect x="30" y="92" width="228" height="72" rx="10" fill="#c084fc" fill-opacity="0.08" stroke="#c084fc" stroke-opacity="0.25"/>
  <text x="50" y="116" fill="rgba(255,255,255,0.5)" font-size="11" font-weight="600">건설 비용</text>
  <text x="50" y="148" fill="white" font-size="30" font-weight="900">$40B</text>

  <rect x="286" y="92" width="228" height="72" rx="10" fill="#60a5fa" fill-opacity="0.08" stroke="#60a5fa" stroke-opacity="0.25"/>
  <text x="306" y="116" fill="rgba(255,255,255,0.5)" font-size="11" font-weight="600">Anthropic + Google 연간 ARR</text>
  <text x="306" y="148" fill="white" font-size="30" font-weight="900">$26B<tspan fill="rgba(255,255,255,0.45)" font-size="14">/yr</tspan></text>

  <rect x="542" y="92" width="228" height="72" rx="10" fill="#00e5a0" fill-opacity="0.08" stroke="#00e5a0" stroke-opacity="0.25"/>
  <text x="562" y="116" fill="rgba(255,255,255,0.5)" font-size="11" font-weight="600">투자비 회수 기간</text>
  <text x="562" y="148" fill="#00e5a0" font-size="30" font-weight="900">≈ 18개월</text>

  <!-- Chart area -->
  <text x="30" y="196" fill="rgba(255,255,255,0.4)" font-size="11" font-weight="700" letter-spacing="1">누적 임대 수익 vs 건설 비용 ($B)</text>

  <!-- Y-axis labels -->
  <text x="25" y="370" fill="rgba(255,255,255,0.3)" font-size="10" text-anchor="end">$0</text>
  <text x="25" y="325" fill="rgba(255,255,255,0.3)" font-size="10" text-anchor="end">$10B</text>
  <text x="25" y="280" fill="rgba(255,255,255,0.3)" font-size="10" text-anchor="end">$20B</text>
  <text x="25" y="235" fill="rgba(255,255,255,0.3)" font-size="10" text-anchor="end">$30B</text>
  <text x="25" y="218" fill="rgba(255,255,255,0.3)" font-size="10" text-anchor="end">$40B</text>

  <!-- Grid lines -->
  <line x1="35" y1="370" x2="760" y2="370" stroke="#ffffff" stroke-opacity="0.05"/>
  <line x1="35" y1="325" x2="760" y2="325" stroke="#ffffff" stroke-opacity="0.05"/>
  <line x1="35" y1="280" x2="760" y2="280" stroke="#ffffff" stroke-opacity="0.05"/>
  <line x1="35" y1="235" x2="760" y2="235" stroke="#ffffff" stroke-opacity="0.05"/>
  <line x1="35" y1="213" x2="760" y2="213" stroke="#ff4d6d" stroke-opacity="0.3" stroke-dasharray="6,4"/>

  <!-- $40B build cost flat line -->
  <line x1="35" y1="213" x2="760" y2="213" stroke="#fb923c" stroke-width="2" stroke-dasharray="8,5"/>
  <text x="765" y="217" fill="#fb923c" font-size="10" font-weight="700">$40B 건설비</text>

  <!-- Cumulative lease revenue line (0 to $55B over 24 months) -->
  <!-- At 18 months it hits ~$40B: start(35,370) → 18mo(548,213) → 24mo(760,160) -->
  <polyline points="35,370 92,357 150,343 207,328 265,313 322,298 380,283 437,268 495,253 548,213 606,196 663,181 720,166 760,155"
    fill="none" stroke="url(#lineGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Payback intersection marker -->
  <circle cx="548" cy="213" r="7" fill="#00e5a0" stroke="#0a0c10" stroke-width="2"/>
  <line x1="548" y1="213" x2="548" y2="370" stroke="#00e5a0" stroke-opacity="0.4" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Payback label -->
  <rect x="468" y="182" width="144" height="26" rx="6" fill="#00e5a0" fill-opacity="0.15" stroke="#00e5a0" stroke-opacity="0.4"/>
  <text x="540" y="199" fill="#00e5a0" font-size="12" font-weight="800" text-anchor="middle">Payback ≈ 18개월</text>

  <!-- X-axis labels (months) -->
  <text x="35" y="385" fill="rgba(255,255,255,0.3)" font-size="10" text-anchor="middle">0</text>
  <text x="150" y="385" fill="rgba(255,255,255,0.3)" font-size="10" text-anchor="middle">3개월</text>
  <text x="265" y="385" fill="rgba(255,255,255,0.3)" font-size="10" text-anchor="middle">6개월</text>
  <text x="380" y="385" fill="rgba(255,255,255,0.3)" font-size="10" text-anchor="middle">9개월</text>
  <text x="495" y="385" fill="rgba(255,255,255,0.3)" font-size="10" text-anchor="middle">12개월</text>
  <text x="548" y="385" fill="#00e5a0" font-size="10" font-weight="700" text-anchor="middle">18개월</text>
  <text x="760" y="385" fill="rgba(255,255,255,0.3)" font-size="10" text-anchor="middle">24개월</text>

  <!-- Legend -->
  <line x1="30" y1="408" x2="60" y2="408" stroke="url(#lineGrad)" stroke-width="3"/>
  <text x="66" y="412" fill="rgba(255,255,255,0.7)" font-size="11">누적 임대 수익 (Anthropic + Google)</text>
  <line x1="310" y1="408" x2="340" y2="408" stroke="#fb923c" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="346" y="412" fill="rgba(255,255,255,0.7)" font-size="11">총 건설 비용 ($40B)</text>

  <!-- Source -->
  <text x="400" y="450" fill="rgba(255,255,255,0.2)" font-size="10" text-anchor="middle">BoringBiz 분석 · Investus · investus.kr</text>
</svg>
