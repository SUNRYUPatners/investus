<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="800" height="440" style="background:#0d1117;font-family:'Apple SD Gothic Neo',sans-serif">
  <rect width="800" height="440" rx="12" fill="#0d1117"/>
  <text x="400" y="36" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="700">META · MSFT · 밸류에이션 분석</text>
  <text x="400" y="62" text-anchor="middle" fill="#e6edf3" font-size="20" font-weight="700">PVGO 분석 — META·MSFT가 S&amp;P500보다 저평가</text>
  <text x="400" y="84" text-anchor="middle" fill="#7d8590" font-size="13">현재 가치 비중이 높을수록 = 더 안정적·저평가 · PVGO 비중 낮을수록 '실질 가치주'</text>
  <line x1="40" y1="96" x2="760" y2="96" stroke="#21262d" stroke-width="1"/>

  <!-- 4 stacked bars side by side -->
  <!-- Each bar: height=220 total -->
  <!-- Bar labels: S&P 500, Amazon, MSFT, META -->
  <!-- Bar base y=320, top y=100 -->

  <!-- S&P 500: 45% SSV, 55% PVGO -->
  <!-- SSV height: 45% of 220 = 99, top of SSV = 320-99=221 -->
  <!-- PVGO height: 55% of 220 = 121, top of PVGO = 220-121=99 = top=99 -->
  <rect x="60" y="199" width="120" height="121" rx="0" fill="#60a5fa" opacity="0.4"/>
  <text x="120" y="260" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="700">45%</text>
  <text x="120" y="278" text-anchor="middle" fill="#e6edf3" font-size="11">현재가치</text>
  <rect x="60" y="100" width="120" height="99" rx="0" fill="#ff4d6d" opacity="0.5"/>
  <text x="120" y="146" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="700">55%</text>
  <text x="120" y="164" text-anchor="middle" fill="#e6edf3" font-size="11">성장가치</text>
  <rect x="60" y="100" width="120" height="220" fill="none" stroke="#21262d" stroke-width="1"/>
  <text x="120" y="340" text-anchor="middle" fill="#7d8590" font-size="12">S&amp;P 500</text>

  <!-- Amazon: 52.2% SSV, 47.8% PVGO -->
  <rect x="220" y="215" width="120" height="105" rx="0" fill="#fb923c" opacity="0.5"/>
  <text x="280" y="268" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="700">52.2%</text>
  <text x="280" y="286" text-anchor="middle" fill="#e6edf3" font-size="11">현재가치</text>
  <rect x="220" y="100" width="120" height="105" rx="0" fill="#ff4d6d" opacity="0.4"/>
  <text x="280" y="149" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="700">47.8%</text>
  <text x="280" y="167" text-anchor="middle" fill="#e6edf3" font-size="11">성장가치</text>
  <rect x="220" y="100" width="120" height="220" fill="none" stroke="#21262d" stroke-width="1"/>
  <text x="280" y="340" text-anchor="middle" fill="#fb923c" font-size="12">Amazon</text>

  <!-- MSFT: 64% SSV, 36% PVGO -->
  <rect x="380" y="180" width="120" height="140" rx="0" fill="#60a5fa" opacity="0.7"/>
  <text x="440" y="252" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="800">64%</text>
  <text x="440" y="272" text-anchor="middle" fill="#e6edf3" font-size="11">현재가치</text>
  <rect x="380" y="100" width="120" height="80" rx="0" fill="#ff4d6d" opacity="0.3"/>
  <text x="440" y="140" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="700">36%</text>
  <text x="440" y="158" text-anchor="middle" fill="#e6edf3" font-size="11">성장가치</text>
  <rect x="380" y="100" width="120" height="220" fill="none" stroke="#21262d" stroke-width="1"/>
  <text x="440" y="340" text-anchor="middle" fill="#60a5fa" font-size="12">MSFT</text>

  <!-- META: 64.7% SSV, 35.3% PVGO -->
  <rect x="540" y="178" width="120" height="142" rx="0" fill="#4ade80" opacity="0.7"/>
  <text x="600" y="250" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="800">64.7%</text>
  <text x="600" y="270" text-anchor="middle" fill="#e6edf3" font-size="11">현재가치</text>
  <rect x="540" y="100" width="120" height="78" rx="0" fill="#ff4d6d" opacity="0.3"/>
  <text x="600" y="137" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="700">35.3%</text>
  <text x="600" y="155" text-anchor="middle" fill="#e6edf3" font-size="11">성장가치</text>
  <rect x="540" y="100" width="120" height="220" fill="none" stroke="#21262d" stroke-width="1"/>
  <text x="600" y="340" text-anchor="middle" fill="#4ade80" font-size="12">META</text>

  <!-- Legend -->
  <rect x="700" y="130" width="14" height="14" fill="#60a5fa" opacity="0.7"/>
  <text x="718" y="142" fill="#7d8590" font-size="11">현재 가치 (SSV)</text>
  <rect x="700" y="154" width="14" height="14" fill="#ff4d6d" opacity="0.5"/>
  <text x="718" y="166" fill="#7d8590" font-size="11">성장 기회 (PVGO)</text>

  <line x1="60" y1="320" x2="700" y2="320" stroke="#21262d" stroke-width="1"/>

  <!-- Bottom insight -->
  <rect x="40" y="354" width="720" height="56" rx="8" fill="#0a1a0a"/>
  <text x="400" y="378" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="600">MSFT·META = 시장 대비 '실질 가치주' — 저평가 신호</text>
  <text x="400" y="396" text-anchor="middle" fill="#7d8590" font-size="12">현재 수익 기반(SSV 64%+)이 높을수록 = 시장이 성장 기회를 과소 반영 중</text>

  <line x1="40" y1="420" x2="760" y2="420" stroke="#21262d" stroke-width="1"/>
  <text x="400" y="434" text-anchor="middle" fill="#444c56" font-size="10">출처: @oguzerk / X PVGO Analysis · investus.kr</text>
</svg>
