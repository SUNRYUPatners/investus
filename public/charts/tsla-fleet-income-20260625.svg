<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 520" width="1080" height="520">
  <rect width="1080" height="520" fill="#0d1117"/>
  <rect x="0" y="0" width="1080" height="64" fill="#111318"/>
  <rect x="0" y="62" width="1080" height="2" fill="#00e5a0" opacity="0.7"/>
  <text x="28" y="26" font-family="Arial,sans-serif" font-size="13" fill="#00e5a0" font-weight="700">TSLA · 플릿 수익화 모델</text>
  <text x="28" y="50" font-family="Arial,sans-serif" font-size="14" fill="#e5e7eb" font-weight="700">Tesla app으로 차를 Fleet 등록 → FSD 구독 없이 수익 창출</text>

  <rect x="24" y="78" width="1032" height="100" rx="12" fill="#0d1f14" stroke="#00e5a0" stroke-width="1.5"/>
  <text x="540" y="118" font-family="Arial,sans-serif" font-size="26" fill="#00e5a0" font-weight="700" text-anchor="middle">Tesla Fleet Network</text>
  <text x="540" y="155" font-family="Arial,sans-serif" font-size="16" fill="#9ca3af" text-anchor="middle">차주가 앱으로 플릿 등록 → Cybercab 운행 시 수익 배분 · FSD 월정액 불필요</text>

  <rect x="24" y="194" width="322" height="216" rx="10" fill="#111318"/>
  <text x="185" y="222" font-family="Arial,sans-serif" font-size="14" fill="#e5e7eb" font-weight="700" text-anchor="middle">수익화 구조</text>
  <rect x="40" y="234" width="290" height="164" rx="8" fill="#0d1f14"/>
  <text x="56" y="258" font-family="Arial,sans-serif" font-size="13" fill="#00e5a0" font-weight="700">Tesla Fleet 등록 방법</text>
  <text x="56" y="280" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">① Tesla 앱에서 차량 Fleet 등록</text>
  <text x="56" y="300" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">② 사용 가능 시간대 설정</text>
  <text x="56" y="320" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">③ 차량이 자율주행으로 승객 운송</text>
  <text x="56" y="340" font-family="Arial,sans-serif" font-size="13" fill="#00e5a0" font-weight="700">④ 수익 차주 계좌 자동 입금</text>
  <text x="56" y="366" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af">FSD 월 구독료 별도 불필요</text>
  <text x="56" y="384" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af">테슬라-차주 수익 배분 방식</text>

  <rect x="362" y="194" width="334" height="216" rx="10" fill="#111318"/>
  <text x="529" y="222" font-family="Arial,sans-serif" font-size="14" fill="#e5e7eb" font-weight="700" text-anchor="middle">수익 잠재력</text>
  <rect x="378" y="234" width="302" height="164" rx="8" fill="#161b22"/>
  <text x="394" y="258" font-family="Arial,sans-serif" font-size="13" fill="#00e5a0" font-weight="700">시나리오 분석</text>
  <text x="394" y="282" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">• 1일 8시간 운행 · $0.60/mi 평균</text>
  <text x="394" y="302" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">• 월 ~$1,000~3,000 추정 수익</text>
  <text x="394" y="322" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">• 차량 할부금 상쇄 가능</text>
  <text x="394" y="342" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">• 보험·유지비 테슬라 부담 가능성</text>
  <text x="394" y="368" font-family="Arial,sans-serif" font-size="13" fill="#fbbf24" font-weight="700">차가 돈 버는 자산으로 전환</text>
  <text x="394" y="388" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af">전통 차량 소유 개념 완전 혁신</text>

  <rect x="712" y="194" width="344" height="216" rx="10" fill="#111318"/>
  <text x="884" y="222" font-family="Arial,sans-serif" font-size="14" fill="#e5e7eb" font-weight="700" text-anchor="middle">Tesla 전략</text>
  <rect x="728" y="234" width="312" height="164" rx="8" fill="#0a1528"/>
  <text x="884" y="262" font-family="Arial,sans-serif" font-size="18" fill="#00e5a0" font-weight="700" text-anchor="middle">네트워크 효과</text>
  <text x="884" y="285" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">차주 증가 = 서비스 확장</text>
  <text x="744" y="314" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">• 수백만 테슬라 차량 즉시 플릿화</text>
  <text x="744" y="334" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">• Uber·Lyft 대비 압도적 규모</text>
  <text x="744" y="354" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">• 소프트웨어 마진 극대화</text>
  <text x="744" y="374" font-family="Arial,sans-serif" font-size="12" fill="#00e5a0">• 로보택시 → Airbnb 모델</text>

  <rect x="24" y="426" width="1032" height="68" rx="10" fill="#0d1f14" stroke="#00e5a0" stroke-width="1"/>
  <text x="540" y="454" font-family="Arial,sans-serif" font-size="15" fill="#00e5a0" font-weight="700" text-anchor="middle">Tesla Fleet = 수백만 대 차량이 자산 생성 네트워크로 전환</text>
  <text x="540" y="476" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">FSD 구독 불필요 · 앱 등록으로 즉시 수익 — 차량 소유 개념을 완전히 뒤바꾸는 비즈니스 모델</text>

  <text x="540" y="512" font-family="Arial,sans-serif" font-size="10" fill="#4b5563" text-anchor="middle">출처: Tesla · 2026.06.25 · Investus</text>
</svg>
