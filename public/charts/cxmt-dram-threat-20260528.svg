<svg xmlns="http://www.w3.org/2000/svg" width="800" height="430" viewBox="0 0 800 430">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0a0a"/>
      <stop offset="100%" style="stop-color:#1a0d0d"/>
    </linearGradient>
  </defs>
  <rect width="800" height="430" fill="url(#bg)"/>
  <rect width="800" height="3" fill="#f97316" opacity="0.9"/>

  <!-- Header -->
  <text x="32" y="38" font-family="Arial,sans-serif" font-size="11" fill="#f97316" font-weight="600" letter-spacing="2">메모리 섹터 · CXMT · 2026.05.28</text>
  <text x="32" y="66" font-family="'SF Pro Display',Arial,sans-serif" font-size="20" fill="#ffffff" font-weight="700">중국 CXMT $242억 자금 조달 — DRAM 70% 과점 도전</text>
  <text x="32" y="88" font-family="Arial,sans-serif" font-size="13" fill="#94a3b8">삼성·SK하이닉스·마이크론 3사 과점 → 중국 메모리 굴기 본격화</text>
  <line x1="32" y1="102" x2="768" y2="102" stroke="#2d1010" stroke-width="1"/>

  <!-- Current market share -->
  <text x="32" y="126" font-family="Arial,sans-serif" font-size="11" fill="#f97316" font-weight="700">■ 현재 DRAM 시장 점유율</text>

  <!-- Pie chart simulation with rectangles -->
  <rect x="32" y="136" width="186" height="40" rx="4" fill="rgba(0,229,160,0.12)" stroke="#00e5a0" stroke-width="1" stroke-opacity="0.5"/>
  <text x="125" y="152" font-family="Arial,sans-serif" font-size="11" fill="#00e5a0" text-anchor="middle" font-weight="600">삼성반도체</text>
  <text x="125" y="168" font-family="Arial,sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="700">~33%</text>

  <rect x="226" y="136" width="186" height="40" rx="4" fill="rgba(96,165,250,0.12)" stroke="#60a5fa" stroke-width="1" stroke-opacity="0.5"/>
  <text x="319" y="152" font-family="Arial,sans-serif" font-size="11" fill="#60a5fa" text-anchor="middle" font-weight="600">SK하이닉스</text>
  <text x="319" y="168" font-family="Arial,sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="700">~22%</text>

  <rect x="420" y="136" width="186" height="40" rx="4" fill="rgba(251,146,60,0.12)" stroke="#fb923c" stroke-width="1" stroke-opacity="0.5"/>
  <text x="513" y="152" font-family="Arial,sans-serif" font-size="11" fill="#fb923c" text-anchor="middle" font-weight="600">마이크론(MU)</text>
  <text x="513" y="168" font-family="Arial,sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="700">~15%</text>

  <rect x="614" y="136" width="154" height="40" rx="4" fill="rgba(239,68,68,0.12)" stroke="#ef4444" stroke-width="1" stroke-opacity="0.5"/>
  <text x="691" y="152" font-family="Arial,sans-serif" font-size="11" fill="#ef4444" text-anchor="middle" font-weight="600">기타</text>
  <text x="691" y="168" font-family="Arial,sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="700">~30%</text>

  <!-- 3사 합산 -->
  <text x="319" y="202" font-family="Arial,sans-serif" font-size="13" fill="#ffffff" text-anchor="middle" font-weight="700">3사 합산 글로벌 DRAM 점유율: <tspan fill="#f97316">약 70%</tspan></text>

  <!-- CXMT funding -->
  <text x="32" y="230" font-family="Arial,sans-serif" font-size="11" fill="#f97316" font-weight="700">■ CXMT 자금 조달 현황</text>

  <rect x="32" y="240" width="240" height="80" rx="8" fill="rgba(239,68,68,0.10)" stroke="#ef4444" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="50" y="263" font-family="Arial,sans-serif" font-size="10" fill="#f97316" font-weight="600">신규 자금 조달</text>
  <text x="50" y="290" font-family="'SF Pro Display',Arial,sans-serif" font-size="30" fill="#ffffff" font-weight="800">$24.2B</text>
  <text x="50" y="308" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8">약 33조원 · IPO $2.4B 추가</text>

  <!-- Corsair warning -->
  <rect x="290" y="240" width="478" height="80" rx="8" fill="rgba(239,68,68,0.06)" stroke="#ef4444" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="308" y="263" font-family="Arial,sans-serif" font-size="11" fill="#f97316" font-weight="600">⚠️ 이미 미국 시장 침투 중</text>
  <text x="308" y="282" font-family="Arial,sans-serif" font-size="11" fill="#e2e8f0">"Corsair (美 대표 메모리 브랜드)가 이미 CXMT 팹 칩 채용"</text>
  <text x="308" y="300" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">→ CXMT 품질이 이미 상용 기준 통과 의미</text>
  <text x="308" y="316" font-family="Arial,sans-serif" font-size="10" fill="#64748b">$24.2B 자금으로 가격 인하 공세 전개 예상</text>

  <!-- Risk vs Safety table -->
  <text x="32" y="346" font-family="Arial,sans-serif" font-size="11" fill="#f97316" font-weight="700">■ 영향 분석</text>
  <rect x="32" y="355" width="350" height="50" rx="6" fill="rgba(239,68,68,0.08)"/>
  <text x="50" y="373" font-family="Arial,sans-serif" font-size="11" fill="#ef4444" font-weight="600">위험 영역 (CXMT 직접 경쟁)</text>
  <text x="50" y="392" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">범용 DRAM (PC·스마트폰·서버 DDR5) → 가격 하락 압력</text>

  <rect x="400" y="355" width="368" height="50" rx="6" fill="rgba(0,229,160,0.06)"/>
  <text x="418" y="373" font-family="Arial,sans-serif" font-size="11" fill="#00e5a0" font-weight="600">안전 영역 (기술 격차 큼)</text>
  <text x="418" y="392" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">HBM3E·HBM4 (AI GPU용) → CXMT 미생산 · 단기 영향 제한</text>

  <text x="768" y="424" font-family="Arial,sans-serif" font-size="9" fill="#334155" text-anchor="end">SUNRYU Partners · 2026.05.28</text>
</svg>
