<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#0a1810"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <!-- Header -->
  <rect width="1080" height="80" fill="#111318"/>
  <text x="540" y="30" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">OpenAI · IPO + Jalapeño 칩</text>
  <text x="540" y="62" font-family="Arial,sans-serif" font-size="26" font-weight="bold" fill="#e5e7eb" text-anchor="middle">OpenAI IPO 지연 검토 + Jalapeño 자체 AI 칩 공개</text>
  <!-- Accent line (split: red left, green right) -->
  <rect y="80" width="540" height="3" fill="#ef4444"/>
  <rect x="540" y="80" width="540" height="3" fill="#4ade80"/>
  <!-- Split divider -->
  <line x1="540" y1="90" x2="540" y2="710" stroke="#333" stroke-width="2"/>
  <!-- LEFT: IPO DELAYED -->
  <text x="270" y="145" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="#f87171" text-anchor="middle">🚫 IPO 지연</text>
  <!-- Warning triangle -->
  <polygon points="270,175 200,295 340,295" fill="#ef4444" opacity="0.2" stroke="#ef4444" stroke-width="2"/>
  <text x="270" y="255" font-family="Arial,sans-serif" font-size="48" fill="#ef4444" text-anchor="middle">⚠</text>
  <text x="270" y="318" font-family="Arial,sans-serif" font-size="52" font-weight="bold" fill="#f87171" text-anchor="middle">DELAYED</text>
  <text x="270" y="358" font-family="Arial,sans-serif" font-size="20" fill="#e5e7eb" text-anchor="middle">IPO 지연 유력</text>
  <!-- IPO details -->
  <rect x="30" y="378" width="480" height="65" rx="8" fill="#2d0a0a" stroke="#f87171" stroke-width="1"/>
  <text x="270" y="404" font-family="Arial,sans-serif" font-size="15" fill="#f87171" text-anchor="middle">원인: SpaceX IPO 환경 변화</text>
  <text x="270" y="425" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">시장 포화 + 투자자 선호도 변화로 시기 재검토</text>
  <rect x="30" y="453" width="480" height="55" rx="8" fill="#2d0a0a" stroke="#f87171" stroke-width="1"/>
  <text x="270" y="480" font-family="Arial,sans-serif" font-size="15" fill="#e5e7eb" text-anchor="middle">$1T 목표 유지</text>
  <text x="270" y="498" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">기업가치 $1조 목표는 유지 — 시기만 조정</text>
  <rect x="30" y="518" width="480" height="55" rx="8" fill="#2d0a0a" stroke="#f87171" stroke-width="1"/>
  <text x="270" y="545" font-family="Arial,sans-serif" font-size="15" fill="#e5e7eb" text-anchor="middle">2026년 IPO → 재검토</text>
  <text x="270" y="563" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">당초 2026년 계획 → 지연 방향 검토 중</text>
  <rect x="30" y="583" width="480" height="55" rx="8" fill="#2d0a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="270" y="610" font-family="Arial,sans-serif" font-size="15" fill="#f87171" text-anchor="middle">SpaceX IPO 영향</text>
  <text x="270" y="628" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">SPCX 상장으로 AI 기업 IPO 시장 경쟁 심화</text>
  <!-- RIGHT: Jalapeño Chip -->
  <text x="810" y="145" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="#4ade80" text-anchor="middle">✅ Jalapeño 칩</text>
  <!-- Chip icon -->
  <g transform="translate(690, 175)">
    <rect x="0" y="0" width="120" height="100" rx="8" fill="#14532d" stroke="#4ade80" stroke-width="2.5"/>
    <rect x="10" y="10" width="100" height="80" rx="4" fill="#166534" opacity="0.6"/>
    <!-- Chip pins -->
    <line x1="0" y1="20" x2="-12" y2="20" stroke="#4ade80" stroke-width="3"/>
    <line x1="0" y1="35" x2="-12" y2="35" stroke="#4ade80" stroke-width="3"/>
    <line x1="0" y1="50" x2="-12" y2="50" stroke="#4ade80" stroke-width="3"/>
    <line x1="0" y1="65" x2="-12" y2="65" stroke="#4ade80" stroke-width="3"/>
    <line x1="0" y1="80" x2="-12" y2="80" stroke="#4ade80" stroke-width="3"/>
    <line x1="120" y1="20" x2="132" y2="20" stroke="#4ade80" stroke-width="3"/>
    <line x1="120" y1="35" x2="132" y2="35" stroke="#4ade80" stroke-width="3"/>
    <line x1="120" y1="50" x2="132" y2="50" stroke="#4ade80" stroke-width="3"/>
    <line x1="120" y1="65" x2="132" y2="65" stroke="#4ade80" stroke-width="3"/>
    <line x1="120" y1="80" x2="132" y2="80" stroke="#4ade80" stroke-width="3"/>
    <line x1="25" y1="0" x2="25" y2="-12" stroke="#4ade80" stroke-width="3"/>
    <line x1="45" y1="0" x2="45" y2="-12" stroke="#4ade80" stroke-width="3"/>
    <line x1="65" y1="0" x2="65" y2="-12" stroke="#4ade80" stroke-width="3"/>
    <line x1="85" y1="0" x2="85" y2="-12" stroke="#4ade80" stroke-width="3"/>
    <line x1="105" y1="0" x2="105" y2="-12" stroke="#4ade80" stroke-width="3"/>
    <text x="60" y="58" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="#4ade80" text-anchor="middle">🌶</text>
  </g>
  <text x="810" y="315" font-family="Arial,sans-serif" font-size="46" font-weight="bold" fill="#4ade80" text-anchor="middle">Jalapeño</text>
  <text x="810" y="358" font-family="Arial,sans-serif" font-size="20" fill="#e5e7eb" text-anchor="middle">OpenAI 첫 자체 AI 칩</text>
  <!-- Jalapeño details -->
  <rect x="560" y="378" width="480" height="65" rx="8" fill="#0a2010" stroke="#4ade80" stroke-width="1"/>
  <text x="800" y="404" font-family="Arial,sans-serif" font-size="15" fill="#4ade80" text-anchor="middle">개발 기간: 단 9개월</text>
  <text x="800" y="425" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">Apple 지원 하에 초고속 개발 완료</text>
  <rect x="560" y="453" width="480" height="55" rx="8" fill="#0a2010" stroke="#4ade80" stroke-width="1"/>
  <text x="800" y="480" font-family="Arial,sans-serif" font-size="15" fill="#e5e7eb" text-anchor="middle">Apple 협력 개발</text>
  <text x="800" y="498" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">Apple 엔지니어링 팀과 공동 설계</text>
  <rect x="560" y="518" width="480" height="55" rx="8" fill="#0a2010" stroke="#4ade80" stroke-width="1"/>
  <text x="800" y="545" font-family="Arial,sans-serif" font-size="15" fill="#e5e7eb" text-anchor="middle">NVIDIA 의존 탈피 전략</text>
  <text x="800" y="563" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">자체 AI 추론 칩 → GPU 비용 대폭 절감</text>
  <rect x="560" y="583" width="480" height="55" rx="8" fill="#0a2010" stroke="#4ade80" stroke-width="1"/>
  <text x="800" y="610" font-family="Arial,sans-serif" font-size="15" fill="#4ade80" text-anchor="middle">AI 추론 최적화</text>
  <text x="800" y="628" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">GPT 추론 특화 설계 — 비용 효율 극대화</text>
  <!-- Stats row -->
  <rect x="40" y="730" width="230" height="110" rx="10" fill="#2d0a0a" stroke="#f87171" stroke-width="1.5"/>
  <text x="155" y="765" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">IPO 상태</text>
  <text x="155" y="820" font-family="Arial,sans-serif" font-size="32" font-weight="bold" fill="#f87171" text-anchor="middle">지연</text>
  <rect x="290" y="730" width="230" height="110" rx="10" fill="#2d0a0a" stroke="#f87171" stroke-width="1.5"/>
  <text x="405" y="765" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">기업가치 목표</text>
  <text x="405" y="820" font-family="Arial,sans-serif" font-size="32" font-weight="bold" fill="#e5e7eb" text-anchor="middle">$1T</text>
  <rect x="540" y="730" width="230" height="110" rx="10" fill="#0a2010" stroke="#4ade80" stroke-width="1.5"/>
  <text x="655" y="765" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">Jalapeño 개발</text>
  <text x="655" y="820" font-family="Arial,sans-serif" font-size="32" font-weight="bold" fill="#4ade80" text-anchor="middle">9개월</text>
  <rect x="790" y="730" width="250" height="110" rx="10" fill="#0a2010" stroke="#4ade80" stroke-width="2"/>
  <text x="915" y="765" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">자체 칩 전략</text>
  <text x="915" y="820" font-family="Arial,sans-serif" font-size="28" font-weight="bold" fill="#4ade80" text-anchor="middle">독립 ↑</text>
  <!-- Summary -->
  <rect x="40" y="866" width="1002" height="60" rx="8" fill="#161b22" stroke="#333" stroke-width="1"/>
  <text x="540" y="890" font-family="Arial,sans-serif" font-size="15" fill="#e5e7eb" text-anchor="middle">IPO 지연(부정) ↔ Jalapeño 자체 칩 공개(긍정) — 자립화 전략 강화</text>
  <text x="540" y="912" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">NVIDIA 의존 탈피 + 비용 구조 개선 → 장기 수익성 향상 기대</text>
  <!-- Footer -->
  <rect y="950" width="1080" height="80" fill="#111318"/>
  <rect y="950" width="540" height="2" fill="#ef4444"/>
  <rect x="540" y="950" width="540" height="2" fill="#4ade80"/>
  <text x="540" y="990" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#e5e7eb" text-anchor="middle">OpenAI IPO 지연 + Jalapeño 칩 — 독립·자립화 가속</text>
  <text x="540" y="1014" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">INVESTUS · 2026.06.26 · 투자 참고용</text>
  <rect y="1040" width="1080" height="40" fill="#0d1117"/>
  <text x="540" y="1066" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">OpenAI · IPO 지연 · Jalapeño 9개월 개발 · Apple 협력</text>
</svg>