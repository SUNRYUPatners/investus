<svg width="800" height="480" viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" style="font-family:system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#07091a"/>
      <stop offset="100%" stop-color="#0d1022"/>
    </linearGradient>
  </defs>
  <rect width="800" height="480" fill="url(#bg)"/>

  <!-- Header -->
  <rect x="0" y="0" width="800" height="60" fill="rgba(0,229,160,0.06)"/>
  <text x="32" y="21" fill="rgba(0,229,160,0.7)" font-size="10" letter-spacing="2" font-weight="700">TESLA · TSLA · 완전 자율 AI 인프라</text>
  <text x="32" y="46" fill="white" font-size="19" font-weight="800">Tesla — 완전한 자율 AI 시스템 공개 · 6개 핵심 레이어 구축 완료</text>

  <!-- Subtitle -->
  <text x="32" y="78" fill="rgba(255,255,255,0.4)" font-size="11">Custom AI chips · FSD Training · 운영 인프라 · Optimus Robot · Cybercab 전용 라인 · 고볼륨 기술 — 완전한 수직통합</text>

  <!-- 6 layer blocks -->
  <text x="32" y="106" fill="rgba(255,255,255,0.5)" font-size="11" font-weight="600" letter-spacing="1">Tesla 자율 AI 시스템 6개 레이어</text>

  <!-- Row 1 -->
  <!-- Block 1: Custom AI chips -->
  <rect x="32" y="118" width="228" height="74" rx="10" fill="rgba(0,229,160,0.1)" stroke="rgba(0,229,160,0.3)" stroke-width="1"/>
  <text x="52" y="142" fill="#00e5a0" font-size="22">🧠</text>
  <text x="82" y="142" fill="#00e5a0" font-size="11" font-weight="700">Custom AI Chips</text>
  <text x="52" y="160" fill="rgba(255,255,255,0.6)" font-size="10">AI4 + AI5 자체 개발 추론 칩</text>
  <text x="52" y="176" fill="rgba(255,255,255,0.4)" font-size="10">NVDA GPU 의존 탈피 · 비용 구조 혁신</text>

  <!-- Block 2: FSD Training -->
  <rect x="272" y="118" width="228" height="74" rx="10" fill="rgba(0,229,160,0.1)" stroke="rgba(0,229,160,0.3)" stroke-width="1"/>
  <text x="292" y="142" fill="#00e5a0" font-size="22">🚗</text>
  <text x="322" y="142" fill="#00e5a0" font-size="11" font-weight="700">Fleet Self-Driving (FSD)</text>
  <text x="292" y="160" fill="rgba(255,255,255,0.6)" font-size="10">FSD as Training Engine</text>
  <text x="292" y="176" fill="rgba(255,255,255,0.4)" font-size="10">수백만 대 플릿 → 실시간 데이터 피드백</text>

  <!-- Block 3: Ops Infrastructure -->
  <rect x="512" y="118" width="256" height="74" rx="10" fill="rgba(0,229,160,0.1)" stroke="rgba(0,229,160,0.3)" stroke-width="1"/>
  <text x="532" y="142" fill="#00e5a0" font-size="22">⚙️</text>
  <text x="562" y="142" fill="#00e5a0" font-size="11" font-weight="700">운영·플릿 관리 인프라</text>
  <text x="532" y="160" fill="rgba(255,255,255,0.6)" font-size="10">Robotaxi ops + fleet management</text>
  <text x="532" y="176" fill="rgba(255,255,255,0.4)" font-size="10">Austin 39대 비감독 상업 운행 중</text>

  <!-- Row 2 -->
  <!-- Block 4: Optimus -->
  <rect x="32" y="204" width="228" height="74" rx="10" fill="rgba(168,85,247,0.08)" stroke="rgba(168,85,247,0.25)" stroke-width="1"/>
  <text x="52" y="228" fill="#c084fc" font-size="22">🤖</text>
  <text x="82" y="228" fill="#c084fc" font-size="11" font-weight="700">Optimus (범용 로봇)</text>
  <text x="52" y="246" fill="rgba(255,255,255,0.6)" font-size="10">Tesla General Purpose Robot</text>
  <text x="52" y="262" fill="rgba(255,255,255,0.4)" font-size="10">FSD AI → 로봇 모션 전이 학습</text>

  <!-- Block 5: Cybercab Lines -->
  <rect x="272" y="204" width="228" height="74" rx="10" fill="rgba(168,85,247,0.08)" stroke="rgba(168,85,247,0.25)" stroke-width="1"/>
  <text x="292" y="228" fill="#c084fc" font-size="22">🏭</text>
  <text x="322" y="228" fill="#c084fc" font-size="11" font-weight="700">Cybercab 전용 생산 라인</text>
  <text x="292" y="246" fill="rgba(255,255,255,0.6)" font-size="10">Dedicated Cybercab production</text>
  <text x="292" y="262" fill="rgba(255,255,255,0.4)" font-size="10">기가텍사스 → 도로 직행 사이클</text>

  <!-- Block 6: High-volume Tech -->
  <rect x="512" y="204" width="256" height="74" rx="10" fill="rgba(168,85,247,0.08)" stroke="rgba(168,85,247,0.25)" stroke-width="1"/>
  <text x="532" y="228" fill="#c084fc" font-size="22">📡</text>
  <text x="562" y="228" fill="#c084fc" font-size="11" font-weight="700">고볼륨 운행 기술</text>
  <text x="532" y="246" fill="rgba(255,255,255,0.6)" font-size="10">Tesla's onboard tech for high-volume</text>
  <text x="532" y="262" fill="rgba(255,255,255,0.4)" font-size="10">대규모 상업 Robotaxi 운영 최적화</text>

  <!-- Bottom connector line -->
  <line x1="32" y1="292" x2="768" y2="292" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Moat summary -->
  <rect x="32" y="302" width="736" height="58" rx="12" fill="rgba(0,229,160,0.07)" stroke="rgba(0,229,160,0.2)" stroke-width="1"/>
  <text x="52" y="324" fill="#00e5a0" font-size="12" font-weight="700">왜 이게 진짜 해자인가</text>
  <text x="52" y="344" fill="rgba(255,255,255,0.65)" font-size="10">칩→학습→운영→로봇→생산→기술 = 6개 레이어 모두 자체 개발 · 경쟁사가 하나도 복제할 수 없는 완전 수직통합 AI 플랫폼</text>
  <text x="52" y="358" fill="rgba(255,255,255,0.4)" font-size="10">Waymo는 칩·생산·로봇 없음 · Uber/Lyft는 차량 없음 · Tesla만이 전체 스택 보유</text>

  <!-- Quote -->
  <rect x="32" y="372" width="736" height="60" rx="10" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <text x="52" y="394" fill="rgba(255,255,255,0.45)" font-size="10" font-style="italic">"Few people realize that Tesla has quietly built a complete, actual AI infrastructure"</text>
  <text x="52" y="410" fill="rgba(255,255,255,0.3)" font-size="10">— Twitter/X, 2026.06.02 · Custom AI inference chips (AI4 &amp; AI5), FSD training, fleet management, Optimus, Cybercab lines</text>
  <text x="52" y="424" fill="rgba(0,229,160,0.5)" font-size="10">소프트웨어 기업 리레이팅의 근거 — 이 스택 전체가 수익화 대상</text>

  <text x="400" y="476" fill="rgba(255,255,255,0.2)" font-size="9" text-anchor="middle">investus.kr · 선류파트너스 · 투자 참고용, 투자 권유 아님</text>
</svg>
