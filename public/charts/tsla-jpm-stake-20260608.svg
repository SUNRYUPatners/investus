<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" style="background:#0a0c10;font-family:'Helvetica Neue',Arial,sans-serif">
  <rect width="800" height="440" fill="#0a0c10"/>
  <defs>
    <linearGradient id="mGr2" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#059669"/><stop offset="100%" stop-color="#00e5a0"/>
    </linearGradient>
  </defs>

  <rect x="30" y="24" width="10" height="40" rx="3" fill="url(#mGr2)"/>
  <text x="50" y="40" fill="#00e5a0" font-size="11" font-weight="700" letter-spacing="2">TESLA · INSTITUTIONAL</text>
  <text x="50" y="60" fill="white" font-size="18" font-weight="800">JP Morgan, Q1 2026 Tesla 143만주 추가 매수 — $5.515억 유입</text>
  <text x="750" y="44" fill="#00e5a0" font-size="11" text-anchor="end">2026.06.08</text>
  <line x1="30" y1="80" x2="770" y2="80" stroke="#ffffff" stroke-opacity="0.06"/>

  <!-- Key numbers -->
  <rect x="30" y="92" width="740" height="78" rx="12" fill="#00e5a0" fill-opacity="0.08" stroke="#00e5a0" stroke-opacity="0.2"/>
  <text x="210" y="130" fill="white" font-size="42" font-weight="900" text-anchor="middle">+1,433,345주</text>
  <text x="210" y="158" fill="rgba(255,255,255,0.45)" font-size="13" text-anchor="middle">Q1 2026 순매수</text>
  <line x1="400" y1="100" x2="400" y2="162" stroke="rgba(255,255,255,0.08)"/>
  <text x="590" y="130" fill="white" font-size="42" font-weight="900" text-anchor="middle">$551.5M</text>
  <text x="590" y="158" fill="rgba(255,255,255,0.45)" font-size="13" text-anchor="middle">자본 유입 추정</text>

  <!-- Holding details -->
  <text x="30" y="200" fill="rgba(255,255,255,0.4)" font-size="11" font-weight="700" letter-spacing="1">JP Morgan 보유 현황</text>

  <rect x="30" y="210" width="230" height="70" rx="10" fill="rgba(255,255,255,0.04)"/>
  <text x="50" y="234" fill="rgba(255,255,255,0.5)" font-size="11">Q4 2025 보유</text>
  <text x="50" y="268" fill="white" font-size="22" font-weight="800">44.6M주</text>

  <rect x="276" y="210" width="230" height="70" rx="10" fill="#00e5a0" fill-opacity="0.08" stroke="#00e5a0" stroke-opacity="0.25"/>
  <text x="296" y="234" fill="#00e5a0" font-size="11" font-weight="700">Q1 2026 보유 (현재)</text>
  <text x="296" y="268" fill="white" font-size="22" font-weight="800">46,075,161주</text>

  <rect x="522" y="210" width="248" height="70" rx="10" fill="rgba(255,255,255,0.04)"/>
  <text x="542" y="234" fill="rgba(255,255,255,0.5)" font-size="11">추정 평균 매수가</text>
  <text x="542" y="268" fill="white" font-size="22" font-weight="800">~$384/주</text>

  <!-- Quarterly change bar -->
  <text x="30" y="312" fill="rgba(255,255,255,0.4)" font-size="11" font-weight="700" letter-spacing="1">기관 투자자 동향 — 2026 Q1</text>

  <rect x="30" y="322" width="740" height="56" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)"/>
  <!-- Progress bar -->
  <rect x="50" y="336" width="700" height="16" rx="6" fill="rgba(255,255,255,0.06)"/>
  <rect x="50" y="336" width="510" height="16" rx="6" fill="#00e5a0" fill-opacity="0.7"/>
  <text x="50" y="370" fill="rgba(255,255,255,0.5)" font-size="10">44,641,816주 (Q4 2025)</text>
  <text x="560" y="370" fill="#00e5a0" font-size="10" font-weight="700">+1,433,345주 → 46,075,161주</text>

  <!-- Note -->
  <rect x="30" y="390" width="740" height="36" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)"/>
  <text x="400" y="413" fill="rgba(255,255,255,0.6)" font-size="12" text-anchor="middle">JPMorgan은 2025년 TSLA 투자의견 강등 이력 있음 — 보유 확대는 스탠스 변화 또는 자산배분 조정 신호</text>

  <text x="400" y="432" fill="rgba(255,255,255,0.2)" font-size="10" text-anchor="middle">13F 공시 기준 · Investus · investus.kr</text>
</svg>
