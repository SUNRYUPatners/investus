  <text x="254" y="307" font-family="sans-serif" font-size="9" fill="#f0f0f0">💥 Amazon $4B+ 투자 리스크</text>
  <text x="254" y="323" font-family="sans-serif" font-size="9" fill="#f0f0f0">💥 Google $2B+ 투자 리스크</text>
  <text x="254" y="339" font-family="sans-serif" font-size="8" fill="#888">   AI 수출 규제 선례 → NVDA 파장?</text>

  <!-- Discord 해킹 -->
  <rect x="16" y="352" width="448" height="52" rx="10" fill="#1a1a1f"/>
  <text x="26" y="369" font-family="sans-serif" font-size="10" font-weight="700" fill="#fb923c">🎮 Discord 해킹 사건</text>
  <text x="26" y="385" font-family="sans-serif" font-size="9" fill="#f0f0f0">디스코드 해커그룹 → 제3자 협력사 신원 도용 → Mythos 무단 접속 성공</text>
  <text x="26" y="399" font-family="sans-serif" font-size="9" fill="#aaa">이것이 미 정부가 탈옥 방법 인지하게 된 계기로 추정</text>

  <!-- Project Glasswing -->
  <rect x="16" y="414" width="448" height="40" rx="10" fill="#0a1a14" stroke="#00e5a0" stroke-width="0.5"/>
  <text x="26" y="430" font-family="sans-serif" font-size="10" font-weight="700" fill="#00e5a0">🔬 Project Glasswing (확장 중)</text>
  <text x="26" y="446" font-family="sans-serif" font-size="9" fill="#aaa">AI로 취약점 사전 발견·패치 — 15개국 150개 기관으로 확대 (방어 목적)</text>

  <text x="240" y="472" font-family="sans-serif" font-size="9" fill="#444" text-anchor="middle">investus.kr · 2026.06.15</text>
