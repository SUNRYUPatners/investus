  <text x="254" y="247" font-family="sans-serif" font-size="9" fill="#f0f0f0">🔓 Fable 5 탈옥(Jailbreak) 방법</text>
  <text x="254" y="259" font-family="sans-serif" font-size="8" fill="#888">   美 정부 파악 → 즉각 전면 차단</text>
  <text x="254" y="275" font-family="sans-serif" font-size="9" fill="#f0f0f0">🌏 외국인 직원 포함 전원 차단</text>
