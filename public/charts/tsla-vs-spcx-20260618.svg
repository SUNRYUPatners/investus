<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 460" width="600" height="460">
  <defs>
    <linearGradient id="bgcomp18" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#080e18"/>
    </linearGradient>
  </defs>
  <rect width="600" height="460" fill="url(#bgcomp18)" rx="16"/>

  <!-- Header -->
  <rect x="0" y="0" width="600" height="56" rx="16" fill="#1e293b" opacity="0.7"/>
  <rect x="0" y="40" width="600" height="16" fill="#1e293b" opacity="0.7"/>
  <text x="300" y="24" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="800" fill="#f1f5f9">Tesla vs SpaceX — Q1 2026 재무 비교</text>
  <text x="300" y="45" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#64748b">머스크 두 기업 재무 역전 · 순이익 vs 순손실</text>

  <!-- Company cards -->
  <rect x="16" y="68" width="270" height="120" rx="12" fill="#0f1e0f" stroke="#00e5a0" stroke-width="1.5"/>
  <text x="151" y="94" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#00e5a0">SpaceX (SPCX)</text>
  <text x="151" y="118" text-anchor="middle" font-family="Arial,sans-serif" font-size="30" font-weight="800" fill="#00e5a0">+$1.62B</text>
  <text x="151" y="140" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#94a3b8">Q1 2026 순이익</text>
  <text x="151" y="160" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#475569">흑자 · Starlink 수익 기여</text>

  <rect x="314" y="68" width="270" height="120" rx="12" fill="#1e0a0a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="449" y="94" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#ef4444">Tesla (TSLA)</text>
  <text x="449" y="118" text-anchor="middle" font-family="Arial,sans-serif" font-size="30" font-weight="800" fill="#ef4444">-$590M</text>
  <text x="449" y="140" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#94a3b8">Q1 2026 순손실</text>
  <text x="449" y="160" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#475569">적자 · 가격인하·투자 압박</text>

  <!-- Bar comparison -->
  <text x="24" y="212" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#e2e8f0">Q1 2026 순이익 비교</text>

  <!-- Base line -->
  <line x1="24" y1="330" x2="576" y2="330" stroke="#1e293b" stroke-width="2"/>
  <text x="24" y="346" font-family="Arial,sans-serif" font-size="10" fill="#475569">$0 (손익분기점)</text>

  <!-- SpaceX bar (up) -->
  <rect x="120" y="250" width="100" height="80" rx="5" fill="#00e5a0" opacity="0.8"/>
  <text x="170" y="244" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#00e5a0">+$1.62B</text>
  <text x="170" y="358" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#94a3b8">SpaceX</text>

  <!-- Tesla bar (down) -->
  <rect x="380" y="330" width="100" height="50" rx="5" fill="#ef4444" opacity="0.8"/>
  <text x="430" y="396" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#ef4444">-$590M</text>
  <text x="430" y="358" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#94a3b8">Tesla</text>

  <!-- Context -->
  <text x="24" y="422" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">시총: SpaceX ~$350B(비상장) · Tesla ~$1.1T(상장) — 재무역전에도 Tesla 시총 3배</text>

  <!-- Footer -->
  <rect x="0" y="418" width="600" height="42" rx="16" fill="#1e293b" opacity="0.5"/>
  <rect x="0" y="418" width="600" height="16" fill="#1e293b" opacity="0.5"/>
  <text x="300" y="444" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#475569">investus.kr — Tesla vs SpaceX 재무비교 · 2026.06.18</text>
</svg>
