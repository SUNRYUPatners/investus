<svg width="800" height="430" viewBox="0 0 800 430" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="430" fill="#07091a"/>
  <rect x="0" y="0" width="800" height="3" fill="#c084fc"/>
  <text x="30" y="30" font-family="Arial,sans-serif" font-size="10" fill="#c084fc" font-weight="700" letter-spacing="2">INVESTUS · SPCX REPORT</text>
  <text x="30" y="58" font-family="Arial,sans-serif" font-size="18" fill="white" font-weight="700">SpaceX S-1 공개 — 3개 사업부 매출 · $28.5T TAM 확인</text>
  <text x="770" y="58" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="end">2026.05.29</text>
  <line x1="30" y1="70" x2="770" y2="70" stroke="#1e2330" stroke-width="1"/>

  <!-- 3 business segments -->
  <rect x="30" y="84" width="220" height="120" rx="8" fill="#0d0a1a" stroke="#c084fc" stroke-width="1.5"/>
  <text x="140" y="108" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">우주 사업</text>
  <text x="140" y="148" font-family="Arial,sans-serif" font-size="28" fill="#c084fc" font-weight="900" text-anchor="middle">$4.1B</text>
  <text x="140" y="168" font-family="Arial,sans-serif" font-size="10" fill="white" text-anchor="middle">발사체 · 위성 · 정부 계약</text>
  <text x="140" y="186" font-family="Arial,sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Falcon 9 · Starship · DoD</text>
  <text x="140" y="200" font-family="Arial,sans-serif" font-size="9" fill="#c084fc" text-anchor="middle">연 +65% 성장 중</text>

  <rect x="268" y="84" width="220" height="120" rx="8" fill="#0d0a1a" stroke="#c084fc" stroke-width="1.2" stroke-opacity="0.7"/>
  <text x="378" y="108" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">커넥티비티(Starlink)</text>
  <text x="378" y="148" font-family="Arial,sans-serif" font-size="28" fill="#c084fc" font-weight="900" text-anchor="middle">$11.4B</text>
  <text x="378" y="168" font-family="Arial,sans-serif" font-size="10" fill="white" text-anchor="middle">구독 · B2B · 항공</text>
  <text x="378" y="186" font-family="Arial,sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">30개 통신사 파트너십</text>
  <text x="378" y="200" font-family="Arial,sans-serif" font-size="9" fill="#c084fc" text-anchor="middle">Q1 $1B 영업이익</text>

  <rect x="506" y="84" width="264" height="120" rx="8" fill="#0d0a1a" stroke="#c084fc" stroke-width="1.2" stroke-opacity="0.5"/>
  <text x="638" y="108" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">AI 컴퓨팅</text>
  <text x="638" y="148" font-family="Arial,sans-serif" font-size="28" fill="white" font-weight="900" text-anchor="middle">$3.2B</text>
  <text x="638" y="168" font-family="Arial,sans-serif" font-size="10" fill="white" text-anchor="middle">데이터센터 · xAI Colossus</text>
  <text x="638" y="186" font-family="Arial,sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">12개월 완공 vs 경쟁사 48개월</text>
  <text x="638" y="200" font-family="Arial,sans-serif" font-size="9" fill="#c084fc" text-anchor="middle">신규 성장 동력</text>

  <!-- TAM visualization -->
  <rect x="30" y="218" width="740" height="70" rx="8" fill="#060b18" stroke="#c084fc" stroke-width="1" stroke-opacity="0.4"/>
  <rect x="30" y="218" width="4" height="70" rx="2" fill="#c084fc"/>
  <text x="50" y="240" font-family="Arial,sans-serif" font-size="11" fill="#c084fc" font-weight="700">■ 전체 시장(TAM)</text>
  <text x="50" y="262" font-family="Arial,sans-serif" font-size="22" fill="white" font-weight="900">$28.5T</text>
  <text x="220" y="262" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af"> — 위성통신 $4.5T + 글로벌 통신 $5.5T + AI 컴퓨팅 $18.5T</text>
  <text x="50" y="282" font-family="Arial,sans-serif" font-size="10" fill="#6b7280">현재 점유율 0.06% 수준 → 성장 여력 극대화</text>

  <rect x="30" y="302" width="354" height="80" rx="6" fill="#0a0f1e" stroke="#1e2330" stroke-width="1"/>
  <rect x="30" y="302" width="4" height="80" rx="2" fill="#c084fc"/>
  <text x="50" y="324" font-family="Arial,sans-serif" font-size="10" fill="#6b7280">IPO 구조</text>
  <text x="50" y="348" font-family="Arial,sans-serif" font-size="12" fill="white" font-weight="700">$350B 기업가치 · 나스닥 상장</text>
  <text x="50" y="368" font-family="Arial,sans-serif" font-size="10" fill="#9ca3af">공모 규모 $1.5B · S-1 제출 완료</text>
  <text x="50" y="378" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">락업: Q2 실적 후 20% · +30% 시 추가 해제</text>

  <rect x="402" y="302" width="368" height="80" rx="6" fill="#0a0f1e" stroke="#1e2330" stroke-width="1"/>
  <rect x="402" y="302" width="4" height="80" rx="2" fill="#c084fc"/>
  <text x="422" y="324" font-family="Arial,sans-serif" font-size="10" fill="#6b7280">투자 시사점</text>
  <text x="422" y="348" font-family="Arial,sans-serif" font-size="12" fill="#c084fc" font-weight="700">Starlink 단독으로 기업가치 정당화</text>
  <text x="422" y="368" font-family="Arial,sans-serif" font-size="10" fill="#9ca3af">3개 사업부 시너지 → 복합 성장 구조</text>
  <text x="422" y="378" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">SPCX = 가장 낮은 리스크로 SpaceX 노출</text>

  <line x1="30" y1="396" x2="770" y2="396" stroke="#1e2330" stroke-width="1"/>
  <text x="30" y="412" font-family="Arial,sans-serif" font-size="8" fill="#374151">투자 참고용 · 투자 권유 아님</text>
  <text x="770" y="412" font-family="Arial,sans-serif" font-size="9" fill="#c084fc" text-anchor="end" font-weight="700">SUNRYU Partners CIO</text>
</svg>
