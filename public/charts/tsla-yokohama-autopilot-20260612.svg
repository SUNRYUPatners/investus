<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480">
  <rect width="480" height="480" fill="#0a0c10"/>
  <rect x="0" y="0" width="480" height="64" fill="#111318"/>
  <rect x="0" y="60" width="480" height="2" fill="#00e5a0" opacity="0.3"/>
  <text x="24" y="26" font-family="Arial,sans-serif" font-size="11" fill="#00e5a0" font-weight="bold">TSLA · 종목분석</text>
  <text x="24" y="46" font-family="Arial,sans-serif" font-size="13" fill="#e5e7eb" font-weight="bold">Tesla 요코하마 Autopilot 테스트 드라이버 채용</text>

  <!-- Job posting highlight -->
  <rect x="24" y="80" width="432" height="80" rx="12" fill="#0d1f14" stroke="#00e5a0" stroke-width="1" stroke-opacity="0.4"/>
  <text x="40" y="106" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af">채용 공고</text>
  <text x="40" y="128" font-family="Arial,sans-serif" font-size="16" fill="#e5e7eb" font-weight="bold">Autopilot 테스트 드라이버 · 일본 요코하마</text>
  <text x="40" y="150" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af">Tesla Japan K.K. · 2026년 신규 채용 공고</text>

  <!-- Key requirements -->
  <text x="24" y="186" font-family="Arial,sans-serif" font-size="12" fill="#6b7280" font-weight="bold">■ 채용 핵심 내용</text>

  <rect x="24" y="198" width="432" height="44" rx="10" fill="#111318"/>
  <text x="40" y="218" font-family="Arial,sans-serif" font-size="13" fill="#e5e7eb" font-weight="bold">역할: FSD/Autopilot 실주행 테스트 및 데이터 수집</text>
  <text x="40" y="236" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af">실제 일본 도로 환경에서 FSD 성능 검증 · 엣지케이스 수집</text>

  <rect x="24" y="250" width="432" height="44" rx="10" fill="#111318"/>
  <text x="40" y="270" font-family="Arial,sans-serif" font-size="13" fill="#e5e7eb" font-weight="bold">위치: 요코하마 (도쿄 인근) 오피스 기반</text>
  <text x="40" y="288" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af">일본 시장 FSD 현지화 · 좌측 통행 도로 적응 데이터</text>

  <!-- Significance -->
  <text x="24" y="318" font-family="Arial,sans-serif" font-size="12" fill="#6b7280" font-weight="bold">■ 전략적 의미</text>

  <rect x="24" y="330" width="204" height="56" rx="10" fill="#111318"/>
  <text x="126" y="352" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">일본 도로 특수성</text>
  <text x="126" y="374" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb" text-anchor="middle">좌측 통행 · 좁은 도로</text>
  <text x="126" y="386" font-family="Arial,sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">가장 복잡한 교통 환경</text>

  <rect x="244" y="330" width="212" height="56" rx="10" fill="#111318"/>
  <text x="350" y="352" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">아시아 시장 확장</text>
  <text x="350" y="374" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb" text-anchor="middle">한국·일본·동남아</text>
  <text x="350" y="386" font-family="Arial,sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">FSD 글로벌 확장 로드맵</text>

  <!-- Japan market -->
  <rect x="24" y="400" width="432" height="52" rx="10" fill="#0d1f14" stroke="#00e5a0" stroke-width="1" stroke-opacity="0.3"/>
  <text x="240" y="420" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">일본 FSD 채용 = 아시아 현지화 데이터 확보 전략</text>
  <text x="240" y="438" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">일본: 전세계 최고 교통 복잡도 · 여기서 통하면 어디서든 통한다</text>
  <text x="240" y="454" font-family="Arial,sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Tesla Japan 판매 대수: 연 약 10,000대 (2025 기준)</text>

  <text x="240" y="472" font-family="Arial,sans-serif" font-size="10" fill="#4b5563" text-anchor="middle">2026.06.12 · Investus · 투자 참고용</text>
</svg>
