<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0a04"/>
      <stop offset="100%" style="stop-color:#1a1000"/>
    </linearGradient>
    <linearGradient id="oGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#c2410c"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <line x1="0" y1="360" x2="1080" y2="360" stroke="#f97316" stroke-width="0.3" stroke-opacity="0.08"/>
  <line x1="0" y1="720" x2="1080" y2="720" stroke="#f97316" stroke-width="0.3" stroke-opacity="0.08"/>
  <line x1="360" y1="0" x2="360" y2="1080" stroke="#f97316" stroke-width="0.3" stroke-opacity="0.08"/>
  <line x1="720" y1="0" x2="720" y2="1080" stroke="#f97316" stroke-width="0.3" stroke-opacity="0.08"/>

  <rect x="60" y="60" width="960" height="4" fill="url(#oGrad)" rx="2"/>
  <rect x="60" y="90" width="80" height="36" rx="8" fill="#f97316"/>
  <text x="100" y="114" font-family="Arial Black, Arial" font-weight="900" font-size="14" fill="#ffffff" text-anchor="middle">매크로</text>
  <rect x="154" y="90" width="100" height="36" rx="8" fill="none" stroke="#f97316" stroke-width="2"/>
  <text x="204" y="114" font-family="Arial, sans-serif" font-weight="700" font-size="13" fill="#f97316" text-anchor="middle">AI 인프라</text>
  <text x="1020" y="114" font-family="Arial, sans-serif" font-size="16" fill="#6a3a14" text-anchor="end">2026.07.06</text>

  <text x="540" y="188" font-family="Arial Black, Arial" font-weight="900" font-size="30" fill="#ffffff" text-anchor="middle" filter="url(#glow)">하이퍼스케일러 AI 설비투자 — 역대 최대</text>
  <text x="540" y="252" font-family="Arial Black, Arial" font-weight="900" font-size="56" fill="#fdba74" text-anchor="middle" filter="url(#glow)">$576B → $939B</text>
  <text x="540" y="298" font-family="Arial, sans-serif" font-size="20" fill="#fb923c" text-anchor="middle">2026년 $5,760억 · 2027년 $9,390억 — AI 인프라 투자 폭발적 확대</text>

  <!-- Big stat boxes -->
  <rect x="80" y="322" width="440" height="200" rx="16" fill="#1a1000" stroke="#f97316" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="300" y="374" font-family="Arial Black, Arial" font-weight="900" font-size="60" fill="#f97316" text-anchor="middle" filter="url(#glow)">$576B</text>
  <text x="300" y="410" font-family="Arial, sans-serif" font-size="18" fill="#fdba74" text-anchor="middle">2026년 하이퍼스케일러 CAPEX</text>
  <text x="300" y="436" font-family="Arial, sans-serif" font-size="14" fill="#7a5a2a" text-anchor="middle">AWS + Azure + GCP + Meta 합산</text>
  <text x="300" y="460" font-family="Arial, sans-serif" font-size="13" fill="#5a4a1a" text-anchor="middle">전년 대비 +60% 이상 증가</text>
  <text x="300" y="500" font-family="Arial, sans-serif" font-size="12" fill="#3a3010" text-anchor="middle">AI 칩·데이터센터·전력 인프라 포함</text>

  <rect x="560" y="322" width="440" height="200" rx="16" fill="#1a1000" stroke="#f97316" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="780" y="374" font-family="Arial Black, Arial" font-weight="900" font-size="60" fill="#fdba74" text-anchor="middle" filter="url(#glow)">$939B</text>
  <text x="780" y="410" font-family="Arial, sans-serif" font-size="18" fill="#fdba74" text-anchor="middle">2027년 예상 CAPEX</text>
  <text x="780" y="436" font-family="Arial, sans-serif" font-size="14" fill="#7a5a2a" text-anchor="middle">2026 대비 +63% 추가 성장</text>
  <text x="780" y="460" font-family="Arial, sans-serif" font-size="13" fill="#5a4a1a" text-anchor="middle">약 1조 달러 돌파 근접</text>
  <text x="780" y="500" font-family="Arial, sans-serif" font-size="12" fill="#3a3010" text-anchor="middle">AI 군비경쟁 가속 · 탈탄소 인프라 포함</text>

  <!-- Analysis -->
  <rect x="80" y="544" width="920" height="340" rx="16" fill="#120e04" stroke="#f97316" stroke-width="1" stroke-opacity="0.4"/>
  <text x="540" y="578" font-family="Arial Black, Arial" font-weight="900" font-size="20" fill="#fdba74" text-anchor="middle">AI 인프라 투자 폭발 — 수혜 종목 분석</text>

  <text x="100" y="612" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#fb923c">NVDA 수혜</text>
  <text x="270" y="612" font-family="Arial, sans-serif" font-size="14" fill="#fdba74">데이터센터 GPU 수요 직결 → H100/B200 공급 한계가 병목</text>
  <text x="100" y="638" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#fb923c">전력 인프라</text>
  <text x="270" y="638" font-family="Arial, sans-serif" font-size="14" fill="#fdba74">데이터센터 전력 소비 급증 → 원전·천연가스·태양광 수요 동반</text>
  <text x="100" y="664" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#fb923c">냉각 시스템</text>
  <text x="270" y="664" font-family="Arial, sans-serif" font-size="14" fill="#fdba74">고밀도 GPU 클러스터 열관리 → 액침냉각·수냉 수요 폭발</text>
  <text x="100" y="690" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#fb923c">메모리 수혜</text>
  <text x="270" y="690" font-family="Arial, sans-serif" font-size="14" fill="#fdba74">HBM · DDR5 수요 동반 상승 → SK하이닉스·MU 직접 수혜</text>
  <text x="100" y="716" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#fb923c">TSLA 연관</text>
  <text x="270" y="716" font-family="Arial, sans-serif" font-size="14" fill="#fdba74">Dojo 슈퍼컴퓨터 · AI 학습 인프라 자체 구축 → 경쟁력 강화</text>
  <text x="100" y="742" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#fb923c">주요 투자자</text>
  <text x="270" y="742" font-family="Arial, sans-serif" font-size="14" fill="#fdba74">MS $80B+ · 구글 $75B+ · Meta $60B+ · 아마존 $100B+ 연간</text>
  <text x="100" y="852" font-family="Arial, sans-serif" font-size="11" fill="#6a4a14">* 2027 $939B는 미국 전체 제조업 설비투자의 2배 이상 — AI 역대 최대 자본 집중</text>

  <rect x="60" y="912" width="960" height="40" rx="12" fill="#120e04" stroke="#f97316" stroke-width="1" stroke-opacity="0.25"/>
  <text x="540" y="937" font-family="Arial, sans-serif" font-size="15" fill="#fb923c" text-anchor="middle">2026 $576B · 2027 $939B — AI 인프라 CAPEX 사상 최대 · NVDA·메모리·전력 수혜</text>

  <rect x="60" y="968" width="960" height="4" fill="url(#oGrad)" rx="2" opacity="0.5"/>
  <text x="540" y="1008" font-family="Arial, sans-serif" font-size="18" fill="#6a3a14" text-anchor="middle">investus.kr  SRP Chief Investment Officer</text>
</svg>
