  <text x="339" y="292" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">"We are excited to partner with NorthPower on this long-term project</text>
  <text x="339" y="308" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">that will enable clean energy in Italy and Europe"</text>

  <rect x="40" y="312" width="290" height="116" rx="8" fill="#161b22"/>
