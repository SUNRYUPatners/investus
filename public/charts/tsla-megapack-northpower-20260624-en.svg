  <text x="56" y="400" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">• Largest single EU ESS contract</text>
  <text x="56" y="420" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">• Renewable grid stabilization</text>

