  <text x="702" y="404" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">• AI scheduling to cut electricity bills</text>
  <text x="702" y="424" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">• Smart Wall Connector integration</text>

