  <text x="863" y="292" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">AI-powered home energy management system included</text>

  <rect x="686" y="316" width="354" height="116" rx="8" fill="#161b22"/>
  <text x="686" y="342" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af" font-weight="600">  Key Features</text>
