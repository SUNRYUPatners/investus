  <text x="366" y="400" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">• Tesla deployment scale confirmed</text>
  <text x="366" y="420" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">• European energy grid transition</text>

