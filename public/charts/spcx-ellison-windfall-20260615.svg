<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 440">
  <rect width="480" height="440" fill="#0d0d0d"/>
  <rect x="16" y="12" width="448" height="44" rx="10" fill="#1a1024"/>
  <text x="240" y="29" font-family="sans-serif" font-size="10" fill="#c084fc" text-anchor="middle" font-weight="700" letter-spacing="1">🚀 SPCX · Larry Ellison 수익 확정</text>
  <text x="240" y="48" font-family="sans-serif" font-size="13" fill="#f0f0f0" text-anchor="middle" font-weight="800">$1B 투자 → $2.7B (+170%) · 4년 보유</text>

  <!-- Investment arrow visualization -->
  <rect x="16" y="66" width="448" height="120" rx="10" fill="#1a1a1f"/>
  <!-- 2022 bar -->
  <rect x="60" y="130" width="80" height="40" rx="6" fill="#c084fc" opacity="0.4"/>
  <text x="100" y="122" font-family="sans-serif" font-size="10" fill="#c084fc" text-anchor="middle" font-weight="700">2022년</text>
  <text x="100" y="152" font-family="sans-serif" font-size="12" fill="#f0f0f0" text-anchor="middle" font-weight="800">$1B</text>
  <text x="100" y="164" font-family="sans-serif" font-size="8" fill="#888" text-anchor="middle">투자금</text>
  <!-- Arrow -->
  <line x1="148" y1="150" x2="240" y2="150" stroke="#c084fc" stroke-width="2" marker-end="url(#arrowhead)" stroke-dasharray="6,3"/>
  <text x="194" y="144" font-family="sans-serif" font-size="9" fill="#888" text-anchor="middle">4년 보유</text>
  <text x="194" y="158" font-family="sans-serif" font-size="9" fill="#c084fc" text-anchor="middle">+170%</text>
  <!-- 2026 bar -->
  <rect x="252" y="90" width="80" height="80" rx="6" fill="#c084fc" opacity="0.8"/>
  <text x="292" y="82" font-family="sans-serif" font-size="10" fill="#c084fc" text-anchor="middle" font-weight="700">2026년 (IPO 후)</text>
  <text x="292" y="135" font-family="sans-serif" font-size="16" fill="#f0f0f0" text-anchor="middle" font-weight="800">$2.7B</text>
  <text x="292" y="152" font-family="sans-serif" font-size="8" fill="#888" text-anchor="middle">현재 가치</text>
  <!-- gain label -->
  <rect x="360" y="110" width="88" height="50" rx="8" fill="#2a0a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="404" y="130" font-family="sans-serif" font-size="12" fill="#ef4444" text-anchor="middle" font-weight="800">+$1.7B</text>
  <text x="404" y="147" font-family="sans-serif" font-size="9" fill="#888" text-anchor="middle">확정 수익</text>
  <text x="404" y="158" font-family="sans-serif" font-size="9" fill="#ef4444" text-anchor="middle" font-weight="700">+170%</text>

  <!-- Context -->
  <rect x="16" y="196" width="448" height="90" rx="10" fill="#1a1a1f"/>
  <text x="26" y="214" font-family="sans-serif" font-size="10" font-weight="700" fill="#c084fc">배경</text>
  <text x="26" y="232" font-family="sans-serif" font-size="10" fill="#f0f0f0">• 2022년 SpaceX 지분 구매 — Oracle 지분 교환(X+A) 방식</text>
  <text x="26" y="249" font-family="sans-serif" font-size="10" fill="#f0f0f0">• IPO 직전까지 차익 실현 없이 보유 (일부 만료 방치)</text>
  <text x="26" y="266" font-family="sans-serif" font-size="10" fill="#f0f0f0">• SPCX 상장 후 보유 지분 가치 $2.7B으로 확정</text>
  <text x="26" y="283" font-family="sans-serif" font-size="9" fill="#888">• J.P. Morgan 보고: "Stale stake from X+A → SPCX, now worth $2.7B"</text>

  <!-- Key insight -->
  <rect x="16" y="296" width="448" height="56" rx="10" fill="#100f1a" stroke="#c084fc" stroke-width="1"/>
  <text x="26" y="314" font-family="sans-serif" font-size="10" font-weight="700" fill="#c084fc">투자 인사이트</text>
  <text x="26" y="332" font-family="sans-serif" font-size="10" fill="#f0f0f0">IPO 전 SpaceX 지분을 보유했던 빅 플레이어들 모두 대규모 수익 확정</text>
  <text x="26" y="348" font-family="sans-serif" font-size="9" fill="#888">Ellison +170% · David Sacks +11,566% · Founders Fund 수십조 → 보유 의지 입증</text>

  <!-- Comparison -->
  <rect x="16" y="362" width="448" height="52" rx="10" fill="#1a1a1f"/>
  <text x="26" y="379" font-family="sans-serif" font-size="9" fill="#888">초기 투자자 수익 비교  (SPCX IPO 기준)</text>
  <text x="26" y="396" font-family="sans-serif" font-size="10" fill="#f0f0f0">Ellison (2022): +170%   David Sacks (2002): +11,566%   Founders Fund: +수백% 이상</text>
  <text x="26" y="408" font-family="sans-serif" font-size="9" fill="#888">모든 장기 투자자 공통점: "한 주도 팔 계획 없다"</text>

  <text x="240" y="432" font-family="sans-serif" font-size="9" fill="#444" text-anchor="middle">investus.kr · 2026.06.15</text>
</svg>
