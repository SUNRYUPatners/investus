<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 520" width="1080" height="520">
  <rect width="1080" height="520" fill="#0d1117"/>
  <rect x="0" y="0" width="1080" height="64" fill="#111318"/>
  <rect x="0" y="62" width="1080" height="2" fill="#00e5a0" opacity="0.7"/>
  <text x="28" y="26" font-family="Arial,sans-serif" font-size="13" fill="#00e5a0" font-weight="700">TSLA · Fleet Monetization Model</text>
  <text x="28" y="50" font-family="Arial,sans-serif" font-size="14" fill="#e5e7eb" font-weight="700">Register Your Car as Fleet via Tesla App → Earn Income Without FSD Subscription</text>

  <rect x="24" y="78" width="1032" height="100" rx="12" fill="#0d1f14" stroke="#00e5a0" stroke-width="1.5"/>
  <text x="540" y="118" font-family="Arial,sans-serif" font-size="26" fill="#00e5a0" font-weight="700" text-anchor="middle">Tesla Fleet Network</text>
  <text x="540" y="155" font-family="Arial,sans-serif" font-size="16" fill="#9ca3af" text-anchor="middle">Owner registers via app → car operates as robotaxi → earnings deposited automatically</text>

  <rect x="24" y="194" width="322" height="216" rx="10" fill="#111318"/>
  <text x="185" y="222" font-family="Arial,sans-serif" font-size="14" fill="#e5e7eb" font-weight="700" text-anchor="middle">How It Works</text>
  <rect x="40" y="234" width="290" height="164" rx="8" fill="#0d1f14"/>
  <text x="56" y="258" font-family="Arial,sans-serif" font-size="13" fill="#00e5a0" font-weight="700">Fleet Registration Steps</text>
  <text x="56" y="280" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">① Register vehicle in Tesla Fleet via app</text>
  <text x="56" y="300" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">② Set available hours for operation</text>
  <text x="56" y="320" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">③ Car autonomously picks up passengers</text>
  <text x="56" y="340" font-family="Arial,sans-serif" font-size="13" fill="#00e5a0" font-weight="700">④ Earnings auto-deposited to owner</text>
  <text x="56" y="366" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af">No monthly FSD subscription needed</text>
  <text x="56" y="384" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af">Tesla-owner revenue sharing model</text>

  <rect x="362" y="194" width="334" height="216" rx="10" fill="#111318"/>
  <text x="529" y="222" font-family="Arial,sans-serif" font-size="14" fill="#e5e7eb" font-weight="700" text-anchor="middle">Earning Potential</text>
  <rect x="378" y="234" width="302" height="164" rx="8" fill="#161b22"/>
  <text x="394" y="258" font-family="Arial,sans-serif" font-size="13" fill="#00e5a0" font-weight="700">Scenario Analysis</text>
  <text x="394" y="282" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">• 8 hrs/day operation · ~$0.60/mi avg</text>
  <text x="394" y="302" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">• Est. $1,000–3,000/month per vehicle</text>
  <text x="394" y="322" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">• Can offset monthly car payment</text>
  <text x="394" y="342" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">• Insurance/maintenance may be covered</text>
  <text x="394" y="368" font-family="Arial,sans-serif" font-size="13" fill="#fbbf24" font-weight="700">Car becomes an income-generating asset</text>
  <text x="394" y="388" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af">Reinvents the concept of vehicle ownership</text>

  <rect x="712" y="194" width="344" height="216" rx="10" fill="#111318"/>
  <text x="884" y="222" font-family="Arial,sans-serif" font-size="14" fill="#e5e7eb" font-weight="700" text-anchor="middle">Tesla Strategy</text>
  <rect x="728" y="234" width="312" height="164" rx="8" fill="#0a1528"/>
  <text x="884" y="262" font-family="Arial,sans-serif" font-size="18" fill="#00e5a0" font-weight="700" text-anchor="middle">Network Effect</text>
  <text x="884" y="285" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">More owners = bigger service</text>
  <text x="744" y="314" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">• Millions of Tesla cars instantly fleet-ready</text>
  <text x="744" y="334" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">• Overwhelming scale vs Uber/Lyft</text>
  <text x="744" y="354" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">• Maximizes software margin</text>
  <text x="744" y="374" font-family="Arial,sans-serif" font-size="12" fill="#00e5a0">• Robotaxi → Airbnb model for cars</text>

  <rect x="24" y="426" width="1032" height="68" rx="10" fill="#0d1f14" stroke="#00e5a0" stroke-width="1"/>
  <text x="540" y="454" font-family="Arial,sans-serif" font-size="15" fill="#00e5a0" font-weight="700" text-anchor="middle">Tesla Fleet = Millions of Vehicles Transformed into Income-Generating Network</text>
  <text x="540" y="476" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">No FSD sub needed · Register via app to earn instantly — a business model that reinvents car ownership</text>

  <text x="540" y="512" font-family="Arial,sans-serif" font-size="10" fill="#4b5563" text-anchor="middle">Source: Tesla · 2026.06.25 · Investus</text>
</svg>
