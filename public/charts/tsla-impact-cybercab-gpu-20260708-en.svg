  <text x="540" y="622" font-family="Arial, sans-serif" font-size="16" fill="#a7f3d0" text-anchor="middle">GPU unit: Thousands of kWh/year → significant carbon output</text>
  <text x="540" y="648" font-family="Arial, sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">Tesla AI = AI infrastructure for the planet — top ESG positioning</text>

