<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="600" height="500">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#0a1018"/>
    </linearGradient>
  </defs>
  <rect width="600" height="500" fill="url(#bg4)" rx="16"/>

  <!-- Header -->
  <rect x="20" y="18" width="90" height="26" rx="6" fill="#c084fc" opacity="0.2"/>
  <text x="65" y="36" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#c084fc">SPCX</text>
  <text x="122" y="36" font-family="Arial,sans-serif" font-size="13" fill="#94a3b8">IPO 후 인덱스 편입 트리거</text>

  <!-- Title -->
  <text x="300" y="76" text-anchor="middle" font-family="Arial,sans-serif" font-size="17" font-weight="700" fill="#f1f5f9">SpaceX IPO 후 패시브 자금 유입 타임라인</text>
  <text x="300" y="98" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#94a3b8">S&amp;P500 · NASDAQ100 · Russell1000 — 조 단위 패시브 자금 집중 예정</text>

  <rect x="40" y="112" width="520" height="1" fill="#2a1a40" opacity="0.8"/>

  <!-- Timeline entries -->
  <!-- NASDAQ 100 -->
  <rect x="40" y="122" width="100" height="24" rx="6" fill="#c084fc" opacity="0.2"/>
  <text x="90" y="139" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#c084fc">7월 초·중순</text>
  <rect x="148" y="122" width="10" height="24" rx="3" fill="#c084fc" opacity="0.4"/>
  <text x="166" y="133" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#e2e8f0">NASDAQ 100 편입</text>
  <text x="166" y="149" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">시총 $750B 기준 · 패시브 자금 유입 $8B~$11B 추정</text>

  <!-- S&P 500 August -->
  <rect x="40" y="162" width="100" height="24" rx="6" fill="#60a5fa" opacity="0.2"/>
  <text x="90" y="179" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#60a5fa">8월</text>
  <rect x="148" y="162" width="10" height="24" rx="3" fill="#60a5fa" opacity="0.4"/>
  <text x="166" y="173" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#e2e8f0">S&amp;P 500 편입 심사</text>
  <text x="166" y="189" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">수익성 요건 충족 시 편입 · S&amp;P500 운용 AUM $6.5T</text>

  <!-- S&P 500 Sept -->
  <rect x="40" y="202" width="100" height="24" rx="6" fill="#60a5fa" opacity="0.15"/>
  <text x="90" y="219" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#60a5fa">9월</text>
  <rect x="148" y="202" width="10" height="24" rx="3" fill="#60a5fa" opacity="0.3"/>
  <text x="166" y="213" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#e2e8f0">S&amp;P 500 분기 리밸런싱</text>
  <text x="166" y="229" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">편입 확정 시 분기 교체 수요 + 추가 패시브 매수</text>

  <!-- Russell -->
  <rect x="40" y="242" width="100" height="24" rx="6" fill="#fb923c" opacity="0.2"/>
  <text x="90" y="259" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#fb923c">10월 12일</text>
  <rect x="148" y="242" width="10" height="24" rx="3" fill="#fb923c" opacity="0.4"/>
  <text x="166" y="253" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#e2e8f0">Russell 1000 분기 리밸런싱</text>
  <text x="166" y="269" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">Russell 계열 패시브 자금 추가 편입 트리거</text>

  <!-- Nov/Dec -->
  <rect x="40" y="282" width="100" height="24" rx="6" fill="#475569" opacity="0.4"/>
  <text x="90" y="299" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#94a3b8">11~12월</text>
  <rect x="148" y="282" width="10" height="24" rx="3" fill="#475569" opacity="0.4"/>
  <text x="166" y="293" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#94a3b8">분기·연간 리밸런싱 반복</text>
  <text x="166" y="309" font-family="Arial,sans-serif" font-size="11" fill="#64748b">각 분기마다 비중 조정 매수 지속</text>

  <rect x="40" y="322" width="520" height="1" fill="#1e293b"/>

  <!-- Key numbers -->
  <text x="40" y="346" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#64748b">핵심 수치</text>

  <rect x="40" y="356" width="4" height="16" rx="2" fill="#c084fc"/>
  <text x="52" y="368" font-family="Arial,sans-serif" font-size="12" fill="#e2e8f0">NASDAQ 100 추종 패시브 자금: ~$430B (QQQ 단일 ETF만 $280B+)</text>

  <rect x="40" y="380" width="4" height="16" rx="2" fill="#60a5fa"/>
  <text x="52" y="392" font-family="Arial,sans-serif" font-size="12" fill="#e2e8f0">S&amp;P 500 추종 패시브 자금: ~$6.5T — 편입 시 사상 최대 규모 매수</text>

  <rect x="40" y="404" width="4" height="16" rx="2" fill="#fb923c"/>
  <text x="52" y="416" font-family="Arial,sans-serif" font-size="12" fill="#e2e8f0">$3.9T가 미국 지수에 투자 중 → SpaceX IPO는 자동 매수 흡수 예정</text>

  <rect x="40" y="428" width="4" height="16" rx="2" fill="#00e5a0"/>
  <text x="52" y="440" font-family="Arial,sans-serif" font-size="12" fill="#e2e8f0">시총 $1T 돌파 시 NASDAQ 100 상위 10위 자동 진입 → 최대 비중</text>

  <text x="300" y="482" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#475569">Source: Sawyer Meriti / Index Fund Data 2026.06.17</text>
</svg>
