<svg width="800" height="430" viewBox="0 0 800 430" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="430" fill="#07091a"/>
  <rect x="0" y="0" width="800" height="3" fill="#c084fc"/>
  <text x="30" y="30" font-family="Arial,sans-serif" font-size="10" fill="#c084fc" font-weight="700" letter-spacing="2">INVESTUS · SPCX REPORT</text>
  <text x="30" y="58" font-family="Arial,sans-serif" font-size="18" fill="white" font-weight="700">Starlink 30개 통신사 파트너십 — 실과금 B2B2C 구조 확립</text>
  <text x="770" y="58" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="end">2026.05.29</text>
  <line x1="30" y1="70" x2="770" y2="70" stroke="#1e2330" stroke-width="1"/>

  <!-- Hero number -->
  <rect x="30" y="84" width="320" height="130" rx="8" fill="#0d0a1a" stroke="#c084fc" stroke-width="2"/>
  <text x="175" y="120" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">글로벌 통신사 파트너</text>
  <text x="175" y="180" font-family="Arial,sans-serif" font-size="60" fill="#c084fc" font-weight="900" text-anchor="middle">30+</text>
  <text x="175" y="208" font-family="Arial,sans-serif" font-size="11" fill="white" text-anchor="middle">실 과금 통신사 수</text>

  <!-- Right region breakdown -->
  <rect x="368" y="84" width="402" height="60" rx="8" fill="#0d0a1a" stroke="#c084fc" stroke-width="1.2" stroke-opacity="0.6"/>
  <text x="440" y="106" font-family="Arial,sans-serif" font-size="10" fill="#6b7280">🌎 미주</text>
  <text x="440" y="128" font-family="Arial,sans-serif" font-size="12" fill="white" font-weight="700">T-Mobile · AT&amp;T · Verizon 포함</text>
  <text x="680" y="120" font-family="Arial,sans-serif" font-size="20" fill="#c084fc" font-weight="900" text-anchor="middle">12</text>

  <rect x="368" y="154" width="402" height="60" rx="8" fill="#0d0a1a" stroke="#c084fc" stroke-width="1.2" stroke-opacity="0.4"/>
  <text x="440" y="176" font-family="Arial,sans-serif" font-size="10" fill="#6b7280">🌍 유럽·아시아</text>
  <text x="440" y="198" font-family="Arial,sans-serif" font-size="12" fill="white" font-weight="700">도이치텔레콤 · NTT · KT 포함</text>
  <text x="680" y="190" font-family="Arial,sans-serif" font-size="20" fill="#c084fc" font-weight="900" text-anchor="middle">18</text>

  <!-- Model explanation -->
  <rect x="30" y="228" width="740" height="64" rx="8" fill="#060b18" stroke="#c084fc" stroke-width="1" stroke-opacity="0.4"/>
  <rect x="30" y="228" width="4" height="64" rx="2" fill="#c084fc"/>
  <text x="50" y="250" font-family="Arial,sans-serif" font-size="11" fill="#c084fc" font-weight="700">■ B2B2C 수익 구조</text>
  <text x="50" y="270" font-family="Arial,sans-serif" font-size="11" fill="white">통신사가 Starlink 위성 용량을 구매 → 자체 요금제에 번들 → 최종 소비자에 판매</text>
  <text x="50" y="286" font-family="Arial,sans-serif" font-size="10" fill="#9ca3af">SpaceX는 B2B 도매 수익 안정적 확보 · 통신사는 커버리지 확장 · 소비자는 원활한 연결</text>

  <rect x="30" y="306" width="354" height="80" rx="6" fill="#0a0f1e" stroke="#1e2330" stroke-width="1"/>
  <rect x="30" y="306" width="4" height="80" rx="2" fill="#c084fc"/>
  <text x="50" y="328" font-family="Arial,sans-serif" font-size="10" fill="#6b7280">수익 규모</text>
  <text x="50" y="352" font-family="Arial,sans-serif" font-size="12" fill="white" font-weight="700">Starlink 연 $11.4B 매출</text>
  <text x="50" y="372" font-family="Arial,sans-serif" font-size="10" fill="#9ca3af">Q1 영업이익 $1B 돌파 · 흑자 구조 확립</text>
  <text x="50" y="382" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">파트너사 수 → 수익 직결 상관관계</text>

  <rect x="402" y="306" width="368" height="80" rx="6" fill="#0a0f1e" stroke="#1e2330" stroke-width="1"/>
  <rect x="402" y="306" width="4" height="80" rx="2" fill="#c084fc"/>
  <text x="422" y="328" font-family="Arial,sans-serif" font-size="10" fill="#6b7280">투자 시사점</text>
  <text x="422" y="352" font-family="Arial,sans-serif" font-size="12" fill="#c084fc" font-weight="700">30개 → 100개 파트너 경로 확인</text>
  <text x="422" y="372" font-family="Arial,sans-serif" font-size="10" fill="#9ca3af">B2B2C = 예측 가능한 반복 수익 구조</text>
  <text x="422" y="382" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">SpaceX IPO 핵심 밸류에이션 근거</text>

  <line x1="30" y1="400" x2="770" y2="400" stroke="#1e2330" stroke-width="1"/>
  <text x="30" y="416" font-family="Arial,sans-serif" font-size="8" fill="#374151">투자 참고용 · 투자 권유 아님</text>
  <text x="770" y="416" font-family="Arial,sans-serif" font-size="9" fill="#c084fc" text-anchor="end" font-weight="700">SUNRYU Partners CIO</text>
</svg>
