<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" style="background:#0a0c10;font-family:'Helvetica Neue',Arial,sans-serif">
  <rect width="800" height="440" fill="#0a0c10"/>
  <defs>
    <linearGradient id="pur2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
    <linearGradient id="gld" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- header -->
  <rect x="30" y="24" width="10" height="36" rx="3" fill="url(#pur2)"/>
  <text x="50" y="42" fill="#c084fc" font-size="11" font-weight="700" letter-spacing="2">GOLDMAN SACHS + MORGAN STANLEY</text>
  <text x="50" y="58" fill="white" font-size="19" font-weight="800">SpaceX 2040 매출 $3.4조 · EBITDA $2.7조</text>
  <text x="700" y="44" fill="#c084fc" font-size="11" font-weight="600" text-anchor="end">2026.06.07</text>

  <line x1="30" y1="76" x2="770" y2="76" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>

  <!-- big numbers -->
  <rect x="30" y="92" width="360" height="110" rx="12" fill="#c084fc" fill-opacity="0.08" stroke="#c084fc" stroke-opacity="0.25"/>
  <text x="50" y="122" fill="#c084fc" font-size="11" font-weight="700">2040 예상 매출</text>
  <text x="50" y="162" fill="white" font-size="46" font-weight="900">$3.4T</text>
  <text x="50" y="188" fill="rgba(255,255,255,0.45)" font-size="13">Goldman Sachs + Morgan Stanley 공동 전망</text>

  <rect x="410" y="92" width="360" height="110" rx="12" fill="#f59e0b" fill-opacity="0.08" stroke="#f59e0b" stroke-opacity="0.25"/>
  <text x="430" y="122" fill="#f59e0b" font-size="11" font-weight="700">2040 Adj. EBITDA</text>
  <text x="430" y="162" fill="white" font-size="46" font-weight="900">$2.7T</text>
  <text x="430" y="188" fill="rgba(255,255,255,0.45)" font-size="13">EBITDA 마진 ~79% — AI 컴퓨팅 레버리지</text>

  <!-- revenue breakdown bars -->
  <text x="30" y="232" fill="rgba(255,255,255,0.4)" font-size="11" font-weight="700" letter-spacing="1">수익원별 2040 기여도 (Goldman 분석)</text>

  <!-- bar chart -->
  <!-- AI Compute -->
  <text x="30" y="256" fill="rgba(255,255,255,0.7)" font-size="12">AI 컴퓨팅 (클라우드)</text>
  <rect x="200" y="244" width="480" height="18" rx="4" fill="rgba(255,255,255,0.04)"/>
  <rect x="200" y="244" width="384" height="18" rx="4" fill="url(#pur2)"/>
  <text x="592" y="257" fill="#c084fc" font-size="12" font-weight="700">80%</text>

  <!-- Starlink -->
  <text x="30" y="288" fill="rgba(255,255,255,0.7)" font-size="12">스타링크 구독</text>
  <rect x="200" y="276" width="480" height="18" rx="4" fill="rgba(255,255,255,0.04)"/>
  <rect x="200" y="276" width="96" height="18" rx="4" fill="#60a5fa"/>
  <text x="304" y="289" fill="#60a5fa" font-size="12" font-weight="700">20%</text>

  <!-- Launch -->
  <text x="30" y="320" fill="rgba(255,255,255,0.7)" font-size="12">발사 서비스</text>
  <rect x="200" y="308" width="480" height="18" rx="4" fill="rgba(255,255,255,0.04)"/>
  <rect x="200" y="308" width="24" height="18" rx="4" fill="#4ade80"/>
  <text x="232" y="321" fill="#4ade80" font-size="12" font-weight="700">5%</text>

  <!-- context note -->
  <rect x="30" y="344" width="740" height="52" rx="8" fill="#f59e0b" fill-opacity="0.05" stroke="#f59e0b" stroke-opacity="0.12"/>
  <text x="46" y="366" fill="#f59e0b" font-size="10" font-weight="700">핵심 분석 포인트 (양 투자은행 공통)</text>
  <text x="46" y="385" fill="rgba(255,255,255,0.5)" font-size="12">A-컴퓨팅 수요 지연(lag)이 2030년 이후 매출의 대부분 — AI 위성+지상 클러스터 복합 수익화</text>

  <!-- comparison -->
  <text x="30" y="422" fill="rgba(255,255,255,0.2)" font-size="11">비교: 현재 AWS $120B/년 · SpaceX 2040 목표는 AWS 현재의 28배</text>
  <text x="770" y="422" fill="rgba(255,255,255,0.2)" font-size="10" text-anchor="end">investus.kr</text>
</svg>
