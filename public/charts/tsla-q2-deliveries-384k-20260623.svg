<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480" style="background:#0d1117;font-family:'Apple SD Gothic Neo',sans-serif">
  <rect width="800" height="480" rx="12" fill="#0d1117"/>
  <text x="400" y="36" text-anchor="middle" fill="#00e5a0" font-size="13" font-weight="700">TSLA · Tesla</text>
  <text x="400" y="62" text-anchor="middle" fill="#e6edf3" font-size="20" font-weight="700">Q2 2026 인도량 컨센서스 — 384,022대</text>
  <text x="400" y="84" text-anchor="middle" fill="#7d8590" font-size="13">시장 기대치 · 전분기 대비 회복세 · 상하이 생산 성장 기반</text>
  <line x1="40" y1="96" x2="760" y2="96" stroke="#21262d" stroke-width="1"/>

  <!-- Big number -->
  <rect x="40" y="112" width="720" height="90" rx="8" fill="#0d1f14" stroke="#00e5a0" stroke-width="1.5"/>
  <text x="400" y="162" text-anchor="middle" fill="#00e5a0" font-size="52" font-weight="800">384,022대</text>
  <text x="400" y="186" text-anchor="middle" fill="#7d8590" font-size="12">Q2 2026 인도량 시장 컨센서스 추정치</text>

  <!-- Quarterly bars (Q1 2025 ~ Q2 2026 est) -->
  <!-- bars at: Q3 25: 325k, Q4 25: 361k, Q1 26: 345k, Q2 26E: 384k -->
  <!-- max = 384k → bar height 384/384 = 200px. scale: 200/384000 * val -->
  <text x="400" y="232" text-anchor="middle" fill="#7d8590" font-size="11">분기별 인도량 트렌드</text>

  <!-- Q3 25: 325k → 169px -->
  <rect x="120" y="402" width="80" height="0" rx="0" fill="transparent"/>
  <text x="160" y="248" text-anchor="middle" fill="#7d8590" font-size="11">Q3 '25</text>
  <rect x="120" y="252" width="80" height="130" rx="3" fill="#1c3d29"/>
  <text x="160" y="248" text-anchor="middle" fill="#7d8590" font-size="10">325k</text>

  <!-- Q4 25: 361k → 188px -->
  <text x="280" y="248" text-anchor="middle" fill="#7d8590" font-size="11">Q4 '25</text>
  <rect x="240" y="246" width="80" height="144" rx="3" fill="#1c3d29"/>
  <text x="280" y="242" text-anchor="middle" fill="#7d8590" font-size="10">361k</text>

  <!-- Q1 26: 345k → 180px -->
  <text x="440" y="248" text-anchor="middle" fill="#7d8590" font-size="11">Q1 '26</text>
  <rect x="400" y="252" width="80" height="138" rx="3" fill="#1c3d29"/>
  <text x="440" y="248" text-anchor="middle" fill="#7d8590" font-size="10">345k</text>

  <!-- Q2 26E: 384k → 200px (highlight) -->
  <text x="600" y="244" text-anchor="middle" fill="#00e5a0" font-size="11" font-weight="700">Q2 '26E</text>
  <rect x="560" y="244" width="80" height="156" rx="3" fill="#00e5a0" opacity="0.7"/>
  <text x="600" y="240" text-anchor="middle" fill="#00e5a0" font-size="11" font-weight="700">384k</text>

  <!-- x-axis -->
  <line x1="100" y1="400" x2="700" y2="400" stroke="#21262d" stroke-width="1"/>

  <!-- Labels below bars -->
  <text x="160" y="416" text-anchor="middle" fill="#7d8590" font-size="11">Q3 '25</text>
  <text x="280" y="416" text-anchor="middle" fill="#7d8590" font-size="11">Q4 '25</text>
  <text x="440" y="416" text-anchor="middle" fill="#7d8590" font-size="11">Q1 '26</text>
  <text x="600" y="416" text-anchor="middle" fill="#00e5a0" font-size="11" font-weight="700">Q2 '26E</text>

  <line x1="40" y1="432" x2="760" y2="432" stroke="#21262d" stroke-width="1"/>
  <text x="400" y="448" text-anchor="middle" fill="#444c56" font-size="10">출처: 시장 컨센서스 추정치 · investus.kr</text>

  <rect x="40" y="456" width="720" height="0" rx="6" fill="#1c1026"/>
</svg>
