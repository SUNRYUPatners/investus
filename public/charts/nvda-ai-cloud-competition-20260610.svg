<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="'Segoe UI',Arial,sans-serif">
  <!-- Background -->
  <rect width="800" height="460" fill="#0a0f1e"/>

  <!-- Header y:0-68 -->
  <rect x="0" y="0" width="800" height="68" fill="#0d1528"/>
  <rect x="0" y="0" width="6" height="68" fill="#60a5fa"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#60a5fa">AI 클라우드 빅3 경쟁 구도 — Apple·Google·NVDA 연합</text>
  <text x="24" y="54" font-size="12" fill="#94a3b8">AI Cloud · Tech Alliance · 2026</text>

  <!-- Competition Diagram y:80-260 -->
  <!-- Left column label -->
  <text x="160" y="98" font-size="13" font-weight="700" fill="#00e5a0" text-anchor="middle">AI 연합</text>

  <!-- Apple box -->
  <rect x="40" y="108" width="240" height="42" rx="8" fill="#0d2b1e" stroke="#00e5a0" stroke-width="1.5"/>
  <text x="160" y="134" font-size="14" font-weight="700" fill="#00e5a0" text-anchor="middle"> Apple</text>

  <!-- Google box -->
  <rect x="40" y="160" width="240" height="42" rx="8" fill="#0d2b1e" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="160" y="186" font-size="14" font-weight="700" fill="#60a5fa" text-anchor="middle"> Google</text>

  <!-- NVDA box -->
  <rect x="40" y="212" width="240" height="42" rx="8" fill="#0d2b1e" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="160" y="238" font-size="14" font-weight="700" fill="#60a5fa" text-anchor="middle"> NVIDIA</text>

  <!-- Center: AI Cloud label -->
  <rect x="310" y="148" width="180" height="58" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="400" y="172" font-size="13" font-weight="700" fill="#f59e0b" text-anchor="middle">AI 클라우드</text>
  <text x="400" y="192" font-size="11" fill="#94a3b8" text-anchor="middle">컴퓨팅 통합</text>

  <!-- Arrows from left to center -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#60a5fa"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ef4444"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/>
    </marker>
  </defs>
  <line x1="280" y1="129" x2="310" y2="165" stroke="#00e5a0" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="280" y1="181" x2="310" y2="177" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="280" y1="233" x2="310" y2="195" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Right column label -->
  <text x="640" y="98" font-size="13" font-weight="700" fill="#ef4444" text-anchor="middle">경쟁사</text>

  <!-- Microsoft box -->
  <rect x="520" y="128" width="240" height="42" rx="8" fill="#2b0d0d" stroke="#ef4444" stroke-width="1.5"/>
  <text x="640" y="154" font-size="14" font-weight="700" fill="#ef4444" text-anchor="middle"> Microsoft Azure</text>

  <!-- Amazon box -->
  <rect x="520" y="192" width="240" height="42" rx="8" fill="#2b0d0d" stroke="#ef4444" stroke-width="1.5"/>
  <text x="640" y="218" font-size="14" font-weight="700" fill="#ef4444" text-anchor="middle"> Amazon AWS</text>

  <!-- Arrows from center to right (competition) -->
  <line x1="490" y1="165" x2="520" y2="155" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowRed)"/>
  <line x1="490" y1="185" x2="520" y2="205" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowRed)"/>

  <!-- MSFT possibly joining note -->
  <text x="400" y="258" font-size="10" fill="#64748b" text-anchor="middle">* MSFT 합류 가능성 검토 중</text>

  <!-- Key Events y:275-385 -->
  <text x="400" y="278" font-size="12" fill="#64748b" text-anchor="middle">주요 이벤트</text>

  <!-- Row 1 y:290 -->
  <rect x="40" y="285" width="720" height="36" rx="8" fill="#0d1a2b" stroke="#60a5fa" stroke-width="1"/>
  <rect x="40" y="285" width="5" height="36" rx="2" fill="#60a5fa"/>
  <text x="57" y="308" font-size="12" fill="#e2e8f0">Apple·Google·NVDA AI 클라우드 공동 대응 — 연합 구성 확인</text>

  <!-- Row 2 y:330 -->
  <rect x="40" y="329" width="720" height="36" rx="8" fill="#0d1a2b" stroke="#00e5a0" stroke-width="1"/>
  <rect x="40" y="329" width="5" height="36" rx="2" fill="#00e5a0"/>
  <text x="57" y="352" font-size="12" fill="#e2e8f0">NVDA, Intel에 2028칩 제조 대규모 발주 — 파운드리 다변화</text>

  <!-- Row 3 y:370 -->
  <rect x="40" y="373" width="720" height="36" rx="8" fill="#0d1a2b" stroke="#ef4444" stroke-width="1"/>
  <rect x="40" y="373" width="5" height="36" rx="2" fill="#ef4444"/>
  <text x="57" y="396" font-size="12" fill="#e2e8f0">외국인 한국 주식 대규모 매도 — $9억+ 순매도 기록</text>

  <!-- Source -->
  <text x="400" y="450" font-size="11" fill="#475569" text-anchor="middle">investus.kr</text>
</svg>
