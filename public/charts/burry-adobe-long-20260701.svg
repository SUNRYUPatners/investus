<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#1a0f00"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="dropLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="70%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#4ade80"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <circle cx="900" cy="200" r="280" fill="#f97316" opacity="0.04"/>
  <circle cx="150" cy="800" r="220" fill="#f97316" opacity="0.04"/>

  <!-- Header -->
  <rect x="0" y="0" width="1080" height="90" fill="#f97316" opacity="0.1"/>
  <rect x="0" y="88" width="1080" height="2" fill="#f97316" opacity="0.6"/>
  <text x="54" y="52" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#f97316" letter-spacing="4">INVESTUS DAILY REPORT</text>
  <rect x="870" y="26" width="160" height="36" rx="18" fill="#f97316" opacity="0.2"/>
  <rect x="870" y="26" width="160" height="36" rx="18" fill="none" stroke="#f97316" stroke-width="1.5"/>
  <text x="950" y="49" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#f97316" text-anchor="middle">2026.07.01</text>

  <!-- Title -->
  <text x="54" y="148" font-family="Arial,sans-serif" font-size="42" font-weight="900" fill="#ffffff">MICHAEL BURRY</text>
  <text x="54" y="194" font-family="Arial,sans-serif" font-size="24" font-weight="700" fill="#f97316">Adobe $ADBE 롱 포지션 · 역발상 매수</text>

  <!-- CONTRARIAN BUY badge -->
  <rect x="54" y="214" width="230" height="40" rx="10" fill="#f97316"/>
  <text x="169" y="240" font-family="Arial,sans-serif" font-size="16" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="2">CONTRARIAN BUY</text>

  <!-- Burry + Adobe combo -->
  <rect x="54" y="278" width="440" height="280" rx="16" fill="#1c1008" stroke="#f97316" stroke-width="2"/>
  <text x="274" y="370" font-family="Arial,sans-serif" font-size="80" text-anchor="middle">🐻</text>
  <text x="274" y="430" font-family="Arial,sans-serif" font-size="22" font-weight="900" fill="#f97316" text-anchor="middle">MICHAEL BURRY</text>
  <text x="274" y="458" font-family="Arial,sans-serif" font-size="14" fill="#9ca3af" text-anchor="middle">'The Big Short' 주인공</text>
  <text x="274" y="482" font-family="Arial,sans-serif" font-size="14" fill="#9ca3af" text-anchor="middle">역발상 투자 전략</text>
  <text x="274" y="538" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">$ADBE 롱 포지션 진입</text>

  <!-- Key stats -->
  <rect x="534" y="278" width="492" height="280" rx="16" fill="#1c1008" stroke="#f97316" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="780" y="322" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#9ca3af" text-anchor="middle" letter-spacing="2">ADBE 핵심 지표</text>

  <!-- Current price -->
  <text x="780" y="372" font-family="Arial,sans-serif" font-size="14" fill="#9ca3af" text-anchor="middle">현재가</text>
  <text x="780" y="415" font-family="Arial,sans-serif" font-size="48" font-weight="900" fill="#f97316" text-anchor="middle">$204.62</text>

  <!-- 110 day streak -->
  <rect x="564" y="438" width="230" height="60" rx="10" fill="#ef4444" opacity="0.2"/>
  <rect x="564" y="438" width="230" height="60" rx="10" fill="none" stroke="#ef4444" stroke-width="1.5"/>
  <text x="679" y="463" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#ef4444" text-anchor="middle">110일 연속 하락</text>
  <text x="679" y="486" font-family="Arial,sans-serif" font-size="12" fill="#fca5a5" text-anchor="middle">해당 기간 -34%</text>

  <!-- Drop: current recovery -->
  <text x="780" y="536" font-family="Arial,sans-serif" font-size="28" font-weight="900" fill="#ef4444" text-anchor="middle">-34%</text>
  <text x="780" y="555" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">110일 하락분</text>

  <!-- Price chart: drop then slight bounce arrow -->
  <text x="540" y="612" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#9ca3af" text-anchor="middle" letter-spacing="2">$ADBE 주가 흐름 (하락 후 Burry 매수)</text>

  <rect x="54" y="632" width="972" height="230" rx="14" fill="#0d100a" stroke="#374151" stroke-width="1"/>

  <!-- Grid lines -->
  <line x1="80" y1="700" x2="1000" y2="700" stroke="#1f2937" stroke-width="1"/>
  <line x1="80" y1="740" x2="1000" y2="740" stroke="#1f2937" stroke-width="1"/>
  <line x1="80" y1="780" x2="1000" y2="780" stroke="#1f2937" stroke-width="1"/>
  <line x1="80" y1="820" x2="1000" y2="820" stroke="#1f2937" stroke-width="1"/>

  <!-- Price drop line -->
  <polyline points="80,660 200,670 300,680 400,700 500,720 600,740 700,760 800,790 860,820 900,820"
    fill="none" stroke="#ef4444" stroke-width="3" stroke-linejoin="round"/>

  <!-- Burry entry and slight bounce -->
  <polyline points="900,820 940,810 980,800 1000,790"
    fill="none" stroke="#4ade80" stroke-width="3" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Burry entry marker -->
  <circle cx="900" cy="820" r="8" fill="#f97316" filter="url(#glow)"/>
  <line x1="900" y1="640" x2="900" y2="820" stroke="#f97316" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="900" y="652" font-family="Arial,sans-serif" font-size="11" fill="#f97316" text-anchor="middle">Burry 매수</text>

  <!-- Footer -->
  <rect x="0" y="990" width="1080" height="90" fill="#f97316" opacity="0.1"/>
  <rect x="0" y="990" width="1080" height="2" fill="#f97316" opacity="0.5"/>
  <text x="540" y="1030" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#f97316" text-anchor="middle">110일 연속 하락 -34% · Burry 역발상 저가 매수 포지션 진입</text>
  <text x="540" y="1058" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">INVESTUS · 2026.07.01 · 투자 참고용</text>
</svg>
