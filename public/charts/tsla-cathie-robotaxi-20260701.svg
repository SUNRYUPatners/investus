<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#0a0f1e"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="barFrom" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#374151"/>
      <stop offset="100%" style="stop-color:#1f2937"/>
    </linearGradient>
    <linearGradient id="barTo" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#7f1d1d"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect width="1080" height="1080" fill="none" stroke="#1f2937" stroke-width="2"/>
  <rect x="0" y="0" width="1080" height="4" fill="url(#redGrad)"/>

  <!-- Header -->
  <text x="540" y="62" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#6b7280" text-anchor="middle" letter-spacing="3">INVESTUS DAILY REPORT</text>
  <text x="540" y="102" font-family="Arial,sans-serif" font-size="29" font-weight="900" fill="#f9fafb" text-anchor="middle">TSLA · Cathie Wood Robotaxi TAM</text>

  <rect x="396" y="118" width="288" height="34" rx="17" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="540" y="140" font-family="Arial,sans-serif" font-size="14" font-weight="600" fill="#9ca3af" text-anchor="middle" letter-spacing="2">2026.07.01</text>

  <!-- ARK Badge -->
  <rect x="80" y="165" width="160" height="44" rx="22" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="160" y="192" font-family="Arial Black,sans-serif" font-size="18" font-weight="900" fill="#f59e0b" text-anchor="middle">ARK INVEST</text>

  <rect x="840" y="165" width="160" height="44" rx="22" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="1.5"/>
  <text x="920" y="192" font-family="Arial Black,sans-serif" font-size="18" font-weight="900" fill="#ef4444" text-anchor="middle">CATHIE WOOD</text>

  <!-- TAM Growth Bar Chart -->
  <text x="540" y="238" font-family="Arial,sans-serif" font-size="16" font-weight="700" fill="#6b7280" text-anchor="middle" letter-spacing="2">ROBOTAXI TAM GROWTH</text>

  <!-- Chart baseline -->
  <line x1="200" y1="490" x2="880" y2="490" stroke="#374151" stroke-width="1"/>

  <!-- $18B bar -->
  <rect x="260" y="340" width="180" height="150" rx="8" fill="url(#barFrom)"/>
  <text x="350" y="328" font-family="Arial,sans-serif" font-size="14" fill="#9ca3af" text-anchor="middle">TODAY</text>
  <text x="350" y="475" font-family="Arial Black,sans-serif" font-size="28" font-weight="900" fill="#9ca3af" text-anchor="middle">$18B</text>
  <text x="350" y="510" font-family="Arial,sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">Current TAM</text>

  <!-- Arrow -->
  <text x="540" y="415" font-family="Arial,sans-serif" font-size="52" fill="#f59e0b" text-anchor="middle">→</text>
  <text x="540" y="455" font-family="Arial Black,sans-serif" font-size="22" font-weight="900" fill="#f59e0b" text-anchor="middle">3×</text>

  <!-- $57B bar -->
  <rect x="640" y="240" width="180" height="250" rx="8" fill="url(#barTo)"/>
  <text x="730" y="228" font-family="Arial,sans-serif" font-size="14" fill="#ef4444" text-anchor="middle" font-weight="700">ROBOTAXI ERA</text>
  <text x="730" y="460" font-family="Arial Black,sans-serif" font-size="36" font-weight="900" fill="#ef4444" text-anchor="middle" filter="url(#softGlow)">$57B</text>
  <text x="730" y="510" font-family="Arial,sans-serif" font-size="12" fill="#ef4444" text-anchor="middle">Projected TAM</text>

  <!-- Margin Transformation -->
  <rect x="80" y="540" width="920" height="100" rx="12" fill="#0f172a" stroke="#1f2937" stroke-width="1.5"/>
  <text x="540" y="570" font-family="Arial,sans-serif" font-size="13" fill="#6b7280" text-anchor="middle" letter-spacing="2">TESLA MARGIN TRANSFORMATION</text>

  <!-- Current margin bar -->
  <rect x="110" y="582" width="760" height="20" rx="10" fill="#1f2937"/>
  <rect x="110" y="582" width="122" height="20" rx="10" fill="#60a5fa"/>
  <text x="240" y="596" font-family="Arial,sans-serif" font-size="11" fill="#60a5fa">16% NOW</text>

  <!-- Robotaxi margin bar -->
  <rect x="110" y="612" width="760" height="20" rx="10" fill="#1f2937"/>
  <rect x="110" y="612" width="608" height="20" rx="10" fill="#ef4444"/>
  <text x="726" y="626" font-family="Arial,sans-serif" font-size="11" fill="#ef4444">80-90% ROBOTAXI</text>

  <!-- Key insight cards -->
  <rect x="80" y="660" width="280" height="110" rx="12" fill="#0f172a" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="220" y="692" font-family="Arial,sans-serif" font-size="12" fill="#60a5fa" text-anchor="middle">현재 마진</text>
  <text x="220" y="734" font-family="Arial Black,sans-serif" font-size="42" font-weight="900" fill="#60a5fa" text-anchor="middle">16%</text>
  <text x="220" y="758" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">Current Gross Margin</text>

  <rect x="400" y="660" width="280" height="110" rx="12" fill="#0f172a" stroke="#7f1d1d" stroke-width="1.5"/>
  <text x="540" y="692" font-family="Arial,sans-serif" font-size="12" fill="#ef4444" text-anchor="middle">Robotaxi 마진</text>
  <text x="540" y="734" font-family="Arial Black,sans-serif" font-size="38" font-weight="900" fill="#ef4444" text-anchor="middle">80-90%</text>
  <text x="540" y="758" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">Projected Gross Margin</text>

  <rect x="720" y="660" width="280" height="110" rx="12" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="860" y="692" font-family="Arial,sans-serif" font-size="12" fill="#f59e0b" text-anchor="middle">FSD EU 승인</text>
  <text x="860" y="726" font-family="Arial Black,sans-serif" font-size="20" font-weight="900" fill="#f59e0b" text-anchor="middle">IMMINENT</text>
  <text x="860" y="750" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">EU Regulatory</text>
  <text x="860" y="764" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">Approval Pending</text>

  <!-- Margin arrow visualization -->
  <text x="540" y="830" font-family="Arial,sans-serif" font-size="15" fill="#9ca3af" text-anchor="middle" font-weight="700">MARGIN LEAP</text>
  <text x="300" y="870" font-family="Arial Black,sans-serif" font-size="36" font-weight="900" fill="#60a5fa" text-anchor="middle">16%</text>
  <text x="540" y="870" font-family="Arial,sans-serif" font-size="44" fill="#f59e0b" text-anchor="middle">→</text>
  <text x="780" y="870" font-family="Arial Black,sans-serif" font-size="36" font-weight="900" fill="#ef4444" text-anchor="middle">80%+</text>

  <text x="540" y="930" font-family="Arial,sans-serif" font-size="13" fill="#374151" text-anchor="middle">ARK Invest Cathie Wood · Robotaxi TAM $18B→$57B · 2026.07.01</text>

  <rect x="0" y="1060" width="1080" height="20" fill="url(#redGrad)" opacity="0.4"/>
  <text x="540" y="1073" font-family="Arial,sans-serif" font-size="10" fill="#6b7280" text-anchor="middle" letter-spacing="2">INVESTUS · TSLA RESEARCH · NOT FINANCIAL ADVICE</text>
</svg>
