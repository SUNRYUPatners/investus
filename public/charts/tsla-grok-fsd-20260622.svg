<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="800" height="440" style="background:#0d1117;font-family:'Apple SD Gothic Neo',sans-serif">
  <rect width="800" height="440" rx="12" fill="#0d1117"/>
  <text x="400" y="36" text-anchor="middle" fill="#00e5a0" font-size="13" font-weight="700">TSLA · Tesla FSD + Grok</text>
  <text x="400" y="62" text-anchor="middle" fill="#e6edf3" font-size="20" font-weight="700">Grok + FSD 자연어 제어 — 3개월 내 적용 예고</text>
  <text x="400" y="84" text-anchor="middle" fill="#7d8590" font-size="13">"세계 최고 수준의 AI 운전기사" · 음성으로 FSD 조작</text>
  <line x1="40" y1="96" x2="760" y2="96" stroke="#21262d" stroke-width="1"/>

  <!-- Grok + FSD visual -->
  <rect x="40" y="110" width="330" height="110" rx="8" fill="#161b22"/>
  <text x="205" y="140" text-anchor="middle" fill="#c084fc" font-size="18" font-weight="700">Grok AI</text>
  <text x="205" y="162" text-anchor="middle" fill="#7d8590" font-size="12">xAI 대화형 AI 엔진</text>
  <text x="205" y="184" text-anchor="middle" fill="#e6edf3" font-size="13">자연어 이해·명령 생성</text>
  <text x="205" y="204" text-anchor="middle" fill="#7d8590" font-size="11">실시간 컨텍스트 처리</text>

  <!-- + sign -->
  <text x="400" y="175" text-anchor="middle" fill="#00e5a0" font-size="32" font-weight="800">+</text>

  <rect x="430" y="110" width="330" height="110" rx="8" fill="#161b22"/>
  <text x="595" y="140" text-anchor="middle" fill="#00e5a0" font-size="18" font-weight="700">FSD v14+</text>
  <text x="595" y="162" text-anchor="middle" fill="#7d8590" font-size="12">Tesla 완전 자율주행</text>
  <text x="595" y="184" text-anchor="middle" fill="#e6edf3" font-size="13">Vision 기반 주행 AI</text>
  <text x="595" y="204" text-anchor="middle" fill="#7d8590" font-size="11">글로벌 도로 데이터 학습</text>

  <!-- Arrow down -->
  <polygon points="400,228 390,244 410,244" fill="#00e5a0"/>
  <line x1="400" y1="220" x2="400" y2="244" stroke="#00e5a0" stroke-width="2"/>

  <!-- Result box -->
  <rect x="180" y="252" width="440" height="60" rx="8" fill="#0d2010" stroke="#00e5a0" stroke-width="1.5"/>
  <text x="400" y="278" text-anchor="middle" fill="#00e5a0" font-size="16" font-weight="700">세계 최고 수준의 AI 운전기사</text>
  <text x="400" y="300" text-anchor="middle" fill="#7d8590" font-size="12">말 한마디로 목적지·경로·주차 제어</text>

  <!-- Example commands -->
  <rect x="40" y="328" width="720" height="80" rx="8" fill="#1c1f26"/>
  <text x="400" y="352" text-anchor="middle" fill="#00e5a0" font-size="13" font-weight="600">자연어 명령 예시</text>
  <text x="130" y="374" text-anchor="middle" fill="#e6edf3" font-size="13">"우측으로 돌아줘"</text>
  <text x="400" y="374" text-anchor="middle" fill="#e6edf3" font-size="13">"입구 앞에 내려줘"</text>
  <text x="670" y="374" text-anchor="middle" fill="#e6edf3" font-size="13">"조금 더 멀리 주차해"</text>
  <text x="400" y="396" text-anchor="middle" fill="#7d8590" font-size="11">Grok이 자연어를 파싱 → FSD가 실행 · 약 3개월 내 적용 (Mario Nawfal)</text>

  <line x1="40" y1="420" x2="760" y2="420" stroke="#21262d" stroke-width="1"/>
  <text x="400" y="434" text-anchor="middle" fill="#444c56" font-size="10">출처: Elon Polyz / Mario Nawfal · investus.kr</text>
</svg>
