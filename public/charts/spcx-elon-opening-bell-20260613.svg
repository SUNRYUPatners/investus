<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480">
  <rect width="480" height="480" fill="#0a0c10"/>
  <rect x="0" y="0" width="480" height="64" fill="#111318"/>
  <rect x="0" y="60" width="480" height="2" fill="#c084fc" opacity="0.4"/>
  <text x="24" y="26" font-family="Arial,sans-serif" font-size="11" fill="#c084fc" font-weight="bold">SPCX 특집 · IPO 데이</text>
  <text x="24" y="46" font-family="Arial,sans-serif" font-size="13" fill="#e5e7eb" font-weight="bold">Elon Musk 개장벨 타종 — SpaceX 공식 거래 시작</text>

  <!-- Opening bell moment -->
  <rect x="24" y="78" width="432" height="84" rx="12" fill="#1a0d2e" stroke="#c084fc" stroke-width="1.5" stroke-opacity="0.7"/>
  <text x="240" y="104" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">2026년 6월 12일 · 나스닥 개장</text>
  <text x="240" y="130" font-family="Arial,sans-serif" font-size="22" fill="#c084fc" font-weight="bold" text-anchor="middle">🔔 SpaceX (SPCX) 공식 거래 시작</text>
  <text x="240" y="152" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb" text-anchor="middle">Elon Musk 직접 나스닥 개장벨 타종</text>

  <!-- Timeline of IPO day -->
  <text x="24" y="188" font-family="Arial,sans-serif" font-size="12" fill="#6b7280" font-weight="bold">■ 6/12 IPO 데이 타임라인</text>

  <rect x="24" y="200" width="432" height="164" rx="10" fill="#111318"/>
  <!-- 9:30 -->
  <circle cx="48" cy="224" r="5" fill="#c084fc"/>
  <text x="62" y="228" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb" font-weight="bold">09:30 ET</text>
  <text x="160" y="228" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af">Elon, 개장벨 타종 · SPCX 첫 거래</text>
  <!-- line -->
  <line x1="48" y1="230" x2="48" y2="250" stroke="#374151" stroke-width="1" stroke-dasharray="3"/>
  <!-- open -->
  <circle cx="48" cy="254" r="5" fill="#60a5fa"/>
  <text x="62" y="258" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb" font-weight="bold">시가</text>
  <text x="160" y="258" font-family="Arial,sans-serif" font-size="12" fill="#60a5fa">$135.00 (공모가 그대로)</text>
  <line x1="48" y1="260" x2="48" y2="280" stroke="#374151" stroke-width="1" stroke-dasharray="3"/>
  <!-- intraday high -->
  <circle cx="48" cy="284" r="5" fill="#4ade80"/>
  <text x="62" y="288" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb" font-weight="bold">장중 고점</text>
  <text x="160" y="288" font-family="Arial,sans-serif" font-size="12" fill="#4ade80">$175.32 (약 +29.8%)</text>
  <line x1="48" y1="290" x2="48" y2="310" stroke="#374151" stroke-width="1" stroke-dasharray="3"/>
  <!-- close -->
  <circle cx="48" cy="314" r="6" fill="#c084fc"/>
  <text x="62" y="318" font-family="Arial,sans-serif" font-size="12" fill="#c084fc" font-weight="bold">16:00 종가</text>
  <text x="160" y="318" font-family="Arial,sans-serif" font-size="12" fill="#c084fc" font-weight="bold">$172.68 (+27.91%) ★</text>
  <line x1="48" y1="320" x2="48" y2="356" stroke="#374151" stroke-width="1" stroke-dasharray="3"/>
  <text x="62" y="348" font-family="Arial,sans-serif" font-size="11" fill="#6b7280">Morgan Stanley — 단독 주관사 · 안정화 에이전트</text>

  <!-- Context -->
  <rect x="24" y="378" width="432" height="72" rx="10" fill="#1a0d2e" stroke="#c084fc" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="40" y="400" font-family="Arial,sans-serif" font-size="12" fill="#9ca3af" font-weight="bold">■ 이날이 역사적인 이유</text>
  <text x="40" y="420" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">• $75B 역대 최대 규모 IPO 완성</text>
  <text x="40" y="440" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">• 민간 우주기업 최초 나스닥 상장</text>
  <text x="40" y="458" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af">• SpaceX 직원 4,000+ 동시 백만장자 탄생</text>

  <text x="240" y="474" font-family="Arial,sans-serif" font-size="10" fill="#4b5563" text-anchor="middle">2026.06.13 · Investus · 투자 참고용</text>
</svg>
