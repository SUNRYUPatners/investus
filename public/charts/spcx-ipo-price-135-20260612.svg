<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480">
  <rect width="480" height="480" fill="#0a0c10"/>
  <!-- Header -->
  <rect x="0" y="0" width="480" height="64" fill="#111318"/>
  <rect x="0" y="60" width="480" height="2" fill="#c084fc" opacity="0.3"/>
  <text x="24" y="26" font-family="Arial,sans-serif" font-size="11" fill="#c084fc" font-weight="bold">SPCX · 종목분석</text>
  <text x="24" y="46" font-family="Arial,sans-serif" font-size="14" fill="#e5e7eb" font-weight="bold">SpaceX IPO 공식 가격 $135 확정</text>

  <!-- IPO Price Card -->
  <rect x="24" y="80" width="200" height="110" rx="12" fill="#1a1020"/>
  <rect x="24" y="80" width="200" height="110" rx="12" fill="none" stroke="#c084fc" stroke-width="1" opacity="0.4"/>
  <text x="124" y="112" font-family="Arial,sans-serif" font-size="12" fill="#c084fc" text-anchor="middle" font-weight="bold">공모가</text>
  <text x="124" y="148" font-family="Arial,sans-serif" font-size="38" fill="#c084fc" text-anchor="middle" font-weight="bold">$135</text>
  <text x="124" y="170" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">/주 (나스닥 상장)</text>

  <!-- Market Cap Card -->
  <rect x="240" y="80" width="216" height="110" rx="12" fill="#0d1520"/>
  <rect x="240" y="80" width="216" height="110" rx="12" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.4"/>
  <text x="348" y="112" font-family="Arial,sans-serif" font-size="12" fill="#60a5fa" text-anchor="middle" font-weight="bold">기업가치</text>
  <text x="348" y="148" font-family="Arial,sans-serif" font-size="32" fill="#60a5fa" text-anchor="middle" font-weight="bold">$1.75T</text>
  <text x="348" y="170" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">역대 최대 규모 IPO</text>

  <!-- Key Details -->
  <text x="24" y="220" font-family="Arial,sans-serif" font-size="12" fill="#6b7280" font-weight="bold">■ IPO 핵심 조건</text>

  <!-- Row 1 -->
  <rect x="24" y="232" width="204" height="40" rx="8" fill="#111318"/>
  <text x="36" y="249" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af">공모 주식</text>
  <text x="36" y="265" font-family="Arial,sans-serif" font-size="13" fill="#e5e7eb" font-weight="bold">555,555,555주</text>

  <rect x="240" y="232" width="216" height="40" rx="8" fill="#111318"/>
  <text x="252" y="249" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af">상장 거래소</text>
  <text x="252" y="265" font-family="Arial,sans-serif" font-size="13" fill="#e5e7eb" font-weight="bold">NASDAQ</text>

  <!-- Row 2 -->
  <rect x="24" y="280" width="204" height="40" rx="8" fill="#111318"/>
  <text x="36" y="297" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af">상장일</text>
  <text x="36" y="313" font-family="Arial,sans-serif" font-size="13" fill="#e5e7eb" font-weight="bold">2026년 6월 12일(금)</text>

  <rect x="240" y="280" width="216" height="40" rx="8" fill="#111318"/>
  <text x="252" y="297" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af">주식분할</text>
  <text x="252" y="313" font-family="Arial,sans-serif" font-size="13" fill="#e5e7eb" font-weight="bold">5-for-1 완료</text>

  <!-- Row 3 -->
  <rect x="24" y="328" width="204" height="40" rx="8" fill="#111318"/>
  <text x="36" y="345" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af">총 공모 규모</text>
  <text x="36" y="361" font-family="Arial,sans-serif" font-size="13" fill="#e5e7eb" font-weight="bold">약 $75B</text>

  <rect x="240" y="328" width="216" height="40" rx="8" fill="#111318"/>
  <text x="252" y="345" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af">신용등급</text>
  <text x="252" y="361" font-family="Arial,sans-serif" font-size="13" fill="#e5e7eb" font-weight="bold">3대 기관 투자등급</text>

  <!-- Credit Badges -->
  <rect x="24" y="388" width="432" height="50" rx="10" fill="#1a1020" stroke="#c084fc" stroke-width="1" stroke-opacity="0.3"/>
  <text x="240" y="407" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">3대 신용평가사 동시 투자등급 획득</text>

  <rect x="40" y="416" width="80" height="16" rx="4" fill="rgba(192,132,252,0.15)"/>
  <text x="80" y="428" font-family="Arial,sans-serif" font-size="11" fill="#c084fc" text-anchor="middle" font-weight="bold">S&amp;P BBB-</text>

  <rect x="180" y="416" width="120" height="16" rx="4" fill="rgba(192,132,252,0.15)"/>
  <text x="240" y="428" font-family="Arial,sans-serif" font-size="11" fill="#c084fc" text-anchor="middle" font-weight="bold">Moody's Baa3</text>

  <rect x="360" y="416" width="80" height="16" rx="4" fill="rgba(192,132,252,0.15)"/>
  <text x="400" y="428" font-family="Arial,sans-serif" font-size="11" fill="#c084fc" text-anchor="middle" font-weight="bold">Fitch BBB-</text>

  <!-- Footer -->
  <text x="240" y="468" font-family="Arial,sans-serif" font-size="10" fill="#4b5563" text-anchor="middle">2026.06.12 · Investus · 투자 참고용</text>
</svg>
