<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 490" width="800" height="490" style="background:#0d1117;font-family:'Apple SD Gothic Neo',sans-serif">
  <rect width="800" height="490" rx="12" fill="#0d1117"/>
  <text x="400" y="36" text-anchor="middle" fill="#00e5a0" font-size="13" font-weight="700">TSLA · Tesla Optimus</text>
  <text x="400" y="62" text-anchor="middle" fill="#e6edf3" font-size="20" font-weight="700">프리몬트 7~8월 양산 시작 — Model S/X 라인 전환</text>
  <text x="400" y="84" text-anchor="middle" fill="#7d8590" font-size="13">Elon Musk 직접 확인 · 연간 1M대 목표 · 오스틴 10M대 장기 계획</text>
  <line x1="40" y1="96" x2="760" y2="96" stroke="#21262d" stroke-width="1"/>

  <!-- Timeline -->
  <rect x="40" y="114" width="720" height="80" rx="8" fill="#161b22"/>
  <rect x="40" y="114" width="720" height="4" rx="2" fill="#00e5a0"/>

  <!-- Timeline dots and labels -->
  <circle cx="160" cy="154" r="8" fill="#444c56"/>
  <text x="160" y="182" text-anchor="middle" fill="#7d8590" font-size="11">2025</text>
  <text x="160" y="196" text-anchor="middle" fill="#7d8590" font-size="10">내부 테스트</text>

  <line x1="168" y1="154" x2="272" y2="154" stroke="#444c56" stroke-width="2"/>

  <circle cx="280" cy="154" r="8" fill="#444c56"/>
  <text x="280" y="182" text-anchor="middle" fill="#7d8590" font-size="11">2026 Q1</text>
  <text x="280" y="196" text-anchor="middle" fill="#7d8590" font-size="10">Tesla 공장</text>

  <line x1="288" y1="154" x2="412" y2="154" stroke="#00e5a0" stroke-width="2"/>

  <circle cx="420" cy="154" r="10" fill="#00e5a0"/>
  <text x="420" y="182" text-anchor="middle" fill="#00e5a0" font-size="11" font-weight="700">7~8월</text>
  <text x="420" y="196" text-anchor="middle" fill="#00e5a0" font-size="10" font-weight="700">프리몬트 양산</text>

  <line x1="430" y1="154" x2="554" y2="154" stroke="#444c56" stroke-width="2" stroke-dasharray="4,3"/>

  <circle cx="560" cy="154" r="8" fill="#1c3d29"/>
  <text x="560" y="182" text-anchor="middle" fill="#7d8590" font-size="11">2027</text>
  <text x="560" y="196" text-anchor="middle" fill="#7d8590" font-size="10">외부 판매</text>

  <line x1="568" y1="154" x2="662" y2="154" stroke="#444c56" stroke-width="2" stroke-dasharray="4,3"/>

  <circle cx="670" cy="154" r="8" fill="#1c3d29"/>
  <text x="670" y="182" text-anchor="middle" fill="#7d8590" font-size="11">장기</text>
  <text x="670" y="196" text-anchor="middle" fill="#7d8590" font-size="10">10M대/년</text>

  <!-- Production targets -->
  <rect x="40" y="210" width="348" height="130" rx="8" fill="#161b22"/>
  <rect x="40" y="210" width="348" height="4" rx="2" fill="#00e5a0"/>
  <text x="214" y="238" text-anchor="middle" fill="#00e5a0" font-size="13" font-weight="600">프리몬트 라인 전환</text>
  <text x="60" y="262" fill="#e6edf3" font-size="12">Former Model S/X 생산 라인 재활용</text>
  <text x="60" y="284" fill="#e6edf3" font-size="12">Optimus 연간 1M대 목표</text>
  <text x="60" y="306" fill="#7d8590" font-size="11">7월~8월 첫 생산 배치 출하 예정</text>
  <text x="60" y="326" fill="#7d8590" font-size="11">Elon 직접 Twitter/X 확인</text>

  <rect x="412" y="210" width="348" height="130" rx="8" fill="#161b22"/>
  <rect x="412" y="210" width="348" height="4" rx="2" fill="#00e5a0"/>
  <text x="586" y="238" text-anchor="middle" fill="#00e5a0" font-size="13" font-weight="600">오스틴 2공장 계획</text>
  <text x="432" y="262" fill="#e6edf3" font-size="12">오스틴 전용 Optimus 공장 추가</text>
  <text x="432" y="284" fill="#e6edf3" font-size="12">장기 연산 10M대 목표</text>
  <text x="432" y="306" fill="#7d8590" font-size="11">프리몬트 1M + 오스틴 합산</text>
  <text x="432" y="326" fill="#7d8590" font-size="11">로봇 사업 매출 $25~250B 시나리오</text>

  <!-- Financial impact -->
  <rect x="40" y="356" width="720" height="78" rx="8" fill="#1c1026"/>
  <text x="400" y="382" text-anchor="middle" fill="#00e5a0" font-size="13" font-weight="600">재무 임팩트 시나리오</text>
  <text x="400" y="404" text-anchor="middle" fill="#e6edf3" font-size="12">10만대 × $25,000 = $25억 · 100만대 = $250억 · P/S 10x → $2,500억 가치</text>
  <text x="400" y="422" text-anchor="middle" fill="#7d8590" font-size="11">Tesla 자동차 사업 외 추가 밸류에이션 재평가 트리거</text>

  <line x1="40" y1="446" x2="760" y2="446" stroke="#21262d" stroke-width="1"/>
  <text x="400" y="462" text-anchor="middle" fill="#444c56" font-size="10">출처: Elon Musk Twitter/X · investus.kr</text>
</svg>
