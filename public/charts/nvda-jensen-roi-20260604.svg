<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" font-family="'Segoe UI',Arial,sans-serif">
  <rect width="800" height="440" fill="#0a0f1e"/>
  <rect x="0" y="0" width="800" height="52" fill="#111827"/>
  <text x="30" y="32" font-size="15" font-weight="700" fill="#76c442">💡 Jensen Huang — "AI ROI, 이미 실현되고 있다"</text>
  <text x="30" y="47" font-size="10" fill="#6b7280">금융기관 비공개 행사 · AI 인프라 레이어 · 2026.06.04</text>

  <!-- Quote block -->
  <rect x="30" y="65" width="740" height="130" rx="12" fill="#0d1a0d" stroke="#76c442" stroke-width="1.5"/>
  <!-- Big quote marks -->
  <text x="60" y="118" font-size="80" fill="#76c442" opacity="0.2" font-family="Georgia,serif">"</text>
  <text x="100" y="110" font-size="18" font-weight="800" fill="white" text-anchor="middle" transform="translate(200,0)">
    지난 6개월, ROI는 완전히 실현되고 있다
  </text>
  <text x="400" y="133" font-size="13" fill="#9ca3af" text-anchor="middle">Only for the last six months has the ROI been completely real.</text>
  <text x="400" y="153" font-size="13" fill="#9ca3af" text-anchor="middle">It is now immensely profitable.</text>
  <text x="400" y="177" font-size="10" fill="#76c442" text-anchor="middle">— Jensen Huang, NVIDIA CEO · 금융기관 비공개 행사 (2026.06)</text>

  <!-- Timeline: ROI journey -->
  <rect x="30" y="210" width="740" height="110" rx="12" fill="#111827"/>
  <text x="400" y="232" font-size="11" font-weight="700" fill="#76c442" text-anchor="middle">AI 투자 → ROI 실현 타임라인</text>

  <!-- Timeline line -->
  <line x1="80" y1="285" x2="720" y2="285" stroke="#374151" stroke-width="2"/>

  <!-- Points on timeline -->
  <!-- 2022: AI investment start -->
  <circle cx="100" cy="285" r="8" fill="#1f2937" stroke="#6b7280" stroke-width="2"/>
  <text x="100" y="270" font-size="8" fill="#6b7280" text-anchor="middle">2022</text>
  <text x="100" y="305" font-size="8" fill="#6b7280" text-anchor="middle">AI 투자 시작</text>
  <text x="100" y="317" font-size="7" fill="#4b5563" text-anchor="middle">ChatGPT 출시</text>

  <!-- 2023: Nvidia GPU rush -->
  <circle cx="230" cy="285" r="8" fill="#1f2937" stroke="#6b7280" stroke-width="2"/>
  <text x="230" y="270" font-size="8" fill="#6b7280" text-anchor="middle">2023</text>
  <text x="230" y="305" font-size="8" fill="#6b7280" text-anchor="middle">GPU 폭발 수요</text>
  <text x="230" y="317" font-size="7" fill="#4b5563" text-anchor="middle">H100 품귀</text>

  <!-- 2024: Scale up -->
  <circle cx="390" cy="285" r="8" fill="#1f2937" stroke="#76c442" stroke-width="2"/>
  <text x="390" y="270" font-size="8" fill="#9ca3af" text-anchor="middle">2024</text>
  <text x="390" y="305" font-size="8" fill="#9ca3af" text-anchor="middle">인프라 확장</text>
  <text x="390" y="317" font-size="7" fill="#6b7280" text-anchor="middle">ROI 불분명 논란</text>

  <!-- 2025 H2: ROI starts -->
  <circle cx="560" cy="285" r="10" fill="#76c442" opacity="0.8"/>
  <text x="560" y="268" font-size="8" fill="#76c442" text-anchor="middle" font-weight="700">2025 H2</text>
  <text x="560" y="305" font-size="8" fill="#76c442" text-anchor="middle" font-weight="700">ROI 실현 시작</text>
  <text x="560" y="317" font-size="7" fill="#4ade80" text-anchor="middle">Jensen 확인</text>

  <!-- Now: Immensely profitable -->
  <circle cx="710" cy="285" r="12" fill="#76c442"/>
  <text x="710" y="268" font-size="8" fill="#76c442" text-anchor="middle" font-weight="700">2026 現在</text>
  <text x="710" y="305" font-size="8" fill="white" text-anchor="middle" font-weight="800">엄청난 수익</text>
  <text x="710" y="317" font-size="7" fill="#4ade80" text-anchor="middle">Immensely Profitable</text>

  <!-- Arrow indicating growth direction -->
  <polyline points="100,278 230,275 390,270 560,262 710,248"
            stroke="#76c442" stroke-width="1.5" fill="none" stroke-dasharray="4 2"/>

  <!-- Context -->
  <rect x="30" y="335" width="740" height="80" rx="12" fill="#111827"/>
  <text x="400" y="357" font-size="11" font-weight="700" fill="#c084fc" text-anchor="middle">배경 — AI 인프라 투자 ROI 논쟁</text>

  <rect x="50" y="366" width="340" height="36" rx="8" fill="#0d1117"/>
  <text x="220" y="381" font-size="9" fill="#ef4444" text-anchor="middle">🐻 베어 주장 (과거)</text>
  <text x="220" y="395" font-size="9" fill="#9ca3af" text-anchor="middle">"AI에 수백조 쏟아붓는데 ROI가 있느냐?"</text>

  <rect x="405" y="366" width="340" height="36" rx="8" fill="#0d1a0d"/>
  <text x="575" y="381" font-size="9" fill="#76c442" text-anchor="middle">✅ Jensen 답변 (현재)</text>
  <text x="575" y="395" font-size="9" fill="#9ca3af" text-anchor="middle">"6개월 전부터 ROI 완전히 실현 · 엄청난 수익"</text>

  <text x="770" y="430" font-size="9" fill="#6b7280">investus.kr</text>
</svg>
