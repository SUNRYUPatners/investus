  <text x="316" y="312" font-family="Arial,sans-serif" font-size="11" fill="#6b7280">(Semiconductor</text>
  <text x="316" y="328" font-family="Arial,sans-serif" font-size="11" fill="#6b7280">Industry Assoc.)</text>
  <text x="316" y="352" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af">AI칩 수요 주도</text>
