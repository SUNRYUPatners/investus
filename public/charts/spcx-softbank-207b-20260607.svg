<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" style="background:#0a0c10;font-family:'Helvetica Neue',Arial,sans-serif">
  <rect width="800" height="440" fill="#0a0c10"/>
  <defs>
    <linearGradient id="pur3" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#9333ea"/><stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
  </defs>
  <rect x="30" y="24" width="10" height="36" rx="3" fill="url(#pur3)"/>
  <text x="50" y="42" fill="#c084fc" font-size="11" font-weight="700" letter-spacing="2">SPACEX CLOUD REVENUE</text>
  <text x="50" y="58" fill="white" font-size="18" font-weight="800">구글 + 앤트로픽 합산 $2.07B/월</text>
  <text x="700" y="44" fill="#c084fc" font-size="11" font-weight="600" text-anchor="end">2026.06.07</text>
  <line x1="30" y1="76" x2="770" y2="76" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>

  <!-- total -->
  <rect x="30" y="90" width="740" height="80" rx="12" fill="#c084fc" fill-opacity="0.1" stroke="#c084fc" stroke-opacity="0.3"/>
  <text x="400" y="128" fill="white" font-size="48" font-weight="900" text-anchor="middle">$2,070,000,000</text>
  <text x="400" y="156" fill="#c084fc" font-size="14" font-weight="700" text-anchor="middle">SpaceX 클라우드 월 수익 합산 (구글 + 앤트로픽)</text>

  <!-- two bars -->
  <text x="30" y="206" fill="rgba(255,255,255,0.4)" font-size="11" font-weight="700" letter-spacing="1">고객별 월 계약금</text>

  <!-- Google bar -->
  <rect x="30" y="218" width="340" height="80" rx="10" fill="#4285f4" fill-opacity="0.1" stroke="#4285f4" stroke-opacity="0.2"/>
  <text x="50" y="244" fill="#93c5fd" font-size="12" font-weight="700">🔵 Google LLC</text>
  <text x="50" y="272" fill="white" font-size="28" font-weight="900">$920M<tspan fill="rgba(255,255,255,0.4)" font-size="13" font-weight="500">/월</tspan></text>
  <text x="50" y="290" fill="rgba(255,255,255,0.4)" font-size="11">110,000 NVIDIA GPU · 2026.10~2029.06 · S-1 공시</text>

  <!-- Anthropic bar -->
  <rect x="390" y="218" width="380" height="80" rx="10" fill="#e879f9" fill-opacity="0.1" stroke="#e879f9" stroke-opacity="0.2"/>
  <text x="410" y="244" fill="#f0abfc" font-size="12" font-weight="700">🟣 Anthropic</text>
  <text x="410" y="272" fill="white" font-size="28" font-weight="900">$1,150M<tspan fill="rgba(255,255,255,0.4)" font-size="13" font-weight="500">/월 (추정)</tspan></text>
  <text x="410" y="290" fill="rgba(255,255,255,0.4)" font-size="11">Claude AI 클라우드 컴퓨팅 · Papù 분석 추정</text>

  <!-- annualized -->
  <text x="30" y="330" fill="rgba(255,255,255,0.4)" font-size="11" font-weight="700" letter-spacing="1">연간 환산</text>
  <rect x="30" y="340" width="222" height="56" rx="8" fill="rgba(255,255,255,0.04)"/>
  <text x="50" y="362" fill="rgba(255,255,255,0.5)" font-size="11">구글 연간</text>
  <text x="50" y="385" fill="white" font-size="22" font-weight="800">$11.0B</text>
  <rect x="264" y="340" width="222" height="56" rx="8" fill="rgba(255,255,255,0.04)"/>
  <text x="284" y="362" fill="rgba(255,255,255,0.5)" font-size="11">앤트로픽 연간 (추정)</text>
  <text x="284" y="385" fill="white" font-size="22" font-weight="800">$13.8B</text>
  <rect x="498" y="340" width="272" height="56" rx="8" fill="#c084fc" fill-opacity="0.08" stroke="#c084fc" stroke-opacity="0.2"/>
  <text x="518" y="362" fill="#c084fc" font-size="11" font-weight="700">합산 연간 ARR</text>
  <text x="518" y="385" fill="white" font-size="22" font-weight="800">$24.8B</text>

  <text x="400" y="430" fill="rgba(255,255,255,0.2)" font-size="10" text-anchor="middle">Investus · investus.kr</text>
</svg>
