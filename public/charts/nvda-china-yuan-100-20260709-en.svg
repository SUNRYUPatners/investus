      <stop offset="0%" style="stop-color:#040a14"/>
      <stop offset="100%" style="stop-color:#0a1020"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f87171"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect x="60" y="60" width="960" height="4" fill="url(#redGrad)" rx="2"/>

  <rect x="60" y="86" width="80" height="34" rx="8" fill="#991b1b"/>
  <text x="100" y="109" font-family="Arial Black, Arial" font-weight="900" font-size="13" fill="#ffffff" text-anchor="middle">NVDA</text>
  <rect x="152" y="86" width="150" height="34" rx="8" fill="none" stroke="#f87171" stroke-width="1.5"/>
  <text x="227" y="109" font-family="Arial, sans-serif" font-weight="700" font-size="12" fill="#f87171" text-anchor="middle">China Talks</text>
  <text x="1020" y="109" font-family="Arial, sans-serif" font-size="14" fill="#374151" text-anchor="end">2026.07.09</text>

  <text x="540" y="178" font-family="Arial Black, Arial" font-weight="900" font-size="20" fill="#ffffff" text-anchor="middle">China Asks to Let Top AI Firms Buy Limited NVDA H200 GPUs</text>
  <text x="540" y="278" font-family="Arial Black, Arial" font-weight="900" font-size="92" fill="#f87171" text-anchor="middle">H200</text>
  <text x="540" y="326" font-family="Arial Black, Arial" font-weight="900" font-size="28" fill="#ef4444" text-anchor="middle">Limited purchase approval requested (via PBOC)</text>
  <text x="540" y="366" font-family="Arial, sans-serif" font-size="18" fill="#9ca3af" text-anchor="middle">Shay Boloor · aims to ease China's AI training chip shortage</text>

  <rect x="80" y="398" width="920" height="110" rx="16" fill="#1a0a0a" stroke="#f87171" stroke-width="1.5"/>
  <text x="540" y="434" font-family="Arial Black, Arial" font-weight="900" font-size="16" fill="#f87171" text-anchor="middle">What Was Requested</text>
  <text x="540" y="464" font-family="Arial, sans-serif" font-size="15" fill="#fecaca" text-anchor="middle">Top China AI firms · limited number of NVDA H200 GPUs · approval pending</text>
  <text x="540" y="490" font-family="Arial, sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">Ease training workload bottleneck · inference remains on domestic processors</text>

  <rect x="80" y="530" width="440" height="130" rx="14" fill="#1a0a0a" stroke="#f87171" stroke-width="1.5"/>
  <text x="300" y="572" font-family="Arial Black, Arial" font-weight="900" font-size="14" fill="#f87171" text-anchor="middle">Target Chip</text>
  <text x="300" y="608" font-family="Arial Black, Arial" font-weight="900" font-size="22" fill="#fecaca" text-anchor="middle">NVIDIA H200</text>
  <text x="300" y="638" font-family="Arial, sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">Top-tier Hopper GPU</text>
  <text x="300" y="656" font-family="Arial, sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">HBM3e 141GB · 4.8 TB/s</text>

  <rect x="560" y="530" width="440" height="130" rx="14" fill="#1a0a0a" stroke="#f87171" stroke-width="1.5"/>
  <text x="780" y="572" font-family="Arial Black, Arial" font-weight="900" font-size="14" fill="#f87171" text-anchor="middle">China Policy Stance</text>
  <text x="780" y="608" font-family="Arial Black, Arial" font-weight="900" font-size="22" fill="#fecaca" text-anchor="middle">Inference = Local</text>
  <text x="780" y="638" font-family="Arial, sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">Push for domestic processors</text>
  <text x="780" y="656" font-family="Arial, sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">Training only via H200</text>

  <rect x="80" y="672" width="920" height="90" rx="16" fill="#1a0a0a" stroke="#f87171" stroke-width="2"/>
  <text x="540" y="712" font-family="Arial Black, Arial" font-weight="900" font-size="17" fill="#f87171" text-anchor="middle">Scenarios</text>
  <text x="540" y="742" font-family="Arial, sans-serif" font-size="14" fill="#fecaca" text-anchor="middle">If US approves → NVDA China revenue resumes / If not → training bottleneck persists</text>

  <rect x="80" y="782" width="920" height="90" rx="14" fill="#1a0a0a" stroke="#f87171" stroke-width="1"/>
  <text x="540" y="818" font-family="Arial Black, Arial" font-weight="900" font-size="15" fill="#f87171" text-anchor="middle">Investment Implications</text>
  <text x="540" y="846" font-family="Arial, sans-serif" font-size="14" fill="#d1d5db" text-anchor="middle">China revenue option restored · CUDA moat reaffirmed for training · inference share risk persists</text>

  <rect x="80" y="890" width="920" height="70" rx="14" fill="#1a0a0a" stroke="#f87171" stroke-width="1"/>
  <text x="540" y="928" font-family="Arial, sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">Source: Shay Boloor · @StockSavvyShay · PBOC via The Information</text>

  <rect x="0" y="1020" width="1080" height="60" fill="#020810"/>
  <text x="540" y="1056" font-family="Arial, sans-serif" font-size="13" fill="#374151" text-anchor="middle">INVESTUS · 2026.07.09 · investus.kr SRP Chief Investment Officer</text>
