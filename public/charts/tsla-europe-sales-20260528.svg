<svg xmlns="http://www.w3.org/2000/svg" width="800" height="430" viewBox="0 0 800 430">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0a0a"/>
      <stop offset="100%" style="stop-color:#1a0f0f"/>
    </linearGradient>
  </defs>
  <rect width="800" height="430" fill="url(#bg)"/>
  <rect width="800" height="3" fill="#ef4444" opacity="0.9"/>

  <!-- Header -->
  <text x="32" y="38" font-family="Arial,sans-serif" font-size="11" fill="#ef4444" font-weight="600" letter-spacing="2">TSLA · 유럽 판매 · 2026.05.28</text>
  <text x="32" y="66" font-family="'SF Pro Display',Arial,sans-serif" font-size="20" fill="#ffffff" font-weight="700">Tesla 유럽 판매 3개월 연속 반등 — 4월 +46.5% YoY</text>
  <text x="32" y="88" font-family="Arial,sans-serif" font-size="13" fill="#94a3b8">ACEA 공식 데이터 · EU+EFTA+UK · 신형 Model Y 효과</text>
  <line x1="32" y1="102" x2="768" y2="102" stroke="#2d1515" stroke-width="1"/>

  <!-- Big stat -->
  <rect x="32" y="114" width="200" height="80" rx="8" fill="rgba(239,68,68,0.10)" stroke="#ef4444" stroke-width="1.5" stroke-opacity="0.7"/>
  <text x="50" y="137" font-family="Arial,sans-serif" font-size="10" fill="#ef4444" font-weight="600">EU+EFTA+UK 4월 YoY</text>
  <text x="50" y="172" font-family="'SF Pro Display',Arial,sans-serif" font-size="38" fill="#ffffff" font-weight="800">+46.5%</text>
  <text x="50" y="188" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8">10,654대 등록</text>

  <!-- EU only -->
  <rect x="248" y="114" width="200" height="80" rx="8" fill="rgba(239,68,68,0.07)" stroke="#ef4444" stroke-width="1" stroke-opacity="0.4"/>
  <text x="266" y="137" font-family="Arial,sans-serif" font-size="10" fill="#ef4444" font-weight="600">EU 단독</text>
  <text x="266" y="172" font-family="'SF Pro Display',Arial,sans-serif" font-size="38" fill="#ffffff" font-weight="800">+67%</text>
  <text x="266" y="188" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8">9,169대 등록</text>

  <!-- Consecutive months -->
  <rect x="464" y="114" width="304" height="80" rx="8" fill="rgba(0,229,160,0.07)" stroke="#00e5a0" stroke-width="1" stroke-opacity="0.4"/>
  <text x="482" y="137" font-family="Arial,sans-serif" font-size="10" fill="#00e5a0" font-weight="600">연속 성장 개월수</text>
  <text x="578" y="175" font-family="'SF Pro Display',Arial,sans-serif" font-size="50" fill="#00e5a0" font-weight="800" text-anchor="middle">3개월</text>
  <text x="578" y="190" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">연속 전년 대비 성장</text>

  <!-- Monthly trend bars -->
  <text x="32" y="222" font-family="Arial,sans-serif" font-size="11" fill="#ef4444" font-weight="700">■ Tesla 유럽 월별 추이 (EU+EFTA+UK, 2026)</text>

  <!-- Feb (low baseline ~6k units estimated) -->
  <rect x="80" y="285" width="80" height="28" rx="3" fill="rgba(239,68,68,0.4)"/>
  <text x="120" y="282" font-family="Arial,sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">2월</text>
  <text x="120" y="298" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0" text-anchor="middle">~6,200</text>
  <text x="120" y="320" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">+12% YoY</text>

  <!-- Mar -->
  <rect x="200" y="266" width="80" height="47" rx="3" fill="rgba(239,68,68,0.6)"/>
  <text x="240" y="263" font-family="Arial,sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">3월</text>
  <text x="240" y="283" font-family="Arial,sans-serif" font-size="9" fill="#e2e8f0" text-anchor="middle">~8,900</text>
  <text x="240" y="320" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">+28% YoY</text>

  <!-- Apr ★ -->
  <rect x="320" y="230" width="80" height="83" rx="3" fill="#ef4444" opacity="0.9"/>
  <text x="360" y="226" font-family="Arial,sans-serif" font-size="10" fill="#ef4444" text-anchor="middle" font-weight="700">4월 ★</text>
  <text x="360" y="258" font-family="'SF Pro Display',Arial,sans-serif" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="800">10,654</text>
  <text x="360" y="320" font-family="Arial,sans-serif" font-size="9" fill="#fbbf24" text-anchor="middle" font-weight="700">+46.5% YoY</text>

  <!-- ACEA context -->
  <text x="500" y="234" font-family="Arial,sans-serif" font-size="11" fill="#ef4444" font-weight="700">■ 경쟁사 대비 (ACEA 4월)</text>
  <text x="500" y="252" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">Volkswagen Group <tspan fill="#ef4444">-3.8%</tspan> YoY</text>
  <text x="500" y="268" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">BMW Group <tspan fill="#ef4444">-6.3%</tspan> YoY</text>
  <text x="500" y="284" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">Mercedes-Benz <tspan fill="#ef4444">-3.4%</tspan> YoY</text>
  <text x="500" y="300" font-family="Arial,sans-serif" font-size="11" fill="#00e5a0" font-weight="600">Tesla <tspan>+46.5%</tspan> YoY ← 역주행</text>

  <!-- Bottom insight -->
  <text x="32" y="355" font-family="Arial,sans-serif" font-size="11" fill="#ef4444" font-weight="700">■ 투자 시사점</text>
  <text x="32" y="373" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">• "Tesla 유럽 외면" 내러티브가 실데이터로 반박됨 — Q2 전체 데이터가 글로벌 인도량 서프라이즈 가능</text>
  <text x="32" y="390" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">• 신형 Model Y + 가격 조정 + 미중 분위기 개선이 동시 작용 — 구조적 회복인지 일시적인지 Q3 데이터가 확인 포인트</text>
  <text x="32" y="407" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">• 전통 OEM 역성장 환경에서 Tesla만 고성장 — EV 의무비율 강화 구조에서 유일한 수혜 위치</text>

  <text x="768" y="424" font-family="Arial,sans-serif" font-size="9" fill="#334155" text-anchor="end">SUNRYU Partners · 2026.05.28</text>
</svg>
