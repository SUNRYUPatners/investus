<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0a0f1e"/><stop offset="100%" stop-color="#1a0a2e"/></linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <text x="400" y="35" text-anchor="middle" fill="#c084fc" font-size="12" font-family="Arial" font-weight="bold" letter-spacing="3">NVIDIA CEO 젠슨 황 · AI 역설</text>
  <text x="400" y="60" text-anchor="middle" fill="#e2e8f0" font-size="20" font-family="Arial" font-weight="bold">AI는 인간 수요를 배가시킨다</text>
  <!-- Left: Paradox diagram -->
  <rect x="30" y="88" width="350" height="190" rx="12" fill="rgba(168,85,247,0.06)" stroke="rgba(168,85,247,0.2)" stroke-width="1"/>
  <text x="205" y="112" text-anchor="middle" fill="#c084fc" font-size="12" font-family="Arial" font-weight="bold">방사선 전문의 역설</text>
  <text x="55" y="140" fill="#ef4444" font-size="11" font-family="Arial" font-weight="bold">❌ 5년 전 예측:</text>
  <text x="55" y="158" fill="#94a3b8" font-size="11" font-family="Arial">"AI가 방사선 전문의를 대체한다"</text>
  <text x="55" y="176" fill="#94a3b8" font-size="11" font-family="Arial">"3,000만 명이 일자리를 잃는다"</text>
  <line x1="55" y1="188" x2="355" y2="188" stroke="rgba(168,85,247,0.15)" stroke-width="1"/>
  <text x="55" y="208" fill="#00e5a0" font-size="11" font-family="Arial" font-weight="bold">✓ 실제 결과:</text>
  <text x="55" y="226" fill="#e2e8f0" font-size="11" font-family="Arial">방사선 전문의 수요가 오히려 폭증</text>
  <text x="55" y="244" fill="#e2e8f0" font-size="11" font-family="Arial">AI → 더 많은 환자 처리 → 수요 증가</text>
  <text x="55" y="262" fill="#c084fc" font-size="11" font-family="Arial" font-weight="bold">"AI multiplies human demand"</text>
  <!-- Center arrow -->
  <text x="400" y="200" text-anchor="middle" fill="#c084fc" font-size="36" font-family="Arial">→</text>
  <!-- Right: Industries affected -->
  <rect x="430" y="88" width="345" height="190" rx="12" fill="rgba(168,85,247,0.06)" stroke="rgba(168,85,247,0.2)" stroke-width="1"/>
  <text x="603" y="112" text-anchor="middle" fill="#c084fc" font-size="12" font-family="Arial" font-weight="bold">모든 산업에 적용</text>
  <text x="450" y="138" fill="#fbbf24" font-size="11" font-family="Arial">⚕ 의료</text>
  <text x="540" y="138" fill="#94a3b8" font-size="10" font-family="Arial">AI 도구 → 의료 AI 전문가 신규 창출</text>
  <text x="450" y="162" fill="#fbbf24" font-size="11" font-family="Arial">⚖ 법률</text>
  <text x="540" y="162" fill="#94a3b8" font-size="10" font-family="Arial">AI 검색 → 법무 전문가 업무 확대</text>
  <text x="450" y="186" fill="#fbbf24" font-size="11" font-family="Arial">💰 금융</text>
  <text x="540" y="186" fill="#94a3b8" font-size="10" font-family="Arial">AI 퀀트 → 데이터 해석 전문가 필요</text>
  <text x="450" y="210" fill="#fbbf24" font-size="11" font-family="Arial">💻 소프트웨어</text>
  <text x="540" y="210" fill="#94a3b8" font-size="10" font-family="Arial">AI 코딩 → 개발 수요 10배 폭증</text>
  <text x="450" y="234" fill="#fbbf24" font-size="11" font-family="Arial">🎓 교육</text>
  <text x="540" y="234" fill="#94a3b8" font-size="10" font-family="Arial">AI 튜터 → 교육자 수요 오히려 증가</text>
  <text x="450" y="258" fill="#fbbf24" font-size="11" font-family="Arial">🏭 제조</text>
  <text x="540" y="258" fill="#94a3b8" font-size="10" font-family="Arial">AI 자동화 → 엔지니어 수요 전환</text>
  <!-- Bottom NVDA cycle -->
  <rect x="30" y="302" width="740" height="100" rx="10" fill="rgba(255,255,255,0.02)" stroke="rgba(168,85,247,0.15)" stroke-width="1"/>
  <text x="400" y="325" text-anchor="middle" fill="#c084fc" font-size="11" font-family="Arial" font-weight="bold">NVIDIA 수혜 사이클 (배가 효과)</text>
  <text x="130" y="352" text-anchor="middle" fill="#e2e8f0" font-size="11" font-family="Arial">AI 도구 확산</text>
  <text x="240" y="352" text-anchor="middle" fill="#c084fc" font-size="16" font-family="Arial">→</text>
  <text x="355" y="352" text-anchor="middle" fill="#e2e8f0" font-size="11" font-family="Arial">인간 수요 폭증</text>
  <text x="465" y="352" text-anchor="middle" fill="#c084fc" font-size="16" font-family="Arial">→</text>
  <text x="580" y="352" text-anchor="middle" fill="#e2e8f0" font-size="11" font-family="Arial">AI 컴퓨팅 더 필요</text>
  <text x="695" y="352" text-anchor="middle" fill="#c084fc" font-size="16" font-family="Arial">→</text>
  <text x="400" y="378" text-anchor="middle" fill="#c084fc" font-size="12" font-family="Arial" font-weight="bold">NVIDIA GPU 수요 무한 사이클</text>
  <text x="400" y="430" text-anchor="middle" fill="#334155" font-size="10" font-family="Arial">SUNRYU Partners CIO · 2026.05.14</text>
</svg>
