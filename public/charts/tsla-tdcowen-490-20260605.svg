  <rect x="36" y="172" width="270" height="14" rx="4" fill="#1a4030"/>
  <rect x="36" y="172" width="270" height="14" rx="4" fill="#00a060" opacity="0.7"/>
  <text x="312" y="182" font-size="10" fill="#a0e8c0">$423.70</text>
