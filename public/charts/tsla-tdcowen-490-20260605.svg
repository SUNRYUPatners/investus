<svg viewBox="0 0 480 430" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080f0a"/>
      <stop offset="100%" stop-color="#050809"/>
    </linearGradient>
  </defs>
  <rect width="480" height="430" fill="url(#bg)"/>
  <rect x="0" y="0" width="480" height="50" fill="#0d1a11"/>
