  <text x="173" y="312" text-anchor="middle" font-size="7" fill="#305040">TTM 판매량 초과</text>

  <rect x="228" y="262" width="90" height="56" rx="8" fill="#081510"/>
  <text x="273" y="286" text-anchor="middle" font-size="22" fill="#00e5a0" font-weight="900">3열</text>
  <text x="273" y="300" text-anchor="middle" font-size="8" fill="#408060">풀사이즈 SUV</text>
  <text x="273" y="312" text-anchor="middle" font-size="7" fill="#305040">3-row 시트 구성</text>

  <rect x="328" y="262" width="124" height="56" rx="8" fill="#081510"/>
  <text x="390" y="282" text-anchor="middle" font-size="10" fill="#a0d0b0">$50K+ 대형 SUV</text>
  <text x="390" y="298" text-anchor="middle" font-size="10" fill="#a0d0b0">Toyota · BMW · Ford</text>
  <text x="390" y="312" text-anchor="middle" font-size="8" fill="#608060">경쟁 시장 규모 ~1.3M</text>

  <!-- Key takeaways -->
  <rect x="16" y="346" width="448" height="72" rx="10" fill="#0a180e" stroke="#00e5a0" stroke-width="0.5" stroke-opacity="0.2"/>
  <text x="28" y="364" font-size="9" fill="#00e5a0" font-weight="700" letter-spacing="1">TD COWEN 핵심 포인트</text>
  <text x="28" y="380" font-size="10" fill="#90d8a8">• Rivian R2 출시에 영향 없음 — Model Y L ≠ Rivian 경쟁 구도</text>
  <text x="28" y="394" font-size="10" fill="#90d8a8">• 미국 EV 수요 회복 초기 신호 포착 — Model Y L 타이밍 최적</text>
  <text x="28" y="408" font-size="10" fill="#609870">• 60~135K 유닛 수요 범위 추정 · 출시 미정이나 수요 기반 탄탄</text>
