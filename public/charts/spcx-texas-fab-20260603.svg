  <!-- Total -->
  <text x="55" y="190" font-size="10" fill="#9ca3af">전체 완공</text>
  <rect x="55" y="198" width="400" height="36" rx="6" fill="#5b21b6" opacity="0.5"/>
  <rect x="55" y="198" width="220" height="36" rx="6" fill="#7c3aed" opacity="0.7"/>
  <text x="275" y="221" font-size="28" font-weight="900" fill="#c084fc" text-anchor="middle">$119B</text>
  <text x="464" y="221" font-size="10" fill="#9ca3af" text-anchor="end">역대 최대</text>

  <text x="55" y="248" font-size="9" fill="#6b7280">미국 내 단일 반도체 투자 역대 최대 규모 · 텍사스주 재산세 감면(Tax Abatement) 협약</text>

  <!-- Right panel: Key facts (visual, minimal text) -->
  <rect x="510" y="68" width="260" height="190" rx="12" fill="#111827"/>
  <text x="640" y="92" font-size="11" font-weight="700" fill="#c084fc" text-anchor="middle">핵심 정보</text>

  <!-- Who -->
