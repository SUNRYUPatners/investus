  <!-- Center: Investment Scale — the big story -->
  <rect x="30" y="68" width="460" height="190" rx="12" fill="#1a1033"/>
  <text x="260" y="92" font-size="11" font-weight="700" fill="#c084fc" text-anchor="middle">투자 규모 비교</text>

  <!-- Phase 1 -->
  <text x="55" y="120" font-size="10" fill="#9ca3af">Phase 1</text>
  <rect x="55" y="128" width="220" height="36" rx="6" fill="#7c3aed"/>
  <text x="165" y="151" font-size="22" font-weight="900" fill="white" text-anchor="middle">$55B</text>
