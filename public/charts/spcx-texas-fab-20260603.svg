  <rect x="530" y="138" width="220" height="30" rx="6" fill="#1a1033"/>
  <text x="540" y="151" font-size="9" fill="#9ca3af">위치</text>
  <text x="540" y="163" font-size="10" font-weight="700" fill="#e2e8f0">Texas · Grimes County</text>

  <!-- What -->
