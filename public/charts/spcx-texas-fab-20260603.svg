  <text x="540" y="237" font-size="10" font-weight="700" fill="#c084fc">2026.06.03</text>
  <text x="540" y="250" font-size="9" fill="#6b7280">Reinvestment Zone No.1 지정 심의</text>

  <!-- Bottom: Why it matters — 3 icons -->
  <rect x="30" y="274" width="740" height="122" rx="12" fill="#111827"/>

  <!-- Icon 1 -->
  <circle cx="130" cy="316" r="32" fill="#1a1033" stroke="#c084fc" stroke-width="1.5"/>
  <text x="130" y="308" font-size="22" text-anchor="middle">🏭</text>
  <text x="130" y="328" font-size="9" font-weight="700" fill="#c084fc" text-anchor="middle">반도체 자급</text>
  <text x="130" y="342" font-size="8" fill="#6b7280" text-anchor="middle">SpaceXai 전용 칩</text>

  <!-- Arrow -->
  <polygon points="195,316 210,310 210,322" fill="#c084fc"/>

  <!-- Icon 2 -->
  <circle cx="260" cy="316" r="32" fill="#1a1033" stroke="#c084fc" stroke-width="1.5"/>
  <text x="260" y="308" font-size="22" text-anchor="middle">💰</text>
  <text x="260" y="328" font-size="9" font-weight="700" fill="#c084fc" text-anchor="middle">비용 절감</text>
  <text x="260" y="342" font-size="8" fill="#6b7280" text-anchor="middle">NVDA GPU 구매 제로</text>

  <!-- Arrow -->
  <polygon points="325,316 340,310 340,322" fill="#c084fc"/>

  <!-- Icon 3 -->
  <circle cx="390" cy="316" r="32" fill="#1a1033" stroke="#c084fc" stroke-width="1.5"/>
  <text x="390" y="308" font-size="22" text-anchor="middle">📈</text>
  <text x="390" y="328" font-size="9" font-weight="700" fill="#c084fc" text-anchor="middle">IPO 밸류업</text>
  <text x="390" y="342" font-size="8" fill="#6b7280" text-anchor="middle">$1.5T 근거 추가</text>

  <!-- Right side summary -->
  <rect x="450" y="282" width="300" height="100" rx="8" fill="#0d0020"/>
  <text x="600" y="303" font-size="11" font-weight="700" fill="#c084fc" text-anchor="middle">Terafab LLC가 뭔가요?</text>
  <text x="465" y="322" font-size="9" fill="#9ca3af">SpaceX가 토지 매입을 위해 설립한 자회사.</text>
  <text x="465" y="337" font-size="9" fill="#9ca3af">이미 Grimes County 3,133에이커 부지 정지 작업 중.</text>
  <text x="465" y="352" font-size="9" fill="#c084fc">오늘 공청회 통과 시 → Zone 지정 → 착공 타임라인.</text>
  <text x="710" y="370" font-size="9" fill="#6b7280">investus.kr</text>
