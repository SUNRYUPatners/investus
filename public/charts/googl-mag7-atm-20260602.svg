<svg width="800" height="480" viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" style="font-family:system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#07091a"/>
      <stop offset="100%" stop-color="#0d1022"/>
    </linearGradient>
  </defs>
  <rect width="800" height="480" fill="url(#bg)"/>

  <!-- Header -->
  <rect x="0" y="0" width="800" height="60" fill="rgba(96,165,250,0.06)"/>
  <text x="32" y="21" fill="rgba(96,165,250,0.7)" font-size="10" letter-spacing="2" font-weight="700">ALPHABET · GOOGL · Mag 7</text>
  <text x="32" y="46" fill="white" font-size="19" font-weight="800">GOOGL이 Mag 7 ATM 수문을 열다 — 빅테크 자본 조달 패러다임 전환</text>

  <!-- Subtitle -->
  <text x="32" y="78" fill="rgba(255,255,255,0.4)" font-size="11">"Google just opened up the floodgates for Mag 7 to begin doing ATM offerings" · Berkshire $398B가 $10B 수표 썼다</text>

  <!-- Main quote -->
  <rect x="32" y="94" width="736" height="44" rx="10" fill="rgba(96,165,250,0.1)" stroke="rgba(96,165,250,0.3)" stroke-width="1"/>
  <text x="400" y="114" fill="white" font-size="14" font-weight="800" text-anchor="middle">"Google just opened up the floodgates for Mag 7 to begin doing ATM offerings"</text>
  <text x="400" y="130" fill="rgba(96,165,250,0.6)" font-size="10" text-anchor="middle">GOOGL $80B ATM 프로그램 발표 → 다른 Mag 7에게 ATM 자본 조달 신호탄</text>

  <!-- Domino chain visual -->
  <text x="32" y="162" fill="rgba(255,255,255,0.5)" font-size="11" font-weight="600" letter-spacing="1">도미노 시나리오 — GOOGL 이후 Mag 7 ATM 순서</text>

  <!-- GOOGL (confirmed) -->
  <rect x="32" y="174" width="96" height="78" rx="10" fill="rgba(96,165,250,0.2)" stroke="rgba(96,165,250,0.5)" stroke-width="2"/>
  <text x="80" y="200" fill="#60a5fa" font-size="18" font-weight="800" text-anchor="middle">GOOGL</text>
  <text x="80" y="218" fill="rgba(255,255,255,0.6)" font-size="9" text-anchor="middle">$40B ATM</text>
  <text x="80" y="234" fill="#00e5a0" font-size="9" font-weight="700" text-anchor="middle">✓ 완료</text>
  <rect x="48" y="244" width="64" height="4" rx="2" fill="rgba(96,165,250,0.6)"/>

  <!-- Arrow -->
  <text x="142" y="218" fill="rgba(255,255,255,0.3)" font-size="18">→</text>

  <!-- MSFT -->
  <rect x="164" y="174" width="96" height="78" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="212" y="200" fill="rgba(255,255,255,0.6)" font-size="18" font-weight="800" text-anchor="middle">MSFT</text>
  <text x="212" y="218" fill="rgba(255,255,255,0.35)" font-size="9" text-anchor="middle">다음 후보</text>
  <text x="212" y="234" fill="rgba(255,200,0,0.6)" font-size="9" text-anchor="middle">검토 가능성</text>

  <!-- Arrow -->
  <text x="274" y="218" fill="rgba(255,255,255,0.3)" font-size="18">→</text>

  <!-- AAPL -->
  <rect x="296" y="174" width="96" height="78" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="344" y="200" fill="rgba(255,255,255,0.6)" font-size="18" font-weight="800" text-anchor="middle">AAPL</text>
  <text x="344" y="218" fill="rgba(255,255,255,0.35)" font-size="9" text-anchor="middle">다음 후보</text>
  <text x="344" y="234" fill="rgba(255,200,0,0.6)" font-size="9" text-anchor="middle">검토 가능성</text>

  <!-- Arrow -->
  <text x="406" y="218" fill="rgba(255,255,255,0.3)" font-size="18">→</text>

  <!-- META -->
  <rect x="428" y="174" width="96" height="78" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="476" y="200" fill="rgba(255,255,255,0.6)" font-size="18" font-weight="800" text-anchor="middle">META</text>
  <text x="476" y="218" fill="rgba(255,255,255,0.35)" font-size="9" text-anchor="middle">다음 후보</text>
  <text x="476" y="234" fill="rgba(255,200,0,0.6)" font-size="9" text-anchor="middle">검토 가능성</text>

  <!-- Arrow -->
  <text x="538" y="218" fill="rgba(255,255,255,0.3)" font-size="18">→</text>

  <!-- NVDA -->
  <rect x="560" y="174" width="96" height="78" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="608" y="200" fill="rgba(255,255,255,0.6)" font-size="18" font-weight="800" text-anchor="middle">NVDA</text>
  <text x="608" y="218" fill="rgba(255,255,255,0.35)" font-size="9" text-anchor="middle">다음 후보</text>
  <text x="608" y="234" fill="rgba(255,200,0,0.6)" font-size="9" text-anchor="middle">검토 가능성</text>

  <!-- "..." -->
  <text x="678" y="218" fill="rgba(255,255,255,0.3)" font-size="14">→ ···</text>

  <!-- Berkshire significance -->
  <rect x="32" y="270" width="736" height="66" rx="12" fill="rgba(245,158,11,0.08)" stroke="rgba(245,158,11,0.25)" stroke-width="1"/>
  <text x="52" y="292" fill="#f59e0b" font-size="12" font-weight="700">🏛️ Berkshire $398B가 $10B 수표를 썼다는 것의 의미</text>
  <text x="52" y="312" fill="rgba(255,255,255,0.65)" font-size="10">버핏이 ATM 주식 발행에 동참했다 = "주식 발행을 통한 자본 조달이 가치 훼손이 아니다"는 최고 권위자 보증</text>
  <text x="52" y="328" fill="rgba(255,255,255,0.45)" font-size="10">이것이 다른 Mag 7 CFO들에게 주는 메시지: 버핏도 괜찮다고 했다 → ATM 진입 장벽이 사라짐</text>

  <!-- ATM mechanics -->
  <rect x="32" y="350" width="736" height="90" rx="12" fill="rgba(96,165,250,0.05)" stroke="rgba(96,165,250,0.12)" stroke-width="1"/>
  <text x="52" y="372" fill="rgba(96,165,250,0.8)" font-size="11" font-weight="700">ATM 프로그램이 왜 Mag 7에 유리한가</text>
  <text x="52" y="392" fill="rgba(255,255,255,0.6)" font-size="10">• 시장가 매출 — 주가가 높을수록 더 적은 주식으로 더 많은 자금 조달 (주주 희석 최소화)</text>
  <text x="52" y="408" fill="rgba(255,255,255,0.6)" font-size="10">• 분기별 분할 매도 — 단기 급락 없이 시장 충격 최소화 · AI 인프라 투자 타이밍에 맞춰 조달</text>
  <text x="52" y="424" fill="rgba(255,255,255,0.6)" font-size="10">• GOOGL 선례 + 버핏 보증 = 다음 Mag 7 ATM 발표가 시장에서 "호재"로 해석될 가능성 높음</text>
  <text x="52" y="432" fill="rgba(96,165,250,0.4)" font-size="9">AMZN·MSFT·NVDA가 ATM 발표하면 → AI 인프라 투자 의지 + 주주가치 보호 의지 동시 신호</text>

  <text x="400" y="476" fill="rgba(255,255,255,0.2)" font-size="9" text-anchor="middle">investus.kr · 선류파트너스 · 투자 참고용, 투자 권유 아님</text>
</svg>
