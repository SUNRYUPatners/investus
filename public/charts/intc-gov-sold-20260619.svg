<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 440">
  <rect width="480" height="440" fill="#0a0c10"/>
  <rect x="0" y="0" width="480" height="56" fill="#111318"/>
  <rect x="0" y="52" width="480" height="2" fill="#60a5fa" opacity="0.5"/>
  <text x="24" y="24" font-family="Arial,sans-serif" font-size="11" fill="#60a5fa" font-weight="bold">종목분석 · INTC</text>
  <text x="24" y="44" font-family="Arial,sans-serif" font-size="13" fill="#e5e7eb" font-weight="bold">미국 정부 인텔 주식 손실 매각 — $31.04 매수 → $21.61 매도</text>

  <!-- Loss visualization -->
  <rect x="24" y="68" width="432" height="96" rx="12" fill="#1a0a0a" stroke="#f87171" stroke-width="1.5" stroke-opacity="0.8"/>
  <text x="240" y="100" font-family="Arial,sans-serif" font-size="14" fill="#9ca3af" text-anchor="middle">미국 정부 Intel 투자 손실</text>
  <text x="240" y="134" font-family="Arial,sans-serif" font-size="36" fill="#f87171" font-weight="bold" text-anchor="middle">-$4B 손실</text>
  <text x="240" y="156" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">매수 $31.04 (2021.08) → 매도 $21.61 · 433.3M주</text>

  <!-- Price comparison -->
  <rect x="24" y="176" width="204" height="80" rx="10" fill="#111318"/>
  <text x="40" y="200" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af">매수 단가 (2021년 8월)</text>
  <text x="40" y="226" font-family="Arial,sans-serif" font-size="28" fill="#9ca3af" font-weight="bold">$31.04</text>
  <text x="40" y="248" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af">CHIPS Act 지원 당시</text>

  <rect x="244" y="176" width="212" height="80" rx="10" fill="#111318"/>
  <text x="260" y="200" font-family="Arial,sans-serif" font-size="11" fill="#f87171">매도 단가 (현재)</text>
  <text x="260" y="226" font-family="Arial,sans-serif" font-size="28" fill="#f87171" font-weight="bold">$21.61</text>
  <text x="260" y="248" font-family="Arial,sans-serif" font-size="11" fill="#f87171">-30.4% 손실 실현</text>

  <!-- Context -->
  <rect x="24" y="268" width="432" height="100" rx="10" fill="#111318"/>
  <text x="40" y="292" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af">배경 맥락</text>
  <text x="40" y="316" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">CHIPS Act 미국 반도체 지원 투자의 공식 손실 확정</text>
  <text x="40" y="336" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">Intel 106년 저점 ($21.61) → AI 전환 실패 논란</text>
  <text x="40" y="356" font-family="Arial,sans-serif" font-size="12" fill="#e5e7eb">정부 매각 = 공식 포기 신호 vs. 시장 과잉 반응?</text>

  <text x="240" y="430" font-family="Arial,sans-serif" font-size="10" fill="#4b5563" text-anchor="middle">2026.06.19 · Investus · 참고용</text>
