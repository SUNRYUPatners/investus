<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 660" width="1080" height="660">
  <rect width="1080" height="660" fill="#0d1117"/>
  <rect x="0" y="0" width="1080" height="64" fill="#111318"/>
  <rect x="0" y="62" width="1080" height="2" fill="#f87171" opacity="0.8"/>
  <text x="28" y="26" font-family="Arial,sans-serif" font-size="13" fill="#f87171" font-weight="700">TSLA · 미디어 오보 팩트체크</text>
  <text x="28" y="50" font-family="Arial,sans-serif" font-size="14" fill="#e5e7eb" font-weight="700">레거시 미디어 허위 보도 vs 실제 사실 — 운전자 엑셀 100%, Tesla 결함 아님</text>

  <!-- ❌ 레거시 미디어 (왼쪽) -->
  <rect x="24" y="78" width="494" height="46" rx="10" fill="#3b0a0a"/>
  <text x="271" y="100" font-family="Arial,sans-serif" font-size="16" fill="#f87171" font-weight="700" text-anchor="middle">❌ 레거시 미디어 보도 (잘못된 정보)</text>
  <text x="271" y="118" font-family="Arial,sans-serif" font-size="12" fill="#fca5a5" text-anchor="middle">언론이 보도한 내용 — 실제와 다름</text>

  <!-- Wrong items -->
  <rect x="24" y="134" width="494" height="58" rx="8" fill="#1c0808"/>
  <text x="44" y="158" font-family="Arial,sans-serif" font-size="22" fill="#f87171" font-weight="700">🚗  "Tesla 자율주행 결함으로 사고"</text>
  <text x="44" y="182" font-family="Arial,sans-serif" font-size="13" fill="#fca5a5">시스템 오작동 · Tesla 책임론 제기</text>

  <rect x="24" y="200" width="494" height="58" rx="8" fill="#1c0808"/>
  <text x="44" y="224" font-family="Arial,sans-serif" font-size="22" fill="#f87171" font-weight="700">🤖  "자율주행 시스템이 멈추지 않음"</text>
  <text x="44" y="248" font-family="Arial,sans-serif" font-size="13" fill="#fca5a5">FSD/Autopilot 위험성 부각</text>

  <rect x="24" y="266" width="494" height="58" rx="8" fill="#1c0808"/>
  <text x="44" y="290" font-family="Arial,sans-serif" font-size="22" fill="#f87171" font-weight="700">📰  "Tesla 안전 문제 심각"</text>
  <text x="44" y="314" font-family="Arial,sans-serif" font-size="13" fill="#fca5a5">주택 충돌 · Tesla 책임 주장</text>

  <rect x="24" y="332" width="494" height="58" rx="8" fill="#1c0808"/>
  <text x="44" y="356" font-family="Arial,sans-serif" font-size="22" fill="#f87171" font-weight="700">⚠️  속도: 72~73mph (레거시 보도)</text>
  <text x="44" y="380" font-family="Arial,sans-serif" font-size="13" fill="#fca5a5">원인 분석 없이 "Tesla 위험" 보도</text>

  <!-- Label: 결론 -->
  <rect x="24" y="400" width="494" height="56" rx="8" fill="#2d0808" stroke="#f87171" stroke-width="1.5"/>
  <text x="271" y="424" font-family="Arial,sans-serif" font-size="14" fill="#f87171" font-weight="700" text-anchor="middle">❌ 레거시 미디어 = 맹목적 신뢰 위험</text>
  <text x="271" y="446" font-family="Arial,sans-serif" font-size="12" fill="#fca5a5" text-anchor="middle">사실 확인 없는 보도 · 투자 판단 왜곡 가능</text>

  <!-- ✅ 실제 사실 (오른쪽) -->
  <rect x="562" y="78" width="494" height="46" rx="10" fill="#0a2e0a"/>
  <text x="809" y="100" font-family="Arial,sans-serif" font-size="16" fill="#00e5a0" font-weight="700" text-anchor="middle">✅ 실제 사실 (공식 데이터)</text>
  <text x="809" y="118" font-family="Arial,sans-serif" font-size="12" fill="#6ee7b7" text-anchor="middle">Tesla AI VP Ashok Elluswamy 공식 확인</text>

  <!-- Correct items -->
  <rect x="562" y="134" width="494" height="58" rx="8" fill="#0a1f0a"/>
  <text x="582" y="158" font-family="Arial,sans-serif" font-size="20" fill="#00e5a0" font-weight="700">✅ 운전자가 직접 엑셀 100% 밟음</text>
  <text x="582" y="182" font-family="Arial,sans-serif" font-size="13" fill="#6ee7b7">FSD 수동 오버라이드 → 운전자가 직접 가속</text>

  <rect x="562" y="200" width="494" height="58" rx="8" fill="#0a1f0a"/>
  <text x="582" y="224" font-family="Arial,sans-serif" font-size="20" fill="#00e5a0" font-weight="700">✅ 자율주행 시스템 정상 작동</text>
  <text x="582" y="248" font-family="Arial,sans-serif" font-size="13" fill="#6ee7b7">AI 시스템 이상 없음 · 데이터 기록으로 확인</text>

  <rect x="562" y="266" width="494" height="58" rx="8" fill="#0a1f0a"/>
  <text x="582" y="290" font-family="Arial,sans-serif" font-size="20" fill="#00e5a0" font-weight="700">✅ 속도 73mph = 운전자 가속 결과</text>
  <text x="582" y="314" font-family="Arial,sans-serif" font-size="13" fill="#6ee7b7">주거지역 내 엑셀 100% → 주택 충돌</text>

  <rect x="562" y="332" width="494" height="58" rx="8" fill="#0a1f0a"/>
  <text x="582" y="356" font-family="Arial,sans-serif" font-size="20" fill="#00e5a0" font-weight="700">✅ Tesla 결함 아님 — 운전자 과실</text>
  <text x="582" y="380" font-family="Arial,sans-serif" font-size="13" fill="#6ee7b7">AI VP가 데이터 공개 · 투명한 사실 확인</text>

  <!-- 결론 박스 -->
  <rect x="562" y="400" width="494" height="56" rx="8" fill="#0d2e0a" stroke="#00e5a0" stroke-width="1.5"/>
  <text x="809" y="424" font-family="Arial,sans-serif" font-size="14" fill="#00e5a0" font-weight="700" text-anchor="middle">✅ Tesla AI = 투명한 데이터 공개</text>
  <text x="809" y="446" font-family="Arial,sans-serif" font-size="12" fill="#6ee7b7" text-anchor="middle">사실은 스스로 드러남 · 레거시 미디어 ≠ 진실</text>

  <!-- 구분선 -->
  <line x1="540" y1="78" x2="540" y2="456" stroke="#374151" stroke-width="2"/>
  <text x="540" y="472" font-family="Arial,sans-serif" font-size="20" fill="#9ca3af" text-anchor="middle">VS</text>

  <!-- 핵심 교훈 박스 (하단) -->
  <rect x="24" y="484" width="1032" height="100" rx="12" fill="#111827" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="540" y="514" font-family="Arial,sans-serif" font-size="16" fill="#fbbf24" font-weight="700" text-anchor="middle">📌 투자자 핵심 교훈</text>
  <text x="540" y="540" font-family="Arial,sans-serif" font-size="14" fill="#e5e7eb" text-anchor="middle">레거시 미디어의 "Tesla 결함" 보도는 오보 — 실제 Tesla AI 시스템은 정상 작동했습니다.</text>
  <text x="540" y="562" font-family="Arial,sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">헤드라인만 보고 투자 결정하면 오판 위험 · 항상 원데이터(AI VP 공식 발표)를 확인하세요</text>

  <text x="540" y="642" font-family="Arial,sans-serif" font-size="10" fill="#4b5563" text-anchor="middle">출처: Tesla AI VP Ashok Elluswamy 공식 발표 · 2026.06.24 · Investus</text>
</svg>
