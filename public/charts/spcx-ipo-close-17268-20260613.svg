  <rect x="140" y="368" width="106" height="14" rx="3" fill="#60a5fa" opacity="0.7"/>
  <text x="370" y="380" font-family="Arial,sans-serif" font-size="11" fill="#60a5fa">+53.0%</text>
  <!-- Alibaba: +38.1% -->
  <text x="24" y="402" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af">Alibaba (2014)</text>
  <rect x="140" y="392" width="76" height="14" rx="3" fill="#fb923c" opacity="0.7"/>
  <text x="370" y="404" font-family="Arial,sans-serif" font-size="11" fill="#fb923c">+38.1%</text>

  <!-- Bottom banner -->
  <rect x="24" y="420" width="432" height="52" rx="10" fill="#1a0d2e" stroke="#c084fc" stroke-width="1" stroke-opacity="0.3"/>
  <text x="240" y="440" font-family="Arial,sans-serif" font-size="12" fill="#c084fc" text-anchor="middle" font-weight="bold">Morgan Stanley — 단독 북러너 &amp; 안정화 에이전트</text>
  <text x="240" y="458" font-family="Arial,sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">역사상 최대 IPO 기록 공식 달성 — 사우디 아람코 $29.4B 경신</text>

  <text x="240" y="488" font-family="Arial,sans-serif" font-size="10" fill="#4b5563" text-anchor="middle">2026.06.13 · Investus · 투자 참고용</text>
