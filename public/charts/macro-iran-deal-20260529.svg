  <rect x="30" y="292" width="740" height="60" rx="8" fill="#060b18" stroke="#ef4444" stroke-width="1" stroke-opacity="0.4"/>
  <rect x="30" y="292" width="4" height="60" rx="2" fill="#ef4444"/>
  <text x="50" y="314" font-family="Arial,sans-serif" font-size="11" fill="#ef4444" font-weight="700">■ 포지션 전략</text>
  <text x="50" y="334" font-family="Arial,sans-serif" font-size="11" fill="white">XLE 비중 과대 시 일부 차익 실현 검토 · 협상 결렬 시 유가 반등 → XLE 재진입 기회</text>
  <text x="50" y="346" font-family="Arial,sans-serif" font-size="10" fill="#9ca3af">이란 재개 + OPEC 감산 유지 → 공급 순증 제한 가능 · 실제 영향 30개월 유예</text>

  <rect x="30" y="364" width="740" height="32" rx="6" fill="#0d0505" stroke="#ef4444" stroke-width="1" stroke-opacity="0.3"/>
  <text x="400" y="385" font-family="Arial,sans-serif" font-size="12" fill="#ef4444" font-weight="700" text-anchor="middle">30개월 제재 해제 시나리오 → 원유 공급 충격 · XLE·RTX 단기 포지션 조정 필요</text>

  <line x1="30" y1="408" x2="770" y2="408" stroke="#1e2330" stroke-width="1"/>
  <text x="30" y="424" font-family="Arial,sans-serif" font-size="8" fill="#374151">투자 참고용 · 투자 권유 아님</text>
  <text x="770" y="424" font-family="Arial,sans-serif" font-size="9" fill="#ef4444" text-anchor="end" font-weight="700">SUNRYU Partners CIO</text>
