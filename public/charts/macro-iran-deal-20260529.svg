  <text x="770" y="58" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="end">2026.05.29</text>
  <line x1="30" y1="70" x2="770" y2="70" stroke="#1e2330" stroke-width="1"/>

  <!-- Timeline visual -->
  <rect x="30" y="84" width="740" height="80" rx="8" fill="#060b18" stroke="#ef4444" stroke-width="1" stroke-opacity="0.5"/>
