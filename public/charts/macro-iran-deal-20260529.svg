  <text x="50" y="154" font-family="Arial,sans-serif" font-size="10" fill="white">합의 시 → <tspan font-weight="700" fill="#ef4444">30개월</tspan> 내 단계적 제재 해제 · 이란 원유 일일 300만 배럴 재개 가능</text>

