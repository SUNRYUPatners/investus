  <rect x="50" y="116" width="700" height="8" rx="4" fill="#1e2330"/>
  <rect x="50" y="116" width="120" height="8" rx="4" fill="#ef4444"/>
  <text x="50" y="136" font-family="Arial,sans-serif" font-size="9" fill="#ef4444">협상 진행 중</text>
  <text x="290" y="136" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">1단계 제재 해제</text>
