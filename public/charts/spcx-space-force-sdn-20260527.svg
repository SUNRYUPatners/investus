<svg xmlns="http://www.w3.org/2000/svg" width="800" height="430" viewBox="0 0 800 430">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1e"/>
      <stop offset="100%" style="stop-color:#0d1528"/>
    </linearGradient>
    <radialGradient id="satGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="430" fill="url(#bg)"/>
  <rect width="800" height="3" fill="#3b82f6" opacity="0.9"/>

  <!-- Header -->
  <text x="32" y="38" font-family="Arial,sans-serif" font-size="11" fill="#60a5fa" font-weight="600" letter-spacing="2">SPCX · 국방 계약 · 2026.05.27</text>
  <text x="32" y="66" font-family="'SF Pro Display',Arial,sans-serif" font-size="20" fill="#ffffff" font-weight="700">미 우주군, SpaceX에 $23.5억 SDN 백본 계약 체결</text>
  <text x="32" y="88" font-family="Arial,sans-serif" font-size="13" fill="#94a3b8">Space Data Network · Firm-Fixed-Price OTA · El Segundo, CA</text>
  <line x1="32" y1="102" x2="768" y2="102" stroke="#1e2d4a" stroke-width="1"/>

  <!-- Contract Amount Highlight -->
  <rect x="32" y="114" width="260" height="70" rx="8" fill="rgba(59,130,246,0.1)" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="50" y="138" font-family="Arial,sans-serif" font-size="11" fill="#60a5fa" font-weight="600">계약 금액</text>
  <text x="50" y="166" font-family="'SF Pro Display',Arial,sans-serif" font-size="32" fill="#ffffff" font-weight="800">$2.35B</text>
  <text x="50" y="180" font-family="Arial,sans-serif" font-size="10" fill="#94a3b8">Firm-Fixed-Price OTA (2027년 말 완성 목표)</text>

  <!-- Contract Details -->
  <text x="32" y="212" font-family="Arial,sans-serif" font-size="11" fill="#60a5fa" font-weight="700">■ SDN (Space Data Network) 백본이란</text>
  <text x="32" y="229" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">미 우주군 전투원에게 안전하고 고속·저지연의 글로벌 데이터 전송</text>
  <text x="32" y="245" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">을 제공하는 pLEO 위성 통신망. 센서-슈터 연결 핵심 레이어.</text>

  <text x="32" y="270" font-family="Arial,sans-serif" font-size="11" fill="#60a5fa" font-weight="700">■ 핵심 사양</text>
  <text x="32" y="287" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">• 광역 저궤도 위성망 기반 · 저지연 전술 통신</text>
  <text x="32" y="303" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">• 분산형 아키텍처 → 단일 장애점 없음</text>
  <text x="32" y="319" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">• 암호화 통신 · 재밍 저항 설계</text>
  <text x="32" y="335" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">• 민수·군용 이중 활용 Starlink 인프라 기반</text>

  <text x="32" y="360" font-family="Arial,sans-serif" font-size="11" fill="#60a5fa" font-weight="700">■ 투자 시사점</text>
  <text x="32" y="377" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">• 정부·군 계약 → Starlink 안정 수익 기반 강화</text>
  <text x="32" y="393" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">• SpaceX IPO 밸류에이션($350B) 추가 지지 재료</text>
  <text x="32" y="409" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8">• Starlink 정부 계약 누적 → 민수 구독료 보완</text>

  <!-- Satellite Network Visualization -->
  <ellipse cx="600" cy="265" rx="130" ry="90" fill="url(#satGlow)" stroke="#1e3a5f" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- Earth -->
  <circle cx="600" cy="265" r="35" fill="rgba(30,45,74,0.9)" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="600" y="269" font-family="Arial,sans-serif" font-size="10" fill="#60a5fa" text-anchor="middle" font-weight="700">🌍 USSF</text>

  <!-- Satellites -->
  <circle cx="490" cy="205" r="6" fill="#3b82f6" opacity="0.8"/>
  <line x1="490" y1="205" x2="575" y2="242" stroke="#3b82f6" stroke-width="0.8" stroke-opacity="0.5" stroke-dasharray="3,3"/>
  <text x="478" y="199" font-family="Arial,sans-serif" font-size="8" fill="#60a5fa" text-anchor="middle">SAT-1</text>

  <circle cx="565" cy="168" r="6" fill="#3b82f6" opacity="0.8"/>
  <line x1="565" y1="168" x2="590" y2="232" stroke="#3b82f6" stroke-width="0.8" stroke-opacity="0.5" stroke-dasharray="3,3"/>
  <text x="565" y="160" font-family="Arial,sans-serif" font-size="8" fill="#60a5fa" text-anchor="middle">SAT-2</text>

  <circle cx="650" cy="168" r="6" fill="#3b82f6" opacity="0.8"/>
  <line x1="650" y1="168" x2="612" y2="232" stroke="#3b82f6" stroke-width="0.8" stroke-opacity="0.5" stroke-dasharray="3,3"/>
  <text x="660" y="160" font-family="Arial,sans-serif" font-size="8" fill="#60a5fa" text-anchor="middle">SAT-3</text>

  <circle cx="715" cy="210" r="6" fill="#3b82f6" opacity="0.8"/>
  <line x1="715" y1="210" x2="631" y2="248" stroke="#3b82f6" stroke-width="0.8" stroke-opacity="0.5" stroke-dasharray="3,3"/>
  <text x="727" y="206" font-family="Arial,sans-serif" font-size="8" fill="#60a5fa" text-anchor="middle">SAT-4</text>

  <circle cx="715" cy="320" r="6" fill="#3b82f6" opacity="0.8"/>
  <line x1="715" y1="320" x2="634" y2="283" stroke="#3b82f6" stroke-width="0.8" stroke-opacity="0.5" stroke-dasharray="3,3"/>
  <text x="727" y="324" font-family="Arial,sans-serif" font-size="8" fill="#60a5fa" text-anchor="middle">SAT-5</text>

  <circle cx="490" cy="320" r="6" fill="#3b82f6" opacity="0.8"/>
  <line x1="490" y1="320" x2="570" y2="283" stroke="#3b82f6" stroke-width="0.8" stroke-opacity="0.5" stroke-dasharray="3,3"/>
  <text x="478" y="324" font-family="Arial,sans-serif" font-size="8" fill="#60a5fa" text-anchor="middle">SAT-6</text>

  <text x="600" y="378" font-family="Arial,sans-serif" font-size="9" fill="#475569" text-anchor="middle">SpaceX SDN pLEO 위성망 (개념도)</text>

  <text x="768" y="424" font-family="Arial,sans-serif" font-size="9" fill="#334155" text-anchor="end">SUNRYU Partners · 2026.05.27</text>
</svg>
