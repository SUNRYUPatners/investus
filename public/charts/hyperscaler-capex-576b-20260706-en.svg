  <text x="540" y="252" font-family="Arial Black, Arial" font-weight="900" font-size="56" fill="#fdba74" text-anchor="middle" filter="url(#glow)">$576B → $939B</text>
  <text x="540" y="298" font-family="Arial, sans-serif" font-size="20" fill="#fb923c" text-anchor="middle">2026: $576B · 2027: $939B — AI infrastructure investment explodes</text>

