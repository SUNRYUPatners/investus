  <text x="300" y="460" font-family="Arial, sans-serif" font-size="13" fill="#5a4a1a" text-anchor="middle">+60%+ vs prior year</text>
  <text x="300" y="500" font-family="Arial, sans-serif" font-size="12" fill="#3a3010" text-anchor="middle">AI chips · data centers · power infra</text>

