  <text x="100" y="690" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#fb923c">Memory Benefit</text>
  <text x="260" y="690" font-family="Arial, sans-serif" font-size="14" fill="#fdba74">HBM + DDR5 demand rising → SK Hynix / MU direct beneficiaries</text>
  <text x="100" y="716" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#fb923c">TSLA Link</text>
  <text x="260" y="716" font-family="Arial, sans-serif" font-size="14" fill="#fdba74">Dojo supercomputer · in-house AI training infra → competitive edge</text>
  <text x="100" y="742" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#fb923c">Key Investors</text>
  <text x="260" y="742" font-family="Arial, sans-serif" font-size="14" fill="#fdba74">MS $80B+ · Google $75B+ · Meta $60B+ · Amazon $100B+ annually</text>
  <text x="100" y="852" font-family="Arial, sans-serif" font-size="11" fill="#6a4a14">* 2027 $939B = more than 2× total US manufacturing capex — largest-ever capital concentration in AI</text>

  <rect x="60" y="912" width="960" height="40" rx="12" fill="#120e04" stroke="#f97316" stroke-width="1" stroke-opacity="0.25"/>
