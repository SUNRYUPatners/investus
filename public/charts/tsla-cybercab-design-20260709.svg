  <text x="540" y="360" font-family="Arial, sans-serif" font-size="17" fill="#9ca3af" text-anchor="middle">라이드헤일링 90% 트립이 1~2인 → 최적 좌석 수</text>

  <rect x="80" y="392" width="920" height="110" rx="16" fill="#071a10" stroke="#00e5a0" stroke-width="1.5"/>
