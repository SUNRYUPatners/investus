  <text x="855" y="630" font-family="Arial, sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">기계적 컬럼 제거</text>
  <text x="855" y="650" font-family="Arial, sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">패키징 자유도 극대</text>

  <rect x="80" y="694" width="920" height="90" rx="16" fill="#071a10" stroke="#00e5a0" stroke-width="2"/>
  <text x="540" y="734" font-family="Arial Black, Arial" font-weight="900" font-size="17" fill="#00e5a0" text-anchor="middle">Robotaxi 플릿 편성 전략</text>
  <text x="540" y="764" font-family="Arial, sans-serif" font-size="15" fill="#a7f3d0" text-anchor="middle">Cybercab (2인승) 기본 · 대형 그룹 필요 시 Model Y·기타 자율차 배차</text>

  <rect x="80" y="804" width="920" height="86" rx="14" fill="#071a10" stroke="#00e5a0" stroke-width="1"/>
  <text x="540" y="838" font-family="Arial Black, Arial" font-weight="900" font-size="15" fill="#00e5a0" text-anchor="middle">투자 시사점</text>
  <text x="540" y="866" font-family="Arial, sans-serif" font-size="14" fill="#d1d5db" text-anchor="middle">중량·부품 감축 → 단가 하락 · 트립당 EBITDA 개선 · 스케일업 여지 확대</text>

  <rect x="80" y="910" width="920" height="60" rx="14" fill="#071a10" stroke="#00e5a0" stroke-width="1"/>
  <text x="540" y="948" font-family="Arial, sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">Source: Sawyer Merritt · Tesla · July 8, 2026</text>

